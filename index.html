<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuncer Zeka - AI Arayüzü</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --panel-border: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --user-msg: #3b82f6;
            --ai-msg: rgba(51, 65, 85, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; position: relative; }
        
        .glow-1 { position: absolute; top: -10%; left: -10%; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(0,0,0,0) 70%); z-index: 0; pointer-events: none; }
        .glow-2 { position: absolute; bottom: -10%; right: -10%; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, rgba(0,0,0,0) 70%); z-index: 0; pointer-events: none; }

        .app-container { display: flex; width: 100%; height: 100%; z-index: 1; padding: 20px; gap: 20px; }

        .sidebar {
            width: 300px;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .brand { display: flex; align-items: center; gap: 15px; margin-bottom: 40px; }
        .brand-icon { width: 40px; height: 40px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; }
        .brand-text h1 { font-size: 1.2rem; font-weight: 700; color: #fff; }

        .version-selector {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 16px;
            padding: 8px;
            display: flex;
            position: relative;
            border: 1px solid var(--panel-border);
            margin-bottom: auto;
        }

        .version-btn { flex: 1; padding: 12px 0; background: transparent; border: none; color: var(--text-muted); font-weight: 600; cursor: pointer; z-index: 2; }
        .version-btn.active { color: white; }

        .active-bg {
            position: absolute;
            top: 8px; bottom: 8px; left: 8px;
            width: calc(50% - 8px);
            background: var(--primary);
            border-radius: 10px;
            z-index: 1;
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .system-status {
            margin-top: auto;
            padding: 15px;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--panel-border);
        }

        .status-dot { width: 10px; height: 10px; background: #94a3b8; border-radius: 50%; }

        .chat-area {
            flex: 1;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header { padding: 20px 30px; border-bottom: 1px solid var(--panel-border); display: flex; justify-content: space-between; align-items: center; }
        .messages-container { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }

        .message { max-width: 80%; display: flex; flex-direction: column; animation: fadeIn 0.3s ease; }
        .message.user { align-self: flex-end; }
        .message.ai { align-self: flex-start; }

        .message-bubble { padding: 14px 18px; border-radius: 18px; font-size: 0.95rem; line-height: 1.5; }
        .user .message-bubble { background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .ai .message-bubble { background: var(--ai-msg); color: var(--text-main); border: 1px solid var(--panel-border); border-bottom-left-radius: 4px; }

        .input-container { padding: 20px 30px; background: rgba(30, 41, 59, 0.6); }
        .input-box { display: flex; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--panel-border); border-radius: 20px; padding: 8px 8px 8px 20px; }
        .input-box input { flex: 1; background: transparent; border: none; color: white; outline: none; }
        
        .send-btn { width: 40px; height: 40px; border-radius: 14px; background: var(--primary); color: white; border: none; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        @media (max-width: 768px) { .app-container { flex-direction: column; padding: 10px; } .sidebar { width: 100%; } }
    </style>
</head>
<body>
    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <div class="app-container">
        <div class="sidebar">
            <div class="brand">
                <div class="brand-icon"><i class="fa-solid fa-robot"></i></div>
                <div class="brand-text"><h1>TUNCER AI</h1></div>
            </div>
            <div class="version-selector">
                <div class="active-bg" id="activeBg"></div>
                <button class="version-btn" onclick="switchVersion('2023')">v2023</button>
                <button class="version-btn active" onclick="switchVersion('2026')">v2026</button>
            </div>
            <div class="system-status">
                <div class="status-dot" id="statusDot"></div>
                <div class="status-text" id="engineStatus">Başlatılıyor...</div>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <div id="headerTitle">Tuncer Zeka 2026</div>
                <button onclick="chatBox.innerHTML=''" style="background:transparent; border:none; color:var(--text-muted); cursor:pointer;">Temizle</button>
            </div>
            <div class="messages-container" id="chatBox"></div>
            <div class="input-container">
                <div class="input-box">
                    <input type="text" id="userInput" placeholder="Mesajınızı yazın..." autocomplete="off">
                    <button class="send-btn" onclick="sendMessage()"><i class="fa-solid fa-arrow-up"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentVersion = '2026';
        let aiInstance = null;
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const statusDot = document.getElementById('statusDot');
        const engineStatus = document.getElementById('engineStatus');
        const activeBg = document.getElementById('activeBg');

        // URL yapısını GitHub Pages'e göre ayarlar
        const getFileUrl = (version) => {
            const path = window.location.pathname;
            const dir = path.substring(0, path.lastIndexOf('/') + 1);
            return `${dir}tuncer${version}.js?t=${Date.now()}`;
        };

        window.onload = () => {
            appendMessage("Sistem hazır. Tuncer Zeka 2026 motoru yükleniyor...", "ai");
            loadEngine('2026');
        };

        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        function switchVersion(v) {
            if (currentVersion === v) return;
            currentVersion = v;
            activeBg.style.transform = v === '2023' ? 'translateX(0)' : 'translateX(100%)';
            document.getElementById('headerTitle').innerText = `Tuncer Zeka ${v}`;
            loadEngine(v);
        }

        function loadEngine(v) {
            aiInstance = null;
            engineStatus.innerText = `v${v} yükleniyor...`;
            statusDot.style.background = "#eab308";

            const old = document.getElementById('engine-script');
            if (old) old.remove();

            const s = document.createElement('script');
            s.id = 'engine-script';
            s.src = getFileUrl(v);
            
            s.onload = () => {
                setTimeout(() => {
                    // Senin sınıf ismin
                    const Target = window.TuncerZeka || (typeof TuncerZeka !== 'undefined' ? TuncerZeka : null);
                    if (Target) {
                        try {
                            aiInstance = new Target();
                            engineStatus.innerText = `v${v} Aktif`;
                            statusDot.style.background = "#10b981";
                        } catch(e) { 
                            engineStatus.innerText = "Başlatma Hatası";
                        }
                    } else {
                        engineStatus.innerText = "Sınıf Bulunamadı";
                        statusDot.style.background = "#ef4444";
                    }
                }, 300);
            };
            
            s.onerror = () => {
                engineStatus.innerText = "Dosya Yok";
                statusDot.style.background = "#ef4444";
            };
            document.body.appendChild(s);
        }

        async function sendMessage() {
            const val = userInput.value.trim();
            if (!val) return;

            appendMessage(val, 'user');
            userInput.value = '';

            if (!aiInstance) {
                appendMessage("Motor hazır değil. Lütfen dosyanın yüklendiğinden emin olun.", "ai");
                return;
            }

            try {
                // Senin metodun: konus()
                const res = await aiInstance.konus(val);
                const final = (typeof res === 'object') ? res.cevap : res;
                appendMessage(final, 'ai');
            } catch(e) {
                appendMessage("Hata: " + e.message, 'ai');
            }
        }

        function appendMessage(txt, sender) {
            const d = document.createElement('div');
            d.className = `message ${sender}`;
            d.innerHTML = `<div class="message-bubble">${txt}</div>`;
            chatBox.appendChild(d);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
