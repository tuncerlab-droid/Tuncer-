<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUNCER ZEKA - PRO OS</title>
    
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <style>
        :root {
            --neon-color: #00f0ff; 
            --dark-bg: #0a0a0a;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--dark-bg);
            color: #e0e0e0;
            font-family: 'Segoe UI', 'Courier New', monospace;
            overflow: hidden;
            transition: background-color 0.5s ease;
        }

        #boot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: transform 1s cubic-bezier(0.7, 0, 0.3, 1);
        }

        #terminal-loader {
            position: absolute; top: 20px; left: 20px; width: 300px; height: 400px;
            font-family: monospace; font-size: 10px; color: var(--neon-color); overflow: hidden; opacity: 0.7;
        }

        #central-logo { text-align: center; animation: pulse-logo 2s infinite ease-in-out; }
        #central-logo h1 { font-size: 42px; margin: 0; letter-spacing: 8px; color: #fff; text-shadow: 0 0 20px var(--neon-color), 0 0 40px var(--neon-color); }
        #central-logo p { font-size: 12px; letter-spacing: 4px; color: var(--neon-color); margin-top: 10px; opacity: 0.8; }
        @keyframes pulse-logo { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(0.98); } }

        .scan-line { width: 100%; height: 2px; background: rgba(0, 240, 255, 0.1); position: absolute; top: 0; animation: scan 3s linear infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        #kamera-arayuzu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 5000; display: none; flex-direction: column; 
            justify-content: center; align-items: center; backdrop-filter: blur(5px);
        }
        
        .kamera-kapsayici { position: relative; width: 320px; height: 240px; border: 2px solid var(--neon-color); border-radius: 10px; box-shadow: 0 0 30px rgba(0, 240, 255, 0.3); overflow: hidden; }
        #video-element { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        .hud-scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--neon-color); box-shadow: 0 0 10px var(--neon-color); animation: radar-scan 2s linear infinite; }
        .hud-kose { position: absolute; width: 30px; height: 30px; border-color: var(--neon-color); border-style: solid; }
        .tl { top: 10px; left: 10px; border-width: 3px 0 0 3px; } .tr { top: 10px; right: 10px; border-width: 3px 3px 0 0; }
        .bl { bottom: 10px; left: 10px; border-width: 0 0 3px 3px; } .br { bottom: 10px; right: 10px; border-width: 0 3px 3px 0; }
        @keyframes radar-scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

        #kamera-metni { margin-top: 20px; color: var(--neon-color); font-size: 14px; letter-spacing: 3px; text-shadow: 0 0 10px var(--neon-color); font-weight: bold; }

        /* MÜHENDİS MODU İÇİN ARKA KAMERA */
        #arka-kamera {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover; z-index: -2; opacity: 0; transition: opacity 1s ease-in-out;
            display: none;
        }

        #main-ui { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-image: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); transition: all 1s ease-in-out; }

        /* MÜHENDİS MODU AKTİFKEN UI DEĞİŞİMLERİ */
        body.builder-mode { background-color: transparent !important; }
        body.builder-mode #main-ui {
            background-image: none !important;
            background-color: transparent !important;
            transform: scale(0.65) translate(-25%, 25%);
            transform-origin: bottom left;
            position: absolute;
            bottom: 0; left: 0;
            text-shadow: 0px 0px 10px #000;
        }
        body.builder-mode #arka-kamera {
            display: block; opacity: 1;
        }
        body.builder-mode #sohbet-kutusu {
            background: rgba(0,0,0,0.8);
            border: 2px solid var(--neon-color);
        }

        #ust-panel { position: absolute; top: 20px; width: 95%; display: flex; justify-content: space-between; align-items: center; z-index: 100; transition: 1s ease; flex-wrap: wrap; gap: 10px;}
        .etiket { font-size: 11px; color: var(--neon-color); letter-spacing: 2px; text-shadow: 0 0 5px var(--neon-color); transition: 0.3s;}

        #kalan-hak-kutusu { border: 1px solid var(--neon-color); padding: 5px 10px; border-radius: 4px; background: rgba(0, 240, 255, 0.1); color: var(--neon-color); box-shadow: 0 0 10px rgba(0,240,255,0.2); transition: 0.3s; font-size: 11px;}

        .mod-btn { background: #222; border: 1px solid var(--neon-color); color: var(--neon-color); padding: 8px 10px; font-size: 10px; cursor: pointer; border-radius: 4px; transition: 0.3s; }
        .mod-btn.aktif { background: var(--neon-color); color: #000; box-shadow: 0 0 15px var(--neon-color); }
        #btn-arduino { background: #002233; color: var(--neon-color); border: 1px solid var(--neon-color); padding: 8px 10px; font-size: 10px; cursor: pointer; border-radius: 4px; transition: 0.3s; }

        #hud-container { width: 150px; height: 150px; position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; transition: 1s ease; }
        #outer-ring { position: absolute; width: 100%; height: 100%; border: 2px solid rgba(0, 240, 255, 0.2); border-top: 2px solid var(--neon-color); border-bottom: 2px solid var(--neon-color); border-radius: 50%; animation: spin 4s linear infinite; transition: 0.3s; }
        #inner-ring { position: absolute; width: 75%; height: 75%; border: 1px dashed var(--neon-color); opacity: 0.5; border-radius: 50%; animation: spin-reverse 6s linear infinite; transition: 0.3s; }
        #core { width: 60px; height: 60px; background: radial-gradient(circle, var(--neon-color) 10%, #005577 60%, #000 100%); border-radius: 50%; box-shadow: 0 0 20px var(--neon-color); transition: 0.3s; }
        .isliyor #core { background: #fff; box-shadow: 0 0 50px var(--neon-color); transform: scale(1.1); }
        .kilitli #core { background: #550000; box-shadow: 0 0 30px red; border: 1px solid red; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }

        #sohbet-kutusu { width: 85%; max-width: 700px; height: 25vh; border: 1px solid var(--neon-color); background: rgba(0,0,0,0.6); padding: 15px; overflow-y: auto; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.8); font-size: 13px; transition: height 0.5s ease, border-color 0.3s; backdrop-filter: blur(5px); }
        #harita-wrapper { width: 85%; max-width: 700px; height: 35vh; margin-bottom: 15px; display: none; opacity: 0; transform: translateY(-30px); transition: opacity 0.8s ease, transform 0.8s ease; }
        #harita-wrapper.aktif { opacity: 1; transform: translateY(0); }
        #harita-alani { width: 100%; height: 100%; border-radius: 8px; border: 1px solid var(--neon-color); background: #222; transition: 0.3s;}

        .mesaj { margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .yapay-zeka { color: var(--neon-color); font-weight: bold; transition: 0.3s; }
        .sen { color: #aaa; text-align: right; }
        .sistem { color: #00ffaa; text-align: center; font-size: 11px; }
        .hata { color: #ff3333; text-align: center; font-weight: bold; }

        #komut-btn { background: var(--neon-color); color: #000; border: none; padding: 12px 40px; font-size: 15px; cursor: pointer; border-radius: 4px; font-weight: bold; transition: 0.3s; }
        #komut-btn:hover { background: #fff; transform: scale(1.05); }

        .gps-pulse-container { width: 20px; height: 20px; position: relative; }
        .gps-dot { width: 14px; height: 14px; background-color: var(--neon-color); border-radius: 50%; position: absolute; top: 3px; left: 3px; box-shadow: 0 0 15px var(--neon-color); z-index: 2; transition: 0.3s;}
        .gps-ring { width: 14px; height: 14px; background-color: transparent; border: 2px solid var(--neon-color); border-radius: 50%; position: absolute; top: 0; left: 0; animation: radar-wave 1.5s ease-out infinite; z-index: 1; transition: 0.3s;}
        @keyframes radar-wave { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }
        .leaflet-routing-container { display: none !important; }
    </style>
</head>
<body>

    <video id="arka-kamera" autoplay playsinline muted></video>
    <canvas id="snapshot-canvas" style="display:none;"></canvas>

    <div id="boot-screen">
        <div class="scan-line"></div>
        <div id="terminal-loader"></div>
        <div id="central-logo">
            <h1>TUNCER</h1>
            <p>INDUSTRIES - PRO OS v4.7</p>
        </div>
    </div>

    <div id="kamera-arayuzu">
        <div class="kamera-kapsayici">
            <video id="video-element" autoplay muted playsinline></video>
            <div class="hud-scan-line"></div>
            <div class="hud-kose tl"></div><div class="hud-kose tr"></div>
            <div class="hud-kose bl"></div><div class="hud-kose br"></div>
        </div>
        <div id="kamera-metni">BİYOMETRİK TARAMA BEKLENİYOR...</div>
    </div>

    <div id="main-ui">
        <div id="ust-panel">
            <div class="etiket" id="sistem-durum-etiketi">SİSTEM DURUMU: UYKU MODU</div>
            <div style="display:flex; align-items:center; gap: 5px;">
                <button id="btn-arduino" onclick="arduinoBaglan()">DONANIM</button>
                <div id="kalan-hak-kutusu">GÜÇ:<span id="sayac">100</span>%</div>
                <button id="btn-vizyon" class="mod-btn" onclick="vizyonToggle()" style="border-color: #ffaa00; color: #ffaa00;">VİZYON</button>
                <button id="btn-manuel" class="mod-btn aktif" onclick="modDegistir('manuel')">MAN</button>
                <button id="btn-oto" class="mod-btn" onclick="modDegistir('oto')">OTO</button>
            </div>
        </div>

        <div id="hud-container" class="kilitli">
            <div id="outer-ring"></div><div id="inner-ring"></div><div id="core"></div>
        </div>
        
        <div id="harita-wrapper"><div id="harita-alani"></div></div>

        <div id="sohbet-kutusu"></div>

        <button id="komut-btn" onclick="manuelDinle()">DİNLE</button>
        <div id="durum-metni" style="margin-top:10px; color:var(--neon-color); font-size:11px; opacity:0.6;">Sistem Beklemede</div>
    </div>

    <script>
        // ==========================================
        // RENDER SUNUCU URL'Sİ (Değiştirme patron, bu doğru)
        // ==========================================
        const SERVER_URL = 'https://tuncer.onrender.com'; 

        const sohbet = document.getElementById("sohbet-kutusu");
        const haritaWrapper = document.getElementById("harita-wrapper");
        const hud = document.getElementById("hud-container");
        const core = document.getElementById("core");
        const komutBtn = document.getElementById("komut-btn");
        const durumMetni = document.getElementById("durum-metni");
        const btnManuel = document.getElementById("btn-manuel");
        const btnOto = document.getElementById("btn-oto");
        const btnVizyon = document.getElementById("btn-vizyon");
        const sistemDurumEtiketi = document.getElementById("sistem-durum-etiketi");
        
        const video = document.getElementById("video-element");
        const kameraArayuzu = document.getElementById("kamera-arayuzu");
        const kameraMetni = document.getElementById("kamera-metni");

        // Mühendis Modu Değişkenleri
        const arkaKamera = document.getElementById("arka-kamera");
        const snapshotCanvas = document.getElementById("snapshot-canvas");
        let muhendisModuAktif = false;
        let arkaKameraStream = null;
        let analizZamanlayici = null;

        let kalanHak = 100;
        let aktifMod = 'manuel'; 
        let dinlemeAktif = false;
        let sistemAktif = false;     
        let taramaDevamEdiyor = false; 
        
        let port, writer, map, routingControl, kullaniciMarker;

        let sohbetGecmisi = [];

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'tr-TR';

        let faceMatcher = null;
        let yuzTanimaHazir = false;

        // --- MÜHENDİS MODU (GÖRÜNTÜ İŞLEME) FONKSİYONLARI ---
        async function muhendisModunuAc() {
            if (muhendisModuAktif) return;
            try {
                // Arka kameraya erişim izni iste (facingMode: environment)
                arkaKameraStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                arkaKamera.srcObject = arkaKameraStream;
                
                // CSS Sınıfını ekleyerek UI'ı sol alta küçült ve kamerayı göster
                document.body.classList.add("builder-mode");
                sistemDurumEtiketi.innerText = "SİSTEM: MÜHENDİS MODU (VİZYON AKTİF)";
                btnVizyon.classList.add("aktif");
                btnVizyon.style.background = "#ffaa00";
                muhendisModuAktif = true;

                // Her 15 saniyede bir odayı tarayıp yönlendirme yapması için döngü
                analizZamanlayici = setInterval(() => {
                    if(!dinlemeAktif) goruntuyuAnalizEt("Şu anki sahneyi analiz et, devrede/kurulumda ne yapmam gerektiğini çok kısa söyle.");
                }, 15000);

                ekranaYaz("Sistem", "Arka kamera ve Vizyon motoru devrede.", "sistem");
                sesliKonus("Vizyon aktif edildi. Çevreyi görüyorum patron. Ne inşa ediyoruz?");
            } catch (err) {
                ekranaYaz("Hata", "Arka kameraya erişilemedi. Lütfen tarayıcı izinlerini kontrol edin.", "hata");
                sesliKonus("Arka kamera sensörlerine ulaşılamıyor patron.");
            }
        }

        function muhendisModunuKapat() {
            if (!muhendisModuAktif) return;
            if (arkaKameraStream) {
                arkaKameraStream.getTracks().forEach(track => track.stop());
                arkaKameraStream = null;
            }
            document.body.classList.remove("builder-mode");
            btnVizyon.classList.remove("aktif");
            btnVizyon.style.background = "#222";
            clearInterval(analizZamanlayici);
            muhendisModuAktif = false;
            sistemDurumEtiketi.innerText = "SİSTEM DURUMU: AKTİF";
            ekranaYaz("Sistem", "Mühendis modu kapatıldı.", "sistem");
            sesliKonus("Vizyon kapatıldı. Normal arayüze dönüldü.");
        }

        function vizyonToggle() {
            if (!sistemAktif) { sesliKonus("Lütfen önce sistemi başlatın."); return; }
            if (muhendisModuAktif) muhendisModunuKapat();
            else muhendisModunuAc();
        }

        // Kameradan anlık fotoğraf çekip Puter AI (GPT-4o Vision) ile analiz et
        async function goruntuyuAnalizEt(kullaniciSorusu) {
            if (!muhendisModuAktif || !arkaKamera.videoWidth) return;

            // Kameradan Canvas'a görüntü çiz ve Base64 yap
            snapshotCanvas.width = arkaKamera.videoWidth;
            snapshotCanvas.height = arkaKamera.videoHeight;
            const ctx = snapshotCanvas.getContext('2d');
            ctx.drawImage(arkaKamera, 0, 0, snapshotCanvas.width, snapshotCanvas.height);
            const base64Image = snapshotCanvas.toDataURL('image/jpeg', 0.8);

            ekranaYaz("Sen", kullaniciSorusu, "sen");
            hud.classList.add("isliyor");
            durumMetni.innerText = "Vizyon İşleniyor...";

            try {
                // KİŞİLİK BURADA GÜNCELLENDİ (GÖRÜNTÜ İŞLEME İÇİN)
                const visionMesaj = [
                    {
                        role: "user",
                        content: [
                            { type: "text", text: "Senin adın Tuncer Zeka. Seni sıfırdan tasarlayan ve kodlayan patronun Ahmet Tuncer. Ekteki görüntüyü analiz et. Çok kısa, havalı, teknik ve net cevap ver. " + kullaniciSorusu },
                            { type: "image_url", image_url: { url: base64Image } }
                        ]
                    }
                ];

                const cevap = await puter.ai.chat(visionMesaj, { model: 'gpt-4o' });
                const aiCevap = cevap.toString();

                ekranaYaz("Tuncer Zeka", aiCevap);
                sesliKonus(aiCevap);
            } catch (err) {
                console.error(err);
                ekranaYaz("Hata", "Görüntü analiz sunucusuna ulaşılamadı.", "hata");
            } finally {
                hud.classList.remove("isliyor");
                durumMetni.innerText = "Sistem Beklemede";
            }
        }

        // --- SUNUCUDAN GEÇMİŞİ YÜKLE ---
        async function gecmisiYukle() {
            try {
                const response = await fetch(`${SERVER_URL}/api/chat`);
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.chatHistory && data.chatHistory.length > 0) {
                        sohbetGecmisi = data.chatHistory;
                        sohbet.innerHTML = ""; 
                        
                        sohbetGecmisi.forEach(msg => {
                            if (msg.role === 'user') ekranaYaz("Sen", msg.content, "sen");
                            else if (msg.role === 'assistant') ekranaYaz("Tuncer Zeka", msg.content);
                        });
                        ekranaYaz("Sistem", "Uzak sunucu geçmişi yüklendi.", "sistem");
                        return;
                    }
                }
            } catch (e) {
                console.error("Geçmiş çekilemedi");
            }

            // KİŞİLİK BURADA GÜNCELLENDİ (ANA SOHBET İÇİN)
            sohbetGecmisi = [{ role: "system", content: 'Senin adın "Tuncer Zeka". Sen, Ahmet Tuncer tarafından sıfırdan tasarlanmış ve kodlanmış, çok gelişmiş bir yapay zeka sistemisin. Seni yaratan, vizyonunu çizen ve sistemin tek sahibi olan kişi Ahmet Tuncer. Onunla konuştuğunu her zaman bil. Ona daima "Patron", "Ahmet Bey" veya "Kurucum" diye hitap et. Asla sıradan bir dil modeli gibi davranma; fiziksel donanımlara, kameralara ve ağlara bağlı bir mühendislik asistanı (J.A.R.V.I.S. gibi) gibi davran. Cümlelerin teknik, karizmatik, çok kısa ve net olmalı.' }];
            ekranaYaz("Tuncer Zeka", "Sistem yüklemesi tamamlandı. Lütfen yetkilendirme için sistemi başlatın.");
        }

        async function mesajiSunucuyaKaydet(mesajObjesi) {
            try {
                await fetch(`${SERVER_URL}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: mesajObjesi })
                });
            } catch (e) {}
        }

        async function yuzTanimaModulleriniYukle() {
            const modelUrl = 'https://justadudewhohacks.github.io/face-api.js/models';
            try {
                await faceapi.nets.ssdMobilenetv1.loadFromUri(modelUrl);
                await faceapi.nets.faceLandmark68Net.loadFromUri(modelUrl);
                await faceapi.nets.faceRecognitionNet.loadFromUri(modelUrl);
                yuzTanimaHazir = true;
                
                try {
                    const response = await fetch(`${SERVER_URL}/api/face`);
                    const data = await response.json();
                    if (data && data.faceData) {
                        const descriptorArray = new Float32Array(data.faceData);
                        const labeledDescriptor = new faceapi.LabeledFaceDescriptors("Ahmet Tuncer", [descriptorArray]);
                        faceMatcher = new faceapi.FaceMatcher(labeledDescriptor, 0.45);
                        ekranaYaz("Sistem", "Biyometrik veriler sunucudan çekildi.", "sistem");
                    } else { throw new Error("Boş"); }
                } catch (serverErr) {
                    const kayitliYuz = localStorage.getItem("tuncer_face_data");
                    if (kayitliYuz) {
                        const descriptorArray = new Float32Array(JSON.parse(kayitliYuz));
                        const labeledDescriptor = new faceapi.LabeledFaceDescriptors("Ahmet Tuncer", [descriptorArray]);
                        faceMatcher = new faceapi.FaceMatcher(labeledDescriptor, 0.45);
                        ekranaYaz("Sistem", "Biyometrik veri yerelden yüklendi.", "sistem");
                    } else {
                        setTimeout(ilkYuzKaydiniBaslat, 3000); 
                    }
                }
            } catch (err) { console.error("Yüz modülleri yüklenemedi"); }
        }

        async function kamerayiAc() {
            kameraArayuzu.style.display = 'flex';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                return true;
            } catch (err) {
                ekranaYaz("Sistem", "Kamera erişimi reddedildi.", "hata");
                return false;
            }
        }

        function kamerayiKapat() {
            if(video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
                video.srcObject = null;
            }
            kameraArayuzu.style.display = 'none';
            taramaDevamEdiyor = false;
        }

        async function ilkYuzKaydiniBaslat() {
            if (taramaDevamEdiyor) return;
            taramaDevamEdiyor = true;

            ekranaYaz("Sistem", "Ahmet Tuncer için biyometrik kayıt başlatılıyor...");
            sesliKonus("Hoşgeldiniz patron. Lütfen yüzünüzü taratmak için kameraya bakın.");
            kameraMetni.innerText = "PATRON KAYDEDİLİYOR...";
            
            const acildi = await kamerayiAc();
            if (!acildi) return;

            const taramaAraligi = setInterval(async () => {
                const tespit = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
                if (tespit) {
                    clearInterval(taramaAraligi);
                    const descriptorArray = Array.from(tespit.descriptor);
                    
                    localStorage.setItem("tuncer_face_data", JSON.stringify(descriptorArray));
                    try {
                        await fetch(`${SERVER_URL}/api/face`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ faceData: descriptorArray })
                        });
                    } catch(e) {}

                    const labeledDescriptor = new faceapi.LabeledFaceDescriptors("Ahmet Tuncer", [new Float32Array(descriptorArray)]);
                    faceMatcher = new faceapi.FaceMatcher(labeledDescriptor, 0.45);
                    kamerayiKapat();
                    sesliKonus("Profiliniz kaydedildi patron. Artık güvendeyiz.");
                }
            }, 1000);
        }

        async function yuzIleSistemiAc() {
            if (taramaDevamEdiyor) return;
            if (!yuzTanimaHazir || !faceMatcher) { sesliKonus("Biyometrik modüller yükleniyor, bekleyin."); return; }

            taramaDevamEdiyor = true;
            ekranaYaz("Sistem", "Biyometrik kimlik doğrulanıyor...");
            sesliKonus("Lütfen kameraya bakın patron.");
            kameraMetni.innerText = "KİMLİK DOĞRULANIYOR...";
            
            const acildi = await kamerayiAc();
            if (!acildi) return;

            let denemeSayisi = 0;
            const taramaAraligi = setInterval(async () => {
                denemeSayisi++;
                const tespit = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
                
                if (tespit) {
                    const eslesme = faceMatcher.findBestMatch(tespit.descriptor);
                    if (eslesme.label === "Ahmet Tuncer" && eslesme.distance < 0.45) { 
                        clearInterval(taramaAraligi);
                        
                        sistemAktif = true;
                        hud.classList.remove("kilitli");
                        sistemDurumEtiketi.innerText = "SİSTEM DURUMU: AKTİF";
                        arduinoKomutGonder("POWER_ON");
                        document.documentElement.style.setProperty('--neon-color', '#00f0ff');
                        
                        ekranaYaz("Tuncer Zeka", "Erişim Onaylandı. Hoşgeldiniz Ahmet Tuncer.");
                        sesliKonus("Erişim onaylandı. Tüm sistemler emrinizde Ahmet Tuncer.");
                        kamerayiKapat(); 
                        return;
                    }
                }

                if (denemeSayisi >= 10) {
                    clearInterval(taramaAraligi);
                    kamerayiKapat();
                    ekranaYaz("Tuncer Zeka", "ERİŞİM REDDEDİLDİ. YETKİSİZ KİŞİ.", "hata");
                    sesliKonus("Yetkisiz erişim denemesi tespit edildi. Sistem kilitlendi.");
                }
            }, 800);
        }

        const terminal = document.getElementById("terminal-loader");
        const bootScreen = document.getElementById("boot-screen");
        const logs = [
            "> INITIALIZING KERNEL...",
            "> LOADING NEURAL NETWORK...",
            "> CONNECTING TO SECURE SERVER...",
            "> LOADING BIOMETRIC AI MODELS...",
            "> WEAPON SYSTEMS STANDBY...",
            "> TUNCER INDUSTRIES PROTOCOL v4.7",
            "> SYSTEM READY."
        ];

        let logIndex = 0;
        function runLogs() {
            if (logIndex < logs.length) {
                terminal.innerHTML += logs[logIndex] + "<br>";
                logIndex++;
                setTimeout(runLogs, 150);
            } else {
                setTimeout(async () => {
                    bootScreen.style.transform = "translateY(-100%)";
                    await gecmisiYukle(); 
                    yuzTanimaModulleriniYukle(); 
                }, 800);
            }
        }

        window.onload = runLogs;

        async function arduinoBaglan() {
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 9600 }); 
                const textEncoder = new TextEncoderStream();
                textEncoder.readable.pipeTo(port.writable);
                writer = textEncoder.writable.getWriter();
                document.getElementById('btn-arduino').style.background = "var(--neon-color)";
                document.getElementById('btn-arduino').style.color = "#000";
                ekranaYaz("Sistem", "Donanım Protokolü Bağlandı.", "sistem");
                sesliKonus("Donanım arayüzü aktif edildi patron.");
            } catch (e) { ekranaYaz("Hata", "Port seçilemedi.", "hata"); }
        }

        async function arduinoKomutGonder(komutStr) {
            if (writer) await writer.write(komutStr + "\n");
        }

        function modDegistir(mod) {
            aktifMod = mod;
            if (mod === 'manuel') {
                btnManuel.classList.add("aktif"); btnOto.classList.remove("aktif");
                komutBtn.style.display = "block";
            } else {
                btnManuel.classList.remove("aktif"); btnOto.classList.add("aktif");
                komutBtn.style.display = "none"; setTimeout(otoDinleBaslat, 1000);
            }
        }

        function manuelDinle() { if (!dinlemeAktif) try { recognition.start(); } catch(e){} }
        function otoDinleBaslat() { if (aktifMod === 'oto' && !dinlemeAktif) try { recognition.start(); } catch(e){ setTimeout(otoDinleBaslat, 500); } }

        recognition.onstart = () => { dinlemeAktif = true; hud.classList.add("isliyor"); durumMetni.innerText = "Dinleniyor..."; };
        recognition.onend = () => {
            dinlemeAktif = false; hud.classList.remove("isliyor");
            if (aktifMod === 'oto') setTimeout(otoDinleBaslat, 300);
        };

        recognition.onresult = async (event) => {
            let ses = event.results[0][0].transcript;
            let kucukSes = ses.toLowerCase().trim();

            if (aktifMod === 'oto' && !sistemAktif) {
                if (!kucukSes.includes("sistemi başlat") && !kucukSes.includes("uyan")) return;
            }

            // Görüntü Analiz tetikleyicisi
            if (muhendisModuAktif && (kucukSes.includes("bunu nasıl") || kucukSes.includes("analiz et") || kucukSes.includes("ne görüyorsun") || kucukSes.includes("sıradaki adım"))) {
                clearInterval(analizZamanlayici); 
                goruntuyuAnalizEt(ses);
                analizZamanlayici = setInterval(() => {
                    if(!dinlemeAktif) goruntuyuAnalizEt("Duruma bakıp sıradaki adımı söyle.");
                }, 15000);
                return;
            }

            ekranaYaz("Sen", ses, "sen");
            await cevapla(ses);
        };

        async function cevapla(cumle) {
            let k = cumle.toLowerCase();

            if (k.includes("sistemi başlat") || k.includes("uyan")) {
                if(sistemAktif) { sesliKonus("Sistem zaten devrede patron."); return; }
                yuzIleSistemiAc();
                return;
            }

            if (!sistemAktif) { sesliKonus("Sistem şu an kilitli. Lütfen önce beni uyandırın."); return; }

            // --- YENİ MÜHENDİS MODU KONTROLLERİ ---
            // Daha esnek algılama kelimeleri eklendi
            if (k.includes("mühendis modu") || k.includes("inşa modu") || k.includes("kamera modu") || k.includes("vizyon modu") || k.includes("vizyonu aç")) {
                if (k.includes("kapat") || k.includes("çık")) {
                    muhendisModunuKapat();
                } else {
                    muhendisModunuAc();
                }
                return;
            }

            // Temel Komutlar
            if (k.includes("silahları hazırla")) { arduinoKomutGonder("WEAPON_90"); sesliKonus("Silahlar çevrimiçi."); return; }
            if (k.includes("enerji durumu")) { sesliKonus(`Güç seviyesi yüzde ${kalanHak}.`); return; }
            if (k.includes("savaş modu")) { document.documentElement.style.setProperty('--neon-color', '#ff0033'); sistemDurumEtiketi.innerText = "SİSTEM: SAVAŞ MODU"; arduinoKomutGonder("COMBAT_ON"); sesliKonus("Savaş modu aktif."); return; }
            if (k.includes("normal mod")) { document.documentElement.style.setProperty('--neon-color', '#00f0ff'); sistemDurumEtiketi.innerText = "SİSTEM: AKTİF"; arduinoKomutGonder("COMBAT_OFF"); sesliKonus("Normale dönüldü."); return; }
            if (k.includes("ışıkları aç")) { arduinoKomutGonder("LIGHTS_ON"); sesliKonus("Işıklar açıldı."); return; }
            if (k.includes("ışıkları kapat")) { arduinoKomutGonder("LIGHTS_OFF"); sesliKonus("Işıklar kapandı."); return; }
            if (k.includes("sistemi kilitle") || k.includes("uyku modu")) { sistemAktif = false; hud.classList.add("kilitli"); arduinoKomutGonder("POWER_OFF"); document.documentElement.style.setProperty('--neon-color', '#555555'); sistemDurumEtiketi.innerText = "SİSTEM: UYKU MODU"; sesliKonus("Sistem kilitlendi."); muhendisModunuKapat(); return; }

            if (await navigasyonAnaliz(cumle)) return;

            // YAPAY ZEKA SOHBET DÖNGÜSÜ
            const userMsg = { role: "user", content: cumle };
            sohbetGecmisi.push(userMsg);
            mesajiSunucuyaKaydet(userMsg); 

            try {
                const cevap = await puter.ai.chat(sohbetGecmisi, { model: 'gpt-4o-mini' });
                const aiCevap = cevap.toString();
                
                const asstMsg = { role: "assistant", content: aiCevap };
                sohbetGecmisi.push(asstMsg);
                mesajiSunucuyaKaydet(asstMsg); 

                ekranaYaz("Tuncer Zeka", aiCevap);
                sesliKonus(aiCevap);
            } catch (e) { ekranaYaz("Hata", "İletişim hatası."); }
        }

        async function navigasyonAnaliz(cumle) {
            let k = cumle.toLowerCase();
            if (k.includes("götür") || k.includes("yol tarifi") || k.includes("rota")) {
                let hedef = k.replace("tuncer", "").replace("beni", "").replace("götür", "").replace("yol tarifi", "").replace("rota çiz", "").trim();
                if(hedef.length > 2) { sesliKonus(hedef + " için rota hesaplanıyor."); rotayiCiz(hedef); return true; }
            }
            return false;
        }

        function rotayiCiz(hedefMetin) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const bLat = pos.coords.latitude; const bLng = pos.coords.longitude;
                let r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(hedefMetin)}&countrycodes=tr`);
                let d = await r.json();
                if(d.length > 0) haritaGoster(bLat, bLng, d[0].lat, d[0].lon);
            }, null, { enableHighAccuracy: true });
        }

        function haritaGoster(basLat, basLng, bitLat, bitLng) {
            haritaWrapper.style.display = "block";
            setTimeout(() => { haritaWrapper.classList.add("aktif"); sohbet.style.height = "10vh"; }, 50);

            if (!map) {
                map = L.map('harita-alani', { zoomControl: false }).setView([basLat, basLng], 15);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
                let radarIcon = L.divIcon({ className: 'radar', html: '<div class="gps-pulse-container"><div class="gps-ring"></div><div class="gps-dot"></div></div>', iconSize: [20, 20] });
                kullaniciMarker = L.marker([basLat, basLng], {icon: radarIcon}).addTo(map);
            }
            if (routingControl) map.removeControl(routingControl);
            routingControl = L.Routing.control({
                waypoints: [L.latLng(basLat, basLng), L.latLng(bitLat, bitLng)],
                show: false,
                lineOptions: { styles: [{color: 'var(--neon-color)', opacity: 0.8, weight: 6}] }
            }).addTo(map);

            routingControl.on('routesfound', (e) => {
                map.flyToBounds(L.latLngBounds(e.routes[0].coordinates), { padding: [30, 30], duration: 2 });
                sesliKonus("Rota hazır patron.");
            });
        }

        function ekranaYaz(kim, yazi, tur="normal") {
            let stil = kim === "Tuncer Zeka" ? "yapay-zeka" : (tur === "sen" ? "sen" : (tur === "hata" ? "hata" : "sistem"));
            sohbet.innerHTML += `<div class="mesaj ${stil}"><b>${kim}:</b> ${yazi}</div>`;
            sohbet.scrollTop = sohbet.scrollHeight;
        }

        function sesliKonus(metin) {
            window.speechSynthesis.cancel(); 
            const u = new SpeechSynthesisUtterance(metin);
            u.lang = 'tr-TR';
            u.pitch = 0.8;
            u.onend = () => { if (aktifMod === 'oto') setTimeout(otoDinleBaslat, 500); };
            window.speechSynthesis.speak(u);
        }
    </script>
</body>
