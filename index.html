<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNCER HOLO AR v3.6</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.7.0/build/index.module.js",
                "three-bvh-csg": "https://unpkg.com/three-bvh-csg@0.0.16/build/index.module.js"
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Share Tech Mono', monospace;
        }

        /* Giriş Paneli */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #000; z-index: 2000;
        }

        /* AR ARAYÜZÜ - KRİTİK KATMAN */
        #ui-overlay {
            position: absolute; /* Fixed yerine absolute bazen WebXR'da daha iyi sonuç verir */
            top: 0; left: 0; width: 100%; height: 100%;
            display: none; /* Oturum açılınca JS ile açılacak */
            flex-direction: column; justify-content: space-between;
            padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom) 15px;
            box-sizing: border-box;
            pointer-events: none; /* Arka plana tıklamayı engelleme */
            z-index: 99999; /* En üstte olmasını garantile */
        }

        .interactive {
            pointer-events: auto !important; /* Butonlara basılmasını sağla */
        }

        .hud-panel {
            background: rgba(0, 20, 25, 0.85);
            border: 1px solid #0ff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            border-radius: 6px;
        }

        .btn-holo {
            background: rgba(0, 255, 255, 0.15);
            border: 1px solid #0ff;
            color: #0ff;
            font-size: 12px;
            font-weight: bold;
            padding: 12px 5px;
            cursor: pointer;
            text-align: center;
        }

        .btn-holo:active {
            background: rgba(0, 255, 255, 0.5);
            color: #000;
        }

        /* WebXR Varsayılan Butonunu Özelleştirme Denemesi */
        #ARButton {
            background: #002222 !important;
            border: 1px solid #0ff !important;
            color: #0ff !important;
            font-family: 'Share Tech Mono' !important;
            border-radius: 4px !important;
            bottom: 30% !important;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="start-screen">
        <div class="border border-cyan-500 p-8 text-center bg-black/50">
            <h1 class="text-2xl text-cyan-400 font-bold mb-2">TUNCER HOLO v3.6</h1>
            <p class="text-cyan-800 text-[10px] mb-6 tracking-widest">AR INTERFACE SYSTEM</p>
        </div>
    </div>

    <!-- Bu div WebXR dom-overlay olarak atanacak -->
    <div id="ui-overlay">
        <!-- Üst HUD -->
        <div class="flex justify-between w-full mt-4 interactive">
            <div class="hud-panel p-2 w-48">
                <div id="sys-status" class="text-yellow-500 text-[10px] animate-pulse">SİSTEM BAŞLATILIYOR...</div>
                <div id="hand-status" class="text-cyan-700 text-[9px] mt-1 italic">EL VERİSİ YOK</div>
            </div>
            <div class="hud-panel px-3 py-1 flex items-center">
                <span class="text-green-500 text-[10px] font-bold">ONLINE</span>
            </div>
        </div>

        <!-- Alt Kontroller -->
        <div class="w-full mb-8 flex flex-col gap-3">
            <div class="flex gap-2 items-end h-32">
                <div class="hud-panel p-2 flex-grow overflow-hidden flex flex-col justify-end text-[8px] opacity-70" id="log-console">
                    <div class="text-cyan-800">> Sistem hazir.</div>
                </div>
                
                <div class="grid grid-cols-2 gap-2 w-48 interactive">
                    <button id="btn-cube" class="btn-holo">KÜP</button>
                    <button id="btn-hole" class="btn-holo border-red-500 text-red-500">DELİK</button>
                    <button id="btn-merge" class="btn-holo border-yellow-500 text-yellow-500">BİRLEŞTİR</button>
                    <button id="btn-delete" class="btn-holo border-white text-white">SİL</button>
                </div>
            </div>
        </div>
    </div>

<script type="module">
import * as THREE from 'three';
import { ARButton } from 'three/addons/webxr/ARButton.js';
import { XRHandModelFactory } from 'three/addons/webxr/XRHandModelFactory.js';
import { SUBTRACTION, Brush, Evaluator } from 'three-bvh-csg';

let scene, camera, renderer, reticle;
let hitTestSource = null, hitTestSourceRequested = false;
let objects = [], holeObjects = [];
let hand0, handModel0, selectedObject = null, isGrabbing = false;

const logConsole = document.getElementById('log-console');
const sysStatus = document.getElementById('sys-status');
const handStatus = document.getElementById('hand-status');
const uiOverlay = document.getElementById('ui-overlay');
const startScreen = document.getElementById('start-screen');

function log(msg, isErr = false) {
    const d = document.createElement('div');
    d.textContent = `> ${msg}`;
    d.className = isErr ? 'text-red-500' : 'text-cyan-400';
    logConsole.appendChild(d);
    if(logConsole.childNodes.length > 6) logConsole.removeChild(logConsole.firstChild);
}

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, stencil: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1.0));
    const light = new THREE.DirectionalLight(0xffffff, 1.2);
    light.position.set(0, 10, 5);
    scene.add(light);

    // KRİTİK: AR BUTONUNU DOM OVERLAY İLE BAĞLA
    const arButton = ARButton.createButton(renderer, {
        requiredFeatures: ['hit-test'],
        optionalFeatures: ['dom-overlay', 'hand-tracking'],
        domOverlay: { root: uiOverlay } // Overlay'i buraya bağlıyoruz
    });
    document.body.appendChild(arButton);

    // El Takibi Kurulumu
    const handModelFactory = new XRHandModelFactory();
    hand0 = renderer.xr.getHand(0);
    handModel0 = handModelFactory.createHandModel(hand0, "spheres");
    hand0.add(handModel0);
    scene.add(hand0);

    hand0.addEventListener('pinchstart', () => { isGrabbing = true; findTarget(); });
    hand0.addEventListener('pinchend', () => { 
        isGrabbing = false; 
        if(selectedObject) {
            selectedObject.material.emissive.setHex(0x000000);
            selectedObject = null;
        }
    });

    // Zemin İşaretçisi
    reticle = new THREE.Mesh(
        new THREE.RingGeometry(0.04, 0.05, 32).rotateX(-Math.PI/2),
        new THREE.MeshBasicMaterial({ color: 0x00ffff })
    );
    reticle.matrixAutoUpdate = false;
    reticle.visible = false;
    scene.add(reticle);

    renderer.xr.addEventListener('sessionstart', () => {
        startScreen.style.display = 'none';
        uiOverlay.style.display = 'flex'; // Overlay'i görünür yap
        log("Holografik Sistem Aktif.");
    });

    renderer.xr.addEventListener('sessionend', () => {
        startScreen.style.display = 'flex';
        uiOverlay.style.display = 'none';
        window.location.reload(); // Temiz bir başlangıç için
    });

    renderer.setAnimationLoop(render);
}

function findTarget() {
    const tip = hand0.joints['index-finger-tip'];
    if (!tip) return;
    const pos = new THREE.Vector3().setFromMatrixPosition(tip.matrixWorld);
    
    let closest = null;
    let minD = 0.20;
    [...objects, ...holeObjects].forEach(obj => {
        const d = obj.position.distanceTo(pos);
        if (d < minD) { minD = d; closest = obj; }
    });
    
    if (closest) {
        selectedObject = closest;
        selectedObject.material.emissive.setHex(0x003333);
        log("Nesne Yakalandı.");
    }
}

function addObject(isHole = false) {
    if (!reticle.visible) return log("Zemin Bulunamadı!", true);
    
    const geo = new THREE.BoxGeometry(0.1, 0.1, 0.1);
    const mat = new THREE.MeshStandardMaterial({
        color: isHole ? 0xff4444 : 0x00ccff,
        transparent: true,
        opacity: isHole ? 0.6 : 1.0,
        emissive: 0x000000
    });
    
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.setFromMatrixPosition(reticle.matrix);
    mesh.quaternion.setFromRotationMatrix(reticle.matrix);
    mesh.translateY(0.05);
    scene.add(mesh);
    
    if (isHole) holeObjects.push(mesh); else objects.push(mesh);
    log(isHole ? "Negatif Alan Eklendi." : "Pozitif Blok Eklendi.");
}

function mergeAction() {
    if (objects.length < 1 || holeObjects.length < 1) return log("Eksik Nesne!", true);
    
    try {
        const evaluator = new Evaluator();
        let base = objects[0];
        let baseBrush = new Brush(base.geometry, base.material);
        baseBrush.position.copy(base.position);
        baseBrush.quaternion.copy(base.quaternion);
        baseBrush.updateMatrixWorld();

        holeObjects.forEach(h => {
            const hBrush = new Brush(h.geometry, h.material);
            hBrush.position.copy(h.position);
            hBrush.quaternion.copy(h.quaternion);
            hBrush.updateMatrixWorld();
            baseBrush = evaluator.evaluate(baseBrush, hBrush, SUBTRACTION);
            scene.remove(h);
        });

        scene.remove(base);
        const result = new THREE.Mesh(baseBrush.geometry, baseBrush.material);
        result.position.copy(base.position);
        result.quaternion.copy(base.quaternion);
        scene.add(result);
        
        objects = [result];
        holeObjects = [];
        log("Merge Islemi Tamamlandi.");
    } catch (e) { log("Islem Hatasi!", true); }
}

function render(time, frame) {
    if (frame) {
        const ref = renderer.xr.getReferenceSpace();
        const session = renderer.xr.getSession();

        if (!hitTestSourceRequested) {
            session.requestReferenceSpace('viewer').then(s => {
                session.requestHitTestSource({ space: s }).then(src => hitTestSource = src);
            });
            hitTestSourceRequested = true;
        }

        if (hitTestSource) {
            const results = frame.getHitTestResults(hitTestSource);
            if (results.length) {
                const pose = results[0].getPose(ref);
                reticle.visible = true;
                reticle.matrix.fromArray(pose.transform.matrix);
                sysStatus.textContent = "ZEMIN KILITLENDI";
                sysStatus.className = "text-green-500 text-[10px]";
            } else {
                reticle.visible = false;
                sysStatus.textContent = "ZEMIN ARANIYOR...";
                sysStatus.className = "text-yellow-500 text-[10px]";
            }
        }

        // El durumu güncelleme
        let elVar = false;
        for (const input of session.inputSources) { if (input.hand) elVar = true; }
        handStatus.textContent = elVar ? "EL TAKIBI: AKTIF" : "EL VERISI YOK";
        handStatus.className = elVar ? "text-cyan-400 text-[9px] mt-1" : "text-gray-600 text-[9px] mt-1";

        if (isGrabbing && selectedObject) {
            const tip = hand0.joints['index-finger-tip'];
            if (tip) {
                const p = new THREE.Vector3().setFromMatrixPosition(tip.matrixWorld);
                selectedObject.position.lerp(p, 0.15);
            }
        }
    }
    renderer.render(scene, camera);
}

// Buton Atamaları
window.onload = init;

document.getElementById('btn-cube').onclick = (e) => { e.stopPropagation(); addObject(false); };
document.getElementById('btn-hole').onclick = (e) => { e.stopPropagation(); addObject(true); };
document.getElementById('btn-merge').onclick = (e) => { e.stopPropagation(); mergeAction(); };
document.getElementById('btn-delete').onclick = (e) => {
    e.stopPropagation();
    const all = [...objects, ...holeObjects];
    if (all.length) {
        const t = all.pop();
        scene.remove(t);
        objects = objects.filter(o => o !== t);
        holeObjects = holeObjects.filter(o => o !== t);
        log("Nesne Silindi.");
    }
};
</script>
</body>
</html>
