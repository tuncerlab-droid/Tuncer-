<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUNCER CORE v10.0 | TOTAL ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500;700&display=swap');

        :root {
            --glow-cyan: #0891b2;
            --glow-orange: #f59e0b;
            --hud-bg: rgba(2, 6, 23, 0.9);
        }

        body {
            background-color: #000;
            color: var(--glow-cyan);
            font-family: 'JetBrains+Mono', monospace;
            overflow: hidden;
            margin: 0;
            height: 100vh;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }

        /* HUD Vision Layers */
        #video-layer {
            position: fixed; inset: 0; z-index: -2; object-fit: cover;
            opacity: 0; transition: opacity 1s ease; transform: scaleX(-1);
            filter: brightness(0.6) contrast(1.4) saturate(0.2) sepia(0.2) hue-rotate(180deg);
        }

        .hud-overlay {
            position: fixed; inset: 0; z-index: -1; pointer-events: none;
            border: 20px solid rgba(8, 145, 178, 0.05);
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8) 100%);
            display: none;
        }

        .scan-line {
            position: absolute; width: 100%; height: 2px;
            background: rgba(8, 145, 178, 0.3); opacity: 0.5;
            animation: scan 4s infinite linear;
            box-shadow: 0 0 15px var(--glow-cyan);
        }

        @keyframes scan { from { top: -5%; } to { top: 105%; } }

        /* Components */
        .glass-panel {
            background: var(--hud-bg); backdrop-filter: blur(12px);
            border: 1px solid rgba(8, 145, 178, 0.2);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .arc-reactor {
            position: relative; width: 100px; height: 100px; border-radius: 50%;
            border: 4px solid var(--glow-cyan); display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(8, 145, 178, 0.4);
        }

        .arc-reactor.listening { border-color: #fff; box-shadow: 0 0 40px #fff; }
        .arc-reactor.processing { border-color: var(--glow-orange); box-shadow: 0 0 40px var(--glow-orange); animation: pulse 1s infinite; }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        #map-container {
            height: 200px; width: 100%; display: none; border: 1px solid var(--glow-cyan);
            margin-bottom: 1rem; border-radius: 8px; filter: invert(1) hue-rotate(180deg) brightness(0.8);
        }

        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--glow-cyan); }
        
        .status-tag { font-size: 9px; padding: 2px 6px; border-radius: 4px; border: 1px solid currentColor; text-transform: uppercase; }
    </style>
</head>
<body class="flex flex-col p-4">

    <!-- VISION LAYER -->
    <video id="video-layer" autoplay playsinline muted></video>
    <div id="hud-frame" class="hud-overlay">
        <div class="scan-line"></div>
        <!-- HUD Corners -->
        <div class="absolute top-4 left-4 w-10 h-10 border-t-2 border-l-2 border-cyan-500/50"></div>
        <div class="absolute top-4 right-4 w-10 h-10 border-t-2 border-r-2 border-cyan-500/50"></div>
        <div class="absolute bottom-4 left-4 w-10 h-10 border-b-2 border-l-2 border-cyan-500/50"></div>
        <div class="absolute bottom-4 right-4 w-10 h-10 border-b-2 border-r-2 border-cyan-500/50"></div>
    </div>

    <!-- UI HEADER -->
    <header class="flex justify-between items-start glass-panel p-4 rounded-xl mb-4 border-l-4 border-l-orange-500">
        <div>
            <h1 class="orbitron text-2xl font-bold text-white tracking-tighter">TUNCER_CORE <span class="text-orange-500 text-sm">v10.0</span></h1>
            <div class="flex gap-2 mt-2">
                <span id="auth-tag" class="status-tag text-cyan-500 border-cyan-900 bg-cyan-950/20">USER: AHMET_TUNCER</span>
                <span id="hw-tag" class="status-tag text-gray-500 border-gray-800 bg-gray-900">HW: DISCONNECTED</span>
            </div>
        </div>
        <div class="text-right flex flex-col items-end gap-1">
            <div id="status-display" class="orbitron text-[11px] text-red-500 bg-red-950/30 px-3 py-1 rounded border border-red-900/50 uppercase font-bold">Offline_Sleep</div>
            <div class="text-[8px] text-cyan-400 opacity-60">MODE: PURE_LOGIC</div>
        </div>
    </header>

    <!-- INTERACTIVE MAP -->
    <div id="map-container"></div>

    <!-- MAIN CONSOLE -->
    <main id="chat-stream" class="flex-1 overflow-y-auto custom-scroll space-y-4 mb-4 pr-2">
        <div class="text-center opacity-30 text-[10px] uppercase tracking-[0.3em] my-10">
            [Sistem Tam Kapasite Hazır] <br> "Uyan" Komutu Bekleniyor
        </div>
    </main>

    <!-- RIGHT HUD (SIDEBAR) -->
    <aside id="eng-hud" class="hidden fixed right-6 top-40 w-44 space-y-4 pointer-events-none">
        <div class="glass-panel p-3 rounded text-[9px] space-y-2 border-r-4 border-r-orange-500">
            <div class="text-orange-500 font-bold border-b border-orange-900 pb-1 mb-1">LOCAL_ALU_METRICS</div>
            <div class="flex justify-between"><span>CPU_LATENCY</span><span class="text-white">0.02ms</span></div>
            <div class="flex justify-between"><span>MATH_MODULE</span><span class="text-green-400">READY</span></div>
            <div class="flex justify-between"><span>GEO_PARSER</span><span class="text-green-400">READY</span></div>
            <div class="flex justify-between"><span>HW_LINK</span><span id="hw-status" class="text-red-500">OFF</span></div>
        </div>
    </aside>

    <!-- CONTROLS -->
    <footer class="flex flex-col items-center gap-4">
        <div class="flex gap-3">
            <button onclick="connectSerial()" class="text-[10px] border border-cyan-800 px-5 py-2 rounded-lg uppercase hover:bg-cyan-900/60 transition-all font-bold">Donanım Bağla</button>
            <button onclick="toggleVision()" class="text-[10px] border border-orange-800 px-5 py-2 rounded-lg uppercase text-orange-400 hover:bg-orange-900/60 transition-all font-bold">Vizyon Katmanı</button>
            <button onclick="forceWake()" class="text-[10px] border border-red-800 px-5 py-2 rounded-lg uppercase text-red-500 hover:bg-red-900/60 transition-all font-bold">Manuel Başlat</button>
        </div>

        <div id="reactor" onclick="toggleListening()" class="arc-reactor">
            <div class="w-14 h-14 rounded-full bg-cyan-950 flex items-center justify-center border border-cyan-500/50">
                <div class="w-6 h-6 rounded-full bg-cyan-400 shadow-[0_0_20px_#0891b2]"></div>
            </div>
        </div>
        <div class="text-[9px] opacity-30 tracking-[0.5em] uppercase font-bold text-cyan-300">Aural Core Sensor</div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        // Firebase Fallback
        try {
            const firebaseConfig = JSON.parse(__firebase_config);
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            signInAnonymously(auth);
        } catch(e) { console.log("Local Mode: Firebase skipped."); }

        window.isSystemActive = false;
        let serialWriter = null;
        let map = null;

        // --- LOCAL COGNITIVE BRAIN (OFFLINE) ---
        const LocalBrain = {
            responses: {
                "merhaba": "Selamlar Ahmet Bey. Yerel çekirdek stabil ve emrinizde.",
                "nasılsın": "Çevrimdışı modda %100 performansla çalışıyorum patron. Tüm birimler stabil.",
                "kimsin": "Ben Tuncer Core v10.0. Sizin için özel olarak kodlanmış, bulutsuz çalışan yerel bir zekayım.",
                "saat": () => `Yerel zaman kaydı: ${new Date().toLocaleTimeString('tr-TR')}`,
                "durum": "ALU aktif, HW link hazır, Vizyon beklemede.",
                "kapat": "Sistemler uyku moduna alınıyor. İyi günler patron."
            },
            think: function(input) {
                const text = input.toLowerCase();
                
                // 1. Math Local Processing
                const mathResult = this.calc(text);
                if(mathResult) return { type: 'math', msg: `İşlem Çözümlendi: ${mathResult}` };

                // 2. Pattern Matching
                for(let key in this.responses) {
                    if(text.includes(key)) {
                        const r = this.responses[key];
                        return { type: 'neural', msg: typeof r === 'function' ? r() : r };
                    }
                }
                
                return { type: 'neural', msg: "Bu komut yerel kütüphanemde tanımlı değil ancak mantık devrem analiz ediyor." };
            },
            calc: function(text) {
                const clean = text.replace(/artı/g, '+').replace(/eksi/g, '-').replace(/çarpı/g, '*').replace(/bölü/g, '/').replace(/,/g, '.');
                const match = clean.match(/(\d+\.?\d*)\s*([\+\-\*\/])\s*(\d+\.?\d*)/);
                if(match) {
                    try { return eval(match[0]); } catch(e) { return null; }
                }
                return null;
            }
        };

        // --- CORE FUNCTIONS ---
        window.forceWake = () => {
            window.isSystemActive = true;
            const sd = document.getElementById('status-display');
            sd.innerText = "Active_Core";
            sd.className = "orbitron text-[11px] text-green-400 bg-green-950/30 px-3 py-1 rounded border border-green-500 uppercase font-bold";
            updateLog("Sistem manuel olarak uyandırıldı. Çekirdek birimler aktif.", "system");
            speak("Sistem aktif. Hoş geldiniz patron.");
        };

        window.updateLog = (msg, role = 'core', type = 'neural') => {
            const stream = document.getElementById('chat-stream');
            const entry = document.createElement('div');
            entry.className = role === 'user' ? "flex flex-col items-end mb-4" : "flex flex-col items-start mb-4";
            
            const badgeColor = type === 'math' ? 'text-green-400' : type === 'hw' ? 'text-yellow-400' : 'text-cyan-400';
            const badgeText = type === 'math' ? '[LOCAL_ALU]' : type === 'hw' ? '[HW_SIGNAL]' : '[NEURAL_CORE]';
            
            entry.innerHTML = `
                <span class="text-[8px] opacity-40 mb-1 uppercase tracking-widest">${role === 'user' ? 'Patron' : 'Tuncer_Core'}</span>
                <div class="glass-panel px-4 py-2 rounded-lg text-sm border-l-2 ${role==='user'?'border-orange-500 text-white':'border-cyan-500 text-cyan-100'}">
                    ${role !== 'user' ? `<div class="text-[9px] font-bold ${badgeColor} mb-1">${badgeText}</div>` : ''}
                    ${msg}
                </div>`;
            stream.appendChild(entry);
            stream.scrollTop = stream.scrollHeight;
        };

        window.speak = (text) => {
            window.speechSynthesis.cancel();
            const s = new SpeechSynthesisUtterance(text);
            s.lang = 'tr-TR'; s.pitch = 0.8; s.rate = 1.05;
            window.speechSynthesis.speak(s);
        };

        window.processCommand = async (input) => {
            if(!input) return;
            updateLog(input, 'user');
            
            const raw = input.toLowerCase();

            // Uyanma Kontrolü
            if(raw.includes("uyan") || raw.includes("başlat")) {
                forceWake(); return;
            }

            if(!window.isSystemActive) {
                speak("Sistem kilitli. Lütfen uyan komutu verin."); return;
            }

            // Kapatma
            if(raw.includes("kapat") || raw.includes("uyu")) {
                window.isSystemActive = false;
                const sd = document.getElementById('status-display');
                sd.innerText = "Offline_Sleep";
                sd.className = "orbitron text-[11px] text-red-500 bg-red-950/30 px-3 py-1 rounded border border-red-900/50 uppercase font-bold";
                updateLog("Sistem uyku moduna geçiyor.", "system");
                speak("Görüşmek üzere patron."); return;
            }

            // Donanım Komutları
            if(raw.includes("ışık") || raw.includes("lazer")) {
                if(raw.includes("aç")) { executeHardware("LED_ON"); updateLog("Işıklar açıldı.", "core", "hw"); speak("Donanım sinyali gönderildi."); return; }
                if(raw.includes("kapat")) { executeHardware("LED_OFF"); updateLog("Işıklar kapatıldı.", "core", "hw"); speak("Işıklar devredışı."); return; }
            }

            // Harita / Lokasyon
            if(raw.includes("harita") || raw.includes("nerede") || raw.includes("konum")) {
                const target = raw.replace(/harita|nerede|konum|aç|çiz|bul/g, "").trim();
                if(target.length > 2) {
                    updateLog(`${target} aranıyor...`, "system");
                    const found = await executeNav(target);
                    if(found) { updateLog(`${target} koordinatları yansıtıldı.`, "core", "neural"); speak("Konum bulundu."); }
                    else { updateLog("Lokasyon yerel bellekte bulunamadı.", "core", "neural"); speak("Lokasyon tespiti başarısız."); }
                    return;
                }
            }

            // Vizyon
            if(raw.includes("vizyon")) { toggleVision(); return; }

            // Bilişsel İşlem
            const result = LocalBrain.think(raw);
            updateLog(result.msg, 'core', result.type);
            speak(result.msg);
        };

        // --- HARDWARE ---
        window.connectSerial = async () => {
            try {
                const port = await navigator.serial.requestPort();
                await port.open({ baudRate: 9600 });
                const encoder = new TextEncoderStream();
                encoder.readable.pipeTo(port.writable);
                serialWriter = encoder.writable.getWriter();
                
                document.getElementById('hw-tag').innerText = "HW: CONNECTED";
                document.getElementById('hw-tag').className = "status-tag text-green-400 border-green-900 bg-green-950/20";
                document.getElementById('hw-status').innerText = "ON";
                document.getElementById('hw-status').className = "text-green-400";
                updateLog("Donanım (Seri Port) bağlantısı kuruldu.", "system");
                speak("Donanım sistemleri senkronize edildi.");
            } catch(e) { updateLog("Donanım erişimi reddedildi.", "system"); }
        };

        const executeHardware = async (cmd) => {
            if(serialWriter) await serialWriter.write(cmd + "\n");
        };

        // --- MAP ---
        const executeNav = async (loc) => {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(loc)}`);
                const data = await res.json();
                if(data && data.length > 0) {
                    const { lat, lon } = data[0];
                    document.getElementById('map-container').style.display = "block";
                    if(!map) {
                        map = L.map('map-container').setView([lat, lon], 13);
                        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
                    } else { map.setView([lat, lon], 13); }
                    L.marker([lat, lon]).addTo(map).bindPopup(loc).openPopup();
                    return true;
                }
            } catch(e) { return false; }
            return false;
        };

        // --- VISION ---
        window.toggleVision = () => {
            const v = document.getElementById('video-layer');
            const h = document.getElementById('hud-frame');
            const eh = document.getElementById('eng-hud');
            if(v.style.opacity === "0.6") {
                v.style.opacity = "0"; h.style.display = "none"; eh.style.display = "none";
                if(v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
            } else {
                navigator.mediaDevices.getUserMedia({video: { facingMode: "environment" }})
                    .then(s => { 
                        v.srcObject = s; v.style.opacity = "0.6"; 
                        h.style.display = "block"; eh.style.display = "block";
                        speak("Vizyon katmanları aktif.");
                    })
                    .catch(e => updateLog("Vizyon erişimi engellendi.", "system"));
            }
        };

        // --- VOICE ---
        window.toggleListening = () => {
            const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!Rec) return;
            const r = new Rec(); r.lang = 'tr-TR';
            r.onstart = () => document.getElementById('reactor').classList.add('listening');
            r.onend = () => document.getElementById('reactor').classList.remove('listening');
            r.onresult = (e) => processCommand(e.results[0][0].transcript);
            r.start();
        };

    </script>
</body>
</html>
