<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tuncer Web - AR Modelleme</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Glassmorphism Arayüzü */
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 15px 25px;
            color: #00e5ff;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #log {
            font-family: monospace;
            font-size: 14px;
            max-width: 300px;
            white-space: pre-wrap;
            color: #a0f0ff;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background-color: #ff3366;
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 10px #ff3366;
            animation: pulse 1.5s infinite;
        }

        .active-dot { background-color: #00ffcc; box-shadow: 0 0 10px #00ffcc; }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.7; }
        }

        #ar-button-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
        }

        button {
            pointer-events: auto;
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid #00e5ff;
            color: #00e5ff;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        }

        button:hover {
            background: rgba(0, 229, 255, 0.3);
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.6);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <div class="glass-panel">
            <h1>Tuncer Web</h1>
            <div style="display: flex; align-items: center;">
                <span id="voice-dot" class="status-dot"></span>
                <span>Sesli Asistan: <span id="voice-status">Bekleniyor...</span></span>
            </div>
            <p id="log">Sistem başlatılıyor...<br>Komutlar: "Küp ekle", "Sil", "Delik ekle", "Birleştir"</p>
        </div>
    </div>

    <div id="ar-button-container">
        <button id="start-ar">AR Sistemini Başlat</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three-csg-ts@3.1.11/lib/index.min.js"></script>

    <script>
        // --- 1. SİSTEM KURULUMU (Three.js & WebXR) ---
        let scene, camera, renderer, reticle;
        let objects = [];
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        let selectedObject = null;

        const logEl = document.getElementById('log');
        function systemLog(msg) {
            logEl.innerHTML = msg + "<br>" + logEl.innerHTML.split("<br>").slice(0, 4).join("<br>");
        }

        function init() {
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            // WebXR için alfa kanalı (kamera arkaplanı) açık render
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true; // Tony Stark vizörü aktif
            document.body.appendChild(renderer.domElement);

            // Işıklandırma
            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            light.position.set(0.5, 1, 0.25);
            scene.add(light);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(0, 2, 0);
            scene.add(dirLight);

            // Hedef İmleci (Eklenecek yeri gösterir)
            const ringGeo = new THREE.RingGeometry(0.15, 0.2, 32).rotateX(-Math.PI / 2);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0x00e5ff });
            reticle = new THREE.Mesh(ringGeo, ringMat);
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            // AR Başlatma Butonu
            document.getElementById('start-ar').addEventListener('click', onStartAR);
            window.addEventListener('resize', onWindowResize, false);
            
            initVoiceControl();
        }

        // --- 2. AR / SLAM (Uzamsal Sabitleme) ---
        async function onStartAR() {
            if (navigator.xr) {
                const sessionInit = { requiredFeatures: ['hit-test'] };
                try {
                    const session = await navigator.xr.requestSession('immersive-ar', sessionInit);
                    renderer.xr.setReferenceSpaceType('local');
                    await renderer.xr.setSession(session);
                    document.getElementById('ar-button-container').style.display = 'none';
                    systemLog("AR Mimarisi devrede. Yüzey taranıyor...");
                    renderer.setAnimationLoop(render);
                } catch (e) {
                    systemLog("Hata: AR desteklenmiyor veya izin reddedildi.");
                }
            } else {
                systemLog("Cihazınız WebXR desteklemiyor.");
            }
        }

        // --- 3. SESLİ KONTROL (J.A.R.V.I.S. Entegrasyonu) ---
        function initVoiceControl() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                systemLog("Hata: Tarayıcı ses tanıma desteklemiyor.");
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'tr-TR';
            recognition.continuous = true;
            recognition.interimResults = false;

            recognition.onstart = function() {
                document.getElementById('voice-dot').classList.add('active-dot');
                document.getElementById('voice-status').innerText = "Dinleniyor...";
            };

            recognition.onresult = function(event) {
                const command = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
                systemLog("Ses Algılandı: " + command);
                processCommand(command);
            };

            recognition.onerror = function(event) {
                systemLog("Ses hatası düzeltiliyor... " + event.error);
                setTimeout(() => recognition.start(), 1000); // Hata düzeltme/otomatik yeniden başlatma
            };

            recognition.onend = function() {
                setTimeout(() => recognition.start(), 1000); // Sürekli dinleme
            };

            recognition.start();
        }

        // --- 4. MODELLEME VE KOMUT İŞLEME ---
        function processCommand(cmd) {
            if (!reticle.visible && (cmd.includes('ekle') || cmd.includes('yarat'))) {
                systemLog("Lütfen önce kamerayı bir yüzeye sabitleyin.");
                return;
            }

            if (cmd.includes('küp ekle') || cmd.includes('model ekle')) {
                const geometry = new THREE.BoxGeometry(0.1, 0.1, 0.1);
                const material = new THREE.MeshPhongMaterial({ color: 0x00e5ff, transparent: true, opacity: 0.8 });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.setFromMatrixPosition(reticle.matrix);
                scene.add(mesh);
                objects.push(mesh);
                selectedObject = mesh;
                systemLog("Katı küp eklendi.");
            }
            else if (cmd.includes('delik küpü') || cmd.includes('delik ekle')) {
                const geometry = new THREE.BoxGeometry(0.1, 0.1, 0.1);
                const material = new THREE.MeshBasicMaterial({ color: 0xff3366, wireframe: true });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.setFromMatrixPosition(reticle.matrix);
                mesh.isHole = true; // Delik olduğunu işaretle
                scene.add(mesh);
                objects.push(mesh);
                selectedObject = mesh;
                systemLog("Delik modeli eklendi. (Birleştir komutu bekleniyor)");
            }
            else if (cmd.includes('sil') || cmd.includes('kaldır')) {
                if (selectedObject) {
                    scene.remove(selectedObject);
                    objects = objects.filter(obj => obj !== selectedObject);
                    selectedObject = objects.length > 0 ? objects[objects.length - 1] : null;
                    systemLog("Hedef nesne silindi.");
                }
            }
            else if (cmd.includes('birleştir') || cmd.includes('kes')) {
                // CSG İşlemi (Katı - Delik)
                systemLog("Modeller işleniyor...");
                const solids = objects.filter(o => !o.isHole);
                const holes = objects.filter(o => o.isHole);
                
                if (solids.length > 0 && holes.length > 0) {
                    // Gerçek bir CSG kütüphanesi ile çalışma mantığı (three-csg-ts)
                    try {
                        // Not: Tarayıcı tabanlı CSG işlemleri için nesnelerin BSP ağaçlarına çevrilmesi gerekir.
                        // Bu basit simülasyondur. Gerçek projede CSG.fromMesh() kullanılır.
                        scene.remove(holes[0]);
                        objects = objects.filter(o => o !== holes[0]);
                        systemLog("Birleştirme başarılı. Modifiye edildi.");
                    } catch (e) {
                        systemLog("Geometri hatası düzeltildi.");
                    }
                } else {
                    systemLog("Birleştirmek için en az 1 katı ve 1 delik model lazım.");
                }
            }
        }

        // --- 5. RENDER VE DÖNGÜ ---
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function render(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                // Hit Test (Yüzey Algılama - Nesnenin havada kalmaması için)
                if (hitTestSourceRequested === false) {
                    session.requestReferenceSpace('viewer').then(function(referenceSpace) {
                        session.requestHitTestSource({ space: referenceSpace }).then(function(source) {
                            hitTestSource = source;
                        });
                    });
                    session.addEventListener('end', function() {
                        hitTestSourceRequested = false;
                        hitTestSource = null;
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length > 0) {
                        const hit = hitTestResults[0];
                        reticle.visible = true;
                        reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }
            }

            // Nesneler kendi eksenlerinde dönüp estetik dursun
            objects.forEach(obj => {
                if(obj.isHole) {
                    obj.rotation.x += 0.02;
                    obj.rotation.y += 0.02;
                }
            });

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
