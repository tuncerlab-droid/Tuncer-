<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tuncer AR v14.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: transparent !important; font-family: monospace; }
        #ui-container { position: absolute; inset: 0; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        .hud-panel { background: rgba(0, 15, 30, 0.8); border-left: 4px solid #00e5ff; padding: 12px; border-radius: 8px; color: #00e5ff; font-size: 11px; align-self: flex-end; }
        #start-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        #btn-activate { background: #00e5ff; color: #000; font-weight: 900; padding: 20px 50px; border-radius: 15px; border: none; cursor: pointer; font-size: 18px; }
        #ARButton { background: #00e5ff !important; color: #000 !important; font-weight: 900 !important; border-radius: 30px !important; bottom: 40px !important; z-index: 1001 !important; }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="start-screen">
        <h1 style="color:#00e5ff; margin-bottom:10px;">TUNCER CORE v14</h1>
        <p style="color:#666; margin-bottom:30px; font-size:12px;">Kamera Çakışması Giderildi.</p>
        <button id="btn-activate">SİSTEMİ BAŞLAT</button>
    </div>

    <div id="ui-container" style="display: none;">
        <div class="hud-panel">
            SİSTEM: <span style="color:#fff;">AKTİF</span><br>
            EL_TAKİBİ: <span id="hand-status" style="color:#ff3366;">BEKLİYOR</span><br>
            X: <span id="pos-x">0.00</span> | Y: <span id="pos-y">0.00</span>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        let scene, camera, renderer, reticle, fingerCursor;
        let hitTestSource = null, hitTestSourceRequested = false;
        let objects = [], selectedObject = null, isPinching = false;
        let handsAI;

        async function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Masa Hedefleyicisi
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.05, 0.06, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x00e5ff })
            );
            reticle.matrixAutoUpdate = false; reticle.visible = false;
            scene.add(reticle);

            // PARMAK UCU İMLECİ
            fingerCursor = new THREE.Mesh(
                new THREE.SphereGeometry(0.012, 16, 16),
                new THREE.MeshBasicMaterial({ color: 0x00e5ff, wireframe: true })
            );
            fingerCursor.visible = false;
            scene.add(fingerCursor);

            scene.add(new THREE.AmbientLight(0xffffff, 1.5));

            // MediaPipe Hands Ayarları (Kamera başlatmadan)
            handsAI = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            handsAI.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
            handsAI.onResults(onHandResults);

            const ui = document.getElementById('ui-container');
            const button = ARButton.createButton(renderer, { 
                requiredFeatures: ['hit-test'], 
                optionalFeatures: ['dom-overlay'], 
                domOverlay: { root: ui } 
            });
            document.body.appendChild(button);

            renderer.xr.addEventListener('sessionstart', () => {
                document.getElementById('start-screen').style.display = 'none';
                ui.style.display = 'flex';
            });

            document.getElementById('btn-activate').onclick = () => { /* ARButton trigger */ };
            renderer.setAnimationLoop(render);
        }

        function onHandResults(results) {
            const status = document.getElementById('hand-status');
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                status.innerText = "AKTİF"; status.style.color = "#00ffcc";
                fingerCursor.visible = true;

                const tip = results.multiHandLandmarks[0][8]; // İşaret parmağı
                const thumb = results.multiHandLandmarks[0][4]; // Başparmak
                
                // Koordinat Dönüşümü
                const x = -(tip.x - 0.5) * 2;
                const y = -(tip.y * 2) + 1;
                
                const vector = new THREE.Vector3(x, y, 0.5).unproject(camera);
                const dir = vector.sub(camera.position).normalize();
                fingerCursor.position.copy(camera.position).add(dir.multiplyScalar(0.4));

                // PINCH & RENK KONTROLÜ
                const dist = Math.hypot(tip.x - thumb.x, tip.y - thumb.y);
                const isPinch = dist < 0.05;

                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(new THREE.Vector2(x, y), camera);
                const hits = raycaster.intersectObjects(objects);

                if (isPinch) {
                    fingerCursor.material.color.setHex(0xff0000); // Kırmızı
                    if (hits.length > 0) selectedObject = hits[0].object;
                    if (selectedObject) selectedObject.position.lerp(fingerCursor.position, 0.1);
                } else {
                    selectedObject = null;
                    fingerCursor.material.color.setHex(hits.length > 0 ? 0xffea00 : 0x00e5ff); // Sarı veya Mavi
                }
            } else {
                status.innerText = "YOK"; status.style.color = "#ff3366";
                fingerCursor.visible = false;
            }
        }

        function render(timestamp, frame) {
            if (frame) {
                const session = renderer.xr.getSession();
                const referenceSpace = renderer.xr.getReferenceSpace();

                // KAMERA ÇAKIŞMASINI ÖNLEYEN KRİTİK NOKTA:
                // Video elementinden değil, renderer'ın canvas'ından veri alıyoruz
                if (timestamp % 3 === 0) { // Performans için her 3 karede bir el tara
                    handsAI.send({ image: renderer.domElement });
                }

                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then(s => {
                        session.requestHitTestSource({ space: s }).then(source => hitTestSource = source);
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const results = frame.getHitTestResults(hitTestSource);
                    if (results.length > 0) {
                        reticle.visible = true;
                        reticle.matrix.fromArray(results[0].getPose(referenceSpace).transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }
            }
            renderer.render(scene, camera);
        }

        // Tıklama ile Obje Koyma
        window.addEventListener('click', () => {
            if (reticle.visible) {
                const mesh = new THREE.Mesh(
                    new THREE.BoxGeometry(0.1, 0.1, 0.1),
                    new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff })
                );
                mesh.position.setFromMatrixPosition(reticle.matrix);
                mesh.position.y += 0.05;
                scene.add(mesh);
                objects.push(mesh);
            }
        });

        init();
    </script>
</body>
</html>
