<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tuncer AR v7.0 - Fiziksel Sabitleme</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
    <!-- WebXR Destekleyici Kütüphane -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        canvas { display: block; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.8); z-index: 100; color: white;
        }
        #ar-info {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 20px;
            color: #00e5ff; font-size: 12px; font-weight: bold; z-index: 50;
            pointer-events: none; border: 1px solid rgba(0,229,255,0.3);
        }
        #hud {
            position: fixed; top: 20px; right: 20px; text-align: right;
            color: #00e5ff; font-family: monospace; font-size: 10px; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 class="text-2xl font-black mb-2 text-cyan-400">TUNCER CORE v7.0</h1>
        <p class="text-slate-400 text-sm mb-6 text-center px-10 italic">"Gerçek Dünya Koordinat Sistemi Aktif Ediliyor..."</p>
        <button id="ar-button" class="bg-cyan-500 hover:bg-cyan-400 text-black font-black py-4 px-8 rounded-full transition-all scale-110">
            AR MODUNU BAŞLAT
        </button>
        <p id="error-msg" class="text-red-500 mt-4 hidden">Tarayıcınız WebXR Hit-Test desteklemiyor.</p>
    </div>

    <div id="ar-info">Zemini/Masayı yavaşça tarayın...</div>
    
    <div id="hud">
        X: <span id="x-val">0.00</span><br>
        Y: <span id="y-val">0.00</span><br>
        Z: <span id="z-val">0.00</span><br>
        VOICE: <span id="v-status">HAZIR</span>
    </div>

    <script type="module">
        let container, scene, camera, renderer, controller;
        let reticle, hitTestSource = null, hitTestSourceRequested = false;
        let objects = [];
        let selectedObject = null;

        const arButton = document.getElementById('ar-button');
        const overlay = document.getElementById('overlay');

        arButton.addEventListener('click', () => {
            if (navigator.xr) {
                navigator.xr.isSessionSupported('immersive-ar').then((supported) => {
                    if (supported) {
                        startAR();
                    } else {
                        document.getElementById('error-msg').classList.remove('hidden');
                    }
                });
            }
        });

        async function startAR() {
            overlay.style.display = 'none';

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            scene.add(light);

            // Hedefleyici (Reticle) - Masayı bulduğunda görünen halka
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.1, 0.12, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x00e5ff })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            // WebXR Session
            const session = await navigator.xr.requestSession('immersive-ar', {
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: document.body }
            });

            renderer.xr.setSession(session);

            // Ekrana dokunulduğunda objeyi masaya bırak
            controller = renderer.xr.getController(0);
            controller.addEventListener('select', onSelect);
            scene.add(controller);

            initVoiceControl();
            renderer.setAnimationLoop(render);
        }

        function onSelect() {
            if (reticle.visible) {
                addShapeAtPos(reticle.position, reticle.quaternion);
            }
        }

        function addShapeAtPos(position, quaternion, type = 'cube') {
            const geometry = type === 'cube' 
                ? new THREE.BoxGeometry(0.15, 0.15, 0.15) 
                : new THREE.SphereGeometry(0.1, 32, 32);
                
            const material = new THREE.MeshStandardMaterial({ 
                color: Math.random() * 0xffffff,
                metalness: 0.7,
                roughness: 0.2
            });

            const mesh = new THREE.Mesh(geometry, material);
            position.y += 0.075; // Masanın içine girmemesi için yarı yüksekliği kadar kaldır
            mesh.position.copy(position);
            mesh.quaternion.copy(quaternion);
            
            scene.add(mesh);
            objects.push(mesh);
            selectedObject = mesh;
        }

        function initVoiceControl() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) return;
            const rec = new Speech();
            rec.lang = 'tr-TR';
            rec.continuous = true;
            rec.onresult = (e) => {
                const cmd = e.results[e.results.length - 1][0].transcript.toLowerCase();
                document.getElementById('v-status').innerText = cmd.toUpperCase();
                
                if (cmd.includes("küp") && reticle.visible) addShapeAtPos(reticle.position, reticle.quaternion, 'cube');
                if (cmd.includes("küre") && reticle.visible) addShapeAtPos(reticle.position, reticle.quaternion, 'sphere');
                if (cmd.includes("sil") && selectedObject) {
                    scene.remove(selectedObject);
                    objects = objects.filter(o => o !== selectedObject);
                    selectedObject = null;
                }
            };
            rec.start();
        }

        function render(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (hitTestSourceRequested === false) {
                    session.requestReferenceSpace('viewer').then((referenceSpace) => {
                        session.requestHitTestSource({ space: referenceSpace }).then((source) => {
                            hitTestSource = source;
                        });
                    });
                    session.addEventListener('end', () => {
                        hitTestSourceRequested = false;
                        hitTestSource = null;
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length) {
                        const hit = hitTestResults[0];
                        reticle.visible = true;
                        reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
                        
                        // Pozisyonu HUD'a yaz
                        const pos = new THREE.Vector3().setFromMatrixPosition(reticle.matrix);
                        document.getElementById('x-val').innerText = pos.x.toFixed(2);
                        document.getElementById('y-val').innerText = pos.y.toFixed(2);
                        document.getElementById('z-val').innerText = pos.z.toFixed(2);
                        document.getElementById('ar-info').innerText = "Yüzey Bulundu! Dokun veya 'Küp' de.";
                    } else {
                        reticle.visible = false;
                        document.getElementById('ar-info').innerText = "Yüzey aranıyor...";
                    }
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
