<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuncer OS - Yapay Zeka Terminali</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #020617;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
            --terminal-green: #10b981;
            --error-red: #ef4444;
            --text-dim: #64748b;
            --glass: rgba(15, 23, 42, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg-dark); 
            color: #f1f5f9; 
            font-family: 'Inter', sans-serif; 
            height: 100vh; 
            display: flex; 
            overflow: hidden;
        }

        /* Scanline Efekti */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .main-frame {
            display: flex;
            width: 100%;
            padding: 20px;
            gap: 20px;
            z-index: 1;
        }

        /* Sol Panel: Sistem Bilgisi */
        .sidebar {
            width: 320px;
            background: var(--glass);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            backdrop-filter: blur(10px);
        }

        .os-logo {
            font-family: 'Fira Code', monospace;
            font-size: 1.5rem;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent-glow);
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
            padding-bottom: 10px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid var(--accent);
        }

        .stat-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; }
        .stat-value { font-family: 'Fira Code', monospace; font-size: 0.9rem; margin-top: 5px; }

        .engine-toggle {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
            padding: 4px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .toggle-btn {
            padding: 10px;
            border: none;
            background: none;
            color: var(--text-dim);
            cursor: pointer;
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            border-radius: 6px;
            transition: all 0.3s;
        }

        .toggle-btn.active {
            background: var(--accent);
            color: var(--bg-dark);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* Sağ Panel: Terminal */
        .terminal {
            flex: 1;
            background: var(--glass);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .terminal-header {
            padding: 12px 20px;
            background: rgba(56, 189, 248, 0.1);
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .output-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .log-entry { display: flex; gap: 10px; }
        .log-prefix { color: var(--accent); flex-shrink: 0; }
        .log-content { line-height: 1.6; }

        .ai-response { color: #cbd5e1; }
        .user-request { color: var(--terminal-green); }

        .input-line {
            padding: 20px;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid rgba(56, 189, 248, 0.2);
        }

        .input-line input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--accent);
            font-family: 'Fira Code', monospace;
            font-size: 1rem;
        }

        .cursor {
            width: 8px; height: 18px;
            background: var(--accent);
            display: inline-block;
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="main-frame">
        <div class="sidebar">
            <div class="os-logo">TUNCER_OS v4.0</div>
            
            <div class="stat-card">
                <div class="stat-label">Aktif Çekirdek</div>
                <div class="stat-value" id="activeVersion">TUN_CORE_2026</div>
            </div>

            <div class="stat-card">
                <div class="stat-label">Sistem Durumu</div>
                <div class="stat-value" id="sysStatus" style="color: var(--text-dim);">BAĞLANILIYOR...</div>
            </div>

            <div class="engine-toggle">
                <button class="toggle-btn" id="btn2023" onclick="bootCore('2023')">v2023</button>
                <button class="toggle-btn active" id="btn2026" onclick="bootCore('2026')">v2026</button>
            </div>

            <div class="stat-card" style="margin-top: auto; border-left-color: var(--text-dim);">
                <div class="stat-label">Hafıza Durumu</div>
                <div class="stat-value" style="font-size: 0.7rem;">Buffer: OK<br>Stack: STABLE</div>
            </div>
        </div>

        <div class="terminal">
            <div class="terminal-header">
                <div style="font-size: 0.75rem; color: var(--accent);">CORE_LINK: STABLE</div>
                <div style="font-size: 0.75rem; color: var(--text-dim);" id="clock">00:00:00</div>
            </div>

            <div class="output-box" id="terminalOutput">
                <div class="log-entry">
                    <span class="log-prefix">SYSTEM:</span>
                    <span class="log-content">Terminal başlatıldı. Çekirdek yazılım bekleniyor...</span>
                </div>
            </div>

            <div class="input-line">
                <span style="color: var(--terminal-green); font-family: 'Fira Code';">></span>
                <input type="text" id="commandLine" placeholder="Komut girin..." autocomplete="off">
            </div>
        </div>
    </div>

    <script>
        let aiCore = null;
        let currentV = '2026';
        const output = document.getElementById('terminalOutput');
        const cmdInput = document.getElementById('commandLine');
        const sysStatus = document.getElementById('sysStatus');

        // Saat güncelleme
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('tr-TR');
        }, 1000);

        window.onload = () => bootCore('2026');

        cmdInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleCommand();
        });

        async function bootCore(v) {
            currentV = v;
            aiCore = null;
            
            // UI Güncelle
            document.getElementById('btn2023').className = v === '2023' ? 'toggle-btn active' : 'toggle-btn';
            document.getElementById('btn2026').className = v === '2026' ? 'toggle-btn active' : 'toggle-btn';
            document.getElementById('activeVersion').innerText = `TUN_CORE_${v}`;
            sysStatus.innerText = "YÜKLENİYOR...";
            sysStatus.style.color = "var(--text-dim)";

            addLog("SYSTEM", `Çekirdek v${v} için protokoller başlatıldı...`);

            // Dosya Yolunu Çöz
            const path = window.location.pathname;
            const dir = path.substring(0, path.lastIndexOf('/') + 1);
            const scriptUrl = `${dir}tuncer${v}.js?v=${Date.now()}`;

            // Eski scripti temizle
            const old = document.getElementById('core-loader');
            if (old) old.remove();

            // Yeni yükleyici
            const script = document.createElement('script');
            script.id = 'core-loader';
            script.src = scriptUrl;

            script.onload = () => {
                // Sınıf Kontrolü
                let retry = 0;
                const timer = setInterval(() => {
                    const CoreClass = window.TuncerZeka || (typeof TuncerZeka !== 'undefined' ? TuncerZeka : null);
                    if (CoreClass) {
                        aiCore = new CoreClass();
                        sysStatus.innerText = "AKTİF";
                        sysStatus.style.color = "var(--terminal-green)";
                        addLog("SYSTEM", `Çekirdek v${v} başarıyla bağlandı. Komutlar kabul ediliyor.`);
                        clearInterval(timer);
                    } else if (retry > 10) {
                        sysStatus.innerText = "YAZILIM HATASI";
                        sysStatus.style.color = "var(--error-red)";
                        addLog("ERROR", `Dosya indi ancak 'TuncerZeka' sınıfı tanımlanamadı.`);
                        clearInterval(timer);
                    }
                    retry++;
                }, 100);
            };

            script.onerror = () => {
                sysStatus.innerText = "DOSYA EKSİK";
                sysStatus.style.color = "var(--error-red)";
                addLog("ERROR", `tuncer${v}.js dosyasına ulaşılamadı. Sunucu yolunu kontrol edin.`);
            };

            document.body.appendChild(script);
        }

        async function handleCommand() {
            const cmd = cmdInput.value.trim();
            if (!cmd) return;

            addLog("USER", cmd, "user-request");
            cmdInput.value = '';

            if (!aiCore) {
                addLog("SYSTEM", "Hata: Aktif çekirdek bulunamadı. Bağlantı kesik.", "error-red");
                return;
            }

            try {
                const response = await aiCore.konus(cmd);
                const text = (typeof response === 'object') ? response.cevap : response;
                addLog(`TUNCER_${currentV}`, text, "ai-response");
            } catch (e) {
                addLog("CRASH", e.message, "error-red");
            }
        }

        function addLog(prefix, msg, customClass = "") {
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.innerHTML = `
                <span class="log-prefix">${prefix}:</span>
                <span class="log-content ${customClass}">${msg}</span>
            `;
            output.appendChild(div);
            output.scrollTop = output.scrollHeight;
        }
    </script>
</body>
</html>
