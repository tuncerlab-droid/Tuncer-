<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNCER HOLO - El Kontrollü AR v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.7.0/build/index.module.js",
                "three-bvh-csg": "https://unpkg.com/three-bvh-csg@0.0.16/build/index.module.js"
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Share Tech Mono', monospace;
            color: #0ff;
            user-select: none;
            touch-action: none;
        }

        #ui-overlay {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 100;
            pointer-events: none;
            display: none;
            flex-direction: column;
            justify-content: space-between;
            padding: 1rem;
        }

        .hud-panel {
            pointer-events: auto;
            background: rgba(0, 20, 30, 0.7);
            border: 1px solid #0ff;
            backdrop-filter: blur(4px);
        }

        .btn-holo {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #0ff;
            color: #0ff;
            text-transform: uppercase;
            font-size: 10px;
        }

        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #001; z-index: 1000;
        }

        /* Gizli Video Elementi (MediaPipe için) */
        #ar-video-feed {
            position: fixed;
            top: 0; left: 0; width: 1px; height: 1px; opacity: 0; pointer-events: none;
        }
    </style>
</head>
<body>

    <video id="ar-video-feed" playsinline></video>
    <div id="canvas-container"></div>

    <div id="start-screen">
        <div class="hud-panel p-6 rounded text-center max-w-sm pointer-events-auto">
            <h1 class="text-xl font-bold text-cyan-400 mb-2">TUNCER HOLO v2</h1>
            <p class="text-[10px] text-gray-400 mb-4">El Takibi + AR SLAM Hibrit Sistem. Odayı tarayın, nesneyi yerleştirin ve elinizle (pinch) kontrol edin.</p>
            <div id="ar-button-container"></div>
        </div>
    </div>

    <div id="ui-overlay">
        <div class="flex justify-between items-start w-full">
            <div class="hud-panel p-2 rounded text-sm w-1/2">
                <div class="font-bold text-xs tracking-widest text-white">TUNCER HOLO AR</div>
                <div id="sys-status" class="text-[9px] text-yellow-400">Zemin Aranıyor...</div>
                <div id="hand-status" class="text-[9px] text-cyan-400">El: Bekleniyor...</div>
            </div>
            <div class="hud-panel p-2 rounded text-center">
                <div class="text-[9px] text-gray-300 uppercase">Ses Kontrol</div>
                <div id="mic-status" class="text-[9px] font-bold">AKTİF</div>
            </div>
        </div>

        <div class="flex justify-between items-end w-full gap-2">
            <div class="hud-panel p-2 rounded h-20 w-1/2 overflow-hidden flex flex-col justify-end text-[8px]" id="log-console">
                <div class="text-cyan-600">> Sistem Başlatıldı.</div>
            </div>
            <div class="hud-panel p-2 rounded grid grid-cols-2 gap-1 w-1/2">
                <button id="btn-cube" class="btn-holo p-1 rounded">KÜP</button>
                <button id="btn-hole" class="btn-holo p-1 rounded border-red-500 text-red-500">DELİK</button>
                <button id="btn-merge" class="btn-holo p-1 rounded border-yellow-500 text-yellow-500">BİRLEŞTİR</button>
                <button id="btn-delete" class="btn-holo p-1 rounded text-red-400">SİL</button>
            </div>
        </div>
    </div>

<script type="module">
import * as THREE from 'three';
import { ARButton } from 'three/addons/webxr/ARButton.js';
import { SUBTRACTION, Brush, Evaluator } from 'three-bvh-csg';

const logConsole = document.getElementById('log-console');
const sysStatus = document.getElementById('sys-status');
const handStatus = document.getElementById('hand-status');
const uiOverlay = document.getElementById('ui-overlay');
const startScreen = document.getElementById('start-screen');
const videoElement = document.getElementById('ar-video-feed');

let scene, camera, renderer, controller, reticle;
let hitTestSource = null, hitTestSourceRequested = false;
let objects = [], holeObjects = [], selectedObject = null;

// MediaPipe State
let handsDetector;
let isPinching = false;
let lastHandPos = new THREE.Vector3();
let lastHandRot = new THREE.Euler();

function log(msg, err = false) {
    const d = document.createElement('div');
    d.textContent = `> ${msg}`;
    d.className = err ? 'text-red-500' : 'text-cyan-400';
    logConsole.appendChild(d);
    if(logConsole.childNodes.length > 5) logConsole.removeChild(logConsole.firstChild);
}

async function initHands() {
    handsDetector = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });
    handsDetector.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7
    });
    handsDetector.onResults(onHandResults);
}

function onHandResults(results) {
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        handStatus.textContent = "El: TAKİP EDİLİYOR";
        
        // İşaret ve Baş parmak ucu
        const indexTip = landmarks[8];
        const thumbTip = landmarks[4];
        const midPoint = {
            x: (indexTip.x + thumbTip.x) / 2,
            y: (indexTip.y + thumbTip.y) / 2,
            z: (indexTip.z + thumbTip.z) / 2
        };

        // Kıskaç Mesafesi (Pinch)
        const distance = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y);
        
        // 3D Pozisyon Dönüşümü (Normalized Device Coordinates to World Space)
        const vector = new THREE.Vector3((midPoint.x * 2) - 1, -(midPoint.y * 2) + 1, 0.5);
        vector.unproject(camera);
        const dir = vector.sub(camera.position).normalize();
        const distanceToTarget = 0.5 + (midPoint.z * -2); // Derinlik takibi
        const worldPos = camera.position.clone().add(dir.multiplyScalar(distanceToTarget));

        if (distance < 0.05) { // Çimdik yapıldı
            if (!isPinching) {
                isPinching = true;
                findObjectToGrab(worldPos);
            }
            if (selectedObject) {
                updateObjectTransform(worldPos, landmarks);
            }
        } else {
            if (isPinching) {
                isPinching = false;
                if (selectedObject) {
                    selectedObject.material.emissive.setHex(0x000000);
                    selectedObject = null;
                }
            }
        }
    } else {
        handStatus.textContent = "El: GÖRÜLMEDİ";
    }
}

function findObjectToGrab(pos) {
    const all = [...objects, ...holeObjects];
    let closest = null;
    let minDist = 0.2; // Yakalama eşiği

    all.forEach(obj => {
        const d = obj.position.distanceTo(pos);
        if (d < minDist) {
            minDist = d;
            closest = obj;
        }
    });

    if (closest) {
        selectedObject = closest;
        selectedObject.material.emissive.setHex(0x004444);
        log("Nesne kavrandı.");
    }
}

function updateObjectTransform(newPos, landmarks) {
    // Pozisyonu güncelle
    selectedObject.position.lerp(newPos, 0.2);

    // Rotasyonu güncelle (El bilek ve orta parmak hattına göre basit rotasyon)
    const wrist = landmarks[0];
    const middleBase = landmarks[9];
    
    const angleY = Math.atan2(middleBase.x - wrist.x, middleBase.z - wrist.z);
    const angleX = Math.atan2(middleBase.y - wrist.y, middleBase.z - wrist.z);
    
    selectedObject.rotation.y = angleY * 2;
    selectedObject.rotation.x = -angleX * 2;
}

function initThree() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1));
    const dLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dLight.position.set(0, 2, 1);
    scene.add(dLight);

    const arBtn = ARButton.createButton(renderer, {
        requiredFeatures: ['hit-test'],
        optionalFeatures: ['dom-overlay'],
        domOverlay: { root: document.body }
    });
    document.getElementById('ar-button-container').appendChild(arBtn);

    renderer.xr.addEventListener('sessionstart', async () => {
        startScreen.style.display = 'none';
        uiOverlay.style.display = 'flex';
        
        // MediaPipe için video akışını yakala (Gizli elemente yönlendir)
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            videoElement.srcObject = stream;
            videoElement.play();
            
            // MediaPipe Döngüsü
            const processVideo = async () => {
                if (renderer.xr.isPresenting) {
                    await handsDetector.send({ image: videoElement });
                    requestAnimationFrame(processVideo);
                }
            };
            processVideo();
        } catch(e) { log("Kamera erişim hatası!", true); }
    });

    reticle = new THREE.Mesh(
        new THREE.RingGeometry(0.07, 0.08, 32).rotateX(-Math.PI/2),
        new THREE.MeshBasicMaterial({ color: 0x00ffff })
    );
    reticle.matrixAutoUpdate = false;
    reticle.visible = false;
    scene.add(reticle);

    renderer.setAnimationLoop(render);
}

function addObj(isHole = false) {
    if (!reticle.visible) return log("Zemin bulunamadı!", true);
    
    const geo = new THREE.BoxGeometry(0.15, 0.15, 0.15);
    const mat = new THREE.MeshStandardMaterial({
        color: isHole ? 0xff3333 : 0x00aaff,
        transparent: true, opacity: isHole ? 0.6 : 1.0,
        metalness: 0.6, roughness: 0.2, emissive: 0x000000
    });
    
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.setFromMatrixPosition(reticle.matrix);
    mesh.quaternion.setFromRotationMatrix(reticle.matrix);
    mesh.translateY(0.075);
    
    scene.add(mesh);
    if (isHole) holeObjects.push(mesh); else objects.push(mesh);
    log(isHole ? "Delik eklendi." : "Küp eklendi.");
}

function merge() {
    if (objects.length === 0 || holeObjects.length === 0) return log("Eksik parça!", true);
    const evaluator = new Evaluator();
    let base = objects[0];
    let baseBrush = new Brush(base.geometry, base.material);
    baseBrush.position.copy(base.position);
    baseBrush.quaternion.copy(base.quaternion);
    baseBrush.updateMatrixWorld();

    holeObjects.forEach(h => {
        const hBrush = new Brush(h.geometry, h.material);
        hBrush.position.copy(h.position);
        hBrush.quaternion.copy(h.quaternion);
        hBrush.updateMatrixWorld();
        baseBrush = evaluator.evaluate(baseBrush, hBrush, SUBTRACTION);
        scene.remove(h);
    });

    scene.remove(base);
    const result = new THREE.Mesh(baseBrush.geometry, baseBrush.material);
    result.position.copy(base.position);
    result.quaternion.copy(base.quaternion);
    scene.add(result);
    objects = [result]; holeObjects = [];
    log("Birleştirildi.");
}

function render(timestamp, frame) {
    if (frame) {
        const referenceSpace = renderer.xr.getReferenceSpace();
        const session = renderer.xr.getSession();
        if (!hitTestSourceRequested) {
            session.requestReferenceSpace('viewer').then(ref => {
                session.requestHitTestSource({ space: ref }).then(src => hitTestSource = src);
            });
            hitTestSourceRequested = true;
        }
        if (hitTestSource) {
            const results = frame.getHitTestResults(hitTestSource);
            if (results.length > 0) {
                reticle.visible = true;
                reticle.matrix.fromArray(results[0].getPose(referenceSpace).transform.matrix);
                sysStatus.textContent = "Sistem: Zemin Hazır";
            } else {
                reticle.visible = false;
                sysStatus.textContent = "Sistem: Zemin Aranıyor...";
            }
        }
    }
    renderer.render(scene, camera);
}

window.addEventListener('load', async () => {
    await initHands();
    initThree();
});

document.getElementById('btn-cube').onclick = () => addObj(false);
document.getElementById('btn-hole').onclick = () => addObj(true);
document.getElementById('btn-merge').onclick = merge;
document.getElementById('btn-delete').onclick = () => {
    const all = [...objects, ...holeObjects];
    if(all.length) scene.remove(all.pop());
};
</script>
</body>
</html>
