<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tuncer Web - Hand Tracking Pro</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: transparent;
            font-family: 'Segoe UI', sans-serif;
        }

        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }

        .hud-panel {
            position: absolute;
            background: rgba(0, 15, 30, 0.75);
            backdrop-filter: blur(10px);
            border-left: 5px solid #00e5ff;
            padding: 15px;
            color: #00e5ff;
            pointer-events: auto;
            top: 20px; left: 20px;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
        }

        h1 { margin: 0; font-size: 16px; letter-spacing: 2px; text-transform: uppercase; }
        
        .status { display: flex; align-items: center; margin-top: 8px; font-size: 11px; }
        .indicator { width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; background: #ff3366; }
        .active { background: #00ffcc; box-shadow: 0 0 10px #00ffcc; }

        #console {
            margin-top: 10px; font-family: monospace;
            font-size: 10px; color: #a0f0ff; height: 60px; overflow: hidden;
        }

        #start-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #00e5ff; color: #000; border: none; padding: 15px 35px;
            font-weight: bold; border-radius: 30px; cursor: pointer; pointer-events: auto;
            box-shadow: 0 0 25px #00e5ff;
        }

        #controls {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; pointer-events: auto;
        }

        .btn-mode {
            background: rgba(0, 229, 255, 0.1); border: 1px solid #00e5ff; color: #00e5ff;
            padding: 8px 16px; border-radius: 5px; cursor: pointer; font-size: 12px;
        }
        .btn-mode.active { background: #00e5ff; color: #000; }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <button id="start-btn">SİSTEMİ BAŞLAT</button>

    <div id="ui-overlay" style="display: none;">
        <div class="hud-panel">
            <h1>TUNCER WEB OS</h1>
            <div class="status"><div id="ind-ar" class="indicator"></div> TARAMA</div>
            <div id="hand-status-box" class="status"><div id="ind-hand" class="indicator"></div> EL ALIGILAMA</div>
            <div class="status"><div id="ind-voice" class="indicator"></div> SES MODÜLÜ</div>
            <div id="console">Kamera bekleniyor...</div>
        </div>

        <div id="controls">
            <button class="btn-mode active" id="m-trans">TAŞI</button>
            <button class="btn-mode" id="m-rot">DÖNDÜR</button>
            <button class="btn-mode" id="m-scale">ÖLÇEK</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';
        import { XRHandModelFactory } from 'three/addons/webxr/XRHandModelFactory.js';

        let scene, camera, renderer, transformControl;
        let reticle, hitTestSource = null, hitTestSourceRequested = false;
        let objects = [];
        let recognition;

        const consoleEl = document.getElementById('console');
        function sysLog(m) { 
            consoleEl.innerHTML = `> ${m}<br>` + consoleEl.innerHTML.split('<br>').slice(0,3).join('<br>');
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2));
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(1, 1, 1);
            scene.add(light);

            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.06, 0.08, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x00e5ff })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            // --- EL TAKİBİ FABRİKASI ---
            const handModelFactory = new XRHandModelFactory();

            // Sol ve Sağ el girişleri
            for (let i = 0; i < 2; i++) {
                const hand = renderer.xr.getHand(i);
                
                // El iskeletini "mesh" (deri) ve "boxes" (eklem kutuları) olarak ekliyoruz
                // Bu elini gördüğü anda üzerine iskelet bindirmesini sağlar
                hand.add(handModelFactory.createHandModel(hand, "mesh"));
                scene.add(hand);

                hand.addEventListener('connected', (event) => {
                    document.getElementById('ind-hand').classList.add('active');
                    sysLog("El algılandı: " + event.data.handedness);
                });

                hand.addEventListener('disconnected', () => {
                    document.getElementById('ind-hand').classList.remove('active');
                });
            }

            transformControl = new TransformControls(camera, renderer.domElement);
            scene.add(transformControl);

            document.getElementById('start-btn').addEventListener('click', startAR);
            setupControls();
        }

        async function startAR() {
            const sessionInit = { 
                requiredFeatures: ['hit-test', 'hand-tracking'], // Hand-tracking artık zorunlu özellik
                optionalFeatures: ['dom-overlay', 'layers'],
                domOverlay: { root: document.getElementById('ui-overlay') }
            };

            try {
                const session = await navigator.xr.requestSession('immersive-ar', sessionInit);
                renderer.xr.setReferenceSpaceType('local');
                await renderer.xr.setSession(session);

                document.getElementById('start-btn').style.display = 'none';
                document.getElementById('ui-overlay').style.display = 'block';
                document.getElementById('ind-ar').classList.add('active');

                initVoice();
                renderer.setAnimationLoop(render);
                sysLog("Sistem Aktif. Elini kameraya göster.");
            } catch (e) {
                sysLog("Hata: " + e.message);
                // Eğer hand-tracking zorunlu olduğu için açılmazsa opsiyonel olarak dene
                alert("El takibi bu cihazda tam desteklenmiyor olabilir.");
            }
        }

        function initVoice() {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRec) return;

            recognition = new SpeechRec();
            recognition.lang = 'tr-TR';
            recognition.continuous = true;

            recognition.onstart = () => document.getElementById('ind-voice').classList.add('active');
            
            recognition.onresult = (event) => {
                const text = event.results[event.results.length - 1][0].transcript.toLowerCase();
                sysLog(text);
                
                if (text.includes('küp') && (text.includes('ekle') || text.includes('oluştur'))) {
                    addModel('cube');
                } else if (text.includes('delik') && text.includes('ekle')) {
                    addModel('hole');
                } else if (text.includes('sil') || text.includes('kaldır')) {
                    if (transformControl.object) {
                        const obj = transformControl.object;
                        transformControl.detach();
                        scene.remove(obj);
                        objects = objects.filter(o => o !== obj);
                        sysLog("Silindi.");
                    }
                }
            };

            recognition.onerror = () => { setTimeout(() => recognition.start(), 1000); };
            recognition.onend = () => { if(renderer.xr.getSession()) recognition.start(); };
            recognition.start();
        }

        function addModel(type) {
            if (!reticle.visible) return sysLog("Zemin aranıyor...");

            let geo = new THREE.BoxGeometry(0.1, 0.1, 0.1);
            let mat = type === 'cube' 
                ? new THREE.MeshStandardMaterial({ color: 0x00e5ff, metalness: 0.5, roughness: 0.2, transparent: true, opacity: 0.8 })
                : new THREE.MeshBasicMaterial({ color: 0xff0044, wireframe: true });

            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.setFromMatrixPosition(reticle.matrix);
            scene.add(mesh);
            objects.push(mesh);
            transformControl.attach(mesh);
            sysLog(type + " eklendi.");
        }

        function setupControls() {
            const modes = ['trans', 'rot', 'scale'];
            const names = ['translate', 'rotate', 'scale'];
            
            modes.forEach((m, i) => {
                document.getElementById(`m-${m}`).onclick = (e) => {
                    transformControl.setMode(names[i]);
                    document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                };
            });

            window.addEventListener('pointerdown', (e) => {
                if (e.target.tagName === 'BUTTON') return;
                const mouse = new THREE.Vector2((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(mouse, camera);
                const hits = raycaster.intersectObjects(objects);
                if (hits.length > 0) transformControl.attach(hits[0].object);
            });
        }

        function render(timestamp, frame) {
            if (frame) {
                const refSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then(ref => {
                        session.requestHitTestSource({ space: ref }).then(src => hitTestSource = src);
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hits = frame.getHitTestResults(hitTestSource);
                    if (hits.length > 0) {
                        reticle.visible = true;
                        reticle.matrix.fromArray(hits[0].getPose(refSpace).transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }
            }
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
