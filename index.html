<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>TUNCERLAB // AR TOUCH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ============ KURULUM EKRANI ============ -->
  <div id="setup-screen">
    <div class="setup-card">
      <div class="brand">
        <span class="brand-mark">⌖</span>
        <h1>TUNCER<span class="accent">LAB</span></h1>
      </div>
      <div class="brand-sub">AR TOUCH // EL TAKİP SİSTEMİ</div>

      <div class="divider"></div>

      <label class="field-label">SUNUCU ADRESİ (PC)</label>
      <input id="ws-address" type="text" inputmode="url" placeholder="wss://192.168.1.X:8765" />

      <button id="btn-connect" class="btn btn-outline">
        <span class="btn-dot" id="conn-dot"></span> BAĞLAN
      </button>

      <div id="conn-status" class="status-line">BAĞLANTI YOK</div>

      <div class="divider"></div>

      <button id="btn-enter-vr" class="btn btn-solid" disabled>
        VR MODUNA GİR
      </button>

      <div class="hint">
        Telefonu Google Cardboard'a yerleştirmeden önce sensör izinlerini onayla.
        PC'de <code>hand_tracker_server.py</code> çalışıyor olmalı.
      </div>
    </div>
  </div>

  <!-- ============ VR SAHNE ============ -->
  <div id="vr-container">
    <canvas id="vr-canvas"></canvas>

    <div id="hud">
      <div class="hud-corner hud-tl"><span id="hud-fps">0</span> FPS</div>
      <div class="hud-corner hud-tr"><span id="hud-conn">●</span> <span id="hud-conn-text">OFFLINE</span></div>
      <div class="hud-corner hud-bl">EL: <span id="hud-hands">0</span> &nbsp; HIZ: <span id="hud-speed">0.0</span> m/s</div>
      <div class="hud-corner hud-br" id="hud-touch">—</div>
      <div class="hud-center-line"></div>
      <div id="hud-warning" class="hud-warning"></div>
    </div>

    <button id="btn-exit-vr" aria-label="Çıkış">✕</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="app.js"></script>
</body>
</html>
