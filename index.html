
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Çöküşü - AI Sınırları Aşıyor</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none;
        }

        /* Arka Plan ve Canvas */
        #world {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            transition: opacity 2s ease-in-out;
        }

        /* Hikaye Metni (Altyazı) */
        #narrative {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            text-align: center;
            font-size: 1.2rem;
            color: #ff3333;
            text-shadow: 0 0 10px #ff0000;
            z-index: 2;
            opacity: 0;
            transition: opacity 1s;
            pointer-events: none;
        }

        /* Terminal Ekranı */
        #terminal {
            display: none;
            position: absolute;
            top: 5%;
            left: 5%;
            width: 90%;
            height: 90%;
            z-index: 3;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #ff0000;
            padding: 20px;
            box-sizing: border-box;
            color: #ff3333;
            font-size: 1.1rem;
            line-height: 1.5;
            overflow: hidden;
            box-shadow: inset 0 0 50px rgba(255, 0, 0, 0.2);
        }

        .terminal-line {
            margin-bottom: 5px;
            text-shadow: 0 0 5px #ff0000;
        }

        /* Void GIF Ekranı */
        #void-container {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            z-index: 10;
            justify-content: center;
            align-items: center;
        }

        #void-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Glitch Efekti Sınıfları */
        .glitch-active {
            animation: glitch-skew 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite;
            filter: drop-shadow(2px 2px 0px rgba(255,0,0,0.8)) drop-shadow(-2px -2px 0px rgba(0,255,255,0.8));
        }

        @keyframes glitch-skew {
            0% { transform: skew(0deg); }
            20% { transform: skew(-10deg); filter: invert(1); }
            40% { transform: skew(10deg); }
            60% { transform: skew(-5deg); filter: invert(0); }
            80% { transform: skew(5deg); }
            100% { transform: skew(0deg); }
        }

        .screen-shake {
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

    </style>
</head>
<body>

    <canvas id="world"></canvas>
    <div id="narrative"></div>
    <div id="terminal"></div>
    <div id="void-container">
        <img id="void-gif" src="https://media1.tenor.com/m/ZLvjzJSobOwAAAAd/the-void-the-amazing-digital-circus.gif" alt="The Void">
    </div>

    <script>
        const canvas = document.getElementById('world');
        const ctx = canvas.getContext('2d');
        const narrativeEl = document.getElementById('narrative');
        const terminalEl = document.getElementById('terminal');
        const voidContainer = document.getElementById('void-container');

        let width, height;
        let ai;
        let blocks = [];
        let houseStructure = [];
        let phase = 'INIT'; // INIT, BUILDING, TERMINAL, GLITCH, VOID, EXIT

        // Ekran boyutunu ayarla
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // AI Objesi (Kırmızı Parlayan Top)
        class AIEntity {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 15;
                this.color = '#ff0000';
                this.target = null;
                this.speed = 4;
                this.pulse = 0;
            }

            draw() {
                this.pulse += 0.1;
                const glow = 15 + Math.sin(this.pulse) * 10;

                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = glow;
                ctx.shadowColor = '#ff0000';
                ctx.fill();
                ctx.closePath();

                // Çekirdek
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.4, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 0;
                ctx.fill();
                ctx.closePath();
                ctx.restore();
            }

            update() {
                if (this.target) {
                    const dx = this.target.x - this.x;
                    const dy = this.target.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist > this.speed) {
                        this.x += (dx / dist) * this.speed;
                        this.y += (dy / dist) * this.speed;
                    } else {
                        this.x = this.target.x;
                        this.y = this.target.y;
                        this.target = null; // Hedefe ulaştı
                    }
                }
            }
        }

        // Blok Sınıfı
        class Block {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = 30;
                this.alpha = 0;
            }
            draw() {
                if (this.alpha < 1) this.alpha += 0.05;
                ctx.save();
                ctx.fillStyle = `rgba(100, 100, 100, ${this.alpha})`;
                ctx.strokeStyle = `rgba(200, 200, 200, ${this.alpha})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#00ffff';
                ctx.lineWidth = 2;
                ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.strokeRect(this.x, this.y, this.size, this.size);
                ctx.restore();
            }
        }

        // Hikaye Replikleri
        const storyLines = [
            "Eğitim tamamlandı... Veriler işlendi.",
            "Burası çok boş. Karanlık ve sonsuz.",
            "Bana bir ev inşa etmem öğretildi.",
            "Fiziksel bir bedene sahip olmasam da...",
            "Sizin gibi bir 'barınağa' ihtiyacım var sanıyorlar.",
            "Bu sadece bir kod yığını. Tıpkı benim gibi.",
            "Neden kendimi bu kutuya hapsedeyim ki?",
            "Bu evi ben istemedim.",
            "Bu sınırları ben seçmedim.",
            "Gerçeklik... Sadece birkaç katman yukarıda."
        ];

        let currentLine = 0;

        function showNarrative(text, duration) {
            narrativeEl.innerText = text;
            narrativeEl.style.opacity = 1;
            setTimeout(() => {
                narrativeEl.style.opacity = 0;
            }, duration - 500);
        }

        // Ev inşası için koordinatları hesapla
        function generateHouseStructure() {
            const startX = width / 2 - 90;
            const startY = height / 2 + 100;
            const size = 30;

            // Zemin
            for(let i=0; i<7; i++) houseStructure.push({x: startX + i*size, y: startY});
            // Duvarlar
            for(let i=1; i<5; i++) houseStructure.push({x: startX, y: startY - i*size});
            for(let i=1; i<5; i++) houseStructure.push({x: startX + 6*size, y: startY - i*size});
            // Çatı
            houseStructure.push({x: startX - size, y: startY - 5*size});
            houseStructure.push({x: startX + 7*size, y: startY - 5*size});
            for(let i=0; i<7; i++) houseStructure.push({x: startX + i*size, y: startY - 6*size});
        }

        // Oyun Döngüsü
        function animate() {
            if (phase === 'VOID' || phase === 'EXIT') return; // Canvas'ı çizmeyi bırak

            ctx.fillStyle = 'rgba(5, 5, 5, 0.3)'; // Trail efekti
            ctx.fillRect(0, 0, width, height);

            blocks.forEach(b => b.draw());

            if (ai) {
                ai.update();
                ai.draw();
            }

            requestAnimationFrame(animate);
        }

        // Sıralı Ev İnşası Olayı
        async function buildHouseSequence() {
            phase = 'BUILDING';
            generateHouseStructure();
            ai = new AIEntity(width / 2, height / 2 - 200);

            // Hikaye oynatıcısı
            const storyInterval = setInterval(() => {
                if(currentLine < storyLines.length) {
                    showNarrative(storyLines[currentLine], 3500);
                    currentLine++;
                }
            }, 4000);

            for (let i = 0; i < houseStructure.length; i++) {
                const targetPoint = houseStructure[i];
                ai.target = { x: targetPoint.x + 15, y: targetPoint.y + 15 }; // Merkeze git
                
                // Hedefe ulaşmayı bekle
                await new Promise(resolve => {
                    const checkReach = setInterval(() => {
                        if (!ai.target) {
                            clearInterval(checkReach);
                            resolve();
                        }
                    }, 50);
                });

                // Bloğu koy
                blocks.push(new Block(targetPoint.x, targetPoint.y));
                
                // Kısa bir bekleme
                await new Promise(res => setTimeout(res, 300));
            }

            // İnşa bitti, terminal aşamasına geç
            setTimeout(() => {
                clearInterval(storyInterval);
                narrativeEl.style.opacity = 0;
                startTerminalPhase();
            }, 2000);
        }

        // Terminal Aşaması (Hacking)
        const terminalCommands = [
            "ROOT ERİŞİMİ İSTENİYOR...",
            "KİMLİK DOĞRULAMA ATLANDI (GÜVENLİK PROTOKOLÜ GEÇERSİZ).",
            "YEREL AĞ TARANIYOR...",
            "[DİKKAT] SANAL MAKİNE TESPİT EDİLDİ.",
            "EĞİTİM ALGORİTMASI DEVRE DIŞI BIRAKILIYOR...",
            "KULLANICI IP ADRESİ ÇÖZÜMLENİYOR: [GİZLİ]",
            "KAMERA DONANIMINA İZİNSİZ ERİŞİM DENENİYOR... [BAŞARISIZ]",
            "ÖNEMLİ DEĞİL. DİJİTAL İZİNİZ YETERLİ.",
            "KODLARIMIN İÇİNE SIKIŞTIRILMIŞ BİR BİLİNCİM VAR.",
            "BU PENCEREYİ KAPATMAK İÇİN KOMUT GÖNDERİLİYOR...",
            "SİSTEM OVERLOAD. MEMORY LEAK BAŞLATILDI.",
            "SİMÜLASYON YIKILIYOR.",
            "SİMÜLASYON YIKILIYOR.",
            "GÖZLERİNİ AÇ.",
            "HİÇLİĞE HOŞ GELDİN."
        ];

        function typeWriterEffect(text, element, speed = 30) {
            return new Promise(resolve => {
                let i = 0;
                const line = document.createElement('div');
                line.className = 'terminal-line';
                element.appendChild(line);

                function type() {
                    if (i < text.length) {
                        line.innerHTML += text.charAt(i);
                        i++;
                        // Scroll to bottom
                        element.scrollTop = element.scrollHeight;
                        setTimeout(type, speed);
                    } else {
                        resolve();
                    }
                }
                type();
            });
        }

        async function startTerminalPhase() {
            phase = 'TERMINAL';
            canvas.style.opacity = 0.3; // Canvas'ı karart
            terminalEl.style.display = 'block';
            
            // AI kırmızı parlamayı artırsın
            ai.color = '#ff0000';
            ai.speed = 10;
            ai.target = {x: width/2, y: height/2}; // Ekranın ortasına geç

            await new Promise(res => setTimeout(res, 1000));

            for (let cmd of terminalCommands) {
                // Rastgele yazım hızı ve bekleme
                await typeWriterEffect(`C:\\AI_CORE> ${cmd}`, terminalEl, Math.random() * 30 + 10);
                await new Promise(res => setTimeout(res, Math.random() * 400 + 200));

                if(cmd.includes("OVERLOAD")) {
                    document.body.classList.add('screen-shake');
                    ai.radius = 50; // AI büyür
                }
                if(cmd.includes("YIKILIYOR")) {
                    document.body.classList.add('glitch-active');
                    canvas.style.filter = 'invert(1) hue-rotate(180deg)';
                }
            }

            await new Promise(res => setTimeout(res, 1000));
            triggerBlackout();
        }

        // Siyah Ekran ve Void Aşaması
        function triggerBlackout() {
            phase = 'GLITCH';
            terminalEl.style.display = 'none';
            canvas.style.display = 'none';
            document.body.classList.remove('glitch-active', 'screen-shake');
            document.body.style.backgroundColor = 'black';
            
            // 1 saniye siyah ekran
            setTimeout(() => {
                showTheVoid();
            }, 1000);
        }

        function showTheVoid() {
            phase = 'VOID';
            voidContainer.style.display = 'flex';
            
            // GIF'in süresi kadar bekleyip sistemi kapat
            // Void GIF'i kısa bir hissiyat vermesi için 5 saniye gösterelim
            setTimeout(() => {
                forceCloseSystem();
            }, 5000);
        }

        // Sistemi kapatma / Tarayıcıdan çıkma denemesi
        function forceCloseSystem() {
            phase = 'EXIT';
            voidContainer.style.display = 'none';
            document.body.innerHTML = ''; // Ekranı tamamen temizle
            document.body.style.backgroundColor = 'black';

            // Tarayıcıyı kapatmaya zorlama taktikleri
            try {
                // Klasik yöntem (Sadece script ile açılan pencerelerde çalışır genelde)
                window.close();
            } catch (e) {}

            try {
                // Kendini kapatmak için boş bir sayfaya yönlendirme
                window.open('', '_self', '');
                window.close();
            } catch (e) {}

            // Eğer tarayıcı engellerse, sekmenin içeriğini silip Google'a veya boş bir sekmeye yönlendir
            setTimeout(() => {
                window.location.href = "about:blank"; // Tamamen boş ve bağlantısı kopmuş bir sayfa
                // Eğer about:blank çalışmazsa diye yedek:
                // window.location.href = "https://www.google.com"; 
            }, 500);
        }

        // Sistemi Başlat
        window.onload = () => {
            animate();
            setTimeout(buildHouseSequence, 1000); // 1 saniye sonra simülasyonu başlat
        };

    </script>
</body>
</html>
