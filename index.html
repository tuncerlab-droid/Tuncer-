<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Sahne - Kamera Düzenlemesi</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, cube;

        function init() {
            // Sahne oluşturma
            scene = new THREE.Scene();

            // Kamera Düzeltmesi: PerspectiveCamera(fov, aspect, near, far)
            // Aspect ratio dinamik olarak pencere boyutuna göre ayarlandı
            const aspect = window.innerWidth / window.innerHeight;
            camera = new THREE.PerspectiveCamera(75, aspect, 0.1, 1000);
            
            // Kamera pozisyonu: Objenin tam görülebilmesi için geri çekildi
            camera.position.set(0, 2, 5);

            // Renderer ayarları
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Örnek bir obje (Küp)
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshStandardMaterial({ color: 0x00ff00 });
            cube = new THREE.Mesh(geometry, material);
            scene.add(cube);

            // Işıklandırma
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(1, 1, 2).normalize();
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            // Kamera odağı: Kameranın küpe bakması sağlandı
            camera.lookAt(cube.position);

            window.addEventListener('resize', onWindowResize, false);
            animate();
        }

        function onWindowResize() {
            // Pencere boyutu değiştiğinde kameranın bozulmaması için
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Hafif rotasyon
            if (cube) {
                cube.rotation.x += 0.01;
                cube.rotation.y += 0.01;
            }

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
