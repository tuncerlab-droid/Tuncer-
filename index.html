<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tuncer AR v25.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            background: #000; 
        }
        
        /* Kamera Videosu En Altta */
        #ar-video {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover; z-index: 0;
        }

        /* Üstüne Binicek Olan UI */
        #ui-container { 
            position: absolute; inset: 0; pointer-events: none; z-index: 20; 
            display: flex; flex-direction: column; justify-content: space-between; padding: 20px; 
        }
        
        .hud-panel { 
            background: rgba(0, 20, 40, 0.7); border-left: 4px solid #00e5ff; 
            padding: 15px; border-radius: 10px; color: #00e5ff; font-family: monospace; 
            font-size: 11px; align-self: flex-end; backdrop-filter: blur(5px); 
            text-transform: uppercase;
        }
        
        #start-screen { 
            position: fixed; inset: 0; background: radial-gradient(circle, #001a33, #000); 
            z-index: 1000; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; color: white; text-align: center;
        }
        
        #btn-activate { 
            background: transparent; color: #00e5ff; font-weight: 900; padding: 20px 50px; 
            border: 2px solid #00e5ff; border-radius: 4px; cursor: pointer; font-size: 18px; 
            text-transform: uppercase; letter-spacing: 3px; box-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
            pointer-events: auto;
        }

        #target-hint { 
            align-self: center; margin-bottom: 50px; background: rgba(0, 229, 255, 0.1); 
            padding: 10px 20px; border-radius: 4px; color: #00e5ff; 
            border: 1px solid rgba(0, 229, 255, 0.4); font-size: 10px;
        }
        
        /* 3D Sahne Ortada */
        canvas { 
            position: absolute; top: 0; left: 0; z-index: 10; 
            pointer-events: none; /* Tıklamaları videoya veya UI'ya geçirir */
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js"
            }
        }
    </script>
</head>
<body>

    <video id="ar-video" autoplay playsinline muted></video>

    <div id="start-screen">
        <h1 style="font-size: 32px; font-weight: 900; letter-spacing: 2px;">TUNCER <span style="color:#00e5ff;">CORE</span></h1>
        <p style="color:#666; font-size: 10px; margin-bottom: 30px;">V25.0 - DIRECT CAMERA LINK</p>
        <button id="btn-activate">SİSTEMİ BAŞLAT</button>
    </div>

    <div id="ui-container" style="display: none;">
        <div class="hud-panel">
            SİSTEM: <span id="sys-status" style="color:#fff;">ONLINE</span><br>
            KAMERA: <span id="cam-status" style="color:#00ffcc;">AKTIF</span><br>
            MOD: <span id="interact-mode" style="color:#fff;">NAVIGATION</span><br>
            KOMUT: <span id="voice-cmd" style="color:#fff;">---</span>
        </div>
        <div id="target-hint">SENSORLER HAZIRLANIYOR...</div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, reticle;
        let objects = [], selectedObject = null;
        let fingerCursor;
        let isTouching = false;
        let initialPinchDistance = 0;
        let initialScale = 1;

        async function startCamera() {
            const video = document.getElementById('ar-video');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                video.srcObject = stream;
                return true;
            } catch (err) {
                console.error("Kamera erişimi reddedildi:", err);
                alert("Kamera izni verilmediği için AR başlatılamaz.");
                return false;
            }
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 0); 
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.5));
            const pLight = new THREE.PointLight(0x00e5ff, 2, 50);
            pLight.position.set(0, 10, 10);
            scene.add(pLight);

            // Sanal İmleç
            fingerCursor = new THREE.Mesh(
                new THREE.RingGeometry(0.02, 0.025, 32),
                new THREE.MeshBasicMaterial({ color: 0x00e5ff, side: THREE.DoubleSide })
            );
            fingerCursor.visible = false;
            scene.add(fingerCursor);

            // Başlat Butonu
            document.getElementById('btn-activate').addEventListener('click', async () => {
                const camReady = await startCamera();
                if (camReady) {
                    document.getElementById('start-screen').style.display = 'none';
                    document.getElementById('ui-container').style.display = 'flex';
                    initVoice();
                    setupControls();
                    animate();
                }
            });
        }

        function setupControls() {
            // Ekrana dokunma = AR El Takibi Simülasyonu
            window.addEventListener('touchstart', (e) => {
                isTouching = true;
                fingerCursor.visible = true;
                const touch = e.touches[0];
                updateCursorPos(touch);

                if (e.touches.length === 1) {
                    checkObjectSelection();
                } else if (e.touches.length === 2 && selectedObject) {
                    initialPinchDistance = Math.hypot(
                        e.touches[0].pageX - e.touches[1].pageX,
                        e.touches[0].pageY - e.touches[1].pageY
                    );
                    initialScale = selectedObject.scale.x;
                }
            });

            window.addEventListener('touchmove', (e) => {
                const touch = e.touches[0];
                updateCursorPos(touch);

                if (e.touches.length === 1 && selectedObject) {
                    // Objeyi Parmağın Olduğu Yere Taşı
                    const vector = new THREE.Vector3(
                        (touch.clientX / window.innerWidth) * 2 - 1,
                        -(touch.clientY / window.innerHeight) * 2 + 1,
                        0.5
                    );
                    vector.unproject(camera);
                    const dir = vector.sub(camera.position).normalize();
                    const distance = 2; // Sabit derinlik
                    selectedObject.position.copy(camera.position).add(dir.multiplyScalar(distance));
                    document.getElementById('interact-mode').innerText = "MANIPULATION";
                } else if (e.touches.length === 2 && selectedObject) {
                    // İki parmakla büyütme
                    const currentDist = Math.hypot(
                        e.touches[0].pageX - e.touches[1].pageX,
                        e.touches[0].pageY - e.touches[1].pageY
                    );
                    const scale = initialScale * (currentDist / initialPinchDistance);
                    selectedObject.scale.set(scale, scale, scale);
                }
            });

            window.addEventListener('touchend', () => {
                isTouching = false;
                selectedObject = null;
                fingerCursor.visible = false;
                document.getElementById('interact-mode').innerText = "NAVIGATION";
            });
        }

        function updateCursorPos(touch) {
            const vector = new THREE.Vector3(
                (touch.clientX / window.innerWidth) * 2 - 1,
                -(touch.clientY / window.innerHeight) * 2 + 1,
                0.5
            );
            vector.unproject(camera);
            const dir = vector.sub(camera.position).normalize();
            fingerCursor.position.copy(camera.position).add(dir.multiplyScalar(1.2));
            fingerCursor.lookAt(camera.position);
        }

        function checkObjectSelection() {
            const mouse = new THREE.Vector2(
                (fingerCursor.position.x / window.innerWidth) * 2 - 1,
                -(fingerCursor.position.y / window.innerHeight) * 2 + 1
            );
            // Basit mesafe kontrolü (Raycaster yerine daha hızlı)
            for (let obj of objects) {
                if (obj.position.distanceTo(fingerCursor.position) < 0.5) {
                    selectedObject = obj;
                    break;
                }
            }
            if (!selectedObject) {
                spawnObject(); // Boşa tıklandığında obje yarat
            }
        }

        function spawnObject() {
            const geo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0x00e5ff, metalness: 0.8, roughness: 0.2,
                transparent: true, opacity: 0.8
            });
            const mesh = new THREE.Mesh(geo, mat);
            
            // Kameranın önüne koy
            const vector = new THREE.Vector3(0, 0, -2);
            vector.applyQuaternion(camera.quaternion);
            mesh.position.copy(camera.position).add(vector);
            
            scene.add(mesh);
            objects.push(mesh);
        }

        function initVoice() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) return;
            const rec = new Speech();
            rec.lang = 'tr-TR';
            rec.continuous = true;
            rec.onresult = (e) => {
                const cmd = e.results[e.results.length - 1][0].transcript.toLowerCase();
                document.getElementById('voice-cmd').innerText = cmd.toUpperCase();
                if (cmd.includes("sil")) {
                    objects.forEach(o => scene.remove(o));
                    objects = [];
                }
                if (cmd.includes("mavi")) objects.forEach(o => o.material.color.setHex(0x00e5ff));
                if (cmd.includes("kırmızı")) objects.forEach(o => o.material.color.setHex(0xff3366));
            };
            try { rec.start(); } catch(e) {}
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Nesneleri hafifçe döndür (Hologram efekti)
            objects.forEach(obj => {
                if (obj !== selectedObject) {
                    obj.rotation.y += 0.01;
                }
            });

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
