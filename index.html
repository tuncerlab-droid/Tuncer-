<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUNCER CORE v11.0 | NATIVE ML</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500;700&display=swap');

        :root {
            --glow-cyan: #0891b2;
            --glow-orange: #f59e0b;
            --hud-bg: rgba(2, 6, 23, 0.98);
        }

        body {
            background-color: #000;
            color: var(--glow-cyan);
            font-family: 'JetBrains+Mono', monospace;
            overflow: hidden;
            margin: 0;
            height: 100vh;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }

        /* UI FX */
        .glass-panel {
            background: var(--hud-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(8, 145, 178, 0.3);
            box-shadow: inset 0 0 20px rgba(8, 145, 178, 0.1);
        }

        .arc-reactor {
            position: relative; width: 120px; height: 120px; border-radius: 50%;
            border: 2px solid rgba(8, 145, 178, 0.4); display: flex; align-items: center; justify-content: center;
            cursor: pointer; overflow: hidden;
        }

        .reactor-ring {
            position: absolute; inset: 0; border: 4px solid transparent;
            border-top-color: var(--glow-cyan); border-radius: 50%;
            animation: spin 3s linear infinite;
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .core-pulse {
            width: 40px; height: 40px; border-radius: 50%;
            background: var(--glow-cyan);
            box-shadow: 0 0 30px var(--glow-cyan);
            transition: all 0.5s ease;
        }

        .listening .core-pulse { background: #fff; box-shadow: 0 0 50px #fff; transform: scale(1.2); }
        .processing .core-pulse { background: var(--glow-orange); box-shadow: 0 0 50px var(--glow-orange); animation: heartbeat 0.8s infinite; }

        @keyframes heartbeat { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--glow-cyan); }
    </style>
</head>
<body class="flex flex-col p-4">

    <!-- HEADER HUD -->
    <header class="flex justify-between items-center glass-panel p-5 rounded-3xl mb-6 border-b-2 border-cyan-500/50">
        <div>
            <h1 class="orbitron text-2xl font-black text-white tracking-widest">TUNCER_CORE <span class="text-orange-500">v11.0</span></h1>
            <div class="flex gap-3 mt-1 text-[10px]">
                <span class="text-green-400 font-bold tracking-tighter">● NATIVE_ENGINE_V1</span>
                <span class="text-cyan-600">MEM: 512GB_VIRTUAL</span>
            </div>
        </div>
        <div class="text-right">
            <div id="status-tag" class="text-[10px] bg-red-950/50 border border-red-500 text-red-500 px-3 py-1 rounded-full orbitron">ENGINE_LOCKED</div>
        </div>
    </header>

    <!-- CHAT CONSOLE -->
    <main id="console" class="flex-1 overflow-y-auto custom-scroll space-y-6 px-2 mb-6">
        <div class="text-center opacity-20 text-[9px] uppercase tracking-[0.5em] py-10">Neural Synapse Initialized - Waiting for "Uyan" command</div>
    </main>

    <!-- CONTROL UNIT -->
    <footer class="flex flex-col items-center gap-6">
        <div class="flex gap-4">
            <button onclick="forceWake()" class="px-6 py-2 border border-cyan-900 rounded-full text-[10px] text-cyan-500 hover:bg-cyan-900/30">MANUEL_UYANDIR</button>
            <button onclick="toggleVision()" class="px-6 py-2 border border-orange-900 rounded-full text-[10px] text-orange-500 hover:bg-orange-900/30">VİZYON_AÇ</button>
        </div>

        <div id="reactor-container" onclick="toggleListening()" class="arc-reactor">
            <div class="reactor-ring"></div>
            <div class="reactor-ring" style="animation-duration: 2s; opacity: 0.5; transform: rotate(120deg);"></div>
            <div id="core-node" class="core-pulse"></div>
        </div>
        
        <div id="mic-label" class="text-[9px] opacity-40 uppercase tracking-[0.6em]">Aural Sensor Offline</div>
    </footer>

    <script>
        // --- TUNCER ML NATIVE LIBRARY (Sıfırdan Yapay Zeka Kütüphanesi) ---
        const TuncerML = {
            memory: {
                patterns: [
                    { keys: ['selam', 'merhaba', 'uyan'], responses: ['Sistem aktif patron. Nöral ağlar senkronize.', 'Giriş onaylandı. Hoş geldiniz Ahmet Bey.', 'Tuncer Core hazır. Emrinizdeyim.'] },
                    { keys: ['kimsin', 'ismin', 'tanıt'], responses: ['Ben Tuncer Core v11.0. Tamamen yerel, internetten bağımsız bir yapay zekayım.', 'Ahmet Tuncer tarafından geliştirilen Native-ML motoruyum.'] },
                    { keys: ['nasılsın', 'durum'], responses: ['Biyometrik verilerim stabil, işlemcim soğuk ve hazırım.', 'Tüm mantık devrelerim %100 kapasiteyle çalışıyor.'] },
                    { keys: ['hafıza', 'gb', 'kapasite'], responses: ['Sınırsız bir sanal bellek alanına sahibim patron. Verileri anlık işliyorum.', 'Nöral ağlarım yaklaşık 512 GB sanal veriyi tarayabiliyor.'] },
                    { keys: ['elon', 'musk', 'tesla'], responses: ['Elon Musk teknoloji dünyasının öncüsü ama bu çekirdeği Ahmet Tuncer yazdı.', 'Tesla ve SpaceX verileri kütüphanemde mevcut. Mühendislik harikaları.'] },
                    { keys: ['topladı', 'yaptı', 'kodladı'], responses: ['Bu karmaşık sinir ağını Ahmet Tuncer bir araya getirdi.', 'Mimari Ahmet Tuncer imzalı.'] }
                ],
                fillers: ['Anlıyorum patron.', 'Analiz ediliyor...', 'Mühendislik verileri taranıyor.', 'Bu konuda haklısınız.'],
                conjunctions: [' Ayrıca, ', ' Ve ek olarak, ', '. Şunu da belirtmeliyim ki; ']
            },

            // Cümle Oluşturma Algoritması
            generate: function(input) {
                const text = input.toLowerCase();
                let results = [];

                // 1. Anahtar kelimeleri ve niyetleri bul
                this.memory.patterns.forEach(p => {
                    if (p.keys.some(k => text.includes(k))) {
                        results.push(p.responses[Math.floor(Math.random() * p.responses.length)]);
                    }
                });

                // 2. Eğer sonuç yoksa felsefi/teknik çıkarım yap
                if (results.length === 0) {
                    return "Bu veri yerel nöral ağlarımda yeni bir düğüm oluşturuyor patron. Analizime göre: " + 
                           this.memory.fillers[Math.floor(Math.random() * this.memory.fillers.length)];
                }

                // 3. Birden fazla sonucu birleştirerek yeni cümle kur (Papağanlaşmayı engeller)
                if (results.length > 1) {
                    return results[0] + this.memory.conjunctions[Math.floor(Math.random() * this.memory.conjunctions.length)] + results[1];
                }

                return results[0];
            }
        };

        // --- UI LOGIC ---
        window.isSystemActive = false;

        function updateLog(msg, role = 'core') {
            const container = document.getElementById('console');
            const div = document.createElement('div');
            div.className = `flex flex-col ${role === 'user' ? 'items-end' : 'items-start'} mb-6`;
            
            const content = `
                <span class="text-[8px] opacity-30 mb-1 tracking-widest">${role === 'user' ? 'PATRON' : 'TUNCER_CORE'}</span>
                <div class="glass-panel px-5 py-3 rounded-2xl max-w-[85%] text-sm ${role === 'user' ? 'border-orange-500/50 text-white' : 'border-cyan-500/50 text-cyan-100'}">
                    ${msg}
                </div>
            `;
            div.innerHTML = content;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function speak(text) {
            const s = new SpeechSynthesisUtterance(text);
            s.lang = 'tr-TR'; s.pitch = 0.8; s.rate = 1;
            window.speechSynthesis.speak(s);
        }

        function forceWake() {
            window.isSystemActive = true;
            document.getElementById('status-tag').innerText = "ENGINE_ACTIVE";
            document.getElementById('status-tag').className = "text-[10px] bg-green-950/50 border border-green-500 text-green-500 px-3 py-1 rounded-full orbitron";
            document.getElementById('mic-label').innerText = "Aural Sensor Active";
            updateLog("Nöral ağlar ve yerel kütüphane yüklendi. Sizi dinliyorum patron.");
            speak("Sistem aktif patron. Hoş geldiniz.");
        }

        async function processInput(input) {
            if(!input) return;
            updateLog(input, 'user');

            if(!window.isSystemActive && !input.toLowerCase().includes("uyan")) {
                speak("Sistem kilitli patron.");
                return;
            }

            if(input.toLowerCase().includes("uyan")) { forceWake(); return; }

            // Native ML Engine çalışıyor
            document.getElementById('reactor-container').classList.add('processing');
            
            setTimeout(() => {
                const response = TuncerML.generate(input);
                updateLog(response, 'core');
                speak(response);
                document.getElementById('reactor-container').classList.remove('processing');
            }, 600);
        }

        function toggleListening() {
            const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!Rec) return;
            const r = new Rec(); r.lang = 'tr-TR';
            r.onstart = () => document.getElementById('reactor-container').classList.add('listening');
            r.onend = () => document.getElementById('reactor-container').classList.remove('listening');
            r.onresult = (e) => processInput(e.results[0][0].transcript);
            r.start();
        }

        function toggleVision() {
            updateLog("Vizyon modülü için donanım taraması yapılıyor...", "core");
            speak("Görüntüleme sistemleri henüz bu çekirdek tipinde tanımlanmadı.");
        }
    </script>
</body>
</html>
