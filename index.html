<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNCER HOLO - AR Modelleme v2.4 (Fix Depth & Drift)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.7.0/build/index.module.js",
                "three-bvh-csg": "https://unpkg.com/three-bvh-csg@0.0.16/build/index.module.js"
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Share Tech Mono', monospace;
            color: #0ff;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        #video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 1;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            pointer-events: none;
        }

        .hud-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 20;
            pointer-events: none;
        }

        .hud-panel {
            pointer-events: auto;
            background: rgba(0, 20, 30, 0.7);
            border: 1px solid #0ff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            backdrop-filter: blur(4px);
        }

        .btn-holo {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #0ff;
            color: #0ff;
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 10px;
        }
        .btn-holo:active {
            background: #0ff;
            color: #000;
        }

        #log-console {
            scrollbar-width: none;
            pointer-events: none;
        }

        .scanning-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 15px #0ff;
            top: 0;
            z-index: 15;
            animation: scan 3s linear infinite;
        }
        @keyframes scan {
            0% { top: 0; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
    </style>
</head>
<body>

    <video id="video-background" autoplay playsinline muted></video>
    <div class="scanning-line"></div>
    <div id="canvas-container"></div>

    <div class="hud-overlay flex flex-col justify-between p-4">
        <div class="flex justify-between items-start w-full">
            <div class="hud-panel p-2 rounded text-sm w-1/2 md:w-1/3">
                <div class="font-bold text-base mb-1 tracking-widest text-white drop-shadow-[0_0_5px_#0ff]">TUNCER WEB OS v2.4</div>
                <div id="sys-status" class="text-[10px] text-green-400">TARAMA: STABİL</div>
                <div id="hand-status" class="text-[10px] text-yellow-400">DERİNLİK: KİLİTLİ</div>
            </div>

            <div class="hud-panel p-2 rounded text-center">
                <div class="text-[10px] text-gray-300 uppercase">Yüzey Takibi</div>
                <div id="surface-status" class="text-[10px] font-bold text-cyan-400">TARANIYOR...</div>
            </div>
        </div>

        <div class="flex justify-between items-end w-full gap-2">
            <div class="hud-panel p-2 rounded h-24 w-1/2 overflow-hidden flex flex-col justify-end text-[9px]" id="log-console">
                <div class="text-cyan-600">> El takibi optimize edildi.</div>
            </div>

            <div class="hud-panel p-2 rounded grid grid-cols-2 gap-1 w-1/2">
                <button id="btn-cube" class="btn-holo p-1 rounded">KÜP</button>
                <button id="btn-hole" class="btn-holo p-1 rounded border-red-500 text-red-500">DELİK</button>
                <button id="btn-merge" class="btn-holo p-1 rounded border-yellow-500 text-yellow-500">BİRLEŞTİR</button>
                <button id="btn-delete" class="btn-holo p-1 rounded text-red-400">SİL</button>
            </div>
        </div>
    </div>

<script type="module">
import * as THREE from 'three';
import { SUBTRACTION, Brush, Evaluator } from 'three-bvh-csg';

const video = document.getElementById('video-background');
const logConsole = document.getElementById('log-console');
const sysStatus = document.getElementById('sys-status');
const surfaceStatus = document.getElementById('surface-status');

let scene, camera, renderer, hands;
let worldGroup; 
let objects = [], holeObjects = [], selectedObject = null;
let handCursor;
let isPinching = false;
let pinchStartPos = new THREE.Vector3(), objectStartPos = new THREE.Vector3();
let initialAlpha = null;

// SLAM & Tracking Sabitleri
let lastUpdate = performance.now();
let velocity = new THREE.Vector3(0, 0, 0);
let currentZDepth = 1.0; 
let targetZDepth = 1.0;
let initialHandScale = 0;

function log(msg, err = false) {
    const d = document.createElement('div');
    d.textContent = `> ${msg}`;
    d.className = err ? 'text-red-500' : 'text-cyan-400';
    logConsole.appendChild(d);
    if(logConsole.childNodes.length > 5) logConsole.removeChild(logConsole.firstChild);
}

async function setupCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        video.srcObject = stream;
        return new Promise(r => video.onloadedmetadata = () => { video.play(); r(stream); });
    } catch (e) {
        alert("Kamera hatası: " + e.message);
        throw e;
    }
}

function initThree() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 1000);
    
    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    worldGroup = new THREE.Group();
    scene.add(worldGroup);

    scene.add(new THREE.AmbientLight(0xffffff, 1.8));
    const pl = new THREE.PointLight(0x00ffff, 2);
    pl.position.set(2, 5, 2);
    scene.add(pl);

    // Takip İmleci
    handCursor = new THREE.Mesh(
        new THREE.SphereGeometry(0.025, 16, 16),
        new THREE.MeshBasicMaterial({ color: 0x00ffff, depthTest: false, transparent: true, opacity: 0.8 })
    );
    scene.add(handCursor);

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
}

async function initAI() {
    hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
    hands.setOptions({ 
        maxNumHands: 2, 
        modelComplexity: 1, 
        minDetectionConfidence: 0.7, 
        minTrackingConfidence: 0.7 
    });
    hands.onResults(onResults);
    const loop = async () => { if (!video.paused) await hands.send({ image: video }); requestAnimationFrame(loop); };
    loop();
}

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function onResults(results) {
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const hand = results.multiHandLandmarks[0];
        const indexTip = hand[8];
        const thumbTip = hand[4];
        const wrist = hand[0];

        // 2D Ekran Koordinatları
        mouse.x = (indexTip.x * 2) - 1;
        mouse.y = -(indexTip.y * 2) + 1;
        raycaster.setFromCamera(mouse, camera);

        // --- DERİNLİK KONTROLÜ (DÜZELTİLDİ) ---
        const currentHandScale = Math.hypot(indexTip.x - wrist.x, indexTip.y - wrist.y);
        
        // Tutma hareketi başladığında el boyutunu kaydet
        const pinchDist = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y);
        
        if (pinchDist < 0.05) {
            if (!isPinching) { 
                isPinching = true; 
                initialHandScale = currentHandScale; // Derinlik referans noktası
                handCursor.material.color.set(0xff0000); 
                startGrab(); 
            } else {
                // Sadece tutarken derinliği değiştir (İleri-geri itme/çekme)
                const scaleDiff = currentHandScale / initialHandScale;
                // Elin boyutu %10'dan fazla değişirse derinliği güncelle
                if(Math.abs(1 - scaleDiff) > 0.05) {
                    targetZDepth = THREE.MathUtils.clamp(targetZDepth / scaleDiff, 0.3, 5.0);
                    initialHandScale = currentHandScale; // Yeni referans
                }
                updateGrab();
            }
        } else if (isPinching) { 
            isPinching = false; 
            handCursor.material.color.set(0x00ffff); 
            endGrab(); 
        }

        // Pürüzsüz imleç hareketi
        currentZDepth = THREE.MathUtils.lerp(currentZDepth, targetZDepth, 0.1);
        raycaster.ray.at(currentZDepth, handCursor.position);

        // İki el ile rotasyon
        if (results.multiHandLandmarks.length > 1 && selectedObject) {
            const p1 = hand[8], p2 = results.multiHandLandmarks[1][8];
            const a = Math.atan2(p2.y - p1.y, p2.x - p1.x);
            if (this.lastA) selectedObject.rotation.y += (a - this.lastA) * 2;
            this.lastA = a;
        } else { this.lastA = null; }
    }
}

function startGrab() {
    const hits = raycaster.intersectObjects([...objects, ...holeObjects]);
    if (hits.length > 0) {
        selectedObject = hits[0].object;
        objectStartPos.copy(selectedObject.position);
        // DragPlane yerine doğrudan elin uzaydaki konum farkını alacağız
        pinchStartPos.copy(handCursor.position);
    }
}

function updateGrab() {
    if (selectedObject) {
        const moveDelta = new THREE.Vector3().subVectors(handCursor.position, pinchStartPos);
        selectedObject.position.copy(objectStartPos).add(moveDelta);
    }
}

function endGrab() { selectedObject = null; }

function addObj(isHole = false) {
    const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(0.3, 0.3, 0.3),
        new THREE.MeshStandardMaterial({ 
            color: isHole ? 0xff3333 : 0x00aaff, 
            transparent: true, 
            opacity: isHole ? 0.6 : 0.9, 
            metalness: 0.4, 
            roughness: 0.2 
        })
    );
    
    // Nesneyi kameranın baktığı yöne, o anki derinliğe koy
    const fw = new THREE.Vector3(0, 0, -currentZDepth).applyQuaternion(camera.quaternion);
    mesh.position.copy(camera.position).add(fw);
    
    worldGroup.add(mesh);
    if (isHole) holeObjects.push(mesh); else objects.push(mesh);
    log(isHole ? "Negatif katman eklendi." : "Yeni blok oluşturuldu.");
}

function merge() {
    if (objects.length === 0 || holeObjects.length === 0) return;
    try {
        const ev = new Evaluator();
        let base = objects[objects.length - 1];
        let bB = new Brush(base.geometry, base.material);
        bB.position.copy(base.position); bB.rotation.copy(base.rotation); bB.scale.copy(base.scale); bB.updateMatrixWorld();
        
        holeObjects.forEach(h => {
            const hB = new Brush(h.geometry, h.material);
            hB.position.copy(h.position); hB.rotation.copy(h.rotation); hB.scale.copy(h.scale); hB.updateMatrixWorld();
            bB = ev.evaluate(bB, hB, SUBTRACTION);
            worldGroup.remove(h);
        });
        
        worldGroup.remove(base);
        const res = new THREE.Mesh(bB.geometry, bB.material);
        res.position.copy(bB.position); res.rotation.copy(bB.rotation); res.scale.copy(bB.scale);
        worldGroup.add(res);
        objects = [res]; holeObjects = [];
        log("Hologram birleştirildi.");
    } catch(e) { log("CSG Hatası!", true); }
}

function initSensors() {
    const startSensors = () => {
        window.addEventListener('deviceorientation', (e) => {
            if (initialAlpha === null) initialAlpha = e.alpha;
            const a = THREE.MathUtils.degToRad(e.alpha - initialAlpha);
            const b = THREE.MathUtils.degToRad(e.beta);
            const g = THREE.MathUtils.degToRad(e.gamma);
            camera.rotation.set(b, a, -g, 'YXZ');
        });

        window.addEventListener('devicemotion', (e) => {
            const acc = e.acceleration;
            if (!acc || !acc.x) return;
            const now = performance.now();
            const dt = (now - lastUpdate) / 1000;
            lastUpdate = now;

            // Düşük ivmeli hareketleri yok say (Drift koruması)
            const threshold = 0.15;
            if(Math.abs(acc.x) < threshold) acc.x = 0;
            if(Math.abs(acc.y) < threshold) acc.y = 0;
            if(Math.abs(acc.z) < threshold) acc.z = 0;

            velocity.x = (velocity.x + acc.x * dt) * 0.9;
            velocity.y = (velocity.y + acc.y * dt) * 0.9;
            velocity.z = (velocity.z + acc.z * dt) * 0.9;

            const move = velocity.clone().multiplyScalar(dt);
            move.applyQuaternion(camera.quaternion);
            camera.position.add(move);
        });
    };

    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        const b = document.createElement('button');
        b.className = "fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-[100] bg-cyan-600 p-8 rounded-full font-bold text-white shadow-[0_0_30px_#0ff] border-2 border-cyan-300";
        b.textContent = "HOLO OS BAŞLAT";
        b.onclick = () => {
            DeviceOrientationEvent.requestPermission().then(r => { if (r == 'granted') { startSensors(); b.remove(); } });
        };
        document.body.appendChild(b);
    } else {
        startSensors();
    }
}

function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}

window.addEventListener('load', async () => {
    try {
        await setupCamera();
        initThree();
        await initAI();
        initSensors();
    } catch (e) { log("Yükleme başarısız."); }
});

document.getElementById('btn-cube').onclick = () => addObj(false);
document.getElementById('btn-hole').onclick = () => addObj(true);
document.getElementById('btn-merge').onclick = merge;
document.getElementById('btn-delete').onclick = () => {
    const t = objects.length > 0 ? objects.pop() : (holeObjects.length > 0 ? holeObjects.pop() : null);
    if(t) worldGroup.remove(t);
};
</script>
</body>
</html>
