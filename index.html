<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tuncer AI - Sohbet Arayüzü</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #343541;
            color: #ececf1;
            margin: 0;
            overflow: hidden;
        }
        .chat-container { height: calc(100vh - 140px); scroll-behavior: smooth; }
        .message-entry { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>

    <!-- Hata Yakalama -->
    <script>
        window.EksikDosyalar = [];
        function dosyaHatasi(ad) { window.EksikDosyalar.push(ad); }
    </script>

    <!-- JS Dosyalarını Yükle -->
    <script src="tuncer2026.js" onerror="dosyaHatasi('tuncer2026.js')"></script>
    <script src="tuncer2023.js" onerror="dosyaHatasi('tuncer2023.js')"></script>
</head>
<body class="flex h-screen w-full">

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-[#202123] transition-transform duration-300 -translate-x-full md:translate-x-0 flex flex-col md:relative h-full border-r border-white/5">
        <div class="p-3">
            <button onclick="location.reload()" class="flex items-center gap-3 w-full border border-white/20 rounded-md p-3 text-sm hover:bg-white/5 transition-colors">
                <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" class="w-4 h-4"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Yeni Sohbet
            </button>
        </div>
        <div class="flex-1 px-3 py-2 text-xs text-gray-500 font-medium">Sohbet Geçmişi Temiz</div>
        <div class="p-4 border-t border-white/10 text-sm text-gray-300 flex items-center gap-2">
            <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center font-bold text-white text-xs">AT</div>
            Ahmet Tuncer
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full relative">
        <!-- Hata Uyarısı -->
        <div id="error-box" class="hidden bg-orange-600/90 text-white p-2 text-center text-xs z-50"></div>

        <header class="h-14 flex items-center justify-between px-4 border-b border-white/10 bg-[#343541]">
            <button id="menu-btn" class="md:hidden p-2 text-gray-400">
                <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" class="w-6 h-6"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <select id="model-select" class="bg-[#202123] text-white border border-gray-600 text-xs rounded p-2 outline-none">
                <option value="2026">Tuncer 2026 (Global)</option>
                <option value="2023">Tuncer 2023 (Global)</option>
            </select>
            <div class="w-6 md:hidden"></div>
        </header>

        <div id="chat-viewport" class="chat-container overflow-y-auto w-full pb-32">
            <div class="w-full border-b border-black/10 bg-[#444654] message-entry">
                <div class="max-w-3xl mx-auto flex gap-4 p-6">
                    <div class="w-8 h-8 rounded-sm bg-emerald-600 flex-shrink-0 flex items-center justify-center font-bold text-white text-xs">AI</div>
                    <p class="text-gray-200">Merhaba, class gereksinimi kaldırıldı. JS dosyalarındaki global fonksiyonları kullanabilirim.</p>
                </div>
            </div>
        </div>

        <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-[#343541] pt-6 px-4 pb-6">
            <div class="max-w-3xl mx-auto relative flex items-center bg-[#40414F] border border-gray-600 rounded-xl shadow-xl">
                <textarea id="chat-input" rows="1" placeholder="Mesaj yazın..." class="w-full py-4 pl-4 pr-12 bg-transparent text-white border-0 outline-none resize-none overflow-y-auto"></textarea>
                <button id="send-btn" class="absolute right-3 p-2 text-gray-400 hover:text-white transition">
                    <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" class="w-5 h-5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </main>

    <div id="overlay" class="fixed inset-0 bg-black/50 z-40 hidden"></div>

    <script>
        const input = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const viewport = document.getElementById('chat-viewport');
        const modelSelect = document.getElementById('model-select');
        const errorBox = document.getElementById('error-box');

        // Sayfa yüklenince dosya kontrolü
        window.onload = () => {
            if (window.EksikDosyalar.length > 0) {
                errorBox.innerText = "Bulunamayan dosyalar: " + window.EksikDosyalar.join(', ');
                errorBox.classList.remove('hidden');
            }
        };

        function addMessage(role, text) {
            const isAI = role === 'ai';
            const div = document.createElement('div');
            div.className = `w-full border-b border-black/10 message-entry ${isAI ? 'bg-[#444654]' : ''}`;
            div.innerHTML = `
                <div class="max-w-3xl mx-auto flex gap-4 p-6">
                    <div class="w-8 h-8 rounded-sm ${isAI ? 'bg-emerald-600' : 'bg-indigo-600'} flex-shrink-0 flex items-center justify-center font-bold text-white text-xs">
                        ${isAI ? 'AI' : 'U'}
                    </div>
                    <div class="flex-1 text-gray-200 whitespace-pre-wrap">${text}</div>
                </div>
            `;
            viewport.appendChild(div);
            viewport.scrollTo(0, viewport.scrollHeight);
        }

        async function onSend() {
            const msg = input.value.trim();
            if (!msg) return;

            addMessage('user', msg);
            input.value = '';
            input.style.height = 'auto';

            const model = modelSelect.value;
            let response = "Hata oluştu.";

            try {
                if (model === "2026") {
                    // tuncer2026.js içindeki 'konus' veya benzeri fonksiyonu çağırıyoruz
                    // Eğer dosya içindeki fonksiyonun adı farklıysa (örn: cevapVer), burayı ona göre güncelle.
                    if (typeof window.konus === 'function') {
                        response = await window.konus(msg);
                    } else if (typeof window.tuncerKonus === 'function') {
                        response = await window.tuncerKonus(msg);
                    } else {
                        response = "HATA: tuncer2026.js yüklendi ama içinde 'konus' fonksiyonu bulunamadı.";
                    }
                } else {
                    // tuncer2023.js için de benzer mantık
                    if (typeof window.konus2023 === 'function') {
                        response = await window.konus2023(msg);
                    } else {
                        response = "HATA: tuncer2023.js içinde 'konus2023' fonksiyonu bulunamadı.";
                    }
                }
            } catch (err) {
                response = "İşlem hatası: " + err.message;
            }

            addMessage('ai', response);
        }

        sendBtn.onclick = onSend;
        input.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); onSend(); } };
        
        // Mobil Menü
        document.getElementById('menu-btn').onclick = () => {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('overlay').classList.toggle('hidden');
        };
        document.getElementById('overlay').onclick = () => {
            document.getElementById('sidebar').classList.add('-translate-x-full');
            document.getElementById('overlay').classList.add('hidden');
        };
    </script>
</body>
</html>
