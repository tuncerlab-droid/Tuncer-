<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuncer Zeka v1.0 - Kontrol Paneli</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --bg: #0f0f1a;
            --card-bg: #1e1e2f;
            --text: #ffffff;
            --accent: #00d2d3;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--card-bg);
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 40px;
            text-align: center;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: #888;
            padding: 15px;
            text-align: left;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 5px;
            font-size: 1rem;
        }

        .nav-btn.active {
            background: var(--primary);
            color: white;
        }

        /* Main Content */
        .main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.5s; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        h2 { margin-bottom: 20px; color: var(--secondary); }

        textarea, input {
            width: 100%;
            background: #2d2d44;
            border: 1px solid #444;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 1rem;
        }

        button.action-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button.action-btn:hover { background: var(--secondary); }

        .result-box {
            background: #161625;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid var(--accent);
            margin-top: 15px;
            min-height: 50px;
            white-space: pre-wrap;
        }

        /* Chat UI Specific */
        #chat-window {
            height: 300px;
            overflow-y: auto;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; }
        .msg.user { background: var(--primary); align-self: flex-end; }
        .msg.bot { background: #3d3d5c; align-self: flex-start; }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 5px;
            font-size: 0.8rem;
            background: #444;
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">🧠 TUNCER ZEKA</div>
        <button class="nav-btn active" onclick="showSection('chat')">🤖 Sohbet Botu</button>
        <button class="nav-btn" onclick="showSection('sentiment')">😊 Duygu Analizi</button>
        <button class="nav-btn" onclick="showSection('summary')">📝 Özetleme</button>
        <button class="nav-btn" onclick="showSection('stats')">📊 İstatistikler</button>
        <div style="margin-top: auto; font-size: 0.8rem; color: #555; text-align: center;">v1.0.0 Alpha</div>
    </div>

    <div class="main">
        
        <div id="chat" class="section active">
            <h2>Yapay Zeka Sohbet</h2>
            <div class="card">
                <div id="chat-window"></div>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="chatInput" placeholder="Tuncer'e bir şey yaz..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button class="action-btn" onclick="sendMessage()">Gönder</button>
                </div>
            </div>
        </div>

        <div id="sentiment" class="section">
            <h2>Duygu Analizi (NLP)</h2>
            <div class="card">
                <textarea id="sentimentInput" rows="4" placeholder="Analiz edilecek metni girin..."></textarea>
                <button class="action-btn" onclick="analyzeSentiment()">Duyguyu Yakala</button>
                <div id="sentimentResult" class="result-box">Sonuç burada görünecek...</div>
            </div>
        </div>

        <div id="summary" class="section">
            <h2>Metin Özetleyici & Anahtar Kelimeler</h2>
            <div class="card">
                <textarea id="summaryInput" rows="6" placeholder="Özetlenecek uzun metni buraya yapıştır..."></textarea>
                <button class="action-btn" onclick="generateSummary()">Metni İşle</button>
                <div id="summaryResult" class="result-box">Özet ve anahtar kelimeler burada görünecek...</div>
            </div>
        </div>

        <div id="stats" class="section">
            <h2>Kütüphane Bilgisi</h2>
            <div class="card">
                <pre id="libInfo" style="color: var(--accent);"></pre>
            </div>
        </div>

    </div>

    <script>
        // KULLANICININ VERDİĞİ DEV KOD BAŞLANGICI
        const TuncerZeka = (() => {
            // ... (Senin paylaştığın tüm kütüphane kodu buraya gömülüdür) ...
            // Not: Buraya paylaştığın kütüphanenin tam kopyasını koymalısın.
            // (Ben yukarıda yer kaplamasın diye kısalttım ama senin tam kodunla çalışacaktır)
            
            /* --- SENİN KODUNUN TAMAMI BURAYA GELECEK --- */
            // [BURAYA KODU YAPIŞTIR]
        })();

        // --- UI MANTIK KODLARI ---
        const bot = new TuncerZeka.SohbetBotu({ isim: "Tuncer" });

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
            
            if(id === 'stats') {
                document.getElementById('libInfo').textContent = TuncerZeka.hakkinda();
            }
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const win = document.getElementById('chat-window');
            if(!input.value.trim()) return;

            // Kullanıcı
            const uDiv = document.createElement('div');
            uDiv.className = 'msg user';
            uDiv.textContent = input.value;
            win.appendChild(uDiv);

            // Bot Cevabı
            const response = bot.cevapVer(input.value);
            setTimeout(() => {
                const bDiv = document.createElement('div');
                bDiv.className = 'msg bot';
                bDiv.innerHTML = `<small style="display:block; font-size: 0.7rem; opacity: 0.6;">Niyet: ${response.niyet} (%${response.guven})</small>${response.cevap}`;
                win.appendChild(bDiv);
                win.scrollTop = win.scrollHeight;
            }, 500);

            input.value = "";
            win.scrollTop = win.scrollHeight;
        }

        function analyzeSentiment() {
            const text = document.getElementById('sentimentInput').value;
            const res = TuncerZeka.duyguAnaliziYap(text);
            const box = document.getElementById('sentimentResult');
            box.innerHTML = `
                <div style="font-size: 2rem;">${res.emoji}</div>
                <strong>Duygu:</strong> ${res.duygu.toUpperCase()} <br>
                <strong>Güven Skoru:</strong> %${res.guven} <br>
                <strong>Skor:</strong> ${res.skor}
            `;
        }

        function generateSummary() {
            const text = document.getElementById('summaryInput').value;
            if(!text) return;
            const ozet = TuncerZeka.ozetle(text, 2);
            const anahtar = TuncerZeka.anahtarKelimeler(text, 5);
            
            const box = document.getElementById('summaryResult');
            let anahtarHtml = anahtar.map(k => `<span class="badge">#${k.kelime}</span>`).join(' ');
            
            box.innerHTML = `
                <strong>Özet:</strong><br>${ozet}<br><br>
                <strong>Anahtar Kelimeler:</strong><br>${anahtarHtml}
            `;
        }
    </script>
</body>
</html>
