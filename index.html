<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tuncer Zeka v2.0 | Engine Core</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg-dark: #0f172a;
            --bg-panel: #1e293b;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Responsive Sidebar */
        .sidebar {
            width: 280px;
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 100;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%);
            }
            .sidebar.active { transform: translateX(0); }
        }

        .sidebar-content { flex: 1; padding: 15px; overflow-y: auto; }
        
        .nav-btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            cursor: pointer;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Main Area */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        header {
            height: 60px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.9);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        .model-selector {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        #chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .msg {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 15px;
            word-wrap: break-word;
        }

        .msg.user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .msg.bot {
            align-self: flex-start;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-bottom-left-radius: 2px;
        }

        pre {
            background: #000;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            font-family: monospace;
            overflow-x: auto;
        }

        /* Input Area */
        .input-wrapper {
            padding: 20px;
            background: linear-gradient(transparent, var(--bg-dark));
        }

        .input-container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 8px 12px;
        }

        input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            padding: 10px;
            outline: none;
            font-size: 15px;
        }

        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 8px;
            cursor: pointer;
        }

        .mobile-menu-toggle {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 20px;
        }

        @media (max-width: 768px) { .mobile-menu-toggle { display: block; } }

        /* Welcome Overlay */
        .welcome-screen {
            text-align: center;
            margin-top: 20vh;
        }

        .version-tag {
            font-size: 10px;
            padding: 2px 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin-left: 5px;
        }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div style="padding: 20px; border-bottom: 1px solid var(--border)">
            <h2 style="font-size: 18px; color: var(--primary)">TUNCER CORE</h2>
        </div>
        <div class="sidebar-content">
            <button class="nav-btn" onclick="clearChat()">
                <i class="fas fa-plus"></i> Yeni Sohbet
            </button>
            <div style="margin-top: 20px; color: var(--text-dim); font-size: 12px; padding: 0 5px;">
                AKTİF MOTORLAR
            </div>
            <button class="nav-btn" style="margin-top: 10px; background: rgba(99, 102, 241, 0.2)" onclick="switchModel('v2027')">
                <i class="fas fa-microchip"></i> Tuncer 2027 <span class="version-tag">Pro</span>
            </button>
            <button class="nav-btn" onclick="switchModel('v2023')">
                <i class="fas fa-history"></i> Tuncer 2023 <span class="version-tag">Legacy</span>
            </button>
        </div>
    </aside>

    <main class="main">
        <header>
            <button class="mobile-menu-toggle" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            <div id="active-model-title">Tuncer 2027 Engine</div>
            <select class="model-selector" id="engine-select" onchange="switchModel(this.value)">
                <option value="v2027">v2027 (Gelişmiş)</option>
                <option value="v2023">v2023 (Klasik)</option>
            </select>
        </header>

        <div id="chat-area">
            <div class="welcome-screen" id="welcome">
                <i class="fas fa-brain" style="font-size: 48px; color: var(--primary); margin-bottom: 15px;"></i>
                <h2>Sistem Hazır</h2>
                <p style="color: var(--text-dim); margin-top: 8px;">Modelinizi seçin ve sorguya başlayın.</p>
            </div>
        </div>

        <div class="input-wrapper">
            <div class="input-container">
                <input type="text" id="user-input" placeholder="Komut girin..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="processInput()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </main>

    <script>
        // --- TUNCER ZEKA KÜTÜPHANE ÇEKİRDEKLERİ ---
        
        const Tuncer2023 = {
            process: (input) => {

                if(q.includes("kod")) return "v2023 Kodu:\n```js\nfunction v2023() { return 'Legacy Mode'; }\n```";
                return "v2023 Yanıtı: Bu sorgu için temel düzeyde işlem yapıldı.";
            }
        };

            process: (input) => {

                if(q.includes("saat")) return "Sistem Saati: " + new Date().toLocaleTimeString();
                if(q.includes("kod")) return "v2027 Gelişmiş Kod Yapısı:\n
