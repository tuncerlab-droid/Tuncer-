<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuncer Zeka - AI Arayüzü</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --panel-border: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --user-msg: #3b82f6;
            --ai-msg: rgba(51, 65, 85, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* Arka plan parlama efektleri */
        .glow-1 {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: 0;
            pointer-events: none;
        }

        .glow-2 {
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: 0;
            pointer-events: none;
        }

        /* Ana Taşıyıcı */
        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
            z-index: 1;
            padding: 20px;
            gap: 20px;
        }

        /* Sol Menü (Sidebar) */
        .sidebar {
            width: 300px;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .brand-text h1 {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-text p {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Sürüm Seçici (Toggle) */
        .version-selector {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 16px;
            padding: 8px;
            display: flex;
            position: relative;
            border: 1px solid var(--panel-border);
            margin-bottom: auto;
        }

        .version-btn {
            flex: 1;
            padding: 12px 0;
            text-align: center;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            position: relative;
            z-index: 2;
            transition: color 0.3s ease;
        }

        .version-btn.active {
            color: white;
        }

        .active-bg {
            position: absolute;
            top: 8px;
            bottom: 8px;
            left: 8px;
            width: calc(50% - 8px);
            background: var(--primary);
            border-radius: 10px;
            z-index: 1;
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .system-status {
            margin-top: auto;
            padding: 15px;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 16px;
            border: 1px solid var(--panel-border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 2s infinite;
        }

        .status-text {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Ana Sohbet Alanı */
        .chat-area {
            flex: 1;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            position: relative;
        }

        .chat-header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(30, 41, 59, 0.4);
        }

        .header-title {
            font-weight: 600;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-title i {
            color: var(--primary);
        }

        .clear-btn {
            background: transparent;
            border: 1px solid var(--panel-border);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .clear-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.3);
        }

        .messages-container {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        /* Mesaj Balonları */
        .message {
            max-width: 80%;
            display: flex;
            flex-direction: column;
            gap: 5px;
            animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .message.user {
            align-self: flex-end;
        }

        .message.ai {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 16px 20px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.6;
            letter-spacing: 0.2px;
            word-wrap: break-word;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .user .message-bubble {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .ai .message-bubble {
            background: var(--ai-msg);
            color: var(--text-main);
            border: 1px solid var(--panel-border);
            border-bottom-left-radius: 4px;
        }

        /* Kod Blokları için Stil */
        pre {
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 10px 0;
            border: 1px solid rgba(255,255,255,0.1);
        }

        code {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            color: #e2e8f0;
        }

        .time-stamp {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin: 0 10px;
        }

        .user .time-stamp {
            text-align: right;
        }

        /* Input Alanı */
        .input-container {
            padding: 20px 30px;
            background: rgba(30, 41, 59, 0.6);
            border-top: 1px solid var(--panel-border);
        }

        .input-box {
            display: flex;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--panel-border);
            border-radius: 20px;
            padding: 8px 8px 8px 24px;
            transition: all 0.3s;
        }

        .input-box:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .input-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .input-box input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 45px;
            height: 45px;
            border-radius: 16px;
            background: var(--primary);
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.1rem;
        }

        .send-btn:hover {
            background: var(--primary-hover);
            transform: scale(1.05);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* Yükleniyor Animasyonu */
        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 8px 12px;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Keyframes */
        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
                padding: 10px;
            }
            .sidebar {
                width: 100%;
                height: auto;
                padding: 15px;
            }
            .brand { margin-bottom: 20px; }
            .version-selector { margin-bottom: 20px; }
            .chat-header { padding: 15px; }
            .messages-container { padding: 15px; }
            .input-container { padding: 15px; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>

    <!-- Arka Plan Parlamaları -->
    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="brand">
                <div class="brand-icon">
                    <i class="fa-solid fa-brain"></i>
                </div>
                <div class="brand-text">
                    <h1>TUNCER AI</h1>
                    <p>Akıllı Asistan Arayüzü</p>
                </div>
            </div>

            <!-- Versiyon Seçici -->
            <div class="version-selector" id="versionSelector">
                <div class="active-bg" id="activeBg"></div>
                <button class="version-btn" data-version="2023" onclick="switchVersion('2023')">v2023</button>
                <button class="version-btn active" data-version="2026" onclick="switchVersion('2026')">v2026</button>
            </div>

            <div class="system-status">
                <div class="status-dot"></div>
                <div class="status-text">
                    Sistem Çevrimiçi <br>
                    <span style="font-size: 0.75rem; opacity: 0.7" id="engineStatus">Motor: tuncer2026.js bekleniyor...</span>
                </div>
            </div>
        </div>

        <!-- Chat Alanı -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="header-title">
                    <i class="fa-solid fa-microchip"></i>
                    <span id="currentEngineTitle">Tuncer Zeka 2026</span>
                </div>
                <button class="clear-btn" onclick="clearChat()">
                    <i class="fa-solid fa-trash-can"></i> Temizle
                </button>
            </div>

            <div class="messages-container" id="chatBox">
                <!-- Hoşgeldin Mesajı -->
                <div class="message ai">
                    <div class="message-bubble">
                        Merhaba! Ben Tuncer Zeka. Seçili olan yapay zeka motorum ile size kod yazma, matematik işlemleri ve bilgi sağlama konusunda yardımcı olabilirim. Nasıl yardımcı olabilirim?
                    </div>
                    <span class="time-stamp">Sistem Başlatıldı</span>
                </div>
            </div>

            <div class="input-container">
                <div class="input-box">
                    <input type="text" id="userInput" placeholder="Bir mesaj yazın veya kod isteyin..." autocomplete="off">
                    <button class="send-btn" onclick="sendMessage()">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Sistem Mantığı (UI ve Motor Yükleme) -->
    <script>
        let currentVersion = '2026';
        let aiInstance = null; // Tuncer Zeka sınıfı örneği tutulacak
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const activeBg = document.getElementById('activeBg');
        const engineStatus = document.getElementById('engineStatus');
        const currentEngineTitle = document.getElementById('currentEngineTitle');

        // Sayfa yüklendiğinde varsayılan motoru (2026) yükle
        window.onload = () => {
            loadEngineScript('2026');
        };

        // Enter tuşu ile gönderme
        userInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Versiyon Değiştirme Fonksiyonu
        function switchVersion(version) {
            if (currentVersion === version) return;
            currentVersion = version;

            // Buton Stillerini Güncelle
            document.querySelectorAll('.version-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.version === version) {
                    btn.classList.add('active');
                }
            });

            // Animasyonlu Arka Planı Kaydır
            if (version === '2023') {
                activeBg.style.transform = 'translateX(0)';
            } else {
                activeBg.style.transform = 'translateX(100%)';
            }

            // Başlıkları Güncelle
            currentEngineTitle.innerHTML = `Tuncer Zeka ${version}`;
            
            // Bilgi Mesajı Ekle
            addSystemMessage(`Yapay Zeka motoru değiştirildi: v${version}`);
            
            // Yeni JS dosyasını yükle
            loadEngineScript(version);
        }

        // JS Dosyasını Dinamik Yükleme
        function loadEngineScript(version) {
            engineStatus.innerText = `Motor: tuncer${version}.js aranıyor...`;
            engineStatus.style.color = "var(--text-muted)";
            
            // Eski scripti kaldır
            const oldScript = document.getElementById('ai-engine-script');
            if (oldScript) {
                oldScript.remove();
            }

            // Yeni scripti oluştur
            const script = document.createElement('script');
            script.id = 'ai-engine-script';
            script.src = `tuncer${version}.js`;
            
            script.onload = () => {
                engineStatus.innerText = `Motor: tuncer${version}.js Aktif`;
                engineStatus.style.color = "#10b981";
                
                // TuncerZeka sınıfı yüklendiyse örneğini oluştur
                if (typeof TuncerZeka !== 'undefined') {
                    aiInstance = new TuncerZeka();
                } else {
                    console.warn("Dosya yüklendi ancak 'TuncerZeka' sınıfı bulunamadı.");
                }
            };

            script.onerror = () => {
                engineStatus.innerText = `Hata: tuncer${version}.js bulunamadı!`;
                engineStatus.style.color = "#ef4444";
                aiInstance = null; // Dosya yoksa instance null
            };

            document.body.appendChild(script);
        }

        // Mesaj Gönderme
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Kullanıcı mesajını ekle
            appendMessage(text, 'user');
            userInput.value = '';

            // Yükleniyor animasyonu ekle
            const typingId = showTypingIndicator();

            try {
                let aiResponse = "";

                // Eğer JS dosyası başarıyla yüklendiyse ve sınıf varsa çalıştır
                if (aiInstance && typeof aiInstance.konus === 'function') {
                    const result = await aiInstance.konus(text);
                    aiResponse = typeof result === 'object' ? result.cevap : result;
                } else {
                    // Eğer JS dosyaları klasörde yoksa (Sadece UI test ediliyorsa) sahte cevap dön
                    await new Promise(r => setTimeout(r, 1000)); // 1 saniye bekle
                    aiResponse = `**Sistem Uyarısı:** \`tuncer${currentVersion}.js\` dosyası bulunamadı. Lütfen arayüzün çalıştığı klasöre ilgili dosyayı ekleyin.\n\nSöylediğiniz: "${text}"`;
                }

                // Yükleniyor animasyonunu kaldır ve cevabı yazdır
                removeTypingIndicator(typingId);
                appendMessage(formatResponse(aiResponse), 'ai');

            } catch (error) {
                removeTypingIndicator(typingId);
                appendMessage("Bir hata oluştu: " + error.message, 'ai');
            }
        }

        // Mesajı DOM'a Ekleme
        function appendMessage(content, sender) {
            const time = new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            
            msgDiv.innerHTML = `
                <div class="message-bubble">${content}</div>
                <span class="time-stamp">${time}</span>
            `;
            
            chatBox.appendChild(msgDiv);
            scrollToBottom();
        }

        // Sistem Mesajı (Ortalanmış küçük uyarılar)
        function addSystemMessage(text) {
            const msgDiv = document.createElement('div');
            msgDiv.style.textAlign = 'center';
            msgDiv.style.margin = '10px 0';
            msgDiv.style.fontSize = '0.8rem';
            msgDiv.style.color = 'var(--text-muted)';
            msgDiv.style.animation = 'slideUpFade 0.3s forwards';
            msgDiv.innerText = `— ${text} —`;
            chatBox.appendChild(msgDiv);
            scrollToBottom();
        }

        // Yazıyor İndikatörü
        function showTypingIndicator() {
            const id = 'typing-' + Date.now();
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ai`;
            msgDiv.id = id;
            
            msgDiv.innerHTML = `
                <div class="message-bubble typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            
            chatBox.appendChild(msgDiv);
            scrollToBottom();
            return id;
        }

        function removeTypingIndicator(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        // Metni Formatlama (Kod bloklarını ve satır atlamalarını düzeltme)
        function formatResponse(text) {
            if (!text) return "";
            
            // Kod bloklarını <pre><code> içine al
            let formatted = text.replace(/```([\s\S]*?)```/g, function(match, p1) {
                // Dil etiketini temizle (örn: ```javascript)
                let code = p1.replace(/^[a-z]+\n/, ''); 
                // HTML taglarını encode et
                code = code.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                return `<pre><code>${code.trim()}</code></pre>`;
            });

            // Satır atlamalarını <br> yap (Kod blokları dışındakileri)
            // Basit bir yaklaşım: <pre> içindeki newline'lara dokunma, dışındakileri <br> yap.
            formatted = formatted.replace(/\n/g, "<br>");
            formatted = formatted.replace(/<pre><code>([\s\S]*?)<\/code><\/pre>/g, function(match) {
                 return match.replace(/<br>/g, "\n");
            });

            return formatted;
        }

        // Sohbeti Temizle
        function clearChat() {
            if(confirm("Tüm sohbet geçmişi silinecek. Emin misiniz?")) {
                chatBox.innerHTML = '';
                addSystemMessage("Sohbet geçmişi temizlendi.");
                if(aiInstance && typeof aiInstance.sifirla === 'function') {
                    aiInstance.sifirla();
                }
            }
        }

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
