<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuncerLab | Geleceğin Teknolojisi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;400;600&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #0a0f16; color: white; min-height: 100vh; }
        .glass { background: rgba(20, 25, 35, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(0, 229, 255, 0.1); border-radius: 20px; }
        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); transition: 0.4s; z-index: 100; }
        #toast.show { bottom: 20px; }
    </style>
</head>
<body class="p-4">

    <div id="toast" class="glass px-6 py-3 font-bold text-center w-80"></div>

    <nav class="glass max-w-6xl mx-auto p-4 flex justify-between items-center mb-8 sticky top-2 z-50">
        <h1 class="font-bold text-2xl tracking-tighter cursor-pointer" style="font-family:'Orbitron'" onclick="switchView('shop')">TUNCER<span class="text-cyan-400">LAB.</span></h1>
        <div class="flex gap-4 text-xs font-bold">
            <button onclick="switchView('shop')">MAĞAZA</button>
            <button onclick="switchView('track')">TAKİP</button>
            <button onclick="switchView('cart')" class="text-cyan-400">SEPET (<span id="cart-count">0</span>)</button>
            <button onclick="openAdmin()" class="text-red-500">ADMİN</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto">
        <section id="view-shop" class="view-section active">
            <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </section>

        <section id="view-track" class="view-section">
            <div class="glass p-8 max-w-lg mx-auto text-center">
                <h2 class="text-xl font-bold mb-4">Sipariş Takibi</h2>
                <input type="email" id="track-email" placeholder="E-posta" class="w-full bg-black/40 border border-white/10 p-3 rounded-xl mb-4 outline-none focus:border-cyan-400">
                <button onclick="trackOrder()" class="w-full bg-cyan-500 text-black font-bold py-3 rounded-xl">SORGULA</button>
                <div id="track-results" class="mt-6 space-y-4 text-left"></div>
            </div>
        </section>

        <section id="view-cart" class="view-section">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div id="cart-list" class="lg:col-span-2 space-y-4"></div>
                <div class="glass p-6 h-fit">
                    <h2 class="text-xl font-bold mb-4">Sipariş Ver</h2>
                    <form onsubmit="submitOrder(event)" class="space-y-4">
                        <input type="text" id="c-name" placeholder="Ad Soyad" required class="w-full bg-black/40 border border-white/10 p-3 rounded-xl">
                        <input type="email" id="c-email" placeholder="E-posta" required class="w-full bg-black/40 border border-white/10 p-3 rounded-xl">
                        <textarea id="c-addr" placeholder="Adres" required class="w-full bg-black/40 border border-white/10 p-3 rounded-xl"></textarea>
                        <div class="text-xl font-bold text-cyan-400 text-center py-2 border-y border-white/5">Toplam: <span id="cart-total">0 TL</span></div>
                        <button type="submit" class="w-full bg-cyan-500 text-black font-bold py-3 rounded-xl">ONAYLA</button>
                    </form>
                </div>
            </div>
        </section>

        <section id="view-admin" class="view-section">
            <div class="glass p-6 overflow-x-auto">
                <h2 class="text-xl font-bold text-red-500 mb-4">Admin Paneli</h2>
                <table class="w-full text-left text-sm mb-8">
                    <thead class="text-gray-400 border-b border-white/5"><tr><th class="pb-2">Müşteri</th><th>Tutar</th><th>Durum</th><th>İşlem</th></tr></thead>
                    <tbody id="admin-order-list"></tbody>
                </table>
                <h2 class="text-xl font-bold text-cyan-400 mb-4">Stok Kontrol</h2>
                <div id="admin-stock-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </section>
    </main>

    <script>
        const API_URL = "https://tuncer.onrender.com/api";
        let products = [];
        let cart = [];

        async function fetchProducts() {
            try {
                const res = await fetch(`${API_URL}/products`);
                products = await res.json();
                renderProducts();
            } catch (e) { showToast("Sunucu kapalı!", true); }
        }

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div class="glass p-4 flex flex-col group">
                    <img src="${p.image}" class="h-40 w-full object-cover rounded-lg mb-4">
                    <h3 class="font-bold">${p.name}</h3>
                    <div class="flex justify-between items-center mt-4">
                        <span class="text-cyan-400 font-bold">${p.price} TL</span>
                        <span class="text-xs text-gray-500">Stok: ${p.stock}</span>
                    </div>
                    <button onclick="addToCart(${p.id})" ${p.stock <= 0 ? 'disabled' : ''} class="mt-4 ${p.stock <= 0 ? 'bg-gray-700' : 'bg-white/5 hover:bg-cyan-500 hover:text-black'} py-2 rounded-lg font-bold transition">
                        ${p.stock <= 0 ? 'TÜKENDİ' : 'EKLE'}
                    </button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const p = products.find(x => x.id === id);
            cart.push(p);
            document.getElementById('cart-count').innerText = cart.length;
            showToast(p.name + " eklendi.");
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            let total = 0;
            list.innerHTML = cart.map((item, i) => {
                total += item.price;
                return `<div class="glass p-4 flex justify-between"><span>${item.name}</span><b>${item.price} TL</b></div>`;
            }).join('');
            document.getElementById('cart-total').innerText = total + " TL";
            if(cart.length === 0) list.innerHTML = '<div class="glass p-10 text-center">Sepet boş</div>';
        }

        async function submitOrder(e) {
            e.preventDefault();
            const data = { 
                name: document.getElementById('c-name').value, 
                email: document.getElementById('c-email').value,
                address: document.getElementById('c-addr').value,
                items: cart, total: cart.reduce((s,i) => s + i.price, 0)
            };
            const res = await fetch(`${API_URL}/orders`, { 
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) 
            });
            const result = await res.json();
            if(result.success) {
                showToast("Sipariş alındı! Kod: " + result.orderId);
                cart = []; document.getElementById('cart-count').innerText = "0"; e.target.reset();
                switchView('shop'); fetchProducts();
            }
        }

        async function trackOrder() {
            const email = document.getElementById('track-email').value;
            const res = await fetch(`${API_URL}/orders/track/${email}`);
            const data = await res.json();
            const resDiv = document.getElementById('track-results');
            resDiv.innerHTML = data.map(o => `
                <div class="glass p-4 border-l-4 border-cyan-500">
                    <div class="flex justify-between"><span>ID: ${o.id}</span><b>${o.status}</b></div>
                    <div class="text-xs text-gray-500 mt-1">${o.date}</div>
                </div>
            `).join('');
        }

        function openAdmin() {
            const p = prompt("Şifre:");
            if(p === "175017") switchView('admin');
        }

        async function loadAdmin() {
            const resO = await fetch(`${API_URL}/admin/orders`);
            const orders = await resO.json();
            document.getElementById('admin-order-list').innerHTML = orders.reverse().map(o => `
                <tr class="border-b border-white/5">
                    <td class="py-3">${o.name}</td><td>${o.total} TL</td><td class="text-cyan-400 font-bold">${o.status}</td>
                    <td><button onclick="updateStatus('${o.id}')" class="text-xs underline">Durum Değiştir</button></td>
                </tr>
            `).join('');

            const resP = await fetch(`${API_URL}/products`);
            const prods = await resP.json();
            document.getElementById('admin-stock-list').innerHTML = prods.map(p => `
                <div class="glass p-3 flex justify-between"><span>${p.name}</span><button onclick="updateStock(${p.id})" class="font-bold text-green-400">${p.stock} Adet</button></div>
            `).join('');
        }

        async function updateStatus(id) {
            const s = prompt("Yeni Durum (Hazırlanıyor/Kargoda/Teslim Edildi):");
            if(s) {
                await fetch(`${API_URL}/admin/orders/${id}/status`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({status: s}) });
                loadAdmin();
            }
        }

        async function updateStock(id) {
            const n = prompt("Yeni stok adedi:");
            if(n) {
                await fetch(`${API_URL}/products/${id}/stock`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({stock: n}) });
                loadAdmin(); fetchProducts();
            }
        }

        function switchView(v) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            if(v === 'cart') renderCart();
            if(v === 'admin') loadAdmin();
        }

        function showToast(m, err = false) {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.background = err ? "#ef4444" : "#00e5ff"; t.style.color = err ? "white" : "black";
            t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
        }

        window.onload = fetchProducts;
    </script>
</body>
</html>
