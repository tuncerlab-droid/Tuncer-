<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tuncer Zeka v2.0 | Core</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --sidebar: #1e293b;
            --text: #f1f5f9;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Responsive Sidebar */
        #sidebar {
            width: 280px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }

        @media (max-width: 768px) {
            #sidebar {
                position: fixed;
                left: -280px;
                top: 0; bottom: 0;
            }
            #sidebar.open { left: 0; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        }

        .sidebar-header { padding: 20px; border-bottom: 2px solid var(--primary); text-align: center; }
        .sidebar-item { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid var(--border); transition: 0.2s; display: flex; align-items: center; gap: 10px; }
        .sidebar-item:hover { background: rgba(255,255,255,0.05); }
        .sidebar-item.active { border-left: 4px solid var(--primary); background: rgba(99, 102, 241, 0.1); }

        /* Main Content Area */
        main { flex: 1; display: flex; flex-direction: column; position: relative; width: 100%; }
        
        header {
            height: 60px;
            padding: 0 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        .menu-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; display: none; padding: 10px; }
        @media (max-width: 768px) { .menu-btn { display: block; } }

        #chat-view { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        
        .bubble { max-width: 85%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 15px; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .u-bubble { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .b-bubble { align-self: flex-start; background: var(--sidebar); border: 1px solid var(--border); border-bottom-left-radius: 2px; }

        /* Input Mechanism */
        .input-panel { padding: 15px; background: var(--bg); border-top: 1px solid var(--border); }
        .input-box { max-width: 800px; margin: 0 auto; background: var(--sidebar); border: 1px solid var(--border); border-radius: 12px; display: flex; padding: 5px; align-items: center; }
        #user-msg-input { flex: 1; background: none; border: none; color: white; padding: 12px; outline: none; font-size: 16px; }
        #send-trigger { background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        #send-trigger:active { transform: scale(0.95); }

        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 900; backdrop-filter: blur(2px); }
        #overlay.active { display: block; }
    </style>
</head>
<body>

    <div id="overlay"></div>

    <aside id="sidebar">
        <div class="sidebar-header">
            <h2 style="font-size: 1.2rem; letter-spacing: 1px;">TUNCER CORE</h2>
        </div>
        <div class="sidebar-item" id="new-chat"><i class="fas fa-plus"></i> Yeni Sohbet</div>
        <div class="sidebar-item active" id="sel-2027"><i class="fas fa-microchip"></i> Tuncer 2027 Pro</div>
        <div class="sidebar-item" id="sel-2023"><i class="fas fa-history"></i> Tuncer 2023 Classic</div>
    </aside>

    <main>
        <header>
            <button class="menu-btn" id="open-menu"><i class="fas fa-bars"></i></button>
            <div id="current-model-info" style="font-weight: 600; font-size: 14px; opacity: 0.8;">Motor: Tuncer 2027</div>
            <div style="width: 40px;"></div>
        </header>

        <div id="chat-view">
            <div class="bubble b-bubble">Sistem Çekirdeği Aktif. Kütüphaneler bekleniyor...</div>
        </div>

        <div class="input-panel">
            <div class="input-box">
                <input type="text" id="user-msg-input" placeholder="Komut yazın..." autocomplete="off">
                <button id="send-trigger"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </main>

    <script>
        /**
         * SENİN KÜTÜPHANELERİN BURAYA BAĞLANACAK
         * 2023 ve 2027 kütüphane dosyalarını include ettikten sonra
         * aşağıdaki objeleri onlarla eşleştir.
         */
        const ExternalLibraries = {
            v2023: null, // Örn: window.Tuncer2023Lib
            v2027: null  // Örn: window.Tuncer2027Lib
        };

        // UI State
        let activeEngine = 'v2027';

        // Elements
        const view = document.getElementById('chat-view');
        const input = document.getElementById('user-msg-input');
        const sendBtn = document.getElementById('send-trigger');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        function init() {
            // Gönderme Olayları
            sendBtn.addEventListener('click', onUserAction);
            input.addEventListener('keypress', (e) => { if(e.key === 'Enter') onUserAction(); });

            // Mobil Menü Kontrolleri
            document.getElementById('open-menu').addEventListener('click', () => {
                sidebar.classList.add('open');
                overlay.classList.add('active');
            });

            overlay.addEventListener('click', () => {
                sidebar.classList.remove('open');
                overlay.classList.remove('active');
            });

            // Model Seçimleri
            document.getElementById('sel-2027').addEventListener('click', function() {
                setEngine('v2027', "Motor: Tuncer 2027", this);
            });

            document.getElementById('sel-2023').addEventListener('click', function() {
                setEngine('v2023', "Motor: Tuncer 2023", this);
            });

            document.getElementById('new-chat').addEventListener('click', () => {
                view.innerHTML = '<div class="bubble b-bubble">Yeni oturum başlatıldı.</div>';
                closeMobileMenu();
            });
        }

        function setEngine(id, text, el) {
            activeEngine = id;
            document.getElementById('current-model-info').innerText = text;
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            closeMobileMenu();
        }

        function onUserAction() {
            const val = input.value.trim();
            if(!val) return;

            addBubble(val, 'u-bubble');
            input.value = '';

            /**
             * KRİTİK NOKTA:
             * Sistem burada yanıt üretmez.
             * Sadece aktif kütüphaneden gelen fonksiyonu çağırır.
             */
            let response = "";
            try {
                if(activeEngine === 'v2027') {
                    // Eğer ExternalLibraries.v2027 tanımlıysa onu kullan, yoksa hata ver
                    response = ExternalLibraries.v2027 ? ExternalLibraries.v2027.process(val) : "[Hata: v2027 Kütüphanesi Yüklü Değil]";
                } else {
                    response = ExternalLibraries.v2023 ? ExternalLibraries.v2023.process(val) : "[Hata: v2023 Kütüphanesi Yüklü Değil]";
                }
            } catch(e) {
                response = "[Kütüphane Hatası: " + e.message + "]";
            }

            setTimeout(() => {
                addBubble(response, 'b-bubble');
            }, 200);
        }

        function addBubble(text, type) {
            const b = document.createElement('div');
            b.className = 'bubble ' + type;
            b.innerText = text;
            view.appendChild(b);
            view.scrollTop = view.scrollHeight;
        }

        function closeMobileMenu() {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }

        window.onload = init;
    </script>
</body>
</html>
