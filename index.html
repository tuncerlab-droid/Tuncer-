<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tuncer AR v11.0</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #ar-overlay {
            position: absolute; inset: 0;
            pointer-events: none; z-index: 10;
            display: flex; flex-direction: column; justify-content: space-between; padding: 25px;
        }
        .hud-data {
            align-self: flex-end; background: rgba(0, 10, 20, 0.85);
            border: 2px solid #00e5ff; border-radius: 12px; padding: 12px;
            color: #00e5ff; font-family: monospace; font-size: 13px;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        }
        #start-screen {
            position: fixed; inset: 0; background: radial-gradient(circle, #1a1a1a, #000);
            z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; color: white;
        }
        #btn-activate {
            background: #00e5ff; color: #000; font-weight: 900; padding: 25px 60px;
            border-radius: 20px; border: none; cursor: pointer; font-size: 20px;
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.5); transform: scale(1);
            transition: transform 0.2s;
        }
        #btn-activate:active { transform: scale(0.95); }
        #hint-text {
            position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
            color: #fff; font-weight: bold; background: rgba(0,0,0,0.5);
            padding: 10px 20px; border-radius: 50px; border: 1px solid #00e5ff;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="color:#00e5ff; font-size: 32px; letter-spacing: -1px; margin-bottom: 10px;">TUNCER CORE <span style="color:#fff">V11</span></h1>
        <p style="color:#888; margin-bottom: 40px; font-size: 14px;">Kamera, Sensör ve Mikrofon İzinleri İsteniyor...</p>
        <button id="btn-activate">SİSTEMİ YETKİLENDİR</button>
    </div>

    <div id="ar-overlay" style="display:none;">
        <div class="hud-data">
            WORLD_X: <span id="x-pos">0.00</span><br>
            WORLD_Y: <span id="y-pos">0.00</span><br>
            WORLD_Z: <span id="z-pos">0.00</span><br>
            VOICE: <span id="voice-cmd">...</span>
        </div>
        <div id="hint-text">Masa veya Zemin Aranıyor...</div>
    </div>

    <script type="module">
        let scene, camera, renderer, reticle, controller;
        let hitTestSource = null, hitTestSourceRequested = false;
        let objects = [];

        const btn = document.getElementById('btn-activate');
        const overlay = document.getElementById('ar-overlay');

        btn.onclick = async () => {
            // Önce Mikrofon İzni
            try {
                await navigator.mediaDevices.getUserMedia({ audio: true });
                console.log("Mic granted");
            } catch (e) {
                console.warn("Mic rejected");
            }

            // WebXR İzni ve Başlatma
            if (navigator.xr) {
                const supported = await navigator.xr.isSessionSupported('immersive-ar');
                if (supported) {
                    document.getElementById('start-screen').style.display = 'none';
                    overlay.style.display = 'flex';
                    initAR();
                } else {
                    alert("Cihazınızda WebXR/ARCore desteği bulunamadı.");
                }
            } else {
                alert("Tarayıcınız AR özelliklerini desteklemiyor.");
            }
        };

        async function initAR() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Reticle (Halka)
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.04, 0.05, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x00e5ff })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            // Işıklandırma
            scene.add(new THREE.AmbientLight(0xffffff, 1.2));

            // AR Oturumu - İzinleri burası tetikler
            const session = await navigator.xr.requestSession('immersive-ar', {
                requiredFeatures: ['hit-test', 'local-floor'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: overlay }
            });

            renderer.xr.setSession(session);

            // Dokunma ile Obje Bırak
            controller = renderer.xr.getController(0);
            controller.addEventListener('select', onSelect);
            scene.add(controller);

            initVoice();
            renderer.setAnimationLoop(render);
        }

        function onSelect() {
            if (reticle.visible) {
                const geometry = new THREE.BoxGeometry(0.1, 0.1, 0.1);
                const material = new THREE.MeshStandardMaterial({ 
                    color: Math.random() * 0xffffff,
                    metalness: 0.6,
                    roughness: 0.1,
                    emissive: 0x002244
                });
                const cube = new THREE.Mesh(geometry, material);
                cube.position.setFromMatrixPosition(reticle.matrix);
                cube.position.y += 0.05;
                scene.add(cube);
                objects.push(cube);
            }
        }

        function initVoice() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) return;
            const rec = new Speech();
            rec.lang = 'tr-TR';
            rec.continuous = true;
            rec.onresult = (e) => {
                const cmd = e.results[e.results.length - 1][0].transcript.toLowerCase();
                document.getElementById('voice-cmd').innerText = cmd.toUpperCase();
                if (cmd.includes("küp") && reticle.visible) onSelect();
                if (cmd.includes("temizle")) {
                    objects.forEach(obj => scene.remove(obj));
                    objects = [];
                }
            };
            rec.start();
        }

        function render(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (hitTestSourceRequested === false) {
                    session.requestReferenceSpace('viewer').then((space) => {
                        session.requestHitTestSource({ space: space }).then((source) => {
                            hitTestSource = source;
                        });
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitResults = frame.getHitTestResults(hitTestSource);
                    if (hitResults.length > 0) {
                        const hit = hitResults[0];
                        const pose = hit.getPose(referenceSpace);

                        reticle.visible = true;
                        reticle.matrix.fromArray(pose.transform.matrix);
                        
                        const pos = new THREE.Vector3().setFromMatrixPosition(reticle.matrix);
                        document.getElementById('x-pos').innerText = pos.x.toFixed(2);
                        document.getElementById('y-pos').innerText = pos.y.toFixed(2);
                        document.getElementById('z-pos').innerText = pos.z.toFixed(2);
                        document.getElementById('hint-text').innerText = "HEDEF KİLİTLENDİ - DOKUN";
                    } else {
                        reticle.visible = false;
                        document.getElementById('hint-text').innerText = "YÜZEY ARANIYOR (ZEMİNE BAK)...";
                    }
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
