<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNCER HOLO - AR Modelleme v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.7.0/build/index.module.js",
                "three-bvh-csg": "https://unpkg.com/three-bvh-csg@0.0.16/build/index.module.js"
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Share Tech Mono', monospace;
            color: #0ff;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        #video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 1;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            pointer-events: none;
        }

        .hud-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 20;
            pointer-events: none;
        }

        .hud-panel {
            pointer-events: auto;
            background: rgba(0, 20, 30, 0.7);
            border: 1px solid #0ff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            backdrop-filter: blur(4px);
        }

        .btn-holo {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #0ff;
            color: #0ff;
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 10px;
        }
        .btn-holo:active {
            background: #0ff;
            color: #000;
        }

        .recording-pulse {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; color: #ff0000; }
            50% { opacity: 0.3; }
            100% { opacity: 1; color: #ff0000; }
        }

        #log-console {
            scrollbar-width: none;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <video id="video-background" autoplay playsinline muted></video>
    <div id="canvas-container"></div>

    <div class="hud-overlay flex flex-col justify-between p-4">
        <div class="flex justify-between items-start w-full">
            <div class="hud-panel p-2 rounded text-sm w-1/2 md:w-1/3">
                <div class="font-bold text-base mb-1 tracking-widest text-white drop-shadow-[0_0_5px_#0ff]">TUNCER WEB OS v3</div>
                <div id="sys-status" class="text-[10px] text-green-400">Sistem: YÜKLENİYOR...</div>
                <div id="hand-status" class="text-[10px] text-yellow-400">El Takibi: HAZIRLANIYOR...</div>
            </div>

            <div class="hud-panel p-2 rounded text-center" id="voice-status-box">
                <div class="text-[10px] text-gray-300 uppercase">Ses Kontrol</div>
                <div id="mic-status" class="text-[10px] font-bold">BEKLEMEDE</div>
            </div>
        </div>

        <div class="flex justify-between items-end w-full gap-2">
            <div class="hud-panel p-2 rounded h-24 w-1/2 md:w-1/3 overflow-hidden flex flex-col justify-end text-[9px]" id="log-console">
                <div class="text-cyan-600">> Sistem çekirdeği aktif.</div>
            </div>

            <div class="hud-panel p-2 rounded grid grid-cols-2 gap-1 w-1/2 md:w-2/3">
                <button id="btn-cube" class="btn-holo p-1 rounded">KÜP</button>
                <button id="btn-hole" class="btn-holo p-1 rounded border-red-500 text-red-500">DELİK</button>
                <button id="btn-merge" class="btn-holo p-1 rounded border-yellow-500 text-yellow-500">BİRLEŞTİR</button>
                <button id="btn-delete" class="btn-holo p-1 rounded text-red-400">SİL</button>
                <button id="btn-mode" class="btn-holo p-1 rounded border-purple-500 text-purple-500 col-span-2">MOD: TAŞI</button>
            </div>
        </div>
    </div>

    <!-- Hata Bildirimi -->
    <div id="error-modal" class="fixed inset-0 bg-black bg-opacity-80 z-50 flex items-center justify-center p-6 hidden">
        <div class="hud-panel p-6 max-w-sm w-full rounded border-red-500 text-center">
            <h2 class="text-lg font-bold text-red-500 mb-2">ERİŞİM HATASI</h2>
            <p id="error-text" class="text-xs mb-4">Kamera başlatılamadı.</p>
            <button onclick="location.reload()" class="btn-holo w-full py-2 rounded">YENİDEN DENE</button>
        </div>
    </div>

<script type="module">
import * as THREE from 'three';
import { SUBTRACTION, Brush, Evaluator } from 'three-bvh-csg';

const video = document.getElementById('video-background');
const logConsole = document.getElementById('log-console');
const sysStatus = document.getElementById('sys-status');
const handStatus = document.getElementById('hand-status');
const micStatus = document.getElementById('mic-status');

let scene, camera, renderer, hands;
let objects = [], holeObjects = [], selectedObject = null;
let handCursor, dragPlane;
let isPinching = false;
let pinchStartPos = new THREE.Vector3(), objectStartPos = new THREE.Vector3();
let pinchStartMouse = new THREE.Vector2();

// Yeni Özellik Değişkenleri
let interactionMode = 0; // 0: TAŞI, 1: DÖNDÜR, 2: DERİNLİK
const modes = ["MOD: TAŞI", "MOD: DÖNDÜR", "MOD: DERİNLİK"];
let deviceOrientation = null;
let screenOrientation = 0;

function log(msg, err = false) {
    const d = document.createElement('div');
    d.textContent = `> ${msg}`;
    d.className = err ? 'text-red-500' : 'text-cyan-400';
    logConsole.appendChild(d);
    if(logConsole.childNodes.length > 5) logConsole.removeChild(logConsole.firstChild);
}

// --- KAMERA YÖNETİMİ ---
async function setupCamera() {
    try {
        const constraints = {
            video: {
                facingMode: "environment", // Arka kamera
                width: { ideal: 1280 },
                height: { ideal: 720 }
            }
        };

        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
        
        return new Promise((resolve) => {
            video.onloadedmetadata = () => {
                video.play();
                resolve(stream);
            };
        });
    } catch (e) {
        console.error("Kamera hatası:", e);
        if (e.name === "NotReadableError") {
            document.getElementById('error-text').textContent = "Kamera şu an başka bir uygulama tarafından kullanılıyor olabilir. Lütfen diğer sekmeleri kapatın.";
        }
        document.getElementById('error-modal').classList.remove('hidden');
        throw e;
    }
}

// --- THREE.JS KURULUMU ---
function initThree() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
    // Kameranın başlangıç rotasyonu
    camera.rotation.order = 'YXZ';
    
    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const light = new THREE.AmbientLight(0xffffff, 1);
    scene.add(light);
    const pointLight = new THREE.PointLight(0x00ffff, 2);
    pointLight.position.set(5, 5, 5);
    scene.add(pointLight);

    // İmleç (Parmak ucu noktası)
    handCursor = new THREE.Mesh(
        new THREE.SphereGeometry(0.04, 16, 16),
        new THREE.MeshBasicMaterial({ color: 0x00ffff, depthTest: false, transparent: true, opacity: 0.8 })
    );
    scene.add(handCursor);

    dragPlane = new THREE.Mesh(new THREE.PlaneGeometry(50, 50), new THREE.MeshBasicMaterial({ visible: false }));
    scene.add(dragPlane);

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
}

// --- MEDIAPIPE HANDS ---
async function initAI(stream) {
    hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    hands.onResults(onResults);

    async function detectionLoop() {
        if (video.paused || video.ended) return;
        await hands.send({ image: video });
        requestAnimationFrame(detectionLoop);
    }
    detectionLoop();
    log("AI Takibi başlatıldı.");
    handStatus.textContent = "El Takibi: AKTİF";
}

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function onResults(results) {
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        const indexTip = landmarks[8];
        const thumbTip = landmarks[4];

        // Ekran koordinatları
        mouse.x = (indexTip.x * 2) - 1;
        mouse.y = -(indexTip.y * 2) + 1;

        raycaster.setFromCamera(mouse, camera);

        // İmleç derinliği düzeltmesi (Nesneye odaklan)
        let cursorDist = 1.5;
        if (!isPinching) {
            const intersects = raycaster.intersectObjects([...objects, ...holeObjects]);
            if (intersects.length > 0) {
                cursorDist = camera.position.distanceTo(intersects[0].point);
            }
        }
        raycaster.ray.at(cursorDist, handCursor.position);

        // Çimdik Hareketi
        const dist = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y);
        if (dist < 0.06) {
            if (!isPinching) {
                isPinching = true;
                handCursor.material.color.set(0xff0000);
                startGrab();
            } else {
                updateGrab();
            }
        } else if (isPinching) {
            isPinching = false;
            handCursor.material.color.set(0x00ffff);
            endGrab();
        }
    }
}

// --- ETKİLEŞİM VE YENİ ÖZELLİKLER ---
document.getElementById('btn-mode').onclick = (e) => {
    interactionMode = (interactionMode + 1) % 3;
    e.target.textContent = modes[interactionMode];
    log(modes[interactionMode] + " aktif.");
};

function startGrab() {
    const intersects = raycaster.intersectObjects([...objects, ...holeObjects]);
    if (intersects.length > 0) {
        selectedObject = intersects[0].object;
        
        dragPlane.position.copy(selectedObject.position);
        dragPlane.lookAt(camera.position);
        
        const planeHit = raycaster.intersectObject(dragPlane);
        if (planeHit.length > 0) {
            pinchStartPos.copy(planeHit[0].point);
            objectStartPos.copy(selectedObject.position);
            pinchStartMouse.copy(mouse);
        }
    }
}

function updateGrab() {
    if (!selectedObject) return;

    if (interactionMode === 0) {
        // TAŞI (X/Y Ekseni)
        dragPlane.lookAt(camera.position);
        const planeHit = raycaster.intersectObject(dragPlane);
        if (planeHit.length > 0) {
            const offset = new THREE.Vector3().subVectors(planeHit[0].point, pinchStartPos);
            selectedObject.position.copy(objectStartPos).add(offset);
        }
    } 
    else if (interactionMode === 1) {
        // DÖNDÜR (3D Rotasyon)
        const deltaX = mouse.x - pinchStartMouse.x;
        const deltaY = mouse.y - pinchStartMouse.y;
        
        // Nesneyi kendi ekseni etrafında döndür
        selectedObject.rotateY(deltaX * 3);
        selectedObject.rotateX(deltaY * 3);
        
        pinchStartMouse.copy(mouse); // Sürekli rotasyon için sıfırla
    }
    else if (interactionMode === 2) {
        // DERİNLİK (Z Ekseni İleri/Geri)
        const deltaY = mouse.y - pinchStartMouse.y;
        // Kamera ile nesne arasındaki yön vektörünü bul
        const direction = new THREE.Vector3().subVectors(selectedObject.position, camera.position).normalize();
        
        // El aşağı/yukarı hareketine göre nesneyi ileri/geri it
        const newPos = new THREE.Vector3().copy(objectStartPos).add(direction.multiplyScalar(deltaY * 5));
        
        // Çok yaklaşmasını engelle
        if(camera.position.distanceTo(newPos) > 0.3) {
             selectedObject.position.copy(newPos);
        }
    }
}

function endGrab() {
    selectedObject = null;
}

// --- MODELLEME ---
function addObj(isHole = false) {
    const geo = new THREE.BoxGeometry(0.3, 0.3, 0.3);
    const mat = new THREE.MeshStandardMaterial({
        color: isHole ? 0xff0000 : 0x00aaff,
        transparent: true,
        opacity: isHole ? 0.5 : 0.9,
        metalness: 0.5,
        roughness: 0.1
    });
    const mesh = new THREE.Mesh(geo, mat);
    
    // Kameranın baktığı yönde 1.2 metre ileriye yerleştir (Odada sabit kalması için world space'te)
    const pos = new THREE.Vector3(0, 0, -1.2).applyQuaternion(camera.quaternion);
    mesh.position.copy(camera.position).add(pos);
    
    // Nesnenin kameraya bakmasını sağla
    mesh.lookAt(camera.position);
    
    scene.add(mesh);
    if (isHole) holeObjects.push(mesh); else objects.push(mesh);
    log(isHole ? "Delik eklendi." : "Küp eklendi.");
}

function merge() {
    if (objects.length === 0 || holeObjects.length === 0) return;
    const evaluator = new Evaluator();
    let base = objects[0];
    let baseBrush = new Brush(base.geometry, base.material);
    baseBrush.position.copy(base.position);
    baseBrush.rotation.copy(base.rotation);
    baseBrush.updateMatrixWorld();

    holeObjects.forEach(h => {
        const hBrush = new Brush(h.geometry, h.material);
        hBrush.position.copy(h.position);
        hBrush.rotation.copy(h.rotation);
        hBrush.updateMatrixWorld();
        baseBrush = evaluator.evaluate(baseBrush, hBrush, SUBTRACTION);
        scene.remove(h);
    });

    scene.remove(base);
    const result = new THREE.Mesh(baseBrush.geometry, baseBrush.material);
    result.position.copy(base.position);
    result.rotation.copy(base.rotation);
    scene.add(result);
    objects = [result];
    holeObjects = [];
    log("Birleştirildi.");
}

// --- ETRAFI TARAYIP YERLEŞTİRME (World-Lock & Jiroskop Düzeltmesi) ---
function initSensors() {
    window.addEventListener('orientationchange', () => {
        screenOrientation = window.orientation || 0;
    });

    // iOS 13+ İzin İsteği
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        log("Jiroskop için ekrana DOKUNUN.", true);
        document.body.addEventListener('click', async () => {
            try {
                const permissionState = await DeviceOrientationEvent.requestPermission();
                if (permissionState === 'granted') {
                    window.addEventListener('deviceorientation', (e) => { deviceOrientation = e; });
                    log("Mekan takibi aktif.");
                }
            } catch (err) {
                console.error(err);
            }
        }, { once: true });
    } else {
        window.addEventListener('deviceorientation', (e) => { deviceOrientation = e; });
        log("Mekan takibi aktif.");
    }
}

// Matematiksel Quaternion Düzeltmesi (Gerçek dünyaya tam sabitler)
function updateCameraRotation() {
    if (!deviceOrientation) return;

    const alpha = deviceOrientation.alpha ? THREE.MathUtils.degToRad(deviceOrientation.alpha) : 0;
    const beta = deviceOrientation.beta ? THREE.MathUtils.degToRad(deviceOrientation.beta) : 0;
    const gamma = deviceOrientation.gamma ? THREE.MathUtils.degToRad(deviceOrientation.gamma) : 0;
    const orient = screenOrientation ? THREE.MathUtils.degToRad(screenOrientation) : 0;

    const euler = new THREE.Euler(beta, alpha, -gamma, 'YXZ');
    const q1 = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5));
    const q0 = new THREE.Quaternion();
    const zee = new THREE.Vector3(0, 0, 1);

    camera.quaternion.setFromEuler(euler);
    camera.quaternion.multiply(q1);
    camera.quaternion.multiply(q0.setFromAxisAngle(zee, -orient));
}

function initVoice() {
    const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!Rec) return;
    const recognition = new Rec();
    recognition.lang = 'tr-TR';
    recognition.continuous = true;
    recognition.onstart = () => {
        micStatus.textContent = "DİNLENİYOR";
        micStatus.classList.add('recording-pulse');
    };
    recognition.onresult = (e) => {
        const text = e.results[e.results.length - 1][0].transcript.toLowerCase();
        log(`Ses: ${text}`);
        if (text.includes("küp")) addObj(false);
        if (text.includes("delik")) addObj(true);
        if (text.includes("birleştir") || text.includes("kes")) merge();
        if (text.includes("sil")) {
            const all = [...objects, ...holeObjects];
            if(all.length > 0) {
                const target = all[all.length-1];
                scene.remove(target);
                objects = objects.filter(o => o !== target);
                holeObjects = holeObjects.filter(o => o !== target);
            }
        }
    };
    recognition.start();
}

function animate() {
    requestAnimationFrame(animate);
    updateCameraRotation(); // Kamerayı gerçek dünya koordinatlarına kilitler
    renderer.render(scene, camera);
}

// --- START ---
window.addEventListener('load', async () => {
    try {
        const stream = await setupCamera();
        initThree();
        await initAI(stream);
        initSensors();
        initVoice();
        sysStatus.textContent = "Sistem: AKTİF";
        log("Tüm sistemler çevrimiçi.");
    } catch (e) {
        log("Başlatma hatası.", true);
    }
});

document.getElementById('btn-cube').onclick = () => addObj(false);
document.getElementById('btn-hole').onclick = () => addObj(true);
document.getElementById('btn-merge').onclick = merge;
document.getElementById('btn-delete').onclick = () => {
    if(objects.length > 0) scene.remove(objects.pop());
    else if(holeObjects.length > 0) scene.remove(holeObjects.pop());
};
</script>
</body>
</html>
