<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tuncer AR v10.0</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #ar-overlay {
            position: absolute; width: 100%; height: 100%;
            pointer-events: none; z-index: 10; display: flex; flex-direction: column;
            justify-content: space-between; padding: 20px; box-sizing: border-box;
        }
        .hud-data {
            align-self: flex-end; background: rgba(0, 20, 40, 0.7);
            border: 1px solid #00e5ff; border-radius: 8px; padding: 10px;
            color: #00e5ff; font-family: monospace; font-size: 12px;
        }
        #start-panel {
            position: fixed; inset: 0; background: #000; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #btn-go {
            background: #00e5ff; color: #000; font-weight: 900; padding: 20px 50px;
            border-radius: 15px; border: none; cursor: pointer; font-size: 18px;
            box-shadow: 0 0 50px rgba(0, 229, 255, 0.4);
        }
        #hint {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            color: white; font-weight: bold; text-align: center; text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div id="start-panel">
        <h1 style="color:#00e5ff; margin-bottom:20px; font-family:sans-serif;">TUNCER CORE v10</h1>
        <button id="btn-go">SİSTEMİ BAŞLAT</button>
        <p style="color:#666; margin-top:20px; font-size:12px;">WebXR / Hit-Test Engine</p>
    </div>

    <div id="ar-overlay">
        <div class="hud-data">
            X: <span id="x-pos">0.00</span><br>
            Y: <span id="y-pos">0.00</span><br>
            Z: <span id="z-pos">0.00</span>
        </div>
        <div id="hint">Zemini tarayın ve dokunun.</div>
    </div>

    <script type="module">
        let scene, camera, renderer, reticle, controller;
        let hitTestSource = null, hitTestSourceRequested = false;

        document.getElementById('btn-go').onclick = async () => {
            if (navigator.xr) {
                const isSupported = await navigator.xr.isSessionSupported('immersive-ar');
                if (isSupported) {
                    document.getElementById('start-panel').style.display = 'none';
                    initAR();
                } else {
                    alert("Cihazın WebXR desteklemiyor!");
                }
            }
        };

        async function initAR() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Hedef Halka (Masa algılandığında çıkar)
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.05, 0.07, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x00e5ff })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            // Işıklar
            scene.add(new THREE.AmbientLight(0xffffff, 1.0));
            const light = new THREE.DirectionalLight(0xffffff, 0.8);
            light.position.set(5, 10, 7);
            scene.add(light);

            // AR Oturumu Başlat
            const session = await navigator.xr.requestSession('immersive-ar', {
                requiredFeatures: ['hit-test', 'local-floor'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: document.getElementById('ar-overlay') }
            });

            renderer.xr.setSession(session);

            // Tıklama ile Obje Koy
            controller = renderer.xr.getController(0);
            controller.addEventListener('select', () => {
                if (reticle.visible) {
                    const geometry = new THREE.BoxGeometry(0.1, 0.1, 0.1);
                    const material = new THREE.MeshStandardMaterial({ color: 0x00e5ff, metalness: 0.5, roughness: 0.2 });
                    const cube = new THREE.Mesh(geometry, material);
                    
                    cube.position.setFromMatrixPosition(reticle.matrix);
                    cube.position.y += 0.05; // Masanın üstünde dursun
                    scene.add(cube);
                }
            });
            scene.add(controller);

            renderer.setAnimationLoop(render);
        }

        function render(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (hitTestSourceRequested === false) {
                    session.requestReferenceSpace('viewer').then((space) => {
                        session.requestHitTestSource({ space: space }).then((source) => {
                            hitTestSource = source;
                        });
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitResults = frame.getHitTestResults(hitTestSource);
                    if (hitResults.length > 0) {
                        const hit = hitResults[0];
                        const pose = hit.getPose(referenceSpace);

                        reticle.visible = true;
                        reticle.matrix.fromArray(pose.transform.matrix);
                        
                        const pos = new THREE.Vector3().setFromMatrixPosition(reticle.matrix);
                        document.getElementById('x-pos').innerText = pos.x.toFixed(2);
                        document.getElementById('y-pos').innerText = pos.y.toFixed(2);
                        document.getElementById('z-pos').innerText = pos.z.toFixed(2);
                        document.getElementById('hint').innerText = "YÜZEY BULUNDU - DOKUN";
                    } else {
                        reticle.visible = false;
                        document.getElementById('hint').innerText = "MASAYI / ZEMİNİ TARAYIN...";
                    }
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
