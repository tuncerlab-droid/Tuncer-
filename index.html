<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tuncer 3D Modelleyici (AR)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .pointer-events-auto { pointer-events: auto; }
        
        /* Gizli video elementi */
        .input_video { display: none; }
        
        /* Özel Slider Tasarımı */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; rounded: 50%; background: #3b82f6; cursor: pointer; margin-top: -6px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #cbd5e1; border-radius: 2px; }
        
        #loading { transition: opacity 0.5s; }
    </style>
</head>
<body>

    <!-- Yükleme Ekranı -->
    <div id="loading" class="fixed inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center text-white">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-blue-500 mb-4"></div>
        <h1 class="text-2xl font-bold mb-2">Tuncer 3D Modelleyici</h1>
        <p class="text-slate-300">AR ve El Takibi Yükleniyor...</p>
        <p class="text-sm text-slate-500 mt-2">Lütfen kamera izni verin.</p>
    </div>

    <!-- Kamera Video Çıktısı (Arka planda gizli, Three.js texture olarak kullanacak) -->
    <video class="input_video" autoplay playsinline></video>

    <!-- 3D Sahne -->
    <div id="canvas-container"></div>

    <!-- UI Arayüzü -->
    <div id="ui-layer" class="flex flex-col justify-between p-4">
        
        <!-- Üst Bar -->
        <div class="flex justify-between items-start pointer-events-auto">
            <div class="bg-white/90 backdrop-blur rounded-xl p-3 shadow-lg border border-slate-200">
                <h1 class="text-xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-cyan-500">
                    Tuncer 3D
                </h1>
                <p class="text-xs text-slate-500 font-medium">El Takibi ile AR Modelleme</p>
            </div>
            
            <!-- Bilgi Kartı -->
            <div class="bg-black/50 backdrop-blur rounded-lg p-2 text-white text-xs max-w-[150px] text-right">
                👆 Başparmak ve işaret parmağını birleştirerek objeleri tut ve taşı.
            </div>
        </div>

        <!-- Seçilen Obje Paneli (Sağ Orta) -->
        <div id="properties-panel" class="absolute right-4 top-1/2 -translate-y-1/2 bg-white/90 backdrop-blur rounded-xl p-4 shadow-xl border border-slate-200 w-48 pointer-events-auto hidden transition-all">
            <h3 class="font-bold text-slate-800 mb-3 border-b pb-1">Obje Ayarları</h3>
            
            <div class="mb-3">
                <label class="text-xs font-semibold text-slate-600">Tür</label>
                <div class="flex gap-2 mt-1">
                    <button id="btn-solid" class="flex-1 bg-blue-500 text-white text-xs py-1 rounded shadow">Katı</button>
                    <button id="btn-hole" class="flex-1 bg-slate-200 text-slate-700 text-xs py-1 rounded hover:bg-slate-300">Boşluk</button>
                </div>
            </div>

            <div class="space-y-2 mb-3">
                <div>
                    <label class="text-xs font-semibold text-slate-600 flex justify-between"><span>Genişlik (X)</span> <span id="val-x">1.0</span></label>
                    <input type="range" id="scale-x" min="0.2" max="3" step="0.1" value="1">
                </div>
                <div>
                    <label class="text-xs font-semibold text-slate-600 flex justify-between"><span>Yükseklik (Y)</span> <span id="val-y">1.0</span></label>
                    <input type="range" id="scale-y" min="0.2" max="3" step="0.1" value="1">
                </div>
                <div>
                    <label class="text-xs font-semibold text-slate-600 flex justify-between"><span>Derinlik (Z)</span> <span id="val-z">1.0</span></label>
                    <input type="range" id="scale-z" min="0.2" max="3" step="0.1" value="1">
                </div>
            </div>

            <button id="btn-delete" class="w-full bg-red-500 hover:bg-red-600 text-white text-sm font-bold py-2 rounded shadow-md transition-colors">
                Sil
            </button>
        </div>

        <!-- Alt Bar (Araçlar) -->
        <div class="pointer-events-auto flex justify-center gap-4 mt-auto pb-4">
            <button onclick="addShape('cube')" class="bg-white hover:bg-blue-50 text-blue-600 rounded-2xl p-4 shadow-xl border-2 border-blue-100 flex flex-col items-center transition-transform active:scale-95">
                <div class="w-8 h-8 bg-blue-500 rounded-sm shadow-inner mb-1"></div>
                <span class="text-xs font-bold">Küp</span>
            </button>
            <button onclick="addShape('sphere')" class="bg-white hover:bg-green-50 text-green-600 rounded-2xl p-4 shadow-xl border-2 border-green-100 flex flex-col items-center transition-transform active:scale-95">
                <div class="w-8 h-8 bg-green-500 rounded-full shadow-inner mb-1"></div>
                <span class="text-xs font-bold">Küre</span>
            </button>
            <button onclick="addShape('cylinder')" class="bg-white hover:bg-orange-50 text-orange-600 rounded-2xl p-4 shadow-xl border-2 border-orange-100 flex flex-col items-center transition-transform active:scale-95">
                <div class="w-8 h-8 bg-orange-500 rounded-md shadow-inner mb-1" style="border-radius: 8px 8px 0 0;"></div>
                <span class="text-xs font-bold">Silindir</span>
            </button>
        </div>
    </div>

    <script>
        // --- THREE.JS KURULUMU ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        // Kamera (Ekran oranına göre)
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.z = 5;

        // Render Motoru
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Işıklandırma
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        // Kamera Arka Planı İçin Video Texture
        const videoElement = document.querySelector('.input_video');
        const videoTexture = new THREE.VideoTexture(videoElement);
        videoTexture.minFilter = THREE.LinearFilter;
        videoTexture.magFilter = THREE.LinearFilter;
        videoTexture.format = THREE.RGBFormat;
        // Mobilde ön kamera genellikle aynalıdır, bu yüzden texture'ı çevirebiliriz
        videoTexture.center.set(0.5, 0.5);
        videoTexture.rotation = 0; // İhtiyaca göre değiştirilebilir
        scene.background = videoTexture;

        // --- UYGULAMA DEĞİŞKENLERİ ---
        const objects = []; // Sahnedeki tüm şekiller
        let selectedObject = null;
        let isPinching = false;
        
        // El imleci (İşaret parmağının ucundaki küçük küre)
        const cursorGeometry = new THREE.SphereGeometry(0.1, 16, 16);
        const cursorMaterial = new THREE.MeshBasicMaterial({ color: 0xffff00, wireframe: true });
        const cursor = new THREE.Mesh(cursorGeometry, cursorMaterial);
        scene.add(cursor);

        // Raycaster (3D seçme işlemi için)
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // Çalışma Düzlemi (Objelerin yerleştirileceği görünmez düzlem)
        const planeGeometry = new THREE.PlaneGeometry(100, 100);
        const planeMaterial = new THREE.MeshBasicMaterial({ visible: false });
        const workingPlane = new THREE.Mesh(planeGeometry, planeMaterial);
        scene.add(workingPlane);

        // --- UI ELEMENTLERİ ---
        const propertiesPanel = document.getElementById('properties-panel');
        const btnSolid = document.getElementById('btn-solid');
        const btnHole = document.getElementById('btn-hole');
        const scaleX = document.getElementById('scale-x');
        const scaleY = document.getElementById('scale-y');
        const scaleZ = document.getElementById('scale-z');
        const valX = document.getElementById('val-x');
        const valY = document.getElementById('val-y');
        const valZ = document.getElementById('val-z');

        // --- MATERYALLER (Katı ve Boşluk/Hole) ---
        const materials = {
            cube: new THREE.MeshStandardMaterial({ color: 0x3b82f6, roughness: 0.4 }),
            sphere: new THREE.MeshStandardMaterial({ color: 0x22c55e, roughness: 0.4 }),
            cylinder: new THREE.MeshStandardMaterial({ color: 0xf97316, roughness: 0.4 }),
            hole: new THREE.MeshStandardMaterial({ 
                color: 0xff0000, 
                transparent: true, 
                opacity: 0.3, 
                wireframe: true,
                depthWrite: false
            }),
            selected: new THREE.MeshStandardMaterial({ color: 0xeab308, emissive: 0x333300 }) // Seçili obje vurgusu
        };

        // --- ŞEKİL EKLEME FONKSİYONU ---
        window.addShape = function(type) {
            let geometry;
            let material = materials[type].clone(); // Her objenin kendi materyali olsun

            if (type === 'cube') geometry = new THREE.BoxGeometry(1, 1, 1);
            else if (type === 'sphere') geometry = new THREE.SphereGeometry(0.6, 32, 32);
            else if (type === 'cylinder') geometry = new THREE.CylinderGeometry(0.5, 0.5, 1, 32);

            const mesh = new THREE.Mesh(geometry, material);
            
            // Objeyi kameranın önüne, ortaya yerleştir
            mesh.position.set(0, 0, -2); // Kameradan 2 birim uzaklıkta
            
            // Obje verileri (Tinkercad mantığı)
            mesh.userData = {
                type: type,
                isHole: false,
                originalMaterial: material
            };

            scene.add(mesh);
            objects.push(mesh);
            selectObject(mesh);
        };

        // --- OBJE SEÇME VE UI GÜNCELLEME ---
        function selectObject(mesh) {
            // Eski seçili objeyi normale döndür
            if (selectedObject && selectedObject !== mesh) {
                selectedObject.material = selectedObject.userData.isHole ? materials.hole : selectedObject.userData.originalMaterial;
            }

            selectedObject = mesh;

            if (mesh) {
                // Yeni seçilen objeyi vurgula (Eğer boşluk değilse sarı yap, boşluksa belirgin kırmızı yap)
                if(!mesh.userData.isHole) {
                    mesh.material = materials.selected;
                }
                
                // UI Panelini Göster
                propertiesPanel.classList.remove('hidden');
                
                // Slider değerlerini objeye göre ayarla
                scaleX.value = mesh.scale.x; valX.innerText = mesh.scale.x.toFixed(1);
                scaleY.value = mesh.scale.y; valY.innerText = mesh.scale.y.toFixed(1);
                scaleZ.value = mesh.scale.z; valZ.innerText = mesh.scale.z.toFixed(1);

                // Katı/Boşluk buton durumlarını güncelle
                if (mesh.userData.isHole) {
                    btnHole.className = "flex-1 bg-red-500 text-white text-xs py-1 rounded shadow";
                    btnSolid.className = "flex-1 bg-slate-200 text-slate-700 text-xs py-1 rounded hover:bg-slate-300";
                } else {
                    btnSolid.className = "flex-1 bg-blue-500 text-white text-xs py-1 rounded shadow";
                    btnHole.className = "flex-1 bg-slate-200 text-slate-700 text-xs py-1 rounded hover:bg-slate-300";
                }
            } else {
                propertiesPanel.classList.add('hidden');
            }
        }

        // --- UI OLAY DİNLEYİCİLERİ ---
        btnSolid.addEventListener('click', () => {
            if(!selectedObject) return;
            selectedObject.userData.isHole = false;
            selectedObject.material = materials.selected; // Seçili olduğu için vurgulu kalsın
            btnSolid.className = "flex-1 bg-blue-500 text-white text-xs py-1 rounded shadow";
            btnHole.className = "flex-1 bg-slate-200 text-slate-700 text-xs py-1 rounded hover:bg-slate-300";
        });

        btnHole.addEventListener('click', () => {
            if(!selectedObject) return;
            selectedObject.userData.isHole = true;
            selectedObject.material = materials.hole;
            btnHole.className = "flex-1 bg-red-500 text-white text-xs py-1 rounded shadow";
            btnSolid.className = "flex-1 bg-slate-200 text-slate-700 text-xs py-1 rounded hover:bg-slate-300";
        });

        function updateScale() {
            if(!selectedObject) return;
            const x = parseFloat(scaleX.value);
            const y = parseFloat(scaleY.value);
            const z = parseFloat(scaleZ.value);
            selectedObject.scale.set(x, y, z);
            valX.innerText = x.toFixed(1);
            valY.innerText = y.toFixed(1);
            valZ.innerText = z.toFixed(1);
        }

        scaleX.addEventListener('input', updateScale);
        scaleY.addEventListener('input', updateScale);
        scaleZ.addEventListener('input', updateScale);

        document.getElementById('btn-delete').addEventListener('click', () => {
            if(!selectedObject) return;
            scene.remove(selectedObject);
            objects.splice(objects.indexOf(selectedObject), 1);
            selectObject(null);
        });

        // Ekrana tıklayınca boşluğu seçme
        window.addEventListener('click', (event) => {
            // UI elementlerine tıklanıyorsa işlem yapma
            if (event.target.tagName === 'BUTTON' || event.target.tagName === 'INPUT' || event.target.closest('#properties-panel')) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(objects);

            if (intersects.length > 0) {
                selectObject(intersects[0].object);
            } else {
                selectObject(null);
            }
        });


        // --- MEDIAPIPE EL TAKİBİ VE ETKİLEŞİM ---
        
        function onResults(results) {
            // Yükleme ekranını gizle
            document.getElementById('loading').style.opacity = "0";
            setTimeout(() => document.getElementById('loading').style.display = "none", 500);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0]; // Sadece ilk eli kullan
                
                // İşaret parmağı ucu (8) ve Başparmak ucu (4)
                const indexFinger = landmarks[8];
                const thumb = landmarks[4];

                // MediaPipe koordinatlarını (-1 ile 1 arasına) Three.js için dönüştür.
                // Not: Ön kamera genellikle aynalı olduğu için X eksenini tersine çeviriyoruz (1 - x)
                const ndcX = ((1 - indexFinger.x) * 2) - 1; 
                const ndcY = -(indexFinger.y * 2) + 1;

                // 3D İmleci Raycaster ile çalışma düzlemine yerleştir
                mouse.x = ndcX;
                mouse.y = ndcY;
                raycaster.setFromCamera(mouse, camera);
                
                // İmleç her zaman kameradan belli bir uzaklıkta (-2 Z ekseni) hareket etsin
                raycaster.ray.intersectPlane(new THREE.Plane(new THREE.Vector3(0, 0, 1), 2), cursor.position);

                // Çimdik Hareketi (Pinch) Algılama
                // Ekran koordinatları üzerinden mesafe hesapla
                const dx = indexFinger.x - thumb.x;
                const dy = indexFinger.y - thumb.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                const pinchThreshold = 0.05; // Bu değer hassasiyeti ayarlar

                if (distance < pinchThreshold) {
                    if (!isPinching) {
                        // Çimdikleme yeni başladı -> Obje tutma mantığı
                        isPinching = true;
                        cursor.material.color.setHex(0xff0000); // Tutarken imleç kırmızı olsun
                        cursor.scale.set(1.5, 1.5, 1.5);

                        // Raycaster ile objeye çarpıyor mu kontrol et
                        const intersects = raycaster.intersectObjects(objects);
                        if (intersects.length > 0) {
                            selectObject(intersects[0].object);
                        }
                    } else if (selectedObject) {
                        // Sürükleme işlemi (Pinching devam ediyor ve obje seçili)
                        // Objeyi imlecin pozisyonuna taşı (X ve Y düzleminde yumuşak geçiş)
                        selectedObject.position.lerp(cursor.position, 0.5);
                    }
                } else {
                    if (isPinching) {
                        // Çimdikleme bitti -> Objeyi bırak
                        isPinching = false;
                        cursor.material.color.setHex(0xffff00); // Sarıya dön
                        cursor.scale.set(1, 1, 1);
                    }
                }
            } else {
                // El görünmüyorsa imleci gizle/kilitli tut
                isPinching = false;
                cursor.material.color.setHex(0xffff00);
            }
        }

        const hands = new Hands({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }
        });
        
        hands.setOptions({
            maxNumHands: 1, // Tek el yeterli
            modelComplexity: 1, // 0 daha hızlı, 1 daha doğru. Mobilde 1 genelde iyidir.
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });
        
        hands.onResults(onResults);

        // Kamerayı Başlat
        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 1280,
            height: 720,
            facingMode: 'environment' // Arka kamerayı kullanmayı dener, mobilde çok önemlidir. Bulamazsa öne geçer.
        });
        cameraUtils.start();

        // --- PENCERE YENİDEN BOYUTLANDIRMA ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- ANİMASYON DÖNGÜSÜ ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Eğer varsa seçili objeye hafif bir "nefes alma" veya dönme efekti eklenebilir, 
            // şimdilik Tinkercad gibi sabit tutuyoruz.

            renderer.render(scene, camera);
        }
        
        // Her şey yüklendiğinde animasyonu başlat
        window.onload = () => {
            animate();
            
            // Küçük bir intro için varsayılan bir küp ekle
            setTimeout(() => {
                addShape('cube');
            }, 2000);
        };

    </script>
</body>
</html>
