<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tuncer Zeka - Gelişmiş Kontrol Paneli</title>
    <!-- Tailwind CSS for Responsive Design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom Scrollbar for a premium look */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 10px;
        }
        
        /* Glassmorphism effects */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Mobile specific touch adjustments */
        @media (max-width: 768px) {
            .touch-target {
                min-height: 48px;
            }
            .gui-container {
                padding-bottom: 80px; /* Space for mobile nav if needed */
            }
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen overflow-x-hidden font-sans">

    <!-- Ana Konteyner -->
    <div id="app" class="flex flex-col md:flex-row h-screen">
        
        <!-- Sol Panel / Masaüstü Sidebar - Mobilde Üst Bar -->
        <aside id="sidebar" class="w-full md:w-64 lg:w-72 glass-panel p-4 flex flex-col space-y-6 md:h-full z-20">
            <div class="flex items-center justify-between md:justify-center">
                <h1 class="text-xl font-bold tracking-wider text-blue-400">TUNCER ZEKA</h1>
                <button id="mobile-toggle" class="md:hidden p-2 bg-gray-800 rounded-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                </button>
            </div>

            <nav class="hidden md:block space-y-2 overflow-y-auto">
                <div class="p-3 bg-blue-600/20 rounded-xl cursor-pointer border border-blue-500/30">Kontrol Paneli</div>
                <div class="p-3 hover:bg-white/5 rounded-xl cursor-pointer transition">Analizler</div>
                <div class="p-3 hover:bg-white/5 rounded-xl cursor-pointer transition">Ayarlar</div>
            </nav>
        </aside>

        <!-- Ana İçerik Alanı -->
        <main class="flex-1 relative overflow-y-auto p-4 md:p-8 gui-container">
            <header class="mb-8">
                <h2 class="text-2xl md:text-4th font-semibold">Sistem Durumu</h2>
                <p class="text-gray-400 text-sm md:text-base">Kütüphane Durumu: <span id="lib-status" class="text-yellow-500 animate-pulse font-mono">Bekleniyor...</span></p>
            </header>

            <!-- GUI Elemanları Grid Yapısı -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Kart 1 -->
                <div class="glass-panel p-6 rounded-2xl hover:scale-[1.02] transition-transform duration-300">
                    <h3 class="text-lg font-medium mb-4 text-blue-300">İşlem Kapasitesi</h3>
                    <div id="gauge-container" class="h-32 flex items-center justify-center border-b border-white/10 mb-4">
                        <!-- Canvas/SVG for Tuncer-Zeka charts could go here -->
                        <span class="text-4xl font-bold">85%</span>
                    </div>
                    <button class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl touch-target transition font-semibold">Optimize Et</button>
                </div>

                <!-- Kart 2 -->
                <div class="glass-panel p-6 rounded-2xl">
                    <h3 class="text-lg font-medium mb-4 text-purple-300">Hızlı Komutlar</h3>
                    <div class="space-y-3">
                        <label class="block text-xs text-gray-500 uppercase">Hassasiyet</label>
                        <input type="range" class="w-full accent-purple-500 h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer">
                        <div class="flex justify-between mt-6">
                            <button class="px-4 py-2 bg-red-500/20 text-red-400 rounded-lg text-sm border border-red-500/50">Durdur</button>
                            <button class="px-4 py-2 bg-green-500/20 text-green-400 rounded-lg text-sm border border-green-500/50">Başlat</button>
                        </div>
                    </div>
                </div>

                <!-- Kart 3 -->
                <div class="glass-panel p-6 rounded-2xl sm:col-span-2 lg:col-span-1">
                    <h3 class="text-lg font-medium mb-4 text-emerald-300">Terminal Log</h3>
                    <div id="log-output" class="bg-black/40 p-4 rounded-lg h-40 font-mono text-xs overflow-y-auto text-emerald-500/80">
                        > Sistem başlatılıyor...<br>
                        > Modüller kontrol ediliyor...<br>
                        > Tuncer-Zeka kütüphanesi aranıyor...
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Kütüphane Yükleme ve Hata Yönetimi -->
    <script>
        // Kütüphane dosyasını yüklemeyi dene
        const script = document.createElement('script');
        script.src = 'tuncer-zeka.js';
        script.async = true;

        script.onload = function() {
            const status = document.getElementById('lib-status');
            const log = document.getElementById('log-output');
            
            status.innerText = "Bağlandı";
            status.classList.remove('text-yellow-500');
            status.classList.add('text-green-500');
            
            log.innerHTML += "<br>> [BAŞARILI] tuncer-zeka.js yüklendi.";
            
            // Eğer kütüphane bir init fonksiyonuna sahipse burada çağırabilirsin
            if (window.TuncerZeka) {
                console.log("Kütüphane Hazır:", window.TuncerZeka);
                // TuncerZeka.init();
            }
        };

        script.onerror = function() {
            const status = document.getElementById('lib-status');
            const log = document.getElementById('log-output');
            
            status.innerText = "Bulunamadı";
            status.classList.remove('text-yellow-500', 'animate-pulse');
            status.classList.add('text-red-500');
            
            log.innerHTML += "<br><span class='text-red-500'>> [HATA] tuncer-zeka.js dosyası taranamıyor. Dosya yolunu kontrol edin!</span>";
        };

        document.head.appendChild(script);

        // Mobil Menü Toggle
        document.getElementById('mobile-toggle').addEventListener('click', () => {
            const nav = document.querySelector('nav');
            nav.classList.toggle('hidden');
        });
    </script>
</body>
</html>
