<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tuncer Zeka OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #05070a;
            color: #e2e8f0;
        }

        .mono { font-family: 'Fira Code', monospace; }

        .sidebar-blur {
            background: rgba(10, 15, 25, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .chat-bubble-ai {
            background: #111827;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .loading-shimmer {
            background: linear-gradient(90deg, #111827 25%, #1f2937 50%, #111827 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="w-80 sidebar-blur hidden lg:flex flex-col z-50">
        <div class="p-6 border-b border-white/5">
            <div class="flex items-center gap-3 mb-6">
                <div class="w-3 h-3 rounded-full bg-blue-500 shadow-[0_0_10px_#3b82f6]"></div>
                <h1 class="text-lg font-extrabold tracking-tighter">TUNCER ZEKA <span class="text-blue-500">CORE</span></h1>
            </div>
            <button onclick="system.resetSession()" class="w-full py-3 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl text-sm font-semibold transition active:scale-95 flex items-center justify-center gap-2">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"></path></svg>
                Yeni Oturum Başlat
            </button>
        </div>

        <div id="history-container" class="flex-1 overflow-y-auto p-4 space-y-2">
            <!-- Geçmiş TuncerZeka tarafından yönetilecek -->
        </div>

        <div class="p-4 bg-black/40 border-t border-white/5">
            <div id="user-card" class="flex items-center gap-3 p-3 rounded-2xl bg-white/5 border border-white/10">
                <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-blue-600 to-indigo-700 flex items-center justify-center font-bold">U</div>
                <div class="flex-1 overflow-hidden">
                    <p class="text-sm font-bold truncate" id="username">Kullanıcı</p>
                    <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest" id="plan-type">Yükleniyor...</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- MAIN INTERFACE -->
    <main class="flex-1 flex flex-col relative">
        <!-- Top Status Bar -->
        <header class="h-14 border-b border-white/5 flex items-center justify-between px-6 bg-black/20">
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <span id="lib-status-dot" class="status-dot bg-red-500"></span>
                    <span id="lib-status-text" class="text-[10px] font-mono text-gray-500 uppercase tracking-widest">Kütüphane Bekleniyor</span>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <span id="memory-usage" class="text-[10px] font-mono text-gray-600">RAM: 0MB</span>
            </div>
        </header>

        <!-- Chat Area -->
        <div id="chat-flow" class="flex-1 overflow-y-auto p-6 lg:p-12 space-y-8 scroll-smooth">
            <!-- Başlangıç Mesajı -->
            <div class="max-w-2xl mx-auto text-center py-20" id="empty-state">
                <div class="inline-block p-4 rounded-3xl bg-blue-600/10 mb-6 border border-blue-500/20">
                    <svg class="w-12 h-12 text-blue-500" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                </div>
                <h2 class="text-2xl font-bold mb-2">Tuncer Zeka Engine Hazır</h2>
                <p class="text-gray-500 text-sm">Kütüphane protokolleri üzerinden doğrudan iletişim kurulabilir.</p>
            </div>
        </div>

        <!-- Input Section -->
        <div class="p-4 lg:p-10">
            <div class="max-w-4xl mx-auto relative">
                <div id="img-preview-box" class="hidden mb-4 p-2 bg-white/5 rounded-2xl w-fit border border-white/10">
                    <img src="" id="img-render" class="h-32 rounded-xl">
                    <button onclick="system.clearImage()" class="mt-2 text-[10px] text-red-400 hover:underline px-2">Görseli Kaldır</button>
                </div>
                
                <div class="flex items-end gap-3 p-2 bg-[#0e121b] border border-white/10 rounded-[24px] focus-within:border-blue-500/50 transition-all shadow-2xl">
                    <button onclick="document.getElementById('file-trigger').click()" class="p-3 text-gray-500 hover:text-white transition">
                        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    </button>
                    <input type="file" id="file-trigger" class="hidden" accept="image/*" onchange="system.handleImage(this)">

                    <textarea id="main-input" rows="1" placeholder="Komut gönder veya soru sor..." 
                        class="flex-1 bg-transparent border-none focus:ring-0 p-3 text-sm lg:text-base outline-none resize-none max-h-60"></textarea>

                    <button id="send-trigger" class="p-4 bg-blue-600 text-white rounded-[20px] hover:bg-blue-500 transition-all active:scale-90 disabled:opacity-20 disabled:grayscale shadow-lg shadow-blue-600/20">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"></path></svg>
                    </button>
                </div>
                <div id="feedback-msg" class="text-center text-[10px] text-gray-600 mt-4 uppercase tracking-widest font-bold">Tuncer-Zeka v1.0.4 - Standby</div>
            </div>
        </div>
    </main>

    <!-- TUNCER ZEKA BRIDGE SCRIPT -->
    <script>
        const system = {
            activeImage: null,
            isProcessing: false,
            
            init() {
                this.loadLibrary();
                this.bindEvents();
                this.checkMemory();
            },

            loadLibrary() {
                const script = document.createElement('script');
                script.src = 'tuncer-zeka.js';
                script.onload = () => this.onLibraryReady();
                script.onerror = () => this.onLibraryError();
                document.head.appendChild(script);
            },

            onLibraryReady() {
                document.getElementById('lib-status-dot').className = "status-dot bg-green-500";
                document.getElementById('lib-status-text').innerText = "Kütüphane Aktif";
                document.getElementById('lib-status-text').classList.replace('text-gray-500', 'text-green-500');
                
                // Kütüphane içindeki sınıfları/nesneleri kontrol et
                if (window.TuncerZeka) {
                    console.log("TuncerZeka Engine Bridge Bağlandı.");
                    this.updateUIFromLibrary();
                }
            },

            onLibraryError() {
                document.getElementById('lib-status-text').innerText = "Kütüphane Taranamıyor!";
                document.getElementById('feedback-msg').innerText = "KRİTİK HATA: tuncer-zeka.js EKSİK";
                document.getElementById('feedback-msg').classList.add('text-red-500');
            },

            updateUIFromLibrary() {
                // Kütüphaneden gelen verilere göre arayüzü güncelle
                if (window.TuncerZeka.config) {
                    document.getElementById('username').innerText = window.TuncerZeka.config.user || "Tuncer Admin";
                    document.getElementById('plan-type').innerText = window.TuncerZeka.config.plan || "Enterprise";
                }
            },

            bindEvents() {
                const input = document.getElementById('main-input');
                const btn = document.getElementById('send-trigger');

                btn.addEventListener('click', () => this.processInput());
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        this.processInput();
                    }
                });

                input.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = this.scrollHeight + 'px';
                });
            },

            handleImage(input) {
                if (input.files && input.files[0]) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        this.activeImage = e.target.result;
                        document.getElementById('img-render').src = e.target.result;
                        document.getElementById('img-preview-box').classList.remove('hidden');
                    };
                    reader.readAsDataURL(input.files[0]);
                }
            },

            clearImage() {
                this.activeImage = null;
                document.getElementById('file-trigger').value = "";
                document.getElementById('img-preview-box').classList.add('hidden');
            },

            async processInput() {
                const inputEl = document.getElementById('main-input');
                const prompt = inputEl.value.trim();
                
                if ((!prompt && !this.activeImage) || this.isProcessing) return;

                // Başlangıç ekranını kaldır
                const empty = document.getElementById('empty-state');
                if (empty) empty.remove();

                this.isProcessing = true;
                this.appendMessage('user', prompt, this.activeImage);
                
                const currentPrompt = prompt;
                const currentImg = this.activeImage;
                
                inputEl.value = "";
                inputEl.style.height = 'auto';
                this.clearImage();

                // UI Bekleme Modu
                const loadingId = this.showLoading();

                try {
                    // GERÇEK KÜTÜPHANE ÇAĞRISI
                    // Varsayılan olarak TuncerZeka.ask veya TuncerZeka.generate metodunu bekler
                    let response = "";
                    
                    if (window.TuncerZeka && typeof window.TuncerZeka.process === 'function') {
                        response = await window.TuncerZeka.process({
                            text: currentPrompt,
                            image: currentImg,
                            timestamp: Date.now()
                        });
                    } else {
                        // Kütüphane yüklü ama metod farklıysa buraya fallback koyulur
                        response = "HATA: TuncerZeka.process() metodu kütüphanede bulunamadı.";
                    }

                    this.removeLoading(loadingId);
                    this.appendMessage('ai', response);
                    
                    // Hafızayı kütüphane üzerinden güncelle
                    if (window.TuncerZeka.updateHistory) {
                        window.TuncerZeka.updateHistory(currentPrompt, response);
                    }
                    this.syncHistory();

                } catch (err) {
                    this.removeLoading(loadingId);
                    this.appendMessage('ai', "Sistem Hatası: " + err.message);
                } finally {
                    this.isProcessing = false;
                }
            },

            appendMessage(role, text, imgSrc) {
                const container = document.getElementById('chat-flow');
                const div = document.createElement('div');
                div.className = `flex gap-4 ${role === 'user' ? 'flex-row-reverse' : ''} animate-slide-up`;
                
                const avatar = role === 'user' ? 'SEN' : 'TZ';
                const bg = role === 'user' ? 'bg-blue-600' : 'chat-bubble-ai';
                
                let html = `
                    <div class="w-10 h-10 rounded-xl ${role === 'user' ? 'bg-gray-800' : 'bg-blue-600'} flex-shrink-0 flex items-center justify-center font-bold text-[10px] border border-white/10 shadow-xl">${avatar}</div>
                    <div class="flex-1 max-w-[80%] ${role === 'user' ? 'text-right' : ''}">
                        <div class="inline-block p-4 rounded-2xl ${bg} text-sm leading-relaxed text-left border border-white/5 shadow-2xl">
                `;

                if (imgSrc) {
                    html += `<img src="${imgSrc}" class="max-w-full rounded-lg mb-3 border border-white/10">`;
                }

                if (text) {
                    html += `<p class="whitespace-pre-wrap">${text}</p>`;
                }

                html += `</div></div>`;
                div.innerHTML = html;
                container.appendChild(div);
                container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });

                // İlk mesajı başlık yapma (Kütüphane yönetimi ile)
                if (role === 'user' && !this.firstMsg) {
                    this.firstMsg = text;
                    this.updateSidebarTitle(text);
                }
            },

            updateSidebarTitle(text) {
                const history = document.getElementById('history-container');
                const title = text.substring(0, 24) + "...";
                const div = document.createElement('div');
                div.className = "p-3 rounded-xl bg-white/5 border border-white/5 text-xs truncate cursor-pointer hover:bg-white/10 transition";
                div.innerText = title;
                history.prepend(div);
            },

            showLoading() {
                const id = 'loader-' + Date.now();
                const container = document.getElementById('chat-flow');
                const div = document.createElement('div');
                div.id = id;
                div.className = "flex gap-4 animate-pulse";
                div.innerHTML = `
                    <div class="w-10 h-10 rounded-xl bg-blue-900/50 flex items-center justify-center font-bold text-[10px]">...</div>
                    <div class="flex-1 max-w-[80%]">
                        <div class="h-12 w-32 bg-white/5 rounded-2xl border border-white/5 loading-shimmer"></div>
                    </div>
                `;
                container.appendChild(div);
                container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
                return id;
            },

            removeLoading(id) {
                const el = document.getElementById(id);
                if (el) el.remove();
            },

            checkMemory() {
                // Tarayıcı bellek kullanımını simüle et (Gerçek veri varsa göster)
                if (window.performance && window.performance.memory) {
                    const used = Math.round(window.performance.memory.usedJSHeapSize / 1048576);
                    document.getElementById('memory-usage').innerText = `RAM: ${used}MB`;
                }
                setTimeout(() => this.checkMemory(), 5000);
            },

            syncHistory() {
                // Kütüphaneden geçmişi alıp sidebar'ı güncelleme fonksiyonu
                console.log("Hafıza kütüphane ile senkronize edildi.");
            },

            resetSession() {
                if (confirm("Mevcut oturum verileri Tuncer-Zeka belleğinden silinsin mi?")) {
                    location.reload();
                }
            }
        };

        window.onload = () => system.init();
    </script>
</body>
</html>
