<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNCER HOLO AR v4.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.7.0/build/index.module.js",
                "three-bvh-csg": "https://unpkg.com/three-bvh-csg@0.0.16/build/index.module.js"
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Share Tech Mono', monospace; color: #0ff; }
        #ar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }
        .interactive { pointer-events: auto !important; }
        #overlay-start { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 1001; pointer-events: auto; }
        #overlay-ui { display: none; width: 100%; height: 100%; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        .hud-border { background: rgba(0, 20, 30, 0.85); border: 1px solid #0ff; box-shadow: 0 0 10px rgba(0, 255, 255, 0.3); }
        .btn-holo { background: rgba(0, 40, 40, 0.9); border: 1px solid #0ff; color: #0ff; padding: 12px 5px; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .btn-holo:active { background: #0ff; color: #000; }
        #video-feed { position: fixed; bottom: 10px; right: 10px; width: 80px; height: 60px; border: 1px solid #0ff; opacity: 0.5; z-index: 500; transform: scaleX(-1); display: none; }
    </style>
</head>
<body>

    <video id="video-feed" autoplay playsinline></video>
    <div id="canvas-container"></div>

    <div id="ar-overlay">
        <div id="overlay-start">
            <div class="text-center border border-cyan-500 p-8 bg-black/90">
                <h1 class="text-3xl font-bold mb-2 text-cyan-400 italic">TUNCER v4.6</h1>
                <p class="text-[10px] tracking-widest text-cyan-700 mb-6 font-bold uppercase">Dual-Stream Stability Patch</p>
                <div id="status-init" class="text-[10px] mb-4 text-yellow-500 italic font-bold">KAMERA ERİŞİMİ BEKLENİYOR...</div>
                <div id="button-container" class="interactive opacity-30 pointer-events-none"></div>
            </div>
        </div>

        <div id="overlay-ui" class="flex flex-col h-full pointer-events-none">
            <div class="flex justify-between w-full interactive mt-2">
                <div class="hud-border p-2 w-48">
                    <div id="status-text" class="text-yellow-500 text-[10px] font-bold">SYSTEM: SCANNING...</div>
                    <div id="hand-text" class="text-red-500 text-[9px] mt-1 font-bold italic underline">EL ALGILANMADI</div>
                </div>
                <div class="hud-border px-3 py-1 flex items-center">
                    <span id="rotation-text" class="text-cyan-500 text-[10px] font-bold italic">ROT: 0°</span>
                </div>
            </div>

            <div class="mt-auto mb-6 flex flex-col gap-3 w-full">
                <div class="hud-border p-2 h-16 w-full overflow-hidden text-[9px] opacity-80" id="console">
                    <div class="text-green-400 font-bold">> Kamera akışı bağlandı.</div>
                </div>
                
                <div class="grid grid-cols-2 gap-2 w-full interactive">
                    <button id="add-cube" class="btn-holo">KÜP EKLE</button>
                    <button id="add-hole" class="btn-holo border-red-500 text-red-500">DELİK EKLE</button>
                    <button id="do-merge" class="btn-holo border-yellow-500 text-yellow-500">KES / BİRLEŞTİR</button>
                    <button id="do-clear" class="btn-holo border-white text-white">TEMİZLE</button>
                </div>
            </div>
        </div>
    </div>

<script type="module">
import * as THREE from 'three';
import { ARButton } from 'three/addons/webxr/ARButton.js';
import { SUBTRACTION, Brush, Evaluator } from 'three-bvh-csg';

let scene, camera, renderer, reticle;
let hitTestSource = null, hitTestSourceRequested = false;
let objects = [], holeObjects = [];
let isGrabbing = false, selectedObject = null;

// El Takip ve Rotasyon
let handLandmarks = null;
const pinchPointWorld = new THREE.Vector3();
let initialHandRotation = 0;
let initialObjRotation = 0;

const videoElement = document.getElementById('video-feed');
const hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 0,
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.5
});

hands.onResults((results) => {
    handLandmarks = (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) ? results.multiHandLandmarks[0] : null;
    const hText = document.getElementById('hand-text');
    if (handLandmarks) {
        hText.textContent = "EL: AKTİF";
        hText.className = "text-green-400 text-[9px] mt-1 font-bold";
    } else {
        hText.textContent = "EL: BEKLENİYOR";
        hText.className = "text-red-500 text-[9px] mt-1";
    }
});

// Kamera Başlatma (AR Başlamadan Önce)
const mpCamera = new Camera(videoElement, {
    onFrame: async () => { await hands.send({image: videoElement}); },
    width: 640, height: 480
});

mpCamera.start().then(() => {
    document.getElementById('status-init').textContent = "KAMERA HAZIR. AR BAŞLATILABİLİR.";
    document.getElementById('status-init').className = "text-[10px] mb-4 text-green-500 font-bold";
    document.getElementById('button-container').classList.remove('opacity-30', 'pointer-events-none');
}).catch(err => {
    document.getElementById('status-init').textContent = "KAMERA HATASI: " + err.name;
    document.getElementById('status-init').className = "text-[10px] mb-4 text-red-500";
});

function log(m, err = false) {
    const d = document.createElement('div');
    d.textContent = `> ${m}`;
    d.className = err ? 'text-red-500 font-bold' : 'text-cyan-400';
    const consoleDiv = document.getElementById('console');
    consoleDiv.appendChild(d);
    if(consoleDiv.childNodes.length > 5) consoleDiv.removeChild(consoleDiv.firstChild);
}

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1.5));
    const dl = new THREE.DirectionalLight(0xffffff, 1.0);
    dl.position.set(1, 5, 1);
    scene.add(dl);

    const arBtn = ARButton.createButton(renderer, {
        requiredFeatures: ['hit-test'],
        optionalFeatures: ['dom-overlay'],
        domOverlay: { root: document.getElementById('ar-overlay') }
    });
    document.getElementById('button-container').appendChild(arBtn);

    reticle = new THREE.Mesh(
        new THREE.RingGeometry(0.04, 0.05, 32).rotateX(-Math.PI/2),
        new THREE.MeshBasicMaterial({ color: 0x00ffff })
    );
    reticle.matrixAutoUpdate = false;
    reticle.visible = false;
    scene.add(reticle);

    renderer.xr.addEventListener('sessionstart', () => {
        document.getElementById('overlay-start').style.display = 'none';
        document.getElementById('overlay-ui').style.display = 'flex';
        log("AR Modu Başladı.");
    });

    renderer.setAnimationLoop(render);
}

function updateHandLogic() {
    if (!handLandmarks) return;

    // Koordinatlar
    const wrist = handLandmarks[0];
    const thumb = handLandmarks[4];
    const index = handLandmarks[8];
    const middleRoot = handLandmarks[9];

    // Pinch mesafesi
    const dx = thumb.x - index.x;
    const dy = thumb.y - index.y;
    const pinchDist = Math.sqrt(dx*dx + dy*dy);

    // Three.js koordinatına çevir (Hassaslaştırma)
    const midX = ( (thumb.x + index.x) / 2 ) * 2 - 1;
    const midY = -( (thumb.y + index.y) / 2 ) * 2 - 1;
    pinchPointWorld.set(midX, midY, 0.5).unproject(camera);

    // Rotasyon (Bilek-Orta Parmak Kökü açısı)
    const angle = Math.atan2(middleRoot.y - wrist.y, middleRoot.x - wrist.x);
    document.getElementById('rotation-text').textContent = `ROT: ${Math.round(angle * (180/Math.PI))}°`;

    if (!isGrabbing) {
        let nearest = null;
        let minDist = 0.2;
        [...objects, ...holeObjects].forEach(obj => {
            const d = obj.position.distanceTo(pinchPointWorld);
            if (d < minDist) { minDist = d; nearest = obj; }
        });

        if (nearest && pinchDist < 0.08) {
            isGrabbing = true;
            selectedObject = nearest;
            initialHandRotation = angle;
            initialObjRotation = selectedObject.rotation.y;
            log("Obje Yakalandı.");
        }
    } else {
        if (pinchDist > 0.15) {
            isGrabbing = false;
            selectedObject = null;
            log("Obje Bırakıldı.");
        } else if (selectedObject) {
            // Hareket ve Dönüş
            selectedObject.position.lerp(pinchPointWorld, 0.2);
            const rotDiff = angle - initialHandRotation;
            selectedObject.rotation.y = initialObjRotation - rotDiff * 2.5;
        }
    }
}

function spawn(isHole) {
    if(!reticle.visible) return;
    const geo = new THREE.BoxGeometry(0.1, 0.1, 0.1);
    const mat = new THREE.MeshStandardMaterial({
        color: isHole ? 0xff3333 : 0x00ffff,
        transparent: true, opacity: isHole ? 0.7 : 1.0,
        emissive: 0x000000
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.setFromMatrixPosition(reticle.matrix);
    mesh.translateY(0.05);
    scene.add(mesh);
    if(isHole) holeObjects.push(mesh); else objects.push(mesh);
}

function mergeCSG() {
    if(!objects.length || !holeObjects.length) return;
    try {
        const evaluator = new Evaluator();
        let mainObj = objects[0];
        let mainBrush = new Brush(mainObj.geometry, mainObj.material);
        mainBrush.position.copy(mainObj.position);
        mainBrush.rotation.copy(mainObj.rotation);
        mainBrush.updateMatrixWorld();

        holeObjects.forEach(h => {
            const hBrush = new Brush(h.geometry, h.material);
            hBrush.position.copy(h.position);
            hBrush.rotation.copy(h.rotation);
            hBrush.updateMatrixWorld();
            mainBrush = evaluator.evaluate(mainBrush, hBrush, SUBTRACTION);
            scene.remove(h);
        });

        scene.remove(mainObj);
        const result = new THREE.Mesh(mainBrush.geometry, mainBrush.material);
        result.position.copy(mainObj.position);
        result.rotation.copy(mainObj.rotation);
        scene.add(result);
        objects = [result];
        holeObjects = [];
        log("Birleştirme Tamam.");
    } catch(e) { log("CSG Hatası!", true); }
}

function render(t, frame) {
    if (frame) {
        const refSpace = renderer.xr.getReferenceSpace();
        if (!hitTestSourceRequested) {
            renderer.xr.getSession().requestReferenceSpace('viewer').then(s => {
                renderer.xr.getSession().requestHitTestSource({ space: s }).then(src => hitTestSource = src);
            });
            hitTestSourceRequested = true;
        }
        if (hitTestSource) {
            const hits = frame.getHitTestResults(hitTestSource);
            if (hits.length) {
                const pose = hits[0].getPose(refSpace);
                reticle.visible = true;
                reticle.matrix.fromArray(pose.transform.matrix);
                document.getElementById('status-text').textContent = "SYSTEM: READY";
                document.getElementById('status-text').className = "text-green-400 text-[10px] font-bold";
            } else {
                reticle.visible = false;
            }
        }
        updateHandLogic();
    }
    renderer.render(scene, camera);
}

window.onload = init;
document.getElementById('add-cube').onclick = () => spawn(false);
document.getElementById('add-hole').onclick = () => spawn(true);
document.getElementById('do-merge').onclick = mergeCSG;
document.getElementById('do-clear').onclick = () => {
    [...objects, ...holeObjects].forEach(o => scene.remove(o));
    objects = []; holeObjects = [];
    log("Temizlendi.");
};
</script>
</body>
</html>
