<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuncer Zeka - Gözlük HUD</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #020202;
            color: #00e5ff;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Arka plan hologram ızgarası ve tarama çizgileri */
        .grid-bg {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg);
            animation: moveGrid 10s linear infinite;
            z-index: 0;
        }

        @keyframes moveGrid {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(40px); }
        }

        /* Glassmorphism Paneller */
        .hud-container {
            position: relative;
            z-index: 10;
            width: 90vw;
            height: 90vh;
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            grid-template-rows: 1fr 3fr 1fr;
            gap: 20px;
        }

        .panel {
            background: rgba(0, 229, 255, 0.03);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.05);
            display: flex;
            flex-direction: column;
        }

        /* Merkezdeki Animasyonlu Çember (Arc Reactor Tarzı) */
        .center-display {
            grid-column: 2;
            grid-row: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            border: none;
            background: transparent;
            backdrop-filter: none;
            box-shadow: none;
        }

        .ring {
            width: 300px;
            height: 300px;
            border: 2px solid transparent;
            border-top: 4px solid #00e5ff;
            border-right: 4px solid #00e5ff;
            border-radius: 50%;
            position: absolute;
            animation: rotateRight 4s linear infinite;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.4);
        }

        .ring.inner {
            width: 250px;
            height: 250px;
            border: 2px solid transparent;
            border-bottom: 4px solid #00e5ff;
            border-left: 4px solid #00e5ff;
            animation: rotateLeft 3s linear infinite;
        }

        .core {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #00e5ff;
            z-index: 2;
            text-align: center;
        }

        @keyframes rotateRight {
            100% { transform: rotate(360deg); }
        }
        @keyframes rotateLeft {
            100% { transform: rotate(-360deg); }
        }

        /* Metin ve Log Alanları */
        h3 { margin-top: 0; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid rgba(0,229,255,0.3); padding-bottom: 5px; }
        .log { flex-grow: 1; overflow-y: auto; font-size: 12px; font-family: monospace; display: flex; flex-direction: column; gap: 5px; }
        .log span { color: #fff; }
        .user-text { color: #00ffaa; }
        .ai-text { color: #00e5ff; }

        /* Başlat Butonu */
        #start-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid #00e5ff;
            color: #00e5ff;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            z-index: 20;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        }

        #start-btn:hover {
            background: rgba(0, 229, 255, 0.3);
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.6);
        }

    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div class="hud-container">
        <div class="panel">
            <h3>SİSTEM DURUMU</h3>
            <div class="log">
                <div>> GÜÇ: <span style="color:#00ffaa">OPTİMAL</span></div>
                <div>> BAĞLANTI: <span style="color:#00ffaa">AKTİF</span></div>
                <div>> ÇEKİRDEK: <span style="color:#00ffaa">TUNCER Z.01</span></div>
                <div id="status-text">> Ses Modülü: Bekleniyor...</div>
            </div>
        </div>

        <div class="panel" style="grid-column: 3; grid-row: 1 / span 2;">
            <h3>İLETİŞİM PROTOKOLÜ</h3>
            <div class="log" id="chat-log">
                </div>
        </div>

        <div class="center-display">
            <div class="ring"></div>
            <div class="ring inner"></div>
            <div class="core" id="core-text">TUNCER ZEKA<br><span style="font-size:12px; color:#fff">SİSTEM ÇEVRİMİÇİ</span></div>
        </div>
    </div>

    <button id="start-btn">SİSTEMİ BAŞLAT</button>

    <script>
        const startBtn = document.getElementById('start-btn');
        const statusText = document.getElementById('status-text');
        const chatLog = document.getElementById('chat-log');
        const coreText = document.getElementById('core-text');

        // Web Speech API Kontrolü (Tamamen Ücretsiz)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const synth = window.speechSynthesis;
        
        if (!SpeechRecognition) {
            alert("Tarayıcınız ses tanımayı desteklemiyor. Lütfen Chrome kullanın.");
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'tr-TR';
        recognition.continuous = false; // Tek bir cümle dinler, bitince kapanır. Sonra tekrar açarız.
        recognition.interimResults = false;

        function addLog(sender, text) {
            const div = document.createElement('div');
            const colorClass = sender === 'Sen' ? 'user-text' : 'ai-text';
            div.innerHTML = `[${sender}]: <span class="${colorClass}">${text}</span>`;
            chatLog.appendChild(div);
            chatLog.scrollTop = chatLog.scrollHeight; // Otomatik aşağı kaydır
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'tr-TR';
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            
            // Konuşurken arayüzü hareketlendir
            coreText.innerHTML = "TUNCER ZEKA<br><span style='font-size:12px; color:#00ffaa'>YANIT VERİYOR...</span>";
            
            utterance.onend = () => {
                coreText.innerHTML = "TUNCER ZEKA<br><span style='font-size:12px; color:#fff'>DİNLENİYOR...</span>";
                // Konuşma bitince tekrar dinlemeye başla
                setTimeout(() => {
                    try { recognition.start(); } catch(e){}
                }, 500);
            };

            synth.speak(utterance);
            addLog('Tuncer Zeka', text);
        }

        // --- YAPAY ZEKA MANTIĞI (Ücretsiz ve Çevrimdışı) ---
        function processCommand(command) {
            command = command.toLowerCase();

            if (command.includes("merhaba") || command.includes("selam")) {
                speak("Sistemler çevrimiçi. Size nasıl yardımcı olabilirim Ahmet Bey?");
            } 
            else if (command.includes("kimsin") || command.includes("kendini tanıt") || command.includes("adın ne")) {
                speak("Benim adım Tuncer Zeka. Ben üst düzey bir yapay zeka asistanıyım. Yaratıcım ve baş mimarım Ahmet Tuncer'dir.");
            }
            else if (command.includes("durum") || command.includes("rapor")) {
                speak("Tüm sistemler stabil. Gözlük sensörleri ve batarya seviyesi optimal durumda.");
            }
            else if (command.includes("kapan") || command.includes("sistemi kapat")) {
                speak("Sistem kapatılıyor. İyi günler Ahmet Bey.");
                recognition.stop();
                coreText.innerHTML = "TUNCER ZEKA<br><span style='font-size:12px; color:red'>ÇEVRİMDIŞI</span>";
            }
            else {
                // Bilmediği komutlarda havalı bir hata mesajı
                speak("Bağışlayın efendim, bu komut şu anki veri tabanımda bulunmuyor. Yeni bir modül yazmanızı bekliyorum.");
            }
        }

        recognition.onstart = function() {
            statusText.innerHTML = "> Ses Modülü: <span style='color:#00ffaa'>DİNLİYOR...</span>";
        };

        recognition.onresult = function(event) {
            const transcript = event.results[0][0].transcript;
            addLog('Sen', transcript);
            processCommand(transcript);
        };

        recognition.onerror = function(event) {
            statusText.innerHTML = `> Hata: ${event.error}`;
            // Hata olsa bile birkaç saniye sonra tekrar dene (sürekli dinleme döngüsü)
            setTimeout(() => {
                try { recognition.start(); } catch(e){}
            }, 1000);
        };

        recognition.onend = function() {
            statusText.innerHTML = "> Ses Modülü: BEKLEMEDE";
        };

        // Sistemi Başlat
        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none'; // Butonu gizle
            speak("Sistem başlatılıyor. Hoş geldiniz Ahmet Bey.");
        });

    </script>
</body>
</html>
