<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNCER HOLO AR v3.8</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.7.0/build/index.module.js",
                "three-bvh-csg": "https://unpkg.com/three-bvh-csg@0.0.16/build/index.module.js"
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Share Tech Mono', monospace;
            color: #0ff;
        }

        /* WebXR Overlay'in çalışması için bu div mutlaka body'nin direkt çocuğu olmalı */
        #ar-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .interactive {
            pointer-events: auto !important;
        }

        /* Başlangıç Ekranı */
        #overlay-start {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.9);
            z-index: 1001;
            pointer-events: auto;
        }

        /* AR Arayüzü */
        #overlay-ui {
            display: none; /* Oturum başlayınca JS ile açılacak */
            width: 100%; height: 100%;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        .hud-border {
            background: rgba(0, 20, 30, 0.85);
            border: 1px solid #0ff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
        }

        .btn-holo {
            background: #002222;
            border: 1px solid #0ff;
            color: #0ff;
            padding: 15px 5px;
            font-weight: bold;
            text-align: center;
            font-size: 12px;
        }

        .btn-holo:active {
            background: #0ff;
            color: #000;
        }

        /* ARButton Stilini Ezme */
        #ARButton {
            position: static !important;
            margin-top: 20px !important;
            background: #004444 !important;
            border: 1px solid #0ff !important;
            color: #0ff !important;
            font-family: 'Share Tech Mono' !important;
            font-size: 16px !important;
            padding: 15px 30px !important;
            opacity: 1 !important;
            cursor: pointer !important;
            pointer-events: auto !important;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <!-- ANA OVERLAY KATMANI -->
    <div id="ar-overlay">
        
        <!-- Başlangıç Paneli -->
        <div id="overlay-start">
            <div class="text-center border border-cyan-500 p-10 bg-black">
                <h1 class="text-3xl font-bold mb-2">TUNCER HOLO v3.8</h1>
                <p class="text-[10px] tracking-[0.3em] text-cyan-700 mb-6">SİSTEM HAZIRLANIYOR</p>
                <div id="button-container" class="interactive">
                    <!-- ARButton buraya gelecek -->
                </div>
            </div>
        </div>

        <!-- AR Kontrol Paneli -->
        <div id="overlay-ui">
            <!-- Üst Bar -->
            <div class="flex justify-between w-full interactive mt-2">
                <div class="hud-border p-2 w-40">
                    <div id="status-text" class="text-yellow-500 text-[10px] animate-pulse">TARANIYOR...</div>
                    <div id="hand-text" class="text-cyan-800 text-[9px] mt-1 italic">EL VERİSİ YOK</div>
                </div>
                <div class="hud-border px-3 py-1 flex items-center">
                    <span class="text-green-500 text-[10px]">SİSTEM: ONLINE</span>
                </div>
            </div>

            <!-- Alt Bar -->
            <div class="w-full mb-6 flex flex-col gap-3">
                <div class="hud-border p-2 h-16 w-full overflow-hidden text-[9px] opacity-60" id="console">
                    <div>> V3.8 Cekirdek yuklendi.</div>
                </div>
                
                <div class="grid grid-cols-2 gap-2 w-full interactive">
                    <button id="add-cube" class="btn-holo">KÜP EKLE</button>
                    <button id="add-hole" class="btn-holo border-red-500 text-red-500">DELİK EKLE</button>
                    <button id="do-merge" class="btn-holo border-yellow-500 text-yellow-500">BİRLEŞTİR (CSG)</button>
                    <button id="do-clear" class="btn-holo border-white text-white">TEMİZLE</button>
                </div>
            </div>
        </div>

    </div>

<script type="module">
import * as THREE from 'three';
import { ARButton } from 'three/addons/webxr/ARButton.js';
import { XRHandModelFactory } from 'three/addons/webxr/XRHandModelFactory.js';
import { SUBTRACTION, Brush, Evaluator } from 'three-bvh-csg';

let scene, camera, renderer, reticle;
let hitTestSource = null, hitTestSourceRequested = false;
let objects = [], holeObjects = [];
let hand0, isGrabbing = false, selectedObject = null;

const overlayStart = document.getElementById('overlay-start');
const overlayUI = document.getElementById('overlay-ui');
const arOverlay = document.getElementById('ar-overlay');
const consoleDiv = document.getElementById('console');

function log(m, err = false) {
    const d = document.createElement('div');
    d.textContent = `> ${m}`;
    d.className = err ? 'text-red-500' : 'text-cyan-400';
    consoleDiv.appendChild(d);
    if(consoleDiv.childNodes.length > 4) consoleDiv.removeChild(consoleDiv.firstChild);
}

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, stencil: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1.5));

    // AR Button Kurulumu
    const btn = ARButton.createButton(renderer, {
        requiredFeatures: ['hit-test'],
        optionalFeatures: ['dom-overlay', 'hand-tracking'],
        domOverlay: { root: arOverlay }
    });
    document.getElementById('button-container').appendChild(btn);

    // El Takibi
    const handFactory = new XRHandModelFactory();
    hand0 = renderer.xr.getHand(0);
    hand0.add(handFactory.createHandModel(hand0, "spheres"));
    scene.add(hand0);

    hand0.addEventListener('pinchstart', () => { isGrabbing = true; findTarget(); });
    hand0.addEventListener('pinchend', () => { 
        isGrabbing = false; 
        if(selectedObject) selectedObject.material.emissive.setHex(0x000000);
        selectedObject = null; 
    });

    // Reticle
    reticle = new THREE.Mesh(
        new THREE.RingGeometry(0.04, 0.05, 32).rotateX(-Math.PI/2),
        new THREE.MeshBasicMaterial({ color: 0x00ffff })
    );
    reticle.matrixAutoUpdate = false;
    reticle.visible = false;
    scene.add(reticle);

    renderer.xr.addEventListener('sessionstart', () => {
        overlayStart.style.display = 'none';
        overlayUI.style.display = 'flex';
        log("AR Oturumu Baslatildi.");
    });

    renderer.xr.addEventListener('sessionend', () => {
        window.location.reload();
    });

    renderer.setAnimationLoop(render);
}

function findTarget() {
    const tip = hand0.joints['index-finger-tip'];
    if (!tip) return;
    const pos = new THREE.Vector3().setFromMatrixPosition(tip.matrixWorld);
    let close = null, min = 0.15;
    [...objects, ...holeObjects].forEach(o => {
        const d = o.position.distanceTo(pos);
        if(d < min) { min = d; close = o; }
    });
    if(close) {
        selectedObject = close;
        selectedObject.material.emissive.setHex(0x002222);
        log("Obje yakalandi.");
    }
}

function spawn(isHole) {
    if(!reticle.visible) return log("Zemin bulunamadi!", true);
    const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(0.1, 0.1, 0.1),
        new THREE.MeshStandardMaterial({ 
            color: isHole ? 0xff0000 : 0x00ffff, 
            transparent: true, opacity: isHole ? 0.5 : 1,
            emissive: 0x000000
        })
    );
    mesh.position.setFromMatrixPosition(reticle.matrix);
    mesh.quaternion.setFromRotationMatrix(reticle.matrix);
    mesh.translateY(0.05);
    scene.add(mesh);
    if(isHole) holeObjects.push(mesh); else objects.push(mesh);
    log(isHole ? "Delik eklendi." : "Küp eklendi.");
}

function mergeCSG() {
    if(!objects.length || !holeObjects.length) return log("Obje eksik!", true);
    try {
        const evaltr = new Evaluator();
        let base = objects[0];
        let baseBrush = new Brush(base.geometry, base.material);
        baseBrush.position.copy(base.position);
        baseBrush.quaternion.copy(base.quaternion);
        baseBrush.updateMatrixWorld();

        holeObjects.forEach(h => {
            const hBrush = new Brush(h.geometry, h.material);
            hBrush.position.copy(h.position);
            hBrush.quaternion.copy(h.quaternion);
            hBrush.updateMatrixWorld();
            baseBrush = evaltr.evaluate(baseBrush, hBrush, SUBTRACTION);
            scene.remove(h);
        });

        scene.remove(base);
        const res = new THREE.Mesh(baseBrush.geometry, baseBrush.material);
        res.position.copy(base.position);
        res.quaternion.copy(base.quaternion);
        scene.add(res);
        objects = [res]; holeObjects = [];
        log("Kesme islemi tamam.");
    } catch(e) { log("CSG Hatasi!", true); }
}

function render(t, frame) {
    if (frame) {
        const session = renderer.xr.getSession();
        const ref = renderer.xr.getReferenceSpace();

        if (!hitTestSourceRequested) {
            session.requestReferenceSpace('viewer').then(s => {
                session.requestHitTestSource({ space: s }).then(src => hitTestSource = src);
            });
            hitTestSourceRequested = true;
        }

        if (hitTestSource) {
            const hits = frame.getHitTestResults(hitTestSource);
            if (hits.length) {
                const pose = hits[0].getPose(ref);
                reticle.visible = true;
                reticle.matrix.fromArray(pose.transform.matrix);
                document.getElementById('status-text').textContent = "ZEMIN: OK";
                document.getElementById('status-text').style.color = "#0f0";
            } else {
                reticle.visible = false;
                document.getElementById('status-text').textContent = "ZEMIN ARANIYOR";
                document.getElementById('status-text').style.color = "#f00";
            }
        }

        let hasHand = false;
        for (const input of session.inputSources) { if(input.hand) hasHand = true; }
        document.getElementById('hand-text').textContent = hasHand ? "EL: AKTIF" : "EL: BEKLEMEDE";

        if(isGrabbing && selectedObject) {
            const tip = hand0.joints['index-finger-tip'];
            if(tip) {
                const p = new THREE.Vector3().setFromMatrixPosition(tip.matrixWorld);
                selectedObject.position.lerp(p, 0.1);
            }
        }
    }
    renderer.render(scene, camera);
}

window.onload = init;
document.getElementById('add-cube').onclick = () => spawn(false);
document.getElementById('add-hole').onclick = () => spawn(true);
document.getElementById('do-merge').onclick = mergeCSG;
document.getElementById('do-clear').onclick = () => {
    [...objects, ...holeObjects].forEach(o => scene.remove(o));
    objects = []; holeObjects = [];
    log("Ekran temizlendi.");
};
</script>
</body>
</html>
