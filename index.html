<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuncer Zeka V8 - Ahmet Tuncer Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap');

        :root {
            --cyan: #00f3ff;
            --bg-dark: rgba(2, 8, 15, 0.9);
        }

        body {
            margin: 0;
            background-color: #000;
            font-family: 'Share Tech Mono', monospace;
            color: var(--cyan);
            overflow: hidden;
        }

        #camera-feed {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -2;
        }

        .hud-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, transparent 20%, var(--bg-dark) 100%);
            z-index: -1;
            pointer-events: none;
        }

        /* ARC Reactor UI */
        .core-box {
            position: relative;
            width: 160px;
            height: 160px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid var(--cyan);
            inset: 0;
            box-shadow: 0 0 20px var(--cyan);
        }

        .ring-1 { animation: spin 4s linear infinite; border-style: double; }
        .ring-2 { inset: 15px; border: 1px dashed var(--cyan); animation: spin-rev 3s linear infinite; opacity: 0.6; }
        
        .core-inner {
            position: absolute;
            width: 70px;
            height: 70px;
            background: var(--cyan);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 1.6rem;
            box-shadow: 0 0 40px var(--cyan);
            z-index: 10;
        }

        .listening .core-inner {
            animation: pulse 0.5s infinite alternate;
            background: #fff;
            box-shadow: 0 0 50px #fff;
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes spin-rev { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        .scan-anim {
            position: absolute;
            width: 100%;
            height: 4px;
            background: linear-gradient(to bottom, transparent, var(--cyan), transparent);
            box-shadow: 0 0 15px var(--cyan);
            top: -10%;
            display: none;
            z-index: 5;
        }

        .scanning .scan-anim {
            display: block;
            animation: scanLine 2s infinite linear;
        }

        @keyframes scanLine { 0% { top: 0%; } 100% { top: 100%; } }

        .log-display {
            height: 180px;
            background: rgba(0, 20, 30, 0.7);
            border: 1px solid rgba(0, 243, 255, 0.2);
            backdrop-filter: blur(8px);
        }

        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex flex-col h-screen">

    <video id="camera-feed" autoplay muted playsinline></video>
    <div class="hud-overlay"></div>
    <div class="scan-anim" id="scan-bar"></div>
    <canvas id="snapshot" class="hidden"></canvas>

    <!-- Header HUD -->
    <header class="p-6 flex justify-between z-10 w-full pointer-events-none">
        <div>
            <h1 class="text-2xl font-bold tracking-[0.2em] title-font" style="font-family: Orbitron">TUNCER <span class="text-white">ZEKA</span></h1>
            <p class="text-[10px] opacity-60">ARCHITECT: AHMET TUNCER | PROTOCOL: STABLE</p>
            <div id="api-status" class="text-[8px] text-green-400 mt-1 uppercase">SİSTEM ÇEVRİMİÇİ</div>
        </div>
        <div class="text-right">
            <div id="clock" class="text-xl font-bold">00:00:00</div>
            <div class="text-[8px] opacity-50">ENCRYPTED LINE</div>
        </div>
    </header>

    <!-- Core Interaction -->
    <main class="flex-1 flex flex-col items-center justify-center z-10">
        <div class="core-box" id="ai-trigger" onclick="startRecognition()">
            <div class="ring ring-1"></div>
            <div class="ring ring-2"></div>
            <div class="core-inner"><i class="fas fa-microchip"></i></div>
        </div>
        <p class="mt-8 text-[10px] tracking-[0.4em] uppercase opacity-50" id="info-text">Emrinizi bekliyorum Bay Tuncer</p>
    </main>

    <!-- Terminal -->
    <footer class="p-6 z-10">
        <div class="log-display rounded-lg p-4 overflow-y-auto text-xs" id="log-content">
            <p class="opacity-40">[SYSTEM] Tuncer Zeka V8 initialization complete.</p>
            <p class="opacity-40">[SYSTEM] Direct Neural Link: Ahmet Tuncer.</p>
        </div>
    </footer>

    <script>
        // API List (Sırasıyla denenir)
        const API_ENDPOINTS = [
            "https://text.pollinations.ai/",
            "https://api.duckduckgo.com/ai/" // Fallback
        ];

        let isProcessing = false;
        const logBox = document.getElementById('log-content');
        const infoText = document.getElementById('info-text');

        // Saat & Kamera
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById('camera-feed').srcObject = stream;
            } catch (e) {
                addLog("SYSTEM", "Camera module error.", "text-red-500");
            }
        }

        // Ses Tanıma
        function startRecognition() {
            if (isProcessing) return;
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) return;

            const recognition = new Speech();
            recognition.lang = 'tr-TR';
            
            recognition.onstart = () => {
                document.getElementById('ai-trigger').classList.add('listening');
                infoText.innerText = "DİNLENİYOR...";
                window.speechSynthesis.cancel();
            };

            recognition.onresult = async (event) => {
                const query = event.results[0][0].transcript;
                processQuery(query);
            };

            recognition.onend = () => {
                document.getElementById('ai-trigger').classList.remove('listening');
            };

            recognition.start();
        }

        // Yapay Zeka İşlemi
        async function processQuery(query) {
            isProcessing = true;
            addLog("AHMET TUNCER", query, "text-green-400");
            infoText.innerText = "ANALİZ EDİLİYOR...";

            const needsScan = /tara|bak|ne var|gör|incele|nedir/.test(query.toLowerCase());
            if (needsScan) {
                document.body.classList.add('scanning');
                addLog("SYSTEM", "Optik sensörler tarama yapıyor...", "text-yellow-500");
            }

            try {
                // Pollinations GET protokolü (en stabil anahtarsız yöntem)
                const sysPrompt = "Sen Tuncer Zeka'sın. Tasarımcın Ahmet Tuncer. Jarvis gibi havalı konuş. Efendim de. Cevabın kısa olsun.";
                const encodedUrl = `${API_ENDPOINTS[0]}${encodeURIComponent(sysPrompt + " Kullanıcı: " + query)}?model=openai`;
                
                const response = await fetch(encodedUrl);
                if (!response.ok) throw new Error("Link error");
                
                const answer = await response.text();
                
                addLog("TUNCER ZEKA", answer, "text-white font-bold");
                speak(answer);

            } catch (err) {
                const fallbackMsg = "Merkezi sinir sisteminde bir gecikme var Ahmet Bey, ancak hala buradayım.";
                addLog("SİSTEM", fallbackMsg, "text-red-400");
                speak(fallbackMsg);
            } finally {
                isProcessing = false;
                document.body.classList.remove('scanning');
                infoText.innerText = "EMRİNİZİ BEKLİYORUM EFENDİM";
            }
        }

        function addLog(who, msg, color = "text-cyan-400") {
            const p = document.createElement('p');
            p.className = "mb-1 fade-in";
            p.innerHTML = `<span class="opacity-40 text-[8px] uppercase">[${who}]</span> <span class="${color}">${msg}</span>`;
            logBox.appendChild(p);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function speak(text) {
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'tr-TR';
            ut.pitch = 0.8;
            ut.rate = 1.0;
            window.speechSynthesis.speak(ut);
        }

        window.onload = initCamera;
    </script>
</body>
</html>
