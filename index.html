<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNCER HOLO - Gerçek AR Modelleme v2</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.7.0/build/index.module.js",
                "three-bvh-csg": "https://unpkg.com/three-bvh-csg@0.0.16/build/index.module.js"
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Share Tech Mono', monospace;
            color: #0ff;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
        }

        /* WebXR için HUD katmanı */
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 20;
            pointer-events: none; /* Tıklamaların arkadaki 3D sahneye geçmesi için */
            display: none; /* AR başlayana kadar gizli */
        }

        .hud-panel {
            pointer-events: auto; /* Paneller tıklanabilir olsun */
            background: rgba(0, 20, 30, 0.7);
            border: 1px solid #0ff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            backdrop-filter: blur(4px);
        }

        .btn-holo {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #0ff;
            color: #0ff;
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 10px;
        }
        .btn-holo:active {
            background: #0ff;
            color: #000;
        }

        .recording-pulse {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; color: #ff0000; }
            50% { opacity: 0.3; }
            100% { opacity: 1; color: #ff0000; }
        }

        #log-console {
            scrollbar-width: none;
            pointer-events: none;
        }

        /* AR Başlat Ekranı */
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #001; z-index: 50;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <!-- AR Başlatma Ekranı -->
    <div id="start-screen">
        <div class="hud-panel p-6 rounded text-center max-w-sm">
            <h1 class="text-xl font-bold text-cyan-400 mb-2">TUNCER WEB OS v2</h1>
            <p class="text-xs text-gray-400 mb-4">Etrafı taramak ve nesneleri sabitlemek için WebXR kullanılıyor. (Android Chrome veya WebXR destekli iOS tarayıcı gerektirir).</p>
            <div id="ar-button-container"></div>
        </div>
    </div>

    <!-- AR Arayüzü (Dom Overlay) -->
    <div id="ui-overlay" class="flex flex-col justify-between p-4">
        <div class="flex justify-between items-start w-full">
            <div class="hud-panel p-2 rounded text-sm w-1/2 md:w-1/3">
                <div class="font-bold text-base mb-1 tracking-widest text-white drop-shadow-[0_0_5px_#0ff]">TUNCER AR</div>
                <div id="sys-status" class="text-[10px] text-green-400">Sistem: Zemin Aranıyor...</div>
                <div id="interaction-status" class="text-[10px] text-yellow-400">Tıkla: Seç, Kaydır: Döndür</div>
            </div>

            <div class="hud-panel p-2 rounded text-center" id="voice-status-box">
                <div class="text-[10px] text-gray-300 uppercase">Ses Kontrol</div>
                <div id="mic-status" class="text-[10px] font-bold">BEKLEMEDE</div>
            </div>
        </div>

        <div class="flex justify-between items-end w-full gap-2">
            <div class="hud-panel p-2 rounded h-24 w-1/2 overflow-hidden flex flex-col justify-end text-[9px]" id="log-console">
                <div class="text-cyan-600">> Sistem çekirdeği aktif.</div>
            </div>

            <div class="hud-panel p-2 rounded grid grid-cols-2 gap-1 w-1/2">
                <button id="btn-cube" class="btn-holo p-1 rounded">KÜP</button>
                <button id="btn-hole" class="btn-holo p-1 rounded border-red-500 text-red-500">DELİK</button>
                <button id="btn-merge" class="btn-holo p-1 rounded border-yellow-500 text-yellow-500">BİRLEŞTİR</button>
                <button id="btn-delete" class="btn-holo p-1 rounded text-red-400">SİL</button>
            </div>
        </div>
    </div>

<script type="module">
import * as THREE from 'three';
import { ARButton } from 'three/addons/webxr/ARButton.js';
import { SUBTRACTION, Brush, Evaluator } from 'three-bvh-csg';

const logConsole = document.getElementById('log-console');
const sysStatus = document.getElementById('sys-status');
const micStatus = document.getElementById('mic-status');
const uiOverlay = document.getElementById('ui-overlay');
const startScreen = document.getElementById('start-screen');

let scene, camera, renderer;
let controller, reticle;
let hitTestSource = null;
let hitTestSourceRequested = false;

let objects = [], holeObjects = [];
let selectedObject = null;

// Rotasyon için değişkenler
let isDragging = false;
let previousTouchX = 0;

function log(msg, err = false) {
    const d = document.createElement('div');
    d.textContent = `> ${msg}`;
    d.className = err ? 'text-red-500' : 'text-cyan-400';
    logConsole.appendChild(d);
    if(logConsole.childNodes.length > 6) logConsole.removeChild(logConsole.firstChild);
}

function initThree() {
    const container = document.getElementById('canvas-container');

    scene = new THREE.Scene();
    
    camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

    // Renderer ve WebXR ayarları
    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    
    // Gerçekçi derinlik ve gölgeler için Shadow Map
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    // Işıklar (Derinlik algısı için önemli)
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight.position.set(0, 5, 0);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 1024;
    dirLight.shadow.mapSize.height = 1024;
    scene.add(dirLight);

    // AR Başlat Butonu (Hit-test ve DOM overlay ile)
    const arBtn = ARButton.createButton(renderer, {
        requiredFeatures: ['hit-test'],
        domOverlay: { root: uiOverlay }
    });
    document.getElementById('ar-button-container').appendChild(arBtn);

    arBtn.addEventListener('click', () => {
        startScreen.style.display = 'none';
        uiOverlay.style.display = 'flex';
        initVoice();
    });

    // AR Hedef İmleci (Zemini tarayıp bulduğunda görünür)
    reticle = new THREE.Mesh(
        new THREE.RingGeometry(0.1, 0.12, 32).rotateX(- Math.PI / 2),
        new THREE.MeshBasicMaterial({ color: 0x00ffff })
    );
    reticle.matrixAutoUpdate = false;
    reticle.visible = false;
    scene.add(reticle);

    // Kontrolcü (Ekrana dokunma olayları AR oturumunda controller üzerinden alınır)
    controller = renderer.xr.getController(0);
    controller.addEventListener('select', onSelect);
    scene.add(controller);

    window.addEventListener('resize', onWindowResize);
    
    // Ekran üzerinde parmak kaydırma (Döndürme için)
    uiOverlay.addEventListener('touchstart', onTouchStart, { passive: false });
    uiOverlay.addEventListener('touchmove', onTouchMove, { passive: false });
    uiOverlay.addEventListener('touchend', onTouchEnd);

    renderer.setAnimationLoop(render);
}

// --- NESNE YERLEŞTİRME VE SEÇME MANTIĞI ---
function onSelect(event) {
    if (isDragging) return; // Döndürme işlemi yapılıyorsa tıklamayı yoksay

    // Raycast ile tıklanan objeyi bul
    const tempMatrix = new THREE.Matrix4();
    tempMatrix.identity().extractRotation(controller.matrixWorld);
    
    const raycaster = new THREE.Raycaster();
    raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
    raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);

    const intersects = raycaster.intersectObjects([...objects, ...holeObjects]);

    if (intersects.length > 0) {
        // Eğer bir objeye tıklandıysa onu seç
        if (selectedObject) selectedObject.material.emissive.setHex(0x000000); // Eski seçimi temizle
        
        selectedObject = intersects[0].object;
        selectedObject.material.emissive.setHex(0x004444); // Seçileni parlat
        log("Nesne seçildi. Döndürmek için ekranı kaydır.");
    } else {
        // Boşluğa tıklandıysa seçimi kaldır
        if (selectedObject) {
            selectedObject.material.emissive.setHex(0x000000);
            selectedObject = null;
        }
    }
}

// --- DOKUNMATİK ROTASYON (DÖNDÜRME) ---
function onTouchStart(e) {
    if(e.touches.length > 0) {
        previousTouchX = e.touches[0].pageX;
        isDragging = false;
    }
}

function onTouchMove(e) {
    if (!selectedObject || e.touches.length === 0) return;
    
    // Hedef panele (butonlara) tıklanıyorsa döndürmeyi engelle
    if (e.target.tagName === 'BUTTON') return;

    isDragging = true;
    const touchX = e.touches[0].pageX;
    const deltaX = touchX - previousTouchX;
    
    // Nesneyi Y ekseninde döndür
    selectedObject.rotation.y += deltaX * 0.01;
    
    previousTouchX = touchX;
}

function onTouchEnd() {
    setTimeout(() => { isDragging = false; }, 100);
}

// --- MODELLEME FONKSİYONLARI ---
function addObj(isHole = false) {
    if (!reticle.visible) {
        log("Önce kamerayı hareket ettirip zemin bulun!", true);
        return;
    }

    const geo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
    const mat = new THREE.MeshStandardMaterial({
        color: isHole ? 0xff3333 : 0x00aaff,
        transparent: true,
        opacity: isHole ? 0.6 : 1.0,
        roughness: 0.3,
        metalness: 0.7,
        emissive: 0x000000
    });
    
    const mesh = new THREE.Mesh(geo, mat);
    mesh.castShadow = true;
    mesh.receiveShadow = true;

    // Nesneyi taranan zemindeki (reticle) konuma ve açıya yerleştir
    mesh.position.setFromMatrixPosition(reticle.matrix);
    mesh.quaternion.setFromRotationMatrix(reticle.matrix);
    
    // Nesneyi tam zemine oturtmak için yüksekliğinin yarısı kadar yukarı kaydır
    mesh.translateY(0.1); 

    scene.add(mesh);
    
    if (isHole) holeObjects.push(mesh); 
    else objects.push(mesh);
    
    log(isHole ? "Delik masaya yerleştirildi." : "Küp masaya yerleştirildi.");
}

function mergeObjects() {
    if (objects.length === 0 || holeObjects.length === 0) {
        log("Birleştirme için 1 Küp ve 1 Delik gerekli.", true);
        return;
    }
    
    log("İşleniyor...");
    try {
        const evaluator = new Evaluator();
        
        let base = objects[0];
        let baseBrush = new Brush(base.geometry, base.material);
        baseBrush.position.copy(base.position);
        baseBrush.quaternion.copy(base.quaternion);
        baseBrush.updateMatrixWorld();

        holeObjects.forEach(h => {
            const hBrush = new Brush(h.geometry, h.material);
            hBrush.position.copy(h.position);
            hBrush.quaternion.copy(h.quaternion);
            hBrush.updateMatrixWorld();
            
            baseBrush = evaluator.evaluate(baseBrush, hBrush, SUBTRACTION);
            scene.remove(h);
        });

        scene.remove(base);
        
        const result = new THREE.Mesh(baseBrush.geometry, baseBrush.material);
        result.position.copy(base.position);
        result.quaternion.copy(base.quaternion);
        result.castShadow = true;
        result.receiveShadow = true;
        
        scene.add(result);
        objects = [result];
        holeObjects = [];
        
        if(selectedObject) selectedObject = null;
        log("Birleştirme/Kesme Başarılı.");
    } catch (e) {
        log("Geometri hatası!", true);
        console.error(e);
    }
}

// --- SES KONTROLÜ ---
function initVoice() {
    const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!Rec) {
        micStatus.textContent = "DESTEKLENMİYOR";
        return;
    }
    
    const recognition = new Rec();
    recognition.lang = 'tr-TR';
    recognition.continuous = true;
    
    recognition.onstart = () => {
        micStatus.textContent = "DİNLENİYOR";
        micStatus.classList.add('recording-pulse');
    };
    
    recognition.onresult = (e) => {
        const text = e.results[e.results.length - 1][0].transcript.toLowerCase();
        log(`Ses: ${text}`);
        if (text.includes("küp")) addObj(false);
        if (text.includes("delik")) addObj(true);
        if (text.includes("birleştir") || text.includes("kes")) mergeObjects();
        if (text.includes("sil")) deleteLastOrSelected();
    };
    
    recognition.start();
}

function deleteLastOrSelected() {
    if (selectedObject) {
        scene.remove(selectedObject);
        objects = objects.filter(o => o !== selectedObject);
        holeObjects = holeObjects.filter(o => o !== selectedObject);
        selectedObject = null;
        log("Seçili nesne silindi.");
        return;
    }

    const all = [...objects, ...holeObjects];
    if(all.length > 0) {
        const target = all[all.length-1];
        scene.remove(target);
        objects = objects.filter(o => o !== target);
        holeObjects = holeObjects.filter(o => o !== target);
        log("Son eklenen silindi.");
    }
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

// --- AR RENDER DÖNGÜSÜ (Hit Test ve SLAM) ---
function render(timestamp, frame) {
    if (frame) {
        const referenceSpace = renderer.xr.getReferenceSpace();
        const session = renderer.xr.getSession();

        if (hitTestSourceRequested === false) {
            session.requestReferenceSpace('viewer').then(function (referenceSpace) {
                session.requestHitTestSource({ space: referenceSpace }).then(function (source) {
                    hitTestSource = source;
                });
            });
            session.addEventListener('end', function () {
                hitTestSourceRequested = false;
                hitTestSource = null;
            });
            hitTestSourceRequested = true;
        }

        if (hitTestSource) {
            const hitTestResults = frame.getHitTestResults(hitTestSource);

            if (hitTestResults.length > 0) {
                const hit = hitTestResults[0];
                const pose = hit.getPose(referenceSpace);

                reticle.visible = true;
                reticle.matrix.fromArray(pose.transform.matrix);
                sysStatus.textContent = "Sistem: Zemin Bulundu";
                sysStatus.className = "text-[10px] text-green-400 font-bold";
            } else {
                reticle.visible = false;
                sysStatus.textContent = "Sistem: Zemin Aranıyor...";
                sysStatus.className = "text-[10px] text-yellow-400";
            }
        }
    }

    renderer.render(scene, camera);
}

// --- BUTON BAĞLANTILARI ---
window.addEventListener('load', () => {
    initThree();
});

document.getElementById('btn-cube').onclick = () => addObj(false);
document.getElementById('btn-hole').onclick = () => addObj(true);
document.getElementById('btn-merge').onclick = mergeObjects;
document.getElementById('btn-delete').onclick = deleteLastOrSelected;

</script>
</body>
</html>
