<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNCER HOLO - Kusursuz AR v3</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.7.0/build/index.module.js",
                "three-bvh-csg": "https://unpkg.com/three-bvh-csg@0.0.16/build/index.module.js"
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Share Tech Mono', monospace;
            color: #0ff;
            user-select: none;
            touch-action: none;
            -webkit-user-select: none;
        }

        /* Başlangıç Ekranı - En üstte ve güvenli tıklama alanı */
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, #001a22 0%, #000000 100%);
            z-index: 9999;
        }

        /* WebXR için DOM Overlay Katmanı */
        #ui-overlay {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            display: none; /* AR başlayana kadar gizli */
            flex-direction: column;
            justify-content: space-between;
            padding: 1rem;
            pointer-events: none; /* Sadece içindeki butonlar tıklansın */
        }

        .hud-panel {
            pointer-events: auto;
            background: rgba(0, 20, 30, 0.7);
            border: 1px solid #0ff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
            backdrop-filter: blur(5px);
        }

        .btn-holo {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #0ff;
            color: #0ff;
            text-transform: uppercase;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        
        .btn-holo:active {
            background: rgba(0, 255, 255, 0.5);
            color: #fff;
        }

        /* Three.js AR Butonunu Özelleştirme - Tıklanabilirlik Garantisi */
        #ARButton {
            position: relative !important;
            bottom: auto !important;
            left: auto !important;
            margin-top: 30px !important;
            padding: 20px 40px !important;
            background: #004444 !important;
            border: 2px solid #0ff !important;
            color: #0ff !important;
            font-family: 'Share Tech Mono', monospace !important;
            font-size: 18px !important;
            border-radius: 8px !important;
            cursor: pointer !important;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5) !important;
            pointer-events: auto !important; /* Tıklama zorunlu */
        }
    </style>
</head>
<body>

    <!-- Three.js Canvas -->
    <div id="canvas-container"></div>

    <!-- Başlangıç Ekranı -->
    <div id="start-screen">
        <div class="text-center p-6 max-w-sm w-full">
            <h1 class="text-4xl font-bold text-cyan-400 mb-2 tracking-widest drop-shadow-[0_0_10px_rgba(0,255,255,0.8)]">TUNCER</h1>
            <h2 class="text-xl text-cyan-200 mb-6 tracking-widest">HOLO AR v3</h2>
            <p class="text-xs text-gray-400 mb-4 leading-relaxed">
                El eklemleri (Joints) ve SLAM motoru onarıldı.<br>Sistemi başlatmak için aşağıdaki butona dokunun.
            </p>
            <!-- AR Butonu buraya yerleşecek -->
            <div id="btn-container" class="w-full flex justify-center"></div>
        </div>
    </div>

    <!-- AR Arayüzü (DOM Overlay) -->
    <div id="ui-overlay">
        <!-- Üst Panel -->
        <div class="flex justify-between items-start w-full">
            <div class="hud-panel p-3 rounded text-sm w-1/2">
                <div class="font-bold text-sm tracking-widest text-white mb-1">TUNCER AR</div>
                <div id="sys-status" class="text-[10px] text-yellow-400 font-bold tracking-wider">ZEMİN ARANIYOR...</div>
                <div id="hand-status" class="text-[10px] text-cyan-400 mt-1">EL TAKİBİ: BEKLENİYOR</div>
            </div>
            <div class="hud-panel p-2 rounded text-center">
                <div class="text-[9px] text-gray-400 uppercase">Durum</div>
                <div class="text-[10px] font-bold text-green-400">ONLINE</div>
            </div>
        </div>

        <!-- Alt Panel -->
        <div class="flex justify-between items-end w-full gap-2">
            <div class="hud-panel p-2 rounded h-28 w-1/2 overflow-hidden flex flex-col justify-end text-[9px]" id="log-console">
                <div class="text-cyan-600">> Sistem Yüklendi. Bekleniyor...</div>
            </div>
            <div class="hud-panel p-2 rounded grid grid-cols-2 gap-2 w-1/2">
                <button id="btn-cube" class="btn-holo py-3 rounded">KÜP</button>
                <button id="btn-hole" class="btn-holo py-3 rounded border-red-500 text-red-400">DELİK</button>
                <button id="btn-merge" class="btn-holo py-3 rounded border-yellow-500 text-yellow-400">BİRLEŞTİR</button>
                <button id="btn-delete" class="btn-holo py-3 rounded text-red-500 border-red-500">SİL</button>
            </div>
        </div>
    </div>

<script type="module">
import * as THREE from 'three';
import { ARButton } from 'three/addons/webxr/ARButton.js';
import { XRHandModelFactory } from 'three/addons/webxr/XRHandModelFactory.js'; // El takibi için resmi fabrika
import { SUBTRACTION, Brush, Evaluator } from 'three-bvh-csg';

const logConsole = document.getElementById('log-console');
const sysStatus = document.getElementById('sys-status');
const handStatus = document.getElementById('hand-status');
const uiOverlay = document.getElementById('ui-overlay');
const startScreen = document.getElementById('start-screen');

let scene, camera, renderer, reticle;
let hitTestSource = null, hitTestSourceRequested = false;
let objects = [], holeObjects = [], selectedObject = null;

let hand0, handModel0; 
let isGrabbing = false;

function log(msg, err = false) {
    const d = document.createElement('div');
    d.textContent = `> ${msg}`;
    d.className = err ? 'text-red-500 font-bold' : 'text-cyan-400';
    logConsole.appendChild(d);
    // Konsolu temiz tut
    while (logConsole.childNodes.length > 6) {
        logConsole.removeChild(logConsole.firstChild);
    }
}

function initThree() {
    const container = document.getElementById('canvas-container');
    
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    container.appendChild(renderer.domElement);

    // Işıklandırma (Derinlik algısı için önemli)
    scene.add(new THREE.AmbientLight(0xffffff, 1.0));
    const dLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dLight.position.set(0, 5, 2);
    scene.add(dLight);

    // 1. DÜZELTME: AR Butonunun Sorunsuz Çalışması İçin Ayarlar
    const arOptions = {
        requiredFeatures: ['hit-test', 'hand-tracking'], // El takibi zorunlu kılındı
        optionalFeatures: ['dom-overlay'],
        domOverlay: { root: uiOverlay } // UI Overlay katmanını WebXR'a tanıttık
    };
    
    const arBtn = ARButton.createButton(renderer, arOptions);
    document.getElementById('btn-container').appendChild(arBtn);

    // 2. DÜZELTME: Resmi El Takibi Modeli (XRHandModelFactory)
    // Bu sayede parmak uçlarında ve eklemlerde otomatik olarak küreler (noktalar) çıkacak.
    const handModelFactory = new XRHandModelFactory();
    
    hand0 = renderer.xr.getHand(0); // Birinci el (Genelde sağ)
    
    // El için "spheres" profilini kullanarak eklem noktalarını çizdiriyoruz
    handModel0 = handModelFactory.createHandModel(hand0, "spheres"); 
    hand0.add(handModel0);
    scene.add(hand0);

    // Çimdik (Pinch) Olayları
    hand0.addEventListener('pinchstart', onPinchStart);
    hand0.addEventListener('pinchend', onPinchEnd);

    // Zemin Tarama İmleci
    reticle = new THREE.Mesh(
        new THREE.RingGeometry(0.08, 0.1, 32).rotateX(-Math.PI/2),
        new THREE.MeshBasicMaterial({ color: 0x00ffff })
    );
    reticle.matrixAutoUpdate = false;
    reticle.visible = false;
    scene.add(reticle);

    // AR Oturumu Yönetimi
    renderer.xr.addEventListener('sessionstart', () => {
        startScreen.style.display = 'none'; // Başlangıç ekranını tamamen gizle
        uiOverlay.style.display = 'flex'; // Arayüzü göster
        log("AR Sistemleri Çevrimiçi.");
    });

    renderer.xr.addEventListener('sessionend', () => {
        startScreen.style.display = 'flex';
        uiOverlay.style.display = 'none';
        log("Oturum Kapatıldı.", true);
    });

    renderer.setAnimationLoop(render);
}

function onPinchStart() {
    isGrabbing = true;
    
    // İşaret parmağı ucunun dünya koordinatını al
    const indexTip = hand0.joints['index-finger-tip'];
    if (!indexTip) return;

    const handPos = new THREE.Vector3().setFromMatrixPosition(indexTip.matrixWorld);
    
    let closest = null;
    let minDist = 0.2; // 20cm yakalama mesafesi

    const allItems = [...objects, ...holeObjects];
    allItems.forEach(obj => {
        const d = obj.position.distanceTo(handPos);
        if (d < minDist) {
            minDist = d;
            closest = obj;
        }
    });

    if (closest) {
        selectedObject = closest;
        selectedObject.material.emissive.setHex(0x004444); // Seçilince parlat
        log("Obje Yakalandı.");
    }
}

function onPinchEnd() {
    isGrabbing = false;
    if (selectedObject) {
        selectedObject.material.emissive.setHex(0x000000); // Parlamayı kapat
        selectedObject = null;
        log("Obje Bırakıldı.");
    }
}

function updateObjectTransform() {
    if (!selectedObject) return;
    
    const indexTip = hand0.joints['index-finger-tip'];
    const thumbTip = hand0.joints['thumb-tip'];
    const wrist = hand0.joints['wrist'];

    if (indexTip && thumbTip && wrist) {
        const p1 = new THREE.Vector3().setFromMatrixPosition(indexTip.matrixWorld);
        const p2 = new THREE.Vector3().setFromMatrixPosition(thumbTip.matrixWorld);
        
        // İşaret ve baş parmak ortası
        const midPoint = new THREE.Vector3().lerpVectors(p1, p2, 0.5);
        
        // Pürüzsüz taşıma
        selectedObject.position.lerp(midPoint, 0.3);
        
        // Bilek açısına göre döndürme
        const wristRot = new THREE.Quaternion().setFromRotationMatrix(wrist.matrixWorld);
        selectedObject.quaternion.slerp(wristRot, 0.2);
    }
}

function addObj(isHole = false) {
    if (!reticle.visible) {
        log("Lütfen önce zemini tarayın!", true);
        return;
    }
    
    const geo = new THREE.BoxGeometry(0.15, 0.15, 0.15);
    const mat = new THREE.MeshStandardMaterial({
        color: isHole ? 0xff3333 : 0x00aaff,
        transparent: true, opacity: isHole ? 0.6 : 1.0,
        metalness: 0.3, roughness: 0.2, emissive: 0x000000
    });
    
    const mesh = new THREE.Mesh(geo, mat);
    // Reticle (imleç) neresiyse oraya koy
    mesh.position.setFromMatrixPosition(reticle.matrix);
    mesh.quaternion.setFromRotationMatrix(reticle.matrix);
    mesh.translateY(0.075); // Yarısı kadar yukarı kaldır ki zemine otursun
    
    scene.add(mesh);
    if (isHole) holeObjects.push(mesh); else objects.push(mesh);
    log(isHole ? "Kırmızı Delik (Kesici) eklendi." : "Mavi Küp (Ana) eklendi.");
}

function mergeObjects() {
    if (objects.length === 0 || holeObjects.length === 0) {
        log("Birleştirme için 1 Mavi, 1 Kırmızı küp gerekli!", true);
        return;
    }
    
    try {
        log("CSG Hesaplanıyor...");
        const evaluator = new Evaluator();
        
        let base = objects[0];
        let baseBrush = new Brush(base.geometry, base.material);
        baseBrush.position.copy(base.position);
        baseBrush.quaternion.copy(base.quaternion);
        baseBrush.updateMatrixWorld();

        holeObjects.forEach(h => {
            const hBrush = new Brush(h.geometry, h.material);
            hBrush.position.copy(h.position);
            hBrush.quaternion.copy(h.quaternion);
            hBrush.updateMatrixWorld();
            
            baseBrush = evaluator.evaluate(baseBrush, hBrush, SUBTRACTION);
            scene.remove(h);
        });

        scene.remove(base);
        
        const result = new THREE.Mesh(baseBrush.geometry, baseBrush.material);
        result.position.copy(base.position);
        result.quaternion.copy(base.quaternion);
        scene.add(result);
        
        objects = [result]; 
        holeObjects = [];
        log("İşlem Başarılı: Obje Kesildi.");
    } catch (e) { 
        log("CSG Matematik Hatası!", true); 
    }
}

function render(timestamp, frame) {
    if (frame) {
        const referenceSpace = renderer.xr.getReferenceSpace();
        const session = renderer.xr.getSession();
        
        // Zemin Tarama (Hit Test)
        if (!hitTestSourceRequested) {
            session.requestReferenceSpace('viewer').then(ref => {
                session.requestHitTestSource({ space: ref }).then(src => hitTestSource = src);
            });
            hitTestSourceRequested = true;
        }
        
        if (hitTestSource) {
            const results = frame.getHitTestResults(hitTestSource);
            if (results.length > 0) {
                reticle.visible = true;
                reticle.matrix.fromArray(results[0].getPose(referenceSpace).transform.matrix);
                sysStatus.textContent = "ZEMİN KİLİTLENDİ";
                sysStatus.className = "text-[10px] text-green-400 font-bold tracking-wider";
            } else {
                reticle.visible = false;
                sysStatus.textContent = "ZEMİN ARANIYOR...";
                sysStatus.className = "text-[10px] text-yellow-400 font-bold tracking-wider";
            }
        }

        // Elin sistem tarafından algılanıp algılanmadığını HUD'a yazdır
        let handVisible = false;
        for (const inputSource of session.inputSources) {
            if (inputSource.hand) handVisible = true;
        }
        if(handVisible) {
            handStatus.textContent = "EL TAKİBİ: AKTİF";
            handStatus.className = "text-[10px] text-cyan-400 mt-1";
        } else {
            handStatus.textContent = "EL TAKİBİ: GÖZÜKMÜYOR";
            handStatus.className = "text-[10px] text-gray-400 mt-1";
        }

        // Obje tutuluyorsa hareket ettir
        if (isGrabbing) updateObjectTransform();
    }
    
    renderer.render(scene, camera);
}

// Sistemi Başlat
window.addEventListener('load', initThree);

// Buton Etkileşimleri
document.getElementById('btn-cube').onclick = () => addObj(false);
document.getElementById('btn-hole').onclick = () => addObj(true);
document.getElementById('btn-merge').onclick = mergeObjects;
document.getElementById('btn-delete').onclick = () => {
    const all = [...objects, ...holeObjects];
    if(all.length) {
        const target = all.pop();
        scene.remove(target);
        objects = objects.filter(o => o !== target);
        holeObjects = holeObjects.filter(o => o !== target);
        log("Son nesne silindi.");
    } else {
        log("Silinecek nesne yok.", true);
    }
};

// Ekran yeniden boyutlandırma
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
