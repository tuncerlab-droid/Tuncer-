<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuncer Zeka - AI Kontrol Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --card: #111827;
            --accent: #0ea5e9;
            --success: #10b981;
            --error: #ef4444;
            --text: #f3f4f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; }

        /* Üst Bilgi Çubuğu */
        .status-bar {
            background: var(--card);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
        }

        .status-item { display: flex; align-items: center; gap: 8px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #4b5563; }
        .dot.active { background: var(--success); box-shadow: 0 0 10px var(--success); }
        .dot.error { background: var(--error); }

        /* Ana İçerik */
        .container { flex: 1; display: flex; flex-direction: column; padding: 20px; gap: 20px; overflow: hidden; }

        .chat-window {
            flex: 1;
            background: var(--card);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
        .msg.user { align-self: flex-end; background: var(--accent); color: white; }
        .msg.ai { align-self: flex-start; background: #1f2937; border: 1px solid rgba(255,255,255,0.1); }

        .controls { display: flex; gap: 10px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 12px; }
        .btn { 
            flex: 1; padding: 10px; border: none; border-radius: 8px; background: #1f2937; 
            color: #9ca3af; cursor: pointer; transition: 0.3s; font-weight: bold; font-size: 12px;
        }
        .btn.active { background: var(--accent); color: white; }

        .input-area { display: flex; gap: 10px; }
        input { 
            flex: 1; background: var(--card); border: 1px solid rgba(255,255,255,0.1); 
            padding: 15px; border-radius: 12px; color: white; outline: none;
        }
        input:focus { border-color: var(--accent); }
        .send-btn { background: var(--accent); border: none; width: 50px; border-radius: 12px; color: white; cursor: pointer; }

        .debug-panel {
            background: #000;
            color: #4ade80;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            padding: 10px;
            border-radius: 8px;
            max-height: 80px;
            overflow-y: auto;
            border: 1px solid #1f2937;
        }
    </style>
</head>
<body>

    <div class="status-bar">
        <div class="status-item">
            <div id="statusDot" class="dot"></div>
            <span id="statusText">SİSTEM ÇEVRİMDIŞI</span>
        </div>
        <div id="fileNameDisplay">Yükleniyor: tuncer2026.js</div>
    </div>

    <div class="container">
        <div class="controls">
            <button class="btn" id="btn2023" onclick="loadEngine('2023')">MODEL 2023</button>
            <button class="btn active" id="btn2026" onclick="loadEngine('2026')">MODEL 2026</button>
        </div>

        <div class="chat-window">
            <div class="messages" id="chat">
                <div class="msg ai">Sistem hazır. Lütfen bir model seçin ve konuşmaya başlayın.</div>
            </div>
        </div>

        <div class="debug-panel" id="debug">Log: Bekleniyor...</div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Mesajınızı yazın..." autocomplete="off">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        let ai = null;
        const chat = document.getElementById('chat');
        const debug = document.getElementById('debug');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        function addLog(msg) {
            const time = new Date().toLocaleTimeString();
            debug.innerHTML += `<div>[${time}] ${msg}</div>`;
            debug.scrollTop = debug.scrollHeight;
        }

        window.onload = () => loadEngine('2026');

        async function loadEngine(ver) {
            // UI Güncelleme
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn' + ver).classList.add('active');
            document.getElementById('fileNameDisplay').innerText = `Yükleniyor: tuncer${ver}.js`;
            
            ai = null;
            statusDot.className = 'dot';
            statusText.innerText = "YÜKLENİYOR...";
            addLog(`v${ver} yüklenmeye çalışılıyor...`);

            // Eski scripti temizle
            const old = document.getElementById('ai-script');
            if (old) old.remove();

            const script = document.createElement('script');
            script.id = 'ai-script';
            // GitHub ve Yerel yolları desteklemek için dinamik yol
            const dir = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
            script.src = `${dir}tuncer${ver}.js?cache=` + Date.now();

            script.onload = () => {
                addLog("JS dosyası başarıyla indi.");
                
                // --- AKILLI SINIF TESPİTİ ---
                // Eğer TuncerZeka değil de başka bir isimle kaydedildiyse (Büyük/Küçük harf gibi)
                setTimeout(() => {
                    let FoundClass = window.TuncerZeka || window.tuncerZeka || window.Tuncerzeka;
                    
                    if (!FoundClass) {
                        // Eğer globalde bulamazsak sınıfı manuel arayalım
                        addLog("HATA: Sınıf ismi TuncerZeka değil! window nesnesi taranıyor...");
                        for (let key in window) {
                            if (key.toLowerCase().includes('tuncer') && typeof window[key] === 'function') {
                                FoundClass = window[key];
                                addLog(`BULDUM! Sınıf ismi: ${key}`);
                                break;
                            }
                        }
                    }

                    if (FoundClass) {
                        try {
                            ai = new FoundClass();
                            statusDot.className = 'dot active';
                            statusText.innerText = `AKTİF (v${ver})`;
                            addLog("Motor başarıyla başlatıldı.");
                        } catch (e) {
                            statusDot.className = 'dot error';
                            statusText.innerText = "BAŞLATMA HATASI";
                            addLog("HATA: Constructor çalıştırılamadı: " + e.message);
                        }
                    } else {
                        statusDot.className = 'dot error';
                        statusText.innerText = "SINIF BULUNAMADI";
                        addLog("HATA: Dosya indi ama içinde uygun bir Sınıf yok.");
                    }
                }, 300);
            };

            script.onerror = () => {
                statusDot.className = 'dot error';
                statusText.innerText = "DOSYA YOK";
                addLog(`HATA: tuncer${ver}.js dosyası bu klasörde bulunamadı.`);
            };

            document.body.appendChild(script);
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            // Kullanıcı mesajı
            const uDiv = document.createElement('div');
            uDiv.className = 'msg user';
            uDiv.innerText = text;
            chat.appendChild(uDiv);
            input.value = '';

            if (!ai) {
                const eDiv = document.createElement('div');
                eDiv.className = 'msg ai';
                eDiv.innerText = "⚠️ Motor bağlı değil. Lütfen dosyanın yüklendiğinden emin olun.";
                chat.appendChild(eDiv);
                return;
            }

            try {
                const response = await ai.konus(text);
                const aDiv = document.createElement('div');
                aDiv.className = 'msg ai';
                aDiv.innerText = typeof response === 'object' ? response.cevap : response;
                chat.appendChild(aDiv);
            } catch (e) {
                addLog("Çalışma Hatası: " + e.message);
            }
            chat.scrollTop = chat.scrollHeight;
        }

        document.getElementById('userInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>
