<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tuncer Zeka v2.0</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --sidebar: #1e293b;
            --text: #f1f5f9;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Responsive Logic */
        #sidebar {
            width: 280px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: 0.3s ease;
            z-index: 1000;
        }

        @media (max-width: 768px) {
            #sidebar {
                position: fixed;
                left: -280px;
                top: 0; bottom: 0;
            }
            #sidebar.open { left: 0; }
        }

        .sidebar-item {
            padding: 15px 20px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: 0.2s;
        }

        .sidebar-item:hover { background: rgba(255,255,255,0.05); }

        /* Main Layout */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        header {
            height: 60px;
            padding: 0 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border);
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 15px;
        }

        .user-msg { align-self: flex-end; background: var(--primary); }
        .bot-msg { align-self: flex-start; background: var(--sidebar); border: 1px solid var(--border); }

        /* Input Area */
        .input-area {
            padding: 20px;
            background: var(--bg);
        }

        .input-wrapper {
            max-width: 900px;
            margin: 0 auto;
            background: var(--sidebar);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            padding: 5px;
        }

        input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            padding: 10px 15px;
            outline: none;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .menu-toggle {
            display: none;
            background: none;
            font-size: 20px;
            padding: 10px;
        }

        @media (max-width: 768px) { .menu-toggle { display: block; } }

        #overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 900;
        }
        #overlay.active { display: block; }
    </style>
</head>
<body>

    <div id="overlay"></div>

    <aside id="sidebar">
        <div style="padding: 25px; text-align: center; border-bottom: 2px solid var(--primary)">
            <h3>TUNCER CORE</h3>
        </div>
        <div class="sidebar-item" id="new-chat-btn">
            <i class="fas fa-plus"></i> Yeni Sohbet
        </div>
        <div class="sidebar-item" id="btn-v2027" style="color: var(--primary)">
            <i class="fas fa-bolt"></i> Tuncer 2027 Pro
        </div>
        <div class="sidebar-item" id="btn-v2023">
            <i class="fas fa-history"></i> Tuncer 2023 Classic
        </div>
    </aside>

    <main>
        <header>
            <button class="menu-toggle" id="menu-open"><i class="fas fa-bars"></i></button>
            <div id="status">Aktif: Tuncer 2027</div>
            <div style="width: 40px"></div>
        </header>

        <div id="chat-container">
            <div class="message bot-msg">Sistem yüklendi. Komutlarınızı bekliyorum.</div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="main-input" placeholder="Mesajınızı buraya yazın..." autocomplete="off">
                <button id="send-btn">GÖNDER</button>
            </div>
        </div>
    </main>

    <script>
        // Senin yazdığın kütüphanelerin bağlandığı ana nesne
        const TuncerEngine = {
            activeModel: 'v2027',
            // BURAYA KENDİ KÜTÜPHANE FONKSİYONLARINI BAĞLA
            process: function(text) {
                if (this.activeModel === 'v2023') {
                    // tuncer2023.kutuphane(text) gibi
                    return "Tuncer 2023 Yanıtı: " + text;
                } else {
                    // tuncer2027.kutuphane(text) gibi
                    return "Tuncer 2027 Yanıtı: " + text;
                }
            }
        };

        // DOM Elementleri
        const chatContainer = document.getElementById('chat-container');
        const mainInput = document.getElementById('main-input');
        const sendBtn = document.getElementById('send-btn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const menuOpen = document.getElementById('menu-open');
        const statusText = document.getElementById('status');

        // Olay İzleyicileri (Event Listeners) - Inline onclick yerine daha güvenli
        function init() {
            // Gönder Butonu
            sendBtn.addEventListener('click', handleAction);
            
            // Enter Tuşu
            mainInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleAction();
            });

            // Mobil Menü
            menuOpen.addEventListener('click', () => {
                sidebar.classList.add('open');
                overlay.classList.add('active');
            });

            overlay.addEventListener('click', () => {
                sidebar.classList.remove('open');
                overlay.classList.remove('active');
            });

            // Model Değiştirme
            document.getElementById('btn-v2027').addEventListener('click', () => {
                TuncerEngine.activeModel = 'v2027';
                statusText.innerText = "Aktif: Tuncer 2027";
                closeSidebar();
            });

            document.getElementById('btn-v2023').addEventListener('click', () => {
                TuncerEngine.activeModel = 'v2023';
                statusText.innerText = "Aktif: Tuncer 2023";
                closeSidebar();
            });

            document.getElementById('new-chat-btn').addEventListener('click', () => {
                chatContainer.innerHTML = '<div class="message bot-msg">Yeni sohbet başlatıldı.</div>';
                closeSidebar();
            });
        }

        function handleAction() {
            const val = mainInput.value.trim();
            if (!val) return;

            addMsg(val, 'user-msg');
            mainInput.value = '';

            // Engine'den yanıt al
            const response = TuncerEngine.process(val);
            
            setTimeout(() => {
                addMsg(response, 'bot-msg');
            }, 300);
        }

        function addMsg(text, className) {
            const msg = document.createElement('div');
            msg.className = 'message ' + className;
            msg.innerText = text;
            chatContainer.appendChild(msg);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function closeSidebar() {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }

        // Başlat
        window.onload = init;
    </script>
</body>
</html>
