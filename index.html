<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>TUNCERLAB // WORLD AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<!-- MediaPipe Hands (telefon kamerası için, global olarak yüklenir) -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ============ GİZLİ: MediaPipe video ============ -->
<video id="mp-video" playsinline style="position:absolute;opacity:0;pointer-events:none;width:1px;height:1px;"></video>

<!-- ============ KURULUM EKRANI ============ -->
<div id="setup-screen">
  <div class="setup-card">
    <div class="brand">
      <span class="brand-mark">⌖</span>
      <h1>TUNCER<span class="accent">LAB</span></h1>
    </div>
    <div class="brand-sub">WORLD AI // v3.0</div>
    <div class="divider"></div>

    <label class="field-label">OYUNCU ADIN</label>
    <input id="player-name" type="text" maxlength="16" placeholder="Oyuncu"/>

    <label class="field-label" style="margin-top:12px">SUNUCU ADRESİ (PC)</label>
    <input id="ws-address" type="text" inputmode="url" placeholder="wss://192.168.1.X:8765"/>

    <button id="btn-connect" class="btn btn-outline">
      <span class="btn-dot" id="conn-dot"></span> BAĞLAN
    </button>
    <div id="conn-status" class="status-line">BAĞLANTI YOK</div>
    <div class="divider"></div>
    <button id="btn-enter-vr" class="btn btn-solid" disabled>VR MODUNA GİR</button>
    <div class="hint">
      Önce <code></code> .<br>
        <br>
      <code>server/train.py</code> 
    </div>
  </div>
</div>

<!-- ============ VR SAHNE ============ -->
<div id="vr-container">
  <canvas id="vr-canvas"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-corner hud-tl"><span id="hud-fps">0</span> FPS</div>
    <div class="hud-corner hud-tr">
      <span id="hud-conn-dot" style="color:var(--danger)">●</span>
      <span id="hud-conn-text">OFFLINE</span>
      &nbsp;|&nbsp; <span id="hud-players">1</span>P
    </div>
    <div class="hud-corner hud-bl">
      EL:<span id="hud-hands">0</span>
      &nbsp;HIZ:<span id="hud-speed">0.0</span>
    </div>
    <div class="hud-corner hud-br" id="hud-touch">—</div>
    <div class="hud-center"></div>
    <div id="hud-warning" class="hud-warning"></div>
    <!-- AI konuşma balonu -->
    <div id="ai-speech" class="ai-speech"></div>
    <!-- Saat göstergesi -->
    <div id="hud-clock" class="hud-clock">12:00</div>
  </div>

  <!-- Terminal Overlay -->
  <div id="terminal-panel" class="terminal-panel collapsed">
    <div class="terminal-header" id="terminal-toggle">
      <span class="terminal-title">⌨ TUNCER TERMINAL</span>
      <span id="terminal-chevron">▲</span>
    </div>
    <div id="terminal-output" class="terminal-output"></div>
    <div class="terminal-input-row">
      <span class="terminal-prompt">$</span>
      <input id="terminal-input" type="text" autocomplete="off" spellcheck="false"
             placeholder="komut yaz veya /sky 22 /spawn tree …"/>
      <button id="terminal-send" class="terminal-btn">▶</button>
    </div>
  </div>

  <button id="btn-exit-vr" aria-label="Çıkış">✕</button>
</div>

<!-- Three.js importmap -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module" src="ss.js"></script>
</body>
</html>
