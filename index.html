<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuncer Zeka v1.0 - Kontrol Paneli</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --bg: #0f0f1a;
            --card-bg: #1e1e2f;
            --text: #ffffff;
            --accent: #00d2d3;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--card-bg);
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 40px;
            text-align: center;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: #888;
            padding: 15px;
            text-align: left;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 5px;
            font-size: 1rem;
        }

        .nav-btn.active {
            background: var(--primary);
            color: white;
        }

        /* Main Content */
        .main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.5s; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        h2 { margin-bottom: 20px; color: var(--secondary); }

        textarea, input {
            width: 100%;
            background: #2d2d44;
            border: 1px solid #444;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 1rem;
            outline: none;
        }

        button.action-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button.action-btn:hover { background: var(--secondary); }

        .result-box {
            background: #161625;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid var(--accent);
            margin-top: 15px;
            min-height: 50px;
            white-space: pre-wrap;
        }

        /* Chat UI Specific */
        #chat-window {
            height: 400px;
            overflow-y: auto;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 10px;
        }

        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; line-height: 1.5; position: relative; }
        .msg.user { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.bot { background: #3d3d5c; align-self: flex-start; border-bottom-left-radius: 2px; }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 5px;
            font-size: 0.8rem;
            background: #444;
            margin-right: 5px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">🧠 TUNCER ZEKA</div>
        <button class="nav-btn active" onclick="showSection('chat', this)">🤖 Sohbet Botu</button>
        <button class="nav-btn" onclick="showSection('sentiment', this)">😊 Duygu Analizi</button>
        <button class="nav-btn" onclick="showSection('summary', this)">📝 Özetleme</button>
        <button class="nav-btn" onclick="showSection('stats', this)">📊 İstatistikler</button>
        <div style="margin-top: auto; font-size: 0.8rem; color: #555; text-align: center;">v1.0.0 Stable</div>
    </div>

    <div class="main">
        <div id="chat" class="section active">
            <h2>Yapay Zeka Sohbet</h2>
            <div class="card">
                <div id="chat-window"></div>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="chatInput" placeholder="Tuncer'e bir şey yaz..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button class="action-btn" onclick="sendMessage()">Gönder</button>
                </div>
            </div>
        </div>

        <div id="sentiment" class="section">
            <h2>Duygu Analizi (NLP)</h2>
            <div class="card">
                <textarea id="sentimentInput" rows="4" placeholder="Analiz edilecek metni girin..."></textarea>
                <button class="action-btn" onclick="analyzeSentiment()">Duyguyu Yakala</button>
                <div id="sentimentResult" class="result-box">Sonuç burada görünecek...</div>
            </div>
        </div>

        <div id="summary" class="section">
            <h2>Metin Özetleyici & Anahtar Kelimeler</h2>
            <div class="card">
                <textarea id="summaryInput" rows="6" placeholder="Özetlenecek uzun metni buraya yapıştır..."></textarea>
                <button class="action-btn" onclick="generateSummary()">Metni İşle</button>
                <div id="summaryResult" class="result-box">Özet ve anahtar kelimeler burada görünecek...</div>
            </div>
        </div>

        <div id="stats" class="section">
            <h2>Kütüphane Bilgisi</h2>
            <div class="card">
                <pre id="libInfo" style="color: var(--accent); white-space: pre-wrap; font-family: monospace;"></pre>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // 🧠 TUNCER ZEKA v1.0 KÜTÜPHANESİ
        // ============================================================
        const TuncerZeka = (() => {
            const Matematik = {
                rastgele: (min = -1, max = 1) => Math.random() * (max - min) + min,
                sigmoid: (x) => 1 / (1 + Math.exp(-Math.max(-500, Math.min(500, x)))),
                sigmoidTurev: (x) => x * (1 - x),
                tanh: (x) => Math.tanh(x),
                tanhTurev: (x) => 1 - x * x,
                relu: (x) => Math.max(0, x),
                reluTurev: (x) => x > 0 ? 1 : 0,
                softmax: (dizi) => {
                    const maks = Math.max(...dizi);
                    const ustler = dizi.map(x => Math.exp(x - maks));
                    const toplam = ustler.reduce((a, b) => a + b, 0);
                    return ustler.map(x => x / toplam);
                },
                noktaCarpim: (a, b) => a.reduce((t, v, i) => t + v * b[i], 0),
                oklid: (a, b) => Math.sqrt(a.reduce((t, v, i) => t + (v - b[i]) ** 2, 0)),
                kosinusBenzerlik: (a, b) => {
                    const nokta = a.reduce((t, v, i) => t + v * b[i], 0);
                    const buyuklukA = Math.sqrt(a.reduce((t, v) => t + v * v, 0));
                    const buyuklukB = Math.sqrt(b.reduce((t, v) => t + v * v, 0));
                    return (buyuklukA === 0 || buyuklukB === 0) ? 0 : nokta / (buyuklukA * buyuklukB);
                },
                matrisOlustur: (satir, sutun, deger = null) => Array.from({ length: satir }, () => 
                    Array.from({ length: sutun }, () => deger !== null ? deger : (Math.random() * (Math.sqrt(2 / (satir + sutun)) * 2) - Math.sqrt(2 / (satir + sutun))))
                ),
                vektorOlustur: (boyut, deger = null) => Array.from({ length: boyut }, () => deger !== null ? deger : Math.random() * 0.01),
                karistir: (dizi) => [...dizi].sort(() => Math.random() - 0.5)
            };

            class TurkceNLP {
                constructor() {
                    this.stopKelimeler = new Set(['bir', 'bu', 'şu', 'o', 've', 'ile', 'de', 'da', 'için', 'gibi', 'mi', 'mı', 'değil', 'var', 'yok']);
                    this.turkceEkler = ['lar', 'ler', 'lık', 'lik', 'cı', 'ci', 'dan', 'den', 'yor', 'acak', 'ecek', 'mak', 'mek'].sort((a, b) => b.length - a.length);
                }
                tokenize(metin) { return metin.toLowerCase().replace(/[^\wığüşöçİĞÜŞÖÇ\s]/g, ' ').split(/\s+/).filter(t => t.length > 0); }
                stopKelimeleriTemizle(tokenlar) { return tokenlar.filter(t => !this.stopKelimeler.has(t) && t.length > 1); }
                kokBul(kelime) {
                    if (kelime.length < 4) return kelime;
                    let kok = kelime.toLowerCase();
                    for (const ek of this.turkceEkler) { if (kok.endsWith(ek) && kok.length - ek.length >= 2) { kok = kok.slice(0, -ek.length); break; } }
                    return kok;
                }
                kelimeFrekans(tokenlar) { return tokenlar.reduce((f, t) => { f[t] = (f[t] || 0) + 1; return f; }, {}); }
                tfIdf(belgeler) {
                    const belgeTokenlari = belgeler.map(b => this.tokenize(b));
                    const tumKelimeler = new Set(belgeTokenlari.flat());
                    const sonuc = belgeTokenlari.map(tokenlar => {
                        const tf = this.kelimeFrekans(tokenlar);
                        const tfidf = {};
                        for (const kelime of tumKelimeler) {
                            const termFrekans = (tf[kelime] || 0) / tokenlar.length;
                            const belgeFrekansi = belgeTokenlari.filter(bt => bt.includes(kelime)).length;
                            const idf = Math.log(belgeler.length / (belgeFrekansi + 1)) + 1;
                            tfidf[kelime] = termFrekans * idf;
                        }
                        return tfidf;
                    });
                    return { skorlar: sonuc, kelimeler: [...tumKelimeler] };
                }
                metinBenzerligi(metin1, metin2) {
                    const t1 = new Set(this.tokenize(metin1).map(t => this.kokBul(t)));
                    const t2 = new Set(this.tokenize(metin2).map(t => this.kokBul(t)));
                    const kesisim = new Set([...t1].filter(x => t2.has(x)));
                    const birlesim = new Set([...t1, ...t2]);
                    return birlesim.size === 0 ? 0 : kesisim.size / birlesim.size;
                }
                cumleBol(metin) { return metin.split(/[.!?]+/).map(c => c.trim()).filter(c => c.length > 0); }
                metinIstatistik(metin) {
                    const tokenlar = this.tokenize(metin);
                    const cumleler = this.cumleBol(metin);
                    return { toplamKelime: tokenlar.length, benzersizKelime: new Set(tokenlar).size, cumleSayisi: cumleler.length };
                }
            }

            class DuyguAnalizi {
                constructor() {
                    this.nlp = new TurkceNLP();
                    this.pozitifKelimeler = { 'güzel': 2, 'iyi': 1, 'harika': 3, 'mükemmel': 3, 'seviyorum': 3, 'teşekkür': 2, 'mutlu': 2 };
                    this.negatifKelimeler = { 'kötü': -2, 'berbat': -3, 'nefret': -3, 'üzgün': -2, 'hayır': -1, 'sorun': -1 };
                }
                analizEt(metin) {
                    const tokenlar = this.nlp.tokenize(metin);
                    let skor = 0;
                    tokenlar.forEach(t => {
                        const kok = this.nlp.kokBul(t);
                        if (this.pozitifKelimeler[t] || this.pozitifKelimeler[kok]) skor += (this.pozitifKelimeler[t] || this.pozitifKelimeler[kok]);
                        if (this.negatifKelimeler[t] || this.negatifKelimeler[kok]) skor += (this.negatifKelimeler[t] || this.negatifKelimeler[kok]);
                    });
                    const normalSkor = Math.max(-1, Math.min(1, skor / 5));
                    let duygu = normalSkor > 0.1 ? 'pozitif' : normalSkor < -0.1 ? 'negatif' : 'nötr';
                    let emoji = duygu === 'pozitif' ? '😊' : duygu === 'negatif' ? '😞' : '😶';
                    return { skor: normalSkor, duygu, emoji, guven: Math.round(Math.abs(normalSkor) * 100) };
                }
            }

            class SohbetBotu {
                constructor(ayarlar = {}) {
                    this.nlp = new TurkceNLP();
                    this.isim = ayarlar.isim || 'Tuncer';
                    this.niyetler = new Map();
                    this._varsayilanYukle();
                }
                _varsayilanYukle() {
                    this.niyetEkle('selam', { kaliplar: ['merhaba', 'selam', 'hey'], cevaplar: [`Merhaba! Ben ${this.isim}.`, 'Selam, hoş geldin!'] });
                    this.niyetEkle('kimsin', { kaliplar: ['kimsin', 'adın ne'], cevaplar: [`Ben ${this.isim}, yerli bir yapay zekayım.`] });
                    this.niyetEkle('tesekkur', { kaliplar: ['teşekkür', 'sağol'], cevaplar: ['Rica ederim!', 'Ne demek!'] });
                }
                niyetEkle(ad, veri) { this.niyetler.set(ad, veri); }
                cevapVer(metin) {
                    const metinLower = metin.toLowerCase();
                    for (const [ad, veri] of this.niyetler) {
                        if (veri.kaliplar.some(k => metinLower.includes(k))) {
                            return { cevap: veri.cevaplar[Math.floor(Math.random() * veri.cevaplar.length)], niyet: ad, guven: 95 };
                        }
                    }
                    const d = new DuyguAnalizi().analizEt(metin);
                    return { cevap: d.duygu === 'pozitif' ? "Bunu duyduğuma sevindim! 😊" : d.duygu === 'negatif' ? "Üzüldüm, yardımcı olabilir miyim? 😞" : "Anlıyorum, başka bir şey sormak ister misin?", niyet: 'duygu-tabanli', guven: d.guven };
                }
            }

            class MetinOzetleyici {
                constructor() { this.nlp = new TurkceNLP(); }
                ozetle(metin, cumleSayisi = 2) {
                    const cumleler = this.nlp.cumleBol(metin);
                    if (cumleler.length <= cumleSayisi) return metin;
                    const tokenlar = this.nlp.tokenize(metin);
                    const frekans = this.nlp.kelimeFrekans(this.nlp.stopKelimeleriTemizle(tokenlar));
                    const skorlar = cumleler.map((c, i) => {
                        let s = this.nlp.tokenize(c).reduce((top, t) => top + (frekans[t] || 0), 0);
                        if (i === 0) s *= 1.5;
                        return { c, s, i };
                    });
                    return skorlar.sort((a, b) => b.s - a.s).slice(0, cumleSayisi).sort((a, b) => a.i - b.i).map(x => x.c).join('. ') + '.';
                }
                anahtarKelimeler(metin, n = 5) {
                    const tf = this.nlp.tfIdf([metin]);
                    return Object.entries(tf.skorlar[0]).sort((a, b) => b[1] - a[1]).slice(0, n).map(x => ({ kelime: x[0], skor: x[1] }));
                }
            }

            return { SohbetBotu, DuyguAnalizi, TurkceNLP, MetinOzetleyici, 
                     hakkinda: () => `🧠 TUNCER ZEKA v1.0\n------------------\nDoğal Dil İşleme, Duygu Analizi ve Metin Özetleme modülleri aktif.` };
        })();

        // ============================================================
        // 🕹️ UI KONTROL MANTIĞI
        // ============================================================
        const bot = new TuncerZeka.SohbetBotu({ isim: "Tuncer" });
        const nlp = new TuncerZeka.TurkceNLP();
        const ozetleyici = new TuncerZeka.MetinOzetleyici();
        const duyguMotoru = new TuncerZeka.DuyguAnalizi();

        function showSection(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            
            if(id === 'stats') {
                document.getElementById('libInfo').textContent = TuncerZeka.hakkinda() + 
                ` \n\nSistem Durumu: Çevrimiçi\nBellek Kullanımı: Optimize Edildi\nNLP Motoru: v1.2`;
            }
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const win = document.getElementById('chat-window');
            const val = input.value.trim();
            if(!val) return;

            const uDiv = document.createElement('div');
            uDiv.className = 'msg user';
            uDiv.textContent = val;
            win.appendChild(uDiv);

            const response = bot.cevapVer(val);
            setTimeout(() => {
                const bDiv = document.createElement('div');
                bDiv.className = 'msg bot';
                bDiv.innerHTML = `<small style="display:block; font-size: 0.7rem; color: #a29bfe; margin-bottom: 4px;">Niyet: ${response.niyet} (%${response.guven})</small>${response.cevap}`;
                win.appendChild(bDiv);
                win.scrollTop = win.scrollHeight;
            }, 400);

            input.value = "";
            win.scrollTop = win.scrollHeight;
        }

        function analyzeSentiment() {
            const text = document.getElementById('sentimentInput').value;
            if(!text) return;
            const res = duyguMotoru.analizEt(text);
            const box = document.getElementById('sentimentResult');
            box.innerHTML = `
                <div style="font-size: 2.5rem; margin-bottom: 10px;">${res.emoji}</div>
                <div style="color: var(--secondary); font-weight: bold;">Duygu: ${res.duygu.toUpperCase()}</div>
                <div style="font-size: 0.9rem; opacity: 0.8;">Güven: %${res.guven} | Skor: ${res.skor.toFixed(2)}</div>
            `;
        }

        function generateSummary() {
            const text = document.getElementById('summaryInput').value;
            if(!text) return;
            const ozet = ozetleyici.ozetle(text, 2);
            const anahtar = ozetleyici.anahtarKelimeler(text, 5);
            
            const box = document.getElementById('summaryResult');
            let anahtarHtml = anahtar.map(k => `<span class="badge">#${k.kelime}</span>`).join('');
            
            box.innerHTML = `
                <div style="margin-bottom: 15px;"><strong>Özet:</strong><br>${ozet}</div>
                <div><strong>Anahtar Kelimeler:</strong><br>${anahtarHtml}</div>
            `;
        }
    </script>
</body>
</html>
