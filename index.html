<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tuncer Web - Mark 2 AR</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: transparent;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }

        .hud-panel {
            position: absolute;
            background: rgba(0, 20, 40, 0.6);
            backdrop-filter: blur(12px);
            border-left: 4px solid #00e5ff;
            padding: 20px;
            color: #00e5ff;
            pointer-events: auto;
            top: 20px; left: 20px;
            border-radius: 0 15px 15px 0;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.2);
        }

        h1 { margin: 0; font-size: 18px; letter-spacing: 3px; text-transform: uppercase; }
        
        .status { display: flex; align-items: center; margin-top: 10px; font-size: 12px; }
        .indicator { width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; background: #ff3366; }
        .active { background: #00ffcc; box-shadow: 0 0 10px #00ffcc; }

        #console {
            margin-top: 15px; font-family: 'Courier New', monospace;
            font-size: 11px; color: #fff; height: 100px; overflow-y: auto;
            border-top: 1px solid rgba(0, 229, 255, 0.3); padding-top: 10px;
        }

        #start-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #00e5ff; color: #000; border: none; padding: 20px 40px;
            font-weight: bold; border-radius: 50px; cursor: pointer; pointer-events: auto;
            font-size: 16px; box-shadow: 0 0 20px #00e5ff;
        }

        #controls {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; pointer-events: auto;
        }

        .btn-mode {
            background: rgba(0,0,0,0.5); border: 1px solid #00e5ff; color: #00e5ff;
            padding: 10px 20px; border-radius: 10px; cursor: pointer;
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <button id="start-btn">SİSTEMİ BAŞLAT (AR)</button>

    <div id="ui-overlay" style="display: none;">
        <div class="hud-panel">
            <h1>TUNCER WEB v2.0</h1>
            <div class="status"><div id="ind-ar" class="indicator"></div> UZAMSAL TAKİP</div>
            <div class="status"><div id="ind-hand" class="indicator"></div> EL İSKELETİ</div>
            <div class="status"><div id="ind-voice" class="indicator"></div> SESLİ KOMUT</div>
            <div id="console">Komut bekleniyor...</div>
        </div>

        <div id="controls">
            <button class="btn-mode" id="m-trans">TAŞI</button>
            <button class="btn-mode" id="m-rot">DÖNDÜR</button>
            <button class="btn-mode" id="m-scale">ÖLÇEK</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';
        import { XRHandModelFactory } from 'three/addons/webxr/XRHandModelFactory.js';

        let scene, camera, renderer, transformControl;
        let reticle, hitTestSource = null, hitTestSourceRequested = false;
        let objects = [];
        let recognition;

        const consoleEl = document.getElementById('console');
        function sysLog(m) { 
            consoleEl.innerHTML = `> ${m}<br>` + consoleEl.innerHTML;
            console.log(m);
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Işıklandırma
            scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1));
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(1, 1, 1);
            scene.add(light);

            // Hedef Noktası (İmleç)
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.08, 0.1, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x00e5ff })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            // --- EL İSKELETİ KURULUMU ---
            const handModelFactory = new XRHandModelFactory();
            
            // El 1 (Sol/Sağ farketmez)
            const hand1 = renderer.xr.getHand(0);
            hand1.add(handModelFactory.createHandModel(hand1, "mesh")); // "mesh" veya "spheres" seçilebilir
            scene.add(hand1);
            hand1.addEventListener('connected', () => document.getElementById('ind-hand').classList.add('active'));

            // El 2
            const hand2 = renderer.xr.getHand(1);
            hand2.add(handModelFactory.createHandModel(hand2, "mesh"));
            scene.add(hand2);

            // Koordinat Sistemi (Gizmo)
            transformControl = new TransformControls(camera, renderer.domElement);
            scene.add(transformControl);

            // AR Başlatma
            document.getElementById('start-btn').addEventListener('click', startAR);

            setupControls();
        }

        async function startAR() {
            const sessionInit = { 
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay', 'hand-tracking', 'depth-sensing'],
                domOverlay: { root: document.getElementById('ui-overlay') }
            };

            const session = await navigator.xr.requestSession('immersive-ar', sessionInit);
            renderer.xr.setReferenceSpaceType('local');
            await renderer.xr.setSession(session);

            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('ui-overlay').style.display = 'block';
            document.getElementById('ind-ar').classList.add('active');

            initVoice();
            renderer.setAnimationLoop(render);
            sysLog("Sistem aktif. Yüzey aranıyor...");
        }

        // --- SESLİ KOMUT SİSTEMİ (Gelişmiş) ---
        function initVoice() {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRec) return sysLog("Hata: Ses desteği yok.");

            recognition = new SpeechRec();
            recognition.lang = 'tr-TR';
            recognition.continuous = true;
            recognition.interimResults = false;

            recognition.onstart = () => document.getElementById('ind-voice').classList.add('active');
            
            recognition.onresult = (event) => {
                const text = event.results[event.results.length - 1][0].transcript.toLowerCase();
                sysLog(`Komut: ${text}`);
                handleVoiceCommand(text);
            };

            recognition.onerror = () => {
                setTimeout(() => recognition.start(), 500); // Hata durumunda otomatik restart
            };
            
            recognition.onend = () => {
                recognition.start(); // Sürekli dinleme
            };

            recognition.start();
        }

        function handleVoiceCommand(cmd) {
            // "Küp ekle" veya "model ekle" gibi esnek kontrol
            if (cmd.includes('küp') && (cmd.includes('ekle') || cmd.includes('oluştur'))) {
                addModel('cube');
            } else if (cmd.includes('delik') && cmd.includes('ekle')) {
                addModel('hole');
            } else if (cmd.includes('sil') || cmd.includes('kaldır')) {
                deleteModel();
            } else if (cmd.includes('birleştir')) {
                sysLog("Birleştirme işlemi simüle ediliyor...");
            }
        }

        function addModel(type) {
            if (!reticle.visible) return sysLog("Hata: Yüzey algılanmadı!");

            let geo = new THREE.BoxGeometry(0.1, 0.1, 0.1);
            let mat;

            if (type === 'cube') {
                mat = new THREE.MeshPhongMaterial({ color: 0x00e5ff, transparent: true, opacity: 0.7 });
            } else {
                mat = new THREE.MeshBasicMaterial({ color: 0xff0000, wireframe: true });
            }

            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.setFromMatrixPosition(reticle.matrix);
            scene.add(mesh);
            objects.push(mesh);
            transformControl.attach(mesh);
            sysLog(`${type === 'cube' ? 'Küp' : 'Delik'} eklendi.`);
        }

        function deleteModel() {
            if (transformControl.object) {
                const obj = transformControl.object;
                transformControl.detach();
                scene.remove(obj);
                objects = objects.filter(o => o !== obj);
                sysLog("Nesne silindi.");
            }
        }

        function setupControls() {
            document.getElementById('m-trans').onclick = () => transformControl.setMode('translate');
            document.getElementById('m-rot').onclick = () => transformControl.setMode('rotate');
            document.getElementById('m-scale').onclick = () => transformControl.setMode('scale');

            // Dokunarak nesne seçme
            window.addEventListener('pointerdown', (e) => {
                if (e.target.tagName === 'BUTTON') return;
                const mouse = new THREE.Vector2(
                    (e.clientX / window.innerWidth) * 2 - 1,
                    -(e.clientY / window.innerHeight) * 2 + 1
                );
                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(mouse, camera);
                const hits = raycaster.intersectObjects(objects);
                if (hits.length > 0) transformControl.attach(hits[0].object);
            });
        }

        function render(timestamp, frame) {
            if (frame) {
                const refSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then(ref => {
                        session.requestHitTestSource({ space: ref }).then(src => hitTestSource = src);
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hits = frame.getHitTestResults(hitTestSource);
                    if (hits.length > 0) {
                        reticle.visible = true;
                        reticle.matrix.fromArray(hits[0].getPose(refSpace).transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }
            }
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
