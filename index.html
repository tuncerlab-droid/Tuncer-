<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuncer AI - Direct Access</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; margin-bottom: 20px; white-space: pre-wrap; }
        .input-line { display: flex; gap: 10px; border-top: 1px solid #333; padding-top: 10px; }
        input { background: transparent; border: none; color: #0f0; outline: none; flex: 1; font-family: monospace; font-size: 1.1rem; }
        .ver-select { margin-bottom: 10px; }
        button { background: #111; color: #0f0; border: 1px solid #0f0; padding: 5px 10px; cursor: pointer; }
        button.active { background: #0f0; color: #000; }
    </style>
</head>
<body>

    <div class="ver-select">
        <button id="v23" onclick="switchVer('2023')">v2023</button>
        <button id="v26" onclick="switchVer('2026')" class="active">v2026</button>
    </div>

    <div id="chat">--- TUNCER AI SİSTEMİNE HOŞGELDİNİZ ---</div>

    <div class="input-line">
        <span>></span>
        <input type="text" id="ui" autofocus autocomplete="off">
    </div>

    <!-- Scriptleri buraya peş peşe diziyoruz, kontrol falan yok -->
    <script id="s2023" src="tuncer2023.js"></script>
    <script id="s2026" src="tuncer2026.js"></script>

    <script>
        let currentVer = '2026';
        let ai = null;

        function initAI() {
            try {
                // Hiçbir kontrol yapmadan direkt sınıfı başlatmayı dene
                ai = new TuncerZeka();
                printLog("Sistem bağlandı.");
            } catch (e) {
                printLog("Sistem henüz hazır değil (Dosya yükleniyor olabilir).");
            }
        }

        function switchVer(v) {
            currentVer = v;
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            document.getElementById('v' + (v.slice(-2))).classList.add('active');
            printLog("Sürüm değiştirildi: " + v);
            initAI();
        }

        function printLog(m) {
            const chat = document.getElementById('chat');
            chat.innerHTML += "\n" + m;
            chat.scrollTop = chat.scrollHeight;
        }

        async function send() {
            const input = document.getElementById('ui');
            const val = input.value;
            if(!val) return;

            printLog("Kullanıcı: " + val);
            input.value = '';

            try {
                // Eğer initAI başarısız olduysa tekrar dene
                if(!ai) ai = new TuncerZeka();
                
                const res = await ai.konus(val);
                const text = typeof res === 'object' ? res.cevap : res;
                printLog("Tuncer: " + text);
            } catch (e) {
                printLog("Hata: TuncerZeka sınıfına ulaşılamıyor. Lütfen dosyaların klasörde olduğundan emin olun.");
            }
        }

        document.getElementById('ui').onkeydown = (e) => { if(e.key === 'Enter') send(); };
        
        // Sayfa açıldıktan 1 saniye sonra zorla başlat
        window.onload = () => setTimeout(initAI, 1000);
    </script>
</body>
</html>
