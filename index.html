<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tuncer AR v43.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 5; }
        
        /* Arka kamera için ayna efekti kapalı */
        video { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; z-index: 1; 
        }
        
        #ui-overlay { 
            position: absolute; inset: 0; pointer-events: none; z-index: 10; 
            display: flex; flex-direction: column; justify-content: space-between; padding: 20px; 
        }
        .hud { 
            background: rgba(0, 15, 30, 0.85); border-left: 4px solid #00e5ff; 
            padding: 15px; border-radius: 10px; color: #00e5ff; font-family: monospace; 
            font-size: 11px; align-self: flex-end; backdrop-filter: blur(8px);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }
        #start-screen { 
            position: fixed; inset: 0; background: #050505; z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: white; font-family: monospace;
        }
        #btn-go { 
            background: linear-gradient(135deg, #00e5ff, #0099ff); color: #000; 
            font-weight: 900; padding: 18px 50px; border-radius: 12px; border: none; 
            cursor: pointer; font-size: 18px; box-shadow: 0 0 30px rgba(0, 229, 255, 0.4); 
            pointer-events: auto; text-transform: uppercase;
        }
        #status-hint { 
            align-self: center; margin-bottom: 60px; background: rgba(0, 229, 255, 0.2); 
            padding: 10px 20px; border-radius: 25px; color: #00e5ff; border: 1px solid #00e5ff;
            font-size: 12px; font-family: monospace; font-weight: bold;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js"
            }
        }
    </script>
</head>
<body>

    <video id="input_video" playsinline></video>

    <div id="start-screen">
        <h1 style="color:#00e5ff; font-size: 28px; font-weight: 900; margin-bottom:5px;">TUNCER MARK-III</h1>
        <p style="color:#555; margin-bottom:40px; font-size:10px; letter-spacing:2px;">STABLE REAR-CAM CALIB</p>
        <button id="btn-go">SİSTEMİ BAŞLAT</button>
    </div>

    <div id="ui-overlay" style="display: none;">
        <div class="hud">
            SİSTEM: <span id="status-text" style="color:#fff;">AKTİF</span><br>
            MOTOR: <span id="hand-text" style="color:#ff3366;">ARANIYOR</span><br>
            HAREKET: <span id="pinch-text" style="color:#fff;">BOŞTA</span>
        </div>
        <div id="status-hint">KAMERAYI ZEMİNE TUT...</div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        const videoElement = document.getElementById('input_video');
        let scene, camera, renderer;
        let objects = [], selectedObject = null;
        let isPinching = false;
        let handCursorGroup, cursorDot, cursorRing;

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const lm = results.multiHandLandmarks[0];
                const indexTip = lm[8];
                const thumbTip = lm[4];

                document.getElementById('hand-text').innerText = "KİLİTLENDİ";
                document.getElementById('hand-text').style.color = "#00ffcc";

                // KOORDİNAT SİSTEMİ DÜZELTME (ARKA KAMERA):
                // Arka kamerada ayna etkisi olmadığı için x doğrudan (indexTip.x * 2 - 1) olmalı.
                // Eğer hala ters ise çarpanı 1.8 veya -1.8 olarak değiştirerek tam uyumu sağlarız.
                // Bir önceki sürümde -1.8 denemiştik, şimdi 1.8 (pozitif) deniyoruz.
                const x = (indexTip.x * 2 - 1) * 1.8; 
                const y = (indexTip.y * -2 + 1) * 1.2; 
                const z = -2.0;

                const pos = new THREE.Vector3(x, y, z);
                
                handCursorGroup.visible = true;
                handCursorGroup.position.lerp(pos, 0.5);

                const dist = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y);
                if (dist < 0.06) {
                    document.getElementById('pinch-text').innerText = "TUTUYOR";
                    cursorRing.material.color.setHex(0x00ffcc);
                    cursorRing.scale.set(0.8, 0.8, 0.8);
                    
                    if (!isPinching) {
                        isPinching = true;
                        let found = false;
                        objects.forEach(obj => {
                            if (obj.position.distanceTo(handCursorGroup.position) < 0.5) {
                                selectedObject = obj;
                                found = true;
                            }
                        });
                        
                        if (!found) {
                            createNewObject(handCursorGroup.position.clone());
                        }
                    }
                    
                    if (selectedObject) {
                        selectedObject.position.lerp(handCursorGroup.position, 0.3);
                    }
                } else {
                    isPinching = false;
                    selectedObject = null;
                    document.getElementById('pinch-text').innerText = "BOŞTA";
                    cursorRing.material.color.setHex(0xff3366);
                    cursorRing.scale.set(1, 1, 1);
                }
            } else {
                handCursorGroup.visible = false;
                document.getElementById('hand-text').innerText = "ARANIYOR";
                document.getElementById('hand-text').style.color = "#ff3366";
            }
        });

        function createNewObject(pos) {
            const geometry = new THREE.IcosahedronGeometry(0.12, 0);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0x00e5ff, 
                wireframe: true,
                transparent: true, 
                opacity: 0.9,
                emissive: 0x00e5ff,
                emissiveIntensity: 0.5
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.copy(pos);
            scene.add(mesh);
            objects.push(mesh);
            selectedObject = mesh;
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const light = new THREE.PointLight(0xffffff, 2, 100);
            light.position.set(0, 10, 10);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));

            handCursorGroup = new THREE.Group();
            cursorDot = new THREE.Mesh(
                new THREE.SphereGeometry(0.015, 16, 16),
                new THREE.MeshBasicMaterial({ color: 0x00e5ff })
            );
            cursorRing = new THREE.Mesh(
                new THREE.RingGeometry(0.045, 0.055, 32),
                new THREE.MeshBasicMaterial({ color: 0xff3366, side: THREE.DoubleSide })
            );
            handCursorGroup.add(cursorDot, cursorRing);
            handCursorGroup.visible = false;
            scene.add(handCursorGroup);

            // Arka kamerayı zorla (facingMode: environment)
            const cameraUtils = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({image: videoElement});
                },
                width: 1280,
                height: 720,
                facingMode: 'environment'
            });

            document.getElementById('btn-go').addEventListener('click', () => {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('ui-overlay').style.display = 'flex';
                cameraUtils.start();
                animate();
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            objects.forEach(obj => {
                if (obj !== selectedObject) {
                    obj.rotation.y += 0.02;
                    obj.rotation.z += 0.01;
                }
            });
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
