<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Tuncer Web - Stark Endüstrileri AR Modeli</title>
    <style>
        /* Tam Ekran ve Şeffaf Arka Plan (Kamera için zorunlu) */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: transparent;
            font-family: 'Courier New', Courier, monospace;
        }

        /* DOM Overlay - WebXR içindeki arayüz katmanı */
        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* Tıklamaların 3D sahneye geçmesi için */
            z-index: 10;
        }

        /* Glassmorphism Stark Arayüzü */
        .hud-panel {
            position: absolute;
            background: rgba(0, 30, 60, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 229, 255, 0.4);
            border-radius: 15px;
            padding: 15px;
            color: #00e5ff;
            text-shadow: 0 0 5px #00e5ff;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
            pointer-events: auto; /* UI elemanlarına tıklanabilsin */
        }

        #top-left-hud { top: 20px; left: 20px; max-width: 300px; }
        
        h1 { margin: 0 0 10px 0; font-size: 20px; text-transform: uppercase; border-bottom: 1px solid #00e5ff; padding-bottom: 5px; }
        
        .status-row { display: flex; align-items: center; margin-bottom: 5px; font-size: 14px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 10px; background: red; box-shadow: 0 0 8px red; }
        .dot.active { background: #00ffcc; box-shadow: 0 0 10px #00ffcc; }

        #log-box {
            margin-top: 10px; font-size: 12px; height: 80px; overflow-y: hidden;
            color: #a0f0ff; border-top: 1px dashed rgba(0, 229, 255, 0.3); padding-top: 5px;
        }

        /* 3D Kontrol (Gizmo) Butonları */
        #gizmo-controls {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; display: none;
        }

        .action-btn {
            background: rgba(0, 229, 255, 0.2); border: 1px solid #00e5ff;
            color: #fff; padding: 10px 20px; border-radius: 20px;
            font-weight: bold; cursor: pointer; backdrop-filter: blur(5px);
            text-transform: uppercase; font-size: 12px; transition: 0.3s;
        }
        .action-btn:hover, .action-btn.active {
            background: rgba(0, 229, 255, 0.6); box-shadow: 0 0 15px #00e5ff;
        }

        #start-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 18px; padding: 15px 40px; pointer-events: auto;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(0, 229, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0); }
        }
    </style>

    <!-- Three.js ve Eklentileri için Import Map -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <!-- Başlangıç Butonu -->
    <button id="start-btn" class="action-btn">Sistemi Başlat (AR)</button>

    <!-- AR Arayüz Katmanı (WebXR DOM Overlay) -->
    <div id="ui-overlay" style="display: none;">
        <div id="top-left-hud" class="hud-panel">
            <h1>TUNCER WEB OS</h1>
            <div class="status-row"><div id="status-ar" class="dot"></div> Uzamsal Tarama (SLAM)</div>
            <div class="status-row"><div id="status-hand" class="dot"></div> El Takibi (Hand Tracking)</div>
            <div class="status-row"><div id="status-voice" class="dot"></div> J.A.R.V.I.S. (Ses)</div>
            <div id="log-box">Sistem başlatılıyor...<br>Komutlar: "Küp ekle", "Delik ekle", "Sil"</div>
        </div>

        <div id="gizmo-controls">
            <button class="action-btn active" id="btn-translate">Taşı</button>
            <button class="action-btn" id="btn-rotate">Döndür</button>
            <button class="action-btn" id="btn-scale">Büyüt</button>
        </div>
    </div>

    <!-- Ana Uygulama Mantığı -->
    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';
        import { XRHandModelFactory } from 'three/addons/webxr/XRHandModelFactory.js';

        // --- GLOBAL DEĞİŞKENLER ---
        let scene, camera, renderer;
        let reticle, hitTestSource = null, hitTestSourceRequested = false;
        let objects = [];
        let transformControl;
        let currentSession = null;
        let speechRecog;

        // HUD Log Fonksiyonu
        function logMsg(msg) {
            const logBox = document.getElementById('log-box');
            logBox.innerHTML = `> ${msg}<br>` + logBox.innerHTML;
        }

        function init() {
            // 1. Sahne ve Kamera
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            // 2. Renderer (AR için alpha: true ZORUNLUDUR)
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // 3. Işıklar (Gerçekçi görünüm)
            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            light.position.set(0.5, 1, 0.25);
            scene.add(light);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(0, 2, 0);
            dirLight.castShadow = true;
            scene.add(dirLight);

            // 4. Hedef İmleci (Reticle)
            const ringGeo = new THREE.RingGeometry(0.1, 0.12, 32).rotateX(-Math.PI / 2);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.8 });
            reticle = new THREE.Mesh(ringGeo, ringMat);
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            // 5. El Takibi (Hand Tracking) Modelleri
            const handModelFactory = new XRHandModelFactory();
            const hand1 = renderer.xr.getHand(0);
            hand1.add(handModelFactory.createHandModel(hand1, "mesh")); // Tony stark tarzı tel kafes eklenebilir
            scene.add(hand1);

            const hand2 = renderer.xr.getHand(1);
            hand2.add(handModelFactory.createHandModel(hand2, "mesh"));
            scene.add(hand2);

            // El takibi aktif olduğunda ışığı yak
            hand1.addEventListener('connected', () => document.getElementById('status-hand').classList.add('active'));

            // 6. 3D Koordinat Sistemi (Transform Controls / Gizmo)
            transformControl = new TransformControls(camera, renderer.domElement);
            transformControl.addEventListener('dragging-changed', function (event) {
                // Sürükleme sırasında kamera kontrolünü devre dışı bırakmak için
            });
            scene.add(transformControl);

            // 7. AR Butonu Kurulumu (Derinlik, El Takibi ve UI Overlay İstekleri)
            const overlayElement = document.getElementById('ui-overlay');
            const arOptions = {
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay', 'hand-tracking', 'depth-sensing'],
                domOverlay: { root: overlayElement }
            };
            
            const startBtn = document.getElementById('start-btn');
            startBtn.addEventListener('click', async () => {
                try {
                    const session = await navigator.xr.requestSession('immersive-ar', arOptions);
                    renderer.xr.setReferenceSpaceType('local');
                    await renderer.xr.setSession(session);
                    currentSession = session;
                    
                    startBtn.style.display = 'none';
                    overlayElement.style.display = 'block';
                    document.getElementById('status-ar').classList.add('active');
                    document.getElementById('gizmo-controls').style.display = 'flex';
                    
                    initVoiceControl();
                    logMsg("AR Sistemi Devrede. Yüzey bekleniyor...");
                    renderer.setAnimationLoop(render);

                    session.addEventListener('end', () => {
                        overlayElement.style.display = 'none';
                        startBtn.style.display = 'block';
                        document.getElementById('status-ar').classList.remove('active');
                    });
                } catch (e) {
                    alert("Cihazınız AR desteklemiyor veya izin reddedildi: " + e.message);
                }
            });

            // Ekrana Dokunma İşlemleri (Nesne Seçimi)
            overlayElement.addEventListener('pointerdown', onPointerDown);
            setupGizmoUI();
            window.addEventListener('resize', onWindowResize);
        }

        // --- GIZMO ARAYÜZ KONTROLLERİ ---
        function setupGizmoUI() {
            const modes = ['translate', 'rotate', 'scale'];
            modes.forEach(mode => {
                document.getElementById(`btn-${mode}`).addEventListener('click', (e) => {
                    transformControl.setMode(mode);
                    document.querySelectorAll('#gizmo-controls .action-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    logMsg(`Koordinat modu: ${mode.toUpperCase()}`);
                });
            });
        }

        // --- DOKUNMA / SEÇME İŞLEMİ ---
        function onPointerDown(event) {
            // Eğer UI butonuna tıklandıysa yoksay
            if(event.target.tagName === 'BUTTON') return;

            // Ekrana dokunarak nesne seçme (Raycaster)
            const mouse = new THREE.Vector2();
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(objects);

            if (intersects.length > 0) {
                // Nesne seçildi, koordinat sistemini bağla
                transformControl.attach(intersects[0].object);
                logMsg("Nesne seçildi.");
            } else {
                // Boşa tıklandı, gizmo'yu bırak
                transformControl.detach();
            }
        }

        // --- SESLİ KONTROL (J.A.R.V.I.S) ---
        function initVoiceControl() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                logMsg("Ses tanıma bu tarayıcıda desteklenmiyor.");
                return;
            }

            speechRecog = new SpeechRecognition();
            speechRecog.lang = 'tr-TR';
            speechRecog.continuous = true;

            speechRecog.onstart = () => {
                document.getElementById('status-voice').classList.add('active');
            };

            speechRecog.onresult = (event) => {
                const cmd = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
                logMsg(`Ses Algılandı: ${cmd}`);
                executeCommand(cmd);
            };

            speechRecog.onend = () => {
                if(currentSession) speechRecog.start(); // AR açıksa tekrar dinlemeye başla
            };

            speechRecog.start();
        }

        // --- KOMUT İŞLEYİCİ VE MODELLEME (Küp, Delik vb.) ---
        function executeCommand(cmd) {
            if (!reticle.visible && (cmd.includes('ekle') || cmd.includes('oluştur'))) {
                logMsg("Önce imleci bir yüzeye sabitleyin!");
                return;
            }

            if (cmd.includes('küp ekle') || cmd.includes('katı ekle')) {
                const geo = new THREE.BoxGeometry(0.1, 0.1, 0.1);
                // Glassmorphism tarzı saydam materyal
                const mat = new THREE.MeshPhysicalMaterial({  
                    color: 0x00e5ff, metalness: 0.1, roughness: 0.2,
                    transparent: true, opacity: 0.8, transmission: 0.5 
                });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.setFromMatrixPosition(reticle.matrix);
                scene.add(mesh);
                objects.push(mesh);
                transformControl.attach(mesh); // Eklendiğinde direkt seç
                logMsg("Katı Küp eklendi.");
            }
            else if (cmd.includes('delik ekle') || cmd.includes('boşluk ekle')) {
                const geo = new THREE.BoxGeometry(0.1, 0.1, 0.1);
                const mat = new THREE.MeshBasicMaterial({ color: 0xff0055, wireframe: true });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.setFromMatrixPosition(reticle.matrix);
                mesh.userData.isHole = true; // Delik olduğunu işaretle
                scene.add(mesh);
                objects.push(mesh);
                transformControl.attach(mesh);
                logMsg("Delik Küpü eklendi (Kırmızı Telkafes).");
            }
            else if (cmd.includes('sil') || cmd.includes('kaldır')) {
                const objToDel = transformControl.object;
                if (objToDel) {
                    transformControl.detach();
                    scene.remove(objToDel);
                    objects = objects.filter(o => o !== objToDel);
                    logMsg("Seçili nesne silindi.");
                } else {
                    logMsg("Silmek için önce bir nesneye dokunun.");
                }
            }
        }

        // --- RENDER VE EKRAN GÜNCELLEME DÖNGÜSÜ ---
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function render(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                // Yüzey Algılama (Hit Test)
                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then((refSpace) => {
                        session.requestHitTestSource({ space: refSpace }).then((source) => {
                            hitTestSource = source;
                        });
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length > 0) {
                        const hit = hitTestResults[0];
                        reticle.visible = true;
                        reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }
            }

            // Delik nesnelerini belirginleştirmek için hafifçe döndür
            objects.forEach(obj => {
                if (obj.userData.isHole) {
                    obj.rotation.x += 0.01;
                    obj.rotation.y += 0.01;
                }
            });

            renderer.render(scene, camera);
        }

        // Sistemi Başlat
        init();
    </script>
</body>
</html>
