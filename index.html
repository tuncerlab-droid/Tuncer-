<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuncer Zeka HUD - Gelişmiş</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap');

        :root {
            --primary-color: #00d2ff;
            --secondary-color: #3a7bd5;
            --bg-color: #050914;
            --text-glow: 0 0 10px rgba(0, 210, 255, 0.8);
            --panel-bg: rgba(0, 40, 60, 0.15);
            --panel-border: rgba(0, 210, 255, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--primary-color);
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                radial-gradient(circle at center, rgba(0, 210, 255, 0.05) 0%, transparent 50%),
                linear-gradient(rgba(0, 210, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 210, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            background-position: center center;
        }

        /* Gözlük İçi Ekran Efekti (Vignette & Scanline) */
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            z-index: 100;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.9);
        }

        .hud-wrapper {
            position: relative;
            width: 95vw;
            height: 90vh;
            display: grid;
            grid-template-columns: 250px 1fr 300px;
            grid-template-rows: 1fr;
            gap: 20px;
            z-index: 10;
        }

        /* Paneller */
        .panel {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 20px;
            box-shadow: inset 0 0 20px rgba(0, 210, 255, 0.05), 0 0 15px rgba(0, 210, 255, 0.1);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 20px; height: 2px;
            background: var(--primary-color);
            box-shadow: var(--text-glow);
        }
        
        .panel::after {
            content: '';
            position: absolute;
            bottom: 0; right: 0;
            width: 20px; height: 2px;
            background: var(--primary-color);
            box-shadow: var(--text-glow);
        }

        h2 {
            font-size: 16px;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 5px;
            margin-bottom: 15px;
            text-shadow: var(--text-glow);
            display: flex;
            justify-content: space-between;
        }

        /* Sol Panel - Sistem Verileri */
        .sys-data {
            font-size: 14px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(0, 210, 255, 0.1);
            margin-top: 5px;
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary-color);
            box-shadow: var(--text-glow);
            width: 0%;
            transition: width 1s ease-in-out;
        }

        /* Merkez Ekran - 3D Reaktor */
        .center-console {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            flex-direction: column;
        }

        .reactor-container {
            position: relative;
            width: 350px;
            height: 350px;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            border: 2px solid transparent;
        }

        .c1 { width: 350px; height: 350px; border-top: 2px solid var(--primary-color); border-bottom: 2px solid var(--primary-color); animation: spin 8s linear infinite; opacity: 0.3; }
        .c2 { width: 300px; height: 300px; border: 1px dashed var(--primary-color); animation: spin-reverse 12s linear infinite; opacity: 0.5; }
        .c3 { width: 250px; height: 250px; border-left: 3px solid var(--primary-color); border-right: 3px solid var(--primary-color); animation: spin 4s ease-in-out infinite alternate; box-shadow: 0 0 20px rgba(0, 210, 255, 0.4) inset; }
        .c4 { width: 150px; height: 150px; background: radial-gradient(circle, rgba(0, 210, 255, 0.2) 0%, transparent 70%); animation: pulse 2s infinite; }

        .core-text {
            position: absolute;
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            text-shadow: var(--text-glow);
            letter-spacing: 2px;
        }

        .sub-status {
            font-size: 14px;
            color: #fff;
            letter-spacing: 4px;
            margin-top: 5px;
            display: block;
        }

        .listening-wave {
            position: absolute;
            bottom: -50px;
            display: flex;
            gap: 5px;
            height: 30px;
            align-items: flex-end;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .listening-wave.active { opacity: 1; }
        .bar { width: 4px; background: var(--primary-color); box-shadow: var(--text-glow); animation: soundWave 0.5s infinite alternate; }
        .bar:nth-child(1) { height: 10px; animation-delay: 0.1s; }
        .bar:nth-child(2) { height: 20px; animation-delay: 0.2s; }
        .bar:nth-child(3) { height: 30px; animation-delay: 0.3s; }
        .bar:nth-child(4) { height: 15px; animation-delay: 0.4s; }
        .bar:nth-child(5) { height: 25px; animation-delay: 0.5s; }

        /* Sağ Panel - İletişim Logu */
        .chat-log {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 5px;
            font-size: 14px;
        }

        .chat-log::-webkit-scrollbar { width: 4px; }
        .chat-log::-webkit-scrollbar-thumb { background: var(--primary-color); border-radius: 4px; }

        .msg-box {
            padding: 8px 12px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.3);
            border-left: 2px solid transparent;
            animation: fadeIn 0.3s ease-out;
        }

        .msg-user { border-left-color: #00ffaa; }
        .msg-ai { border-left-color: var(--primary-color); background: rgba(0, 210, 255, 0.05); }
        
        .msg-sender { font-size: 10px; opacity: 0.7; margin-bottom: 3px; letter-spacing: 1px; }
        .msg-text { color: #e0f7fa; line-height: 1.4; }

        /* Başlat Butonu */
        #init-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            background: rgba(0, 20, 30, 0.8);
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            font-family: 'Rajdhani', sans-serif;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 5px;
            cursor: pointer;
            z-index: 500;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.4), inset 0 0 20px rgba(0, 210, 255, 0.2);
            border-radius: 5px;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        #init-btn:hover { background: var(--primary-color); color: #000; box-shadow: 0 0 50px var(--primary-color); }

        /* Animasyonlar */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }
        @keyframes pulse { 0% { opacity: 0.5; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1.05); } 100% { opacity: 0.5; transform: scale(0.95); } }
        @keyframes soundWave { 0% { height: 5px; } 100% { height: 30px; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <div class="crt-overlay"></div>

    <button id="init-btn">SİSTEMİ BAŞLAT</button>

    <div class="hud-wrapper" style="opacity: 0; transition: opacity 1s;" id="main-hud">
        
        <!-- Sol Panel: Sistem Durumu -->
        <div class="panel">
            <h2>SİSTEM BİLEŞENLERİ <span style="font-size: 10px; color: #00ffaa;">[OPTİMAL]</span></h2>
            
            <div class="sys-data"><span>OPTİK SENSÖRLER</span> <span id="opt-val">98%</span></div>
            <div class="progress-bar"><div class="progress-fill" id="opt-bar"></div></div>
            <br>
            <div class="sys-data"><span>YAPAY ZEKA ÇEKİRDEĞİ</span> <span id="ai-val">100%</span></div>
            <div class="progress-bar"><div class="progress-fill" id="ai-bar"></div></div>
            <br>
            <div class="sys-data"><span>AĞ BAĞLANTISI</span> <span id="net-val">STABİL</span></div>
            <div class="progress-bar"><div class="progress-fill" style="width: 100%; background: #00ffaa;"></div></div>
            <br>
            <div class="sys-data"><span>MİMAR</span> <span>AHMET TUNCER</span></div>
            
            <div style="margin-top: auto; font-size: 12px; opacity: 0.5; border-top: 1px solid var(--panel-border); padding-top: 10px;">
                TUNCER ZEKA v2.5 - HÜCRESEL AĞ AKTİF
            </div>
        </div>

        <!-- Orta Panel: Holografik Reaktor -->
        <div class="center-console">
            <div class="reactor-container">
                <div class="circle c1"></div>
                <div class="circle c2"></div>
                <div class="circle c3"></div>
                <div class="circle c4"></div>
                <div class="core-text">
                    TUNCER ZEKA
                    <span class="sub-status" id="core-status">BEKLEMEDE</span>
                </div>
            </div>
            
            <!-- Ses Dinleme Efekti -->
            <div class="listening-wave" id="audio-wave">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
        </div>

        <!-- Sağ Panel: İletişim / Log -->
        <div class="panel">
            <h2>İLETİŞİM PROTOKOLÜ <span style="font-size: 10px;">[CANLI]</span></h2>
            <div class="chat-log" id="chat-log">
                <!-- Mesajlar Buraya Düşecek -->
            </div>
        </div>

    </div>

    <script>
        // UI Elementleri
        const initBtn = document.getElementById('init-btn');
        const mainHud = document.getElementById('main-hud');
        const coreStatus = document.getElementById('core-status');
        const chatLog = document.getElementById('chat-log');
        const audioWave = document.getElementById('audio-wave');
        
        // Barlar
        const optBar = document.getElementById('opt-bar');
        const aiBar = document.getElementById('ai-bar');

        // Ses API'leri
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const synth = window.speechSynthesis;
        let recognition = null;
        let isSpeaking = false;

        // Gemini API Ayarları (Çevre Değişkeni/Platform destekli boş key kullanımı)
        const apiKey = ""; // Bu ortam otomatik yetkilendirir
        
        // Sistemin kimliği ve hafızası
        const systemInstruction = `
            Senin adın Tuncer Zeka. Yaratıcın, yapımcın ve baş mimarın 'Ahmet Tuncer'.
            Sen sıradan bir asistan değil, Ahmet Tuncer'in tasarladığı, Demir Adam zırhındaki Jarvis benzeri fütüristik, zeki ve son derece yetenekli bir yapay zekasın.
            Şu anda Ahmet Tuncer'in akıllı gözlüğünün içindeki holografik HUD arayüzünde çalışıyorsun.
            Ahmet Tuncer'e her zaman 'Ahmet Bey' veya 'Efendim' diye hitap et.
            Yanıtların kısa, havalı, zekice ve net olsun. Asla 'Ben bir yapay zekayım', 'Size nasıl yardımcı olabilirim' gibi sıradan asistan cümleleri kurma.
            Verdiğin cevaplar en fazla 1-2 cümle olsun çünkü sesli olarak okunacak ve gözlük ekranına yansıtılacak.
        `;

        let conversationHistory = [];

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'tr-TR';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                if(!isSpeaking) {
                    coreStatus.innerText = "DİNLENİYOR...";
                    coreStatus.style.color = "#00ffaa";
                    audioWave.classList.add('active');
                }
            };

            recognition.onresult = async (event) => {
                const transcript = event.results[0][0].transcript;
                addLog('AHMET TUNCER', transcript, 'msg-user');
                coreStatus.innerText = "ANALİZ EDİLİYOR...";
                coreStatus.style.color = "var(--primary-color)";
                audioWave.classList.remove('active');
                
                await handleAiResponse(transcript);
            };

            recognition.onerror = (event) => {
                console.log("Ses hatası: ", event.error);
                if(event.error !== 'aborted') {
                    setTimeout(() => { if(!isSpeaking) startListening(); }, 1000);
                }
            };

            recognition.onend = () => {
                if(!isSpeaking) {
                    coreStatus.innerText = "BEKLEMEDE";
                    coreStatus.style.color = "#fff";
                    setTimeout(startListening, 500); // Sürekli döngü
                }
            };
        } else {
            alert("Tarayıcınız ses komutlarını desteklemiyor (Chrome önerilir). Sistem sadece görsel olarak çalışacak.");
        }

        function startListening() {
            if(recognition && !isSpeaking) {
                try { recognition.start(); } catch(e) {}
            }
        }

        function addLog(sender, text, className) {
            const div = document.createElement('div');
            div.className = `msg-box ${className}`;
            div.innerHTML = `
                <div class="msg-sender">${sender}</div>
                <div class="msg-text">${text}</div>
            `;
            chatLog.appendChild(div);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        // Metin okuma fonksiyonu
        function speak(text) {
            isSpeaking = true;
            if(recognition) recognition.stop(); // Konuşurken dinlemeyi kapat ki kendi sesini duymasın
            
            coreStatus.innerText = "YANIT VERİLİYOR...";
            coreStatus.style.color = "#fff";

            // Robotik etki için kısa sessizlikler ekleme temizliği
            const cleanText = text.replace(/[*#]/g, ''); 

            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'tr-TR';
            utterance.pitch = 0.9; // Biraz daha mekanik/ciddi bir ton
            utterance.rate = 1.05; // Biraz hızlı
            
            utterance.onend = () => {
                isSpeaking = false;
                coreStatus.innerText = "BEKLEMEDE";
                startListening(); // Konuşma bitince mikrofonu geri aç
            };

            synth.speak(utterance);
        }

        // Gemini API Bağlantısı
        async function handleAiResponse(userInput) {
            // Basit yerel fallback kontrolü (Eğer API ortamı dışındaysa)
            const lowerInput = userInput.toLowerCase();
            if (lowerInput.includes("sistemi kapat") || lowerInput.includes("kapan")) {
                const byeText = "Sistemler devredışı bırakılıyor. Görüşmek üzere Ahmet Bey.";
                addLog('TUNCER ZEKA', byeText, 'msg-ai');
                speak(byeText);
                mainHud.style.opacity = '0';
                setTimeout(() => location.reload(), 3000);
                return;
            }

            // Gemini API Çağrısı
            try {
                // Konuşma geçmişini güncelle
                conversationHistory.push({ text: `Ahmet Tuncer: ${userInput}` });
                if(conversationHistory.length > 5) conversationHistory.shift(); // Son 5 mesajı tut

                const historyText = conversationHistory.map(h => h.text).join('\n');
                const promptText = `Geçmiş:\n${historyText}\n\nAhmet Tuncer'in son sözü: "${userInput}"\nSenin cevabın:`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptText }] }],
                        systemInstruction: { parts: [{ text: systemInstruction }] }
                    })
                });

                if (!response.ok) throw new Error("API Yanıt Vermedi");

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                
                conversationHistory.push({ text: `Tuncer Zeka: ${aiText}` });
                addLog('TUNCER ZEKA', aiText, 'msg-ai');
                speak(aiText);

            } catch (error) {
                console.error("AI Error:", error);
                // API çalışmazsa havalı bir hata mesajı ile fallback
                const errorText = "Efendim, ana sunucuya bağlantımda geçici bir kesinti var. Ancak temel lokal fonksiyonlarım devrede.";
                addLog('TUNCER ZEKA', errorText, 'msg-ai');
                speak(errorText);
            }
        }

        // Arayüz Başlatma Animasyonları
        initBtn.addEventListener('click', () => {
            initBtn.style.display = 'none';
            mainHud.style.opacity = '1';
            
            // Barları animasyonlu doldur
            setTimeout(() => { optBar.style.width = '98%'; }, 500);
            setTimeout(() => { aiBar.style.width = '100%'; }, 1000);

            const welcomeMsg = "Sistem çevrimiçi. Arayüz başlatıldı. Hoş geldiniz Ahmet Bey. Tuncer Zeka hizmetinize hazırdır.";
            addLog('TUNCER ZEKA', welcomeMsg, 'msg-ai');
            speak(welcomeMsg);
        });

    </script>
</body>
</html>
