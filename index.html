<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNCER HOLO - MULTI-TOUCH AR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.7.0/build/index.module.js",
                "three-bvh-csg": "https://unpkg.com/three-bvh-csg@0.0.16/build/index.module.js"
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Share Tech Mono', monospace; color: #0ff; touch-action: none; }
        #video-background { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: 1; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10; pointer-events: none; }
        .hud-panel { pointer-events: auto; background: rgba(0, 20, 30, 0.8); border: 1px solid #0ff; backdrop-filter: blur(5px); }
        .btn-holo { background: rgba(0, 255, 255, 0.1); border: 1px solid #0ff; color: #0ff; font-size: 10px; }
        .btn-holo:active { background: #0ff; color: #000; }
    </style>
</head>
<body>

    <video id="video-background" autoplay playsinline muted></video>
    <div id="canvas-container"></div>

    <div class="absolute inset-0 z-20 pointer-events-none flex flex-col justify-between p-4">
        <div class="flex justify-between items-start">
            <div class="hud-panel p-2 rounded text-xs">
                <div class="font-bold text-white mb-1">HOLO MULTI-HAND v2.6</div>
                <div id="sys-status" class="text-green-400">DÜNYA: SABİT</div>
                <div id="depth-val" class="text-[9px]">DERİNLİK: 1.2m</div>
            </div>
            <div class="hud-panel p-2 rounded text-center">
                <div class="text-[9px] text-gray-400 uppercase font-bold">ETKİLEŞİM</div>
                <div id="interaction-status" class="text-xs text-cyan-400">BEKLENİYOR</div>
            </div>
        </div>

        <div class="flex justify-between items-end gap-2">
            <div id="log-console" class="hud-panel p-2 rounded h-20 w-1/2 overflow-hidden flex flex-col justify-end text-[8px] text-cyan-600">
                <div>> Çoklu el modu aktif.</div>
            </div>
            <div class="hud-panel p-2 rounded grid grid-cols-2 gap-1 w-1/2">
                <button id="btn-cube" class="btn-holo p-2 rounded">KÜP</button>
                <button id="btn-hole" class="btn-holo p-2 rounded border-red-500">DELİK</button>
                <button id="btn-merge" class="btn-holo p-2 rounded border-yellow-500 col-span-2 text-[8px]">BİRLEŞTİR (CSG)</button>
            </div>
        </div>
    </div>

<script type="module">
import * as THREE from 'three';
import { SUBTRACTION, Brush, Evaluator } from 'three-bvh-csg';

const video = document.getElementById('video-background');
const depthLabel = document.getElementById('depth-val');
const interactStatus = document.getElementById('interaction-status');

let scene, camera, renderer, hands;
let worldGroup, handCursor;
let objects = [], holeObjects = [], selectedObject = null;

let isPinching = false;
let initialHandScale = 1;
let currentDepth = 1.2;

let velocity = new THREE.Vector3(0, 0, 0);
let lastUpdate = performance.now();
let initialAlpha = null;

// Multi-hand states
let initialPinchDist = 0;
let initialPinchRotation = 0;
let initialObjectScale = new THREE.Vector3();
let initialObjectRotation = new THREE.Euler();

async function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    worldGroup = new THREE.Group();
    scene.add(worldGroup);

    scene.add(new THREE.AmbientLight(0xffffff, 2));
    handCursor = new THREE.Mesh(new THREE.SphereGeometry(0.02, 16, 16), new THREE.MeshBasicMaterial({ color: 0x00ffff }));
    scene.add(handCursor);

    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    video.srcObject = stream;
    
    hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });
    hands.onResults(onResults);
    
    const cameraLoop = async () => { if(!video.paused) await hands.send({image: video}); requestAnimationFrame(cameraLoop); };
    cameraLoop();
    
    initSensors();
    animate();
}

function onResults(results) {
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const h1 = results.multiHandLandmarks[0];
        const index1 = h1[8], thumb1 = h1[4], wrist1 = h1[0];
        
        const mouse = new THREE.Vector2((index1.x * 2) - 1, -(index1.y * 2) + 1);
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);

        const handScale = Math.hypot(index1.x - wrist1.x, index1.y - wrist1.y);
        const pinchDist1 = Math.hypot(index1.x - thumb1.x, index1.y - thumb1.y);

        // İKİ EL MODU (Döndürme ve Büyütme)
        if (results.multiHandLandmarks.length > 1 && selectedObject) {
            interactStatus.textContent = "TRANSFORM";
            const h2 = results.multiHandLandmarks[1];
            const index2 = h2[8];
            
            const currentPinchDist = Math.hypot(index1.x - index2.x, index1.y - index2.y);
            const currentPinchRotation = Math.atan2(index2.y - index1.y, index2.x - index1.x);

            if (initialPinchDist === 0) {
                initialPinchDist = currentPinchDist;
                initialPinchRotation = currentPinchRotation;
                initialObjectScale.copy(selectedObject.scale);
                initialObjectRotation.copy(selectedObject.rotation);
            } else {
                // Büyütme (Scale)
                const scaleFactor = currentPinchDist / initialPinchDist;
                selectedObject.scale.copy(initialObjectScale).multiplyScalar(scaleFactor);
                
                // Döndürme (Rotation Y)
                const rotDelta = currentPinchRotation - initialPinchRotation;
                selectedObject.rotation.y = initialObjectRotation.y - rotDelta * 2;
            }
        } 
        // TEK EL MODU (Taşıma ve Derinlik)
        else {
            initialPinchDist = 0; // Reset multi-hand states
            if (pinchDist1 < 0.05) {
                interactStatus.textContent = "TAŞIMA";
                if (!isPinching) {
                    isPinching = true;
                    initialHandScale = handScale;
                    startGrab(raycaster);
                } else {
                    const ratio = handScale / initialHandScale;
                    if(Math.abs(1 - ratio) > 0.02) {
                        currentDepth = THREE.MathUtils.clamp(currentDepth / ratio, 0.4, 4.0);
                        initialHandScale = handScale;
                    }
                    updateGrab();
                }
            } else {
                interactStatus.textContent = "BOŞTA";
                isPinching = false;
                selectedObject = null;
            }
        }

        raycaster.ray.at(currentDepth, handCursor.position);
        depthLabel.textContent = `DERİNLİK: ${currentDepth.toFixed(2)}m`;
    }
}

function startGrab(ray) {
    const hits = ray.intersectObjects([...objects, ...holeObjects]);
    if (hits.length > 0) {
        selectedObject = hits[0].object;
        selectedObject._startPos = selectedObject.position.clone();
        selectedObject._handStart = handCursor.position.clone();
    }
}

function updateGrab() {
    if (selectedObject) {
        const delta = new THREE.Vector3().subVectors(handCursor.position, selectedObject._handStart);
        selectedObject.position.copy(selectedObject._startPos).add(delta);
    }
}

function initSensors() {
    const start = () => {
        window.addEventListener('deviceorientation', (e) => {
            if (initialAlpha === null) initialAlpha = e.alpha;
            camera.rotation.set(THREE.MathUtils.degToRad(e.beta), THREE.MathUtils.degToRad(e.alpha - initialAlpha), THREE.MathUtils.degToRad(-e.gamma), 'YXZ');
        });

        window.addEventListener('devicemotion', (e) => {
            const acc = e.acceleration;
            if(!acc.x) return;
            const dt = (performance.now() - lastUpdate) / 1000;
            lastUpdate = performance.now();
            velocity.x = (velocity.x + acc.x * dt) * 0.85;
            velocity.y = (velocity.y + acc.y * dt) * 0.85;
            velocity.z = (velocity.z + acc.z * dt) * 0.85;
            const move = velocity.clone().multiplyScalar(dt);
            move.applyQuaternion(camera.quaternion);
            camera.position.sub(move);
        });
    };

    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        const b = document.createElement('button');
        b.className = "fixed inset-0 z-[100] bg-black text-cyan-400 font-bold text-xl";
        b.textContent = "BAŞLATMAK İÇİN DOKUN";
        b.onclick = () => { DeviceOrientationEvent.requestPermission().then(r => { if(r=='granted'){start(); b.remove();} }); };
        document.body.appendChild(b);
    } else start();
}

function addObj(isHole) {
    const m = new THREE.Mesh(
        new THREE.BoxGeometry(0.3, 0.3, 0.3),
        new THREE.MeshStandardMaterial({ color: isHole ? 0xff0000 : 0x00aaff, transparent: true, opacity: 0.8 })
    );
    const fw = new THREE.Vector3(0, 0, -currentDepth).applyQuaternion(camera.quaternion);
    m.position.copy(camera.position).add(fw);
    worldGroup.add(m);
    if(isHole) holeObjects.push(m); else objects.push(m);
}

function merge() {
    if (objects.length === 0 || holeObjects.length === 0) return;
    const ev = new Evaluator();
    let base = objects[objects.length - 1];
    let bB = new Brush(base.geometry, base.material);
    bB.position.copy(base.position); bB.rotation.copy(base.rotation); bB.scale.copy(base.scale); bB.updateMatrixWorld();
    holeObjects.forEach(h => {
        const hB = new Brush(h.geometry, h.material);
        hB.position.copy(h.position); hB.rotation.copy(h.rotation); hB.scale.copy(h.scale); hB.updateMatrixWorld();
        bB = ev.evaluate(bB, hB, SUBTRACTION);
        worldGroup.remove(h);
    });
    worldGroup.remove(base);
    const res = new THREE.Mesh(bB.geometry, bB.material);
    res.position.copy(bB.position); res.rotation.copy(bB.rotation); res.scale.copy(bB.scale);
    worldGroup.add(res);
    objects = [res]; holeObjects = [];
}

function animate() { renderer.render(scene, camera); requestAnimationFrame(animate); }

document.getElementById('btn-cube').onclick = () => addObj(false);
document.getElementById('btn-hole').onclick = () => addObj(true);
document.getElementById('btn-merge').onclick = merge;

init();
</script>
</body>
</html>
