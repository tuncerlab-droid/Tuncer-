<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuncerLab Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;400;600&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #0a0f16; color: white; min-height: 100vh; }
        .glass { background: rgba(20, 25, 35, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(0, 229, 255, 0.1); border-radius: 20px; }
        .view-section { display: none; opacity: 0; }
        .view-section.active { display: block; opacity: 1; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); transition: bottom 0.4s; z-index: 100; }
        #toast.show { bottom: 20px; }
    </style>
</head>
<body class="p-4">

    <div id="toast" class="glass px-6 py-3 font-bold shadow-2xl"></div>

    <nav class="glass max-w-5xl mx-auto p-4 flex justify-between items-center mb-8 sticky top-4 z-50">
        <h1 class="font-bold text-xl tracking-tighter cursor-pointer" style="font-family:'Orbitron'" onclick="switchView('shop')">TUNCERLAB.</h1>
        <div class="flex gap-4 text-xs font-bold">
            <button onclick="switchView('shop')">MAĞAZA</button>
            <button onclick="switchView('track')">TAKİP</button>
            <button onclick="switchView('cart')" class="text-cyan-400">SEPET (<span id="cart-count">0</span>)</button>
            <button onclick="openAdmin()" class="text-red-500">ADMİN</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto">
        <!-- Mağaza -->
        <section id="view-shop" class="view-section active">
            <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </section>

        <!-- Takip -->
        <section id="view-track" class="view-section">
            <div class="glass p-8 max-w-lg mx-auto text-center">
                <h2 class="text-2xl font-bold mb-4">Sipariş Takibi</h2>
                <input type="email" id="track-email" placeholder="Gmail adresiniz" class="w-full bg-black/50 border border-white/10 rounded-xl p-3 mb-4 outline-none focus:border-cyan-400">
                <button onclick="trackOrder()" class="w-full bg-cyan-500 text-black font-bold py-3 rounded-xl">SORGULA</button>
                <div id="track-results" class="mt-6 space-y-4 text-left"></div>
            </div>
        </section>

        <!-- Sepet -->
        <section id="view-cart" class="view-section">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div id="cart-list" class="space-y-4"></div>
                <div class="glass p-6">
                    <h2 class="text-xl font-bold mb-4 text-cyan-400">Siparişi Tamamla</h2>
                    <form onsubmit="submitOrder(event)" class="space-y-3">
                        <input type="text" id="c-name" placeholder="Ad Soyad" required class="w-full bg-black/40 border border-white/10 p-3 rounded-xl outline-none">
                        <input type="email" id="c-email" placeholder="Gmail" required class="w-full bg-black/40 border border-white/10 p-3 rounded-xl outline-none">
                        <textarea id="c-addr" placeholder="Adres" required class="w-full bg-black/40 border border-white/10 p-3 rounded-xl outline-none"></textarea>
                        <div class="p-3 bg-cyan-500/10 rounded-xl border border-cyan-500/20 text-center font-bold text-cyan-400">
                            Toplam: <span id="cart-total">0 TL</span>
                        </div>
                        <button type="submit" class="w-full bg-cyan-500 text-black font-bold py-4 rounded-xl mt-2">SİPARİŞİ ONAYLA</button>
                    </form>
                </div>
            </div>
        </section>

        <!-- Admin -->
        <section id="view-admin" class="view-section">
            <div class="glass p-6 overflow-x-auto">
                <h2 class="text-2xl font-bold mb-6 text-red-500">Yönetim Paneli</h2>
                <table class="w-full text-left">
                    <thead><tr class="text-gray-500 text-xs border-b border-white/10"><th class="pb-2">ID</th><th class="pb-2">MÜŞTERİ</th><th class="pb-2">DURUM</th><th class="pb-2">İŞLEM</th></tr></thead>
                    <tbody id="admin-order-list"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        // ÖNEMLİ: URL'yi otomatik belirle (Render HTTPS uyumu için)
        const API_URL = window.location.origin + "/api";
        let products = [];
        let cart = [];

        async function fetchProducts() {
            try {
                // cache: "no-cache" ekleyerek güncel veriyi zorla çekiyoruz
                const res = await fetch(`${API_URL}/products`, { cache: "no-cache" });
                if(!res.ok) throw new Error();
                products = await res.json();
                renderProducts();
            } catch (e) {
                showToast("Sunucuya bağlanılamadı!", true);
            }
        }

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div class="glass p-4 flex flex-col hover:border-cyan-500/50 transition">
                    <img src="${p.image}" class="h-40 w-full object-cover rounded-lg mb-3">
                    <h3 class="font-bold text-sm">${p.name}</h3>
                    <p class="text-cyan-400 font-bold mt-1">${p.price} TL</p>
                    <button onclick="addToCart(${p.id})" class="mt-4 bg-white/5 hover:bg-cyan-500 hover:text-black py-2 rounded-lg text-xs font-bold transition">SEPETE EKLE</button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            cart.push(products.find(x => x.id === id));
            document.getElementById('cart-count').innerText = cart.length;
            showToast("Ürün sepete eklendi.");
        }

        function switchView(view) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById('view-' + view).classList.add('active');
            if(view === 'cart') renderCart();
            if(view === 'admin') loadAdmin();
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            let total = 0;
            list.innerHTML = cart.map((item, i) => {
                total += item.price;
                return `<div class="glass p-3 flex justify-between items-center text-sm"><span>${item.name}</span><b>${item.price} TL</b></div>`;
            }).join('');
            if(cart.length === 0) list.innerHTML = '<div class="text-center py-10 text-gray-500">Sepetiniz boş.</div>';
            document.getElementById('cart-total').innerText = total + " TL";
        }

        async function submitOrder(e) {
            e.preventDefault();
            if(cart.length === 0) return showToast("Sepet boş!", true);
            const data = {
                name: document.getElementById('c-name').value,
                email: document.getElementById('c-email').value,
                address: document.getElementById('c-addr').value,
                items: cart,
                total: cart.reduce((s,i) => s + i.price, 0)
            };
            const res = await fetch(`${API_URL}/orders`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await res.json();
            if(result.success) {
                showToast("Sipariş alındı! Kod: " + result.orderId);
                cart = [];
                document.getElementById('cart-count').innerText = "0";
                e.target.reset();
                switchView('track');
            }
        }

        async function trackOrder() {
            const email = document.getElementById('track-email').value;
            const res = await fetch(`${API_URL}/orders/track/${email}`);
            const data = await res.json();
            const resDiv = document.getElementById('track-results');
            if(data.length === 0) resDiv.innerHTML = '<p class="text-red-400">Sipariş bulunamadı.</p>';
            else resDiv.innerHTML = data.map(o => `
                <div class="glass p-4 border-l-4 border-cyan-500">
                    <div class="text-[10px] text-gray-500">${o.id}</div>
                    <div class="font-bold">${o.status}</div>
                    <div class="text-xs text-cyan-400">${o.total} TL</div>
                </div>
            `).join('');
        }

        function openAdmin() {
            const p = prompt("Admin Şifresi:");
            if(p === "175017") switchView('admin');
        }

        async function loadAdmin() {
            const res = await fetch(`${API_URL}/admin/orders`);
            const data = await res.json();
            document.getElementById('admin-order-list').innerHTML = data.map(o => `
                <tr class="border-b border-white/5 text-xs">
                    <td class="py-3 font-mono">${o.id}</td>
                    <td>${o.name}</td>
                    <td class="text-cyan-400 font-bold">${o.status}</td>
                    <td><button onclick="updateStatus('${o.id}')" class="bg-white/10 p-1 rounded">Güncelle</button></td>
                </tr>
            `).join('');
        }

        async function updateStatus(id) {
            const s = prompt("Yeni Durum (Hazırlanıyor / Kargoda / Teslim Edildi):");
            if(!s) return;
            await fetch(`${API_URL}/admin/orders/${id}/status`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({status: s})
            });
            loadAdmin();
        }

        function showToast(msg, isErr) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.background = isErr ? "red" : "#00e5ff";
            t.style.color = isErr ? "white" : "black";
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        window.onload = fetchProducts;
    </script>
</body>
</html>
