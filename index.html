<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tuncer AR Core v5.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        .input_video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
        #ui-overlay { position: absolute; top: 20px; right: 20px; z-index: 10; pointer-events: none; }
        
        #calibration-btn {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 100; background: rgba(0, 229, 255, 0.9); color: #000;
            font-weight: 900; padding: 20px 40px; border-radius: 50px;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.5);
        }
    </style>
</head>
<body>

    <button id="calibration-btn" onclick="initSystem()">SİSTEMİ BAŞLAT (AR)</button>

    <video class="input_video" autoplay playsinline></video>
    <div id="canvas-container"></div>

    <div id="ui-overlay">
        <div class="bg-black/60 backdrop-blur-md p-4 rounded-xl border border-cyan-500/30 text-[11px] font-mono text-cyan-400">
            TUNCER MARK-V [LIVE]<br>
            POS_X: <span id="pos-x">0.00</span><br>
            POS_Y: <span id="pos-y">0.00</span><br>
            POS_Z: <span id="pos-z">0.00</span><br>
            VOICE: <span id="voice-status" class="text-red-500">BEKLİYOR</span>
        </div>
    </div>

    <script>
        let scene, camera, renderer, worldGroup, hands, videoElement;
        let objects = [];
        let selectedObject = null;
        let isPinching = false;
        let cursor;

        function initSystem() {
            document.getElementById('calibration-btn').style.display = 'none';
            
            // Sensör İzinleri (iOS ve bazı Androidler için)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(res => {
                    if (res === 'granted') startAR();
                });
            } else {
                startAR();
            }
        }

        function startAR() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            worldGroup = new THREE.Group();
            scene.add(worldGroup);

            // Işıklar
            scene.add(new THREE.AmbientLight(0xffffff, 1));
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 10, 7);
            scene.add(light);

            // Cursor
            cursor = new THREE.Mesh(
                new THREE.RingGeometry(0.04, 0.05, 32),
                new THREE.MeshBasicMaterial({ color: 0x00e5ff, side: THREE.DoubleSide })
            );
            scene.add(cursor);

            // Gyro Sync
            window.addEventListener('deviceorientation', (e) => {
                if (!e.alpha) return;
                const alpha = THREE.MathUtils.degToRad(e.alpha);
                const beta = THREE.MathUtils.degToRad(e.beta);
                const gamma = THREE.MathUtils.degToRad(e.gamma);
                camera.quaternion.setFromEuler(new THREE.Euler(beta, alpha, -gamma, 'YXZ'));
            }, true);

            initHandTracking();
            initVoiceControl();
            animate();
        }

        function initHandTracking() {
            videoElement = document.querySelector('.input_video');
            hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });
            
            hands.onResults(results => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const lms = results.multiHandLandmarks[0];
                    const index = lms[8];
                    const thumb = lms[4];

                    // 3D Pointing
                    const vector = new THREE.Vector3((index.x - 0.5) * 2, -(index.y - 0.5) * 2, 0.5);
                    vector.unproject(camera);
                    const dir = vector.sub(camera.position).normalize();
                    cursor.position.copy(camera.position).add(dir.multiplyScalar(2.5));
                    cursor.lookAt(camera.position);

                    document.getElementById('pos-x').innerText = cursor.position.x.toFixed(2);
                    document.getElementById('pos-y').innerText = cursor.position.y.toFixed(2);
                    document.getElementById('pos-z').innerText = cursor.position.z.toFixed(2);

                    // Pinch logic
                    const d = Math.hypot(index.x - thumb.x, index.y - thumb.y);
                    if (d < 0.05) {
                        if (!isPinching) {
                            isPinching = true;
                            cursor.material.color.setHex(0xff0000);
                            const ray = new THREE.Raycaster();
                            ray.setFromCamera(new THREE.Vector2(-(index.x - 0.5) * 2, -(index.y - 0.5) * 2), camera);
                            const hits = ray.intersectObjects(objects);
                            if (hits.length > 0) selectedObject = hits[0].object;
                        } else if (selectedObject) {
                            selectedObject.position.lerp(cursor.position, 0.3);
                        }
                    } else {
                        isPinching = false;
                        cursor.material.color.setHex(0x00e5ff);
                    }
                }
            });

            const cam = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 1280, height: 720, facingMode: 'environment' // Arka Kamera
            });
            cam.start();
        }

        function initVoiceControl() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return;
            const rec = new SpeechRecognition();
            rec.lang = 'tr-TR';
            rec.continuous = true;

            rec.onstart = () => document.getElementById('voice-status').innerText = "AKTİF";
            rec.onresult = (e) => {
                const cmd = e.results[e.results.length - 1][0].transcript.toLowerCase();
                if (cmd.includes("küp")) addShape('cube');
                if (cmd.includes("küre")) addShape('sphere');
                if (cmd.includes("sil")) {
                    if (selectedObject) {
                        worldGroup.remove(selectedObject);
                        objects.splice(objects.indexOf(selectedObject), 1);
                        selectedObject = null;
                    }
                }
                if (cmd.includes("büyüt") && selectedObject) selectedObject.scale.multiplyScalar(1.5);
                if (cmd.includes("küçült") && selectedObject) selectedObject.scale.multiplyScalar(0.7);
            };
            rec.onend = () => rec.start();
            rec.start();
        }

        function addShape(type) {
            const geo = type === 'cube' ? new THREE.BoxGeometry(0.4, 0.4, 0.4) : new THREE.SphereGeometry(0.25, 32, 32);
            const mat = new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff, metalness: 0.7, roughness: 0.2 });
            const mesh = new THREE.Mesh(geo, mat);
            
            const spawnPos = new THREE.Vector3(0, 0, -2);
            spawnPos.applyQuaternion(camera.quaternion).add(camera.position);
            mesh.position.copy(spawnPos);
            
            worldGroup.add(mesh);
            objects.push(mesh);
            selectedObject = mesh;
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
