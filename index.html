<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tuncer AR v37.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #ui-overlay { 
            position: absolute; inset: 0; pointer-events: none; z-index: 10; 
            display: flex; flex-direction: column; justify-content: space-between; padding: 25px; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        .hud-container {
            align-self: flex-end;
            background: rgba(10, 25, 41, 0.85);
            border-left: 3px solid #00e5ff;
            border-radius: 8px;
            padding: 15px;
            min-width: 180px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .hud-line { color: #00e5ff; font-size: 11px; font-weight: 800; letter-spacing: 1px; margin-bottom: 4px; }
        .hud-value { color: #ffffff; float: right; font-weight: 400; }
        #start-screen { 
            position: fixed; inset: 0; background: #0a0a0a; z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        #btn-go { 
            background: linear-gradient(135deg, #00e5ff, #0099ff); color: #000; 
            font-weight: 900; padding: 20px 60px; border-radius: 50px; border: none; 
            cursor: pointer; font-size: 16px; box-shadow: 0 0 40px rgba(0, 229, 255, 0.3); 
            pointer-events: auto; text-transform: uppercase; letter-spacing: 2px;
        }
        #status-pill {
            align-self: center; margin-bottom: 40px;
            background: rgba(0, 229, 255, 0.1); border: 1px solid rgba(0, 229, 255, 0.5);
            padding: 8px 24px; border-radius: 100px; color: #00e5ff;
            font-size: 11px; font-weight: 700; text-transform: uppercase;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js"
            }
        }
    </script>
</head>
<body>

    <div id="start-screen">
        <h1 style="color:#00e5ff; font-size: 24px; font-weight: 900; letter-spacing: 5px; margin-bottom:10px;">TUNCER <span style="font-weight:300;">MARK-III</span></h1>
        <div style="width:40px; height:2px; background:#00e5ff; margin-bottom:50px;"></div>
        <button id="btn-go">SİSTEMİ BAŞLAT</button>
    </div>

    <div id="ui-overlay" style="display: none;">
        <div class="hud-container">
            <div class="hud-line">DURUM <span class="hud-value" id="status-text">AKTİF</span></div>
            <div class="hud-line">EL_TAKİP <span class="hud-value" id="hand-text" style="color:#ff3366;">ARANIYOR</span></div>
            <div class="hud-line">ETKİLEŞİM <span class="hud-value" id="pinch-text">BOŞTA</span></div>
        </div>
        <div id="status-pill">YÜZEY TARANIYOR...</div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, reticle;
        let hitTestSource = null, hitTestSourceRequested = false;
        let handCursor, cursorRing, cursorDot;
        let objects = [], selectedObject = null;
        let isPinching = false;
        let lastHandUpdate = 0;

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const lm = results.multiHandLandmarks[0];
                const index = lm[8];
                const thumb = lm[4];

                document.getElementById('hand-text').innerText = "KİLİTLENDİ";
                document.getElementById('hand-text').style.color = "#00ffcc";

                // Coordinate conversion
                const vector = new THREE.Vector3((1 - index.x) * 2 - 1, -index.y * 2 + 1, 0.5);
                vector.unproject(camera);
                const dir = vector.sub(camera.position).normalize();
                const pos = camera.position.clone().add(dir.multiplyScalar(0.35));
                
                handCursor.visible = true;
                handCursor.position.copy(pos);
                handCursor.lookAt(camera.position);

                const dist = Math.hypot(index.x - thumb.x, index.y - thumb.y);
                if (dist < 0.055) {
                    document.getElementById('pinch-text').innerText = "TUTUYOR";
                    cursorRing.material.color.setHex(0x00ffcc);
                    cursorRing.scale.set(0.75, 0.75, 0.75);
                    if (!isPinching) {
                        isPinching = true;
                        objects.forEach(obj => { if(obj.position.distanceTo(pos) < 0.12) selectedObject = obj; });
                    }
                    if (selectedObject) selectedObject.position.lerp(pos, 0.25);
                } else {
                    isPinching = false; selectedObject = null;
                    document.getElementById('pinch-text').innerText = "BOŞTA";
                    cursorRing.material.color.setHex(0xff3366);
                    cursorRing.scale.set(1, 1, 1);
                }
            } else {
                handCursor.visible = false;
                document.getElementById('hand-text').innerText = "ARANIYOR";
                document.getElementById('hand-text').style.color = "#ff3366";
            }
        });

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.5));

            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.03, 0.04, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x00e5ff })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            // MARK-III CURSOR
            handCursor = new THREE.Group();
            cursorDot = new THREE.Mesh(new THREE.SphereGeometry(0.005, 12, 12), new THREE.MeshBasicMaterial({ color: 0x00e5ff }));
            cursorRing = new THREE.Mesh(new THREE.RingGeometry(0.013, 0.016, 32), new THREE.MeshBasicMaterial({ color: 0xff3366, side: THREE.DoubleSide }));
            handCursor.add(cursorDot, cursorRing);
            handCursor.visible = false;
            scene.add(handCursor);

            document.getElementById('btn-go').addEventListener('click', async () => {
                const session = await navigator.xr.requestSession('immersive-ar', {
                    requiredFeatures: ['hit-test'],
                    optionalFeatures: ['dom-overlay'],
                    domOverlay: { root: document.getElementById('ui-overlay') }
                });
                renderer.xr.setSession(session);
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('ui-overlay').style.display = 'flex';
                renderer.setAnimationLoop(render);
            });
        }

        window.addEventListener('pointerdown', (e) => {
            if (reticle.visible && e.target.id !== 'btn-go') {
                const cube = new THREE.Mesh(
                    new THREE.BoxGeometry(0.1, 0.1, 0.1),
                    new THREE.MeshStandardMaterial({ color: 0x0088aa, transparent: true, opacity: 0.6 })
                );
                cube.position.setFromMatrixPosition(reticle.matrix);
                scene.add(cube);
                objects.push(cube);
            }
        });

        function render(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                // ÇAKIŞMAYI ÖNLEYEN KRİTİK NOKTA:
                // Ayrı video açmak yerine, o anki render'ı (canvası) MediaPipe'a gönder
                if (timestamp - lastHandUpdate > 40) { 
                    hands.send({ image: renderer.domElement });
                    lastHandUpdate = timestamp;
                }

                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then(s => {
                        session.requestHitTestSource({ space: s }).then(src => hitTestSource = src);
                    });
                    hitTestSourceRequested = true;
                }
                if (hitTestSource) {
                    const results = frame.getHitTestResults(hitTestSource);
                    if (results.length > 0) {
                        reticle.visible = true;
                        reticle.matrix.fromArray(results[0].getPose(referenceSpace).transform.matrix);
                        document.getElementById('status-pill').innerText = "ZEMİN HAZIR - DOKUN";
                    } else {
                        reticle.visible = false;
                        document.getElementById('status-pill').innerText = "YÜZEY TARANIYOR...";
                    }
                }
            }
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
