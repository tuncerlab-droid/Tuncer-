<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tuncer AR v26.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            background: transparent !important; 
        }
        #ui-overlay { 
            position: absolute; inset: 0; pointer-events: none; z-index: 10; 
            display: flex; flex-direction: column; justify-content: space-between; padding: 20px; 
        }
        .hud { 
            background: rgba(0, 20, 40, 0.85); border-left: 3px solid #00e5ff; 
            padding: 12px; border-radius: 8px; color: #00e5ff; font-family: monospace; 
            font-size: 11px; align-self: flex-end; backdrop-filter: blur(10px);
        }
        #start-screen { 
            position: fixed; inset: 0; background: #000; z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: white; font-family: monospace;
        }
        #btn-go { 
            background: #00e5ff; color: #000; font-weight: 900; padding: 15px 40px; 
            border-radius: 8px; border: none; cursor: pointer; font-size: 16px; 
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.4); pointer-events: auto;
        }
        #status-hint { 
            align-self: center; margin-bottom: 50px; background: rgba(0, 229, 255, 0.2); 
            padding: 10px 20px; border-radius: 30px; color: #00e5ff; border: 1px solid #00e5ff;
            font-size: 12px; font-family: monospace; animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        canvas { 
            display: block; position: absolute; top: 0; left: 0; z-index: 1;
            background: transparent !important;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="start-screen">
        <h1 style="color:#00e5ff; font-size: 24px; font-weight: 900; margin-bottom:10px;">TUNCER CORE v26.5</h1>
        <p style="color:#666; margin-bottom:30px; font-size:10px;">SİSTEM STABİLİZASYONU AKTİF</p>
        <button id="btn-go">SİSTEMİ BAŞLAT</button>
    </div>

    <div id="ui-overlay" style="display: none;">
        <div class="hud">
            SİSTEM: <span id="status-text" style="color:#fff;">ONLINE</span><br>
            EL_MOTORU: <span id="hand-text" style="color:#ff3366;">BEKLENİYOR</span><br>
            ETKİLEŞİM: <span id="pinch-text" style="color:#fff;">BOŞTA</span>
        </div>
        <div id="status-hint">ZEMİNİ TARAMAK İÇİN TELEFONU HAREKET ETTİRİN</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { XRHandModelFactory } from 'three/addons/webxr/XRHandModelFactory.js';

        let scene, camera, renderer, reticle;
        let hitTestSource = null, hitTestSourceRequested = false;
        let objects = [], selectedObject = null;
        let hands = [];
        let isPinching = false;
        let pinchCursor;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                alpha: true,
                premultipliedAlpha: false
            });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Daha güçlü ışıklandırma
            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            const light = new THREE.PointLight(0x00e5ff, 2, 10);
            light.position.set(0, 2, 1);
            scene.add(light);

            // Zemin Halkası (Geliştirilmiş)
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.04, 0.05, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x00e5ff, transparent: true, opacity: 1 })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            // Çimdik İmleci (Görünürlük artırıldı)
            pinchCursor = new THREE.Mesh(
                new THREE.SphereGeometry(0.015, 16, 16),
                new THREE.MeshBasicMaterial({ color: 0x00e5ff, transparent: true, opacity: 0.9 })
            );
            pinchCursor.visible = false;
            scene.add(pinchCursor);

            // El Modelleri
            const handModelFactory = new XRHandModelFactory();
            for (let i = 0; i < 2; i++) {
                const hand = renderer.xr.getHand(i);
                hand.add(handModelFactory.createHandModel(hand, "mesh"));
                scene.add(hand);
                hands.push(hand);

                hand.addEventListener('connected', () => {
                    document.getElementById('hand-text').innerText = "AKTİF";
                    document.getElementById('hand-text').style.color = "#00ffcc";
                });
            }

            document.getElementById('btn-go').addEventListener('click', async () => {
                const sessionInit = { 
                    requiredFeatures: ['hit-test'], 
                    optionalFeatures: ['dom-overlay', 'hand-tracking'], 
                    domOverlay: { root: document.getElementById('ui-overlay') } 
                };
                
                try {
                    const session = await navigator.xr.requestSession('immersive-ar', sessionInit);
                    renderer.xr.setSession(session);
                    
                    document.getElementById('start-screen').style.display = 'none';
                    document.getElementById('ui-overlay').style.display = 'flex';
                    
                    renderer.setAnimationLoop(render);
                } catch (e) {
                    alert("Kritik Hata: WebXR başlatılamadı.");
                }
            });
        }

        function createCube() {
            const geometry = new THREE.BoxGeometry(0.12, 0.12, 0.12);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0x00e5ff, 
                metalness: 0.7, 
                roughness: 0.1,
                transparent: true,
                opacity: 0.8
            });
            const cube = new THREE.Mesh(geometry, material);
            // Zemin matrisinden pozisyonu al
            cube.position.setFromMatrixPosition(reticle.matrix);
            scene.add(cube);
            objects.push(cube);
        }

        function render(timestamp, frame) {
            if (frame) {
                const session = renderer.xr.getSession();
                const referenceSpace = renderer.xr.getReferenceSpace();

                // 1. Zemin Algılama (Hit-Test)
                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then(s => {
                        session.requestHitTestSource({ space: s }).then(source => hitTestSource = source);
                    });
                    hitTestSourceRequested = true;
                }
                
                if (hitTestSource) {
                    const results = frame.getHitTestResults(hitTestSource);
                    if (results.length > 0) {
                        reticle.visible = true;
                        const pose = results[0].getPose(referenceSpace);
                        reticle.matrix.fromArray(pose.transform.matrix);
                        document.getElementById('status-hint').innerText = "ZEMİN BULUNDU - DOKUN VE EKLE";
                    } else {
                        reticle.visible = false;
                    }
                }

                // 2. El Takibi ve Çimdik (Pinch)
                let anyHandVisible = false;
                for (const hand of hands) {
                    const indexTip = hand.joints['index-finger-tip'];
                    const thumbTip = hand.joints['thumb-tip'];

                    if (indexTip && thumbTip && indexTip.matrixWorld && thumbTip.matrixWorld) {
                        anyHandVisible = true;
                        pinchCursor.visible = true;
                        
                        const iPos = new THREE.Vector3().setFromMatrixPosition(indexTip.matrixWorld);
                        const tPos = new THREE.Vector3().setFromMatrixPosition(thumbTip.matrixWorld);
                        
                        pinchCursor.position.copy(iPos);
                        
                        // Çimdik mesafesi kontrolü
                        const dist = iPos.distanceTo(tPos);
                        if (dist < 0.04) { 
                            document.getElementById('pinch-text').innerText = "TUTULUYOR";
                            document.getElementById('pinch-text').style.color = "#ff3366";
                            pinchCursor.material.color.setHex(0xff3366);
                            
                            if (!isPinching) {
                                isPinching = true;
                                // En yakın objeyi bul
                                let minDistance = Infinity;
                                objects.forEach(obj => {
                                    const d = obj.position.distanceTo(iPos);
                                    if (d < 0.2 && d < minDistance) {
                                        minDistance = d;
                                        selectedObject = obj;
                                    }
                                });
                            }
                            
                            if (selectedObject) {
                                selectedObject.position.lerp(iPos, 0.3);
                            }
                        } else {
                            isPinching = false;
                            selectedObject = null;
                            document.getElementById('pinch-text').innerText = "BOŞTA";
                            document.getElementById('pinch-text').style.color = "#fff";
                            pinchCursor.material.color.setHex(0x00e5ff);
                        }
                    }
                }
                if (!anyHandVisible) pinchCursor.visible = false;
            }
            renderer.render(scene, camera);
        }

        // Dokunma ile obje ekleme
        window.addEventListener('pointerdown', (e) => {
            // Sadece UI'a tıklanmadığında ve zemin hazırsa
            if (reticle.visible && e.target.id !== 'btn-go') {
                createCube();
            }
        });

        init();
    </script>
</body>
</html>
