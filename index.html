<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tuncer AR v31.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            background: #000; 
        }
        canvas { 
            display: block; position: absolute; top: 0; left: 0; z-index: 1;
        }
        #ui-overlay { 
            position: absolute; inset: 0; pointer-events: none; z-index: 10; 
            display: flex; flex-direction: column; justify-content: space-between; padding: 20px; 
        }
        .hud { 
            background: rgba(0, 15, 30, 0.9); border-left: 4px solid #00e5ff; 
            padding: 15px; border-radius: 10px; color: #00e5ff; font-family: monospace; 
            font-size: 12px; align-self: flex-end; backdrop-filter: blur(8px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #start-screen { 
            position: fixed; inset: 0; background: #050505; z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: white; font-family: monospace;
        }
        #btn-go { 
            background: linear-gradient(135deg, #00e5ff, #0099ff); color: #000; 
            font-weight: 900; padding: 18px 50px; border-radius: 12px; border: none; 
            cursor: pointer; font-size: 18px; box-shadow: 0 0 30px rgba(0, 229, 255, 0.4); 
            pointer-events: auto; text-transform: uppercase; letter-spacing: 2px;
        }
        #status-hint { 
            align-self: center; margin-bottom: 60px; background: rgba(0, 229, 255, 0.2); 
            padding: 10px 20px; border-radius: 25px; color: #00e5ff; border: 1px solid #00e5ff;
            font-size: 12px; font-family: monospace; font-weight: bold;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="start-screen">
        <h1 style="color:#00e5ff; font-size: 30px; font-weight: 900; margin-bottom:5px;">TUNCER MARK-III</h1>
        <p style="color:#555; margin-bottom:40px; font-size:11px; letter-spacing:1px;">NATIVE HAND TRACKING V2</p>
        <button id="btn-go">SİSTEMİ BAŞLAT</button>
    </div>

    <div id="ui-overlay" style="display: none;">
        <div class="hud">
            SİSTEM: <span id="status-text" style="color:#fff;">STABLE_XR</span><br>
            EL_MOTORU: <span id="hand-text" style="color:#ff3366;">ARANIYOR</span><br>
            ETKİLEŞİM: <span id="pinch-text" style="color:#fff;">BOŞTA</span>
        </div>
        <div id="status-hint">ZEMİNİ TARAMAK İÇİN TELEFONU GEZDİRİN</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { XRHandModelFactory } from 'three/addons/webxr/XRHandModelFactory.js';

        let scene, camera, renderer, reticle;
        let hitTestSource = null, hitTestSourceRequested = false;
        let objects = [], selectedObject = null;
        let hands = [];
        let isPinching = false;
        
        let handCursorGroup, cursorDot, cursorRing;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                alpha: true,
                stencil: false,
                depth: true
            });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.0));
            const light = new THREE.DirectionalLight(0xffffff, 1.2);
            light.position.set(2, 4, 3);
            scene.add(light);

            // Zemin Halkası
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.03, 0.04, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x00e5ff, transparent: true, opacity: 0.8 })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            // Mark-III El İşaretçisi
            handCursorGroup = new THREE.Group();
            cursorDot = new THREE.Mesh(
                new THREE.SphereGeometry(0.005, 12, 12),
                new THREE.MeshBasicMaterial({ color: 0x00e5ff })
            );
            cursorRing = new THREE.Mesh(
                new THREE.RingGeometry(0.012, 0.015, 32),
                new THREE.MeshBasicMaterial({ color: 0xff3366, side: THREE.DoubleSide })
            );
            handCursorGroup.add(cursorDot);
            handCursorGroup.add(cursorRing);
            handCursorGroup.visible = false;
            scene.add(handCursorGroup);

            // NATIVE WEBXR HAND TRACKING ENGINE
            const handModelFactory = new XRHandModelFactory();
            for (let i = 0; i < 2; i++) {
                const hand = renderer.xr.getHand(i);
                // Mesh eklemiyoruz, sadece data takibi yapıyoruz
                scene.add(hand);
                hands.push(hand);

                hand.addEventListener('connected', (event) => {
                    document.getElementById('hand-text').innerText = "BAĞLANDI";
                    document.getElementById('hand-text').style.color = "#00ffcc";
                });
                hand.addEventListener('disconnected', () => {
                    document.getElementById('hand-text').innerText = "ARANIYOR";
                    document.getElementById('hand-text').style.color = "#ff3366";
                    handCursorGroup.visible = false;
                });
            }

            document.getElementById('btn-go').addEventListener('click', async () => {
                const sessionInit = { 
                    requiredFeatures: ['hit-test', 'hand-tracking'], 
                    optionalFeatures: ['dom-overlay'], 
                    domOverlay: { root: document.getElementById('ui-overlay') } 
                };
                
                try {
                    const session = await navigator.xr.requestSession('immersive-ar', sessionInit);
                    renderer.xr.setReferenceSpaceType('local');
                    renderer.xr.setSession(session);
                    
                    document.getElementById('start-screen').style.display = 'none';
                    document.getElementById('ui-overlay').style.display = 'flex';
                    
                    renderer.setAnimationLoop(render);
                } catch (e) {
                    alert("Cihaz El Takibi Desteklemiyor: " + e.message);
                }
            });
        }

        function createCube() {
            const geometry = new THREE.BoxGeometry(0.1, 0.1, 0.1);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0x0088aa, 
                metalness: 0.8, 
                roughness: 0.2,
                transparent: true,
                opacity: 0.7
            });
            const cube = new THREE.Mesh(geometry, material);
            cube.position.setFromMatrixPosition(reticle.matrix);
            scene.add(cube);
            objects.push(cube);
        }

        function render(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                // Hit-Test (Zemin Algılama)
                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then(s => {
                        session.requestHitTestSource({ space: s }).then(source => hitTestSource = source);
                    });
                    hitTestSourceRequested = true;
                }
                if (hitTestSource) {
                    const results = frame.getHitTestResults(hitTestSource);
                    if (results.length > 0) {
                        reticle.visible = true;
                        reticle.matrix.fromArray(results[0].getPose(referenceSpace).transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }

                // NATIVE HAND ENGINE LOGIC
                let activeHand = null;
                for (const hand of hands) {
                    // Joint (Eklem) Verisi - Native WebXR API
                    const indexTip = hand.joints['index-finger-tip'];
                    const thumbTip = hand.joints['thumb-tip'];

                    if (indexTip && thumbTip && indexTip.visible && thumbTip.visible) {
                        activeHand = hand;
                        handCursorGroup.visible = true;

                        const iPos = new THREE.Vector3().setFromMatrixPosition(indexTip.matrixWorld);
                        const tPos = new THREE.Vector3().setFromMatrixPosition(thumbTip.matrixWorld);
                        
                        // Mark-III İşaretçi Pozisyonu (İki parmak arası orta nokta)
                        const midPos = new THREE.Vector3().lerpVectors(iPos, tPos, 0.5);
                        handCursorGroup.position.copy(midPos);
                        handCursorGroup.lookAt(camera.position);

                        const distance = iPos.distanceTo(tPos);
                        
                        // Pinch (Çimdik) Algılama
                        if (distance < 0.035) { 
                            document.getElementById('pinch-text').innerText = "TUTUYOR";
                            document.getElementById('pinch-text').style.color = "#00ffcc";
                            cursorRing.material.color.setHex(0x00ffcc);
                            cursorRing.scale.set(0.7, 0.7, 0.7);
                            
                            if (!isPinching) {
                                isPinching = true;
                                let minD = Infinity;
                                objects.forEach(obj => {
                                    const d = obj.position.distanceTo(midPos);
                                    if (d < 0.15 && d < minD) { minD = d; selectedObject = obj; }
                                });
                            }
                            if (selectedObject) selectedObject.position.lerp(midPos, 0.2);
                        } else {
                            isPinching = false;
                            selectedObject = null;
                            document.getElementById('pinch-text').innerText = "BOŞTA";
                            document.getElementById('pinch-text').style.color = "#fff";
                            cursorRing.material.color.setHex(0xff3366);
                            cursorRing.scale.set(1.0, 1.0, 1.0);
                        }
                    }
                }
                if (!activeHand) handCursorGroup.visible = false;
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('pointerdown', (e) => {
            if (reticle.visible && e.target.id !== 'btn-go') createCube();
        });

        init();
    </script>
</body>
</html>
