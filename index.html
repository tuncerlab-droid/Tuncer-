<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNCER HOLO - AR Modelleme v2.1 (SLAM & Touch)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.7.0/build/index.module.js",
                "three-bvh-csg": "https://unpkg.com/three-bvh-csg@0.0.16/build/index.module.js"
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Share Tech Mono', monospace;
            color: #0ff;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        #video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 1;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            pointer-events: none;
        }

        .hud-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 20;
            pointer-events: none;
        }

        .hud-panel {
            pointer-events: auto;
            background: rgba(0, 20, 30, 0.7);
            border: 1px solid #0ff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            backdrop-filter: blur(4px);
        }

        .btn-holo {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #0ff;
            color: #0ff;
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 10px;
        }
        .btn-holo:active {
            background: #0ff;
            color: #000;
        }

        .recording-pulse {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; color: #ff0000; }
            50% { opacity: 0.3; }
            100% { opacity: 1; color: #ff0000; }
        }

        #log-console {
            scrollbar-width: none;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <video id="video-background" autoplay playsinline muted></video>
    <div id="canvas-container"></div>

    <div class="hud-overlay flex flex-col justify-between p-4">
        <div class="flex justify-between items-start w-full">
            <div class="hud-panel p-2 rounded text-sm w-1/2 md:w-1/3">
                <div class="font-bold text-base mb-1 tracking-widest text-white drop-shadow-[0_0_5px_#0ff]">TUNCER WEB OS v2.1</div>
                <div id="sys-status" class="text-[10px] text-green-400">Sistem: YÜKLENİYOR...</div>
                <div id="hand-status" class="text-[10px] text-yellow-400">El Takibi: HAZIRLANIYOR...</div>
            </div>

            <div class="hud-panel p-2 rounded text-center" id="voice-status-box">
                <div class="text-[10px] text-gray-300 uppercase">Derinlik/SLAM Aktif</div>
                <div id="mic-status" class="text-[10px] font-bold">DURUM: OK</div>
            </div>
        </div>

        <div class="flex justify-between items-end w-full gap-2">
            <div class="hud-panel p-2 rounded h-24 w-1/2 overflow-hidden flex flex-col justify-end text-[9px]" id="log-console">
                <div class="text-cyan-600">> Sensörler kalibre ediliyor...</div>
            </div>

            <div class="hud-panel p-2 rounded grid grid-cols-2 gap-1 w-1/2">
                <button id="btn-cube" class="btn-holo p-1 rounded">KÜP</button>
                <button id="btn-hole" class="btn-holo p-1 rounded border-red-500 text-red-500">DELİK</button>
                <button id="btn-merge" class="btn-holo p-1 rounded border-yellow-500 text-yellow-500">BİRLEŞTİR</button>
                <button id="btn-delete" class="btn-holo p-1 rounded text-red-400">SİL</button>
            </div>
        </div>
    </div>

    <!-- Hata Bildirimi -->
    <div id="error-modal" class="fixed inset-0 bg-black bg-opacity-80 z-50 flex items-center justify-center p-6 hidden">
        <div class="hud-panel p-6 max-w-sm w-full rounded border-red-500 text-center">
            <h2 class="text-lg font-bold text-red-500 mb-2">ERİŞİM HATASI</h2>
            <p id="error-text" class="text-xs mb-4">Kamera başlatılamadı.</p>
            <button onclick="location.reload()" class="btn-holo w-full py-2 rounded">YENİDEN DENE</button>
        </div>
    </div>

<script type="module">
import * as THREE from 'three';
import { SUBTRACTION, Brush, Evaluator } from 'three-bvh-csg';

const video = document.getElementById('video-background');
const logConsole = document.getElementById('log-console');
const sysStatus = document.getElementById('sys-status');
const handStatus = document.getElementById('hand-status');
const micStatus = document.getElementById('mic-status');

let scene, camera, renderer, hands;
let worldGroup; // SLAM için tüm nesnelerin içinde duracağı grup
let objects = [], holeObjects = [], selectedObject = null;
let handCursor, dragPlane;
let isPinching = false;
let pinchStartPos = new THREE.Vector3(), objectStartPos = new THREE.Vector3();
let initialAlpha = null;

// Multi-touch / El hareketleri için değişkenler
let lastDist = 0;
let lastRotation = 0;

function log(msg, err = false) {
    const d = document.createElement('div');
    d.textContent = `> ${msg}`;
    d.className = err ? 'text-red-500' : 'text-cyan-400';
    logConsole.appendChild(d);
    if(logConsole.childNodes.length > 5) logConsole.removeChild(logConsole.firstChild);
}

// --- KAMERA YÖNETİMİ ---
async function setupCamera() {
    try {
        const constraints = {
            video: {
                facingMode: "environment",
                width: { ideal: 1280 },
                height: { ideal: 720 }
            }
        };
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
        return new Promise((resolve) => {
            video.onloadedmetadata = () => {
                video.play();
                resolve(stream);
            };
        });
    } catch (e) {
        document.getElementById('error-modal').classList.remove('hidden');
        throw e;
    }
}

// --- THREE.JS KURULUMU ---
function initThree() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 1000);
    
    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // SLAM Simülasyonu Grubu
    worldGroup = new THREE.Group();
    scene.add(worldGroup);

    const light = new THREE.AmbientLight(0xffffff, 1.5);
    scene.add(light);
    const pointLight = new THREE.PointLight(0x00ffff, 3);
    pointLight.position.set(5, 5, 5);
    scene.add(pointLight);

    handCursor = new THREE.Mesh(
        new THREE.SphereGeometry(0.04, 16, 16),
        new THREE.MeshBasicMaterial({ color: 0x00ffff, depthTest: false, transparent: true, opacity: 0.8 })
    );
    scene.add(handCursor);

    dragPlane = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshBasicMaterial({ visible: false }));
    scene.add(dragPlane);

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
}

// --- MEDIAPIPE HANDS ---
async function initAI() {
    hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 2, // 2 El desteği (Döndürme/Büyütme için)
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7
    });

    hands.onResults(onResults);

    async function detectionLoop() {
        if (!video.paused && !video.ended) {
            await hands.send({ image: video });
        }
        requestAnimationFrame(detectionLoop);
    }
    detectionLoop();
    log("AI Takibi hazır.");
    handStatus.textContent = "El Takibi: AKTİF";
}

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function onResults(results) {
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        // Birinci El İşlemleri (Taşıma ve Seçme)
        const hand1 = results.multiHandLandmarks[0];
        const indexTip = hand1[8];
        const thumbTip = hand1[4];

        mouse.x = (indexTip.x * 2) - 1;
        mouse.y = -(indexTip.y * 2) + 1;

        raycaster.setFromCamera(mouse, camera);
        
        // Derinlik efekti: Elin ekrandaki boyutuna göre (thumb-index arası) Z pozisyonu
        const currentDist = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y);
        const zDepth = 1.0 + (currentDist * 2); // Derinliği ele bağla
        raycaster.ray.at(zDepth, handCursor.position);

        // Tutma Hareketi
        if (currentDist < 0.05) {
            if (!isPinching) {
                isPinching = true;
                handCursor.material.color.set(0xff0000);
                startGrab();
            } else {
                updateGrab();
            }
        } else if (isPinching) {
            isPinching = false;
            handCursor.material.color.set(0x00ffff);
            endGrab();
        }

        // İkinci El Algılanırsa (Döndürme ve Ölçekleme)
        if (results.multiHandLandmarks.length > 1 && selectedObject) {
            const hand2 = results.multiHandLandmarks[1];
            const p1 = hand1[8];
            const p2 = hand2[8];

            const handsDist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
            const handsAngle = Math.atan2(p2.y - p1.y, p2.x - p1.x);

            if (lastDist > 0) {
                // Ölçekleme
                const scaleFactor = handsDist / lastDist;
                selectedObject.scale.multiplyScalar(scaleFactor);
                
                // Döndürme (Y ekseni)
                const angleDiff = handsAngle - lastRotation;
                selectedObject.rotation.y += angleDiff * 2;
            }
            lastDist = handsDist;
            lastRotation = handsAngle;
        } else {
            lastDist = 0;
            lastRotation = 0;
        }
    }
}

// --- ETKİLEŞİM MANTIĞI ---
function startGrab() {
    // worldGroup içindeki objeleri kontrol et
    const intersects = raycaster.intersectObjects([...objects, ...holeObjects]);
    if (intersects.length > 0) {
        selectedObject = intersects[0].object;
        dragPlane.position.copy(selectedObject.position);
        dragPlane.lookAt(camera.position);
        
        const planeHit = raycaster.intersectObject(dragPlane);
        if (planeHit.length > 0) {
            pinchStartPos.copy(planeHit[0].point);
            objectStartPos.copy(selectedObject.position);
        }
        log("Nesne tutuldu.");
    }
}

function updateGrab() {
    if (selectedObject) {
        dragPlane.lookAt(camera.position);
        const planeHit = raycaster.intersectObject(dragPlane);
        if (planeHit.length > 0) {
            const offset = new THREE.Vector3().subVectors(planeHit[0].point, pinchStartPos);
            selectedObject.position.copy(objectStartPos).add(offset);
        }
    }
}

function endGrab() {
    selectedObject = null;
}

// --- MODELLEME ---
function addObj(isHole = false) {
    const geo = new THREE.BoxGeometry(0.3, 0.3, 0.3);
    const mat = new THREE.MeshStandardMaterial({
        color: isHole ? 0xff0000 : 0x00aaff,
        transparent: true,
        opacity: isHole ? 0.5 : 0.9,
        metalness: 0.5,
        roughness: 0.1,
        emissive: isHole ? 0x220000 : 0x002244
    });
    const mesh = new THREE.Mesh(geo, mat);
    
    // Kameranın baktığı yöne, worldGroup içine ekle
    // Bu sayede SLAM (sensör) hareketiyle beraber dünya üzerinde sabit kalır
    const forward = new THREE.Vector3(0, 0, -1.5).applyQuaternion(camera.quaternion);
    mesh.position.copy(camera.position).add(forward);
    
    worldGroup.add(mesh);
    if (isHole) holeObjects.push(mesh); else objects.push(mesh);
    log(isHole ? "Delik katmanı aktif." : "Yeni küp oluşturuldu.");
}

function merge() {
    if (objects.length === 0 || holeObjects.length === 0) return;
    try {
        const evaluator = new Evaluator();
        let base = objects[objects.length - 1];
        let baseBrush = new Brush(base.geometry, base.material);
        baseBrush.position.copy(base.position);
        baseBrush.rotation.copy(base.rotation);
        baseBrush.scale.copy(base.scale);
        baseBrush.updateMatrixWorld();

        holeObjects.forEach(h => {
            const hBrush = new Brush(h.geometry, h.material);
            hBrush.position.copy(h.position);
            hBrush.rotation.copy(h.rotation);
            hBrush.scale.copy(h.scale);
            hBrush.updateMatrixWorld();
            baseBrush = evaluator.evaluate(baseBrush, hBrush, SUBTRACTION);
            worldGroup.remove(h);
        });

        worldGroup.remove(base);
        const result = new THREE.Mesh(baseBrush.geometry, baseBrush.material);
        result.position.copy(baseBrush.position);
        result.rotation.copy(baseBrush.rotation);
        result.scale.copy(baseBrush.scale);
        
        worldGroup.add(result);
        objects = [result];
        holeObjects = [];
        log("CSG İşlemi Tamamlandı.");
    } catch(err) {
        log("Birleştirme hatası!", true);
    }
}

// --- SLAM (SENSÖR) MANTIĞI ---
function initSensors() {
    // iOS için izin isteği gerekebilir (https üzerinden çalışmalıdır)
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        const btn = document.createElement('button');
        btn.textContent = "SENSÖR İZNİ VER";
        btn.className = "fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-[100] bg-cyan-500 p-4 rounded font-bold text-black";
        btn.onclick = () => {
            DeviceOrientationEvent.requestPermission()
                .then(response => {
                    if (response == 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                        btn.remove();
                    }
                });
        };
        document.body.appendChild(btn);
    } else {
        window.addEventListener('deviceorientation', handleOrientation);
    }
}

function handleOrientation(e) {
    if (initialAlpha === null) initialAlpha = e.alpha;
    
    // Euler açıları (SLAM Simülasyonu)
    const alpha = THREE.MathUtils.degToRad(e.alpha - initialAlpha); // Z (Pusula)
    const beta = THREE.MathUtils.degToRad(e.beta);   // X (Eğim)
    const gamma = THREE.MathUtils.degToRad(e.gamma); // Y (Yana yatış)

    // Kamera rotasyonunu sensöre bağla (YXZ sırası mobil için idealdir)
    camera.rotation.set(beta, alpha, -gamma, 'YXZ');
}

function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}

// --- BAŞLATICI ---
window.addEventListener('load', async () => {
    try {
        const stream = await setupCamera();
        initThree();
        await initAI();
        initSensors();
        
        sysStatus.textContent = "Sistem: AKTİF (SLAM v2.1)";
        log("Holografik motor yüklendi.");
    } catch (e) {
        log("Donanım hatası!", true);
    }
});

// Kontroller
document.getElementById('btn-cube').onclick = () => addObj(false);
document.getElementById('btn-hole').onclick = () => addObj(true);
document.getElementById('btn-merge').onclick = merge;
document.getElementById('btn-delete').onclick = () => {
    const target = objects.length > 0 ? objects.pop() : (holeObjects.length > 0 ? holeObjects.pop() : null);
    if(target) worldGroup.remove(target);
};

</script>
</body>
</html>
