<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuncer Zeka Satın Alım Mağazası</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #1e1e2f; 
            color: #fff;
            margin: 0; 
            padding: 20px; 
            display: flex;
            justify-content: center;
        }
        .container { 
            width: 100%;
            max-width: 600px; 
            background: #2a2a40; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.3); 
        }
        h1, h2, h3 { color: #f0a500; text-align: center; }
        .balance-box {
            text-align: center;
            font-size: 24px;
            background: #1e1e2f;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #f0a500;
        }
        .product { 
            background: #363654;
            border: 1px solid #4a4a70; 
            padding: 20px; 
            margin-bottom: 20px; 
            border-radius: 8px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .product-info p { margin: 5px 0; color: #ccc; }
        .price { font-size: 18px; font-weight: bold; color: #4ade80; }
        button { 
            background-color: #f0a500; 
            color: #1e1e2f; 
            border: none; 
            padding: 10px 20px; 
            font-size: 16px;
            font-weight: bold;
            cursor: pointer; 
            border-radius: 6px; 
            transition: background 0.3s;
        }
        button:hover { background-color: #d18d00; }
        .admin-panel { 
            margin-top: 40px; 
            border-top: 2px dashed #4a4a70; 
            padding-top: 20px; 
        }
        .hidden { display: none; }
        .input-group { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        input { 
            padding: 10px; 
            border-radius: 6px; 
            border: 1px solid #ccc; 
            font-size: 16px;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Tuncer Zeka</h1>
        
        <div class="balance-box">
            Mevcut Bakiye: <span id="balance">0</span> TL
        </div>

        <div class="product">
            <div class="product-info">
                <h3>Tuncer Zeka Pro</h3>
                <p class="price">1.666 TL</p>
            </div>
            <button onclick="buyProduct('Tuncer Zeka Pro', 1666, '175017')">Satın Al</button>
        </div>

        <div class="product">
            <div class="product-info">
                <h3>Tuncer Zeka Holo</h3>
                <p class="price">89.000 TL</p>
            </div>
            <button onclick="buyProduct('Tuncer Zeka Holo', 89000, 'LQHR01_NPoQ')">Satın Al</button>
        </div>

        <div class="admin-panel">
            <h2>⚙️ Admin Paneli</h2>
            
            <div id="login-section" class="input-group">
                <input type="password" id="admin-pass" placeholder="Admin Şifresi">
                <button onclick="checkAdmin()">Giriş Yap</button>
            </div>

            <div id="balance-section" class="input-group hidden">
                <input type="number" id="add-amount" placeholder="Tutar Girin (TL)">
                <button onclick="addBalance()">Bakiye Ekle</button>
            </div>
        </div>
    </div>

    <script>
        let balance = 0;

        function updateBalanceUI() {
            // Bakiyeyi formatlı gösterir (Örn: 89.000)
            document.getElementById('balance').innerText = balance.toLocaleString('tr-TR');
        }

        function buyProduct(name, price, secretCode) {
            if (balance >= price) {
                balance -= price;
                updateBalanceUI();
                alert("✅ Satın alım başarılı! " + name + " aldınız.\n\nSİZE ÖZEL ŞİFRE: " + secretCode);
            } else {
                alert("❌ Bakiye yetersiz! Lütfen admin panelinden bakiye yükleyin.");
            }
        }

        function checkAdmin() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === "175017") {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('balance-section').classList.remove('hidden');
                alert("🔓 Admin girişi başarılı. Bakiye ekleme ekranı açıldı.");
            } else {
                alert("⛔ Hatalı şifre!");
            }
        }

        function addBalance() {
            const amount = parseFloat(document.getElementById('add-amount').value);
            if (!isNaN(amount) && amount > 0) {
                balance += amount;
                updateBalanceUI();
                alert("💰 " + amount.toLocaleString('tr-TR') + " TL bakiye başarıyla eklendi.");
                document.getElementById('add-amount').value = ''; // Kutuyu temizle
            } else {
                alert("Lütfen geçerli bir tutar girin.");
            }
        }
    </script>

</body>
</html>
