<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Tuncer VR</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { background:#000; overflow:hidden; width:100vw; height:100vh; touch-action:none; }
    #c  { display:block; width:100vw; height:100vh; }

    /* ── Başlangıç Ekranı ── */
    #splash {
      position:fixed; inset:0; z-index:30;
      background:radial-gradient(ellipse at center, #001a0e 0%, #000 100%);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px;
    }
    #splash h1 {
      font:bold 28px/1 "Courier New", monospace; letter-spacing:6px;
      color:#0f9; text-shadow:0 0 20px #0f9a;
    }
    #splash p  { font:13px "Courier New", monospace; color:#0a7; text-align:center; padding:0 40px; line-height:1.7; }
    #splash button {
      padding:14px 52px; font:15px "Courier New", monospace; letter-spacing:3px;
      background:rgba(0,255,150,.12); border:1.5px solid #0f9; color:#0f9; border-radius:4px;
      cursor:pointer;
    }
    #splash button:active { background:rgba(0,255,150,.3); }

    /* ── HUD butonları ── */
    #hud {
      display:none; position:fixed; bottom:18px; left:0; right:0;
      justify-content:center; gap:16px; z-index:20;
    }
    .hbtn {
      padding:12px 26px; font:13px "Courier New", monospace; letter-spacing:1px;
      background:rgba(0,255,150,.12); border:1.5px solid #0f9; color:#0f9; border-radius:4px;
      cursor:pointer; user-select:none;
    }
    .hbtn:active { background:rgba(0,255,150,.3); }

    /* ── Durum ── */
    #st {
      display:none; position:fixed; top:10px; left:10px; z-index:20;
      font:11px "Courier New", monospace; color:#0a7; line-height:1.8; pointer-events:none;
    }

    /* ── Orta çizgi ── */
    #sep {
      display:none; position:fixed; top:0; left:50%; width:2px; height:100%;
      background:#111; z-index:15; pointer-events:none;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="sep"></div>
  <div id="st">Bağlanıyor...</div>

  <!-- Başlangıç -->
  <div id="splash">
    <h1>◈ TUNCER VR ◈</h1>
    <p>
      Telefonu <strong style="color:#0f9">Google Cardboard</strong>'a tak.<br>
      Öne eğil → ileri yürü<br>
      Ekrana dokun → Tut / Bırak / Fırlat
    </p>
    <button onclick="startVR()">▶ BAŞLAT</button>
  </div>

  <!-- Kontroller -->
  <div id="hud">
    <button class="hbtn" ontouchstart="sendTap()" onclick="sendTap()">✊ TUT / BIRAK</button>
    <button class="hbtn" ontouchstart="recalibrate()" onclick="recalibrate()">⊙ KALİBRE</button>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
  // ──────────────────────────────────────────────────────────────────────────
  //  WebGL — Barrel distortion + Vignette + Kromatik Aberasyon
  // ──────────────────────────────────────────────────────────────────────────
  const canvas = document.getElementById("c");
  const gl = canvas.getContext("webgl", { alpha:false, antialias:false });

  function resize() {
    canvas.width  = window.screen.width  * window.devicePixelRatio;
    canvas.height = window.screen.height * window.devicePixelRatio;
    canvas.style.width  = window.innerWidth  + "px";
    canvas.style.height = window.innerHeight + "px";
  }
  resize();
  window.addEventListener("resize", resize);

  // Vertex shader
  const VS = `
    attribute vec2 a;
    varying   vec2 v;
    void main(){ v = a*.5+.5; gl_Position = vec4(a,0.,1.); }
  `;

  // Fragment shader — her göz için barrel + vignette + CA
  const FS = `
    precision mediump float;
    uniform sampler2D T;
    uniform float     eye; /* -1=sol  +1=sağ */
    varying vec2      v;

    void main(){
      /* Barrel distortion */
      vec2  d  = v - .5;
      float r2 = dot(d, d);
      vec2  bd = .5 + d * (1. + .22*r2 + .07*r2*r2);

      /* Siyah çerçeve */
      if(bd.x < 0.||bd.x > 1.||bd.y < 0.||bd.y > 1.){
        gl_FragColor = vec4(0,0,0,1); return;
      }

      /* IPD kaydırması: sol göz biraz sola, sağ biraz sağa */
      vec2 src = bd;
      src.x    = clamp(src.x + eye * .018, 0., 1.);

      /* Kromatik aberasyon (köşelerde daha belirgin) */
      float ca = .007 * r2;
      float R  = texture2D(T, src + vec2(  ca, 0.)).r;
      float G  = texture2D(T, src              ).g;
      float B  = texture2D(T, src + vec2( -ca, 0.)).b;

      /* Vignette */
      float vig = 1. - smoothstep(.40, .70, length(v - .5));

      /* Hafif yeşil cast (gece görüş tonu) */
      vec3 col = vec3(R, G * 1.04, B) * vig;
      gl_FragColor = vec4(col, 1.);
    }
  `;

  function mkShader(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src); gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
      console.error(gl.getShaderInfoLog(s));
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, mkShader(gl.VERTEX_SHADER,   VS));
  gl.attachShader(prog, mkShader(gl.FRAGMENT_SHADER, FS));
  gl.linkProgram(prog);
  gl.useProgram(prog);

  const vbuf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, vbuf);
  gl.bufferData(gl.ARRAY_BUFFER,
    new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const aLoc = gl.getAttribLocation(prog, "a");
  gl.enableVertexAttribArray(aLoc);
  gl.vertexAttribPointer(aLoc, 2, gl.FLOAT, false, 0, 0);

  const uT   = gl.getUniformLocation(prog, "T");
  const uEye = gl.getUniformLocation(prog, "eye");
  gl.uniform1i(uT, 0);

  // Texture
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  // 1×1 placeholder
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGB,1,1,0,gl.RGB,gl.UNSIGNED_BYTE,new Uint8Array([0,0,0]));

  // Offscreen canvas (JPEG → texture köprüsü)
  const off = document.createElement("canvas");
  const ctx = off.getContext("2d");
  let   texReady = false;
  const frameImg = new Image();

  // ──────────────────────────────────────────────────────────────────────────
  //  Render döngüsü
  // ──────────────────────────────────────────────────────────────────────────
  function draw() {
    requestAnimationFrame(draw);
    if (!texReady) return;

    const W = canvas.width, H = canvas.height;

    // Texture güncelle
    gl.bindTexture(gl.TEXTURE_2D, tex);
    try { gl.texImage2D(gl.TEXTURE_2D,0,gl.RGB,gl.RGB,gl.UNSIGNED_BYTE,off); }
    catch(e){}

    // Sol göz
    gl.viewport(0, 0, W/2, H);
    gl.uniform1f(uEye, -1.0);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

    // Sağ göz
    gl.viewport(W/2, 0, W/2, H);
    gl.uniform1f(uEye,  1.0);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  }
  draw();

  // ──────────────────────────────────────────────────────────────────────────
  //  Socket.IO
  // ──────────────────────────────────────────────────────────────────────────
  const socket = io({ transports: ["websocket"] });

  socket.on("connect",    () => setSt("● Bağlandı"));
  socket.on("disconnect", () => setSt("○ Bağlantı kesildi"));

  socket.on("frame", (b64) => {
    // Önceki yükleme tamamlanmadan üst üste gelmesin
    if (frameImg._loading) return;
    frameImg._loading = true;
    frameImg.onload = () => {
      off.width  = frameImg.naturalWidth  || frameImg.width;
      off.height = frameImg.naturalHeight || frameImg.height;
      ctx.drawImage(frameImg, 0, 0);
      texReady = true;
      frameImg._loading = false;
    };
    frameImg.onerror = () => { frameImg._loading = false; };
    frameImg.src = "data:image/jpeg;base64," + b64;
  });

  function sendTap()     { socket.emit("tap"); }

  // ──────────────────────────────────────────────────────────────────────────
  //  Jiroskop & Hareket
  // ──────────────────────────────────────────────────────────────────────────
  let baseAlpha = null, baseBeta = null;
  let oriented  = false;

  function handleOrientation(e) {
    // İlk ölçümü sıfır noktası al
    if (baseAlpha === null) {
      baseAlpha = e.alpha ?? 0;
      baseBeta  = e.beta  ?? 0;
    }

    /* ── Yaw (sola-sağa bakış): alpha değişimi ── */
    let yaw = -((e.alpha ?? 0) - baseAlpha);
    // 180° sınırını geç
    if (yaw >  180) yaw -= 360;
    if (yaw < -180) yaw += 360;

    /* ── Pitch (yukarı-aşağı bakış): beta değişimi ── */
    let pitch = -((e.beta ?? 0) - baseBeta) * 0.55;
    pitch = Math.max(-50, Math.min(30, pitch));

    /* ── Tilt-to-walk ──
       Cardboard'da telefon yatay tutulur; beta ≈ 0 olur.
       Öne eğilince beta artar → ileri yürü.
       Geriye eğilince beta azalır → geri yürü.
       Gamma = roll → sağa/sola yürü.                    */
    const tiltDelta = (e.beta ?? 0) - baseBeta;
    const fwdAmt    = Math.max(0,  tiltDelta - 12) * 0.045;
    const backAmt   = Math.max(0, -tiltDelta - 12) * 0.045;
    const strafe    = (e.gamma ?? 0) * 0.012;

    socket.emit("orientation", {
      yaw,
      pitch,
      move: [fwdAmt - backAmt, strafe, 0],
    });

    if (!oriented) {
      oriented = true;
      setSt("● Jiroskop aktif");
    }
  }

  function recalibrate() {
    baseAlpha = null;
    baseBeta  = null;
    setSt("● Kalibre edildi");
  }

  function startVR() {
    document.getElementById("splash").style.display = "none";
    document.getElementById("hud").style.display    = "flex";
    document.getElementById("st").style.display     = "block";
    document.getElementById("sep").style.display    = "block";

    // iOS 13+ izin talebi
    if (typeof DeviceOrientationEvent !== "undefined" &&
        typeof DeviceOrientationEvent.requestPermission === "function") {
      DeviceOrientationEvent.requestPermission()
        .then(state => {
          if (state === "granted")
            window.addEventListener("deviceorientation", handleOrientation, true);
          else
            setSt("⚠ İzin reddedildi — Ayarlar'dan etkinleştir");
        })
        .catch(console.error);
    } else {
      // Android + eski iOS
      window.addEventListener("deviceorientation", handleOrientation, true);
    }
  }

  function setSt(msg) {
    document.getElementById("st").textContent = msg;
  }
  </script>
</body>
</html>
