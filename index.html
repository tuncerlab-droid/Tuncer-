<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuncer AI - Görsel & Metin Analizi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #030712);
            color: #f3f4f6;
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .ai-glow {
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }

        /* Düşünme Animasyonu */
        .dot-flashing {
            position: relative;
            width: 10px;
            height: 10px;
            border-radius: 5px;
            background-color: #6366f1;
            color: #6366f1;
            animation: dot-flashing 1s infinite linear alternate;
            animation-delay: 0.5s;
        }
        .dot-flashing::before, .dot-flashing::after {
            content: "";
            display: inline-block;
            position: absolute;
            top: 0;
        }
        .dot-flashing::before {
            left: -15px;
            width: 10px;
            height: 10px;
            border-radius: 5px;
            background-color: #6366f1;
            color: #6366f1;
            animation: dot-flashing 1s infinite alternate;
            animation-delay: 0s;
        }
        .dot-flashing::after {
            left: 15px;
            width: 10px;
            height: 10px;
            border-radius: 5px;
            background-color: #6366f1;
            color: #6366f1;
            animation: dot-flashing 1s infinite alternate;
            animation-delay: 1s;
        }

        @keyframes dot-flashing {
            0% { background-color: #6366f1; }
            50%, 100% { background-color: rgba(99, 102, 241, 0.2); }
        }

        .chat-tail {
            position: absolute;
            bottom: -10px;
            left: 30px;
            width: 20px;
            height: 20px;
            background: inherit;
            clip-path: polygon(0 0, 100% 0, 50% 100%);
        }

        .image-container img {
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Logo & Header -->
        <header class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-4">
                <div class="bg-indigo-600 p-3 rounded-2xl shadow-lg shadow-indigo-500/40">
                    <i class="fas fa-microchip text-white text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight">Tuncer <span class="text-indigo-400">Zeka</span></h1>
                    <span class="text-[10px] bg-indigo-500/20 text-indigo-300 px-2 py-0.5 rounded-full border border-indigo-500/30">V2.5 VISION</span>
                </div>
            </div>
            <div class="flex gap-2">
                <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                <span class="text-xs text-gray-400 font-medium uppercase tracking-widest">Sistem Aktif</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Sol Panel: Giriş Alanı (Görsel + Soru) -->
            <div class="lg:col-span-7 space-y-6">
                <div id="drop-area" class="glass-card rounded-[2rem] p-4 min-h-[400px] flex flex-col items-center justify-center relative group transition-all hover:border-indigo-500/40 cursor-pointer overflow-hidden">
                    <input type="file" id="image-upload" class="hidden" accept="image/*">
                    
                    <div id="placeholder" class="text-center space-y-4">
                        <div class="w-20 h-20 bg-indigo-500/10 rounded-full flex items-center justify-center mx-auto group-hover:scale-110 transition-transform">
                            <i class="fas fa-camera-retro text-3xl text-indigo-400"></i>
                        </div>
                        <div>
                            <p class="text-lg font-semibold text-white">Görseli Yükle</p>
                            <p class="text-sm text-gray-500">Tıkla veya sürükleyip bırak</p>
                        </div>
                    </div>

                    <div id="preview-wrapper" class="hidden w-full h-full">
                        <img id="image-preview" class="w-full max-h-[450px] object-contain rounded-xl" src="">
                        <button onclick="resetUpload()" class="absolute top-4 right-4 bg-red-500/80 p-3 rounded-xl hover:bg-red-600 transition-colors">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>

                <!-- SORU GİRİŞ ALANI -->
                <div class="glass-card rounded-[2rem] p-2 flex items-center gap-2 ai-glow">
                    <div class="flex-grow pl-4">
                        <input type="text" id="user-prompt" placeholder="Bu görsel hakkında ne bilmek istersin kanka?.." class="w-full bg-transparent border-none focus:ring-0 text-white placeholder-gray-500 py-4">
                    </div>
                    <button id="send-btn" class="bg-indigo-600 hover:bg-indigo-500 p-4 rounded-2xl transition-all disabled:opacity-30 disabled:grayscale" disabled>
                        <i class="fas fa-paper-plane text-white"></i>
                    </button>
                </div>
            </div>

            <!-- Sağ Panel: AI Yanıtı -->
            <div class="lg:col-span-5 space-y-6">
                <div class="flex items-center gap-2 text-gray-400 text-sm font-bold uppercase tracking-widest px-2">
                    <i class="fas fa-robot"></i> Tuncer-Zeka Terminali
                </div>

                <!-- Konuşma Balonu -->
                <div class="relative">
                    <div id="chat-bubble" class="glass-card rounded-[2.5rem] p-8 min-h-[300px] relative transition-all duration-500">
                        
                        <!-- Başlangıç Mesajı -->
                        <div id="msg-idle" class="flex flex-col items-center justify-center h-full text-center py-12 text-gray-600">
                            <i class="fas fa-brain text-4xl mb-4 opacity-20"></i>
                            <p>Görselini yükle ve sorunu sor,<br>gerisini Tuncer-Zeka'ya bırak.</p>
                        </div>

                        <!-- Düşünme Animasyonu -->
                        <div id="msg-thinking" class="hidden flex flex-col items-center justify-center h-full py-16">
                            <div class="dot-flashing"></div>
                            <p class="mt-8 text-indigo-400 text-sm font-bold animate-pulse">VERİLER İŞLENİYOR...</p>
                        </div>

                        <!-- Sonuç Metni -->
                        <div id="msg-result" class="hidden text-gray-100 text-lg leading-relaxed font-medium italic">
                            <!-- AI Cevabı -->
                        </div>

                        <div class="chat-tail"></div>
                    </div>
                </div>

                <!-- İstatistikler / Bilgi -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="glass-card rounded-2xl p-4 border-l-4 border-indigo-500">
                        <p class="text-[10px] text-gray-500 font-bold uppercase">Hız</p>
                        <p class="text-xl font-bold">0.4s</p>
                    </div>
                    <div class="glass-card rounded-2xl p-4 border-l-4 border-violet-500">
                        <p class="text-[10px] text-gray-500 font-bold uppercase">Doğruluk</p>
                        <p class="text-xl font-bold">%99.2</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API Ayarları
        const apiKey = ""; // Sistemden beslenir
        const uploadArea = document.getElementById('drop-area');
        const fileInput = document.getElementById('image-upload');
        const previewWrapper = document.getElementById('preview-wrapper');
        const imagePreview = document.getElementById('image-preview');
        const placeholder = document.getElementById('placeholder');
        const sendBtn = document.getElementById('send-btn');
        const userPrompt = document.getElementById('user-prompt');

        // UI Elementleri
        const msgIdle = document.getElementById('msg-idle');
        const msgThinking = document.getElementById('msg-thinking');
        const msgResult = document.getElementById('msg-result');

        let base64Data = null;

        // Tıklama ile Dosya Seçimi
        uploadArea.onclick = () => !base64Data && fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if(file) handleFile(file);
        };

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                base64Data = e.target.result.split(',')[1];
                imagePreview.src = e.target.result;
                placeholder.classList.add('hidden');
                previewWrapper.classList.remove('hidden');
                checkStatus();
            };
            reader.readAsDataURL(file);
        }

        function resetUpload() {
            base64Data = null;
            fileInput.value = '';
            placeholder.classList.remove('hidden');
            previewWrapper.classList.add('hidden');
            checkStatus();
        }

        function checkStatus() {
            sendBtn.disabled = !base64Data;
        }

        // Analiz İşlemi (tuncer-zeka.js logic)
        sendBtn.onclick = async () => {
            const question = userPrompt.value.trim() || "Bu görseli detaylıca analiz et.";
            
            // UI Güncelleme
            msgIdle.classList.add('hidden');
            msgResult.classList.add('hidden');
            msgThinking.classList.remove('hidden');
            sendBtn.disabled = true;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: question },
                                { inlineData: { mimeType: "image/png", data: base64Data } }
                            ]
                        }]
                    })
                });

                const data = await response.json();
                const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Kanka vallahi bir şey anlayamadım, tekrar dene.";

                // Sonucu Göster
                msgThinking.classList.add('hidden');
                msgResult.innerText = `"${aiText}"`;
                msgResult.classList.remove('hidden');
                
            } catch (err) {
                msgThinking.classList.add('hidden');
                msgResult.innerText = "Hata: Tuncer-Zeka sunucularına bağlanılamadı.";
                msgResult.classList.remove('hidden');
            } finally {
                sendBtn.disabled = false;
            }
        };

        // Sürükle Bırak
        uploadArea.ondragover = (e) => { e.preventDefault(); uploadArea.style.borderColor = "#6366f1"; };
        uploadArea.ondragleave = () => { uploadArea.style.borderColor = ""; };
        uploadArea.ondrop = (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = "";
            const file = e.dataTransfer.files[0];
            if(file) handleFile(file);
        };
    </script>
</body>
</html>
