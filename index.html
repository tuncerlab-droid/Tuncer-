<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuncer Zeka - Demo Paneli</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary: #bb86fc;
            --secondary: #03dac6;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --border: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--primary);
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            text-align: center;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .card h2 {
            color: var(--secondary);
            font-size: 1.2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        textarea, input[type="text"] {
            width: 100%;
            background-color: #2c2c2c;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px;
            border-radius: 5px;
            resize: vertical;
            outline: none;
        }

        textarea:focus, input[type="text"]:focus {
            border-color: var(--primary);
        }

        button {
            background-color: var(--primary);
            color: #000;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #9965f4;
        }

        .result-box {
            background-color: #252525;
            padding: 15px;
            border-radius: 5px;
            min-height: 80px;
            font-size: 0.95rem;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        /* Chatbot Özel Stilleri */
        .chat-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
            height: 250px;
            overflow-y: auto;
            background-color: #252525;
            padding: 10px;
            border-radius: 5px;
        }

        .message {
            padding: 8px 12px;
            border-radius: 15px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .msg-user {
            background-color: var(--primary);
            color: #000;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .msg-bot {
            background-color: #333;
            color: var(--text-main);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>

    <h1>🧠 Tuncer Zeka</h1>
    <p class="subtitle">Sıfır Bağımlılık • Saf JavaScript • Türkçe Yapay Zeka Kütüphanesi</p>

    <div class="dashboard">
        
        <div class="card">
            <h2>💬 Sohbet Botu (Chatbot)</h2>
            <div class="chat-box" id="chatBox">
                <div class="message msg-bot">Merhaba! Ben Tuncer. Size nasıl yardımcı olabilirim? 😊</div>
            </div>
            <div class="input-group">
                <input type="text" id="chatInput" placeholder="Bir şeyler yazın..." onkeypress="if(event.key === 'Enter') gonderMesaj()">
                <button onclick="gonderMesaj()">Gönder</button>
            </div>
        </div>

        <div class="card">
            <h2>😊 Duygu Analizi</h2>
            <textarea id="duyguInput" rows="4" placeholder="Analiz edilecek metni buraya girin... (Örn: Bu kütüphane gerçekten harika çalışıyor!)"></textarea>
            <button onclick="analizEt()">Analiz Et</button>
            <div class="result-box" id="duyguSonuc">Sonuç burada görünecek...</div>
        </div>

        <div class="card">
            <h2>📋 Metin Özetleyici & İstatistik</h2>
            <textarea id="ozetInput" rows="5" placeholder="Uzun bir metin girin..."></textarea>
            <button onclick="ozetleVeIstatistik()">İşle</button>
            <div class="result-box" id="ozetSonuc">Özet ve istatistikler burada görünecek...</div>
        </div>

    </div>

    <script src="tuncer-zeka.js"></script>
    
    <script>
        // 1. Sohbet Botu Başlatma
        const bot = new TuncerZeka.SohbetBotu({ isim: 'Tuncer' });

        function gonderMesaj() {
            const inputEl = document.getElementById('chatInput');
            const mesaj = inputEl.value.trim();
            if (!mesaj) return;

            mesajEkle('user', mesaj);
            inputEl.value = '';

            // Tuncer Zeka'dan cevap al
            const yanit = bot.cevapVer(mesaj);
            
            setTimeout(() => {
                mesajEkle('bot', yanit.cevap);
            }, 400); // Küçük bir gecikme ile daha doğal bir his
        }

        function mesajEkle(kim, metin) {
            const chatBox = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = `message ${kim === 'user' ? 'msg-user' : 'msg-bot'}`;
            div.textContent = metin;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // 2. Duygu Analizi
        function analizEt() {
            const metin = document.getElementById('duyguInput').value;
            const sonucDiv = document.getElementById('duyguSonuc');
            
            if (!metin.trim()) {
                sonucDiv.innerHTML = "Lütfen bir metin girin.";
                return;
            }

            const sonuc = TuncerZeka.duyguAnaliziYap(metin);
            
            sonucDiv.innerHTML = `
                <strong>Duygu:</strong> ${sonuc.duygu.toUpperCase()} ${sonuc.emoji}<br>
                <strong>Güven:</strong> %${sonuc.guven}<br>
                <strong>Skor:</strong> ${sonuc.skor}<br><br>
                <small><em>Pozitif Kelimeler:</em> ${sonuc.detay.pozitifKelimeler.join(', ') || 'Yok'}</small><br>
                <small><em>Negatif Kelimeler:</em> ${sonuc.detay.negatifKelimeler.join(', ') || 'Yok'}</small>
            `;
        }

        // 3. Özetleme ve İstatistik
        function ozetleVeIstatistik() {
            const metin = document.getElementById('ozetInput').value;
            const sonucDiv = document.getElementById('ozetSonuc');
            
            if (!metin.trim()) {
                sonucDiv.innerHTML = "Lütfen bir metin girin.";
                return;
            }

            // Kütüphaneden verileri çek
            const ozet = TuncerZeka.ozetle(metin, 2); // 2 cümlelik özet
            const istatistik = TuncerZeka.metinIstatistik(metin);
            const anahtarKelimeler = TuncerZeka.anahtarKelimeler(metin, 5).map(k => k.kelime).join(', ');

            sonucDiv.innerHTML = `
                <strong style="color:var(--secondary)">📌 Özet:</strong><br>
                ${ozet}<br><br>
                
                <strong style="color:var(--secondary)">📊 İstatistikler:</strong><br>
                • Toplam Kelime: ${istatistik.toplamKelime}<br>
                • Benzersiz Kelime: ${istatistik.benzersizKelime}<br>
                • Cümle Sayısı: ${istatistik.cumleSayisi}<br>
                • Okunabilirlik Skoru: ${istatistik.okunabilirlikSkoru}/100<br><br>

                <strong style="color:var(--secondary)">🔑 Anahtar Kelimeler:</strong><br>
                ${anahtarKelimeler}
            `;
        }
    </script>
</body>
</html>
