<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuncer Zeka v2026 | Yapay Zeka Arayüzü</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0f1d;
            --glass-bg: rgba(16, 22, 37, 0.7);
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0a0f1d 100%);
            color: #e2e8f0;
            height: 100vh;
            overflow: hidden;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-container::-webkit-scrollbar { width: 5px; }
        .chat-container::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        .message-anim { animation: fadeInUp 0.3s ease-out forwards; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .typing-dot {
            width: 8px; height: 8px; background: #94a3b8; border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        code { font-family: 'Fira Code', monospace; background: #1e293b; padding: 2px 4px; border-radius: 4px; }
        pre { background: #0f172a; padding: 1rem; border-radius: 8px; overflow-x: auto; margin: 10px 0; border: 1px solid #334155; }
    </style>
</head>
<body class="flex flex-col md:flex-row">

    <aside class="w-full md:w-80 glass p-6 flex flex-col border-r border-white/10 z-20">
        <div class="mb-8">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
                TUNCER ZEKA
            </h1>
            <p class="text-xs text-slate-500 font-mono">v2026.1.0 // SİSTEM AKTİF</p>
        </div>

        <div class="flex-1 space-y-6">
            <div>
                <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-3">Sistem Durumu</h3>
                <div id="stats" class="space-y-2 text-sm">
                    <div class="flex justify-between"><span>Hafıza:</span> <span id="stat-memory" class="text-blue-400">0</span></div>
                    <div class="flex justify-between"><span>Konuşma:</span> <span id="stat-chat" class="text-blue-400">0</span></div>
                    <div class="flex justify-between"><span>Öğrenilen:</span> <span id="stat-learn" class="text-blue-400">0</span></div>
                </div>
            </div>

            <div>
                <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-3">Hızlı Komutlar</h3>
                <div class="grid grid-cols-1 gap-2">
                    <button onclick="quickAction('hesapla: (15 * 4) + 100')" class="text-left text-xs p-2 rounded bg-white/5 hover:bg-blue-500/20 transition">Matematik Motoru</button>
                    <button onclick="quickAction('kod yaz: JavaScript ile saat yap')" class="text-left text-xs p-2 rounded bg-white/5 hover:bg-purple-500/20 transition">Kod Yazma</button>
                    <button onclick="quickAction('wikipedia: Kuantum Fiziği')" class="text-left text-xs p-2 rounded bg-white/5 hover:bg-green-500/20 transition">Bilgi Bankası</button>
                    <button onclick="quickAction('özetle: ')" class="text-left text-xs p-2 rounded bg-white/5 hover:bg-yellow-500/20 transition">Metin Özetleme</button>
                </div>
            </div>
        </div>

        <div class="mt-auto pt-6 border-t border-white/10">
            <button onclick="resetSystem()" class="w-full p-2 text-xs text-red-400 border border-red-400/30 rounded hover:bg-red-400/10 transition">
                SİSTEMİ SIFIRLA
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full relative">
        <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-6 chat-container">
            <div class="flex items-start gap-4 message-anim">
                <div class="w-10 h-10 rounded-lg bg-blue-600 flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <span class="font-bold">TZ</span>
                </div>
                <div class="max-w-[80%] glass p-4 rounded-2xl rounded-tl-none">
                    <p class="text-sm leading-relaxed">Sistem başlatıldı. Ben Tuncer Zeka v2026. Ahmet Tuncer tarafından geliştirilen gelişmiş algoritmalarım aktif. Size nasıl yardımcı olabilirim?</p>
                </div>
            </div>
        </div>

        <div class="p-6 glass border-t border-white/10">
            <div class="max-w-4xl mx-auto flex gap-4 items-end">
                <div class="flex-1 relative">
                    <textarea id="user-input" rows="1" 
                        class="w-full bg-slate-800/50 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 transition resize-none text-sm"
                        placeholder="Bir şey sorun veya komut verin (Örn: hesapla: 25*4)..."
                        onkeydown="checkEnter(event)"></textarea>
                </div>
                <button id="send-btn" onclick="processInput()" 
                    class="bg-blue-600 hover:bg-blue-500 p-3 rounded-xl transition shadow-lg shadow-blue-500/20">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </button>
            </div>
        </div>
    </main>

    <script src="tuncer2026.js"></script>

    <script>
        // Kütüphaneyi Başlat
        const tuncer = new TuncerZeka({
            detayliLog: true,
            hafizaKapasitesi: 5000
        });

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');

        // Enter tuşu kontrolü
        function checkEnter(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                processInput();
            }
        }

        function quickAction(cmd) {
            userInput.value = cmd;
            userInput.focus();
        }

        async function processInput() {
            const input = userInput.value.trim();
            if (!input) return;

            // Kullanıcı mesajını ekle
            appendMessage('user', input);
            userInput.value = '';
            
            // Yazıyor efekti
            const typingId = showTyping();

            try {
                // KÜTÜPHANEYİ ÇALIŞTIR
                const sonuc = await tuncer.konus(input);
                
                // Efekti kaldır ve cevabı yaz
                removeTyping(typingId);
                appendMessage('ai', sonuc.cevap, sonuc);
                
                // İstatistikleri güncelle
                updateStats();
            } catch (err) {
                removeTyping(typingId);
                appendMessage('ai', "Sistem hatası oluştu: " + err.message);
            }
        }

        function appendMessage(sender, text, data = null) {
            const div = document.createElement('div');
            div.className = `flex items-start gap-4 message-anim ${sender === 'user' ? 'flex-row-reverse' : ''}`;
            
            const avatar = sender === 'ai' 
                ? `<div class="w-10 h-10 rounded-lg bg-blue-600 flex items-center justify-center shadow-lg"><span class="font-bold">TZ</span></div>`
                : `<div class="w-10 h-10 rounded-lg bg-slate-700 flex items-center justify-center shadow-lg"><span class="font-bold">Siz</span></div>`;

            const bubbleClass = sender === 'ai' 
                ? 'glass rounded-tl-none border-blue-500/20' 
                : 'bg-blue-600/20 rounded-tr-none border-blue-500/40 border';

            // Markdown benzeri basit kod bloklarını render et
            let formattedText = text.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
            formattedText = formattedText.replace(/`([^`]+)`/g, '<code>$1</code>');

            div.innerHTML = `
                ${avatar}
                <div class="max-w-[85%] p-4 rounded-2xl ${bubbleClass}">
                    <div class="text-sm leading-relaxed whitespace-pre-wrap">${formattedText}</div>
                    ${data ? `<div class="mt-2 text-[10px] text-slate-500 font-mono">Niyet: ${data.niyet} | Süre: ${data.sure}</div>` : ''}
                </div>
            `;
            
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showTyping() {
            const id = 'typing-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = 'flex items-start gap-4 message-anim';
            div.innerHTML = `
                <div class="w-10 h-10 rounded-lg bg-blue-600 flex items-center justify-center shadow-lg">TZ</div>
                <div class="glass p-4 rounded-2xl rounded-tl-none flex gap-1">
                    <div class="typing-dot"></div>
                    <div class="typing-dot" style="animation-delay: 0.2s"></div>
                    <div class="typing-dot" style="animation-delay: 0.4s"></div>
                </div>
            `;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return id;
        }

        function removeTyping(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function updateStats() {
            const durum = tuncer.durum();
            document.getElementById('stat-memory').innerText = durum.hafizaKullanilanSlot;
            document.getElementById('stat-chat').innerText = durum.konusmaAdedi;
            document.getElementById('stat-learn').innerText = durum.ogrenilenBilgiSayisi;
        }

        function resetSystem() {
            if(confirm("Tüm hafıza ve konuşma geçmişi silinecek. Emin misiniz?")) {
                tuncer.sifirla();
                chatBox.innerHTML = '';
                appendMessage('ai', 'Sistem başarıyla sıfırlandı. Hafıza temizlendi.');
                updateStats();
            }
        }

        // Başlangıç istatistikleri
        updateStats();
    </script>
</body>
</html>
