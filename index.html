<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNCER HOLO AR v3.7</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.7.0/build/index.module.js",
                "three-bvh-csg": "https://unpkg.com/three-bvh-csg@0.0.16/build/index.module.js"
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Share Tech Mono', monospace;
        }

        /* Tüm Arayüzü Kapsayan Ana Katman */
        #ar-interface {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 2147483647; /* Maksimum z-index */
        }

        /* Başlangıç Ekranı */
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #000;
            pointer-events: auto;
            z-index: 100;
        }

        /* AR Buton Panelleri */
        #ui-controls {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none; /* AR başlayınca açılır */
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        .interactive {
            pointer-events: auto !important;
        }

        .hud-panel {
            background: rgba(0, 30, 40, 0.9);
            border: 2px solid #0ff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            border-radius: 8px;
        }

        .btn-holo {
            background: #004444;
            border: 1px solid #0ff;
            color: #0ff;
            font-size: 14px;
            font-weight: bold;
            padding: 15px 5px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-holo:active {
            background: #00ffff;
            color: #000;
        }

        /* WebXR'ın oluşturduğu butonu bulup ezmek için */
        #ARButton {
            position: absolute !important;
            bottom: 100px !important;
            pointer-events: auto !important;
            background: #004444 !important;
            border: 2px solid #0ff !important;
            color: #0ff !important;
            font-family: 'Share Tech Mono' !important;
            padding: 20px !important;
            font-size: 18px !important;
            letter-spacing: 2px !important;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <!-- Bu katman komple WebXR Overlay olacak -->
    <div id="ar-interface">
        
        <div id="start-screen">
            <h1 class="text-4xl font-bold text-cyan-400 mb-4 tracking-tighter">TUNCER HOLO</h1>
            <p class="text-cyan-800 text-xs mb-20">SİSTEMİ BAŞLATIN</p>
            <!-- ARButton buraya otomatik enjekte edilecek -->
        </div>

        <div id="ui-controls">
            <div class="flex justify-between w-full interactive mt-4">
                <div class="hud-panel p-3 w-48">
                    <div id="sys-status" class="text-yellow-500 text-xs font-bold">ZEMİN TARANIYOR...</div>
                    <div id="hand-status" class="text-cyan-600 text-[10px] mt-1">EL TAKİBİ: BEKLEMEDE</div>
                </div>
                <div class="hud-panel px-4 py-2 flex items-center">
                    <div class="w-3 h-3 bg-red-600 rounded-full animate-pulse mr-2"></div>
                    <span class="text-white text-xs font-bold">REC</span>
                </div>
            </div>

            <div class="w-full mb-10 flex flex-col gap-4">
                <div class="hud-panel p-2 h-20 w-full overflow-hidden flex flex-col justify-end text-[10px] opacity-80" id="log-console">
                    <div class="text-cyan-400">> Sistem Onarildi v3.7</div>
                </div>
                
                <div class="grid grid-cols-2 gap-3 w-full interactive">
                    <button id="btn-cube" class="btn-holo rounded">KÜP EKLE</button>
                    <button id="btn-hole" class="btn-holo rounded border-red-500 text-red-500">DELİK EKLE</button>
                    <button id="btn-merge" class="btn-holo rounded border-yellow-500 text-yellow-400">BİRLEŞTİR (CSG)</button>
                    <button id="btn-delete" class="btn-holo rounded border-white text-white">SON OBJEYİ SİL</button>
                </div>
            </div>
        </div>

    </div>

<script type="module">
import * as THREE from 'three';
import { ARButton } from 'three/addons/webxr/ARButton.js';
import { XRHandModelFactory } from 'three/addons/webxr/XRHandModelFactory.js';
import { SUBTRACTION, Brush, Evaluator } from 'three-bvh-csg';

let scene, camera, renderer, reticle;
let hitTestSource = null, hitTestSourceRequested = false;
let objects = [], holeObjects = [];
let hand0, handModel0, selectedObject = null, isGrabbing = false;

const logConsole = document.getElementById('log-console');
const sysStatus = document.getElementById('sys-status');
const handStatus = document.getElementById('hand-status');
const uiControls = document.getElementById('ui-controls');
const startScreen = document.getElementById('start-screen');
const arInterface = document.getElementById('ar-interface');

function log(msg, isErr = false) {
    const d = document.createElement('div');
    d.textContent = `> ${msg}`;
    d.className = isErr ? 'text-red-500 font-bold' : 'text-cyan-400';
    logConsole.appendChild(d);
    if(logConsole.childNodes.length > 5) logConsole.removeChild(logConsole.firstChild);
}

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1.5));

    // AR Düğmesi Oluşturma
    const arBtn = ARButton.createButton(renderer, {
        requiredFeatures: ['hit-test'],
        optionalFeatures: ['dom-overlay', 'hand-tracking'],
        domOverlay: { root: arInterface } // TÜM ARAYÜZÜ OVERLAY YAPTIK
    });
    document.body.appendChild(arBtn);

    // El Takibi
    const handModelFactory = new XRHandModelFactory();
    hand0 = renderer.xr.getHand(0);
    handModel0 = handModelFactory.createHandModel(hand0, "spheres");
    hand0.add(handModel0);
    scene.add(hand0);

    hand0.addEventListener('pinchstart', () => { isGrabbing = true; findTarget(); });
    hand0.addEventListener('pinchend', () => { 
        isGrabbing = false; 
        if(selectedObject) selectedObject.material.emissive.setHex(0x000000);
        selectedObject = null;
    });

    // Reticle
    reticle = new THREE.Mesh(
        new THREE.RingGeometry(0.05, 0.06, 32).rotateX(-Math.PI/2),
        new THREE.MeshBasicMaterial({ color: 0x00ffff })
    );
    reticle.matrixAutoUpdate = false;
    reticle.visible = false;
    scene.add(reticle);

    renderer.xr.addEventListener('sessionstart', () => {
        startScreen.style.display = 'none';
        uiControls.style.display = 'flex';
        log("Sistem Aktif.");
    });

    renderer.xr.addEventListener('sessionend', () => {
        window.location.reload();
    });

    renderer.setAnimationLoop(render);
}

function findTarget() {
    const tip = hand0.joints['index-finger-tip'];
    if (!tip) return;
    const pos = new THREE.Vector3().setFromMatrixPosition(tip.matrixWorld);
    let closest = null;
    let minD = 0.20;
    [...objects, ...holeObjects].forEach(obj => {
        const d = obj.position.distanceTo(pos);
        if (d < minD) { minD = d; closest = obj; }
    });
    if (closest) {
        selectedObject = closest;
        selectedObject.material.emissive.setHex(0x003333);
        log("Obje Tutuldu.");
    }
}

function addObject(isHole = false) {
    if (!reticle.visible) return log("Zemin Bekleniyor!", true);
    const geo = new THREE.BoxGeometry(0.12, 0.12, 0.12);
    const mat = new THREE.MeshStandardMaterial({
        color: isHole ? 0xff0000 : 0x00ffff,
        transparent: true, opacity: isHole ? 0.5 : 1.0,
        emissive: 0x000000
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.setFromMatrixPosition(reticle.matrix);
    mesh.quaternion.setFromRotationMatrix(reticle.matrix);
    mesh.translateY(0.06);
    scene.add(mesh);
    if (isHole) holeObjects.push(mesh); else objects.push(mesh);
    log(isHole ? "Katalog: Delik Nesnesi" : "Katalog: Küp Nesnesi");
}

function merge() {
    if (objects.length < 1 || holeObjects.length < 1) return log("Obje Yetersiz!", true);
    try {
        const evaluator = new Evaluator();
        let base = objects[0];
        let baseBrush = new Brush(base.geometry, base.material);
        baseBrush.position.copy(base.position);
        baseBrush.quaternion.copy(base.quaternion);
        baseBrush.updateMatrixWorld();

        holeObjects.forEach(h => {
            const hBrush = new Brush(h.geometry, h.material);
            hBrush.position.copy(h.position);
            hBrush.quaternion.copy(h.quaternion);
            hBrush.updateMatrixWorld();
            baseBrush = evaluator.evaluate(baseBrush, hBrush, SUBTRACTION);
            scene.remove(h);
        });

        scene.remove(base);
        const res = new THREE.Mesh(baseBrush.geometry, baseBrush.material);
        res.position.copy(base.position);
        res.quaternion.copy(base.quaternion);
        scene.add(res);
        objects = [res]; holeObjects = [];
        log("CSG: İşlem Başarılı.");
    } catch (e) { log("Matematiksel Hata!", true); }
}

function render(time, frame) {
    if (frame) {
        const ref = renderer.xr.getReferenceSpace();
        const session = renderer.xr.getSession();

        if (!hitTestSourceRequested) {
            session.requestReferenceSpace('viewer').then(s => {
                session.requestHitTestSource({ space: s }).then(src => hitTestSource = src);
            });
            hitTestSourceRequested = true;
        }

        if (hitTestSource) {
            const results = frame.getHitTestResults(hitTestSource);
            if (results.length) {
                const pose = results[0].getPose(ref);
                reticle.visible = true;
                reticle.matrix.fromArray(pose.transform.matrix);
                sysStatus.textContent = "ZEMİN: HAZIR";
                sysStatus.style.color = "#00ff00";
            } else {
                reticle.visible = false;
                sysStatus.textContent = "ZEMİN: TARANIYOR";
                sysStatus.style.color = "#ffaa00";
            }
        }

        let el = false;
        for (const input of session.inputSources) { if (input.hand) el = true; }
        handStatus.textContent = el ? "EL TAKİBİ: AKTİF" : "EL TAKİBİ: BEKLEMEDE";
        handStatus.style.color = el ? "#00ffff" : "#666";

        if (isGrabbing && selectedObject) {
            const tip = hand0.joints['index-finger-tip'];
            if (tip) {
                const p = new THREE.Vector3().setFromMatrixPosition(tip.matrixWorld);
                selectedObject.position.lerp(p, 0.2);
            }
        }
    }
    renderer.render(scene, camera);
}

window.onload = init;
document.getElementById('btn-cube').onclick = () => addObject(false);
document.getElementById('btn-hole').onclick = () => addObject(true);
document.getElementById('btn-merge').onclick = merge;
document.getElementById('btn-delete').onclick = () => {
    const all = [...objects, ...holeObjects];
    if (all.length) {
        const t = all.pop();
        scene.remove(t);
        objects = objects.filter(o => o !== t);
        holeObjects = holeObjects.filter(o => o !== t);
        log("Silindi.");
    }
};
</script>
</body>
</html>
