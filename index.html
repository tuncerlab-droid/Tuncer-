<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuncer Zeka - Görsel Analiz</title>
    <!-- TensorFlow.js ve MobileNet Modelini Yüklüyoruz (API Anahtarı Gerektirmez) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <style>
        /* Ekran görüntüsündeki orijinal tasarımı koruyan CSS */
        body {
            background-color: #1e2533;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .message {
            margin-bottom: 20px;
            max-width: 90%;
        }

        .user-image-preview {
            width: 100%;
            max-width: 400px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .bot-response {
            background-color: #2b3548;
            padding: 15px;
            border-radius: 12px;
            line-height: 1.5;
            position: relative;
        }

        .avatar {
            width: 32px;
            height: 32px;
            background-color: #3b82f6;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            margin-right: 10px;
            vertical-align: middle;
        }

        .input-area {
            background-color: #1e2533;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid #2b3548;
        }

        .input-wrapper {
            background-color: #2b3548;
            border-radius: 25px;
            flex: 1;
            display: flex;
            align-items: center;
            padding: 5px 15px;
        }

        input[type="text"] {
            background: transparent;
            border: none;
            color: white;
            padding: 10px;
            flex: 1;
            outline: none;
        }

        .send-btn {
            background-color: #3b82f6;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #file-input {
            display: none;
        }

        .upload-icon {
            cursor: pointer;
            opacity: 0.7;
        }

        .status-loading {
            font-style: italic;
            font-size: 0.9em;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="chat-container" id="chat">
        <!-- Başlangıç mesajı veya geçmiş burada görünecek -->
    </div>

    <div class="input-area">
        <label for="file-input" class="upload-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
        </label>
        <input type="file" id="file-input" accept="image/*">
        
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Tuncer Zeka'ya mesaj gönder veya görsel ekle">
        </div>

        <button class="send-btn" id="send-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>

    <script>
        let model = null;
        const chat = document.getElementById('chat');
        const fileInput = document.getElementById('file-input');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // Modeli sayfa açıldığında arka planda yüklüyoruz
        async function loadModel() {
            try {
                model = await mobilenet.load();
                console.log("Analiz motoru hazır.");
            } catch (e) {
                console.error("Model yüklenemedi", e);
            }
        }
        loadModel();

        async function handleInteraction() {
            const file = fileInput.files[0];
            const text = userInput.value;

            if (!file && !text) return;

            // Kullanıcı mesajını/görselini ekrana bas
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    appendUserMessage(text, e.target.result);
                    processImage(file);
                }
                reader.readAsDataURL(file);
            } else {
                appendUserMessage(text);
                setTimeout(() => appendBotResponse("Sadece metin mesajlarını şu an için işleyemiyorum, lütfen bir görsel ekleyin."), 500);
            }

            // Temizlik
            userInput.value = "";
            fileInput.value = "";
        }

        function appendUserMessage(text, imgSrc = null) {
            let html = `<div class="message">`;
            if (imgSrc) html += `<img src="${imgSrc}" class="user-image-preview">`;
            if (text) html += `<div style="padding: 10px;">${text}</div>`;
            html += `</div>`;
            chat.innerHTML += html;
            chat.scrollTop = chat.scrollHeight;
        }

        function appendBotResponse(response) {
            const html = `
                <div class="message">
                    <div class="avatar">TZ</div>
                    <span style="font-weight:bold; margin-left:5px;">Tuncer Zeka</span>
                    <div class="bot-response">${response}</div>
                </div>`;
            chat.innerHTML += html;
            chat.scrollTop = chat.scrollHeight;
        }

        async function processImage(file) {
            if (!model) {
                appendBotResponse("Sistem hala hazırlanıyor, lütfen birkaç saniye sonra tekrar deneyin.");
                return;
            }

            // Analiz ediliyor mesajı
            const loadingId = "loading-" + Date.now();
            chat.innerHTML += `<div id="${loadingId}" class="status-loading" style="margin-left: 50px;">Görsel analiz ediliyor...</div>`;

            try {
                // Görseli görünmez bir elemente yükleyip analiz ediyoruz
                const img = new Image();
                img.src = URL.createObjectURL(file);
                await img.decode();

                const predictions = await model.classify(img);
                document.getElementById(loadingId).remove();

                if (predictions && predictions.length > 0) {
                    // Tahminleri Türkçe ve anlaşılır bir cümleye çeviriyoruz
                    const enIyiTahmin = predictions[0].className;
                    const olasilik = Math.round(predictions[0].probability * 100);
                    
                    let turkceSonuc = `Bu görselde büyük ihtimalle bir **${enIyiTahmin}** görüyorum (Doğruluk: %${olasilik}).`;
                    
                    // Basit bir çeviri/yorumlama mantığı eklenebilir
                    appendBotResponse(turkceSonuc);
                } else {
                    appendBotResponse("Görseli inceledim ama ne olduğunu tam olarak anlayamadım.");
                }
            } catch (error) {
                document.getElementById(loadingId).remove();
                appendBotResponse("Görsel işlenirken teknik bir hata oluştu.");
            }
        }

        sendBtn.addEventListener('click', handleInteraction);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleInteraction(); });
    </script>
</body>
</html>
