<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuncer Zeka v1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        :root { --accent: #10a37f; --dark-bg: #212121; }
        body { font-family: 'Inter', sans-serif; background: #0b0d11; color: #ececf1; margin: 0; height: 100vh; overflow: hidden; }
        
        #login-screen { position: fixed; inset: 0; z-index: 100; background: #0b0d11; display: flex; align-items: center; justify-content: center; transition: all 0.5s ease; }
        .app-container { display: none; height: 100vh; width: 100vw; flex-direction: row; }
        
        .sidebar { width: 260px; background: #171717; border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
        .main-chat { flex: 1; display: flex; flex-direction: column; background: var(--dark-bg); position: relative; }
        
        #chat-flow { flex: 1; overflow-y: auto; padding-bottom: 100px; }
        .msg-bubble { padding: 1.5rem 1rem; display: flex; justify-content: center; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .msg-bubble.user { background: transparent; }
        .msg-bubble.bot { background: rgba(255,255,255,0.03); }
        .inner-msg { max-width: 768px; width: 100%; display: flex; gap: 1rem; }
        
        .avatar { width: 30px; height: 30px; border-radius: 2px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .bot-img { background: var(--accent); }
        .user-img { background: #5436da; }

        .input-area { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, var(--dark-bg) 50%); padding: 2rem; }
        .input-wrapper { max-width: 768px; margin: 0 auto; background: #2f2f2f; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; padding: 10px; }
        #user-input { flex: 1; background: transparent; border: none; color: white; outline: none; padding: 5px 10px; resize: none; max-height: 200px; }
    </style>
</head>
<body>

<!-- GİRİŞ EKRANI -->
<div id="login-screen">
    <div class="bg-[#1a1c22] p-8 rounded-2xl border border-white/10 w-80 text-center shadow-2xl">
        <div class="w-16 h-16 bg-[#10a37f] rounded-xl mx-auto flex items-center justify-center mb-4">
            <i class="fas fa-brain text-white text-3xl"></i>
        </div>
        <h2 class="text-xl font-bold mb-4">Tuncer Zeka</h2>
        <input type="text" id="login-name" placeholder="Adınız" class="w-full bg-black/20 border border-white/10 rounded-lg p-3 mb-4 outline-none focus:border-[#10a37f]">
        <button onclick="startApp()" class="w-full bg-[#10a37f] p-3 rounded-lg font-bold hover:bg-[#0e8c6d] transition">Giriş Yap</button>
    </div>
</div>

<!-- UYGULAMA ARAYÜZÜ -->
<div class="app-container" id="app">
    <div class="sidebar">
        <div class="p-3">
            <button onclick="resetChat()" class="w-full border border-white/20 p-3 rounded-md hover:bg-white/5 transition flex items-center gap-3">
                <i class="fas fa-plus text-xs"></i> Yeni Sohbet
            </button>
        </div>
        <div class="flex-1 px-3 text-sm text-gray-400 mt-4" id="chat-history-list">
            <div class="px-2 mb-2 text-[10px] uppercase font-bold text-gray-500">Bugün</div>
            <div class="p-2 hover:bg-white/5 rounded cursor-pointer overflow-hidden text-ellipsis whitespace-nowrap">Yeni Sohbet</div>
        </div>
        <div class="p-4 border-t border-white/10 flex items-center gap-3">
            <div class="w-8 h-8 rounded bg-orange-500 flex items-center justify-center text-xs font-bold" id="user-icon">T</div>
            <span id="user-display-name">Kullanıcı</span>
        </div>
    </div>

    <div class="main-chat">
        <div id="chat-flow">
            <!-- Mesajlar buraya akacak -->
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="user-input" rows="1" placeholder="Mesajınızı buraya yazın..."></textarea>
                <button onclick="handleSend()" class="p-2 text-gray-400 hover:text-white transition" id="send-btn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
// ============================================================
// 🧠 TUNCER ZEKA v1.0 (Kütüphane Gövdesi)
// ============================================================
const TuncerZeka = (() => {
  const Matematik = {
    rastgele: (min = -1, max = 1) => Math.random() * (max - min) + min,
    sigmoid: x => 1 / (1 + Math.exp(-Math.max(-500, Math.min(500, x)))),
    sigmoidTurev: x => x * (1 - x),
    tokenize: m => m.toLowerCase().replace(/[^\wığüşöçİĞÜŞÖÇ\s]/g, ' ').split(/\s+/).filter(t => t.length > 0)
  };

  class TurkceNLP {
    constructor() { this.turkceEkler = ['lar', 'ler', 'lık', 'lik', 'ıyor', 'acak', 'ecek']; }
    tokenize(m) { return Matematik.tokenize(m); }
    kokBul(k) { 
        let kok = k.toLowerCase();
        for (const ek of this.turkceEkler) { if (kok.endsWith(ek) && kok.length > 3) return kok.slice(0, -ek.length); }
        return kok;
    }
  }

  class SohbetBotu {
    constructor(a = {}) {
      this.nlp = new TurkceNLP();
      this.isim = a.isim || 'Tuncer';
      this.baglam = [];
      this.niyetler = [
        { k: ['merhaba', 'selam', 'hey', 'sa', 'mrb'], c: ['Merhaba! Ben Tuncer Zeka. Size nasıl yardımcı olabilirim? 😊', 'Selamlar, hoş geldiniz!'] },
        { k: ['nasılsın', 'naber', 'nasıl gidiyor'], c: ['İyiyim, kodlarım tıkır tıkır çalışıyor! Siz nasılsınız?', 'Harikayım, yeni şeyler öğrenmeye hazırım.'] },
        { k: ['kimsin', 'ismin ne', 'adın ne'], c: ['Ben Tuncer Zeka, tamamen yerli ve saf JavaScript ile yazılmış bir yapay zekayım.'] },
        { k: ['şaka yap', 'espri', 'komik'], c: ['Bilgisayarlar neden meyve yemez? Çünkü Apple\'ları zaten var! 😄'] }
      ];
    }
    cevapVer(m) {
      const tokens = this.nlp.tokenize(m);
      let cevap = "Anlayamadım, ama kendimi geliştirmeye devam ediyorum. Başka bir şey sormak ister misin?";
      
      for(const n of this.niyetler) {
        if(n.k.some(anahtar => m.toLowerCase().includes(anahtar))) {
            cevap = n.c[Math.floor(Math.random() * n.c.length)];
            break;
        }
      }
      this.baglam.push({u: m, b: cevap});
      return { cevap };
    }
    gecmisiTemizle() { this.baglam = []; }
  }

  return { SohbetBotu };
})();

// ============================================================
// 🚀 UYGULAMA MANTIĞI (Frontend Bridge)
// ============================================================
let bot;
const inputEl = document.getElementById('user-input');
const chatFlow = document.getElementById('chat-flow');

function startApp() {
    const name = document.getElementById('login-name').value.trim();
    if(!name) { alert("Lütfen adınızı girin!"); return; }
    
    document.getElementById('user-display-name').innerText = name;
    document.getElementById('user-icon').innerText = name[0].toUpperCase();
    document.getElementById('login-screen').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        bot = new TuncerZeka.SohbetBotu({ isim: "Tuncer" });
        addMessage("bot", "Merhaba " + name + "! Ben Tuncer Zeka. Senin için ne yapabilirim?");
    }, 500);
}

function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = `msg-bubble ${role}`;
    const icon = role === "bot" ? "fa-robot" : "fa-user";
    const imgClass = role === "bot" ? "bot-img" : "user-img";
    
    div.innerHTML = `
        <div class="inner-msg">
            <div class="avatar ${imgClass}"><i class="fas ${icon} text-[10px]"></i></div>
            <div class="text-sm leading-relaxed">${text}</div>
        </div>
    `;
    chatFlow.appendChild(div);
    chatFlow.scrollTop = chatFlow.scrollHeight;
}

function handleSend() {
    const val = inputEl.value.trim();
    if(!val || !bot) return;

    addMessage("user", val);
    inputEl.value = "";
    inputEl.style.height = "auto";

    // Bot simülasyonu
    setTimeout(() => {
        const res = bot.cevapVer(val);
        addMessage("bot", res.cevap);
    }, 500);
}

function resetChat() {
    chatFlow.innerHTML = "";
    if(bot) bot.gecmisiTemizle();
    addMessage("bot", "Sohbet sıfırlandı. Yeni bir başlangıca ne dersin?");
}

// Input Otomatik Büyüme ve Enter Kontrolü
inputEl.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = (this.scrollHeight) + 'px';
});

inputEl.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleSend();
    }
});

</script>
</body>
</html>
