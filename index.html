<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuncer Zeka Vision v2 - Ahmet Tuncer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Rajdhani', sans-serif;
            background-color: #000;
            color: #06b6d4;
            overflow: hidden;
        }

        /* Arka Kamera Katmanı */
        #video-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: -2;
            filter: brightness(0.6) contrast(1.1);
        }

        .hud-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.5) 100%);
            border: 15px solid rgba(6, 182, 212, 0.1);
            pointer-events: none;
            z-index: -1;
        }

        .scan-line {
            position: absolute;
            width: 100%; height: 4px;
            background: linear-gradient(transparent, #06b6d4, transparent);
            box-shadow: 0 0 20px #06b6d4;
            top: 0;
            display: none;
            z-index: 5;
        }

        @keyframes scanning {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .is-scanning .scan-line {
            display: block;
            animation: scanning 1.5s ease-in-out infinite;
        }

        /* AI Core Mini HUD */
        .core-mini {
            width: 70px; height: 70px;
            position: relative;
        }
        .ring { position: absolute; border-radius: 50%; border: 2px solid #06b6d4; width: 100%; height: 100%; transition: 0.3s; }
        .ring-1 { animation: spin 4s linear infinite; border-top-color: transparent; }
        .ring-2 { width: 70%; height: 70%; top: 15%; left: 15%; animation: spin-rev 3s linear infinite; border-bottom-color: transparent; border-left-color: transparent; }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-rev { 100% { transform: rotate(-360deg); } }

        .terminal-box {
            background: rgba(0, 15, 25, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(6, 182, 212, 0.2);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #canvas-capture { display: none; }
    </style>
</head>
<body class="flex flex-col justify-between p-6">
    <video id="video-bg" autoplay playsinline muted></video>
    <canvas id="canvas-capture"></canvas>
    <div class="hud-overlay"></div>
    <div id="scan-line-el" class="scan-line"></div>

    <!-- Header -->
    <div class="flex justify-between items-start z-10">
        <div class="flex items-center gap-3">
            <div id="ai-core" class="core-mini">
                <div class="ring ring-1"></div>
                <div class="ring ring-2"></div>
                <div class="absolute inset-0 flex items-center justify-center">
                    <div id="core-light" class="w-3 h-3 bg-cyan-400 rounded-full shadow-[0_0_15px_#06b6d4]"></div>
                </div>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-wider leading-none">TUNCER ZEKA</h1>
                <p class="text-[10px] text-cyan-500 uppercase tracking-[0.2em] opacity-80">Görsel İşlem Birimi: Aktif</p>
            </div>
        </div>
        <div class="text-right">
            <p class="text-[10px] opacity-60 uppercase">Baş Tasarımcı</p>
            <p class="text-sm font-bold text-white tracking-widest uppercase">Ahmet Tuncer</p>
        </div>
    </div>

    <!-- Terminal -->
    <div class="flex-1 flex flex-col justify-end items-center mb-6 z-10">
        <div id="status-tag" class="mb-4 px-3 py-1 border border-cyan-500 text-[10px] tracking-widest bg-cyan-500/20 hidden animate-pulse">SİSTEM TARAMA YAPIYOR...</div>
        <div class="terminal-box w-full max-w-lg p-4 rounded-xl overflow-hidden min-h-[120px] relative">
            <div id="chat-log" class="text-sm font-medium leading-snug h-28 overflow-y-auto pr-2 scrollbar-hide">
                <span class="text-cyan-600 font-bold">[SİSTEM]:</span> Ahmet Bey, Tuncer Zeka Vision v2 bağlantısı kuruldu. Arka kameranız aktif. Size nasıl yardımcı olabilirim?
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div class="flex justify-center items-center gap-6 z-10 pb-6">
        <button id="mic-btn" class="w-20 h-20 rounded-full bg-cyan-900/30 border border-cyan-500/50 flex items-center justify-center text-cyan-400 shadow-[0_0_30px_rgba(6,182,212,0.2)] hover:scale-105 transition-all active:scale-95 relative group">
            <div class="absolute inset-0 rounded-full border-2 border-cyan-400 opacity-0 group-active:opacity-100 animate-ping"></div>
            <i id="mic-icon" class="fas fa-microphone text-2xl"></i>
        </button>
    </div>

    <script>
        const apiKey = ""; // API anahtarı boş bırakıldı, ortamdan alınacak
        const video = document.getElementById('video-bg');
        const canvas = document.getElementById('canvas-capture');
        const chatLog = document.getElementById('chat-log');
        const statusTag = document.getElementById('status-tag');
        const micBtn = document.getElementById('mic-btn');
        const micIcon = document.getElementById('mic-icon');
        const coreLight = document.getElementById('core-light');

        let synth = window.speechSynthesis;
        let isProcessing = false;

        // Kamera Başlatma
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: "environment",
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });
                video.srcObject = stream;
                addLog("SİSTEM", "Kamera protokolü doğrulandı.");
            } catch (err) {
                addLog("SİSTEM", "HATA: Kamera erişimi sağlanamadı.");
            }
        }

        function addLog(sender, msg) {
            const div = document.createElement('div');
            div.className = "mb-2 animate-in fade-in slide-in-from-left-2 duration-300";
            div.innerHTML = `<span class="text-cyan-600 font-bold uppercase text-[10px] mr-1">[${sender}]:</span> <span class="opacity-90">${msg}</span>`;
            chatLog.prepend(div);
        }

        // Sesli Yanıt
        function speak(text) {
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'tr-TR';
            utter.rate = 1.0;
            utter.pitch = 0.95;
            addLog("TUNCER ZEKA", text);
            synth.speak(utter);
        }

        // Görüntü Yakala
        function captureFrame() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            return canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
        }

        // Pollinations.ai (Hata Yönetimli)
        async function fetchPollinations(text) {
            const prompt = `Sen Ahmet Tuncer'in tasarladığı Tuncer Zeka'sın. Jarvis gibi kibar ve zeki ol. Kısa cevap ver. Soru: ${text}`;
            try {
                const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(prompt)}`);
                if (!response.ok) throw new Error("Pollinations yoğunluğu.");
                return await response.text();
            } catch (e) {
                console.warn("Pollinations hatası, yedek sisteme geçiliyor...");
                return null;
            }
        }

        // Gemini Vision (Görsel Analiz)
        async function analyzeVision(userPrompt) {
            isProcessing = true;
            document.body.classList.add('is-scanning');
            statusTag.classList.remove('hidden');
            coreLight.classList.replace('bg-cyan-400', 'bg-yellow-400');

            const base64Image = captureFrame();
            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{
                    parts: [
                        { text: `Sen Tuncer Zeka'sın. Ahmet Tuncer yaratıcın. Kameradan gelen bu görüntüyü analiz et. Soruyu cevapla: ${userPrompt}. Teknik, zeki ve kısa bir cevap ver.` },
                        { inlineData: { mimeType: "image/jpeg", data: base64Image } }
                    ]
                }]
            };

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Görüntüyü anlamlandıramadım Efendim.";
                speak(aiText);
            } catch (err) {
                speak("Görsel veri aktarımı sırasında bir kesinti oluştu Ahmet Bey.");
            } finally {
                document.body.classList.remove('is-scanning');
                statusTag.classList.add('hidden');
                coreLight.classList.replace('bg-yellow-400', 'bg-cyan-400');
                isProcessing = false;
            }
        }

        // Ana İşleyici
        async function processInput(text) {
            const lowerText = text.toLowerCase();
            const isVisual = lowerText.includes("bak") || lowerText.includes("tara") || lowerText.includes("ne var") || lowerText.includes("parça") || lowerText.includes("gör");

            if (isVisual) {
                await analyzeVision(text);
            } else {
                const polliRes = await fetchPollinations(text);
                if (polliRes) {
                    speak(polliRes);
                } else {
                    // Pollinations hata verirse Gemini ile devam et (metin olarak)
                    await analyzeVision(text + " (Görseli de dikkate alarak cevapla)");
                }
            }
        }

        // Speech Recognition
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'tr-TR';
            
            recognition.onstart = () => {
                micIcon.className = "fas fa-spinner fa-spin text-2xl text-emerald-400";
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                addLog("AHMET TUNCER", transcript);
                processInput(transcript);
            };

            recognition.onend = () => {
                micIcon.className = "fas fa-microphone text-2xl";
            };

            micBtn.addEventListener('click', () => {
                if (!isProcessing) recognition.start();
            });
        } else {
            addLog("SİSTEM", "Tarayıcınız ses tanımayı desteklemiyor.");
        }

        window.onload = initCamera;
    </script>
</body>
</html>
