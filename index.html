<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuncer Zeka</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Genel Ayarlar ve Renk Paleti */
        :root {
            --bg-color: #343541;
            --sidebar-bg: #202123;
            --message-bot-bg: #444654;
            --text-color: #ececf1;
            --input-bg: #40414f;
            --border-color: rgba(255,255,255,0.1);
            --hover-color: #2A2B32;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Yan Menü (Sidebar) */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            padding: 10px;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .new-chat-btn {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 12px;
            border-radius: 6px;
            text-align: left;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        .new-chat-btn:hover {
            background-color: var(--hover-color);
            transform: scale(1.02);
        }

        /* Ana Sohbet Alanı */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 120px; /* Input alanı için boşluk */
            scroll-behavior: smooth;
        }

        /* Mesaj Balonları ve Animasyonları */
        .message {
            padding: 24px;
            display: flex;
            gap: 20px;
            justify-content: center;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            animation: fadeIn 0.5s ease forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.bot {
            background-color: var(--message-bot-bg);
        }

        .message-content {
            max-width: 800px;
            width: 100%;
            display: flex;
            gap: 20px;
            line-height: 1.6;
            font-size: 16px;
        }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .user .avatar {
            background-color: #10a37f;
        }

        .bot .avatar {
            background-color: #19c37d; /* Tuncer Zeka ikon rengi */
        }

        /* Input (Giriş) Alanı */
        .input-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 24px;
            background: linear-gradient(180deg, rgba(53,55,64,0), var(--bg-color) 40%);
            display: flex;
            justify-content: center;
        }

        .input-box {
            max-width: 800px;
            width: 100%;
            position: relative;
            background-color: var(--input-bg);
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
            transition: box-shadow 0.3s ease;
        }

        .input-box:focus-within {
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            border-color: rgba(255,255,255,0.2);
        }

        .input-box input {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            padding: 16px 50px 16px 16px;
            font-size: 16px;
            outline: none;
        }

        .input-box input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .send-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .send-btn:hover {
            color: white;
            background-color: var(--message-bot-bg);
        }

        /* Responsive Tasarım */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <button class="new-chat-btn">
            <i class="fas fa-plus"></i> Yeni Sohbet
        </button>
    </aside>

    <main class="chat-main">
        <div class="chat-messages" id="chat-container">
            
            <div class="message bot">
                <div class="message-content">
                    <div class="avatar"><i class="fas fa-robot"></i></div>
                    <div class="text">Merhaba! Ben Tuncer Zeka. Sana nasıl yardımcı olabilirim?</div>
                </div>
            </div>

            </div>

        <div class="input-container">
            <div class="input-box">
                <input type="text" id="chat-input" placeholder="Tuncer Zeka'ya mesaj gönder..." autocomplete="off">
                <button class="send-btn" id="send-button">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </main>

    <script src="tuncer-zeka.js"></script>

</body>
</html>
