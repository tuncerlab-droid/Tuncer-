<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNCER HOLO AR v4.8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.7.0/build/index.module.js",
                "three-bvh-csg": "https://unpkg.com/three-bvh-csg@0.0.16/build/index.module.js"
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Share Tech Mono', monospace; color: #0ff; }
        #ar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }
        .interactive { pointer-events: auto !important; }
        #overlay-start { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a0a0a; z-index: 1001; pointer-events: auto; }
        #overlay-ui { display: none; width: 100%; height: 100%; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        .hud-border { background: rgba(0, 15, 25, 0.9); border: 1px solid #0ff; box-shadow: 0 0 15px rgba(0, 255, 255, 0.2); }
        .btn-holo { background: rgba(0, 30, 30, 0.9); border: 1px solid #0ff; color: #0ff; padding: 12px 5px; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .btn-holo:active { background: #0ff; color: #000; }
        #ARButton { position: static !important; background: #004444 !important; border: 1px solid #0ff !important; color: #0ff !important; padding: 15px 30px !important; font-family: 'Share Tech Mono' !important; margin-top: 20px !important;}
        #hidden-canvas { display: none; }
    </style>
</head>
<body>

    <canvas id="hidden-canvas"></canvas>
    <div id="canvas-container"></div>

    <div id="ar-overlay">
        <div id="overlay-start">
            <div class="text-center border border-cyan-500 p-8 bg-black/90">
                <h1 class="text-3xl font-bold mb-2 text-cyan-400 italic">TUNCER v4.8</h1>
                <p class="text-[10px] tracking-widest text-cyan-700 mb-6 font-bold uppercase">Enhanced Capture & Hand Engine</p>
                <div id="button-container" class="interactive"></div>
            </div>
        </div>

        <div id="overlay-ui" class="flex flex-col h-full pointer-events-none">
            <div class="flex justify-between w-full interactive mt-2">
                <div class="hud-border p-2 w-48">
                    <div id="status-text" class="text-yellow-500 text-[10px] font-bold italic">SİSTEM: BAŞLIYOR...</div>
                    <div id="hand-text" class="text-gray-500 text-[9px] mt-1 font-bold">AI: EL BEKLENİYOR</div>
                </div>
                <div id="rot-indicator" class="hud-border px-3 py-1 flex items-center">
                    <span id="rotation-text" class="text-cyan-500 text-[10px] font-bold italic">AÇI: 0°</span>
                </div>
            </div>

            <div class="mt-auto mb-6 flex flex-col gap-3 w-full">
                <div class="hud-border p-2 h-16 w-full overflow-hidden text-[9px] opacity-80" id="console">
                    <div class="text-green-400 font-bold">> Off-screen capture aktif.</div>
                    <div class="text-cyan-300">> Koordinat esleme yuklendi.</div>
                </div>
                
                <div class="grid grid-cols-2 gap-2 w-full interactive">
                    <button id="add-cube" class="btn-holo">KÜP EKLE</button>
                    <button id="add-hole" class="btn-holo border-red-500 text-red-500">DELİK EKLE</button>
                    <button id="do-merge" class="btn-holo border-yellow-500 text-yellow-500">KES / BİRLEŞTİR</button>
                    <button id="do-clear" class="btn-holo border-white text-white">TEMİZLE</button>
                </div>
            </div>
        </div>
    </div>

<script type="module">
import * as THREE from 'three';
import { ARButton } from 'three/addons/webxr/ARButton.js';
import { SUBTRACTION, Brush, Evaluator } from 'three-bvh-csg';

let scene, camera, renderer, reticle;
let hitTestSource = null, hitTestSourceRequested = false;
let objects = [], holeObjects = [];
let isGrabbing = false, selectedObject = null;

// El Takibi Yardımcı Elemanları
const hCanvas = document.getElementById('hidden-canvas');
const hCtx = hCanvas.getContext('2d');
let handLandmarks = null;
const pinchPointWorld = new THREE.Vector3();
let initialHandRotation = 0;
let initialObjRotation = 0;
let lastProcessTime = 0;

const hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 0,
    minDetectionConfidence: 0.45,
    minTrackingConfidence: 0.45
});

hands.onResults((results) => {
    handLandmarks = (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) ? results.multiHandLandmarks[0] : null;
    const hText = document.getElementById('hand-text');
    if (handLandmarks) {
        hText.textContent = "AI: EL AKTİF";
        hText.className = "text-green-400 text-[9px] mt-1 font-bold";
    } else {
        hText.textContent = "AI: EL ARANIYOR";
        hText.className = "text-yellow-500 text-[9px] mt-1 font-bold";
    }
});

function log(m, err = false) {
    const d = document.createElement('div');
    d.textContent = `> ${m}`;
    d.className = err ? 'text-red-500 font-bold' : 'text-cyan-400 font-bold';
    const consoleDiv = document.getElementById('console');
    consoleDiv.appendChild(d);
    if(consoleDiv.childNodes.length > 5) consoleDiv.removeChild(consoleDiv.firstChild);
}

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

    renderer = new THREE.WebGLRenderer({ 
        antialias: true, 
        alpha: true,
        preserveDrawingBuffer: true 
    });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 2.0));
    const dl = new THREE.DirectionalLight(0xffffff, 1.2);
    dl.position.set(1, 10, 1);
    scene.add(dl);

    const arBtn = ARButton.createButton(renderer, {
        requiredFeatures: ['hit-test'],
        optionalFeatures: ['dom-overlay'],
        domOverlay: { root: document.getElementById('ar-overlay') }
    });
    document.getElementById('button-container').appendChild(arBtn);

    reticle = new THREE.Mesh(
        new THREE.RingGeometry(0.04, 0.05, 32).rotateX(-Math.PI/2),
        new THREE.MeshBasicMaterial({ color: 0x00ffff })
    );
    reticle.matrixAutoUpdate = false;
    reticle.visible = false;
    scene.add(reticle);

    renderer.xr.addEventListener('sessionstart', () => {
        document.getElementById('overlay-start').style.display = 'none';
        document.getElementById('overlay-ui').style.display = 'flex';
        
        // Canvas boyutlarını ayarla
        hCanvas.width = renderer.domElement.width;
        hCanvas.height = renderer.domElement.height;
        log("Sistem Aktif.");
    });

    renderer.setAnimationLoop(render);
}

// AR Karesini Yakala ve Analiz Et
async function processHandFrame() {
    if (!renderer.xr.isPresenting) return;
    
    const now = performance.now();
    if (now - lastProcessTime < 80) return; // ~12 FPS
    lastProcessTime = now;

    try {
        // Ham WebGL karesini 2D canvas'a aktar (MediaPipe için daha okunabilir format)
        hCtx.drawImage(renderer.domElement, 0, 0);
        await hands.send({ image: hCanvas });
    } catch (e) {}
}

function handleHandLogic() {
    if (!handLandmarks) return;

    const wrist = handLandmarks[0];
    const thumb = handLandmarks[4];
    const index = handLandmarks[8];
    const middleRoot = handLandmarks[9];

    // Pinch mesafesi
    const dist = Math.sqrt(Math.pow(thumb.x - index.x, 2) + Math.pow(thumb.y - index.y, 2));

    // Koordinat Eşleme (Kamera görüntüsü ile Three.js dünyası arasında)
    const nx = (thumb.x * 2) - 1;
    const ny = -(thumb.y * 2) + 1;
    pinchPointWorld.set(nx, ny, 0.5).unproject(camera);

    // Rotasyon Analizi
    const angle = Math.atan2(middleRoot.y - wrist.y, middleRoot.x - wrist.x);
    document.getElementById('rotation-text').textContent = `AÇI: ${Math.round(angle * (180/Math.PI))}°`;

    if (!isGrabbing) {
        let nearest = null;
        let minDist = 0.3;
        [...objects, ...holeObjects].forEach(obj => {
            const d = obj.position.distanceTo(pinchPointWorld);
            if (d < minDist) { minDist = d; nearest = obj; }
        });

        // Ekranda kıstırma yapıldığında (Thumb-Index yakınlaştığında)
        if (nearest && dist < 0.08) {
            isGrabbing = true;
            selectedObject = nearest;
            initialHandRotation = angle;
            initialObjRotation = selectedObject.rotation.y;
            log("Obje Yakalandı.");
            document.getElementById('rot-indicator').classList.add('bg-cyan-900/50');
        }
    } else {
        if (dist > 0.15) {
            isGrabbing = false;
            selectedObject = null;
            log("Obje Bırakıldı.");
            document.getElementById('rot-indicator').classList.remove('bg-cyan-900/50');
        } else if (selectedObject) {
            // Hareket ve Rotasyon Uygulama
            selectedObject.position.lerp(pinchPointWorld, 0.3);
            const rDiff = angle - initialHandRotation;
            selectedObject.rotation.y = initialObjRotation - rDiff * 2.5;
        }
    }
}

function spawn(isHole) {
    if(!reticle.visible) return log("Zemin araniyor...", true);
    const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(0.1, 0.1, 0.1),
        new THREE.MeshStandardMaterial({
            color: isHole ? 0xff4444 : 0x00ffff,
            transparent: true, opacity: isHole ? 0.7 : 1.0,
            emissive: isHole ? 0x220000 : 0x002222
        })
    );
    mesh.position.setFromMatrixPosition(reticle.matrix);
    mesh.translateY(0.05);
    scene.add(mesh);
    if(isHole) holeObjects.push(mesh); else objects.push(mesh);
}

function mergeCSG() {
    if(!objects.length || !holeObjects.length) return log("Obje/Delik eksik!", true);
    try {
        const evaluator = new Evaluator();
        let mainObj = objects[0];
        let mainBrush = new Brush(mainObj.geometry, mainObj.material);
        mainBrush.position.copy(mainObj.position);
        mainBrush.rotation.copy(mainObj.rotation);
        mainBrush.updateMatrixWorld();

        holeObjects.forEach(h => {
            const hBrush = new Brush(h.geometry, h.material);
            hBrush.position.copy(h.position);
            hBrush.rotation.copy(h.rotation);
            hBrush.updateMatrixWorld();
            mainBrush = evaluator.evaluate(mainBrush, hBrush, SUBTRACTION);
            scene.remove(h);
        });

        scene.remove(mainObj);
        const result = new THREE.Mesh(mainBrush.geometry, mainBrush.material);
        result.position.copy(mainObj.position);
        result.rotation.copy(mainObj.rotation);
        scene.add(result);
        objects = [result];
        holeObjects = [];
        log("Kesme Tamamlandi.");
    } catch(e) { log("Islem Hatasi!", true); }
}

function render(t, frame) {
    if (frame) {
        const refSpace = renderer.xr.getReferenceSpace();
        if (!hitTestSourceRequested) {
            renderer.xr.getSession().requestReferenceSpace('viewer').then(s => {
                renderer.xr.getSession().requestHitTestSource({ space: s }).then(src => hitTestSource = src);
            });
            hitTestSourceRequested = true;
        }
        if (hitTestSource) {
            const hits = frame.getHitTestResults(hitTestSource);
            if (hits.length) {
                const pose = hits[0].getPose(refSpace);
                reticle.visible = true;
                reticle.matrix.fromArray(pose.transform.matrix);
                document.getElementById('status-text').textContent = "SİSTEM: HAZIR";
                document.getElementById('status-text').className = "text-green-400 text-[10px] font-bold";
            } else {
                reticle.visible = false;
            }
        }
        
        processHandFrame();
        handleHandLogic();
    }
    renderer.render(scene, camera);
}

window.onload = init;
document.getElementById('add-cube').onclick = () => spawn(false);
document.getElementById('add-hole').onclick = () => spawn(true);
document.getElementById('do-merge').onclick = mergeCSG;
document.getElementById('do-clear').onclick = () => {
    [...objects, ...holeObjects].forEach(o => scene.remove(o));
    objects = []; holeObjects = [];
    log("Ekran temizlendi.");
};
</script>
</body>
</html>
