<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Sahne - Tuncer Holo Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        canvas { display: block; position: fixed; inset: 0; }
        
        /* Kamera Katmanı */
        #video-el {
            position: fixed; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        
        /* Three.js Canvas */
        #three-canvas { z-index: 1; pointer-events: none; }

        /* HUD Arayüzü */
        #hud {
            position: fixed; inset: 0;
            z-index: 2;
            pointer-events: none;
            display: flex; flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            color: #00f2ff;
        }

        .ui-btn {
            pointer-events: auto;
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid #00f2ff;
            color: #00f2ff;
            padding: 10px 20px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            font-weight: bold;
            text-transform: uppercase;
        }

        #start-overlay {
            position: fixed; inset: 0;
            z-index: 10;
            background: #000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: #00f2ff;
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h2>TUNCER HOLO V4</h2>
        <button class="ui-btn" onclick="startSystem()" style="margin-top: 20px;">SİSTEMİ BAŞLAT</button>
    </div>

    <video id="video-el" autoplay playsinline muted></video>
    <canvas id="three-canvas"></canvas>

    <div id="hud" style="display:none;">
        <div style="display: flex; justify-content: space-between;">
            <div id="status">SİSTEM: AKTİF</div>
            <div id="fps">FPS: --</div>
        </div>
        
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button class="ui-btn" onclick="addNewShape('cube')">KÜP EKLE</button>
            <button class="ui-btn" onclick="addNewShape('sphere')">KÜRE EKLE</button>
            <button class="ui-btn" onclick="resetScene()">TEMİZLE</button>
        </div>
    </div>

    <!-- Three.js ve MediaPipe Kütüphaneleri -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        let scene, camera, renderer, clock;
        let shapes = [];
        let mpHands;

        function init() {
            // 1. Sahne Oluşturma (Senin kodun altyapısı)
            scene = new THREE.Scene();

            // 2. Kamera Düzeltmesi (Senin kodun)
            const aspect = window.innerWidth / window.innerHeight;
            camera = new THREE.PerspectiveCamera(75, aspect, 0.1, 1000);
            camera.position.set(0, 1, 4);

            // 3. Renderer Ayarları (Alpha:true ile arka planı şeffaf yaptık)
            renderer = new THREE.WebGLRenderer({ 
                canvas: document.getElementById('three-canvas'),
                antialias: true,
                alpha: true 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            // 4. Işıklandırma (Senin kodun geliştirildi)
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(1, 1, 2).normalize();
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040, 2));

            clock = new THREE.Clock();
            window.addEventListener('resize', onWindowResize, false);
            
            animate();
        }

        // El Takibi Başlatma
        async function initHandTracking() {
            const video = document.getElementById('video-el');
            
            mpHands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            mpHands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.6,
                minTrackingConfidence: 0.6
            });

            mpHands.onResults((results) => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const tip = results.multiHandLandmarks[0][8]; // İşaret parmağı ucu
                    moveLastObject(tip.x, tip.y);
                }
            });

            const cameraUtils = new Camera(video, {
                onFrame: async () => { await mpHands.send({image: video}); },
                width: 640, height: 480
            });
            cameraUtils.start();
        }

        function moveLastObject(x, y) {
            if (shapes.length === 0) return;
            
            // Ekran koordinatlarını 3D dünyaya çevirme
            const lastObj = shapes[shapes.length - 1];
            const targetX = (x * 2 - 1) * 2.5;
            const targetY = -(y * 2 - 1) * 2;
            
            // Yumuşak takip (Lerp)
            lastObj.position.x += (targetX - lastObj.position.x) * 0.1;
            lastObj.position.y += (targetY - lastObj.position.y) * 0.1;
        }

        function addNewShape(type) {
            let geo;
            if(type === 'cube') geo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
            else geo = new THREE.SphereGeometry(0.5, 32, 32);

            const mat = new THREE.MeshStandardMaterial({ 
                color: 0x00f2ff, 
                wireframe: true,
                transparent: true,
                opacity: 0.8
            });

            const mesh = new THREE.Mesh(geo, mat);
            scene.add(mesh);
            shapes.push(mesh);
        }

        function resetScene() {
            shapes.forEach(s => scene.remove(s));
            shapes = [];
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getElapsedTime();
            
            shapes.forEach((s, i) => {
                s.rotation.y += 0.01;
                s.rotation.x += 0.005;
                // Hafif hologram efekti (yüzme)
                s.position.y += Math.sin(delta + i) * 0.002;
            });

            renderer.render(scene, camera);
        }

        async function startSystem() {
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('hud').style.display = 'flex';
            
            init();

            // Kamerayı başlat
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                document.getElementById('video-el').srcObject = stream;
                initHandTracking();
            } catch (err) {
                console.error("Kamera açılamadı:", err);
                alert("Kamera izni gerekiyor!");
            }
        }
    </script>
</body>
</html>
