<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tuncer AR v39.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-overlay { 
            position: absolute; inset: 0; pointer-events: none; z-index: 10; 
            display: flex; flex-direction: column; justify-content: space-between; padding: 20px; 
        }
        .hud { 
            background: rgba(0, 15, 30, 0.9); border-left: 4px solid #00e5ff; 
            padding: 15px; border-radius: 10px; color: #00e5ff; font-family: monospace; 
            font-size: 12px; align-self: flex-end; backdrop-filter: blur(8px);
        }
        #start-screen { 
            position: fixed; inset: 0; background: #050505; z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: white; font-family: monospace;
        }
        #btn-go { 
            background: linear-gradient(135deg, #00e5ff, #0099ff); color: #000; 
            font-weight: 900; padding: 18px 50px; border-radius: 12px; border: none; 
            cursor: pointer; font-size: 18px; box-shadow: 0 0 30px rgba(0, 229, 255, 0.4); 
            pointer-events: auto; text-transform: uppercase;
        }
        #status-hint { 
            align-self: center; margin-bottom: 60px; background: rgba(0, 229, 255, 0.2); 
            padding: 10px 20px; border-radius: 25px; color: #00e5ff; border: 1px solid #00e5ff;
            font-size: 12px; font-family: monospace; font-weight: bold;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js"
            }
        }
    </script>
</head>
<body>

    <div id="start-screen">
        <h1 style="color:#00e5ff; font-size: 30px; font-weight: 900; margin-bottom:5px;">TUNCER MARK-III</h1>
        <p style="color:#555; margin-bottom:40px; font-size:11px; letter-spacing:1px;">STABLE VISUAL ENGINE</p>
        <button id="btn-go">SİSTEMİ BAŞLAT</button>
    </div>

    <div id="ui-overlay" style="display: none;">
        <div class="hud">
            DURUM: <span id="status-text" style="color:#fff;">AKTİF</span><br>
            EL_MOTORU: <span id="hand-text" style="color:#ff3366;">ARANIYOR</span><br>
            ETKİLEŞİM: <span id="pinch-text" style="color:#fff;">BOŞTA</span>
        </div>
        <div id="status-hint">YÜZEY TARANIYOR...</div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, reticle;
        let hitTestSource = null, hitTestSourceRequested = false;
        let objects = [], selectedObject = null;
        let isPinching = false;
        let handCursorGroup, cursorDot, cursorRing;
        let lastHandProcess = 0;

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const lm = results.multiHandLandmarks[0];
                const indexTip = lm[8];
                const thumbTip = lm[4];

                document.getElementById('hand-text').innerText = "KİLİTLENDİ";
                document.getElementById('hand-text').style.color = "#00ffcc";

                const vector = new THREE.Vector3((1 - indexTip.x) * 2 - 1, -indexTip.y * 2 + 1, 0.5);
                vector.unproject(camera);
                const dir = vector.sub(camera.position).normalize();
                const pos = camera.position.clone().add(dir.multiplyScalar(0.35));
                
                handCursorGroup.visible = true;
                handCursorGroup.position.copy(pos);
                handCursorGroup.lookAt(camera.position);

                const dist = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y);
                if (dist < 0.06) {
                    document.getElementById('pinch-text').innerText = "TUTUYOR";
                    cursorRing.material.color.setHex(0x00ffcc);
                    cursorRing.scale.set(0.7, 0.7, 0.7);
                    if (!isPinching) {
                        isPinching = true;
                        objects.forEach(obj => { if(obj.position.distanceTo(pos) < 0.12) selectedObject = obj; });
                    }
                    if (selectedObject) selectedObject.position.lerp(pos, 0.2);
                } else {
                    isPinching = false; selectedObject = null;
                    document.getElementById('pinch-text').innerText = "BOŞTA";
                    cursorRing.material.color.setHex(0xff3366);
                    cursorRing.scale.set(1, 1, 1);
                }
            } else {
                handCursorGroup.visible = false;
                document.getElementById('hand-text').innerText = "ARANIYOR";
                document.getElementById('hand-text').style.color = "#ff3366";
            }
        });

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            // preserveDrawingBuffer kritik: MediaPipe'ın canvas'tan veri okuyabilmesi için
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.2));

            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.03, 0.04, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x00e5ff })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            handCursorGroup = new THREE.Group();
            cursorDot = new THREE.Mesh(new THREE.SphereGeometry(0.005, 12, 12), new THREE.MeshBasicMaterial({ color: 0x00e5ff }));
            cursorRing = new THREE.Mesh(new THREE.RingGeometry(0.012, 0.015, 32), new THREE.MeshBasicMaterial({ color: 0xff3366, side: THREE.DoubleSide }));
            handCursorGroup.add(cursorDot, cursorRing);
            handCursorGroup.visible = false;
            scene.add(handCursorGroup);

            document.getElementById('btn-go').addEventListener('click', async () => {
                try {
                    const session = await navigator.xr.requestSession('immersive-ar', {
                        requiredFeatures: ['hit-test'],
                        optionalFeatures: ['dom-overlay'],
                        domOverlay: { root: document.getElementById('ui-overlay') }
                    });
                    renderer.xr.setSession(session);
                    
                    document.getElementById('start-screen').style.display = 'none';
                    document.getElementById('ui-overlay').style.display = 'flex';
                    renderer.setAnimationLoop(render);
                } catch (e) {
                    alert("Başlatma Hatası: " + e.message);
                }
            });
        }

        window.addEventListener('pointerdown', (e) => {
            if (reticle.visible && e.target.id !== 'btn-go') {
                const cube = new THREE.Mesh(
                    new THREE.BoxGeometry(0.1, 0.1, 0.1),
                    new THREE.MeshStandardMaterial({ color: 0x0088aa, transparent: true, opacity: 0.7 })
                );
                cube.position.setFromMatrixPosition(reticle.matrix);
                scene.add(cube);
                objects.push(cube);
            }
        });

        function render(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                // ÇAKIŞMAYI ÖNLEYEN DÜZELTME: 
                // Ayrı video kanalı açmak yerine, render edilen canvası MediaPipe'a gönderiyoruz.
                // Bu sayede kamera görüntüsü WebXR tarafından sağlanırken el takibi de çalışır.
                if (timestamp - lastHandProcess > 60) {
                    hands.send({ image: renderer.domElement });
                    lastHandProcess = timestamp;
                }

                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then(s => {
                        session.requestHitTestSource({ space: s }).then(src => hitTestSource = src);
                    });
                    hitTestSourceRequested = true;
                }
                if (hitTestSource) {
                    const results = frame.getHitTestResults(hitTestSource);
                    if (results.length > 0) {
                        reticle.visible = true;
                        reticle.matrix.fromArray(results[0].getPose(referenceSpace).transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }
            }
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
