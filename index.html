<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tuncer 3D - Sabit AR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/DeviceOrientationControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .pointer-events-auto { pointer-events: auto; }
        .input_video { display: none; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #3b82f6; cursor: pointer; margin-top: -6px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: #cbd5e1; border-radius: 2px; }
    </style>
</head>
<body>

    <div id="loading" class="fixed inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center text-white text-center p-6">
        <h1 class="text-3xl font-bold mb-4 text-blue-400">Tuncer 3D Sabit AR</h1>
        <p class="mb-6">Objelerin uzayda sabit kalması için sensör ve kamera izni gereklidir.</p>
        <button id="btn-start" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-10 rounded-full shadow-lg pointer-events-auto transition-transform active:scale-95">
            BAŞLAT
        </button>
    </div>

    <video class="input_video" autoplay playsinline></video>
    <div id="canvas-container"></div>

    <div id="ui-layer" class="flex flex-col justify-between p-4">
        <div class="flex justify-between items-start pointer-events-auto">
            <div class="bg-white/90 backdrop-blur rounded-xl p-3 shadow-lg border border-slate-200">
                <h1 class="text-xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-cyan-500">Tuncer 3D</h1>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Sabit Uzay Modu</p>
            </div>
        </div>

        <!-- Özellikler Paneli -->
        <div id="properties-panel" class="absolute right-4 top-1/2 -translate-y-1/2 bg-white/90 backdrop-blur rounded-xl p-4 shadow-xl border border-slate-200 w-48 pointer-events-auto hidden">
            <h3 class="font-bold text-slate-800 mb-3 border-b pb-1">Ayarlar</h3>
            <div class="mb-3">
                <div class="flex gap-2">
                    <button id="btn-solid" class="flex-1 bg-blue-500 text-white text-[10px] py-1 rounded shadow">KATI</button>
                    <button id="btn-hole" class="flex-1 bg-slate-200 text-slate-700 text-[10px] py-1 rounded">BOŞLUK</button>
                </div>
            </div>
            <div class="space-y-2 mb-3">
                <input type="range" id="scale-all" min="0.2" max="3" step="0.1" value="1">
                <label class="text-[10px] font-bold text-slate-500 text-center block">ÖLÇEK</label>
            </div>
            <button id="btn-delete" class="w-full bg-red-500 text-white text-xs font-bold py-2 rounded shadow">SİL</button>
        </div>

        <!-- Alt Araçlar -->
        <div class="pointer-events-auto flex justify-center gap-4 mt-auto pb-4">
            <button onclick="addShape('cube')" class="bg-white rounded-2xl p-4 shadow-xl border-2 border-blue-100 flex flex-col items-center active:scale-95 transition-transform">
                <div class="w-6 h-6 bg-blue-500 rounded-sm mb-1"></div>
                <span class="text-[10px] font-bold">KÜP</span>
            </button>
            <button onclick="addShape('sphere')" class="bg-white rounded-2xl p-4 shadow-xl border-2 border-green-100 flex flex-col items-center active:scale-95 transition-transform">
                <div class="w-6 h-6 bg-green-500 rounded-full mb-1"></div>
                <span class="text-[10px] font-bold">KÜRE</span>
            </button>
            <button onclick="addShape('cylinder')" class="bg-white rounded-2xl p-4 shadow-xl border-2 border-orange-100 flex flex-col items-center active:scale-95 transition-transform">
                <div class="w-6 h-6 bg-orange-500 rounded-sm mb-1" style="border-radius: 50% 50% 0 0"></div>
                <span class="text-[10px] font-bold">SİLİNDİR</span>
            </button>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls, videoTexture;
        let objects = [], selectedObject = null, isPinching = false;
        let raycaster = new THREE.Raycaster();
        let cursor;

        const mats = {
            cube: new THREE.MeshStandardMaterial({ color: 0x3b82f6 }),
            sphere: new THREE.MeshStandardMaterial({ color: 0x22c55e }),
            cylinder: new THREE.MeshStandardMaterial({ color: 0xf97316 }),
            hole: new THREE.MeshStandardMaterial({ color: 0xff4444, transparent: true, opacity: 0.3, wireframe: true }),
            selected: new THREE.MeshStandardMaterial({ color: 0xffcc00, emissive: 0x444400 })
        };

        document.getElementById('btn-start').addEventListener('click', async () => {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const permission = await DeviceOrientationEvent.requestPermission();
                if (permission !== 'granted') return alert("Sensör izni şart!");
            }
            document.getElementById('loading').style.display = 'none';
            init();
        });

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const video = document.querySelector('.input_video');
            videoTexture = new THREE.VideoTexture(video);
            scene.background = videoTexture;

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(5, 10, 7);
            scene.add(sun);

            // JİROSKOP KONTROLÜ (Uzayda sabitleme için en kritik nokta)
            controls = new THREE.DeviceOrientationControls(camera);

            // EL İMLECİ (Sarı Nokta)
            cursor = new THREE.Mesh(
                new THREE.SphereGeometry(0.05, 16, 16),
                new THREE.MeshBasicMaterial({ color: 0xffff00, depthTest: false })
            );
            scene.add(cursor);

            initHands();
            animate();
        }

        window.addShape = function(type) {
            let geo;
            if (type === 'cube') geo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            else if (type === 'sphere') geo = new THREE.SphereGeometry(0.3, 32, 32);
            else geo = new THREE.CylinderGeometry(0.3, 0.3, 0.6, 32);

            const mat = mats[type].clone();
            const mesh = new THREE.Mesh(geo, mat);
            
            // Objeyi tam karşına, dünyaya sabitle
            const dir = new THREE.Vector3(0, 0, -2.5).applyQuaternion(camera.quaternion);
            mesh.position.copy(camera.position.clone().add(dir));
            mesh.userData = { type, originalMat: mat, isHole: false };

            scene.add(mesh);
            objects.push(mesh);
            select(mesh);
        };

        function select(obj) {
            if (selectedObject && selectedObject !== obj) {
                selectedObject.material = selectedObject.userData.isHole ? mats.hole : selectedObject.userData.originalMat;
            }
            selectedObject = obj;
            if (obj) {
                if(!obj.userData.isHole) obj.material = mats.selected;
                document.getElementById('properties-panel').classList.remove('hidden');
            } else {
                document.getElementById('properties-panel').classList.add('hidden');
            }
        }

        function initHands() {
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
            
            hands.onResults(results => {
                if (results.multiHandLandmarks && results.multiHandLandmarks[0]) {
                    const lm = results.multiHandLandmarks[0];
                    const index = lm[8];
                    const thumb = lm[4];

                    // ESKİ KODUN EL TAKİBİ MANTIĞI (Arka kamera için optimize edildi)
                    // Arka kamerada X'i ters çevirmiyoruz (1 - x yapmıyoruz)
                    const ndcX = (index.x * 2) - 1; 
                    const ndcY = -(index.y * 2) + 1;

                    raycaster.setFromCamera({ x: ndcX, y: ndcY }, camera);
                    
                    // İmleci kameradan 2.5 birim uzağa yansıt
                    raycaster.ray.at(2.5, cursor.position);

                    const dist = Math.hypot(index.x - thumb.x, index.y - thumb.y);
                    if (dist < 0.05) { // Pinch (Çimdik)
                        if (!isPinching) {
                            isPinching = true;
                            cursor.scale.set(1.5, 1.5, 1.5);
                            const hits = raycaster.intersectObjects(objects);
                            if (hits.length > 0) select(hits[0].object);
                        } else if (selectedObject) {
                            selectedObject.position.lerp(cursor.position, 0.2);
                        }
                    } else {
                        isPinching = false;
                        cursor.scale.set(1, 1, 1);
                    }
                }
            });

            new Camera(document.querySelector('.input_video'), {
                onFrame: async () => await hands.send({ image: document.querySelector('.input_video') }),
                facingMode: 'environment'
            }).start();
        }

        // UI Eventleri
        document.getElementById('btn-delete').onclick = () => { if(selectedObject) { scene.remove(selectedObject); objects = objects.filter(o => o !== selectedObject); select(null); }};
        document.getElementById('scale-all').oninput = (e) => { if(selectedObject) { const s = parseFloat(e.target.value); selectedObject.scale.set(s,s,s); }};
        document.getElementById('btn-hole').onclick = () => { if(selectedObject) { selectedObject.userData.isHole = true; selectedObject.material = mats.hole; }};
        document.getElementById('btn-solid').onclick = () => { if(selectedObject) { selectedObject.userData.isHole = false; selectedObject.material = mats.selected; }};

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update(); // Dünyada sabitlemeyi sağlayan döngü
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
