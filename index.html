<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNCER HOLO - Onarılmış AR v3.2</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.7.0/build/index.module.js",
                "three-bvh-csg": "https://unpkg.com/three-bvh-csg@0.0.16/build/index.module.js"
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Share Tech Mono', monospace;
            color: #0ff;
            user-select: none;
            touch-action: none;
        }

        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #000; 
            z-index: 1000;
        }

        #ui-overlay {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            display: none;
            flex-direction: column;
            justify-content: space-between;
            padding: 1rem;
            pointer-events: none;
            z-index: 2000;
        }

        .hud-panel {
            pointer-events: auto;
            background: rgba(0, 15, 20, 0.85);
            border: 1px solid #0ff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
            backdrop-filter: blur(8px);
        }

        .btn-holo {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #0ff;
            color: #0ff;
            text-transform: uppercase;
            font-size: 11px;
            font-weight: bold;
            transition: all 0.2s;
        }
        
        .btn-holo:active {
            background: rgba(0, 255, 255, 0.4);
            transform: scale(0.95);
        }

        /* Çalışan butonun tasarımı */
        #ARButton {
            position: absolute !important;
            bottom: 20% !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            padding: 20px 40px !important;
            background: #004444 !important;
            border: 2px solid #0ff !important;
            color: #0ff !important;
            font-family: 'Share Tech Mono', monospace !important;
            font-size: 20px !important;
            letter-spacing: 2px !important;
            border-radius: 4px !important;
            cursor: pointer !important;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.4) !important;
            z-index: 9999 !important;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="start-screen">
        <h1 class="text-4xl font-bold text-cyan-400 mb-4 tracking-tighter">TUNCER HOLO</h1>
        <p class="text-xs text-cyan-700 animate-pulse uppercase">Sistemleri Başlatmak İçin Alttaki Butona Basın</p>
    </div>

    <div id="ui-overlay">
        <div class="flex justify-between items-start w-full">
            <div class="hud-panel p-3 rounded w-1/2">
                <div class="text-white text-xs font-bold mb-1">HOLO INTERFACE</div>
                <div id="sys-status" class="text-[10px] text-yellow-500">Zemin Bekleniyor...</div>
                <div id="hand-status" class="text-[10px] text-cyan-500">El Takibi: Pasif</div>
            </div>
            <div class="hud-panel p-2 rounded">
                <div class="text-[10px] text-green-400 font-bold">LIVE AR</div>
            </div>
        </div>

        <div class="flex justify-between items-end w-full gap-2">
            <div class="hud-panel p-2 rounded h-24 w-1/2 overflow-hidden flex flex-col justify-end text-[9px]" id="log-console">
                <div class="text-cyan-800">> Sistem Onarıldı.</div>
            </div>
            <div class="hud-panel p-2 rounded grid grid-cols-2 gap-2 w-1/2">
                <button id="btn-cube" class="btn-holo py-3 rounded">KÜP</button>
                <button id="btn-hole" class="btn-holo py-3 rounded border-red-500 text-red-500">DELİK</button>
                <button id="btn-merge" class="btn-holo py-3 rounded border-yellow-500 text-yellow-500">MERGE</button>
                <button id="btn-delete" class="btn-holo py-3 rounded text-red-400">SİL</button>
            </div>
        </div>
    </div>

<script type="module">
import * as THREE from 'three';
import { ARButton } from 'three/addons/webxr/ARButton.js';
import { XRHandModelFactory } from 'three/addons/webxr/XRHandModelFactory.js';
import { SUBTRACTION, Brush, Evaluator } from 'three-bvh-csg';

const logConsole = document.getElementById('log-console');
const sysStatus = document.getElementById('sys-status');
const handStatus = document.getElementById('hand-status');
const uiOverlay = document.getElementById('ui-overlay');
const startScreen = document.getElementById('start-screen');

let scene, camera, renderer, reticle;
let hitTestSource = null, hitTestSourceRequested = false;
let objects = [], holeObjects = [], selectedObject = null;
let hand0, handModel0; 
let isGrabbing = false;

function log(msg, err = false) {
    const d = document.createElement('div');
    d.textContent = `> ${msg}`;
    d.className = err ? 'text-red-500' : 'text-cyan-400';
    logConsole.appendChild(d);
    if(logConsole.childNodes.length > 5) logConsole.removeChild(logConsole.firstChild);
}

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1.2));
    const light = new THREE.DirectionalLight(0xffffff, 1.0);
    light.position.set(0, 10, 5);
    scene.add(light);

    const arBtn = ARButton.createButton(renderer, {
        requiredFeatures: ['hit-test'],
        optionalFeatures: ['dom-overlay', 'hand-tracking'],
        domOverlay: { root: uiOverlay }
    });
    document.body.appendChild(arBtn);

    // El Takibi Onarımı
    const handModelFactory = new XRHandModelFactory();
    hand0 = renderer.xr.getHand(0);
    handModel0 = handModelFactory.createHandModel(hand0, "spheres");
    hand0.add(handModel0);
    scene.add(hand0);

    hand0.addEventListener('pinchstart', () => {
        isGrabbing = true;
        findTarget();
    });
    hand0.addEventListener('pinchend', () => {
        isGrabbing = false;
        if(selectedObject) selectedObject.material.emissive.setHex(0x000000);
        selectedObject = null;
    });

    // Zemin Algılama (Reticle) Onarımı
    reticle = new THREE.Mesh(
        new THREE.RingGeometry(0.06, 0.07, 32).rotateX(-Math.PI/2),
        new THREE.MeshBasicMaterial({ color: 0x00ffff })
    );
    reticle.matrixAutoUpdate = false;
    reticle.visible = false;
    scene.add(reticle);

    renderer.xr.addEventListener('sessionstart', () => {
        startScreen.style.display = 'none';
        uiOverlay.style.display = 'flex';
        log("Holografik Sistem Başlatıldı.");
    });

    renderer.setAnimationLoop(render);
}

function findTarget() {
    const indexTip = hand0.joints['index-finger-tip'];
    if (!indexTip) return;
    const handPos = new THREE.Vector3().setFromMatrixPosition(indexTip.matrixWorld);
    let closest = null;
    let dist = 0.25;
    [...objects, ...holeObjects].forEach(obj => {
        const d = obj.position.distanceTo(handPos);
        if (d < dist) { dist = d; closest = obj; }
    });
    if (closest) {
        selectedObject = closest;
        selectedObject.material.emissive.setHex(0x003333);
        log("Obje Tutuldu.");
    }
}

function updateGrab() {
    if (!selectedObject) return;
    const indexTip = hand0.joints['index-finger-tip'];
    const thumbTip = hand0.joints['thumb-tip'];
    if (indexTip && thumbTip) {
        const p1 = new THREE.Vector3().setFromMatrixPosition(indexTip.matrixWorld);
        const p2 = new THREE.Vector3().setFromMatrixPosition(thumbTip.matrixWorld);
        const targetPos = new THREE.Vector3().lerpVectors(p1, p2, 0.5);
        selectedObject.position.lerp(targetPos, 0.3);
    }
}

function add(isHole = false) {
    if (!reticle.visible) return log("Zemin Bekleniyor...", true);
    const geo = new THREE.BoxGeometry(0.12, 0.12, 0.12);
    const mat = new THREE.MeshStandardMaterial({
        color: isHole ? 0xff4444 : 0x00ccff,
        transparent: true, opacity: isHole ? 0.6 : 1.0,
        emissive: 0x000000
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.setFromMatrixPosition(reticle.matrix);
    mesh.quaternion.setFromRotationMatrix(reticle.matrix);
    mesh.translateY(0.06);
    scene.add(mesh);
    if (isHole) holeObjects.push(mesh); else objects.push(mesh);
    log(isHole ? "Delik Nesnesi Eklendi." : "Küp Nesnesi Eklendi.");
}

function merge() {
    if (objects.length < 1 || holeObjects.length < 1) return log("Yetersiz Nesne!", true);
    const evaluator = new Evaluator();
    let base = objects[0];
    let baseBrush = new Brush(base.geometry, base.material);
    baseBrush.position.copy(base.position);
    baseBrush.quaternion.copy(base.quaternion);
    baseBrush.updateMatrixWorld();

    holeObjects.forEach(h => {
        const hBrush = new Brush(h.geometry, h.material);
        hBrush.position.copy(h.position);
        hBrush.quaternion.copy(h.quaternion);
        hBrush.updateMatrixWorld();
        baseBrush = evaluator.evaluate(baseBrush, hBrush, SUBTRACTION);
        scene.remove(h);
    });
    scene.remove(base);
    const res = new THREE.Mesh(baseBrush.geometry, baseBrush.material);
    res.position.copy(base.position);
    res.quaternion.copy(base.quaternion);
    scene.add(res);
    objects = [res]; holeObjects = [];
    log("Birleştirme Tamam.");
}

function render(timestamp, frame) {
    if (frame) {
        const ref = renderer.xr.getReferenceSpace();
        const session = renderer.xr.getSession();
        
        if (!hitTestSourceRequested) {
            session.requestReferenceSpace('viewer').then(s => {
                session.requestHitTestSource({ space: s }).then(src => hitTestSource = src);
            });
            hitTestSourceRequested = true;
        }

        if (hitTestSource) {
            const results = frame.getHitTestResults(hitTestSource);
            if (results.length) {
                reticle.visible = true;
                reticle.matrix.fromArray(results[0].getPose(ref).transform.matrix);
                sysStatus.textContent = "SİSTEM: Zemin Hazır";
            } else {
                reticle.visible = false;
                sysStatus.textContent = "SİSTEM: Zemin Aranıyor...";
            }
        }

        let handActive = false;
        for (const input of session.inputSources) {
            if (input.hand) handActive = true;
        }
        handStatus.textContent = handActive ? "El Takibi: Aktif" : "El Takibi: Bekleniyor";

        if (isGrabbing) updateGrab();
    }
    renderer.render(scene, camera);
}

window.addEventListener('load', init);
document.getElementById('btn-cube').onclick = () => add(false);
document.getElementById('btn-hole').onclick = () => add(true);
document.getElementById('btn-merge').onclick = merge;
document.getElementById('btn-delete').onclick = () => {
    const all = [...objects, ...holeObjects];
    if (all.length) {
        const t = all.pop();
        scene.remove(t);
        objects = objects.filter(o => o !== t);
        holeObjects = holeObjects.filter(o => o !== t);
        log("Nesne Silindi.");
    }
};
</script>
</body>
</html>
