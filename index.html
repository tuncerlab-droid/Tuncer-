<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuncer Zeka V3 - Ahmet Tuncer Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap');

        :root {
            --cyan: #00f3ff;
            --bg-dark: rgba(2, 8, 12, 0.9);
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Share Tech Mono', monospace;
            color: var(--cyan);
        }

        #camera-feed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -2;
        }

        .hud-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, transparent 30%, var(--bg-dark) 100%);
            z-index: -1;
            pointer-events: none;
        }

        /* Jarvis Arc Reactor Animation */
        .core-wrap {
            position: relative;
            width: 140px;
            height: 140px;
            cursor: pointer;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid var(--cyan);
            inset: 0;
            box-shadow: 0 0 15px var(--cyan);
        }

        .ring-1 { animation: rotate 4s linear infinite; border-style: double; }
        .ring-2 { inset: 15px; border-style: dashed; animation: rotate-rev 3s linear infinite; opacity: 0.6; }
        
        .core-btn {
            position: absolute;
            inset: 35px;
            background: var(--cyan);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 1.5rem;
            box-shadow: 0 0 30px var(--cyan);
            transition: 0.3s;
        }

        .listening .core-btn {
            animation: pulse 0.8s infinite alternate;
            background: #fff;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rotate-rev { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.15); } }

        .scan-bar {
            position: absolute;
            width: 100%;
            height: 2px;
            background: var(--cyan);
            box-shadow: 0 0 20px var(--cyan);
            top: -10%;
            display: none;
        }

        .scanning .scan-bar {
            display: block;
            animation: scanMove 2s infinite ease-in-out;
        }

        @keyframes scanMove { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }

        .chat-container {
            height: 180px;
            background: rgba(0, 30, 40, 0.5);
            border: 1px solid var(--cyan);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="flex flex-col h-screen">

    <video id="camera-feed" autoplay muted playsinline></video>
    <div class="hud-overlay"></div>
    <div class="scan-bar" id="scan-bar"></div>

    <!-- Header -->
    <header class="p-4 flex justify-between z-10">
        <div>
            <h1 class="text-xl font-bold tracking-tighter" style="font-family: Orbitron">TUNCER <span class="text-white">ZEKA</span></h1>
            <p class="text-[10px] opacity-70 uppercase">Ahmet Tuncer | Veri Aktarımı: Stabil</p>
        </div>
        <div class="text-right text-[10px]">
            <p id="status-text">SİSTEM HAZIR</p>
            <p id="clock">00:00:00</p>
        </div>
    </header>

    <!-- Main -->
    <main class="flex-1 flex flex-col items-center justify-center z-10">
        <div class="core-wrap" id="main-btn" onclick="startRecognition()">
            <div class="ring ring-1"></div>
            <div class="ring ring-2"></div>
            <div class="core-btn">
                <i class="fas fa-microchip"></i>
            </div>
        </div>
        <p class="mt-6 text-[10px] tracking-widest opacity-60 uppercase" id="hint-text">Bay Ahmet, emirlerinizi bekliyorum</p>
    </main>

    <!-- Console -->
    <footer class="p-4 z-10">
        <div class="chat-container rounded p-3 overflow-y-auto text-xs" id="log-box">
            <p class="text-gray-400">[SİSTEM] Tuncer Zeka V3.0 yükleniyor...</p>
            <p class="text-gray-400">[SİSTEM] Kullanıcı: Ahmet Tuncer Tanımlandı.</p>
        </div>
    </footer>

    <script>
        // --- GLOBAL CONFIG ---
        const API_BASE = "https://text.pollinations.ai/";
        let isWorking = false;
        const logBox = document.getElementById('log-box');
        const hintText = document.getElementById('hint-text');

        // --- CAMERA ---
        async function startCam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById('camera-feed').srcObject = stream;
            } catch (e) {
                addLog("SİSTEM", "Kamera erişimi engellendi.", "text-red-500");
            }
        }

        // --- CLOCK ---
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('tr-TR');
        }, 1000);

        // --- SPEECH RECOGNITION ---
        function startRecognition() {
            if (isWorking) return;
            
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) {
                addLog("HATA", "Tarayıcı desteklemiyor.");
                return;
            }

            const rec = new Speech();
            rec.lang = 'tr-TR';
            
            rec.onstart = () => {
                document.getElementById('main-btn').classList.add('listening');
                hintText.innerText = "Sizi Dinliyorum Efendim...";
                window.speechSynthesis.cancel();
            };

            rec.onresult = (e) => {
                const text = e.results[0][0].transcript;
                processQuery(text);
            };

            rec.onerror = () => {
                document.getElementById('main-btn').classList.remove('listening');
                hintText.innerText = "Bağlantı kesildi, tekrar deneyin.";
            };

            rec.onend = () => {
                document.getElementById('main-btn').classList.remove('listening');
            };

            rec.start();
        }

        // --- PROCESS QUERY ---
        async function processQuery(query) {
            isWorking = true;
            addLog("AHMET TUNCER", query, "text-green-400");
            hintText.innerText = "Düşünüyorum...";

            // Eğer "tara", "bak" gibi kelimeler varsa tarama modunu aç
            const isScanning = /tara|bak|ne var|gör|incele/.test(query.toLowerCase());
            if (isScanning) {
                document.body.classList.add('scanning');
                addLog("SİSTEM", "Optik sensörler aktifleşiyor...", "text-yellow-500");
            }

            try {
                // Stabil GET Metodu
                const systemPrompt = "Sen Tuncer Zeka'sın. Tasarımcın Ahmet Tuncer. Kısa ve havalı cevap ver.";
                const encodedQuery = encodeURIComponent(`${systemPrompt} Kullanıcı dedi ki: ${query}`);
                
                // Fetch işlemi - GET isteği hata payı en düşüktür
                const response = await fetch(`${API_BASE}${encodedQuery}?model=openai&cache=false`);
                
                if (!response.ok) throw new Error("API Hatası");

                const result = await response.text();
                
                addLog("TUNCER ZEKA", result, "text-cyan-400");
                speak(result);

            } catch (err) {
                addLog("HATA", "Bağlantı kurulamadı. Tekrar deneyin.", "text-red-500");
            } finally {
                isWorking = false;
                document.body.classList.remove('scanning');
                hintText.innerText = "Emirlerinizi bekliyorum Bay Tuncer";
            }
        }

        // --- VOICE ---
        function speak(text) {
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'tr-TR';
            ut.rate = 1.0;
            window.speechSynthesis.speak(ut);
        }

        // --- LOG HELPERS ---
        function addLog(who, msg, color = "text-white") {
            const p = document.createElement('p');
            p.innerHTML = `<span class="opacity-50">[${who}]</span> <span class="${color}">${msg}</span>`;
            logBox.appendChild(p);
            logBox.scrollTop = logBox.scrollHeight;
        }

        window.onload = startCam;
    </script>
</body>
</html>
