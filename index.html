<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tuncer Web OS - Mark 6</title>
    
    <!-- Kütüphaneler: Sıralama Değiştirilmemeli -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r150/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/examples/js/controls/TransformControls.js"></script>

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #input_video {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; z-index: -1;
            transform: scaleX(-1);
        }

        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10; display: none;
        }

        .hud-panel {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0, 20, 40, 0.85);
            border-left: 4px solid #00e5ff;
            padding: 15px; color: #00e5ff;
            pointer-events: auto; border-radius: 0 10px 10px 0;
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.4);
        }

        h1 { margin: 0; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; }
        .status { display: flex; align-items: center; margin-top: 8px; font-size: 10px; }
        .indicator { width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; background: #ff3366; transition: 0.3s; }
        .active { background: #00ffcc; box-shadow: 0 0 10px #00ffcc; }

        #start-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #00e5ff, #00b0ff); color: #000; 
            border: none; padding: 25px 50px; font-size: 18px;
            font-weight: 900; border-radius: 50px; cursor: pointer; pointer-events: auto;
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.6); z-index: 100;
            transition: 0.3s;
        }
        #start-btn:active { transform: translate(-50%, -50%) scale(0.9); }

        #controls {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; pointer-events: auto;
        }

        .btn-mode {
            background: rgba(0, 40, 80, 0.9); border: 2px solid #00e5ff; color: #00e5ff;
            padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: bold;
            font-size: 12px; text-transform: uppercase;
        }
        .btn-mode.selected { background: #00e5ff; color: #000; box-shadow: 0 0 15px #00e5ff; }
    </style>
</head>
<body>

    <video id="input_video" autoplay playsinline></video>
    <button id="start-btn">SİSTEMİ BAŞLAT</button>

    <div id="ui-overlay">
        <div class="hud-panel">
            <h1>TUNCER WEB OS v2.6</h1>
            <div class="status"><div id="ind-ar" class="indicator"></div> KAMERA</div>
            <div class="status"><div id="ind-hand" class="indicator"></div> EL TAKİBİ</div>
            <div class="status"><div id="ind-voice" class="indicator"></div> SES MODÜLÜ</div>
        </div>

        <div id="controls">
            <button class="btn-mode selected" id="m-trans">TAŞI</button>
            <button class="btn-mode" id="m-rot">DÖNDÜR</button>
            <button class="btn-mode" id="m-scale">ÖLÇEK</button>
            <button class="btn-mode" style="border-color: #ff3366; color: #ff3366;" id="m-del">SİL</button>
        </div>
    </div>

    <script>
        let scene, camera, renderer, transformControl;
        let objects = [];
        let handJoints = [];
        let recognition;

        const videoElement = document.getElementById('input_video');
        const startBtn = document.getElementById('start-btn');
        const uiOverlay = document.getElementById('ui-overlay');

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 1.2;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            const pLight = new THREE.PointLight(0x00e5ff, 2);
            pLight.position.set(2, 2, 2);
            scene.add(pLight);

            // El Eklemleri
            const jGeo = new THREE.SphereGeometry(0.012, 8, 8);
            const jMat = new THREE.MeshBasicMaterial({ color: 0x00e5ff });
            for (let i = 0; i < 21; i++) {
                const j = new THREE.Mesh(jGeo, jMat);
                j.visible = false;
                scene.add(j);
                handJoints.push(j);
            }

            // Transform Kontrolü
            transformControl = new THREE.TransformControls(camera, renderer.domElement);
            scene.add(transformControl);

            // Buton Atamaları
            document.getElementById('m-trans').onclick = () => setMode('translate', 'm-trans');
            document.getElementById('m-rot').onclick = () => setMode('rotate', 'm-rot');
            document.getElementById('m-scale').onclick = () => setMode('scale', 'm-scale');
            document.getElementById('m-del').onclick = deleteObj;

            window.addEventListener('resize', onResize);
            window.addEventListener('pointerdown', onSelect);

            startBtn.onclick = startAR;
        }

        function setMode(m, id) {
            transformControl.setMode(m);
            document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('selected'));
            document.getElementById(id).classList.add('selected');
        }

        function deleteObj() {
            if (transformControl.object) {
                const target = transformControl.object;
                transformControl.detach();
                scene.remove(target);
                objects = objects.filter(o => o !== target);
            }
        }

        function onSelect(e) {
            if (e.target.tagName === 'BUTTON') return;
            const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
            const ray = new THREE.Raycaster();
            ray.setFromCamera(mouse, camera);
            const hit = ray.intersectObjects(objects);
            if (hit.length > 0) transformControl.attach(hit[0].object);
        }

        async function startAR() {
            console.log("Sistem başlatılıyor...");
            startBtn.style.display = 'none';
            uiOverlay.style.display = 'block';
            document.getElementById('ind-ar').classList.add('active');

            try {
                const hands = new window.Hands({
                    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
                });

                hands.setOptions({
                    maxNumHands: 1,
                    modelComplexity: 1,
                    minDetectionConfidence: 0.5,
                    minTrackingConfidence: 0.5
                });

                hands.onResults(results => {
                    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                        document.getElementById('ind-hand').classList.add('active');
                        const pts = results.multiHandLandmarks[0];
                        pts.forEach((p, i) => {
                            const x = -(p.x - 0.5) * 2.2 * camera.aspect;
                            const y = -(p.y - 0.5) * 2.2;
                            const z = -p.z * 1.5;
                            handJoints[i].position.set(x, y, z);
                            handJoints[i].visible = true;
                        });
                    } else {
                        document.getElementById('ind-hand').classList.remove('active');
                        handJoints.forEach(j => j.visible = false);
                    }
                });

                const cam = new window.Camera(videoElement, {
                    onFrame: async () => { await hands.send({image: videoElement}); },
                    width: 1280, height: 720
                });
                
                await cam.start();
                initVoice();
                animate();
            } catch (err) {
                alert("Başlatma Hatası: " + err.message);
                startBtn.style.display = 'block';
            }
        }

        function initVoice() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) return;
            recognition = new SR();
            recognition.lang = 'tr-TR';
            recognition.continuous = true;
            recognition.onstart = () => document.getElementById('ind-voice').classList.add('active');
            recognition.onresult = (e) => {
                const msg = e.results[e.results.length-1][0].transcript.toLowerCase();
                if (msg.includes('küp') && msg.includes('ekle')) addObj();
                if (msg.includes('sil')) deleteObj();
            };
            recognition.onend = () => recognition.start();
            recognition.start();
        }

        function addObj() {
            const mesh = new THREE.Mesh(
                new THREE.BoxGeometry(0.2, 0.2, 0.2),
                new THREE.MeshStandardMaterial({ color: 0x00e5ff, transparent: true, opacity: 0.8, metalness: 0.6 })
            );
            mesh.position.set(0, 0, 0);
            scene.add(mesh);
            objects.push(mesh);
            transformControl.attach(mesh);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
