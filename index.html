```html
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tuncer Zeka (Llama 3)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        * { -webkit-tap-highlight-color: transparent; }
        body {
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .typing-indicator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #9ca3af;
            border-radius: 50%;
            margin-right: 4px;
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        #camera-modal {
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans h-screen flex flex-col overflow-hidden">

    <!-- Üst Bar -->
    <header class="bg-gray-900 border-b border-gray-800 p-4 flex justify-between items-center shadow-lg z-20">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-teal-400 to-blue-600 flex items-center justify-center shadow-[0_0_15px_rgba(45,212,191,0.3)]">
                <i class="fas fa-brain text-white text-xl"></i>
            </div>
            <div>
                <h1 class="font-bold text-lg leading-tight tracking-wide">Tuncer Zeka</h1>
                <p id="status-text" class="text-xs text-yellow-500 flex items-center gap-1 font-medium">
                    <i class="fas fa-circle-notch fa-spin"></i>
                    Ollama aranıyor...
                </p>
            </div>
        </div>
        <button onclick="toggleSettings()" class="text-gray-400 hover:text-white p-2 rounded-full bg-gray-800 active:scale-95 transition-transform">
            <i class="fas fa-sliders-h"></i>
        </button>
    </header>

    <!-- Ayarlar Paneli (Gizli) -->
    <div id="settings-panel" class="hidden absolute top-20 left-0 right-0 z-30 bg-gray-900 border-b border-gray-800 p-4 shadow-2xl">
        <div class="max-w-md mx-auto space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-400 mb-1">Yerel Ollama Adresi</label>
                <input type="text" id="api-url" value="http://127.0.0.1:11434" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-teal-500 transition-colors">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 mb-1">Kullanılacak Model Adı</label>
                <!-- Model adını llama3 olarak değiştirdim -->
                <input type="text" id="model-name" value="llama3" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-teal-500 transition-colors">
            </div>
            <p class="text-xs text-yellow-500 mt-2">
                <i class="fas fa-info-circle mr-1"></i>
                Not: "llama3" modeli resim işleyemez (vision değildir). Sadece metin sohbeti içindir. Kamerayı kullanmak isterseniz buraya "llava" veya "llama3.2-vision" yazmalısınız.
            </p>
            <button onclick="checkOllamaConnection()" class="w-full bg-gray-800 hover:bg-gray-700 text-white font-medium py-2 rounded-lg text-sm border border-gray-700 transition-colors mt-2">
                Bağlantıyı Test Et
            </button>
        </div>
    </div>

    <!-- Sohbet Ekranı -->
    <main id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-5 scroll-smooth pb-6">
        <!-- Başlangıç Mesajı -->
        <div class="flex flex-col items-center justify-center h-full text-center space-y-4 opacity-50" id="empty-state">
            <i class="fas fa-mobile-alt text-6xl text-gray-700"></i>
            <p class="text-sm max-w-[250px] text-gray-400">Telefonunda çalışan Llama 3 zekası. Bana bir soru sor!</p>
        </div>
    </main>

    <!-- Tam Ekran Kamera Arayüzü -->
    <div id="camera-modal" class="hidden fixed inset-0 z-50 bg-black flex flex-col justify-between">
        <div class="absolute top-0 left-0 right-0 p-6 flex justify-between items-center z-10 bg-gradient-to-b from-black/80 to-transparent">
            <button onclick="switchCamera()" class="w-12 h-12 bg-gray-800/60 rounded-full text-white flex items-center justify-center backdrop-blur-md active:scale-90 transition-transform">
                <i class="fas fa-sync-alt"></i>
            </button>
            <button onclick="closeCamera()" class="w-12 h-12 bg-gray-800/60 rounded-full text-white flex items-center justify-center backdrop-blur-md active:scale-90 transition-transform">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div class="relative w-full h-full overflow-hidden flex items-center justify-center bg-black">
            <video id="camera-stream" autoplay playsinline class="min-w-full min-h-full object-cover"></video>
            <div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-50">
                <div class="w-64 h-64 border-2 border-dashed border-white/50 rounded-3xl"></div>
            </div>
        </div>
        
        <div class="absolute bottom-0 left-0 right-0 p-8 flex justify-center items-center bg-gradient-to-t from-black/90 to-transparent z-10 pb-12">
            <button onclick="captureImage()" class="w-20 h-20 bg-white/20 rounded-full border-4 border-white flex items-center justify-center active:scale-90 transition-transform">
                <div class="w-16 h-16 bg-white rounded-full shadow-[0_0_20px_rgba(255,255,255,0.8)]"></div>
            </button>
        </div>
    </div>
    
    <canvas id="canvas" class="hidden"></canvas>

    <!-- Mesaj Gönderme Alanı -->
    <footer class="bg-gray-900 border-t border-gray-800 p-3 z-20 shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
        <div class="max-w-3xl mx-auto flex flex-col gap-3">
            
            <div id="image-preview-container" class="hidden relative inline-block w-fit ml-2">
                <div class="relative rounded-xl overflow-hidden border-2 border-teal-500 shadow-lg">
                    <img id="image-preview" src="" class="h-24 w-auto object-cover opacity-90">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent"></div>
                </div>
                <button onclick="removeImage()" class="absolute -top-3 -right-3 w-8 h-8 bg-red-500 rounded-full text-white flex items-center justify-center shadow-lg active:scale-90 transition-transform border-2 border-gray-900">
                    <i class="fas fa-trash-alt text-xs"></i>
                </button>
            </div>

            <div class="flex items-end gap-2 bg-gray-800 rounded-3xl p-1.5 shadow-inner border border-gray-700">
                
                <button onclick="handleCameraBtnClick()" class="w-12 h-12 rounded-full bg-gray-700 text-teal-400 flex items-center justify-center active:scale-90 transition-transform shrink-0">
                    <i class="fas fa-camera text-xl"></i>
                </button>
                
                <input type="file" id="file-input" accept="image/*" class="hidden" onchange="handleFileUpload(event)">
                <button onclick="handleGalleryBtnClick()" class="w-12 h-12 rounded-full text-gray-400 active:bg-gray-700 flex items-center justify-center transition-colors shrink-0">
                    <i class="fas fa-images text-xl"></i>
                </button>

                <textarea id="prompt-input" rows="1" class="flex-1 bg-transparent text-white px-2 py-3 text-[15px] focus:outline-none resize-none max-h-32 placeholder-gray-500 leading-snug" placeholder="Mesaj yaz..." oninput="autoResize(this)"></textarea>
                
                <button id="send-btn" onclick="sendMessage()" class="w-12 h-12 rounded-full bg-gradient-to-r from-teal-500 to-blue-500 text-white flex items-center justify-center active:scale-90 transition-transform shrink-0 shadow-lg disabled:opacity-50 disabled:grayscale">
                    <i class="fas fa-arrow-up text-lg"></i>
                </button>
            </div>
        </div>
    </footer>

    <script>
        let currentBase64Image = null;
        let isGenerating = false;
        let videoStream = null;
        let facingMode = 'environment';

        const chatContainer = document.getElementById('chat-container');
        const promptInput = document.getElementById('prompt-input');
        const sendBtn = document.getElementById('send-btn');
        const imgPreviewContainer = document.getElementById('image-preview-container');
        const imgPreview = document.getElementById('image-preview');
        const cameraModal = document.getElementById('camera-modal');
        const videoElement = document.getElementById('camera-stream');
        const canvasElement = document.getElementById('canvas');
        const statusText = document.getElementById('status-text');
        const emptyState = document.getElementById('empty-state');

        window.onload = () => {
            checkOllamaConnection();
        };

        function toggleSettings() {
            const panel = document.getElementById('settings-panel');
            panel.classList.toggle('hidden');
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = (textarea.scrollHeight < 120 ? textarea.scrollHeight : 120) + 'px';
        }

        async function checkOllamaConnection() {
            const apiUrl = document.getElementById('api-url').value;
            statusText.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Bağlanıyor...';
            statusText.className = "text-xs text-yellow-500 flex items-center gap-1 font-medium";

            try {
                const response = await fetch(`${apiUrl}/api/tags`);
                if (response.ok) {
                    statusText.innerHTML = '<span class="w-2 h-2 rounded-full bg-green-500 inline-block animate-pulse"></span> Yerel Zeka Aktif';
                    statusText.className = "text-xs text-green-400 flex items-center gap-1 font-medium";
                    document.getElementById('settings-panel').classList.add('hidden');
                } else {
                    throw new Error('API yanıt vermedi');
                }
            } catch (error) {
                statusText.innerHTML = '<i class="fas fa-times-circle"></i> Çevrimdışı';
                statusText.className = "text-xs text-red-500 flex items-center gap-1 font-medium";
            }
        }

        // --- Model Kontrolü ve Uyarı ---
        function isVisionModelSelected() {
            const modelName = document.getElementById('model-name').value.toLowerCase();
            // llava veya vision kelimesi geçiyorsa true
            return modelName.includes('llava') || modelName.includes('vision');
        }

        function showVisionWarning() {
            alert("Şu anki modeliniz resim işleyemez (Vision değil). Ayarlardan 'llava' gibi bir görüntü işleme modeli seçerseniz bu özelliği kullanabilirsiniz.");
        }

        function handleCameraBtnClick() {
            if (!isVisionModelSelected()) {
                showVisionWarning();
            } else {
                openCamera();
            }
        }

        function handleGalleryBtnClick() {
             if (!isVisionModelSelected()) {
                showVisionWarning();
            } else {
                document.getElementById('file-input').click();
            }
        }

        // --- KAMERA ---

        async function openCamera() {
            try {
                if (videoStream) {
                    videoStream.getTracks().forEach(track => track.stop());
                }
                
                const constraints = {
                    video: { 
                        facingMode: facingMode,
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    }
                };
                
                videoStream = await navigator.mediaDevices.getUserMedia(constraints);
                videoElement.srcObject = videoStream;
                cameraModal.classList.remove('hidden');
            } catch (err) {
                console.error("Kamera hatası:", err);
                alert("Kameraya erişilemedi!");
            }
        }

        function closeCamera() {
            cameraModal.classList.add('hidden');
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
        }

        function switchCamera() {
            facingMode = facingMode === 'environment' ? 'user' : 'environment';
            openCamera();
        }

        function captureImage() {
            if (!videoStream) return;
            
            const context = canvasElement.getContext('2d');
            const scale = Math.min(1024 / videoElement.videoWidth, 1024 / videoElement.videoHeight, 1);
            canvasElement.width = videoElement.videoWidth * scale;
            canvasElement.height = videoElement.videoHeight * scale;
            
            context.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);
            const dataUrl = canvasElement.toDataURL('image/jpeg', 0.8);
            
            setImage(dataUrl);
            closeCamera();
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                setImage(e.target.result);
            };
            reader.readAsDataURL(file);
        }

        function setImage(dataUrl) {
            currentBase64Image = dataUrl;
            imgPreview.src = dataUrl;
            imgPreviewContainer.classList.remove('hidden');
            promptInput.focus();
        }

        function removeImage() {
            currentBase64Image = null;
            imgPreview.src = '';
            imgPreviewContainer.classList.add('hidden');
            document.getElementById('file-input').value = '';
        }

        // --- SOHBET ---

        function appendMessage(role, text, imageUrl = null) {
            if (emptyState) emptyState.style.display = 'none';

            const wrapper = document.createElement('div');
            wrapper.className = `flex flex-col w-full max-w-3xl mx-auto mb-4 ${role === 'user' ? 'items-end' : 'items-start'}`;

            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = `px-5 py-3.5 text-[15px] shadow-sm max-w-[88%] break-words ${
                role === 'user' 
                ? 'bg-gradient-to-br from-teal-600 to-teal-500 rounded-3xl rounded-br-sm text-white' 
                : 'bg-gray-800 rounded-3xl rounded-tl-sm text-gray-100 border border-gray-700'
            }`;
            
            if (imageUrl) {
                const img = document.createElement('img');
                img.src = imageUrl;
                img.className = "w-full rounded-xl mb-3 object-cover max-h-64 shadow-inner bg-black";
                bubbleDiv.appendChild(img);
            }

            const textSpan = document.createElement('span');
            textSpan.className = "leading-relaxed";
            textSpan.innerHTML = text;
            bubbleDiv.appendChild(textSpan);

            wrapper.appendChild(bubbleDiv);
            chatContainer.appendChild(wrapper);

            setTimeout(() => {
                chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
            }, 50);

            return textSpan;
        }

        function showTypingIndicator() {
            const wrapper = document.createElement('div');
            wrapper.id = 'typing-indicator';
            wrapper.className = `flex flex-col items-start w-full max-w-3xl mx-auto mb-4`;
            
            wrapper.innerHTML = `
                <div class="bg-gray-800 rounded-3xl rounded-tl-sm px-5 py-4 shadow-sm border border-gray-700">
                    <div class="typing-indicator flex items-center h-2">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            chatContainer.appendChild(wrapper);
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        async function sendMessage() {
            if (isGenerating) return;
            
            const promptText = promptInput.value.trim();
            const imageToSend = currentBase64Image;

            if (!promptText && !imageToSend) return;

            appendMessage('user', promptText, imageToSend);
            
            promptInput.value = '';
            promptInput.style.height = 'auto';
            removeImage();
            
            isGenerating = true;
            sendBtn.disabled = true;
            showTypingIndicator();

            const apiUrl = document.getElementById('api-url').value;
            const modelName = document.getElementById('model-name').value;

            // Llama 3 için payload hazırlığı (sadece metin veya model destekliyorsa resim)
            const payload = {
                model: modelName,
                prompt: promptText || "Merhaba",
                stream: true
            };

            // Eğer resim eklendiyse (ve model vision destekliyorsa) payload'a ekle
            if (imageToSend) {
                const base64Data = imageToSend.split(',')[1];
                payload.images = [base64Data];
                // Eğer metin yoksa ve resim varsa
                if (!promptText) {
                     payload.prompt = "Bu fotoğrafta ne olduğunu detaylıca açıklar mısın?";
                }
            }

            try {
                const response = await fetch(`${apiUrl}/api/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                removeTypingIndicator();

                if (!response.ok) {
                    throw new Error('Ağ hatası: ' + response.status);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let assistantTextElement = appendMessage('assistant', '');
                let fullResponseText = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n').filter(line => line.trim() !== '');

                    for (const line of lines) {
                        try {
                            const data = JSON.parse(line);
                            if (data.response) {
                                fullResponseText += data.response;
                                assistantTextElement.innerHTML = fullResponseText.replace(/\n/g, '<br>');
                                chatContainer.scrollTop = chatContainer.scrollHeight;
                            }
                        } catch (e) {
                            console.error("Parse hatası:", e);
                        }
                    }
                }

            } catch (error) {
                removeTypingIndicator();
                console.error("Hata:", error);
                
                let hataMesaji = "Telefonundaki Ollama'ya ulaşılamıyor. Termux/iSH arka planda açık mı?";
                
                appendMessage('assistant', `
                    <div class="text-red-400 text-sm font-medium flex items-start gap-2">
                        <i class="fas fa-exclamation-triangle mt-1"></i>
                        <span>${hataMesaji}</span>
                    </div>
                `);
                
                statusText.innerHTML = '<i class="fas fa-times-circle"></i> Çevrimdışı';
                statusText.className = "text-xs text-red-500 flex items-center gap-1 font-medium";
            } finally {
                isGenerating = false;
                sendBtn.disabled = false;
                promptInput.focus();
            }
        }
    </script>
</body>
</html>
