<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuncer Zeka v2026 - Kontrol Paneli</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        h2 { color: var(--accent); margin-top: 0; font-size: 1.2rem; }
        textarea { width: 100%; height: 60px; background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 8px; box-sizing: border-box; }
        button { background: var(--accent); color: #0f172a; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%; }
        #nlp-output, #math-output { background: #000; padding: 10px; border-radius: 8px; margin-top: 10px; font-family: monospace; font-size: 0.9rem; color: #10b981; min-height: 40px; white-space: pre-wrap; }
        canvas { max-width: 100%; height: auto; border-radius: 8px; margin-top: 10px; background: #000; }
        select { width: 100%; padding: 8px; border-radius: 8px; background: #0f172a; color: white; border: 1px solid #334155; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; color: var(--accent);">TUNCER ZEKA v2026</h1>
    
    <div class="grid">
        <div class="card">
            <h2>Türkçe Dil İşleme</h2>
            <textarea id="nlp-input" placeholder="Nasılsın? Bugün çok mutluyum!"></textarea>
            <button onclick="analizEt()">Analiz Et</button>
            <div id="nlp-output">Sonuç bekliyor...</div>
        </div>

        <div class="card">
            <h2>Görsel Üretim</h2>
            <select id="render-type">
                <option value="manzara">Manzara Üret</option>
                <option value="fraktal">Mandelbrot Fraktalı</option>
                <option value="pixel">Pixel Art (Karakter)</option>
                <option value="soyut">Soyut Geometrik</option>
            </select>
            <button onclick="gorselUret()">Görsel Oluştur</button>
            <div id="canvas-container"></div>
        </div>

        <div class="card">
            <h2>Sistem Durumu</h2>
            <div id="memory-stats">Yükleniyor...</div>
            <button onclick="agiTestEt()">Sinir Ağını Test Et</button>
            <div id="math-output"></div>
        </div>
    </div>
</div>

<script src="tuncer2026.js"></script>

<script>
    // Kütüphane yüklendikten sonra nesneleri oluştur
    let nlp, ressam, bellek;

    window.onload = () => {
        try {
            nlp = new TurkceDilIsleme();
            ressam = new GorselUretim();
            bellek = new BellekSistemi();
            bellekYenile();
        } catch(e) {
            console.error("Kütüphane yüklenemedi:", e);
            alert("tuncer2026.js dosyası bulunamadı veya hatalı!");
        }
    };

    function analizEt() {
        const text = document.getElementById('nlp-input').value;
        if(!text) return;
        const duygu = nlp.duyguAnalizi(text);
        const niyet = nlp.niyetTespit(text);
        document.getElementById('nlp-output').innerText = 
            `Duygu: ${duygu.duygu}\nNiyet: ${niyet.niyet}\nSkor: ${duygu.skor}`;
        bellek.kisaSureliEkle(text);
        bellekYenile();
    }

    function gorselUret() {
        const tip = document.getElementById('render-type').value;
        const container = document.getElementById('canvas-container');
        container.innerHTML = ""; 
        let cvs;
        if(tip === 'manzara') cvs = ressam.manzaraUret(400, 250);
        else if(tip === 'fraktal') cvs = ressam.fraktalUret(400, 400);
        else if(tip === 'pixel') cvs = ressam.pixelArtUret(16, 16, 15);
        else cvs = ressam.soyutSanatUret(400, 400);
        container.appendChild(cvs);
    }

    function bellekYenile() {
        const s = bellek.istatistikler();
        document.getElementById('memory-stats').innerText = 
            `Kısa Süreli Bellek: ${s.kisaSureli}\nUzun Süreli: ${s.uzunSureli}\nDoluluk: ${s.kullanimOrani}`;
    }

    function agiTestEt() {
        const ag = new SinirAgi([2, 3, 1], 0.1);
        ag.topluEgit([{giris:[1,0], hedef:[1]}, {giris:[0,1], hedef:[1]}], 500);
        const sonuc = ag.tahminEt([1,0]);
        document.getElementById('math-output').innerText = `Sinir Ağı [1,0] Tahmini: ${sonuc[0].toFixed(4)}`;
    }
</script>

</body>
</html>
