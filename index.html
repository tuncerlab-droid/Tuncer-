<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuncer Zeka - AI Arayüzü</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --panel-border: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --user-msg: #3b82f6;
            --ai-msg: rgba(51, 65, 85, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        .glow-1 {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: 0;
            pointer-events: none;
        }

        .glow-2 {
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: 0;
            pointer-events: none;
        }

        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
            z-index: 1;
            padding: 20px;
            gap: 20px;
        }

        .sidebar {
            width: 300px;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .brand-text h1 {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-text p {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .version-selector {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 16px;
            padding: 8px;
            display: flex;
            position: relative;
            border: 1px solid var(--panel-border);
            margin-bottom: auto;
        }

        .version-btn {
            flex: 1;
            padding: 12px 0;
            text-align: center;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            position: relative;
            z-index: 2;
            transition: color 0.3s ease;
        }

        .version-btn.active {
            color: white;
        }

        .active-bg {
            position: absolute;
            top: 8px;
            bottom: 8px;
            left: 8px;
            width: calc(50% - 8px);
            background: var(--primary);
            border-radius: 10px;
            z-index: 1;
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .system-status {
            margin-top: auto;
            padding: 15px;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 16px;
            border: 1px solid var(--panel-border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #94a3b8;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .status-text {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .chat-area {
            flex: 1;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            position: relative;
        }

        .chat-header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(30, 41, 59, 0.4);
        }

        .header-title {
            font-weight: 600;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-title i {
            color: var(--primary);
        }

        .clear-btn {
            background: transparent;
            border: 1px solid var(--panel-border);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .clear-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.3);
        }

        .messages-container {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%;
            display: flex;
            flex-direction: column;
            gap: 5px;
            animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .message.user {
            align-self: flex-end;
        }

        .message.ai {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 16px 20px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.6;
            letter-spacing: 0.2px;
            word-wrap: break-word;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .user .message-bubble {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .ai .message-bubble {
            background: var(--ai-msg);
            color: var(--text-main);
            border: 1px solid var(--panel-border);
            border-bottom-left-radius: 4px;
        }

        pre {
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 10px 0;
            border: 1px solid rgba(255,255,255,0.1);
        }

        code {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            color: #e2e8f0;
        }

        .input-container {
            padding: 20px 30px;
            background: rgba(30, 41, 59, 0.6);
            border-top: 1px solid var(--panel-border);
        }

        .input-box {
            display: flex;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--panel-border);
            border-radius: 20px;
            padding: 8px 8px 8px 24px;
            transition: all 0.3s;
        }

        .input-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .send-btn {
            width: 45px;
            height: 45px;
            border-radius: 16px;
            background: var(--primary);
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 8px 12px;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body>

    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <div class="app-container">
        <div class="sidebar">
            <div class="brand">
                <div class="brand-icon"><i class="fa-solid fa-brain"></i></div>
                <div class="brand-text">
                    <h1>TUNCER AI</h1>
                    <p>Akıllı Asistan Arayüzü</p>
                </div>
            </div>

            <div class="version-selector">
                <div class="active-bg" id="activeBg"></div>
                <button class="version-btn" data-version="2023" onclick="switchVersion('2023')">v2023</button>
                <button class="version-btn active" data-version="2026" onclick="switchVersion('2026')">v2026</button>
            </div>

            <div class="system-status">
                <div class="status-dot" id="statusDot"></div>
                <div class="status-text">
                    Sistem Durumu <br>
                    <span style="font-size: 0.75rem; opacity: 0.7" id="engineStatus">Bekleniyor...</span>
                </div>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <div class="header-title">
                    <i class="fa-solid fa-microchip"></i>
                    <span id="currentEngineTitle">Tuncer Zeka 2026</span>
                </div>
                <button class="clear-btn" onclick="clearChat()">Temizle</button>
            </div>

            <div class="messages-container" id="chatBox">
                <div class="message ai">
                    <div class="message-bubble">Merhaba! Ben Tuncer Zeka. Nasıl yardımcı olabilirim?</div>
                </div>
            </div>

            <div class="input-container">
                <div class="input-box">
                    <input type="text" id="userInput" placeholder="Bir mesaj yazın..." autocomplete="off">
                    <button class="send-btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentVersion = '2026';
        let aiInstance = null;
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const engineStatus = document.getElementById('engineStatus');
        const statusDot = document.getElementById('statusDot');
        const currentEngineTitle = document.getElementById('currentEngineTitle');
        const activeBg = document.getElementById('activeBg');

        // Sayfa yüklendiğinde varsayılan motoru çalıştır
        window.onload = () => loadEngineScript('2026');

        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        function switchVersion(version) {
            if (currentVersion === version) return;
            currentVersion = version;
            document.querySelectorAll('.version-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.version === version));
            activeBg.style.transform = version === '2023' ? 'translateX(0)' : 'translateX(100%)';
            currentEngineTitle.innerHTML = `Tuncer Zeka ${version}`;
            loadEngineScript(version);
        }

        // --- GÖRÜNTÜDEKİ DOSYA YAPISINA GÖRE GÜNCELLENDİ ---
        function loadEngineScript(version) {
            aiInstance = null;
            engineStatus.innerText = `tuncer${version}.js aranıyor...`;
            statusDot.style.background = "#94a3b8";
            statusDot.style.animation = "none";

            const oldScript = document.getElementById('dynamic-engine');
            if (oldScript) oldScript.remove();

            const script = document.createElement('script');
            script.id = 'dynamic-engine';
            
            // Klasör yapındaki tam isimleri kullanıyoruz.
            // Önemli: Tarayıcı bazen cache tuttuğu için ?v= ekliyoruz.
            script.src = `tuncer${version}.js?nocache=${Date.now()}`;
            
            script.onload = () => {
                // Sınıfın tanımlanması için tarayıcıya süre tanı
                setTimeout(() => {
                    // Global scope'ta TuncerZeka sınıfını ara
                    const AIClass = window.TuncerZeka || (typeof TuncerZeka !== 'undefined' ? TuncerZeka : null);
                    
                    if (AIClass) {
                        try {
                            aiInstance = new AIClass();
                            engineStatus.innerText = `Motor (tuncer${version}.js) Aktif`;
                            statusDot.style.background = "#10b981";
                            statusDot.style.animation = "pulse 2s infinite";
                        } catch (e) {
                            engineStatus.innerText = "Sınıf başlatma hatası!";
                            statusDot.style.background = "#ef4444";
                        }
                    } else {
                        engineStatus.innerText = "Hata: TuncerZeka sınıfı bulunamadı!";
                        statusDot.style.background = "#ef4444";
                    }
                }, 250);
            };

            script.onerror = () => {
                engineStatus.innerText = `Kritik: tuncer${version}.js dosyası bulunamadı!`;
                statusDot.style.background = "#ef4444";
            };

            document.body.appendChild(script);
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            if (!aiInstance) {
                appendMessage("⚠️ Motor yüklü değil. Lütfen dosyanın klasörde ve isminin `tuncer" + currentVersion + ".js` olduğundan emin olun.", "ai");
                return;
            }

            appendMessage(text, 'user');
            userInput.value = '';
            const typingId = showTypingIndicator();

            try {
                // konus() metoduna gönder
                const response = await aiInstance.konus(text);
                const finalMsg = (typeof response === 'object' && response.cevap) ? response.cevap : response;
                
                removeTypingIndicator(typingId);
                appendMessage(formatResponse(finalMsg), 'ai');
            } catch (error) {
                removeTypingIndicator(typingId);
                appendMessage("Çalışma Hatası: " + error.message, 'ai');
            }
        }

        function appendMessage(content, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            msgDiv.innerHTML = `<div class="message-bubble">${content}</div>`;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showTypingIndicator() {
            const id = 'typing-' + Date.now();
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ai`;
            msgDiv.id = id;
            msgDiv.innerHTML = `<div class="message-bubble typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            return id;
        }

        function removeTypingIndicator(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function formatResponse(text) {
            if (!text) return "";
            let formatted = text.replace(/```([\s\S]*?)```/g, (match, p1) => {
                let code = p1.replace(/^[a-z]+\n/, '').replace(/</g, "&lt;").replace(/>/g, "&gt;");
                return `<pre><code>${code.trim()}</code></pre>`;
            });
            return formatted.replace(/\n/g, "<br>");
        }

        function clearChat() {
            chatBox.innerHTML = '';
            if(aiInstance?.sifirla) aiInstance.sifirla();
        }
    </script>
</body>
</html>
