<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tuncer AR v19.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/handpose"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000 !important; font-family: monospace; }
        #ui-container { position: absolute; inset: 0; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        .hud-panel { background: rgba(0, 15, 30, 0.9); border-left: 4px solid #00e5ff; padding: 15px; border-radius: 10px; color: #00e5ff; font-size: 11px; align-self: flex-end; backdrop-filter: blur(8px); box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #start-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        #btn-activate { 
            background: #00e5ff; color: #000; font-weight: 900; padding: 22px 60px; 
            border-radius: 15px; border: none; cursor: pointer; font-size: 20px; 
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.5); pointer-events: auto;
            text-transform: uppercase; letter-spacing: 2px;
        }
        #target-hint { align-self: center; margin-bottom: 120px; background: rgba(0,229,255,0.2); padding: 10px 25px; border-radius: 30px; color: #00e5ff; border: 1px solid #00e5ff; font-size: 10px; text-transform: uppercase; backdrop-filter: blur(4px); }
        canvas { display: block; }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="start-screen">
        <h1 style="color:#00e5ff; font-size: 32px; font-weight: 900; margin-bottom:10px;">TUNCER CORE v19</h1>
        <p style="color:#444; margin-bottom:40px; font-size:11px;">HATA DÜZELTME PAKETİ (STABLE)</p>
        <button id="btn-activate">SİSTEMİ BAŞLAT</button>
    </div>

    <div id="ui-container" style="display: none;">
        <div class="hud-panel">
            SİSTEM: <span id="sys-status" style="color:#fff;">BEKLİYOR</span><br>
            HAND_AI: <span id="hand-status" style="color:#ff3366;">YÜKLENİYOR</span><br>
            MOD: <span id="interact-mode" style="color:#fff;">GÖZLEM</span>
        </div>
        <div id="target-hint">Yüzey aranıyor...</div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, reticle, fingerCursor;
        let hitTestSource = null, hitTestSourceRequested = false;
        let objects = [], selectedObject = null;
        let handModel = null, isProcessing = false;
        let currentSession = null;
        
        let initialPinchDist = 0;
        let initialScale = new THREE.Vector3();

        async function init() {
            // Scene & Camera
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            // Renderer Setup
            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                alpha: true, 
                preserveDrawingBuffer: true,
                powerPreference: "high-performance"
            });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 2.5));

            // Reticle (Placement Helper)
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.06, 0.07, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x00e5ff, transparent: true, opacity: 0.8 })
            );
            reticle.matrixAutoUpdate = false; reticle.visible = false;
            scene.add(reticle);

            // Finger Tracking Cursor
            fingerCursor = new THREE.Mesh(
                new THREE.SphereGeometry(0.015, 16, 16),
                new THREE.MeshBasicMaterial({ color: 0x00e5ff, wireframe: true, transparent: true, opacity: 0.6 })
            );
            fingerCursor.visible = false;
            scene.add(fingerCursor);

            // Pre-load TensorFlow
            try {
                handModel = await handpose.load();
                const hStatus = document.getElementById('hand-status');
                if(hStatus) { hStatus.innerText = "HAZIR"; hStatus.style.color = "#00ffcc"; }
            } catch (e) { console.error("Model Error:", e); }

            const startBtn = document.getElementById('btn-activate');
            startBtn.addEventListener('click', async () => {
                if (navigator.xr) {
                    const sessionInit = { 
                        requiredFeatures: ['hit-test'], 
                        optionalFeatures: ['dom-overlay'],
                        domOverlay: { root: document.getElementById('ui-container') } 
                    };
                    
                    try {
                        const session = await navigator.xr.requestSession('immersive-ar', sessionInit);
                        onSessionStarted(session);
                    } catch (e) {
                        alert("Kamera/AR Erişimi Sağlanamadı. Lütfen izin verin.");
                    }
                }
            });
        }

        function onSessionStarted(session) {
            currentSession = session;
            renderer.xr.setSession(session);
            
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('ui-container').style.display = 'flex';
            document.getElementById('sys-status').innerText = "AKTİF";
            
            renderer.setAnimationLoop(render);
        }

        async function detectHand() {
            // Renderer domElement'in XR modunda güncel olduğundan emin ol
            if (!handModel || isProcessing || !renderer.xr.isPresenting) return;
            isProcessing = true;
            try {
                const predictions = await handModel.estimateHands(renderer.domElement);
                updateHandUI(predictions);
            } catch (e) { }
            isProcessing = false;
        }

        function updateHandUI(predictions) {
            const status = document.getElementById('hand-status');
            const modeLabel = document.getElementById('interact-mode');

            if (predictions.length > 0) {
                if(status) { status.innerText = "YAKALANDI"; status.style.color = "#00ffcc"; }
                fingerCursor.visible = true;

                const landmarks = predictions[0].landmarks;
                const indexTip = landmarks[8]; 
                const thumbTip = landmarks[4];
                const middleTip = landmarks[12];

                const canvas = renderer.domElement;
                const x = -((indexTip[0] / canvas.width) - 0.5) * 2;
                const y = -((indexTip[1] / canvas.height) * 2) + 1;

                const vector = new THREE.Vector3(x, y, 0.5).unproject(camera);
                const dir = vector.sub(camera.position).normalize();
                fingerCursor.position.copy(camera.position).add(dir.multiplyScalar(0.4));

                const currentPinchDist = Math.hypot(indexTip[0] - thumbTip[0], indexTip[1] - thumbTip[1]);
                const isPinch = currentPinchDist < 50;
                
                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(new THREE.Vector2(x, y), camera);
                const hits = raycaster.intersectObjects(objects);

                if (isPinch) {
                    fingerCursor.material.color.setHex(0xff3366);
                    if(modeLabel) modeLabel.innerText = "ETKİLEŞİM";
                    
                    if (hits.length > 0 && !selectedObject) {
                        selectedObject = hits[0].object;
                        initialPinchDist = currentPinchDist;
                        initialScale.copy(selectedObject.scale);
                    }

                    if (selectedObject) {
                        // Taşıma
                        selectedObject.position.lerp(fingerCursor.position, 0.15);
                        
                        // Döndürme
                        const angle = Math.atan2(middleTip[1] - indexTip[1], middleTip[0] - indexTip[0]);
                        selectedObject.rotation.y += 0.02;
                        selectedObject.rotation.z = angle;

                        // Boyutlandırma
                        if (initialPinchDist > 0) {
                            const scaleFactor = currentPinchDist / initialPinchDist;
                            const s = Math.max(0.1, Math.min(6, initialScale.x * scaleFactor));
                            selectedObject.scale.set(s, s, s);
                        }
                    }
                } else {
                    selectedObject = null;
                    initialPinchDist = 0;
                    if(modeLabel) modeLabel.innerText = "GÖZLEM";
                    fingerCursor.material.color.setHex(hits.length > 0 ? 0xffea00 : 0x00e5ff);
                }
            } else {
                if(status) { status.innerText = "ARANIYOR..."; status.style.color = "#ff3366"; }
                fingerCursor.visible = false;
            }
        }

        function render(timestamp, frame) {
            if (frame) {
                const session = renderer.xr.getSession();
                const referenceSpace = renderer.xr.getReferenceSpace();
                
                // Her 3 karede bir tarama (Daha akıcı el takibi)
                if (timestamp % 3 === 0) detectHand();

                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then(s => {
                        session.requestHitTestSource({ space: s }).then(source => hitTestSource = source);
                    });
                    hitTestSourceRequested = true;
                }
                
                if (hitTestSource) {
                    const results = frame.getHitTestResults(hitTestSource);
                    if (results.length > 0) {
                        reticle.visible = true;
                        reticle.matrix.fromArray(results[0].getPose(referenceSpace).transform.matrix);
                        const hint = document.getElementById('target-hint');
                        if(hint) hint.innerText = "YÜZEY BULUNDU";
                    } else { 
                        reticle.visible = false; 
                    }
                }
            }
            renderer.render(scene, camera);
        }

        // Küp Ekleme
        window.addEventListener('click', (e) => {
            if (reticle.visible && !isProcessing && e.target.tagName !== 'BUTTON') {
                const mesh = new THREE.Mesh(
                    new THREE.BoxGeometry(0.1, 0.1, 0.1),
                    new THREE.MeshStandardMaterial({ 
                        color: new THREE.Color(`hsl(${Math.random() * 360}, 70%, 50%)`),
                        metalness: 0.6, 
                        roughness: 0.2 
                    })
                );
                mesh.position.setFromMatrixPosition(reticle.matrix);
                mesh.position.y += 0.05;
                scene.add(mesh);
                objects.push(mesh);
            }
        });

        init();
    </script>
</body>
</html>
