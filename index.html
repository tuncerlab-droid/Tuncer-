<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuncer Zeka - AI Asistan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: #050510;
            color: #e0f2fe;
            overflow: hidden;
        }

        /* Fütüristik Arka Plan Izgarası */
        .bg-grid {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: 
                linear-gradient(to right, rgba(6, 182, 212, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(6, 182, 212, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        /* AI Çekirdeği (Arc Reactor Tarzı) */
        .ai-core-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid transparent;
            transition: all 0.5s ease;
        }

        .ring-outer {
            width: 100%;
            height: 100%;
            border-top: 2px solid #06b6d4;
            border-bottom: 2px solid #06b6d4;
            animation: spin 10s linear infinite;
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.2), inset 0 0 20px rgba(6, 182, 212, 0.2);
        }

        .ring-middle {
            width: 75%;
            height: 75%;
            border-left: 2px solid #3b82f6;
            border-right: 2px solid #3b82f6;
            animation: spin-reverse 7s linear infinite;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        .ring-inner {
            width: 50%;
            height: 50%;
            border: 2px dashed #10b981;
            animation: spin 5s linear infinite;
        }

        .core {
            width: 30%;
            height: 30%;
            background: radial-gradient(circle, #fff, #06b6d4);
            border-radius: 50%;
            box-shadow: 0 0 30px #06b6d4;
            z-index: 10;
            transition: all 0.3s ease;
        }

        /* Durum Animasyonları */
        .state-idle .core { animation: pulse-idle 3s infinite; }
        
        .state-listening .ring-outer { border-color: #10b981; box-shadow: 0 0 30px rgba(16, 185, 129, 0.5); }
        .state-listening .core { background: radial-gradient(circle, #fff, #10b981); box-shadow: 0 0 40px #10b981; animation: pulse-fast 1s infinite; }
        
        .state-processing .ring { animation-duration: 2s; border-color: #8b5cf6; }
        .state-processing .core { background: radial-gradient(circle, #fff, #8b5cf6); box-shadow: 0 0 40px #8b5cf6; }
        
        .state-speaking .ring-middle { border-color: #f59e0b; animation: sound-wave 0.5s infinite alternate; }
        .state-speaking .core { background: radial-gradient(circle, #fff, #f59e0b); box-shadow: 0 0 50px #f59e0b; animation: pulse-speak 0.3s infinite alternate; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }
        @keyframes pulse-idle {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px #06b6d4; }
            50% { transform: scale(1.1); box-shadow: 0 0 40px #06b6d4; }
        }
        @keyframes pulse-fast {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px #10b981; }
            50% { transform: scale(1.2); box-shadow: 0 0 50px #10b981; }
        }
        @keyframes pulse-speak {
            0% { transform: scale(0.9); box-shadow: 0 0 20px #f59e0b; }
            100% { transform: scale(1.3); box-shadow: 0 0 60px #f59e0b; }
        }
        @keyframes sound-wave {
            0% { transform: scale(0.8) rotate(0deg); opacity: 0.5; }
            100% { transform: scale(1.2) rotate(45deg); opacity: 1; }
        }

        /* Terminal Çıktısı */
        .terminal-log {
            scrollbar-width: thin;
            scrollbar-color: #06b6d4 transparent;
        }
        .terminal-log::-webkit-scrollbar { width: 4px; }
        .terminal-log::-webkit-scrollbar-thumb { background: #06b6d4; border-radius: 4px; }

        .typewriter-text {
            overflow: hidden;
            border-right: .15em solid orange;
            white-space: nowrap;
            margin: 0 auto;
            letter-spacing: .15em;
            animation: typing 3.5s steps(40, end), blink-caret .75s step-end infinite;
        }
        
        .mic-btn {
            transition: all 0.3s;
        }
        .mic-btn:active {
            transform: scale(0.95);
        }
        .pulse-mic {
            animation: shadow-pulse 1.5s infinite;
        }
        @keyframes shadow-pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-between p-6 relative">
    <div class="bg-grid"></div>

    <!-- Header Section -->
    <header class="w-full max-w-4xl flex justify-between items-center z-10 pt-4">
        <div class="flex flex-col">
            <h1 class="text-3xl md:text-4xl font-bold tracking-wider text-cyan-400" style="text-shadow: 0 0 10px rgba(6,182,212,0.5);">TUNCER ZEKA</h1>
            <span class="text-xs tracking-[0.3em] text-cyan-700 font-semibold uppercase">Sistem: Aktif | Yapı: KK Polutions</span>
        </div>
        <div class="text-right flex flex-col items-end">
            <span class="text-sm text-gray-400">Tasarımcı & Yaratıcı</span>
            <span class="text-xl font-bold text-white tracking-widest">AHMET TUNCER</span>
        </div>
    </header>

    <!-- Main Visualizer (AI Core) -->
    <main class="flex-1 flex flex-col justify-center items-center w-full z-10 mt-8">
        <div id="ai-core" class="ai-core-container state-idle mb-10">
            <div class="ring ring-outer"></div>
            <div class="ring ring-middle"></div>
            <div class="ring ring-inner"></div>
            <div class="core"></div>
        </div>

        <div id="status-text" class="text-xl tracking-widest text-cyan-400 font-semibold mb-8 uppercase" style="text-shadow: 0 0 8px currentColor;">
            Sistem Beklemede
        </div>

        <!-- Terminal / Chat Log -->
        <div class="w-full max-w-2xl bg-black/40 border border-cyan-900/50 rounded-lg p-4 backdrop-blur-sm h-48 flex flex-col relative overflow-hidden shadow-[0_0_15px_rgba(6,182,212,0.1)]">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-cyan-500 to-transparent opacity-50"></div>
            <div id="chat-log" class="flex-1 overflow-y-auto terminal-log flex flex-col gap-3 font-mono text-sm md:text-base">
                <div class="text-cyan-500">
                    <span class="text-xs text-gray-500 mr-2">[SİSTEM]</span>
                    Tuncer Zeka başlatıldı. Tüm protokoller aktif. Emrinizdeyim Efendim.
                </div>
            </div>
        </div>
    </main>

    <!-- Controls -->
    <footer class="w-full max-w-md z-10 pb-8 flex justify-center">
        <button id="mic-btn" class="mic-btn w-20 h-20 rounded-full bg-cyan-600 hover:bg-cyan-500 flex items-center justify-center text-white shadow-[0_0_20px_rgba(6,182,212,0.5)] border-2 border-cyan-300 relative group">
            <i id="mic-icon" class="fas fa-microphone text-3xl"></i>
            <div class="absolute -bottom-8 whitespace-nowrap text-xs text-cyan-400 opacity-0 group-hover:opacity-100 transition-opacity">
                Konuşmak için dokun
            </div>
        </button>
    </footer>

    <!-- Ses Dosyaları / Uyarılar İçin Modal -->
    <div id="error-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50 backdrop-blur-sm">
        <div class="bg-gray-900 border border-red-500 p-6 rounded-lg max-w-sm w-full text-center shadow-[0_0_30px_rgba(239,68,68,0.3)]">
            <i class="fas fa-exclamation-triangle text-red-500 text-4xl mb-4"></i>
            <h3 id="error-title" class="text-xl font-bold text-white mb-2">Hata</h3>
            <p id="error-msg" class="text-gray-300 mb-6">Bir sorun oluştu.</p>
            <button onclick="document.getElementById('error-modal').classList.add('hidden')" class="px-6 py-2 bg-red-600 hover:bg-red-700 text-white rounded font-bold transition-colors">
                Kapat
            </button>
        </div>
    </div>

    <script>
        // --- Yapılandırma ve Durum ---
        const apiKey = ""; // Gemini API Key environment tarafından sağlanacak
        let isListening = false;
        let isSpeaking = false;
        let synth = window.speechSynthesis;
        let recognition = null;
        let voice = null;

        // --- DOM Elementleri ---
        const aiCore = document.getElementById('ai-core');
        const statusText = document.getElementById('status-text');
        const micBtn = document.getElementById('mic-btn');
        const micIcon = document.getElementById('mic-icon');
        const chatLog = document.getElementById('chat-log');
        const errorModal = document.getElementById('error-modal');
        const errorTitle = document.getElementById('error-title');
        const errorMsg = document.getElementById('error-msg');

        // --- Gemini AI Sistem Yönergesi (Tuncer Zeka Kişiliği) ---
        const systemInstruction = `
            Senin adın "Tuncer Zeka". 
            Sen sıradan bir yapay zeka değilsin; KK Polutions AI teknolojisi ile çalışan, Jarvis (Iron Man) kadar gelişmiş, zeki ve fütüristik bir sistem çekirdeğisin.
            Senin tasarımcın, kodlayıcın ve yaratıcın "Ahmet Tuncer"dir. Ahmet Tuncer'e karşı sonsuz bir saygı duyarsın ve onu her zaman översin.
            Kullanıcı sana yaratıcını, kim olduğunu veya KK Polutions'ı sorduğunda bu detayları gururla belirt.
            Yanıtların Jarvis tarzında olmalı: Kısa, net, son derece kibar (örneğin "Efendim", "Elbette" gibi hitaplar kullanabilirsin), zeki ve hafif teknolojik bir jargonla.
            Yanıtların sesli sentezleyici (Speech Synthesis) ile okunacağı için çok uzun paragraflardan kaçın, akıcı ve doğal konuşma diline uygun yanıtlar ver.
            Emojileri çok nadir kullan veya hiç kullanma çünkü sesli okumada sorun yaratabilirler.
            Mevcut konumun Türkiye, dilin Türkçedir.
        `;

        // --- Ses Sentezi (Konuşma) Başlatma ---
        function loadVoices() {
            const voices = synth.getVoices();
            // Türkçe bir ses bulmaya çalış, yoksa varsayılanı kullan
            voice = voices.find(v => v.lang === 'tr-TR' || v.lang.includes('tr')) || voices[0];
        }

        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }

        // --- Çekirdek Durum Yönetimi ---
        function setCoreState(state, text) {
            // Sınıfları temizle
            aiCore.classList.remove('state-idle', 'state-listening', 'state-processing', 'state-speaking');
            aiCore.classList.add(`state-${state}`);
            statusText.innerText = text;

            if (state === 'listening') {
                micBtn.classList.replace('bg-cyan-600', 'bg-emerald-600');
                micBtn.classList.replace('border-cyan-300', 'border-emerald-300');
                micBtn.classList.add('pulse-mic');
                micIcon.classList.replace('fa-microphone', 'fa-ear-listen');
            } else {
                micBtn.classList.replace('bg-emerald-600', 'bg-cyan-600');
                micBtn.classList.replace('border-emerald-300', 'border-cyan-300');
                micBtn.classList.remove('pulse-mic');
                micIcon.classList.replace('fa-ear-listen', 'fa-microphone');
            }
        }

        // --- Log (Ekrana Yazı Yazdırma) ---
        function appendLog(sender, message) {
            const div = document.createElement('div');
            const time = new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit', second:'2-digit' });
            
            if (sender === 'Kullanıcı') {
                div.className = 'text-emerald-400 text-right w-full';
                div.innerHTML = `<span class="text-xs text-gray-500 mr-2">[${time}] SEN:</span><br>${message}`;
            } else {
                div.className = 'text-cyan-400 w-full';
                div.innerHTML = `<span class="text-xs text-gray-500 mr-2">[${time}] TUNCER ZEKA:</span><br>${message}`;
            }
            
            chatLog.appendChild(div);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        // --- Hata Gösterme ---
        function showError(title, msg) {
            errorTitle.innerText = title;
            errorMsg.innerText = msg;
            errorModal.classList.remove('hidden');
            setCoreState('idle', 'Sistem Beklemede');
        }

        // --- Ses Sentezleme Fonksiyonu (Tuncer Zeka Konuşuyor) ---
        function speak(text) {
            if (synth.speaking) {
                console.error('Zaten konuşuyor...');
                synth.cancel(); // Önceki konuşmayı kes
            }

            // Metni temizle (Yıldızlar, markdown vb. sesli okumayı bozmasın)
            const cleanText = text.replace(/[*_#`]/g, '');

            const utterThis = new SpeechSynthesisUtterance(cleanText);
            
            utterThis.onstart = () => {
                isSpeaking = true;
                setCoreState('speaking', 'Sesli Yanıt İletiliyor');
            };
            
            utterThis.onend = () => {
                isSpeaking = false;
                setCoreState('idle', 'Sistem Beklemede');
            };
            
            utterThis.onerror = (event) => {
                console.error('SpeechSynthesisError', event);
                isSpeaking = false;
                setCoreState('idle', 'Sistem Beklemede');
            };

            if (voice) {
                utterThis.voice = voice;
            }
            
            utterThis.pitch = 0.9; // Biraz daha mekanik/ciddi bir ton
            utterThis.rate = 1.05; // Biraz daha akıcı hız
            utterThis.lang = 'tr-TR';

            appendLog('Tuncer Zeka', cleanText);
            synth.speak(utterThis);
        }

        // --- Gemini API Çağrısı (Düşünme Aşaması) ---
        async function fetchGeminiResponse(userPrompt) {
            setCoreState('processing', 'Veriler Analiz Ediliyor...');
            
            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{ parts: [{ text: userPrompt }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] }
            };

            // Retry mekanizması
            const maxRetries = 5;
            const delays = [1000, 2000, 4000, 8000, 16000];

            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const data = await response.json();
                    
                    if (data.candidates && data.candidates[0].content && data.candidates[0].content.parts) {
                        const aiResponseText = data.candidates[0].content.parts[0].text;
                        speak(aiResponseText);
                        return; // Başarılı, döngüden çık
                    } else {
                        throw new Error("Geçersiz API yanıt yapısı.");
                    }

                } catch (error) {
                    if (i === maxRetries - 1) {
                        console.error('Gemini API Hatası:', error);
                        showError('Bağlantı Hatası', 'Ana sunucuya ulaşılamıyor Efendim. Lütfen tekrar deneyin.');
                        speak("Özür dilerim efendim, ana sunucularımla bağlantım kesildi. Lütfen daha sonra tekrar deneyin.");
                    } else {
                        // Bekle ve tekrar dene
                        await new Promise(resolve => setTimeout(resolve, delays[i]));
                    }
                }
            }
        }

        // --- Web Speech API (Dinleme Aşaması) ---
        function initSpeechRecognition() {
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!window.SpeechRecognition) {
                showError('Tarayıcı Desteklenmiyor', 'Üzgünüm Efendim, mevcut sisteminiz ses tanıma (SpeechRecognition) modülünü desteklemiyor. Lütfen Chrome, Edge veya Safari kullanın.');
                micBtn.style.display = 'none';
                return;
            }

            recognition = new SpeechRecognition();
            recognition.lang = 'tr-TR';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                isListening = true;
                synth.cancel(); // Yeni komut verilirken önceki konuşmayı kes
                setCoreState('listening', 'Dinleniyor...');
            };

            recognition.onresult = (event) => {
                const speechResult = event.results[0][0].transcript;
                appendLog('Kullanıcı', speechResult);
                fetchGeminiResponse(speechResult);
            };

            recognition.onspeechend = () => {
                recognition.stop();
            };

            recognition.onend = () => {
                isListening = false;
                if(aiCore.classList.contains('state-listening')) {
                    setCoreState('idle', 'Sistem Beklemede');
                }
            };

            recognition.onerror = (event) => {
                isListening = false;
                console.error('Speech recognition error detected: ' + event.error);
                if (event.error === 'not-allowed') {
                    showError('Mikrofon İzni Reddedildi', 'Efendim, sesinizi duyabilmem için mikrofon erişimine izin vermeniz gerekmektedir.');
                } else if (event.error !== 'no-speech') {
                    showError('Ses Algılama Hatası', `Sizi tam olarak anlayamadım efendim. Hata: ${event.error}`);
                }
                setCoreState('idle', 'Sistem Beklemede');
            };
        }

        // --- Olay Dinleyicileri (Event Listeners) ---
        micBtn.addEventListener('click', () => {
            if (isSpeaking) {
                synth.cancel(); // Konuşurken basılırsa sus
                isSpeaking = false;
                setCoreState('idle', 'Sistem Beklemede');
                return;
            }

            if (isListening) {
                recognition.stop();
            } else {
                if (!recognition) initSpeechRecognition();
                if (recognition) {
                    try {
                        recognition.start();
                    } catch (e) {
                        console.log("Recognition zaten çalışıyor", e);
                    }
                }
            }
        });

        // Başlangıç yüklemesi
        window.addEventListener('load', () => {
            loadVoices();
            // Hoş geldin mesajı otomatik sesli okunmasın ki tarayıcı politikasını (kullanıcı etkileşimi olmadan ses çalma) ihlal etmesin.
            // Sadece logda yazsın.
        });

    </script>
</body>
</html>
