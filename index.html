<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MuJoCo VR Modu</title>
    <style>
        body, html { 
            margin: 0; padding: 0; background: #000; overflow: hidden; 
            display: flex; align-items: center; justify-content: center; 
            width: 100vw; height: 100vh; color: white; font-family: sans-serif;
        }
        #menu { 
            background: #222; padding: 20px; border-radius: 10px; text-align: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 10;
        }
        input, button { 
            padding: 12px; margin: 10px 0; width: 100%; box-sizing: border-box; 
            border-radius: 6px; border: none; font-size: 16px;
        }
        button { background: #4CAF50; color: white; font-weight: bold; cursor: pointer; }
        
        /* VR Çift Ekranı Tamamen Dolduracak */
        #vr-screen { 
            display: none; width: 100vw; height: 100vh; object-fit: fill; 
        }
    </style>
</head>
<body>
    <div id="menu">
        <h2>VR Gözlük Modu</h2>
        <input type="text" id="ip" value="192.168.10.22">
        <button onclick="startVR()">Bağlan ve Gözlüğe Tak</button>
        <p id="status">Hazır. Gözlük ikonu PC'den akış bekliyor.</p>
    </div>

    <!-- PC'den gelen çift ekran görüntüsü buraya basılacak -->
    <img id="vr-screen" src="">

    <script>
        let ws;
        let offsetAlpha = null;
        let state = { w: false, a: false, s: false, d: false, alpha: 0, beta: 0, gamma: 0 };

        window.onload = () => {
            if (window.location.hostname && window.location.hostname !== "localhost") {
                document.getElementById('ip').value = window.location.hostname;
            }
        };

        function startVR() {
            let ip = document.getElementById('ip').value;
            document.getElementById('status').innerText = "Bağlanıyor...";
            ws = new WebSocket("ws://" + ip + ":5005");
            
            ws.onopen = () => {
                document.getElementById('menu').style.display = 'none';
                document.getElementById('vr-screen').style.display = 'block';
                
                // Tam ekranı otomatik başlat
                try { document.documentElement.requestFullscreen(); } catch(e){}
                
                // Telefon Jiroskop İzini
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission().then(permissionState => {
                        if (permissionState === 'granted') window.addEventListener('deviceorientation', handleOrientation);
                    });
                } else {
                    window.addEventListener('deviceorientation', handleOrientation);
                }
            };

            ws.onmessage = (e) => {
                // PC'den gelen Base64 VR görüntüsünü ekrana ver
                if (e.data.startsWith("data:image")) {
                    document.getElementById('vr-screen').src = e.data;
                }
            };

            ws.onclose = () => {
                document.getElementById('menu').style.display = 'block';
                document.getElementById('vr-screen').style.display = 'none';
                document.getElementById('status').innerText = "Bağlantı koptu, IP adresinizi kontrol edin.";
            };
        }

        // VR Kafa Hareketlerini Yakalama (Sağ/Sol = Alpha, Yukarı/Aşağı = Gamma)
        function handleOrientation(e) {
            if (e.alpha !== null) {
                // Kameranın sen ilk taktığında dümdüz bakması için kalibre ediyoruz
                if (offsetAlpha === null) offsetAlpha = e.alpha;
                let a = e.alpha - offsetAlpha;
                if (a > 180) a -= 360;
                if (a < -180) a += 360;
                
                state.alpha = a;
                state.beta = e.beta;
                state.gamma = e.gamma; 
            }
        }

        // Klavye Kontrolleri (WASD)
        window.addEventListener("keydown", e => { if(["w","a","s","d"].includes(e.key.toLowerCase())) state[e.key.toLowerCase()] = true; });
        window.addEventListener("keyup", e => { if(["w","a","s","d"].includes(e.key.toLowerCase())) state[e.key.toLowerCase()] = false; });

        // Verileri Saniyede 30 Kez PC'ye Yolla
        setInterval(() => {
            if (ws && ws.readyState === 1) ws.send(JSON.stringify(state));
        }, 30);
    </script>
</body>
</html>
