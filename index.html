<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tuncer Zeka v2.0 | Akıllı Sohbet</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --bg-dark: #0f172a;
            --bg-sidebar: #1e293b;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --safe-area-bottom: env(safe-area-inset-bottom, 0px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            height: -webkit-fill-available;
            overflow: hidden;
            display: flex;
        }

        /* --- RESPONSIVE LAYOUT --- */
        .sidebar {
            width: 300px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.05), transparent);
        }

        /* Mobile Sidebar Toggle Logic */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
                box-shadow: 20px 0 50px rgba(0,0,0,0.5);
            }
            .overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.5);
                backdrop-filter: blur(4px);
                z-index: 40;
            }
            .overlay.active { display: block; }
        }

        /* --- SIDEBAR COMPONENTS --- */
        .sidebar-header {
            padding: 24px;
            text-align: center;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .new-chat {
            margin: 0 16px 16px;
            padding: 12px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px dashed var(--primary);
            color: var(--primary);
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            font-weight: 600;
            transition: 0.2s;
        }

        .new-chat:hover { background: var(--primary); color: white; }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px;
        }

        .chat-item {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 4px;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-dim);
            transition: 0.2s;
        }

        .chat-item:hover, .chat-item.active {
            background: rgba(255,255,255,0.05);
            color: white;
        }

        /* --- HEADER --- */
        header {
            height: 64px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            background: rgba(15, 23, 42, 0.8);
        }

        .menu-btn {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        @media (max-width: 768px) { .menu-btn { display: block; } }

        .model-badge {
            background: #334155;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* --- CHAT AREA --- */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .message-row {
            display: flex;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            gap: 16px;
        }

        .message-row.user { flex-direction: row-reverse; }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .user .avatar { background: var(--primary); }
        .bot .avatar { background: var(--secondary); }

        .bubble {
            max-width: calc(100% - 60px);
            padding: 14px 18px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .user .bubble {
            background: var(--primary);
            border-bottom-right-radius: 4px;
        }

        .bot .bubble {
            background: var(--bg-sidebar);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        pre {
            background: #000;
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            overflow-x: auto;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
        }

        /* --- INPUT AREA --- */
        .input-box {
            padding: 20px;
            background: linear-gradient(to top, var(--bg-dark), transparent);
            padding-bottom: calc(20px + var(--safe-area-bottom));
        }

        .input-container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--bg-sidebar);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            align-items: flex-end;
            padding: 10px 14px;
            gap: 10px;
            transition: 0.3s;
        }

        .input-container:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        textarea {
            flex: 1;
            background: none;
            border: none;
            color: white;
            resize: none;
            padding: 8px 0;
            font-family: inherit;
            font-size: 15px;
            outline: none;
            max-height: 200px;
        }

        .action-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .action-btn:hover { transform: scale(1.05); background: var(--primary-dark); }

        /* Welcome Screen */
        .welcome {
            text-align: center;
            margin-top: 10vh;
            padding: 20px;
        }

        .welcome i {
            font-size: 60px;
            margin-bottom: 20px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">TUNCER ZEKA v2.0</div>
        </div>
        <div class="new-chat" onclick="createNewChat()">
            <i class="fas fa-plus"></i> Yeni Sohbet
        </div>
        <div class="chat-list" id="chat-list">
            <!-- Sohbetler buraya gelecek -->
        </div>
        <div style="padding: 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-dim);">
            <i class="fas fa-shield-alt"></i> Güvenli ve Yerli
        </div>
    </aside>

    <!-- MAIN -->
    <div class="main-container">
        <header>
            <button class="menu-btn" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            <div class="model-badge">
                <div style="width: 8px; height: 8px; background: #10b981; border-radius: 50%;"></div>
                Tuncer 2026 Engine
            </div>
            <div style="width: 40px"></div> <!-- Dengeleme için -->
        </header>

        <div id="chat-window">
            <!-- Hoşgeldiniz Mesajı -->
            <div class="welcome" id="welcome-screen">
                <i class="fas fa-brain"></i>
                <h2>Merhaba, Ben Tuncer!</h2>
                <p style="color: var(--text-dim); margin-top: 10px;">Size bugün nasıl yardımcı olabilirim?</p>
            </div>
        </div>

        <div class="input-box">
            <div class="input-container">
                <textarea id="user-input" rows="1" placeholder="Bir şeyler sorun..." oninput="autoResize(this)"></textarea>
                <button class="action-btn" onclick="handleSend()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        let chatHistory = [];
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        function toggleSidebar() {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = (textarea.scrollHeight) + 'px';
        }

        function createNewChat() {
            chatWindow.innerHTML = `
                <div class="welcome">
                    <i class="fas fa-brain"></i>
                    <h2>Yeni Sohbet</h2>
                    <p style="color: var(--text-dim); margin-top: 10px;">Yeni bir başlangıç yapalım.</p>
                </div>`;
            if(window.innerWidth < 768) toggleSidebar();
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            // Hoşgeldin ekranını temizle
            const welcome = document.getElementById('welcome-screen');
            if(welcome) welcome.remove();

            // Kullanıcı mesajı
            appendMessage('user', text);
            userInput.value = '';
            userInput.style.height = 'auto';

            // Yapay Zeka Yanıtı (Simüle edilmiş)
            setTimeout(() => {
                const response = getBotResponse(text);
                appendMessage('bot', response);
            }, 600);
        }

        function appendMessage(role, text) {
            const row = document.createElement('div');
            row.className = `message-row ${role}`;
            
            const avatar = role === 'user' ? '<i class="fas fa-user"></i>' : '<i class="fas fa-robot"></i>';
            
            // Kod bloklarını işle
            let content = text.replace(/```([\s\S]*?)```/g, (match, code) => {
                return `<pre><code>${code.trim()}</code></pre>`;
            });

            row.innerHTML = `
                <div class="avatar">${avatar}</div>
                <div class="bubble">${content}</div>
            `;
            
            chatWindow.appendChild(row);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function getBotResponse(input) {
            const msg = input.toLowerCase();
            if (msg.includes("merhaba")) return "Merhaba! Ben Tuncer Zeka. Sana nasıl yardımcı olabilirim?";
            if (msg.includes("kod")) return "Elbette, işte bir örnek:\n```python\nprint('Tuncer Zeka Aktif!')\n```";
            if (msg.includes("nasılsın")) return "Harikayım! Sürekli yeni şeyler öğreniyorum. Sen nasılsın?";
            return "Bunu anladım. Üzerinde biraz daha düşünmemi ister misin? Tuncer Zeka her zaman hizmetinde.";
        }

        // Enter tuşu ile gönderim (Mobilde shift+enter alt satır)
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && window.innerWidth > 768) {
                e.preventDefault();
                handleSend();
            }
        });
    </script>
</body>
</html>
