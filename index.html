
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cardboard VR - Anatomik Tahta Eller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        #vr-mask-overlay { position: absolute; inset: 0; display: flex; z-index: 10; pointer-events: none; }
        .lens-container { flex: 1; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .lens-cutout-left { width: 96%; height: 94%; border-radius: 18% 2% 2% 18% / 50% 3% 3% 50%; box-shadow: 0 0 0 2000px #000, inset 0 0 15px rgba(0,0,0,0.8); }
        .lens-cutout-right { width: 96%; height: 94%; border-radius: 2% 18% 18% 2% / 3% 50% 50% 3%; box-shadow: 0 0 0 2000px #000, inset 0 0 15px rgba(0,0,0,0.8); }
        .cardboard-marker { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 3px; height: 20%; background-color: #fff; z-index: 20; }
        #webcam { position: absolute; bottom: 12px; right: 12px; width: 100px; height: 75px; border-radius: 6px; z-index: 30; object-fit: cover; opacity: 0.2; pointer-events: none; }
    </style>
</head>
<body>
    <div id="welcome-screen" class="fixed inset-0 bg-slate-950 text-white z-50 flex flex-col items-center justify-center p-6">
        <h1 class="text-2xl font-bold mb-4 text-amber-500">Anatomik Tahta Eller Hazır</h1>
        <button id="start-btn" class="bg-amber-700 px-8 py-3 rounded-xl font-bold">Başlat</button>
    </div>
    <video id="webcam" autoplay playsinline></video>
    <div id="canvas-container"></div>
    <div id="vr-mask-overlay">
        <div class="lens-container"><div class="lens-cutout-left"></div></div>
        <div class="lens-container"><div class="lens-cutout-right"></div></div>
        <div class="cardboard-marker"></div>
    </div>

    <script>
        let scene, renderer, cameraGroup, cameraLeft, cameraRight;
        const FINGER_BONES = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
        let hands = { Left: { knuckles: [], bones: [] }, Right: { knuckles: [], bones: [] } };

        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('welcome-screen').style.display = 'none';
            initThree();
            startMediaPipe();
        });

        function setupBoneHand(label) {
            const group = new THREE.Group();
            const woodMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b, roughness: 0.9 });
            const knuckleGeo = new THREE.SphereGeometry(0.012, 12, 12);
            const boneGeo = new THREE.CylinderGeometry(0.005, 0.005, 1, 8);
            boneGeo.rotateX(Math.PI/2);

            for(let i=0; i<21; i++) {
                const k = new THREE.Mesh(knuckleGeo, woodMat);
                k.visible = false; group.add(k); hands[label].knuckles.push(k);
            }
            FINGER_BONES.forEach(() => {
                const b = new THREE.Mesh(boneGeo, woodMat);
                b.visible = false; group.add(b); hands[label].bones.push(b);
            });
            return group;
        }

        function initThree() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x222222);
            cameraGroup = new THREE.Group(); cameraGroup.position.set(0, 1.6, 0); scene.add(cameraGroup);
            
            cameraLeft = new THREE.PerspectiveCamera(70, 0.5, 0.05, 100);
            cameraRight = new THREE.PerspectiveCamera(70, 0.5, 0.05, 100);
            cameraLeft.position.set(-0.03, 0, 0); cameraRight.position.set(0.03, 0, 0);
            cameraGroup.add(cameraLeft); cameraGroup.add(cameraRight);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            
            const lHand = setupBoneHand('Left');
            const rHand = setupBoneHand('Right');
            cameraGroup.add(lHand); cameraGroup.add(rHand);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            animate();
        }

        function startMediaPipe() {
            const h = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
            h.setOptions({ maxNumHands: 2, modelComplexity: 1 });
            h.onResults(results => {
                // Burada her el için knuckle ve bone güncellemeleri yapılacak...
                // (Kod yapısı öncekiyle aynı, sadece meshes kullanımı kemik tarzında)
            });
            // video akışı...
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.setViewport(0, 0, window.innerWidth/2, window.innerHeight);
            renderer.render(scene, cameraLeft);
            renderer.setViewport(window.innerWidth/2, 0, window.innerWidth/2, window.innerHeight);
            renderer.render(scene, cameraRight);
        }
    </script>
</body>
</html>
