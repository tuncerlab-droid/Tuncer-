<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuncer Zeka v2.0 - Ahmet Tuncer</title>
    <!-- Gelişmiş Görsel Analizi için Hafif ve Ücretsiz Model (MobileNet + Custom Logic) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --chat-bg: #1e293b;
            --user-bubble: #3b82f6;
            --bot-bubble: #334155;
            --accent: #60a5fa;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header / Tanıtım Alanı */
        .header {
            padding: 12px 20px;
            background-color: var(--chat-bg);
            border-bottom: 1px solid #2d3748;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-info h1 {
            font-size: 16px;
            margin: 0;
            color: var(--accent);
        }

        .header-info p {
            font-size: 11px;
            margin: 0;
            color: var(--text-dim);
        }

        .chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message { align-self: flex-end; }
        .bot-message { align-self: flex-start; }

        .avatar-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
        }

        .bot-avatar { background-color: var(--user-bubble); color: white; }
        .user-name { font-size: 13px; font-weight: 600; color: var(--text-dim); }

        .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 15px;
            position: relative;
        }

        .user-bubble {
            background-color: var(--user-bubble);
            color: white;
            border-top-right-radius: 4px;
        }

        .bot-bubble {
            background-color: var(--bot-bubble);
            color: var(--text-main);
            border-top-left-radius: 4px;
        }

        .img-content {
            max-width: 100%;
            border-radius: 12px;
            margin-bottom: 8px;
            display: block;
        }

        /* Input Alanı */
        .input-area {
            padding: 16px;
            background-color: var(--bg-color);
            border-top: 1px solid #2d3748;
        }

        .input-wrapper {
            background-color: var(--chat-bg);
            border-radius: 24px;
            padding: 6px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid transparent;
            transition: border 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--user-bubble);
        }

        #user-input {
            background: transparent;
            border: none;
            color: white;
            flex: 1;
            padding: 10px 0;
            outline: none;
            font-size: 15px;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover { background-color: #2d3748; color: white; }

        .send-btn {
            background-color: var(--user-bubble);
            color: white;
        }

        #file-input { display: none; }

        .typing {
            font-size: 12px;
            color: var(--text-dim);
            padding: 0 20px 10px;
            display: none;
        }

        .preview-thumb {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid var(--accent);
            display: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="avatar bot-avatar">TZ</div>
        <div class="header-info">
            <h1>Tuncer Zeka v2.0</h1>
            <p>Geliştirici: Ahmet Tuncer (Lab Droid)</p>
        </div>
    </div>

    <div class="chat-container" id="chat-box">
        <!-- İlk Karşılama -->
        <div class="message bot-message">
            <div class="avatar-row">
                <div class="avatar bot-avatar">TZ</div>
                <span class="user-name">Tuncer Zeka</span>
            </div>
            <div class="bubble bot-bubble">
                Selam! Ben Tuncer Zeka. <b>Ahmet Tuncer</b> tarafından geliştirilen, görsel analiz yapabilen ve her konuda sohbet edebilen akıllı asistanınım. Bugün sana nasıl yardımcı olabilirim?
            </div>
        </div>
    </div>

    <div id="typing" class="typing">Tuncer Zeka analiz ediyor...</div>

    <div class="input-area">
        <div class="input-wrapper">
            <label for="file-input" class="action-btn">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            </label>
            <input type="file" id="file-input" accept="image/*">
            <img id="preview-image" class="preview-thumb">
            
            <input type="text" id="user-input" placeholder="Ahmet Tuncer'e veya TZ'ye bir şeyler sor..." autocomplete="off">
            
            <button class="action-btn send-btn" id="send-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <script>
        let visionModel = null;
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const fileInput = document.getElementById('file-input');
        const previewImage = document.getElementById('preview-image');
        const typing = document.getElementById('typing');

        let currentFile = null;

        // Modeli Yükle
        async function init() {
            visionModel = await mobilenet.load();
            console.log("Model Hazır.");
        }
        init();

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                currentFile = file;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    previewImage.src = ev.target.result;
                    previewImage.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text && !currentFile) return;

            // Kullanıcı Mesajı
            const userMsgDiv = document.createElement('div');
            userMsgDiv.className = 'message user-message';
            let content = `<div class="bubble user-bubble">`;
            if (currentFile) {
                content += `<img src="${previewImage.src}" class="img-content">`;
            }
            content += text || "Bu görseli analiz et.";
            content += `</div>`;
            userMsgDiv.innerHTML = content;
            chatBox.appendChild(userMsgDiv);

            // Temizlik
            const tempFile = currentFile;
            const tempText = text;
            userInput.value = "";
            currentFile = null;
            previewImage.style.display = 'none';
            chatBox.scrollTop = chatBox.scrollHeight;
            typing.style.display = 'block';

            // Yapay Zeka Yanıtı
            setTimeout(async () => {
                let response = "";

                // Ahmet Tuncer'i Tanıma Mantığı
                const lowerText = tempText.toLowerCase();
                if (lowerText.includes("ahmet tuncer kim") || lowerText.includes("seni kim yaptı") || lowerText.includes("yapımcın")) {
                    response = "<b>Ahmet Tuncer</b>, Tuncer Lab ve Droid projelerinin vizyoner kurucusudur. Beni sıfırdan tasarlayan, görsel zekamı geliştiren ve bu interaktif dünyayı kuran kişi odur. O benim mimarım!";
                } 
                else if (tempFile) {
                    // Görsel Analizi
                    const img = new Image();
                    img.src = URL.createObjectURL(tempFile);
                    await img.decode();
                    const results = await visionModel.classify(img);
                    
                    if (results && results.length > 0) {
                        const label = results[0].className;
                        // Basit Çeviri Mantığı (Örnekler)
                        let trLabel = label;
                        if(label.includes("cat")) trLabel = "tatlı bir kedi";
                        if(label.includes("dog")) trLabel = "sadık bir köpek";
                        if(label.includes("laptop")) trLabel = "bir bilgisayar";
                        
                        response = `Görseli Ahmet Tuncer'in geliştirdiği algoritmalarla inceledim. Burada bir <b>${trLabel}</b> gördüğümden %${Math.round(results[0].probability * 100)} eminim.`;
                    } else {
                        response = "Görseli inceledim ama net bir şey seçemedim. Ahmet Tuncer'e daha net bir fotoğraf göndermemi söyleyebilirsin!";
                    }
                } else {
                    // Genel Sohbet
                    if(lowerText.includes("selam")) response = "Selam! Ahmet Tuncer'in dünyasına hoş geldin. Senin için ne yapabilirim?";
                    else if(lowerText.includes("kod yaz")) response = "Tabii! Ahmet Tuncer bana kod yazmayı da öğretti. Hangi dilde bir örnek istersin?";
                    else response = "Mesajını aldım. Seninle sohbet etmek harika! Bana daha fazla detay ver ki sana Tuncer Zeka farkıyla yardımcı olayım.";
                }

                typing.style.display = 'none';
                appendBotMsg(response);
            }, 1000);
        }

        function appendBotMsg(text) {
            const botMsgDiv = document.createElement('div');
            botMsgDiv.className = 'message bot-message';
            botMsgDiv.innerHTML = `
                <div class="avatar-row">
                    <div class="avatar bot-avatar">TZ</div>
                    <span class="user-name">Tuncer Zeka</span>
                </div>
                <div class="bubble bot-bubble">${text}</div>
            `;
            chatBox.appendChild(botMsgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
