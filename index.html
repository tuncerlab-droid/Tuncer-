<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuncer Zeka Vision - Ahmet Tuncer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Rajdhani', sans-serif;
            background-color: #000;
            color: #06b6d4;
            overflow: hidden;
        }

        /* Arka Kamera Katmanı */
        #video-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: -2;
            filter: brightness(0.6) contrast(1.2);
        }

        /* HUD Efekti */
        .hud-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.4) 100%);
            border: 20px solid rgba(6, 182, 212, 0.1);
            pointer-events: none;
            z-index: -1;
        }

        .scan-line {
            position: absolute;
            width: 100%; height: 2px;
            background: rgba(6, 182, 212, 0.5);
            box-shadow: 0 0 15px #06b6d4;
            top: 0;
            display: none;
            z-index: 5;
        }

        @keyframes scanning {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .is-scanning .scan-line {
            display: block;
            animation: scanning 2s linear infinite;
        }

        /* AI Core Animasyonları (Küçültülmüş Yan Panel) */
        .core-mini {
            width: 80px; height: 80px;
            position: relative;
        }
        .ring { position: absolute; border-radius: 50%; border: 2px solid #06b6d4; width: 100%; height: 100%; transition: 0.3s; }
        .ring-1 { animation: spin 4s linear infinite; border-top-color: transparent; }
        .ring-2 { width: 70%; height: 70%; top: 15%; left: 15%; animation: spin-rev 3s linear infinite; border-bottom-color: transparent; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-rev { 100% { transform: rotate(-360deg); } }

        .terminal-box {
            background: rgba(0, 20, 30, 0.7);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(6, 182, 212, 0.3);
        }

        #canvas-capture { display: none; }
    </style>
</head>
<body class="flex flex-col justify-between p-4 md:p-8">
    <video id="video-bg" autoplay playsinline muted></video>
    <canvas id="canvas-capture"></canvas>
    <div class="hud-overlay"></div>
    <div id="scan-line-el" class="scan-line"></div>

    <!-- Top Info -->
    <div class="flex justify-between items-start z-10">
        <div class="flex items-center gap-4">
            <div id="ai-core" class="core-mini">
                <div class="ring ring-1"></div>
                <div class="ring ring-2"></div>
                <div class="absolute inset-0 flex items-center justify-center">
                    <div class="w-4 h-4 bg-cyan-400 rounded-full shadow-[0_0_15px_#06b6d4]"></div>
                </div>
            </div>
            <div>
                <h1 class="text-2xl font-bold tracking-tighter">TUNCER ZEKA <span class="text-xs font-normal opacity-50">v2.0 VISION</span></h1>
                <p class="text-xs text-cyan-500 uppercase tracking-widest">Görsel Analiz Modülü: Aktif</p>
            </div>
        </div>
        <div class="text-right">
            <p class="text-xs opacity-50">Tasarımcı</p>
            <p class="font-bold text-white uppercase">Ahmet Tuncer</p>
        </div>
    </div>

    <!-- Main Log Display -->
    <div class="flex-1 flex flex-col justify-end items-center mb-8 z-10">
        <div id="status-tag" class="mb-4 px-4 py-1 border border-cyan-500 text-xs tracking-widest bg-cyan-500/10 hidden">TARAMA YAPILIYOR...</div>
        <div class="terminal-box w-full max-w-2xl p-4 rounded-lg overflow-hidden min-h-[100px]">
            <div id="chat-log" class="text-sm md:text-base leading-relaxed h-24 overflow-y-auto pr-2">
                <span class="text-cyan-600">[SİSTEM]:</span> Hoş geldiniz Ahmet Bey. Tuncer Zeka Vision hazır. Etrafı taramamı isterseniz söylemeniz yeterli.
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div class="flex justify-center items-center gap-6 z-10 pb-4">
        <button id="mic-btn" class="w-20 h-20 rounded-full bg-cyan-900/40 border-2 border-cyan-500 flex items-center justify-center text-cyan-400 shadow-[0_0_20px_rgba(6,182,212,0.3)] hover:scale-110 transition-transform">
            <i id="mic-icon" class="fas fa-microphone text-3xl"></i>
        </button>
    </div>

    <script>
        const apiKey = ""; // Gemini Vision için
        const video = document.getElementById('video-bg');
        const canvas = document.getElementById('canvas-capture');
        const scanLine = document.body;
        const chatLog = document.getElementById('chat-log');
        const statusTag = document.getElementById('status-tag');
        const micBtn = document.getElementById('mic-btn');
        const micIcon = document.getElementById('mic-icon');

        let synth = window.speechSynthesis;
        let isProcessing = false;

        // 1. Kamera Erişimi (Arka Kamera)
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                console.error("Kamera hatası:", err);
                addLog("SİSTEM", "Kamera erişimi sağlanamadı Efendim.");
            }
        }

        // 2. Görüntü Yakalama (Base64)
        function captureFrame() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            return canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
        }

        // 3. Pollinations.ai API (Sadece Metin)
        async function getPollinationsResponse(text) {
            const prompt = `Sen Tuncer Zeka'sın. Ahmet Tuncer tarafından yaratıldın. Jarvis gibi konuş. Soru: ${text}`;
            try {
                const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(prompt)}`);
                const data = await response.text();
                return data;
            } catch (e) {
                return "Bağlantı hatası oluştu Efendim.";
            }
        }

        // 4. Gemini Vision API (Görsel Analiz)
        async function analyzeVision(userPrompt) {
            isProcessing = true;
            document.body.classList.add('is-scanning');
            statusTag.classList.remove('hidden');
            
            const base64Image = captureFrame();
            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{
                    parts: [
                        { text: `Sen Tuncer Zeka'sın. Ahmet Tuncer yaratıcın. Kameradan gelen bu görüntüyü analiz et ve kullanıcının sorusuna cevap ver. Sorusu: ${userPrompt}. Teknik bir dille, zeki ve yardımcı bir asistan gibi konuş.` },
                        { inlineData: { mimeType: "image/jpeg", data: base64Image } }
                    ]
                }]
            };

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                speak(aiText);
            } catch (err) {
                speak("Görüntü verilerini analiz ederken bir hata oluştu Efendim.");
            } finally {
                document.body.classList.remove('is-scanning');
                statusTag.classList.add('hidden');
                isProcessing = false;
            }
        }

        // 5. Ses Sentezi ve Dinleme
        function speak(text) {
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'tr-TR';
            utter.rate = 1.1;
            utter.pitch = 0.9;
            addLog("TUNCER ZEKA", text);
            synth.speak(utter);
        }

        function addLog(sender, msg) {
            const div = document.createElement('div');
            div.innerHTML = `<span class="text-cyan-600 font-bold">[${sender}]:</span> ${msg}`;
            chatLog.prepend(div);
        }

        // 6. Konuşma Tanıma
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'tr-TR';

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript.toLowerCase();
            addLog("AHMET TUNCER", transcript);

            // "tara", "gör", "bak" gibi kelimeler geçiyorsa vizyonu kullan
            if (transcript.includes("tara") || transcript.includes("ne görü") || transcript.includes("bak") || transcript.includes("hangisi")) {
                analyzeVision(transcript);
            } else {
                // Sadece metin ise Pollinations kullan
                getPollinationsResponse(transcript).then(res => speak(res));
            }
        };

        recognition.onstart = () => {
            micIcon.className = "fas fa-circle-notch fa-spin text-3xl text-emerald-400";
        };

        recognition.onend = () => {
            micIcon.className = "fas fa-microphone text-3xl";
        };

        micBtn.addEventListener('click', () => {
            if (isProcessing) return;
            recognition.start();
        });

        // Başlat
        window.onload = initCamera;
    </script>
</body>
</html>
