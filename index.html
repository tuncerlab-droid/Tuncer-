<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tuncer AR v26.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* KRİTİK: Kamera katmanı en altta, Canvas onun üstünde */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            background: #000; 
        }
        #ar-video {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover; z-index: 0; display: none;
        }
        canvas { 
            position: absolute; top: 0; left: 0; z-index: 5;
            background: transparent !important;
        }
        #ui-overlay { 
            position: absolute; inset: 0; pointer-events: none; z-index: 10; 
            display: flex; flex-direction: column; justify-content: space-between; padding: 20px; 
        }
        .hud { 
            background: rgba(0, 20, 40, 0.8); border-left: 3px solid #00e5ff; 
            padding: 12px; border-radius: 8px; color: #00e5ff; font-family: monospace; 
            font-size: 11px; align-self: flex-end; backdrop-filter: blur(10px);
        }
        #start-screen { 
            position: fixed; inset: 0; background: #000; z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: white; font-family: monospace;
        }
        #btn-go { 
            background: #00e5ff; color: #000; font-weight: 900; padding: 15px 40px; 
            border-radius: 8px; border: none; cursor: pointer; font-size: 16px; 
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.4); pointer-events: auto;
        }
        #status-hint { 
            align-self: center; margin-bottom: 50px; background: rgba(0, 229, 255, 0.15); 
            padding: 8px 15px; border-radius: 20px; color: #00e5ff; border: 1px solid #00e5ff;
            font-size: 10px; font-family: monospace;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <!-- Manuel Kamera Katmanı -->
    <video id="ar-video" autoplay playsinline muted></video>

    <div id="start-screen">
        <h1 style="color:#00e5ff; font-size: 24px; font-weight: 900; margin-bottom:10px;">TUNCER CORE v26.3</h1>
        <p style="color:#666; margin-bottom:30px; font-size:10px;">HYBRID VISION: SİYAH EKRAN KESİN ÇÖZÜM</p>
        <button id="btn-go">SİSTEMİ BAŞLAT</button>
    </div>

    <div id="ui-overlay" style="display: none;">
        <div class="hud">
            DURUM: <span id="status-text" style="color:#fff;">AKTİF</span><br>
            EL_TAKIP: <span id="hand-text" style="color:#ff3366;">ARANIYOR</span><br>
            ETKILEŞİM: <span id="pinch-text" style="color:#fff;">BOŞTA</span>
        </div>
        <div id="status-hint">YÜZEY TARANIYOR...</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { XRHandModelFactory } from 'three/addons/webxr/XRHandModelFactory.js';

        let scene, camera, renderer, reticle;
        let hitTestSource = null, hitTestSourceRequested = false;
        let objects = [], selectedObject = null;
        let hands = [];
        let isPinching = false;
        let pinchCursor;

        async function startManualCamera() {
            const video = document.getElementById('ar-video');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } 
                });
                video.srcObject = stream;
                video.style.display = 'block';
                return true;
            } catch (err) {
                console.error("Kamera Hatası:", err);
                return false;
            }
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                alpha: true,
                premultipliedAlpha: false
            });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearAlpha(0); 
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(1, 1, 1).normalize();
            scene.add(light);

            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.04, 0.05, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x00e5ff })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            pinchCursor = new THREE.Mesh(
                new THREE.SphereGeometry(0.01, 12, 12),
                new THREE.MeshBasicMaterial({ color: 0x00e5ff })
            );
            pinchCursor.visible = false;
            scene.add(pinchCursor);

            const handModelFactory = new XRHandModelFactory();
            for (let i = 0; i < 2; i++) {
                const hand = renderer.xr.getHand(i);
                hand.add(handModelFactory.createHandModel(hand, "mesh"));
                scene.add(hand);
                hands.push(hand);
                hand.addEventListener('connected', () => {
                    document.getElementById('hand-text').innerText = "BAĞLANDI";
                    document.getElementById('hand-text').style.color = "#00ffcc";
                });
            }

            document.getElementById('btn-go').addEventListener('click', async () => {
                // Önce kamerayı manuel açıyoruz (Siyah ekranı öldüren hamle)
                const camSuccess = await startManualCamera();
                
                const sessionInit = { 
                    requiredFeatures: ['hit-test'], 
                    optionalFeatures: ['dom-overlay', 'hand-tracking'], 
                    domOverlay: { root: document.getElementById('ui-overlay') } 
                };
                
                try {
                    const session = await navigator.xr.requestSession('immersive-ar', sessionInit);
                    renderer.xr.setSession(session);
                    
                    document.getElementById('start-screen').style.display = 'none';
                    document.getElementById('ui-overlay').style.display = 'flex';
                    
                    renderer.setAnimationLoop(render);
                } catch (e) {
                    // Eğer immersive-ar patlarsa manuel kamera ile devam etmesi için fallback
                    console.warn("WebXR Session Hatası, manuel mod devrede.");
                }
            });
        }

        function createCube() {
            const geometry = new THREE.BoxGeometry(0.1, 0.1, 0.1);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0x00e5ff, 
                metalness: 0.6, 
                roughness: 0.1,
                transparent: true,
                opacity: 0.85
            });
            const cube = new THREE.Mesh(geometry, material);
            cube.position.setFromMatrixPosition(reticle.matrix);
            scene.add(cube);
            objects.push(cube);
        }

        function render(timestamp, frame) {
            if (frame) {
                const session = renderer.xr.getSession();
                const referenceSpace = renderer.xr.getReferenceSpace();

                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then(s => {
                        session.requestHitTestSource({ space: s }).then(source => hitTestSource = source);
                    });
                    hitTestSourceRequested = true;
                }
                if (hitTestSource) {
                    const results = frame.getHitTestResults(hitTestSource);
                    if (results.length > 0) {
                        reticle.visible = true;
                        reticle.matrix.fromArray(results[0].getPose(referenceSpace).transform.matrix);
                        document.getElementById('status-hint').innerText = "ZEMİN OKUNDU - DOKUN";
                    } else {
                        reticle.visible = false;
                    }
                }

                let handActive = false;
                for (const hand of hands) {
                    const indexFinger = hand.joints['index-finger-tip'];
                    const thumbFinger = hand.joints['thumb-tip'];

                    if (indexFinger && thumbFinger && indexFinger.matrixWorld) {
                        handActive = true;
                        pinchCursor.visible = true;
                        const iPos = new THREE.Vector3().setFromMatrixPosition(indexFinger.matrixWorld);
                        const tPos = new THREE.Vector3().setFromMatrixPosition(thumbFinger.matrixWorld);
                        pinchCursor.position.copy(iPos);

                        const distance = iPos.distanceTo(tPos);
                        if (distance < 0.03) { 
                            document.getElementById('pinch-text').innerText = "TUTUYOR";
                            pinchCursor.material.color.setHex(0xff3366);
                            if (!isPinching) {
                                isPinching = true;
                                objects.forEach(obj => {
                                    if (obj.position.distanceTo(iPos) < 0.12) selectedObject = obj;
                                });
                            }
                            if (selectedObject) selectedObject.position.lerp(iPos, 0.25);
                        } else {
                            isPinching = false;
                            selectedObject = null;
                            document.getElementById('pinch-text').innerText = "BOŞTA";
                            pinchCursor.material.color.setHex(0x00e5ff);
                        }
                    }
                }
                if (!handActive) pinchCursor.visible = false;
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('pointerdown', (e) => {
            if (reticle.visible && e.target.tagName !== 'BUTTON') createCube();
        });

        init();
    </script>
</body>
</html>
