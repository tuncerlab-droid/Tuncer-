<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUNCER ZEKA - PRO OS</title>
    
    <!-- Puter.js -->
    <script src="https://js.puter.com/v2/"></script>
    
    <!-- Leaflet Harita ve Navigasyon Kütüphaneleri -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <style>
        :root {
            /* Dinamik renk değişkeni - Komutlarla değişecek */
            --neon-color: #00f0ff; 
            --dark-bg: #0a0a0a;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--dark-bg);
            color: #e0e0e0;
            font-family: 'Segoe UI', 'Courier New', monospace;
            overflow: hidden;
            transition: background-color 0.5s ease;
        }

        /* --- AÇILIŞ ANİMASYONU (BOOT SCREEN) --- */
        #boot-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 1s cubic-bezier(0.7, 0, 0.3, 1);
        }

        #terminal-loader {
            position: absolute;
            top: 20px; left: 20px;
            width: 300px; height: 400px;
            font-family: monospace;
            font-size: 10px;
            color: var(--neon-color);
            overflow: hidden;
            opacity: 0.7;
        }

        #central-logo {
            text-align: center;
            animation: pulse-logo 2s infinite ease-in-out;
        }

        #central-logo h1 {
            font-size: 42px;
            margin: 0;
            letter-spacing: 8px;
            color: #fff;
            text-shadow: 0 0 20px var(--neon-color), 0 0 40px var(--neon-color);
        }

        #central-logo p {
            font-size: 12px;
            letter-spacing: 4px;
            color: var(--neon-color);
            margin-top: 10px;
            opacity: 0.8;
        }

        @keyframes pulse-logo {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.98); }
        }

        .scan-line {
            width: 100%; height: 2px;
            background: rgba(0, 240, 255, 0.1);
            position: absolute;
            top: 0;
            animation: scan 3s linear infinite;
        }

        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        /* --- ANA HUD TASARIMI --- */
        #main-ui {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
        }

        #ust-panel {
            position: absolute;
            top: 20px; width: 90%;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
        }

        .etiket { font-size: 11px; color: var(--neon-color); letter-spacing: 2px; text-shadow: 0 0 5px var(--neon-color); transition: 0.3s;}

        #kalan-hak-kutusu {
            border: 1px solid var(--neon-color); padding: 5px 15px; border-radius: 4px; 
            background: rgba(0, 240, 255, 0.1); color: var(--neon-color);
            box-shadow: 0 0 10px rgba(0,240,255,0.2); transition: 0.3s;
        }

        .mod-btn {
            background: #222; border: 1px solid var(--neon-color); color: var(--neon-color); padding: 8px 15px;
            font-size: 11px; cursor: pointer; border-radius: 4px; margin-left: 5px; transition: 0.3s;
        }
        .mod-btn.aktif { background: var(--neon-color); color: #000; box-shadow: 0 0 15px var(--neon-color); }

        #btn-arduino {
            background: #002233; color: var(--neon-color); border: 1px solid var(--neon-color);
            padding: 8px 15px; font-size: 11px; cursor: pointer; border-radius: 4px; margin-left: 5px; transition: 0.3s;
        }

        #hud-container {
            width: 150px; height: 150px; position: relative; display: flex;
            align-items: center; justify-content: center; margin-bottom: 20px;
        }

        #outer-ring {
            position: absolute; width: 100%; height: 100%; border: 2px solid rgba(0, 240, 255, 0.2);
            border-top: 2px solid var(--neon-color); border-bottom: 2px solid var(--neon-color); border-radius: 50%;
            animation: spin 4s linear infinite; transition: 0.3s;
        }
        #inner-ring {
            position: absolute; width: 75%; height: 75%; border: 1px dashed var(--neon-color); opacity: 0.5;
            border-radius: 50%; animation: spin-reverse 6s linear infinite; transition: 0.3s;
        }

        #core {
            width: 60px; height: 60px; background: radial-gradient(circle, var(--neon-color) 10%, #005577 60%, #000 100%);
            border-radius: 50%; box-shadow: 0 0 20px var(--neon-color); transition: 0.3s;
        }

        .isliyor #core { background: #fff; box-shadow: 0 0 50px var(--neon-color); transform: scale(1.1); }
        .kilitli #core { background: #550000; box-shadow: 0 0 30px red; border: 1px solid red; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }

        #sohbet-kutusu {
            width: 80%; max-width: 700px; height: 20vh; border: 1px solid var(--neon-color); background: rgba(0,0,0,0.6);
            padding: 20px; overflow-y: auto; border-radius: 8px; margin-bottom: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.8); font-size: 14px; transition: height 0.5s ease, border-color 0.3s;
            backdrop-filter: blur(5px);
        }

        #harita-wrapper {
            width: 80%; max-width: 700px; height: 35vh; margin-bottom: 15px;
            display: none; opacity: 0; transform: translateY(-30px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        #harita-wrapper.aktif { opacity: 1; transform: translateY(0); }
        #harita-alani { width: 100%; height: 100%; border-radius: 8px; border: 1px solid var(--neon-color); background: #222; transition: 0.3s;}

        .mesaj { margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .yapay-zeka { color: var(--neon-color); font-weight: bold; transition: 0.3s; }
        .sen { color: #aaa; text-align: right; }
        .sistem { color: #00ffaa; text-align: center; font-size: 12px; }

        #komut-btn {
            background: var(--neon-color); color: #000; border: none; padding: 12px 40px;
            font-size: 15px; cursor: pointer; border-radius: 4px; font-weight: bold; transition: 0.3s;
        }
        #komut-btn:hover { background: #fff; transform: scale(1.05); }

        /* RADAR ICON CSS */
        .gps-pulse-container { width: 20px; height: 20px; position: relative; }
        .gps-dot { width: 14px; height: 14px; background-color: var(--neon-color); border-radius: 50%; position: absolute; top: 3px; left: 3px; box-shadow: 0 0 15px var(--neon-color); z-index: 2; transition: 0.3s;}
        .gps-ring { width: 14px; height: 14px; background-color: transparent; border: 2px solid var(--neon-color); border-radius: 50%; position: absolute; top: 0; left: 0; animation: radar-wave 1.5s ease-out infinite; z-index: 1; transition: 0.3s;}
        @keyframes radar-wave { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }

        .leaflet-routing-container { display: none !important; }
    </style>
</head>
<body>

    <!-- BOOT SCREEN -->
    <div id="boot-screen">
        <div class="scan-line"></div>
        <div id="terminal-loader"></div>
        <div id="central-logo">
            <h1>TUNCER</h1>
            <p>INDUSTRIES - PRO OS v4.5</p>
        </div>
    </div>

    <!-- MAIN UI -->
    <div id="main-ui">
        <div id="ust-panel">
            <div class="etiket" id="sistem-durum-etiketi">SİSTEM DURUMU: AKTİF</div>
            <div style="display:flex; align-items:center;">
                <button id="btn-arduino" onclick="arduinoBaglan()">DONANIM BAĞLA</button>
                <div id="kalan-hak-kutusu" style="margin-left: 20px;">GÜÇ: <span id="sayac">100</span>%</div>
                <div style="margin-left: 20px;">
                    <button id="btn-manuel" class="mod-btn aktif" onclick="modDegistir('manuel')">MANUEL</button>
                    <button id="btn-oto" class="mod-btn" onclick="modDegistir('oto')">OTOMATİK</button>
                </div>
            </div>
        </div>

        <div id="hud-container">
            <div id="outer-ring"></div>
            <div id="inner-ring"></div>
            <div id="core"></div>
        </div>
        
        <div id="harita-wrapper">
            <div id="harita-alani"></div>
        </div>

        <div id="sohbet-kutusu">
            <div class="mesaj yapay-zeka">Tuncer Zeka: Sistem yüklemesi tamamlandı. Hoşgeldiniz Ahmet Tuncer.</div>
        </div>

        <button id="komut-btn" onclick="manuelDinle()">DİNLE</button>
        <div id="durum-metni" style="margin-top:10px; color:var(--neon-color); font-size:11px; opacity:0.6;">Sistem Beklemede</div>
    </div>

    <script>
        // --- AÇILIŞ LOGLARI ---
        const terminal = document.getElementById("terminal-loader");
        const bootScreen = document.getElementById("boot-screen");
        const logs = [
            "> INITIALIZING KERNEL...",
            "> LOADING NEURAL NETWORK...",
            "> CONNECTING TO SATELLITE...",
            "> CHECKING ARDUINO PORTS...",
            "> CALIBRATING GYRO SENSORS...",
            "> WEAPON SYSTEMS STANDBY...",
            "> TUNCER INDUSTRIES PROTOCOL v4.5",
            "> BIOMETRIC SCAN: AHMET TUNCER",
            "> ACCESS GRANTED.",
            "> STARTING HUD INTERFACE...",
            "> SYSTEM READY."
        ];

        let logIndex = 0;
        function runLogs() {
            if (logIndex < logs.length) {
                terminal.innerHTML += logs[logIndex] + "<br>";
                logIndex++;
                setTimeout(runLogs, 250);
            } else {
                setTimeout(() => {
                    bootScreen.style.transform = "translateY(-100%)";
                    sesliKonus("Sistem yüklendi patron. Bütün birimler aktif.");
                }, 800);
            }
        }

        window.onload = runLogs;

        // --- SİSTEM DEĞİŞKENLERİ ---
        const sohbet = document.getElementById("sohbet-kutusu");
        const haritaWrapper = document.getElementById("harita-wrapper");
        const hud = document.getElementById("hud-container");
        const core = document.getElementById("core");
        const sayacEl = document.getElementById("sayac");
        const komutBtn = document.getElementById("komut-btn");
        const durumMetni = document.getElementById("durum-metni");
        const btnManuel = document.getElementById("btn-manuel");
        const btnOto = document.getElementById("btn-oto");
        const sistemDurumEtiketi = document.getElementById("sistem-durum-etiketi");

        let kalanHak = 100;
        let aktifMod = 'manuel'; 
        let dinlemeAktif = false;
        let limitKilitli = false;
        let sistemAktif = false;     
        let sifreBekleniyor = false; 
        const DOGRU_SIFRE = "demir adam"; 

        let port, writer, map, routingControl, kullaniciMarker, anlikKonumTakibi;

        // --- YAPAY ZEKA KİŞİLİĞİ ---
        let sohbetGecmisi = [{ role: "system", content: 'Sen "Tuncer Zeka"sın. Geliştiricin: Ahmet Tuncer. Kullanıcıya "patron" de. Bir Iron Man zırh yapay zekası gibi davran. Çok kısa ve net konuş.' }];

        // --- SES MOTORU ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'tr-TR';

        // --- ARDUINO BAĞLANTISI ---
        async function arduinoBaglan() {
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 9600 }); 
                const textEncoder = new TextEncoderStream();
                textEncoder.readable.pipeTo(port.writable);
                writer = textEncoder.writable.getWriter();
                document.getElementById('btn-arduino').style.background = "var(--neon-color)";
                document.getElementById('btn-arduino').style.color = "#000";
                document.getElementById('btn-arduino').innerText = "DONANIM BAĞLI";
                ekranaYaz("Sistem", "Donanım Protokolü Bağlandı.", "sistem");
                sesliKonus("Donanım arayüzü aktif edildi patron.");
            } catch (e) { ekranaYaz("Hata", "Port seçilemedi.", "hata"); }
        }

        async function arduinoKomutGonder(komutStr) {
            if (writer) await writer.write(komutStr + "\n");
            console.log("Arduino'ya gönderilen sinyal: " + komutStr); // Test için konsola yazar
        }

        // --- DİNLEME VE CEVAPLAMA ---
        function modDegistir(mod) {
            aktifMod = mod;
            if (mod === 'manuel') {
                btnManuel.classList.add("aktif"); btnOto.classList.remove("aktif");
                komutBtn.style.display = "block";
            } else {
                btnManuel.classList.remove("aktif"); btnOto.classList.add("aktif");
                komutBtn.style.display = "none"; setTimeout(otoDinleBaslat, 1000);
            }
        }

        function manuelDinle() { if (!dinlemeAktif) try { recognition.start(); } catch(e){} }
        function otoDinleBaslat() { if (aktifMod === 'oto' && !dinlemeAktif) try { recognition.start(); } catch(e){ setTimeout(otoDinleBaslat, 500); } }

        recognition.onstart = () => { dinlemeAktif = true; hud.classList.add("isliyor"); durumMetni.innerText = "Dinleniyor..."; };
        recognition.onend = () => {
            dinlemeAktif = false; hud.classList.remove("isliyor");
            if (aktifMod === 'oto') setTimeout(otoDinleBaslat, 300);
        };

        recognition.onresult = async (event) => {
            let ses = event.results[0][0].transcript;
            let kucukSes = ses.toLowerCase().trim();

            if (aktifMod === 'oto' && !sifreBekleniyor) {
                if (!kucukSes.includes("tuncer") && !kucukSes.includes("hey") && !kucukSes.includes("sistem")) return;
            }

            ekranaYaz("Sen", ses, "sen");

            if (sifreBekleniyor) {
                if (kucukSes.includes(DOGRU_SIFRE)) {
                    sistemAktif = true; sifreBekleniyor = false;
                    arduinoKomutGonder("POWER_ON");
                    ekranaYaz("Tuncer Zeka", "Erişim Onaylandı. Güç verildi.");
                    sesliKonus("Hoşgeldiniz patron. Bütün birimler emrinizde.");
                } else {
                    ekranaYaz("Tuncer Zeka", "Hatalı Parola.", "hata");
                    sesliKonus("Hatalı parola patron.");
                    sifreBekleniyor = false; 
                }
                return;
            }

            await cevapla(ses);
        };

        async function cevapla(cumle) {
            let k = cumle.toLowerCase();

            // SİSTEM BAŞLATMA
            if (k.includes("sistemi başlat") || k.includes("uyan")) {
                if(sistemAktif) { sesliKonus("Sistem zaten devrede patron."); return; }
                sifreBekleniyor = true;
                sesliKonus("Güvenlik protokolü. Parolayı söyleyin patron.");
                ekranaYaz("Tuncer Zeka", "Parola bekleniyor...");
                return;
            }

            // GÜVENLİK KİLİDİ KONTROLÜ
            if (!sistemAktif && !k.includes("sistemi başlat") && !k.includes("uyan")) {
                sesliKonus("Sistem şu an uyku modunda. Önce beni uyandırmalısınız.");
                return;
            }

            // --- YENİ EKLENEN 15 ÖZEL KOMUT ---

            // 1. Silah Sistemleri (Gecikmeli Otomatik Kapanma)
            if (k.includes("silah sistemlerini hazırla") || k.includes("silahları hazırla")) { 
                arduinoKomutGonder("WEAPON_90"); // Pin 13, 90 derece
                sesliKonus("Silah sistemleri devrede. Omuz roketleri ateşlemeye hazır.");
                ekranaYaz("Tuncer Zeka", "Silah servosu (Pin 13) 90° açıldı. 10 sn sonra otomatik kapanacak.", "sistem");
                
                setTimeout(() => {
                    arduinoKomutGonder("WEAPON_0"); // 10 saniye sonra 0 derece
                    sesliKonus("Tehdit geçildi, silahlar emniyete alındı.");
                    ekranaYaz("Tuncer Zeka", "Silah servosu (Pin 13) 0° konumuna döndü.", "sistem");
                }, 10000); // 10000 ms = 10 saniye
                return; 
            }

            // 2. Enerji Durumu
            if (k.includes("enerji durumu") || k.includes("şarjımız ne kadar")) {
                sesliKonus(`Ana reaktör kapasitesi yüzde ${kalanHak}. Uçuş için yeterli.`);
                ekranaYaz("Tuncer Zeka", `Güç: %${kalanHak}`); return;
            }

            // 3. Savaş Modu (Kırmızı Tema)
            if (k.includes("savaş modu") || k.includes("kırmızı alarm")) {
                document.documentElement.style.setProperty('--neon-color', '#ff0033'); // Kırmızı
                sistemDurumEtiketi.innerText = "SİSTEM: SAVAŞ MODU (KIRMIZI ALARM)";
                arduinoKomutGonder("COMBAT_MODE_ON");
                sesliKonus("Savaş protokolü devrede. Hedefleme sistemleri çevrimiçi."); return;
            }

            // 4. Normal Mod (Mavi Tema)
            if (k.includes("normal mod") || k.includes("sakin ol")) {
                document.documentElement.style.setProperty('--neon-color', '#00f0ff'); // Mavi
                sistemDurumEtiketi.innerText = "SİSTEM: NORMAL MOD";
                arduinoKomutGonder("COMBAT_MODE_OFF");
                sesliKonus("Sistem normale döndü patron."); return;
            }

            // 5. Gizlilik Modu (Yeşil Tema)
            if (k.includes("gizlilik modu") || k.includes("sessiz mod")) {
                document.documentElement.style.setProperty('--neon-color', '#00ff88'); // Yeşil
                sistemDurumEtiketi.innerText = "SİSTEM: GİZLİLİK MODU (STEALTH)";
                arduinoKomutGonder("STEALTH_ON");
                sesliKonus("Gizlilik modu aktif. Radar ve termal izimiz gizlendi."); return;
            }

            // 6. Hasar Raporu
            if (k.includes("hasar raporu") || k.includes("durum raporu")) {
                sesliKonus("Zırh bütünlüğü yüzde yüz. Bütün servo motorlar ve iticiler optimal seviyede.");
                ekranaYaz("Tuncer Zeka", "[ZIRH: %100] [MOTORLAR: OPTİMAL] [AĞ BAĞLANTISI: STABİL]"); return;
            }

            // 7. Tarama Başlatma (Radar gösterimi)
            if (k.includes("çevreyi tara") || k.includes("tarama başlat")) {
                sesliKonus("Bölgesel tarama başlatılıyor. Radara yansıtıyorum.");
                rotayiCiz("İstanbul"); // Sembolik harita tetiklemesi
                setTimeout(() => { if(routingControl) map.removeControl(routingControl); }, 2000); // Rotayı sil, sadece radar kalsın
                return;
            }

            // 8. Kalkan Aktarımı
            if (k.includes("kalkanları aktar") || k.includes("tam güç")) {
                sesliKonus("Bütün itici güç reaktörden kalkanlara yönlendiriliyor.");
                core.style.boxShadow = "0 0 100px var(--neon-color)"; // Core parlaklığı artar
                setTimeout(() => { core.style.boxShadow = "0 0 20px var(--neon-color)"; }, 5000);
                return;
            }

            // 9. Lazer Sistemleri
            if (k.includes("lazerleri aç") || k.includes("lazer aktif")) {
                arduinoKomutGonder("LASER_ON");
                sesliKonus("Taktik lazerler devrede. Hedefleme açık."); return;
            }

            // 10. Lazer Kapat
            if (k.includes("lazerleri kapat")) {
                arduinoKomutGonder("LASER_OFF");
                sesliKonus("Lazerler devre dışı bırakıldı."); return;
            }

            // 11. İtici Testi
            if (k.includes("itici güçleri test et") || k.includes("motorları sına")) {
                arduinoKomutGonder("THRUSTER_TEST");
                sesliKonus("İtici motorlar test ediliyor... Basınç normal seviyede."); return;
            }

            // 12. Parti Modu
            if (k.includes("parti modu") || k.includes("müzik aç")) {
                arduinoKomutGonder("PARTY_MODE");
                sesliKonus("Nasıl istersen patron. Parti protokolü devrede.");
                ekranaYaz("Tuncer Zeka", "Müzik çalma simüle ediliyor 🎵", "sistem"); return;
            }

            // 13. Hava Durumu
            if (k.includes("hava durumu") || k.includes("dışarısı nasıl")) {
                sesliKonus("Atmosferik sensörlere göre dışarısı uçuş için gayet uygun patron."); return;
            }

            // 14. Kendini İmha 
            if (k.includes("kendini imha et")) {
                sesliKonus("Geri sayım başlatılıyor. 3... 2... Şaka yapıyorum patron. Ben olmadan ne yapardın?"); return;
            }

            // 15. Sistemi Kilitle / Uyku Modu
            if (k.includes("sistemi kilitle") || k.includes("uyku modu")) {
                sistemAktif = false;
                arduinoKomutGonder("POWER_OFF");
                document.documentElement.style.setProperty('--neon-color', '#555555'); // Griye döner
                sistemDurumEtiketi.innerText = "SİSTEM: UYKU MODU";
                sesliKonus("Sistem uyku moduna alınıyor. Güç tasarrufu aktif.");
                ekranaYaz("Tuncer Zeka", "SİSTEM KİLİTLENDİ.", "hata"); return;
            }

            // --- ESKİ TEMEL KOMUTLAR ---
            if (k.includes("ışıkları aç")) { arduinoKomutGonder("LIGHTS_ON"); sesliKonus("Işıklar açıldı."); return; }
            if (k.includes("ışıkları kapat")) { arduinoKomutGonder("LIGHTS_OFF"); sesliKonus("Işıklar kapatıldı."); return; }
            if (k.includes("kaskı aç") || k.includes("kaskı kaldır")) { arduinoKomutGonder("HELMET_90"); sesliKonus("Kask açılıyor."); return; }
            if (k.includes("kaskı kapat") || k.includes("kaskı indir")) { arduinoKomutGonder("HELMET_0"); sesliKonus("Kask kapatıldı."); return; }

            // Navigasyon (Aynı Şekilde Çalışır)
            if (await navigasyonAnaliz(cumle)) return;

            // Yapay Zeka Sohbet (Yukarıdakilere uymazsa yapay zekaya sorar)
            sohbetGecmisi.push({ role: "user", content: cumle });
            try {
                const cevap = await puter.ai.chat(sohbetGecmisi, { model: 'gpt-4o-mini' });
                sohbetGecmisi.push({ role: "assistant", content: cevap.toString() });
                ekranaYaz("Tuncer Zeka", cevap);
                sesliKonus(cevap);
            } catch (e) { ekranaYaz("Hata", "İletişim hatası."); }
        }

        // --- NAVİGASYON FONKSİYONLARI ---
        async function navigasyonAnaliz(cumle) {
            let k = cumle.toLowerCase();
            if (k.includes("götür") || k.includes("yol tarifi") || k.includes("rota")) {
                let hedef = k.replace("tuncer", "").replace("beni", "").replace("götür", "").replace("yol tarifi", "").replace("rota çiz", "").trim();
                if(hedef.length > 2) {
                    sesliKonus(hedef + " için rota hesaplanıyor.");
                    rotayiCiz(hedef);
                    return true;
                }
            }
            return false;
        }

        function rotayiCiz(hedefMetin) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const bLat = pos.coords.latitude; const bLng = pos.coords.longitude;
                let r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(hedefMetin)}&countrycodes=tr`);
                let d = await r.json();
                if(d.length > 0) haritaGoster(bLat, bLng, d[0].lat, d[0].lon);
            }, null, { enableHighAccuracy: true });
        }

        function haritaGoster(basLat, basLng, bitLat, bitLng) {
            haritaWrapper.style.display = "block";
            setTimeout(() => { haritaWrapper.classList.add("aktif"); sohbet.style.height = "10vh"; }, 50);

            if (!map) {
                map = L.map('harita-alani', { zoomControl: false }).setView([basLat, basLng], 15);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
                let radarIcon = L.divIcon({ className: 'radar', html: '<div class="gps-pulse-container"><div class="gps-ring"></div><div class="gps-dot"></div></div>', iconSize: [20, 20] });
                kullaniciMarker = L.marker([basLat, basLng], {icon: radarIcon}).addTo(map);
            }
            if (routingControl) map.removeControl(routingControl);
            routingControl = L.Routing.control({
                waypoints: [L.latLng(basLat, basLng), L.latLng(bitLat, bitLng)],
                show: false,
                lineOptions: { styles: [{color: 'var(--neon-color)', opacity: 0.8, weight: 6}] } // Çizgi rengi temaya göre değişir
            }).addTo(map);

            routingControl.on('routesfound', (e) => {
                map.flyToBounds(L.latLngBounds(e.routes[0].coordinates), { padding: [30, 30], duration: 2 });
                sesliKonus("Rota hazır patron. Hedef işaretlendi.");
            });
        }

        function ekranaYaz(kim, yazi, tur="normal") {
            let stil = kim === "Tuncer Zeka" ? "yapay-zeka" : (tur === "sen" ? "sen" : "sistem");
            sohbet.innerHTML += `<div class="mesaj ${stil}"><b>${kim}:</b> ${yazi}</div>`;
            sohbet.scrollTop = sohbet.scrollHeight;
        }

        function sesliKonus(metin) {
            recognition.stop();
            const u = new SpeechSynthesisUtterance(metin);
            u.lang = 'tr-TR';
            u.pitch = 0.9;
            u.onend = () => { if (aktifMod === 'oto') setTimeout(otoDinleBaslat, 500); };
            window.speechSynthesis.speak(u);
        }
    </script>
</body>
