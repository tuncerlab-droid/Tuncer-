<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNCER HOLO AR v3.4</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.7.0/build/index.module.js",
                "three-bvh-csg": "https://unpkg.com/three-bvh-csg@0.0.16/build/index.module.js"
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Share Tech Mono', monospace;
        }

        /* Başlangıç Ekranı */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #000;
            z-index: 999;
        }

        /* AR Overlay - Kritik Katman */
        #ui-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* Arka plana tıklamayı engellemez */
            z-index: 1000;
            display: none;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        .interactive {
            pointer-events: auto !important; /* Butonların tıklanabilir olmasını sağlar */
        }

        .hud-panel {
            background: rgba(0, 20, 30, 0.8);
            border: 1px solid #0ff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
            border-radius: 8px;
        }

        .btn-holo {
            background: rgba(0, 255, 255, 0.15);
            border: 1px solid #0ff;
            color: #0ff;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            padding: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-holo:active {
            background: rgba(0, 255, 255, 0.5);
        }

        /* START AR Butonu - Mevcut tasarımı korundu */
        #ARButton {
            position: absolute !important;
            bottom: 20% !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            padding: 20px 40px !important;
            background: #004444 !important;
            border: 2px solid #0ff !important;
            color: #0ff !important;
            font-family: 'Share Tech Mono', monospace !important;
            font-size: 18px !important;
            z-index: 1001 !important;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="start-screen">
        <h1 class="text-3xl font-bold text-cyan-400 mb-2">TUNCER HOLO v3.4</h1>
        <p class="text-cyan-800 text-xs mb-10">SİSTEMİ BAŞLATIN</p>
    </div>

    <!-- AR Arayüzü -->
    <div id="ui-overlay">
        <div class="flex justify-between w-full interactive">
            <div class="hud-panel p-3 w-1/2">
                <div class="text-white text-[10px] mb-1">HOLO STATUS</div>
                <div id="sys-status" class="text-yellow-500 text-[10px]">ZEMİN ARANIYOR...</div>
                <div id="hand-status" class="text-cyan-600 text-[10px]">EL: BEKLENİYOR</div>
            </div>
            <div class="hud-panel p-2 flex flex-col items-center">
                <div class="text-green-500 text-[10px] font-bold">ONLINE</div>
            </div>
        </div>

        <div class="flex flex-col gap-3 w-full interactive">
            <div class="flex gap-2">
                <div class="hud-panel p-2 h-20 flex-grow overflow-hidden flex flex-col justify-end text-[9px]" id="log-console">
                    <div class="text-cyan-800">> Sistem Hazır.</div>
                </div>
                <div class="grid grid-cols-2 gap-2 w-1/2">
                    <button id="btn-cube" class="btn-holo rounded">KÜP</button>
                    <button id="btn-hole" class="btn-holo rounded border-red-500 text-red-500">DELİK</button>
                    <button id="btn-merge" class="btn-holo rounded border-yellow-500 text-yellow-500">MERGE</button>
                    <button id="btn-delete" class="btn-holo rounded text-white">SİL</button>
                </div>
            </div>
        </div>
    </div>

<script type="module">
import * as THREE from 'three';
import { ARButton } from 'three/addons/webxr/ARButton.js';
import { XRHandModelFactory } from 'three/addons/webxr/XRHandModelFactory.js';
import { SUBTRACTION, Brush, Evaluator } from 'three-bvh-csg';

let scene, camera, renderer, reticle;
let hitTestSource = null, hitTestSourceRequested = false;
let objects = [], holeObjects = [];
let hand0, handModel0, selectedObject = null, isGrabbing = false;

const logConsole = document.getElementById('log-console');
const sysStatus = document.getElementById('sys-status');
const handStatus = document.getElementById('hand-status');
const uiOverlay = document.getElementById('ui-overlay');
const startScreen = document.getElementById('start-screen');

function log(msg, err = false) {
    const d = document.createElement('div');
    d.textContent = `> ${msg}`;
    d.className = err ? 'text-red-500' : 'text-cyan-400';
    logConsole.appendChild(d);
    if(logConsole.childNodes.length > 4) logConsole.removeChild(logConsole.firstChild);
}

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1.2));
    const light = new THREE.DirectionalLight(0xffffff, 1.0);
    light.position.set(0, 10, 5);
    scene.add(light);

    // AR Button
    const arBtn = ARButton.createButton(renderer, {
        requiredFeatures: ['hit-test'],
        optionalFeatures: ['dom-overlay', 'hand-tracking'],
        domOverlay: { root: uiOverlay }
    });
    document.body.appendChild(arBtn);

    // Hand Tracking
    const handModelFactory = new XRHandModelFactory();
    hand0 = renderer.xr.getHand(0);
    handModel0 = handModelFactory.createHandModel(hand0, "spheres");
    hand0.add(handModel0);
    scene.add(hand0);

    hand0.addEventListener('pinchstart', findTarget);
    hand0.addEventListener('pinchend', releaseTarget);

    // Reticle
    reticle = new THREE.Mesh(
        new THREE.RingGeometry(0.05, 0.06, 32).rotateX(-Math.PI/2),
        new THREE.MeshBasicMaterial({ color: 0x00ffff })
    );
    reticle.matrixAutoUpdate = false;
    reticle.visible = false;
    scene.add(reticle);

    renderer.xr.addEventListener('sessionstart', () => {
        startScreen.style.display = 'none';
        uiOverlay.style.display = 'flex';
        log("AR Oturumu Aktif.");
    });

    renderer.setAnimationLoop(render);
}

function findTarget() {
    isGrabbing = true;
    const indexTip = hand0.joints['index-finger-tip'];
    if (!indexTip) return;
    const handPos = new THREE.Vector3().setFromMatrixPosition(indexTip.matrixWorld);
    
    let closest = null;
    let dist = 0.25;
    [...objects, ...holeObjects].forEach(obj => {
        const d = obj.position.distanceTo(handPos);
        if (d < dist) { dist = d; closest = obj; }
    });
    
    if (closest) {
        selectedObject = closest;
        selectedObject.material.emissive?.setHex(0x003333);
        log("Nesne Tutuldu.");
    }
}

function releaseTarget() {
    isGrabbing = false;
    if (selectedObject) {
        selectedObject.material.emissive?.setHex(0x000000);
        selectedObject = null;
        log("Nesne Bırakıldı.");
    }
}

function add(isHole = false) {
    if (!reticle.visible) return log("Zemin Bekleniyor...", true);
    
    const geo = new THREE.BoxGeometry(0.12, 0.12, 0.12);
    const mat = new THREE.MeshStandardMaterial({
        color: isHole ? 0xff4444 : 0x00ccff,
        transparent: true,
        opacity: isHole ? 0.6 : 1.0,
        emissive: 0x000000
    });
    
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.setFromMatrixPosition(reticle.matrix);
    mesh.quaternion.setFromRotationMatrix(reticle.matrix);
    mesh.translateY(0.06);
    scene.add(mesh);
    
    if (isHole) holeObjects.push(mesh); else objects.push(mesh);
    log(isHole ? "Delik Eklendi." : "Küp Eklendi.");
}

function merge() {
    if (objects.length < 1 || holeObjects.length < 1) return log("Nesne Eksik!", true);
    
    try {
        const evaluator = new Evaluator();
        let base = objects[0];
        let baseBrush = new Brush(base.geometry, base.material);
        baseBrush.position.copy(base.position);
        baseBrush.quaternion.copy(base.quaternion);
        baseBrush.updateMatrixWorld();

        holeObjects.forEach(h => {
            const hBrush = new Brush(h.geometry, h.material);
            hBrush.position.copy(h.position);
            hBrush.quaternion.copy(h.quaternion);
            hBrush.updateMatrixWorld();
            baseBrush = evaluator.evaluate(baseBrush, hBrush, SUBTRACTION);
            scene.remove(h);
        });

        scene.remove(base);
        const result = new THREE.Mesh(baseBrush.geometry, baseBrush.material);
        result.position.copy(base.position);
        result.quaternion.copy(base.quaternion);
        scene.add(result);
        
        objects = [result];
        holeObjects = [];
        log("Birleştirme Başarılı.");
    } catch (e) { log("CSG Hatası!", true); }
}

function render(timestamp, frame) {
    if (frame) {
        const ref = renderer.xr.getReferenceSpace();
        const session = renderer.xr.getSession();

        if (!hitTestSourceRequested) {
            session.requestReferenceSpace('viewer').then(s => {
                session.requestHitTestSource({ space: s }).then(src => hitTestSource = src);
            });
            hitTestSourceRequested = true;
        }

        if (hitTestSource) {
            const results = frame.getHitTestResults(hitTestSource);
            if (results.length) {
                const pose = results[0].getPose(ref);
                reticle.visible = true;
                reticle.matrix.fromArray(pose.transform.matrix);
                sysStatus.textContent = "ZEMİN KİLİTLENDİ";
                sysStatus.className = "text-green-500 text-[10px]";
            } else {
                reticle.visible = false;
                sysStatus.textContent = "ZEMİN ARANIYOR...";
                sysStatus.className = "text-yellow-500 text-[10px]";
            }
        }

        let handActive = false;
        for (const input of session.inputSources) {
            if (input.hand) handActive = true;
        }
        handStatus.textContent = handActive ? "EL: AKTİF" : "EL: BEKLENİYOR";

        if (isGrabbing && selectedObject) {
            const indexTip = hand0.joints['index-finger-tip'];
            const thumbTip = hand0.joints['thumb-tip'];
            if (indexTip && thumbTip) {
                const p1 = new THREE.Vector3().setFromMatrixPosition(indexTip.matrixWorld);
                const p2 = new THREE.Vector3().setFromMatrixPosition(thumbTip.matrixWorld);
                selectedObject.position.lerp(new THREE.Vector3().lerpVectors(p1, p2, 0.5), 0.2);
            }
        }
    }
    renderer.render(scene, camera);
}

// Buton Bağlantıları
window.addEventListener('load', init);
document.getElementById('btn-cube').addEventListener('click', () => add(false));
document.getElementById('btn-hole').addEventListener('click', () => add(true));
document.getElementById('btn-merge').addEventListener('click', merge);
document.getElementById('btn-delete').addEventListener('click', () => {
    const all = [...objects, ...holeObjects];
    if (all.length) {
        const t = all.pop();
        scene.remove(t);
        objects = objects.filter(o => o !== t);
        holeObjects = holeObjects.filter(o => o !== t);
        log("Silindi.");
    }
});
</script>
</body>
</html>
