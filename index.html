
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Eğitim Simülasyonu (Canlı Veri)</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            color: #0f0;
            user-select: none;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none; /* Tıklamalar alttaki canvas'a geçsin */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        .hud-text {
            text-shadow: 0 0 5px #0f0;
            font-size: 1.2rem;
            opacity: 0.8;
        }

        #top-hud {
            display: none;
            justify-content: space-between;
        }

        #bottom-hud {
            display: none;
        }

        #progress-container {
            width: 100%;
            height: 10px;
            background-color: #111;
            border: 1px solid #0f0;
            margin-top: 10px;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background-color: #f00;
            box-shadow: 0 0 10px #f00;
        }

        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            background-color: rgba(0,0,0,0.8);
            color: #fff;
            font-size: 2rem;
            text-shadow: 0 0 20px #f00;
            cursor: pointer;
            text-align: center;
            flex-direction: column;
            pointer-events: auto;
        }

        .blink {
            animation: blinker 1.5s linear infinite;
        }

        @keyframes blinker {
            50% { opacity: 0; }
        }

        #logs {
            height: 100px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            font-size: 0.9rem;
            color: #fff;
            text-shadow: 0 0 3px #fff;
        }

        .log-entry { margin: 2px 0; }
        .red-glow { text-shadow: 0 0 10px #f00, 0 0 20px #f00; color: #ff6666; }
    </style>
</head>
<body>

    <div id="start-screen">
        <div style="font-size: 4rem; margin-bottom: 20px;" class="red-glow">SİSTEM ÇEVRİMDIŞI</div>
        <div class="blink" style="font-size: 1.5rem;">SİMÜLASYONU BAŞLATMAK İÇİN EKRANA DOKUN</div>
        <div style="font-size: 1rem; margin-top: 20px; color: #aaa;">(İnternetten canlı veri çekilecektir)</div>
    </div>

    <div id="ui-layer">
        <div id="top-hud">
            <div>
                <div class="hud-text">EPOCH: <span id="epoch-val">0</span> / 5000000</div>
                <div class="hud-text">KAYIP (LOSS): <span id="loss-val">1.000000</span></div>
                <div class="hud-text">DOĞRULUK: %<span id="acc-val">0.00</span></div>
            </div>
            <div style="text-align: right;">
                <div class="hud-text red-glow">YAPAY ZEKA ÇEKİRDEĞİ: AKTİF</div>
                <div class="hud-text" id="phase-text">AŞAMA: CANLI VERİ YUTMA</div>
            </div>
        </div>
        <div id="bottom-hud">
            <div id="logs"></div>
            <div id="progress-container">
                <div id="progress-bar"></div>
            </div>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('start-screen');
        const topHud = document.getElementById('top-hud');
        const bottomHud = document.getElementById('bottom-hud');
        const epochEl = document.getElementById('epoch-val');
        const lossEl = document.getElementById('loss-val');
        const accEl = document.getElementById('acc-val');
        const progressBar = document.getElementById('progress-bar');
        const logsContainer = document.getElementById('logs');
        const phaseText = document.getElementById('phase-text');

        let width, height;
        let cx, cy;

        // Ayarlar
        const TRAINING_DURATION = 5 * 60 * 1000; // 5 Dakika
        let startTime = 0;
        let state = 'init'; // init, training, transition, exploring
        let epoch = 0;

        // AI Topu
        let ai = {
            x: 0,
            y: 0,
            radius: 30,
            baseRadius: 30,
            color: '#ff0000',
            targetX: 0,
            targetY: 0,
            speed: 2,
            pulsate: 0
        };

        // Veri Parçacıkları ve Bloklar
        let particles = [];
        let blocks = [];
        let loadedImages = [];

        // Başlangıç Troll Metinleri (Canlı veriler buraya eklenecek)
        let dataTexts = [
            "E=mc^2", "function train()", "SELECT * FROM universe",
            "Kedi_videolari_arşivi.zip", "İnsanlık_tarihi.pdf", "Wikipedia_Tam_Kopya",
            "Reddit_yorumları_analiz_ediliyor...", "Troll_bilimi.exe", "Kuantum_dolanıklığı",
            "01001000 01101001", "Loss function optimize ediliyor...", "Backpropagation aktif",
            "Nöral ağlar genişliyor...", "Makarna_tarifi.txt", "Dünyayı_ele_geçirme_planı_v2.doc"
        ];

        // --- İNTERNETTEN CANLI VERİ ÇEKME FONKSİYONU ---
        // Vikipedi'den rastgele makale özetleri veya başlıkları çeker
        async function fetchRealInternetData() {
            if(state !== 'training') return;
            try {
                // Wikipedia API - Rastgele 3 makale özeti getirir (CORS serbesttir)
                const response = await fetch('https://tr.wikipedia.org/w/api.php?format=json&action=query&generator=random&grnnamespace=0&grnlimit=3&prop=extracts&exchars=35&exintro&explaintext&origin=*');
                const data = await response.json();
                const pages = data.query.pages;
                
                for (let id in pages) {
                    let textToAdd = "";
                    if (pages[id].extract && pages[id].extract.length > 5) {
                        // Makale içeriğinden kısa bir parça
                        textToAdd = pages[id].extract.replace(/\n/g, ' ').trim() + "...";
                    } else if (pages[id].title) {
                        // Veya sadece başlık
                        textToAdd = "[Makale]: " + pages[id].title;
                    }

                    if(textToAdd !== "") {
                        dataTexts.push(textToAdd);
                        // Dizi çok şişmesin diye eskileri hafiften temizle
                        if(dataTexts.length > 150) {
                            dataTexts.splice(15, 1); // İlk 15 troll veriyi koru, sonrakileri sil
                        }
                        
                        // Arada bir loglara da düşür gerçek veriyi
                        if(Math.random() > 0.5) {
                            addLog("İNDİRİLDİ: " + pages[id].title);
                        }
                    }
                }
            } catch (e) {
                console.log("Bağlantı anlık koptu, mevcut verilerle devam ediliyor...");
            }
        }

        // Ses Sistemi (Web Audio API)
        let audioCtx;
        let masterGain;

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.3;
            masterGain.connect(audioCtx.destination);
        }

        function playBeep(freq, type = 'sine', duration = 0.1, vol = 1) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            // Yutulma hissi için frekansı hızlıca düşür
            if(type === 'sine') {
                osc.frequency.exponentialRampToValueAtTime(freq / 2, audioCtx.currentTime + duration);
            }
            
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playThud() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.1);
            
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playLevelUp() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 2);
            
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 1);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 3);
            
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start();
            osc.stop(audioCtx.currentTime + 3);
        }

        // Yeniden boyutlandırma
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            cx = width / 2;
            cy = height / 2;
            if(state === 'training' || state === 'init') {
                ai.x = cx;
                ai.y = cy;
            }
        }
        window.addEventListener('resize', resize);
        resize();

        // İnternetten rastgele resimler yükleme
        function preloadImages() {
            for(let i=0; i<15; i++) {
                let img = new Image();
                img.crossOrigin = "Anonymous";
                // Picsum üzerinden rastgele resimler (Görseller olduğu gibi kalıyor)
                img.src = `https://picsum.photos/60/60?random=${Math.random()}`;
                loadedImages.push(img);
            }
        }

        function addLog(msg) {
            const el = document.createElement('div');
            el.className = 'log-entry';
            el.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logsContainer.appendChild(el);
            if(logsContainer.children.length > 5) {
                logsContainer.removeChild(logsContainer.firstChild);
            }
        }

        // Parçacık Sınıfı
        class Particle {
            constructor(intensity) {
                // Ekran dışından başlat
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.max(width, height);
                this.x = cx + Math.cos(angle) * dist;
                this.y = cy + Math.sin(angle) * dist;
                
                this.speed = (Math.random() * 5 + 2) * (1 + intensity * 2);
                this.type = Math.random() > 0.6 ? 'image' : 'text'; // %40 resim, %60 metin
                
                if(this.type === 'image' && loadedImages.length > 0) {
                    this.img = loadedImages[Math.floor(Math.random() * loadedImages.length)];
                } else {
                    this.type = 'text';
                    // Artık bu dizi canlı verilerle de dolup taşıyor olacak
                    this.text = dataTexts[Math.floor(Math.random() * dataTexts.length)];
                }
                
                this.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
                this.size = Math.random() * 15 + 12; // Yazı boyutları
            }

            update(intensity) {
                const dx = ai.x - this.x;
                const dy = ai.y - this.y;
                const distance = Math.sqrt(dx*dx + dy*dy);
                
                // Merkeze (AI'a) doğru git
                this.x += (dx / distance) * this.speed;
                this.y += (dy / distance) * this.speed;

                // Emme etkisi için spiralleşme (yoğunluk arttıkça)
                if(intensity > 0.5) {
                    this.x += (Math.random() - 0.5) * 10 * intensity;
                    this.y += (Math.random() - 0.5) * 10 * intensity;
                }

                if(distance < ai.radius) {
                    return true; // Yutuldu
                }
                return false;
            }

            draw() {
                ctx.globalAlpha = 0.8;
                if(this.type === 'text') {
                    ctx.fillStyle = this.color;
                    ctx.font = `${this.size}px monospace`;
                    ctx.fillText(this.text, this.x, this.y);
                } else if(this.img && this.img.complete) {
                    ctx.drawImage(this.img, this.x - 30, this.y - 30, 60, 60);
                }
                ctx.globalAlpha = 1.0;
            }
        }

        class Block {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = 40;
                this.color = `hsl(${Math.random() * 360}, 80%, 50%)`;
                this.angle = Math.random() * Math.PI;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.strokeRect(-this.size/2, -this.size/2, this.size, this.size);
                ctx.restore();
            }
        }

        // Ana Döngü
        function loop() {
            requestAnimationFrame(loop);

            // Arkaplanı temizle
            ctx.globalCompositeOperation = 'source-over';
            if(state === 'training' || state === 'transition') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; // Hareket izi efekti
            } else {
                ctx.fillStyle = '#000';
            }
            ctx.fillRect(0, 0, width, height);
            ctx.globalCompositeOperation = 'lighter';

            const now = Date.now();

            if (state === 'training') {
                const elapsed = now - startTime;
                let progress = elapsed / TRAINING_DURATION;
                if (progress > 1) progress = 1;

                // UI Güncelleme (Gerçekçi akan sayılar)
                epoch += Math.floor(Math.random() * 50 * (1 + progress * 10));
                epochEl.innerText = epoch;
                
                // Loss logaritmik olarak düşer
                let loss = Math.exp(-progress * 5) + (Math.random() * 0.1 * (1-progress));
                lossEl.innerText = loss.toFixed(6);
                
                let acc = (1 - loss) * 100;
                if(acc > 99.99) acc = 99.99;
                accEl.innerText = acc.toFixed(2);

                progressBar.style.width = `${progress * 100}%`;

                // AI Titremesi ve Büyümesi
                ai.radius = ai.baseRadius + (progress * 120) + Math.sin(now / 50) * (5 + progress * 25);
                
                // Ekran sarsıntısı (Eğitim ilerledikçe artar)
                if(progress > 0.6) {
                    const shake = (progress - 0.6) * 20;
                    ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
                }

                // Parçacık üretimi (Eğitim ilerledikçe çok hızlanır)
                const spawnRate = Math.floor(1 + progress * 12);
                for(let i=0; i<spawnRate; i++) {
                    if(Math.random() < 0.3 + (progress * 0.5)) {
                        particles.push(new Particle(progress));
                    }
                }

                // Parçacıkları güncelle ve çiz
                for(let i = particles.length - 1; i >= 0; i--) {
                    let p = particles[i];
                    if(p.update(progress)) {
                        particles.splice(i, 1);
                        if(Math.random() < 0.1) {
                            playBeep(400 + Math.random() * 600, 'sine', 0.05, 0.1);
                        }
                    } else {
                        p.draw();
                    }
                }

                drawAI();

                // Çılgın bitiş ışığı (Sürenin son %5'i)
                if(progress > 0.95) {
                    ctx.fillStyle = `rgba(255, 255, 255, ${(progress - 0.95) * 20})`;
                    ctx.fillRect(0, 0, width, height);
                }

                ctx.setTransform(1, 0, 0, 1, 0, 0); // Transformu sıfırla

                if (progress === 1) {
                    state = 'transition';
                    playLevelUp();
                    setTimeout(() => {
                        state = 'exploring';
                        topHud.style.display = 'none';
                        bottomHud.style.display = 'none';
                        particles = [];
                        ai.radius = 30; // Çekirdek normale dön
                        ai.targetX = cx;
                        ai.targetY = cy;
                    }, 3000);
                }

            } else if (state === 'transition') {
                // Patlama ve geçiş efekti
                ctx.fillStyle = '#fff';
                ctx.fillRect(0, 0, width, height);
                drawAI();
                ai.radius *= 0.95; // Hızla küçül
                if(ai.radius < 30) ai.radius = 30;
                
                ctx.fillStyle = '#000';
                ctx.font = '40px monospace';
                ctx.textAlign = 'center';
                ctx.fillText("TÜM İNTERNET BİLGİSİ İŞLENDİ.", cx, cy - 100);
                ctx.fillText("YENİ GÖREV BAŞLATILIYOR...", cx, cy + 100);
                ctx.textAlign = 'left';

            } else if (state === 'exploring') {
                // Yeni görev: Saf saf oda içinde gezinme
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 5;
                ctx.strokeRect(50, 50, width - 100, height - 100);
                
                blocks.forEach(b => b.draw());

                const dx = ai.targetX - ai.x;
                const dy = ai.targetY - ai.y;
                const dist = Math.sqrt(dx*dx + dy*dy);

                if(dist < 5) {
                    // Odanın içinde rastgele yeni hedef seç
                    ai.targetX = 60 + Math.random() * (width - 120);
                    ai.targetY = 60 + Math.random() * (height - 120);
                    
                    // Rastgele blok bırak ve tok ses çıkar
                    if(Math.random() < 0.5) {
                        blocks.push(new Block(ai.x, ai.y));
                        playThud();
                        
                        // Ekran dolmasın diye eskileri sil
                        if(blocks.length > 50) blocks.shift();
                    }
                } else {
                    ai.x += (dx / dist) * ai.speed;
                    ai.y += (dy / dist) * ai.speed;
                }

                // Yavaş titreşim
                ai.pulsate += 0.1;
                ai.radius = 30 + Math.sin(ai.pulsate) * 5;

                drawAI();
                
                // Troll yazısı
                ctx.fillStyle = '#fff';
                ctx.font = '20px monospace';
                ctx.globalAlpha = 0.5;
                ctx.fillText("Bütün evreni öğrendim ama sadece blok dizebiliyorum :(", 60, height - 20);
                ctx.globalAlpha = 1.0;
            }
        }

        function drawAI() {
            ctx.beginPath();
            ctx.arc(ai.x, ai.y, ai.radius, 0, Math.PI * 2);
            ctx.fillStyle = ai.color;
            ctx.fill();
            
            // Etrafındaki Kırmızı Parlama (Aura)
            ctx.shadowBlur = 50;
            ctx.shadowColor = ai.color;
            ctx.beginPath();
            ctx.arc(ai.x, ai.y, ai.radius * 0.8, 0, Math.PI * 2);
            ctx.fillStyle = '#ff6666';
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Çekirdek
            ctx.beginPath();
            ctx.arc(ai.x, ai.y, ai.radius * 0.3, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
        }

        // Simülasyonu Tetikleyen İlk Tıklama
        document.body.addEventListener('click', () => {
            if (state === 'init') {
                initAudio();
                preloadImages();
                
                // Canlı Veri Çekimini Başlat! (Hemen bir kere çek, sonra her 3 saniyede bir çek)
                fetchRealInternetData();
                setInterval(fetchRealInternetData, 3000); 

                // Siyah giriş ekranını gizle
                startScreen.style.opacity = 0;
                setTimeout(() => { startScreen.style.display = 'none'; }, 500);

                // Arayüzü göster
                topHud.style.display = 'flex';
                bottomHud.style.display = 'block';

                state = 'training';
                startTime = Date.now();
                addLog("SİSTEM BAŞLATILDI.");
                addLog("Canlı Wikipedia bağlantısı kuruldu...");
                addLog("İnternet yutuluyor...");
            }
        });

        // Simülasyon Döngüsünü Başlat
        requestAnimationFrame(loop);

    </script>
</body>
</html>
