<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TUNCER HOLO</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root{
  --c:#00e5ff; --c2:#0077ff; --gold:#ffd700;
  --red:#ff1744; --org:#ff6d00; --grn:#00e676; --prp:#ea80fc;
  --bg:#020a14; --panel:rgba(1,12,30,0.93);
  --glow:0 0 18px rgba(0,229,255,.65);
  --glow2:0 0 40px rgba(0,229,255,.28);
  --mono:'Share Tech Mono',monospace;
  --orb:'Orbitron',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:transparent !important;touch-action:none;}
body{font-family:var(--mono);color:var(--c);}

/* Siyah ekranı önlemek için canvas ve video ayarları */
#gl-canvas{position:fixed;inset:0;z-index:1;background:transparent !important;}
#bg-video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;background:black;}

#overlay{position:fixed;inset:0;z-index:10;pointer-events:none;background:transparent;}
#hand-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}

#sl{position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,
  rgba(0,229,255,.014) 3px,rgba(0,229,255,.014) 4px);}

#hud{position:absolute;inset:0;display:none;}
#hud.vis{display:block;}
#hud>*{pointer-events:auto;}

.hco{position:absolute;width:34px;height:34px;border-color:rgba(0,229,255,.55);border-style:solid;}
.hco.tl{top:6px;left:6px;border-width:2px 0 0 2px;}
.hco.tr{top:6px;right:6px;border-width:2px 2px 0 0;}
.hco.bl{bottom:6px;left:6px;border-width:0 0 2px 2px;}
.hco.br{bottom:6px;right:6px;border-width:0 2px 2px 0;}

#topbar{
  position:absolute;top:0;left:0;right:0;height:54px;
  background:linear-gradient(to bottom,rgba(0,15,40,.96),transparent);
  border-bottom:1px solid rgba(0,229,255,.1);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;pointer-events:none;
}
#logo{font-family:var(--orb);font-size:17px;font-weight:900;letter-spacing:6px;
  color:var(--c);text-shadow:var(--glow);}
#logo em{color:var(--gold);font-style:normal;}
#tstat{text-align:right;font-size:9px;line-height:1.9;opacity:.7;}
#fps-el{color:var(--gold);}
#xr-el{color:var(--grn);}
#mp-el{color:var(--prp);}

.cbtn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  border:1px solid rgba(0,229,255,.32);background:rgba(0,25,65,.75);
  color:var(--c);cursor:pointer;font-family:var(--mono);
  clip-path:polygon(5px 0,100% 0,100% calc(100% - 5px),calc(100% - 5px) 100%,0 100%,0 5px);
  transition:all .16s;touch-action:manipulation;
}
.cbtn:hover,.cbtn:active{background:rgba(0,229,255,.18);box-shadow:var(--glow);}
.cbtn.act{background:rgba(0,229,255,.22);border-color:var(--c);box-shadow:var(--glow);}
.cbtn .ci{font-size:18px;line-height:1;}
.cbtn .cl{font-size:7px;opacity:.72;letter-spacing:.4px;}
.cbtn.hole{border-color:rgba(255,109,0,.45);color:var(--org);}
.cbtn.del{border-color:rgba(255,23,68,.45);color:var(--red);}

#lp{
  position:absolute;left:0;top:58px;bottom:84px;width:56px;
  background:var(--panel);border-right:1px solid rgba(0,229,255,.13);
  display:flex;flex-direction:column;align-items:center;
  padding:6px 0;gap:3px;overflow-y:auto;pointer-events:auto;
}
.psec{width:44px;text-align:center;font-size:7.5px;color:var(--c);opacity:.4;
  letter-spacing:1.5px;border-top:1px solid rgba(0,229,255,.1);padding-top:4px;margin-top:2px;}
.lbtn{width:46px;height:44px;flex-shrink:0;}

#rp{
  position:absolute;right:0;top:58px;bottom:84px;width:56px;
  background:var(--panel);border-left:1px solid rgba(0,229,255,.13);
  display:flex;flex-direction:column;align-items:center;
  padding:6px 0;gap:3px;overflow-y:auto;pointer-events:auto;
}

#botbar{
  position:absolute;bottom:0;left:0;right:0;height:82px;
  background:linear-gradient(to top,rgba(0,15,40,.96),transparent);
  border-top:1px solid rgba(0,229,255,.1);
  display:flex;align-items:center;justify-content:center;
  gap:14px;padding:0 14px;pointer-events:auto;
}
#vbtn{
  width:52px;height:52px;border-radius:50%;
  border:2px solid var(--c);background:rgba(0,40,100,.75);
  color:var(--c);font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}

#objlist{
  position:absolute;top:58px;right:60px;max-height:175px;max-width:155px;
  background:rgba(0,10,26,.92);border:1px solid rgba(0,229,255,.18);overflow-y:auto;pointer-events:auto;
}
.olit{padding:5px 9px;font-size:9px;color:var(--c);cursor:pointer;border-bottom:1px solid rgba(0,229,255,.07);}

#toast{
  position:absolute;top:60px;left:50%;transform:translateX(-50%);
  background:rgba(0,12,32,.96);border:1px solid var(--c);color:var(--c);
  padding:6px 16px;font-size:11px;opacity:0;transition:opacity .22s;
  pointer-events:none;z-index:30;
}

#perm{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 40% 40%,rgba(0,40,100,.97),rgba(0,0,0,.99));
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:28px;text-align:center;pointer-events:auto;z-index:100;
}
#loading{
  position:absolute;inset:0;background:#000;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:auto;z-index:101;
}
#hgrid{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.05;
  background-image:linear-gradient(rgba(0,229,255,.8) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,229,255,.8) 1px,transparent 1px);
  background-size:44px 44px;}
</style>
</head>
<body>

<div id="hgrid"></div>
<video id="bg-video" autoplay playsinline muted></video>
<canvas id="gl-canvas"></canvas>

<div id="overlay">
  <canvas id="hand-canvas"></canvas>
  <div id="sl"></div>

  <!-- GİRİŞ EKRANI -->
  <div id="perm">
    <div style="font-family:var(--orb);font-size:32px;font-weight:900;letter-spacing:8px;text-shadow:var(--glow);margin-bottom:3px;">TUNCER <em>HOLO</em></div>
    <div style="font-size:9px;letter-spacing:5px;opacity:.35;margin-bottom:40px;">AR 3D MODELLEME SİSTEMİ v3.1</div>
    <button id="startbtn" onclick="bootApp()" style="padding:13px 42px;border:2px solid var(--c);background:rgba(0,60,150,.35);color:var(--c);font-family:var(--orb);font-size:11px;letter-spacing:4px;cursor:pointer;clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);">▶ AR BAŞLAT</button>
  </div>

  <!-- YÜKLENİYOR -->
  <div id="loading">
    <div style="font-size:9.5px;letter-spacing:2px;opacity:.55;">SİSTEM BAŞLATILIYOR...</div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="hco tl"></div><div class="hco tr"></div>
    <div class="hco bl"></div><div class="hco br"></div>

    <div id="topbar">
      <div id="logo">⬡ TUNCER <em>HOLO</em></div>
      <div id="tstat">
        <div id="fps-el">FPS: --</div>
        <div id="xr-el">◉ BEKLENİYOR</div>
        <div id="mp-el">✋ EL TAKİBİ</div>
      </div>
    </div>

    <!-- Nesne Paneli -->
    <div id="lp">
      <div class="psec">KATI</div>
      <button class="cbtn lbtn" onclick="qAdd('cube')"><span class="ci">⬛</span><span class="cl">KÜP</span></button>
      <button class="cbtn lbtn" onclick="qAdd('cylinder')"><span class="ci">⬤</span><span class="cl">SLNDİR</span></button>
      <button class="cbtn lbtn" onclick="qAdd('sphere')"><span class="ci">◉</span><span class="cl">KÜRE</span></button>
      <div class="psec">DELİK</div>
      <button class="cbtn lbtn hole" onclick="qAdd('cube',true)"><span class="ci">⬜</span><span class="cl">D.KÜP</span></button>
    </div>

    <!-- Araç Paneli -->
    <div id="rp">
      <div class="psec">MOD</div>
      <button class="cbtn lbtn act" id="btn-move" onclick="setTool('move')"><span class="ci">✥</span><span class="cl">TAŞI</span></button>
      <button class="cbtn lbtn" id="btn-rotate" onclick="setTool('rotate')"><span class="ci">↻</span><span class="cl">DÖNDÜR</span></button>
      <button class="cbtn lbtn" id="btn-scale" onclick="setTool('scale')"><span class="ci">⤢</span><span class="cl">ÖLÇEK</span></button>
      <div class="psec">SİL</div>
      <button class="cbtn lbtn del" onclick="delSel()"><span class="ci">✕</span><span class="cl">SİL</span></button>
    </div>

    <div id="objlist"><div id="oli"></div></div>

    <div id="botbar">
      <button id="vbtn" onclick="toggleVoice()">🎤</button>
      <div id="mlbl">◈ TAŞIMA<br>MODU</div>
    </div>

    <div id="toast"></div>
  </div>
</div>

<video id="mp-video" playsinline autoplay muted style="position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;"></video>

<!-- Kütüphaneler -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<script>
let scene, camera, renderer, raycaster, reticleMesh;
let xrSession = null;
let mpHands = null;

const S = {
  ready: false, isXR: false, tool: 'move', objects: [], selected: [], cnt: 0,
  pinching: false, grabbing: false, color: 0x00e5ff
};

const SHAPES = {
  cube: { g:()=>new THREE.BoxGeometry(.25,.25,.25), name:'Küp', icon:'⬛' },
  cylinder: { g:()=>new THREE.CylinderGeometry(.1,.1,.25,32), name:'Silindir', icon:'⬤' },
  sphere: { g:()=>new THREE.SphereGeometry(.12,32,32), name:'Küre', icon:'◉' }
};

function initThree() {
  const cv = document.getElementById('gl-canvas');
  scene = new THREE.Scene();
  
  // AR için kamera açısı ve saydamlık ayarı
  camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
  
  // renderer'ın alpha (şeffaflık) değerinin true olması siyah ekranı önler
  renderer = new THREE.WebGLRenderer({
    canvas: cv,
    alpha: true, 
    antialias: true,
    preserveDrawingBuffer: true
  });
  renderer.setClearColor(0x000000, 0); // Arka planı tamamen şeffaf yap
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.xr.enabled = true;

  scene.add(new THREE.AmbientLight(0xffffff, 1.2));
  const dl = new THREE.DirectionalLight(0xffffff, 0.8);
  dl.position.set(5, 10, 5); scene.add(dl);

  const rGeo = new THREE.RingGeometry(.08, .1, 32); rGeo.rotateX(-Math.PI/2);
  reticleMesh = new THREE.Mesh(rGeo, new THREE.MeshBasicMaterial({color: 0x00e5ff, transparent: true, opacity: 0.5}));
  reticleMesh.matrixAutoUpdate = false; reticleMesh.visible = false;
  scene.add(reticleMesh);

  raycaster = new THREE.Raycaster();
}

async function bootApp() {
  document.getElementById('perm').style.display = 'none';
  document.getElementById('loading').style.display = 'flex';
  
  initThree();
  await initMediaPipe();

  // Kamera görüntüsünü bg-video elementine bağla
  if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment' }
    }).then(stream => {
      const v = document.getElementById('bg-video');
      v.srcObject = stream;
      v.play();
      document.getElementById('loading').style.display = 'none';
      document.getElementById('hud').classList.add('vis');
    }).catch(e => {
      console.error("Kamera hatası:", e);
      document.getElementById('loading').style.display = 'none';
      document.getElementById('hud').classList.add('vis');
    });
  }

  // Animasyon döngüsü
  renderer.setAnimationLoop(() => {
    renderer.render(scene, camera);
  });
}

async function initMediaPipe() {
  const HandsLib = window.Hands || Hands;
  if (!HandsLib) return;

  mpHands = new HandsLib({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
  });

  mpHands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.5
  });

  const video = document.getElementById('mp-video');
  const CameraLib = window.Camera || Camera;
  if (CameraLib) {
    const mpCam = new CameraLib(video, {
      onFrame: async () => { await mpHands.send({image: video}); },
      width: 640, height: 480
    });
    mpCam.start();
  }
}

function qAdd(type, isHole=false) {
  const cfg = SHAPES[type];
  const mat = new THREE.MeshPhongMaterial({color: isHole ? 0xff6d00 : S.color, transparent: isHole, opacity: isHole ? 0.5 : 1});
  const mesh = new THREE.Mesh(cfg.g(), mat);
  mesh.position.set(0, 0, -1).applyMatrix4(camera.matrixWorld);
  S.cnt++;
  mesh.userData = { id: S.cnt, name: cfg.name + " " + S.cnt, icon: cfg.icon };
  scene.add(mesh);
  S.objects.push(mesh);
  updateObjList();
}

function setTool(t) {
  S.tool = t;
  document.querySelectorAll('#rp .cbtn').forEach(b => b.classList.remove('act'));
  document.getElementById('btn-'+t).classList.add('act');
  document.getElementById('mlbl').innerHTML = t.toUpperCase() + "<br>MODU";
}

function updateObjList() {
  const container = document.getElementById('oli');
  container.innerHTML = "";
  S.objects.forEach(o => {
    const div = document.createElement('div');
    div.className = 'olit';
    div.innerHTML = `${o.userData.icon} ${o.userData.name}`;
    container.appendChild(div);
  });
}

function delSel() {
  if(S.objects.length > 0) {
    const obj = S.objects.pop();
    scene.remove(obj);
    updateObjList();
  }
}

function toggleVoice() {}
</script>
</body>
</html>
