<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tuncer AR v20.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: monospace; }
        #ui-container { position: absolute; inset: 0; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        .hud-panel { background: rgba(0, 15, 30, 0.9); border-left: 4px solid #00e5ff; padding: 15px; border-radius: 10px; color: #00e5ff; font-size: 11px; align-self: flex-end; backdrop-filter: blur(8px); box-shadow: 0 0 20px rgba(0,0,0,0.5); text-transform: uppercase; }
        #start-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        #btn-activate { 
            background: #00e5ff; color: #000; font-weight: 900; padding: 22px 60px; 
            border-radius: 15px; border: none; cursor: pointer; font-size: 20px; 
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.5); pointer-events: auto;
            text-transform: uppercase; letter-spacing: 2px; transition: transform 0.1s;
        }
        #btn-activate:active { transform: scale(0.95); }
        #target-hint { align-self: center; margin-bottom: 60px; background: rgba(0,229,255,0.2); padding: 10px 25px; border-radius: 30px; color: #00e5ff; border: 1px solid #00e5ff; font-size: 10px; text-transform: uppercase; backdrop-filter: blur(4px); }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="start-screen">
        <h1 style="color:#00e5ff; font-size: 32px; font-weight: 900; margin-bottom:10px;">TUNCER CORE v20</h1>
        <p style="color:#444; margin-bottom:40px; font-size:11px;">WEBXR NATIVE EL TAKİBİ AKTİF (STABLE)</p>
        <button id="btn-activate">SİSTEMİ BAŞLAT</button>
    </div>

    <div id="ui-container" style="display: none;">
        <div class="hud-panel">
            SİSTEM: <span id="sys-status" style="color:#fff;">BEKLİYOR</span><br>
            EL_AI: <span id="hand-status" style="color:#ff3366;">ARANIYOR</span><br>
            MOD: <span id="interact-mode" style="color:#fff;">GÖZLEM</span><br>
            SES: <span id="voice-cmd" style="color:#fff;">BEKLENİYOR</span>
        </div>
        <div id="target-hint">Yüzey aranıyor...</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { XRHandModelFactory } from 'three/addons/webxr/XRHandModelFactory.js';

        let scene, camera, renderer, reticle;
        let hitTestSource = null, hitTestSourceRequested = false;
        let objects = [], selectedObject = null;
        let hands = [];
        let isPinching = false;
        
        let fingerCursor;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            // Alpha: true ile arka planı şeffaf yapıp kameranın görünmesini sağlıyoruz
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 2.0));
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(2, 5, 2);
            scene.add(light);

            // Zemin Hedefleyicisi
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.05, 0.07, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x00e5ff, transparent: true, opacity: 0.8 })
            );
            reticle.matrixAutoUpdate = false; 
            reticle.visible = false;
            scene.add(reticle);

            // Parmak Ucu İmleci
            fingerCursor = new THREE.Mesh(
                new THREE.SphereGeometry(0.015, 16, 16),
                new THREE.MeshBasicMaterial({ color: 0x00e5ff, wireframe: true })
            );
            fingerCursor.visible = false;
            scene.add(fingerCursor);

            // WebXR Native El Takibi Modelleri
            const handModelFactory = new XRHandModelFactory();
            for (let i = 0; i < 2; i++) {
                const hand = renderer.xr.getHand(i);
                hand.add(handModelFactory.createHandModel(hand, "mesh"));
                scene.add(hand);
                hands.push(hand);

                hand.addEventListener('connected', () => {
                    document.getElementById('hand-status').innerText = "AKTİF";
                    document.getElementById('hand-status').style.color = "#00ffcc";
                });
                hand.addEventListener('disconnected', () => {
                    document.getElementById('hand-status').innerText = "ARANIYOR";
                    document.getElementById('hand-status').style.color = "#ff3366";
                });
            }

            // Başlatma Düğmesi
            const startBtn = document.getElementById('btn-activate');
            startBtn.addEventListener('click', async () => {
                if (!navigator.xr) {
                    alert("Cihazınız AR desteklemiyor.");
                    return;
                }

                // Kamera çakışmasını önleyen "native" WebXR ayarları
                const sessionInit = { 
                    requiredFeatures: ['hit-test'], 
                    optionalFeatures: ['dom-overlay', 'hand-tracking'], 
                    domOverlay: { root: document.getElementById('ui-container') } 
                };
                
                try {
                    const session = await navigator.xr.requestSession('immersive-ar', sessionInit);
                    renderer.xr.setSession(session);
                    
                    document.getElementById('start-screen').style.display = 'none';
                    document.getElementById('ui-container').style.display = 'flex';
                    document.getElementById('sys-status').innerText = "AKTİF";
                    
                    initVoice(); // Sesli komutları başlat
                    renderer.setAnimationLoop(render);
                } catch (e) {
                    alert("AR Başlatılamadı. Lütfen kamera izinlerini kontrol edin.");
                }
            });
        }

        // Sesli Komut Modülü
        function initVoice() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) return;
            const rec = new Speech();
            rec.lang = 'tr-TR';
            rec.continuous = true;
            rec.onresult = (e) => {
                const cmd = e.results[e.results.length - 1][0].transcript.toLowerCase();
                document.getElementById('voice-cmd').innerText = cmd.toUpperCase();
                
                if (cmd.includes("küp") && reticle.visible) createObject('cube');
                if (cmd.includes("küre") && reticle.visible) createObject('sphere');
                if (cmd.includes("sil") && selectedObject) {
                    scene.remove(selectedObject);
                    objects = objects.filter(o => o !== selectedObject);
                    selectedObject = null;
                }
                if (cmd.includes("büyüt") && selectedObject) selectedObject.scale.multiplyScalar(1.2);
                if (cmd.includes("küçült") && selectedObject) selectedObject.scale.multiplyScalar(0.8);
            };
            rec.onend = () => { if (renderer.xr.isPresenting) rec.start(); };
            try { rec.start(); } catch(e){}
        }

        function createObject(type) {
            const geo = type === 'cube' ? new THREE.BoxGeometry(0.1, 0.1, 0.1) : new THREE.SphereGeometry(0.06, 32, 32);
            const mat = new THREE.MeshStandardMaterial({ 
                color: new THREE.Color(`hsl(${Math.random() * 360}, 80%, 50%)`), 
                metalness: 0.6, 
                roughness: 0.2 
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.setFromMatrixPosition(reticle.matrix);
            mesh.position.y += 0.05; // Yüzeyin üstüne oturt
            scene.add(mesh);
            objects.push(mesh);
        }

        function render(timestamp, frame) {
            if (frame) {
                const session = renderer.xr.getSession();
                const referenceSpace = renderer.xr.getReferenceSpace();

                // YÜZEY TARAMA (Hit-Test)
                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then(s => {
                        session.requestHitTestSource({ space: s }).then(source => hitTestSource = source);
                    });
                    hitTestSourceRequested = true;
                }
                if (hitTestSource) {
                    const results = frame.getHitTestResults(hitTestSource);
                    if (results.length > 0) {
                        reticle.visible = true;
                        reticle.matrix.fromArray(results[0].getPose(referenceSpace).transform.matrix);
                        document.getElementById('target-hint').innerText = "YÜZEY HAZIR - EKRANA DOKUN VEYA KÜP DE";
                    } else { 
                        reticle.visible = false; 
                        document.getElementById('target-hint').innerText = "YÜZEY ARANIYOR (ZEMİNE BAK)...";
                    }
                }

                // YERLEŞİK EL ETKİLEŞİMİ (NATIVE HAND TRACKING)
                let handDetected = false;
                for (const hand of hands) {
                    if (hand.joints && Object.keys(hand.joints).length > 0) {
                        handDetected = true;
                        const indexTip = hand.joints['index-finger-tip'];
                        const thumbTip = hand.joints['thumb-tip'];

                        if (indexTip && thumbTip) {
                            fingerCursor.visible = true;
                            
                            const indexPos = new THREE.Vector3().setFromMatrixPosition(indexTip.matrixWorld);
                            const thumbPos = new THREE.Vector3().setFromMatrixPosition(thumbTip.matrixWorld);
                            
                            fingerCursor.position.copy(indexPos);

                            // Gerçek Dünya 3D Mesafe Hesaplama (Cimdik için)
                            const pinchDist = indexPos.distanceTo(thumbPos);
                            const isPinchNow = pinchDist < 0.03; // 3 santimetreden yakınsa

                            if (isPinchNow) {
                                fingerCursor.material.color.setHex(0xff3366); // Kırmızı
                                document.getElementById('interact-mode').innerText = "TUTULUYOR";
                                
                                if (!isPinching) {
                                    isPinching = true;
                                    // Obje Yakalama
                                    for (let obj of objects) {
                                        if (obj.position.distanceTo(indexPos) < 0.15) { // 15 cm yakındaysa tut
                                            selectedObject = obj;
                                            break;
                                        }
                                    }
                                }

                                // Taşıma ve Döndürme
                                if (selectedObject) {
                                    // Objeyi parmağın pozisyonuna taşı
                                    selectedObject.position.lerp(indexPos, 0.2);
                                    // Objeyi elin rotasyonuna göre döndür
                                    selectedObject.quaternion.slerp(hand.quaternion, 0.1);
                                }
                            } else {
                                isPinching = false;
                                document.getElementById('interact-mode').innerText = "GÖZLEM";
                                fingerCursor.material.color.setHex(0x00e5ff); // Mavi
                                
                                // Yaklaşım Algısı (Sarı Renk)
                                let isHovering = false;
                                for (let obj of objects) {
                                    if (obj.position.distanceTo(indexPos) < 0.15) {
                                        isHovering = true;
                                        break;
                                    }
                                }
                                if (isHovering && !selectedObject) {
                                    fingerCursor.material.color.setHex(0xffea00); // Sarı
                                } else {
                                    selectedObject = null;
                                }
                            }
                        }
                        break; // Sadece ilk algılanan eli kullan
                    }
                }
                if (!handDetected) fingerCursor.visible = false;
            }
            renderer.render(scene, camera);
        }

        // Tıklama Yedeği (El kullanmak istemezsen)
        window.addEventListener('pointerdown', (e) => {
            if (reticle.visible && e.target.id !== 'btn-activate') {
                createObject('cube');
            }
        });

        init();
    </script>
</body>
</html>
