<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuncerLab Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0f16; color: white; font-family: sans-serif; }
        .glass { background: rgba(20, 25, 35, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(0, 229, 255, 0.1); border-radius: 15px; }
        .view-section { display: none; }
        .view-section.active { display: block; }
    </style>
</head>
<body class="p-4">
    <nav class="glass max-w-4xl mx-auto p-4 flex justify-between items-center mb-6 sticky top-2 z-50">
        <h1 class="font-bold text-xl cursor-pointer" onclick="switchView('shop')">TUNCERLAB</h1>
        <div class="space-x-4 text-sm font-bold">
            <button onclick="switchView('shop')">MAĞAZA</button>
            <button onclick="switchView('track')">TAKİP</button>
            <button onclick="switchView('cart')" class="text-cyan-400">SEPET (<span id="cart-count">0</span>)</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto">
        <section id="view-shop" class="view-section active">
            <div id="product-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </section>

        <section id="view-track" class="view-section">
            <div class="glass p-6 max-w-md mx-auto">
                <h2 class="text-lg font-bold mb-4 text-center">Sipariş Takibi</h2>
                <input type="email" id="track-email" placeholder="E-posta" class="w-full bg-black/40 border border-white/10 p-3 rounded mb-4 outline-none focus:border-cyan-400">
                <button onclick="trackOrder()" class="w-full bg-cyan-500 text-black font-bold py-3 rounded">SORGULA</button>
                <div id="track-results" class="mt-4 space-y-2"></div>
            </div>
        </section>

        <section id="view-cart" class="view-section">
            <div class="glass p-6">
                <h2 class="text-lg font-bold mb-4">Sepetim</h2>
                <div id="cart-list" class="space-y-2 mb-4"></div>
                <hr class="border-white/10 mb-4">
                <form onsubmit="submitOrder(event)" class="space-y-3">
                    <input type="text" id="c-name" placeholder="Ad Soyad" required class="w-full bg-black/40 border border-white/10 p-2 rounded">
                    <input type="email" id="c-email" placeholder="E-posta" required class="w-full bg-black/40 border border-white/10 p-2 rounded">
                    <button type="submit" class="w-full bg-cyan-500 text-black font-bold py-3 rounded">SİPARİŞİ TAMAMLA</button>
                </form>
            </div>
        </section>
    </main>

    <script>
        // RENDER ADRESİNİ BURAYA SABİTLEDİK
        const API_URL = "https://tuncer.onrender.com/api";
        let products = [];
        let cart = [];

        async function loadProducts() {
            try {
                const res = await fetch(`${API_URL}/products`);
                products = await res.json();
                const grid = document.getElementById('product-grid');
                grid.innerHTML = products.map(p => `
                    <div class="glass p-4 text-center">
                        <img src="${p.image}" class="h-40 w-full object-cover rounded mb-3">
                        <h3 class="font-bold">${p.name}</h3>
                        <p class="text-cyan-400 font-bold my-2">${p.price} TL</p>
                        <button onclick="addToCart(${p.id})" class="bg-white/10 hover:bg-cyan-500 hover:text-black w-full py-2 rounded text-sm transition">SEPETE EKLE</button>
                    </div>
                `).join('');
            } catch (e) { alert("Sunucuya bağlanılamadı!"); }
        }

        function addToCart(id) {
            cart.push(products.find(x => x.id === id));
            document.getElementById('cart-count').innerText = cart.length;
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            list.innerHTML = cart.map((item, i) => `
                <div class="flex justify-between items-center bg-white/5 p-2 rounded">
                    <span>${item.name}</span>
                    <span class="font-bold">${item.price} TL</span>
                </div>
            `).join('');
        }

        async function submitOrder(e) {
            e.preventDefault();
            const data = {
                name: document.getElementById('c-name').value,
                email: document.getElementById('c-email').value,
                items: cart
            };
            const res = await fetch(`${API_URL}/orders`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await res.json();
            if(result.success) {
                alert("Sipariş alındı! Kod: " + result.orderId);
                cart = [];
                document.getElementById('cart-count').innerText = "0";
                switchView('shop');
            }
        }

        async function trackOrder() {
            const email = document.getElementById('track-email').value;
            const res = await fetch(`${API_URL}/orders/track/${email}`);
            const data = await res.json();
            const resDiv = document.getElementById('track-results');
            resDiv.innerHTML = data.map(o => `
                <div class="bg-white/5 p-3 rounded border-l-4 border-cyan-500">
                    <div class="text-xs text-gray-400">ID: ${o.id}</div>
                    <div class="font-bold">Durum: ${o.status}</div>
                </div>
            `).join('');
        }

        function switchView(v) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            if(v === 'cart') renderCart();
        }

        window.onload = loadProducts;
    </script>
</body>
</html>
