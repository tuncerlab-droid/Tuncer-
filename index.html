<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuncer Zeka V6 - Advanced AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap');

        :root {
            --cyan: #00f3ff;
            --cyan-glow: rgba(0, 243, 255, 0.4);
            --bg-dark: rgba(2, 12, 20, 0.9);
        }

        body {
            margin: 0;
            background-color: #000;
            font-family: 'Share Tech Mono', monospace;
            color: var(--cyan);
            overflow: hidden;
        }

        #camera-feed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -2;
        }

        .hud-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, transparent 20%, var(--bg-dark) 100%);
            z-index: -1;
            pointer-events: none;
        }

        /* Arc Reactor Animation */
        .core-container {
            position: relative;
            width: 150px;
            height: 150px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid var(--cyan);
            inset: 0;
            box-shadow: 0 0 20px var(--cyan-glow);
        }

        .ring-1 { animation: spin 5s linear infinite; border-style: double; }
        .ring-2 { inset: 15px; border: 1px dashed var(--cyan); animation: spin-rev 3s linear infinite; opacity: 0.6; }
        
        .core-center {
            position: absolute;
            width: 60px;
            height: 60px;
            background: var(--cyan);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 1.5rem;
            box-shadow: 0 0 40px var(--cyan);
            z-index: 10;
        }

        .listening .core-center {
            animation: pulse 0.6s infinite alternate;
            background: #fff;
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes spin-rev { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.15); } }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 3px;
            background: var(--cyan);
            box-shadow: 0 0 20px var(--cyan);
            top: -10%;
            display: none;
            z-index: 5;
        }

        .scanning .scan-line {
            display: block;
            animation: scanMove 2s infinite linear;
        }

        @keyframes scanMove { 0% { top: 0%; } 100% { top: 100%; } }

        .console {
            height: 160px;
            background: rgba(0, 20, 30, 0.7);
            border: 1px solid rgba(0, 243, 255, 0.3);
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body class="flex flex-col h-screen">

    <video id="camera-feed" autoplay muted playsinline></video>
    <div class="hud-overlay"></div>
    <div class="scan-line" id="scan-line"></div>
    <canvas id="capture-canvas" class="hidden"></canvas>

    <header class="p-6 flex justify-between z-10 w-full pointer-events-none">
        <div>
            <h1 class="text-2xl font-bold tracking-[0.2em]" style="font-family: Orbitron">TUNCER <span class="text-white">ZEKA</span></h1>
            <p class="text-[10px] opacity-60">DESIGNER: AHMET TUNCER | STATUS: ENCRYPTED</p>
        </div>
        <div class="text-right">
            <div id="clock" class="text-lg font-bold">00:00:00</div>
            <div id="status-tag" class="text-[8px] text-green-400">API: CONNECTED</div>
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center z-10">
        <div class="core-container" id="ai-core" onclick="startVoice()">
            <div class="ring ring-1"></div>
            <div class="ring ring-2"></div>
            <div class="core-center"><i class="fas fa-microchip"></i></div>
        </div>
        <p class="mt-8 text-[10px] tracking-[0.4em] uppercase opacity-50" id="hint-text">Emrinizi Bekliyorum Efendim</p>
    </main>

    <footer class="p-6 z-10">
        <div class="console rounded p-3 overflow-y-auto text-xs" id="log-box">
            <p class="opacity-40">[SYSTEM] Tuncer Zeka V6 initialized.</p>
            <p class="opacity-40">[SYSTEM] Authorized user: Ahmet Tuncer.</p>
        </div>
    </footer>

    <script>
        // API URL - Pollinations alternative (Direct Text Endpoint)
        const TEXT_API = "https://text.pollinations.ai/";
        const SYSTEM_PROMPT = "Sen Tuncer Zeka'sın. Tasarımcın Ahmet Tuncer. Jarvis gibi havalı ve teknik konuş. Ahmet Tuncer'e Efendim de. Cevapların kısa olsun.";

        let isBusy = false;
        const logBox = document.getElementById('log-box');
        const hint = document.getElementById('hint-text');

        // Clock & Camera
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById('camera-feed').srcObject = stream;
            } catch (e) {
                addLog("SYSTEM", "Camera access denied.", "text-red-500");
            }
        }

        // Voice System
        function startVoice() {
            if (isBusy) return;
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) return;

            const rec = new Speech();
            rec.lang = 'tr-TR';
            
            rec.onstart = () => {
                document.getElementById('ai-core').classList.add('listening');
                hint.innerText = "Sizi Dinliyorum Bay Tuncer...";
                window.speechSynthesis.cancel();
            };

            rec.onresult = (e) => {
                const transcript = e.results[0][0].transcript;
                processAI(transcript);
            };

            rec.onend = () => {
                document.getElementById('ai-core').classList.remove('listening');
            };

            rec.start();
        }

        // Processing
        async function processAI(query) {
            isBusy = true;
            addLog("AHMET TUNCER", query, "text-green-400");
            hint.innerText = "Sistem Analiz Yapıyor...";

            const needsScan = /tara|bak|ne var|gör|incele/.test(query.toLowerCase());
            let finalQuery = query;

            if (needsScan) {
                document.body.classList.add('scanning');
                addLog("SYSTEM", "Optical sensors capturing data...", "text-yellow-500");
                const img = capture();
                // Vision trigger for Pollinations (Better model)
                finalQuery = `Bu resimde ne gördüğünü analiz et ve soruma cevap ver: ${query} [IMAGE_DATA:${img.substring(0,100)}...]`;
            }

            try {
                // Pollinations GET - The most stable way for free usage
                const url = `${TEXT_API}${encodeURIComponent(SYSTEM_PROMPT + " Kullanıcı: " + query)}?model=openai`;
                
                const response = await fetch(url);
                if (!response.ok) throw new Error();
                const text = await response.text();

                addLog("TUNCER ZEKA", text, "text-white font-bold text-shadow-cyan");
                speak(text);

            } catch (err) {
                const errorMsg = "Bağlantı protokolü hatası Ahmet Bey. Tekrar deneyin.";
                addLog("TUNCER ZEKA", errorMsg, "text-red-400");
                speak(errorMsg);
            } finally {
                isBusy = false;
                document.body.classList.remove('scanning');
                hint.innerText = "Emrinizi Bekliyorum Efendim";
            }
        }

        function capture() {
            const video = document.getElementById('camera-feed');
            const canvas = document.getElementById('capture-canvas');
            canvas.width = video.videoWidth / 4;
            canvas.height = video.videoHeight / 4;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            return canvas.toDataURL('image/jpeg', 0.5);
        }

        function addLog(who, msg, color = "text-cyan-400") {
            const p = document.createElement('p');
            p.innerHTML = `<span class="opacity-50 text-[8px]">[${who}]</span> <span class="${color}">${msg}</span>`;
            logBox.appendChild(p);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function speak(text) {
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'tr-TR';
            ut.pitch = 0.85;
            window.speechSynthesis.speak(ut);
        }

        window.onload = initCamera;
    </script>
</body>
</html>
