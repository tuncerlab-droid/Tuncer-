<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNCER HOLO - El Kontrollü AR v2.2</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.7.0/build/index.module.js",
                "three-bvh-csg": "https://unpkg.com/three-bvh-csg@0.0.16/build/index.module.js"
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Share Tech Mono', monospace;
            color: #0ff;
            user-select: none;
            touch-action: none;
        }

        #ui-overlay {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 100;
            pointer-events: none;
            display: none;
            flex-direction: column;
            justify-content: space-between;
            padding: 1rem;
        }

        .hud-panel {
            pointer-events: auto;
            background: rgba(0, 20, 30, 0.7);
            border: 1px solid #0ff;
            backdrop-filter: blur(4px);
        }

        .btn-holo {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #0ff;
            color: #0ff;
            text-transform: uppercase;
            font-size: 10px;
        }

        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #001; z-index: 500;
        }

        /* AR Butonu için mutlak çözüm stili */
        #ARButton {
            position: fixed !important;
            bottom: 100px !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            border: 2px solid #0ff !important;
            background: rgba(0, 255, 255, 0.3) !important;
            color: #0ff !important;
            font-family: 'Share Tech Mono', monospace !important;
            padding: 20px 40px !important;
            border-radius: 12px !important;
            text-transform: uppercase !important;
            cursor: pointer !important;
            z-index: 10000 !important; /* En üstte olmasını garanti eder */
            font-weight: bold !important;
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="start-screen">
        <div class="hud-panel p-6 rounded text-center max-w-sm pointer-events-none border-2 border-cyan-500 shadow-[0_0_20px_rgba(0,255,255,0.3)]">
            <h1 class="text-2xl font-bold text-cyan-400 mb-4 tracking-tighter">TUNCER HOLO v2</h1>
            <p class="text-[11px] text-gray-300 mb-6 leading-relaxed">Yerel El Takibi + AR SLAM.<br>Zemini tarayın ve parmaklarınızla (pinch) nesneleri kontrol edin.</p>
            <div class="h-20 w-full"></div> <!-- Butonun geleceği boşluk -->
        </div>
    </div>

    <div id="ui-overlay">
        <div class="flex justify-between items-start w-full">
            <div class="hud-panel p-2 rounded text-sm w-1/2">
                <div class="font-bold text-xs tracking-widest text-white">TUNCER HOLO AR</div>
                <div id="sys-status" class="text-[9px] text-yellow-400 uppercase tracking-tighter">Zemin Aranıyor...</div>
                <div id="hand-status" class="text-[9px] text-cyan-400">El Takibi: AKTİF</div>
            </div>
            <div class="hud-panel p-2 rounded text-center">
                <div class="text-[9px] text-gray-300 uppercase">Durum</div>
                <div id="mic-status" class="text-[9px] font-bold">ONLINE</div>
            </div>
        </div>

        <div class="flex justify-between items-end w-full gap-2">
            <div class="hud-panel p-2 rounded h-24 w-1/2 overflow-hidden flex flex-col justify-end text-[8px]" id="log-console">
                <div class="text-cyan-600">> Sistem Yüklendi.</div>
            </div>
            <div class="hud-panel p-2 rounded grid grid-cols-2 gap-2 w-1/2">
                <button id="btn-cube" class="btn-holo py-2 rounded">KÜP</button>
                <button id="btn-hole" class="btn-holo py-2 rounded border-red-500 text-red-500">DELİK</button>
                <button id="btn-merge" class="btn-holo py-2 rounded border-yellow-500 text-yellow-500">MERGE</button>
                <button id="btn-delete" class="btn-holo py-2 rounded text-red-400">SİL</button>
            </div>
        </div>
    </div>

<script type="module">
import * as THREE from 'three';
import { ARButton } from 'three/addons/webxr/ARButton.js';
import { SUBTRACTION, Brush, Evaluator } from 'three-bvh-csg';

const logConsole = document.getElementById('log-console');
const sysStatus = document.getElementById('sys-status');
const uiOverlay = document.getElementById('ui-overlay');
const startScreen = document.getElementById('start-screen');

let scene, camera, renderer, reticle;
let hitTestSource = null, hitTestSourceRequested = false;
let objects = [], holeObjects = [], selectedObject = null;

let hand0; 
let isGrabbing = false;
const handJoints = []; 

function log(msg, err = false) {
    const d = document.createElement('div');
    d.textContent = `> ${msg}`;
    d.className = err ? 'text-red-500' : 'text-cyan-400';
    logConsole.appendChild(d);
    if(logConsole.childNodes.length > 6) logConsole.removeChild(logConsole.firstChild);
}

function initThree() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1));
    const dLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dLight.position.set(0, 2, 1);
    scene.add(dLight);

    // Buton oluşturma - DOM Overlay body olarak set edildi
    const arBtn = ARButton.createButton(renderer, {
        requiredFeatures: ['hit-test', 'hand-tracking'],
        optionalFeatures: ['dom-overlay'],
        domOverlay: { root: document.body }
    });
    
    // Butonu doğrudan body'ye ekliyoruz ki her şeyin üstünde olsun
    document.body.appendChild(arBtn);

    // El Takibi Görselleştirme Hazırlığı
    hand0 = renderer.xr.getHand(0);
    const jointGeometry = new THREE.SphereGeometry(0.008, 8, 8);
    const jointMaterial = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.8 });

    for (let i = 0; i < 25; i++) {
        const jointMesh = new THREE.Mesh(jointGeometry, jointMaterial);
        jointMesh.visible = false;
        scene.add(jointMesh);
        handJoints.push(jointMesh);
    }

    hand0.addEventListener('pinchend', () => {
        isGrabbing = true;
        findObjectToGrab();
    });
    hand0.addEventListener('pinchstart', () => {
        isGrabbing = false;
        if (selectedObject) {
            selectedObject.material.emissive.setHex(0x000000);
            selectedObject = null;
        }
    });
    scene.add(hand0);

    renderer.xr.addEventListener('sessionstart', () => {
        startScreen.style.display = 'none';
        uiOverlay.style.display = 'flex';
        log("AR Oturumu Başlatıldı.");
    });

    renderer.xr.addEventListener('sessionend', () => {
        startScreen.style.display = 'flex';
        uiOverlay.style.display = 'none';
    });

    reticle = new THREE.Mesh(
        new THREE.RingGeometry(0.07, 0.08, 32).rotateX(-Math.PI/2),
        new THREE.MeshBasicMaterial({ color: 0x00ffff })
    );
    reticle.matrixAutoUpdate = false;
    reticle.visible = false;
    scene.add(reticle);

    renderer.setAnimationLoop(render);
}

function updateHandVisuals(frame, referenceSpace) {
    const session = renderer.xr.getSession();
    let handVisible = false;

    for (const inputSource of session.inputSources) {
        if (inputSource.hand) {
            handVisible = true;
            let i = 0;
            for (const [name, joint] of inputSource.hand) {
                const pose = frame.getJointPose(joint, referenceSpace);
                if (pose && handJoints[i]) {
                    handJoints[i].visible = true;
                    handJoints[i].position.set(
                        pose.transform.position.x,
                        pose.transform.position.y,
                        pose.transform.position.z
                    );
                } else if (handJoints[i]) {
                    handJoints[i].visible = false;
                }
                i++;
                if (i >= 25) break;
            }
        }
    }

    if (!handVisible) {
        handJoints.forEach(j => j.visible = false);
    }
}

function findObjectToGrab() {
    const indexTip = hand0.joints['index-finger-tip'];
    if (!indexTip) return;

    const handPos = new THREE.Vector3().setFromMatrixPosition(indexTip.matrixWorld);
    const all = [...objects, ...holeObjects];
    let closest = null;
    let minDist = 0.25;

    all.forEach(obj => {
        const d = obj.position.distanceTo(handPos);
        if (d < minDist) {
            minDist = d;
            closest = obj;
        }
    });

    if (closest) {
        selectedObject = closest;
        selectedObject.material.emissive.setHex(0x006666);
    }
}

function updateObjectTransform() {
    if (!selectedObject) return;
    const indexTip = hand0.joints['index-finger-tip'];
    const thumbTip = hand0.joints['thumb-tip'];
    const wrist = hand0.joints['wrist'];

    if (indexTip && thumbTip && wrist) {
        const p1 = new THREE.Vector3().setFromMatrixPosition(indexTip.matrixWorld);
        const p2 = new THREE.Vector3().setFromMatrixPosition(thumbTip.matrixWorld);
        const midPoint = new THREE.Vector3().lerpVectors(p1, p2, 0.5);
        selectedObject.position.lerp(midPoint, 0.4);
        const wristRot = new THREE.Quaternion().setFromRotationMatrix(wrist.matrixWorld);
        selectedObject.quaternion.slerp(wristRot, 0.15);
    }
}

function addObj(isHole = false) {
    if (!reticle.visible) return log("Zemin bulunamadı!", true);
    const geo = new THREE.BoxGeometry(0.12, 0.12, 0.12);
    const mat = new THREE.MeshStandardMaterial({
        color: isHole ? 0xff4444 : 0x00ddff,
        transparent: true, opacity: isHole ? 0.6 : 1.0,
        metalness: 0.5, roughness: 0.1, emissive: 0x000000
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.setFromMatrixPosition(reticle.matrix);
    mesh.quaternion.setFromRotationMatrix(reticle.matrix);
    mesh.translateY(0.06);
    scene.add(mesh);
    if (isHole) holeObjects.push(mesh); else objects.push(mesh);
    log(isHole ? "Delik eklendi." : "Küp eklendi.");
}

function merge() {
    if (objects.length === 0 || holeObjects.length === 0) return log("Obje eksik!", true);
    try {
        const evaluator = new Evaluator();
        let base = objects[0];
        let baseBrush = new Brush(base.geometry, base.material);
        baseBrush.position.copy(base.position);
        baseBrush.quaternion.copy(base.quaternion);
        baseBrush.updateMatrixWorld();
        holeObjects.forEach(h => {
            const hBrush = new Brush(h.geometry, h.material);
            hBrush.position.copy(h.position);
            hBrush.quaternion.copy(h.quaternion);
            hBrush.updateMatrixWorld();
            baseBrush = evaluator.evaluate(baseBrush, hBrush, SUBTRACTION);
            scene.remove(h);
        });
        scene.remove(base);
        const result = new THREE.Mesh(baseBrush.geometry, baseBrush.material);
        result.position.copy(base.position);
        result.quaternion.copy(base.quaternion);
        scene.add(result);
        objects = [result]; holeObjects = [];
        log("CSG tamamlandı.");
    } catch (e) { log("Hata oluştu!", true); }
}

function render(timestamp, frame) {
    if (frame) {
        const referenceSpace = renderer.xr.getReferenceSpace();
        const session = renderer.xr.getSession();
        
        if (!hitTestSourceRequested) {
            session.requestReferenceSpace('viewer').then(ref => {
                session.requestHitTestSource({ space: ref }).then(src => hitTestSource = src);
            });
            hitTestSourceRequested = true;
        }
        if (hitTestSource) {
            const results = frame.getHitTestResults(hitTestSource);
            if (results.length > 0) {
                reticle.visible = true;
                reticle.matrix.fromArray(results[0].getPose(referenceSpace).transform.matrix);
                sysStatus.textContent = "Sistem: Zemin Hazır";
            } else {
                reticle.visible = false;
            }
        }
        updateHandVisuals(frame, referenceSpace);
        if (isGrabbing) updateObjectTransform();
    }
    renderer.render(scene, camera);
}

window.addEventListener('load', initThree);

document.getElementById('btn-cube').onclick = () => addObj(false);
document.getElementById('btn-hole').onclick = () => addObj(true);
document.getElementById('btn-merge').onclick = merge;
document.getElementById('btn-delete').onclick = () => {
    const all = [...objects, ...holeObjects];
    if(all.length) {
        const target = all.pop();
        scene.remove(target);
        objects = objects.filter(o => o !== target);
        holeObjects = holeObjects.filter(o => o !== target);
    }
};
</script>
</body>
</html>
