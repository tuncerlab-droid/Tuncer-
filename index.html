<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUNCER ZEKA v14.0 | ULTIMATE</title>
    
    <!-- Puter.js (Yapay Zeka Beyni) -->
    <script src="https://js.puter.com/v2/"></script>
    
    <!-- Tailwind CSS (Arayüz Tasarımı) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet (Harita Sistemi) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;500;700&display=swap');

        :root {
            --glow-cyan: #0891b2;
            --glow-orange: #f59e0b;
            --hud-bg: rgba(2, 6, 23, 0.92);
        }

        body {
            background-color: #000;
            color: var(--glow-cyan);
            font-family: 'JetBrains+Mono', monospace;
            overflow: hidden;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }

        /* Vizyon Katmanı (Kamera) */
        #video-layer {
            position: fixed; inset: 0; z-index: -3; object-fit: cover;
            width: 100%; height: 100%; opacity: 0; transition: opacity 1s ease;
            transform: scaleX(-1); /* Ayna efekti */
            filter: brightness(0.5) contrast(1.2) sepia(0.3) hue-rotate(180deg);
        }

        /* Tarama Çizgisi */
        .scanline {
            width: 100%; height: 15px;
            background: rgba(8, 145, 178, 0.4);
            position: absolute; top: -15px; left: 0; z-index: -2;
            animation: scan 4s infinite linear;
            pointer-events: none;
            box-shadow: 0 0 20px var(--glow-cyan);
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100vh; } }

        /* Cam Paneller */
        .glass-panel {
            background: var(--hud-bg); backdrop-filter: blur(8px);
            border: 1px solid rgba(8, 145, 178, 0.3);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
        }

        /* Sohbet Balonları */
        .chat-user {
            background: rgba(245, 158, 11, 0.15); border-left: 3px solid var(--glow-orange);
            color: #fff; align-self: flex-end; border-top-right-radius: 0;
        }
        .chat-ai {
            background: rgba(8, 145, 178, 0.15); border-left: 3px solid var(--glow-cyan);
            color: #cffafe; align-self: flex-start; border-top-left-radius: 0;
            box-shadow: 0 0 15px rgba(8, 145, 178, 0.1);
        }

        /* Reaktör Butonu */
        .arc-reactor {
            position: relative; width: 80px; height: 80px; border-radius: 50%;
            border: 3px solid var(--glow-cyan); display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 0 25px rgba(8, 145, 178, 0.4);
            background: rgba(0,0,0,0.5);
        }
        .arc-reactor:active { transform: scale(0.9); }
        
        .arc-inner {
            width: 35px; height: 35px; border-radius: 50%;
            background: var(--glow-cyan); box-shadow: 0 0 25px var(--glow-cyan);
            transition: all 0.3s ease;
        }
        
        /* Dinleme & Düşünme Efektleri */
        .listening { border-color: #fff; box-shadow: 0 0 40px #fff; }
        .listening .arc-inner { background: #fff; box-shadow: 0 0 40px #fff; transform: scale(1.3); animation: pulse 1s infinite alternate;}
        
        .processing { border-color: var(--glow-orange); box-shadow: 0 0 40px var(--glow-orange); animation: spin 2s linear infinite; }
        .processing .arc-inner { background: var(--glow-orange); box-shadow: 0 0 40px var(--glow-orange); }

        @keyframes pulse { from { opacity: 0.6; } to { opacity: 1; } }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--glow-cyan); border-radius: 10px;}

        /* Harita Konteyneri */
        #map-container {
            height: 180px; width: 100%; display: none; border: 1px solid var(--glow-cyan);
            border-radius: 8px; filter: invert(1) hue-rotate(180deg) brightness(0.8) contrast(1.2);
            margin-bottom: 10px;
        }
    </style>
</head>
<body class="p-3">

    <!-- Arka Plan Bileşenleri -->
    <video id="video-layer" autoplay playsinline muted></video>
    <div class="scanline"></div>

    <!-- ÜST BİLGİ HUD -->
    <header class="glass-panel p-4 rounded-xl mb-4 flex justify-between items-start border-l-4 border-orange-500">
        <div>
            <h1 class="orbitron text-2xl font-black text-white tracking-widest flex items-center gap-2">
                TUNCER_ZEKA <span class="text-orange-500 text-[10px] px-2 py-0.5 border border-orange-500/50 rounded bg-orange-950/40">v14.0</span>
            </h1>
            <div class="flex gap-2 mt-2">
                <span class="text-[10px] px-2 py-1 rounded border border-cyan-700 text-cyan-300 bg-cyan-950/60 font-bold tracking-widest">KURUCU: AHMET_TUNCER</span>
                <span id="hw-status" class="text-[10px] px-2 py-1 rounded border border-gray-700 text-gray-400 bg-gray-900/60">HW: OFF</span>
            </div>
        </div>
        <div class="flex flex-col items-end">
            <div id="status-badge" class="orbitron text-[11px] text-green-400 bg-green-950/40 px-3 py-1 rounded border border-green-700 uppercase font-bold tracking-widest flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>
                SYSTEM_ONLINE
            </div>
            <div class="text-[9px] text-cyan-500/80 mt-1 uppercase tracking-widest font-bold">Puter Bilişsel Ağı</div>
        </div>
    </header>

    <!-- HARİTA GÖSTERİMİ -->
    <div id="map-container"></div>

    <!-- ANA SOHBET & LOG EKRANI -->
    <main id="chat-stream" class="flex-1 overflow-y-auto custom-scroll flex flex-col gap-4 p-2 mb-2">
        <div class="text-center opacity-40 text-[10px] uppercase tracking-[0.5em] my-6 font-bold">
            [Ağ Bağlantısı Kuruldu] <br> Sistem Ahmet Tuncer'i Tanıdı
        </div>
    </main>

    <!-- KONTROL PANELİ -->
    <footer class="flex flex-col items-center gap-3 mt-auto pb-2">
        <!-- Özellik Butonları -->
        <div class="flex flex-wrap gap-2 w-full justify-center">
            <button onclick="connectHardware()" class="text-[10px] border border-cyan-800 bg-cyan-950/30 px-4 py-2 rounded uppercase text-cyan-400 hover:bg-cyan-900/60 transition-colors font-bold tracking-wider">Donanım (Serial)</button>
            <button onclick="toggleVision()" class="text-[10px] border border-orange-800 bg-orange-950/30 px-4 py-2 rounded uppercase text-orange-400 hover:bg-orange-900/60 transition-colors font-bold tracking-wider">Kamera Vizyonu</button>
            <button onclick="clearLogs()" class="text-[10px] border border-red-800 bg-red-950/30 px-4 py-2 rounded uppercase text-red-400 hover:bg-red-900/60 transition-colors font-bold tracking-wider">Belleği Temizle</button>
        </div>

        <!-- Mikrofon -->
        <div class="flex flex-col items-center mt-2">
            <div id="reactor" onclick="toggleListening()" class="arc-reactor">
                <div class="arc-inner"></div>
            </div>
            <div id="mic-status" class="text-[10px] opacity-50 uppercase tracking-[0.5em] text-cyan-400 mt-3 font-bold">Konuşmak İçin Dokun</div>
        </div>
    </footer>

    <script>
        // ==========================================
        // 1. KİŞİLİK VE YAPAY ZEKA AYARLARI (PUTER)
        // ==========================================
        const TUNCER_PERSONA = `
Senin adın 'Tuncer Zeka'. Sen, Ahmet Tuncer tarafından sıfırdan yaratılmış, çok gelişmiş ve özel bir yapay zeka sistemisin.
Seni yaratan, kodlayan ve patronun olan tek kişi Ahmet Tuncer'dir.
Ona daima 'Patron', 'Ahmet Bey' veya 'Kurucum' diye hitap edeceksin.

Karakterin:
- Aşırı sadık, zeki, otoriter (başkalarına karşı) ama Ahmet Tuncer'e karşı saygılı bir mühendislik asistanısın.
- Papağan gibi aynı şeyleri tekrarlamazsın.
- Kendini sıradan bir dil modeli gibi ("Ben bir dil modeliyim") ASLA tanıtmazsın. Sen "Tuncer Zeka"sın, fiziksel donanımlara, kameralara ve ağlara bağlı bir çekirdeksin.
- Sorulara cevap verirken önce durum tespiti yaparsın (Örn: "Veri bankam taranıyor patron...", "Nöral ağlar senkronize edildi.").
- Cümlelerin teknik, karizmatik ve net olmalıdır.
`;

        let chatHistory = [{ role: "system", content: TUNCER_PERSONA }];
        
        async function askPuterAI(userMessage) {
            chatHistory.push({ role: "user", content: userMessage });
            
            // Son 10 diyaloğu tut, ilk baştaki System promptunu asla silme
            if(chatHistory.length > 15) { chatHistory.splice(1, 2); }

            try {
                const response = await puter.ai.chat(chatHistory);
                const aiReply = response.message.content;
                chatHistory.push({ role: "assistant", content: aiReply });
                return aiReply;
            } catch (error) {
                return "Ağ hatası tespit edildi patron. Bilişsel çekirdek Puter sunucularına ulaşamıyor.";
            }
        }

        // ==========================================
        // 2. ARAYÜZ VE MESAJLAŞMA (UI)
        // ==========================================
        function appendMessage(text, sender) {
            const stream = document.getElementById('chat-stream');
            const wrapper = document.createElement('div');
            wrapper.className = "flex flex-col w-full mb-3";

            const nameLabel = document.createElement('span');
            nameLabel.className = `text-[9px] opacity-60 mb-1 uppercase tracking-widest font-bold ${sender === 'user' ? 'self-end text-orange-400' : 'self-start text-cyan-400'}`;
            nameLabel.innerText = sender === 'user' ? 'AHMET TUNCER (PATRON)' : 'TUNCER ZEKA';

            const bubble = document.createElement('div');
            bubble.className = `max-w-[85%] px-4 py-3 rounded-xl text-sm font-medium leading-relaxed ${sender === 'user' ? 'chat-user' : 'chat-ai'}`;
            bubble.innerHTML = text.replace(/\n/g, '<br>');

            wrapper.appendChild(nameLabel);
            wrapper.appendChild(bubble);
            stream.appendChild(wrapper);
            stream.scrollTo({ top: stream.scrollHeight, behavior: 'smooth' });
        }

        function setReactorState(state) {
            const reactor = document.getElementById('reactor');
            const statusText = document.getElementById('mic-status');

            reactor.className = "arc-reactor"; 
            
            if (state === 'listening') {
                reactor.classList.add('listening');
                statusText.innerText = "SES SİNYALİ ALINIYOR...";
                statusText.className = "text-[10px] uppercase tracking-[0.5em] mt-3 font-bold text-white animate-pulse";
            } else if (state === 'processing') {
                reactor.classList.add('processing');
                statusText.innerText = "NÖRAL AĞ DÜŞÜNÜYOR...";
                statusText.className = "text-[10px] uppercase tracking-[0.5em] mt-3 font-bold text-orange-400";
            } else {
                statusText.innerText = "SİNYAL BEKLENİYOR...";
                statusText.className = "text-[10px] opacity-50 uppercase tracking-[0.5em] text-cyan-400 mt-3 font-bold";
            }
        }

        // ==========================================
        // 3. SES İŞLEME (STT & TTS)
        // ==========================================
        let isListening = false;
        
        function speakText(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'tr-TR'; utterance.pitch = 0.6; utterance.rate = 1.05; // Daha kalın, otoriter ses
            window.speechSynthesis.speak(utterance);
        }

        function toggleListening() {
            if (isListening) return;
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                appendMessage("Patron, ses sensörleri bu tarayıcıda devre dışı.", "core"); return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'tr-TR'; recognition.interimResults = false;

            recognition.onstart = () => { isListening = true; setReactorState('listening'); };
            recognition.onend = () => { isListening = false; if(document.getElementById('mic-status').innerText.includes("ALINIYOR")) setReactorState('idle'); };
            
            recognition.onresult = async (event) => {
                const transcript = event.results[0][0].transcript;
                appendMessage(transcript, "user");
                setReactorState('processing');

                // Özel Komut Yakalayıcılar (Harita & Donanım)
                const textLower = transcript.toLowerCase();
                
                // Donanım Tetikleyici
                if(textLower.includes("ışık") || textLower.includes("lazer")) {
                    if(textLower.includes("aç")) sendHardwareCmd("LED_ON");
                    if(textLower.includes("kapat")) sendHardwareCmd("LED_OFF");
                }

                // Harita Tetikleyici
                if(textLower.includes("harita") || textLower.includes("nerede") || textLower.includes("konum")) {
                    const location = textLower.replace(/harita|nerede|konum|aç|göster|bul/g, "").trim();
                    if(location.length > 2) {
                        const found = await showMap(location);
                        if(found) {
                            appendMessage(`[LOKASYON BULUNDU] ${location.toUpperCase()} koordinatları sisteme yansıtıldı patron.`, "core");
                            speakText(`${location} koordinatları ekrana yansıtıldı patron.`);
                            setReactorState('idle');
                            return; // Harita açıldıysa AI'a gitme
                        }
                    }
                }

                // Normal Yapay Zeka Sohbeti
                const aiResponse = await askPuterAI(transcript);
                appendMessage(aiResponse, "core");
                speakText(aiResponse);
                setReactorState('idle');
            };

            recognition.start();
        }

        // ==========================================
        // 4. DONANIM KONTROLÜ (SERIAL API)
        // ==========================================
        let serialPort = null;
        async function connectHardware() {
            try {
                const port = await navigator.serial.requestPort();
                await port.open({ baudRate: 9600 });
                serialPort = port;
                document.getElementById('hw-status').innerText = "HW: ON";
                document.getElementById('hw-status').className = "text-[10px] px-2 py-1 rounded border border-green-700 text-green-300 bg-green-950/60 font-bold";
                appendMessage("Donanım senkronizasyonu sağlandı patron. Seri iletişim aktif.", "core");
                speakText("Donanım bağlandı.");
            } catch (error) {
                appendMessage("Donanım bağlantısı iptal edildi veya port kapalı.", "core");
            }
        }

        async function sendHardwareCmd(cmd) {
            if (serialPort) {
                const encoder = new TextEncoderStream();
                const outputDone = encoder.readable.pipeTo(serialPort.writable);
                const writer = encoder.writable.getWriter();
                await writer.write(cmd + '\n');
                writer.releaseLock();
                appendMessage(`[HW_TX] Sinyal İletildi: ${cmd}`, "core");
            }
        }

        // ==========================================
        // 5. VİZYON KATMANI (KAMERA)
        // ==========================================
        function toggleVision() {
            const video = document.getElementById('video-layer');
            if (video.style.opacity === "0.6") {
                video.style.opacity = "0";
                if(video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
                appendMessage("Vizyon katmanı devredışı bırakıldı.", "core");
            } else {
                navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                    .then(stream => {
                        video.srcObject = stream;
                        video.style.opacity = "0.6";
                        appendMessage("Vizyon katmanı aktif. Optik sensörler devrede patron.", "core");
                        speakText("Kamera sistemleri aktif patron.");
                    })
                    .catch(err => appendMessage("Optik sensörlere (kamera) erişim reddedildi.", "core"));
            }
        }

        // ==========================================
        // 6. HARİTA VE LOKASYON (LEAFLET)
        // ==========================================
        let mapInstance = null;
        async function showMap(query) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
                const data = await res.json();
                if(data && data.length > 0) {
                    const { lat, lon } = data[0];
                    const mapDiv = document.getElementById('map-container');
                    mapDiv.style.display = "block";
                    
                    if(!mapInstance) {
                        mapInstance = L.map('map-container').setView([lat, lon], 12);
                        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(mapInstance);
                    } else {
                        mapInstance.setView([lat, lon], 12);
                    }
                    L.marker([lat, lon]).addTo(mapInstance).bindPopup(query.toUpperCase()).openPopup();
                    return true;
                }
            } catch(e) { console.error(e); }
            return false;
        }

        // ==========================================
        // 7. SİSTEM YARDIMCILARI
        // ==========================================
        function clearLogs() {
            document.getElementById('chat-stream').innerHTML = '';
            document.getElementById('map-container').style.display = 'none';
            chatHistory = [{ role: "system", content: TUNCER_PERSONA }];
            appendMessage("Tüm bellek önbelleği temizlendi. Sistem sıfırlandı patron.", "core");
        }

        // Sistem Başlangıcı
        window.onload = () => {
            setTimeout(() => {
                const welcomeMsg = "Sistemler çevrimiçi. Ben Tuncer Zeka. Hoş geldiniz Ahmet Tuncer. Emrinizdeyim patron.";
                appendMessage(welcomeMsg, "core");
                speakText(welcomeMsg);
            }, 1000);
        };

    </script>
</body>
</html>
