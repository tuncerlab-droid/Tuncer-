<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tuncer AR v12.0 - Stabil Sistem</title>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { 
            margin: 0; overflow: hidden; 
            background-color: transparent !important; /* Beyaz ekranı önlemek için kritik */
            font-family: 'Courier New', Courier, monospace;
        }
        
        #ui-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        #startup-screen {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .hud-panel {
            margin: 20px; align-self: flex-end;
            background: rgba(0, 15, 30, 0.7); border-left: 4px solid #00e5ff;
            padding: 15px; border-radius: 8px; color: #00e5ff; font-size: 12px;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2); backdrop-filter: blur(5px);
        }

        #target-hint {
            margin-bottom: 30px; align-self: center;
            background: rgba(0,0,0,0.6); color: white; padding: 10px 20px;
            border-radius: 30px; font-weight: bold; border: 1px solid #00e5ff;
            text-transform: uppercase; font-size: 11px;
        }

        /* Three.js ARButton Stillerini Ezmek İçin */
        #ARButton {
            background: #00e5ff !important; color: #000 !important;
            font-weight: 900 !important; border-radius: 30px !important;
            padding: 15px 30px !important; border: none !important;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.5) !important;
            bottom: 40px !important; z-index: 1001 !important;
        }
    </style>

    <!-- Modern Three.js Module Import -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <!-- Başlangıç Ekranı -->
    <div id="startup-screen">
        <h1 style="color:#00e5ff; font-size: 28px; font-family: sans-serif; font-weight: 900; margin-bottom: 5px;">TUNCER CORE <span style="color:#fff;">v12</span></h1>
        <p style="color:#666; font-size: 12px; margin-bottom: 20px;">Ortam Tarayıcı ve Yapay Zeka Başlatılıyor...</p>
        <p style="color:#ff3366; font-size: 10px; max-width: 80%; text-align: center; margin-bottom: 30px;">
            Not: Beyaz ekran alırsanız Google Play'den "Google Play Services for AR" uygulamasını güncelleyin.
        </p>
    </div>

    <!-- AR Arayüzü (Kamera Açılınca Görünür) -->
    <div id="ui-container" style="display: none;">
        <div class="hud-panel">
            SİSTEM: <span style="color:#fff;">AKTİF</span><br>
            X: <span id="pos-x">0.00</span><br>
            Y: <span id="pos-y">0.00</span><br>
            Z: <span id="pos-z">0.00</span><br>
            SES: <span id="voice-cmd" style="color:#fff;">BEKLENİYOR</span>
        </div>
        <div id="target-hint">Yüzey Aranıyor... Kamerayı masaya tut.</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        let scene, camera, renderer, reticle, controller;
        let hitTestSource = null, hitTestSourceRequested = false;
        let objects = [];

        function init() {
            const container = document.createElement('div');
            document.body.appendChild(container);

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            // BEYAZ EKRAN ÇÖZÜMÜ: alpha: true ZORUNLUDUR!
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            // Three.js arka planını tamamen şeffaf yapmaya zorla
            renderer.setClearColor(0x000000, 0); 
            renderer.xr.enabled = true;
            container.appendChild(renderer.domElement);

            // Işıklandırma
            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(2, 5, 2);
            scene.add(directionalLight);

            // Hedefleme Halkası (Masa yüzeyi bulununca çıkacak)
            const ringGeo = new THREE.RingGeometry(0.08, 0.1, 32).rotateX(-Math.PI / 2);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0x00e5ff });
            reticle = new THREE.Mesh(ringGeo, ringMat);
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            // Güvenli AR Başlatma Butonu (DOM Overlay yetkileri ile)
            const uiContainer = document.getElementById('ui-container');
            const button = ARButton.createButton(renderer, { 
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: uiContainer } 
            });
            document.body.appendChild(button);

            // AR Başladığında yapılacaklar
            renderer.xr.addEventListener('sessionstart', () => {
                document.getElementById('startup-screen').style.display = 'none';
                uiContainer.style.display = 'flex';
                initVoice(); // Sesli asistanı AR başlayınca aç (izin hatası almamak için)
            });

            renderer.xr.addEventListener('sessionend', () => {
                document.getElementById('startup-screen').style.display = 'flex';
                uiContainer.style.display = 'none';
            });

            // Dokunma / Tıklama Kontrolcüsü
            controller = renderer.xr.getController(0);
            controller.addEventListener('select', onSelect);
            scene.add(controller);

            window.addEventListener('resize', onWindowResize);
            renderer.setAnimationLoop(render);
        }

        // Obje Yerleştirme
        function onSelect() {
            if (reticle.visible) {
                const geometry = new THREE.BoxGeometry(0.12, 0.12, 0.12);
                const material = new THREE.MeshStandardMaterial({ 
                    color: Math.random() * 0xffffff,
                    metalness: 0.5,
                    roughness: 0.2
                });
                const cube = new THREE.Mesh(geometry, material);
                
                // Objeyi halkanın olduğu yere (masaya) yerleştir
                cube.position.setFromMatrixPosition(reticle.matrix);
                cube.position.y += 0.06; // Merkez noktasını yukarı al ki masaya gömülmesin
                
                scene.add(cube);
                objects.push(cube);
                
                document.getElementById('target-hint').innerText = "OBJE SABİTLENDİ";
                setTimeout(() => { document.getElementById('target-hint').innerText = "YENİ YÜZEY ARANIYOR..."; }, 2000);
            }
        }

        // Sesli Komut Modülü
        function initVoice() {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRec) {
                document.getElementById('voice-cmd').innerText = "DESTEKLENMİYOR";
                return;
            }
            
            const rec = new SpeechRec();
            rec.lang = 'tr-TR';
            rec.continuous = true;
            
            rec.onresult = (e) => {
                const cmd = e.results[e.results.length - 1][0].transcript.toLowerCase();
                document.getElementById('voice-cmd').innerText = cmd.toUpperCase();
                
                if (cmd.includes("küp") && reticle.visible) onSelect();
                if (cmd.includes("sil") || cmd.includes("temizle")) {
                    objects.forEach(obj => scene.remove(obj));
                    objects = [];
                    document.getElementById('target-hint').innerText = "SAHNE TEMİZLENDİ";
                }
            };
            
            rec.onerror = (e) => console.log("Ses Hatası: ", e.error);
            rec.onend = () => { if(renderer.xr.getSession()) rec.start(); };
            
            try { rec.start(); } catch(e){}
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // AR Render Döngüsü (Yüzey Tarama)
        function render(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (hitTestSourceRequested === false) {
                    session.requestReferenceSpace('viewer').then((space) => {
                        session.requestHitTestSource({ space: space }).then((source) => {
                            hitTestSource = source;
                        });
                    });
                    
                    session.addEventListener('end', () => {
                        hitTestSourceRequested = false;
                        hitTestSource = null;
                    });
                    
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length > 0) {
                        const hit = hitTestResults[0];
                        const pose = hit.getPose(referenceSpace);

                        reticle.visible = true;
                        reticle.matrix.fromArray(pose.transform.matrix);
                        
                        // HUD Verilerini Güncelle
                        const pos = new THREE.Vector3().setFromMatrixPosition(reticle.matrix);
                        document.getElementById('pos-x').innerText = pos.x.toFixed(2);
                        document.getElementById('pos-y').innerText = pos.y.toFixed(2);
                        document.getElementById('pos-z').innerText = pos.z.toFixed(2);
                        
                        document.getElementById('target-hint').innerText = "YÜZEY KİLİTLENDİ - DOKUN VEYA KÜP DE";
                        document.getElementById('target-hint').style.borderColor = "#00ffcc";
                    } else {
                        reticle.visible = false;
                        document.getElementById('target-hint').innerText = "ZEMİNİ / MASAYI TARAYIN...";
                        document.getElementById('target-hint').style.borderColor = "#ff3366";
                    }
                }
            }
            renderer.render(scene, camera);
        }

        // Sistemi Yükle
        init();
    </script>
</body>
</html>
