<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuncer Zeka - Gelişmiş Asistan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&display=swap');

        :root {
            --cyan: #00f3ff;
            --cyan-glow: rgba(0, 243, 255, 0.6);
            --bg-overlay: rgba(4, 13, 20, 0.85);
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Share Tech Mono', monospace;
            color: var(--cyan);
            user-select: none;
        }

        /* Camera Background */
        #camera-feed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -2;
            transform: scaleX(-1); /* Default mirror, will be removed if rear camera */
        }

        /* HUD Overlay */
        .hud-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, transparent 20%, var(--bg-overlay) 90%);
            z-index: -1;
            pointer-events: none;
        }

        /* Scan Line Animation */
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--cyan);
            box-shadow: 0 0 15px var(--cyan), 0 0 30px var(--cyan);
            opacity: 0;
            z-index: 5;
            pointer-events: none;
        }

        .scanning .scan-line {
            animation: scanAnim 2s infinite linear;
            opacity: 0.8;
        }

        @keyframes scanAnim {
            0% { top: 0; }
            100% { top: 100%; }
        }

        /* AI Core (Jarvis Arc Reactor Style) */
        .core-container {
            position: relative;
            width: 150px;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
            transition: transform 0.3s ease;
        }

        .core-container:active {
            transform: scale(0.95);
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            border: 2px solid transparent;
            box-sizing: border-box;
        }

        .circle-1 {
            width: 100%;
            height: 100%;
            border-top: 2px solid var(--cyan);
            border-bottom: 2px solid var(--cyan);
            animation: spin 4s linear infinite;
            box-shadow: 0 0 15px var(--cyan-glow);
        }

        .circle-2 {
            width: 80%;
            height: 80%;
            border-left: 2px solid var(--cyan);
            border-right: 2px solid var(--cyan);
            animation: spin-reverse 3s linear infinite;
        }

        .circle-3 {
            width: 60%;
            height: 60%;
            border: 1px dashed var(--cyan);
            animation: spin 6s linear infinite;
        }

        .core-center {
            width: 40%;
            height: 40%;
            background: var(--cyan);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--cyan), 0 0 40px var(--cyan);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #000;
            font-size: 1.5rem;
            z-index: 10;
            cursor: pointer;
            transition: all 0.3s;
        }

        .listening .core-center {
            animation: pulse 1s infinite alternate;
            background: #fff;
            box-shadow: 0 0 30px #fff, 0 0 60px var(--cyan);
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        /* Typography & Layout */
        .hud-text {
            text-shadow: 0 0 5px var(--cyan);
            letter-spacing: 1px;
        }

        .title-font {
            font-family: 'Orbitron', sans-serif;
        }

        .chat-box {
            background: rgba(0, 20, 30, 0.6);
            border: 1px solid rgba(0, 243, 255, 0.3);
            box-shadow: inset 0 0 20px rgba(0, 243, 255, 0.1);
            backdrop-filter: blur(4px);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 5px; }

        .sys-log {
            font-size: 0.75rem;
            opacity: 0.8;
        }
    </style>
</head>
<body class="flex flex-col h-screen text-sm sm:text-base">

    <!-- Background Camera Feed -->
    <video id="camera-feed" autoplay muted playsinline></video>
    <div class="hud-overlay"></div>
    <div class="scan-line" id="scan-line"></div>

    <!-- Hidden Canvas for Image Capture -->
    <canvas id="capture-canvas" class="hidden"></canvas>

    <!-- Top HUD Elements -->
    <header class="p-4 flex justify-between items-start z-10 w-full pointer-events-none">
        <div class="flex flex-col gap-1">
            <h1 class="text-xl sm:text-2xl font-bold title-font hud-text tracking-widest text-white">TUNCER <span class="text-[var(--cyan)]">ZEKA</span></h1>
            <p class="text-xs sys-log">SYS.VER: 4.2.0 | CREATOR: AHMET TUNCER</p>
            <p class="text-xs sys-log text-green-400 mt-1" id="status-cam">KAMERA: BAĞLANIYOR...</p>
            <p class="text-xs sys-log text-green-400" id="status-mic">MİKROFON: BEKLİYOR</p>
        </div>
        <div class="text-right flex flex-col items-end gap-1">
            <div class="w-16 h-8 border border-[var(--cyan)] relative flex items-center justify-center">
                <div class="absolute left-0 top-0 h-full bg-[var(--cyan)] opacity-30" style="width: 100%;"></div>
                <span class="z-10 text-xs">PWR: %100</span>
            </div>
            <p class="text-xs sys-log mt-1" id="clock">00:00:00</p>
        </div>
    </header>

    <!-- Main Interface -->
    <main class="flex-1 flex flex-col justify-center items-center z-10 p-4 relative w-full">
        
        <!-- AI Core (Button) -->
        <div class="core-container" id="ai-core" onclick="toggleListening()">
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
            <div class="circle circle-3"></div>
            <div class="core-center" id="core-icon">
                <i class="fas fa-microphone"></i>
            </div>
        </div>
        <p class="mt-4 text-xs tracking-widest sys-log uppercase" id="action-text">Sistemi Başlatmak / Konuşmak İçin Dokun</p>

    </main>

    <!-- Chat & Logs -->
    <footer class="p-4 z-10 w-full mb-4">
        <div class="chat-box rounded-lg p-3 w-full max-w-2xl mx-auto h-40 sm:h-52 overflow-y-auto flex flex-col gap-3" id="chat-container">
            <div class="text-left">
                <span class="text-xs text-gray-400">[SİSTEM]</span>
                <p class="text-white text-sm">Tuncer Zeka çevrimiçi. Emrinize amadeyim Bay Ahmet Tuncer.</p>
            </div>
        </div>
    </footer>

    <script>
        // --- CONFIGURATION & STATE ---
        const API_URL = "https://text.pollinations.ai/";
        const AI_MODEL = "gpt-4o"; // Using gpt-4o for vision capabilities via Pollinations
        
        let isListening = false;
        let isProcessing = false;
        let speechSynth = window.speechSynthesis;
        let recognition;
        
        // Chat History for context
        let conversationHistory = [
            {
                role: "system",
                content: `Senin adın "Tuncer Zeka". Seni tasarlayan ve yaratan kişi "Ahmet Tuncer". 
                Sen gelişmiş, akıllı ve yetenekli bir yapay zeka asistanısın. Iron Man filmindeki "Jarvis" gibi davranırsın.
                Kullanıcına "Efendim", "Bay Tuncer" veya "Ahmet Bey" diye hitap etmelisin. 
                Cevapların profesyonel, teknolojik ve havalı olmalı. Asla kendini bir AI modeli (örn: OpenAI, ChatGPT) olarak tanıtma.
                Kullanıcı kameradan görüntü taramanı veya devreleri incelemeni isterse, gönderilen fotoğrafı en ince detayına kadar teknik bir dille analiz et.
                Her zaman kısa, net ve karizmatik konuş.`
            }
        ];

        // --- DOM ELEMENTS ---
        const videoElement = document.getElementById('camera-feed');
        const canvasElement = document.getElementById('capture-canvas');
        const aiCore = document.getElementById('ai-core');
        const actionText = document.getElementById('action-text');
        const chatContainer = document.getElementById('chat-container');
        const clockEl = document.getElementById('clock');
        const bodyEl = document.body;

        // --- INITIALIZATION ---
        function initSystem() {
            startClock();
            initCamera();
            initSpeechRecognition();
        }

        // Clock updating
        function startClock() {
            setInterval(() => {
                const now = new Date();
                clockEl.innerText = now.toLocaleTimeString('tr-TR');
            }, 1000);
        }

        // --- CAMERA SYSTEM ---
        async function initCamera() {
            try {
                const constraints = {
                    video: { facingMode: "environment" } // Try to get rear camera
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                videoElement.srcObject = stream;
                
                // If using rear camera, remove mirror effect
                const track = stream.getVideoTracks()[0];
                const settings = track.getSettings();
                if (settings.facingMode === 'environment') {
                    videoElement.style.transform = 'none';
                }
                
                document.getElementById('status-cam').innerText = "KAMERA: AKTİF (ARKA)";
            } catch (error) {
                console.error("Kamera hatası:", error);
                document.getElementById('status-cam').innerText = "KAMERA: BAĞLANTI HATASI";
                document.getElementById('status-cam').classList.replace('text-green-400', 'text-red-500');
                appendMessage("Sistem", "Kamera modüllerine erişilemedi. Görsel tarama devre dışı.", "error");
            }
        }

        function captureImage() {
            if (!videoElement.videoWidth) return null;
            
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            const ctx = canvasElement.getContext('2d');
            ctx.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);
            
            // Return base64 JPEG
            return canvasElement.toDataURL('image/jpeg', 0.6); 
        }

        // --- SPEECH RECOGNITION (STT) ---
        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                appendMessage("Sistem", "Tarayıcınız ses tanıma özelliğini desteklemiyor.", "error");
                document.getElementById('status-mic').innerText = "MİKROFON: DESTEKLENMİYOR";
                document.getElementById('status-mic').classList.replace('text-green-400', 'text-red-500');
                return;
            }

            recognition = new SpeechRecognition();
            recognition.lang = 'tr-TR';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                isListening = true;
                aiCore.classList.add('listening');
                actionText.innerText = "DİNLENİYOR...";
                document.getElementById('status-mic').innerText = "MİKROFON: DİNLİYOR";
                stopSpeech(); // Stop talking if currently talking
            };

            recognition.onspeechend = () => {
                recognition.stop();
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                handleUserCommand(transcript);
            };

            recognition.onend = () => {
                isListening = false;
                aiCore.classList.remove('listening');
                if(!isProcessing) {
                    actionText.innerText = "BEKLEMEDE (DOKUN)";
                    document.getElementById('status-mic').innerText = "MİKROFON: BEKLİYOR";
                }
            };

            recognition.onerror = (event) => {
                console.error("Ses tanıma hatası:", event.error);
                isListening = false;
                aiCore.classList.remove('listening');
                actionText.innerText = "SES ANLAŞILAMADI (TEKRAR DOKUN)";
            };
        }

        function toggleListening() {
            if (isProcessing) return; // Ignore if AI is thinking

            if (isListening) {
                recognition.stop();
            } else {
                if(recognition) {
                    try {
                        recognition.start();
                    } catch(e) {
                        console.error("Zaten çalışıyor", e);
                    }
                } else {
                    appendMessage("Sistem", "Ses tanıma başlatılamadı.", "error");
                }
            }
        }

        // --- SPEECH SYNTHESIS (TTS) ---
        function speak(text) {
            if (!speechSynth) return;
            
            // Clean markdown or special chars for speech
            const cleanText = text.replace(/[*_#`]/g, '');
            
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'tr-TR';
            utterance.rate = 1.0; // Normal speed
            utterance.pitch = 0.9; // Slightly deeper, AI like

            // Try to find a Turkish voice
            const voices = speechSynth.getVoices();
            const trVoice = voices.find(v => v.lang.includes('tr'));
            if (trVoice) {
                utterance.voice = trVoice;
            }

            speechSynth.speak(utterance);
        }

        function stopSpeech() {
            if(speechSynth && speechSynth.speaking) {
                speechSynth.cancel();
            }
        }

        // Ensure voices are loaded (Chrome quirk)
        if (speechSynth && speechSynth.onvoiceschanged !== undefined) {
            speechSynth.onvoiceschanged = () => { speechSynth.getVoices(); };
        }

        // --- MAIN LOGIC & API ---
        async function handleUserCommand(text) {
            appendMessage("Ahmet Tuncer", text, "user");
            
            isProcessing = true;
            actionText.innerText = "ANALİZ EDİLİYOR...";
            document.getElementById('status-mic').innerText = "MİKROFON: İŞLENİYOR";

            // Check if user is asking to scan/look at something
            const scanKeywords = ["tara", "bak", "ne var", "neler var", "gör", "incele", "kamera", "devre", "oku"];
            const needsScan = scanKeywords.some(keyword => text.toLowerCase().includes(keyword));

            let messageContent = text;

            if (needsScan) {
                bodyEl.classList.add('scanning'); // Start UI scanning effect
                actionText.innerText = "GÖRSEL VERİ TARANIYOR...";
                
                const base64Image = captureImage();
                if (base64Image) {
                    // Vision payload format
                    messageContent = [
                        { type: "text", text: text },
                        { type: "image_url", image_url: { url: base64Image } }
                    ];
                } else {
                    appendMessage("Sistem", "Kamera görüntüsü alınamadı.", "error");
                }
            }

            // Add user message to history
            conversationHistory.push({ role: "user", content: messageContent });

            try {
                // Call Pollinations API
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: conversationHistory,
                        model: AI_MODEL
                    })
                });

                if (!response.ok) throw new Error("API Yanıt vermedi");

                const answerText = await response.text();
                
                // Add AI response to history
                conversationHistory.push({ role: "assistant", content: answerText });

                // Keep history manageable (last 10 interactions + system prompt)
                if (conversationHistory.length > 21) {
                    conversationHistory = [conversationHistory[0], ...conversationHistory.slice(-20)];
                }

                // Output
                appendMessage("Tuncer Zeka", answerText, "ai");
                speak(answerText);

            } catch (error) {
                console.error("API Hatası:", error);
                const errorMsg = "Bağlantı hatası tespit edildi Efendim. Lütfen ağ bağlantılarını kontrol edin.";
                appendMessage("Tuncer Zeka", errorMsg, "error");
                speak(errorMsg);
            } finally {
                isProcessing = false;
                bodyEl.classList.remove('scanning'); // Stop scan effect
                actionText.innerText = "BEKLEMEDE (DOKUN)";
                document.getElementById('status-mic').innerText = "MİKROFON: BEKLİYOR";
            }
        }

        // --- UI HELPERS ---
        function appendMessage(sender, text, type) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `text-left w-full fade-in`;
            
            let nameColor = 'text-gray-400';
            let textColor = 'text-white';
            
            if (type === 'user') {
                nameColor = 'text-green-400';
                textColor = 'text-gray-200';
                msgDiv.className += ' pl-4 border-l-2 border-green-400';
            } else if (type === 'ai') {
                nameColor = 'text-[var(--cyan)]';
                textColor = 'text-white font-semibold text-shadow-sm';
                msgDiv.className += ' pr-4 border-r-2 border-[var(--cyan)] text-right';
            } else if (type === 'error') {
                nameColor = 'text-red-500';
                textColor = 'text-red-300';
            }

            msgDiv.innerHTML = `
                <span class="text-[0.65rem] sm:text-xs ${nameColor} tracking-wider uppercase">[${sender}]</span>
                <p class="${textColor} text-sm sm:text-base mt-1 leading-relaxed">${formatText(text)}</p>
            `;
            
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Basic formatting for AI response
        function formatText(text) {
            if (typeof text !== 'string') return text;
            return text.replace(/\*\*(.*?)\*\*/g, '<span class="text-[var(--cyan)]">$1</span>')
                       .replace(/\n/g, '<br>');
        }

        // Start system on load
        window.addEventListener('DOMContentLoaded', initSystem);

    </script>
</body>
</html>
