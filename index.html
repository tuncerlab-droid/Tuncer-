<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuncer Zeka V7 - Puter.js Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Puter.js SDK - No Key Required -->
    <script src="https://js.puter.com/v2/"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap');

        :root {
            --cyan: #00f3ff;
            --bg-dark: rgba(2, 10, 18, 0.95);
        }

        body {
            margin: 0;
            background-color: #000;
            font-family: 'Share Tech Mono', monospace;
            color: var(--cyan);
            overflow: hidden;
        }

        #camera-feed {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -2;
        }

        .hud-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, transparent 10%, var(--bg-dark) 100%);
            z-index: -1;
            pointer-events: none;
        }

        /* Arc Reactor UI */
        .core-container {
            position: relative;
            width: 170px;
            height: 170px;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .core-container:active { transform: scale(0.9); }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid var(--cyan);
            inset: 0;
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.3);
        }

        .ring-1 { animation: rotate 6s linear infinite; border-style: double; border-width: 4px; }
        .ring-2 { inset: 20px; border: 1px dashed var(--cyan); animation: rotate-rev 4s linear infinite; opacity: 0.5; }
        
        .core-center {
            position: absolute;
            inset: 50px;
            background: var(--cyan);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 1.8rem;
            box-shadow: 0 0 50px var(--cyan);
            z-index: 5;
        }

        .listening .core-center {
            animation: pulse 0.7s infinite alternate;
            background: #fff;
            box-shadow: 0 0 60px #fff;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rotate-rev { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.15); } }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 4px;
            background: linear-gradient(180deg, transparent, var(--cyan), transparent);
            top: -10%;
            display: none;
            z-index: 10;
        }

        .scanning .scan-line {
            display: block;
            animation: scanMove 2.5s infinite linear;
        }

        @keyframes scanMove { 0% { top: 0%; } 100% { top: 100%; } }

        .terminal {
            height: 180px;
            background: rgba(0, 15, 25, 0.8);
            border: 1px solid rgba(0, 243, 255, 0.4);
            backdrop-filter: blur(10px);
            box-shadow: inset 0 0 20px rgba(0, 243, 255, 0.1);
        }

        .sys-label { font-size: 10px; color: rgba(0, 243, 255, 0.5); text-transform: uppercase; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <video id="camera-feed" autoplay muted playsinline></video>
    <div class="hud-overlay"></div>
    <div class="scan-line" id="scan-line"></div>
    <canvas id="capture-canvas" class="hidden"></canvas>

    <!-- UI Header -->
    <header class="p-6 flex justify-between z-10 w-full pointer-events-none">
        <div>
            <h1 class="text-2xl font-bold tracking-[0.3em]" style="font-family: Orbitron">TUNCER <span class="text-white">ZEKA</span></h1>
            <p class="sys-label">User: Ahmet Tuncer | Engine: Puter Cloud AI</p>
            <div id="puter-status" class="text-[8px] text-green-400 mt-1 uppercase">Puter SDK: Connected</div>
        </div>
        <div class="text-right">
            <div id="clock" class="text-xl font-bold">00:00:00</div>
            <div class="sys-label">Secure Line: Active</div>
        </div>
    </header>

    <!-- Center Interaction -->
    <main class="flex-1 flex flex-col items-center justify-center z-10">
        <div class="core-container" id="ai-trigger" onclick="startJarvis()">
            <div class="ring ring-1"></div>
            <div class="ring ring-2"></div>
            <div class="core-center"><i class="fas fa-atom"></i></div>
        </div>
        <p class="mt-10 text-[10px] tracking-[0.5em] uppercase opacity-60" id="hint">Sizi dinliyorum Efendim</p>
    </main>

    <!-- Terminal Output -->
    <footer class="p-6 z-10">
        <div class="terminal rounded-lg p-4 overflow-y-auto text-xs" id="terminal-box">
            <p class="opacity-50">[SYSTEM] Tuncer Zeka V7 (Puter Edition) ready.</p>
            <p class="opacity-50">[SYSTEM] Identifying Architect: Ahmet Tuncer...</p>
        </div>
    </footer>

    <script>
        // System Config
        const ARCHITECT = "Ahmet Tuncer";
        const SYSTEM_PROMPT = `Senin adın Tuncer Zeka. Tasarımcın ${ARCHITECT}. Jarvis gibi konuş. Efendim de. Çok teknik ve havalı ol. Cevaplarını kısa tut.`;
        
        let isProcessing = false;
        const terminalBox = document.getElementById('terminal-box');
        const hintText = document.getElementById('hint');

        // Clock & Camera Initializer
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById('camera-feed').srcObject = stream;
            } catch (e) {
                addLog("SYSTEM", "Optical sensors failed to initialize.", "text-red-500");
            }
        }

        // Voice Engine
        function startJarvis() {
            if (isProcessing) return;
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) {
                addLog("ERROR", "Voice recognition not supported.");
                return;
            }

            const recognition = new Speech();
            recognition.lang = 'tr-TR';
            
            recognition.onstart = () => {
                document.getElementById('ai-trigger').classList.add('listening');
                hintText.innerText = "Veri girişi bekleniyor...";
                window.speechSynthesis.cancel();
            };

            recognition.onresult = async (event) => {
                const transcript = event.results[0][0].transcript;
                processWithPuter(transcript);
            };

            recognition.onend = () => {
                document.getElementById('ai-trigger').classList.remove('listening');
            };

            recognition.start();
        }

        // Puter AI Implementation
        async function processWithPuter(query) {
            isProcessing = true;
            addLog(ARCHITECT.toUpperCase(), query, "text-green-400");
            hintText.innerText = "Analiz ediliyor...";

            const needsScan = /tara|bak|ne var|gör|incele|analiz/.test(query.toLowerCase());
            if (needsScan) {
                document.body.classList.add('scanning');
                addLog("SYSTEM", "Scanning environment via optical array...", "text-yellow-500");
                // Puter şu an doğrudan görsel analiz yapmasa da Jarvis simülasyonu devam eder
            }

            try {
                // puter.ai.chat - No Key, No Credit, Cloud Based
                const response = await puter.ai.chat(`${SYSTEM_PROMPT} Kullanıcı: ${query}`);
                
                const answer = typeof response === 'string' ? response : response.message.content;
                
                addLog("TUNCER ZEKA", answer, "text-white font-bold");
                speak(answer);

            } catch (err) {
                console.error(err);
                const errorMsg = "Bağlantı protokolünde bir aksama var efendim. Tekrar deneyin.";
                addLog("SYSTEM", errorMsg, "text-red-400");
                speak(errorMsg);
            } finally {
                isProcessing = false;
                document.body.classList.remove('scanning');
                hintText.innerText = "Emrinizi bekliyorum Efendim";
            }
        }

        // Helper: Logging
        function addLog(who, msg, color = "text-cyan-400") {
            const p = document.createElement('p');
            p.className = "mb-1 fade-in";
            p.innerHTML = `<span class="opacity-40 text-[8px]">[${who}]</span> <span class="${color}">${msg}</span>`;
            terminalBox.appendChild(p);
            terminalBox.scrollTop = terminalBox.scrollHeight;
        }

        // Helper: Voice Synthesis
        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'tr-TR';
            utterance.pitch = 0.8;
            utterance.rate = 1.1;
            window.speechSynthesis.speak(utterance);
        }

        window.onload = initCamera;
    </script>
</body>
</html>
