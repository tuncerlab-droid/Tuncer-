<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUNCER ZEKA v5.0 - Edith HUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --hud-color: #00ffff;
            --hud-bg: rgba(0, 20, 30, 0.9);
            --font-size-base: 8px;
        }

        body {
            background-color: #ffffff;
            color: var(--hud-color);
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            margin: 0;
            padding: 0;
            user-select: none;
            font-size: var(--font-size-base);
        }

        /* EDITH "SNAP" ANİMASYONU */
        .edith-element {
            opacity: 0;
            transform: translate(-150px, -150px) rotate(-15deg) scale(0.2);
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1); /* Sert ve hızlı oturma efekti */
            pointer-events: none;
        }

        body.system-active .edith-element {
            opacity: 1;
            transform: translate(0, 0) rotate(0deg) scale(1);
        }

        .hud-panel {
            background: var(--hud-bg);
            border: 0.5px solid var(--hud-color);
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.4);
            backdrop-filter: blur(4px);
        }

        /* Merkez Tasarımı */
        .reactor-container {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 0.5px solid var(--hud-color);
        }

        .ring-1 { width: 100%; height: 100%; border-style: double; animation: spin 20s linear infinite; }
        .ring-2 { width: 85%; height: 85%; border-width: 1.5px; border-right-color: transparent; animation: spin-reverse 5s linear infinite; }
        .ring-core { 
            width: 20%; height: 20%; background: var(--hud-color); border-radius: 50%; 
            box-shadow: 0 0 15px var(--hud-color);
            transition: all 0.3s ease;
        }

        .ring-core.listening { background: #ff00ff; box-shadow: 0 0 25px #ff00ff; transform: scale(1.2); }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }

        #boot-overlay {
            position: fixed; inset: 0; background: #ffffff; z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .tiny-text { font-size: 6.5px; line-height: 1.1; letter-spacing: 0.5px; }
    </style>
</head>
<body class="h-screen w-screen relative">

    <!-- Sesle Başlatma Katmanı -->
    <div id="boot-overlay">
        <div class="text-cyan-500 text-center">
            <div id="boot-status" class="text-[10px] font-bold tracking-widest animate-pulse">SESLİ KOMUT BEKLENİYOR...</div>
            <div class="text-[7px] mt-2 opacity-50">"TUNCER BAŞLAT" DEYİN</div>
        </div>
    </div>

    <!-- HUD ÇERÇEVESİ -->
    <div class="absolute inset-0 p-1 flex flex-col justify-between pointer-events-none">
        
        <div class="flex justify-between items-start">
            <div class="edith-element hud-panel p-1 rounded w-20" style="transition-delay: 0.1s;">
                <div class="border-b border-cyan-500/50 tiny-text font-bold mb-1">STATUS</div>
                <div class="flex justify-between tiny-text"><span>BIO:</span> <span class="text-green-400">100%</span></div>
                <div id="sys-time" class="tiny-text opacity-40">00:00:00</div>
            </div>

            <div class="edith-element hud-panel p-1 rounded w-20" style="transition-delay: 0.3s;">
                <div class="border-b border-cyan-500/50 tiny-text font-bold mb-1">SCAN</div>
                <div id="task-list" class="tiny-text italic text-cyan-600 truncate">IDLE...</div>
            </div>
        </div>

        <div class="flex-1 flex justify-center items-center relative">
            <div class="edith-element absolute left-0 w-16 opacity-30" style="transition-delay: 0.5s;">
                <div id="data-stream" class="space-y-0.5 h-20 overflow-hidden flex flex-col justify-end tiny-text"></div>
            </div>

            <div class="edith-element reactor-container" style="transition-delay: 0s;">
                <div class="ring ring-1"></div>
                <div class="ring ring-2"></div>
                <div id="reactor-core" class="ring-core"></div>
            </div>

            <div class="edith-element absolute right-0 w-16 hud-panel p-1 rounded" style="transition-delay: 0.5s;">
                <div class="tiny-text border-b border-cyan-500/50 text-center mb-1">HUD-V5</div>
                <div class="text-[5px] leading-tight">OBJECT: NONE<br>DIST: 0.0m</div>
            </div>
        </div>

        <div class="edith-element w-full flex justify-center mb-1" style="transition-delay: 0.7s;">
            <div class="hud-panel p-1.5 rounded w-full max-w-[200px] border-b border-cyan-500">
                <div id="ai-response" class="text-[9px] text-center min-h-[16px] flex items-center justify-center font-bold text-white uppercase leading-tight">
                    LISTENING...
                </div>
            </div>
        </div>
    </div>

    <script id="tuncer-zeka-lib">
        // Tuncer Zeka Çekirdek Kütüphanesi
        const TuncerZeka = (function () {
            const Olay = {
                _m:{}, on(ad,fn){ if(!this._m[ad])this._m[ad]=[]; this._m[ad].push(fn); },
                emit(ad,v){ if(this._m[ad]) this._m[ad].forEach(f=>f(v)); }
            };
            const Ses = {
                _rec: null, _active: false,
                init() {
                    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                    if(SR) { this._rec = new SR(); this._rec.lang = 'tr-TR'; this._rec.continuous = true; }
                },
                listenOnce(callback) {
                    if(!this._rec) return;
                    this._rec.onresult = (e) => {
                        const txt = e.results[e.results.length-1][0].transcript.toLowerCase();
                        callback(txt);
                    };
                    try { this._rec.start(); } catch(e) {}
                },
                speak(txt) {
                    const u = new SpeechSynthesisUtterance(txt);
                    u.lang = 'tr-TR'; u.rate = 1.1; window.speechSynthesis.speak(u);
                }
            };
            return { ses: Ses, olay: Olay, init: () => Ses.init() };
        })();
    </script>

    <script>
        const zeka = TuncerZeka;
        const uiStatus = document.getElementById('boot-status');
        const uiResponse = document.getElementById('ai-response');
        const uiCore = document.getElementById('reactor-core');

        // Otomatik Başlatma Dinleyicisi
        window.onload = () => {
            zeka.init();
            // Sayfa açılır açılmaz dinlemeye başla
            zeka.ses.listenOnce((text) => {
                console.log("Duyulan:", text);
                if(text.includes("tuncer başlat") || text.includes("sistemi başlat")) {
                    bootSystem();
                } else {
                    // Yanlış komut gelirse dinlemeye devam et
                    uiStatus.innerText = "KOMUT ANLAŞILAMADI...";
                    setTimeout(() => uiStatus.innerText = "SESLİ KOMUT BEKLENİYOR...", 1000);
                }
            });
        };

        function bootSystem() {
            document.getElementById('boot-overlay').style.display = 'none';
            document.body.classList.add('system-active');
            
            const msg = "Tuncer Zeka devrede. Edith protokolü aktif.";
            typeWriter(msg, uiResponse);
            zeka.ses.speak(msg);

            // Zamanlayıcıyı başlat
            setInterval(() => {
                document.getElementById('sys-time').innerText = new Date().toLocaleTimeString('tr-TR');
            }, 1000);

            // Normal asistan moduna geç
            setTimeout(() => {
                startMainLoop();
            }, 3000);
        }

        function startMainLoop() {
            uiCore.classList.add('listening');
            uiResponse.innerText = "EMRİNİZDEYİM";
            zeka.ses.listenOnce((text) => {
                uiCore.classList.remove('listening');
                // Basit yanıtlar
                let reply = "Komut algılandı: " + text;
                if(text.includes("saat")) reply = "Saat şu an " + new Date().toLocaleTimeString('tr-TR');
                if(text.includes("kimsin")) reply = "Ben Tuncer Zeka, senin kişisel gözlük asistanınım.";
                
                typeWriter(reply, uiResponse);
                zeka.ses.speak(reply);
                
                // Döngüyü devam ettir
                setTimeout(startMainLoop, 4000);
            });
        }

        function typeWriter(text, element) {
            element.innerText = '';
            let i = 0;
            function type() {
                if (i < text.length) {
                    element.innerText += text.charAt(i).toUpperCase();
                    i++;
                    setTimeout(type, 20);
                }
            }
            type();
        }
    </script>
</body>
</html>
