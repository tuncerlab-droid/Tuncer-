
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VR Hand Tracking Oyunu</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        .video-container { display: none; /* Kamera görüntüsünü gizle, sadece veri için kullan */ }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-family: sans-serif; font-size: 24px; z-index: 10;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loading">Yapay Zeka ve Kamera Yükleniyor...</div>
    <video class="video-container" id="video" autoplay playsinline></video>

    <script type="module">
        import * as THREE from 'three';
        import { StereoEffect } from 'three/addons/effects/StereoEffect.js';
        import { DeviceOrientationControls } from 'three/addons/controls/DeviceOrientationControls.js';

        // 1. THREE.JS KURULUMU
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        
        // Zemin ve Işık
        const gridHelper = new THREE.GridHelper(20, 20, 0xffffff, 0x444444);
        scene.add(gridHelper);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.6, 0); // Ortalama insan boyu

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // VR (Cardboard) için Stereo Effect ve Telefon Sensör Kontrolleri
        const effect = new StereoEffect(renderer);
        effect.setSize(window.innerWidth, window.innerHeight);
        
        // Telefonla etrafa bakmak için
        const controls = new DeviceOrientationControls(camera);

        // 2. OYUN OBJELERİ (KÜPLER)
        const cubes = [];
        const cubeGeometry = new THREE.BoxGeometry(0.2, 0.2, 0.2);
        const materials = [
            new THREE.MeshStandardMaterial({ color: 0xff0000, transparent: true, opacity: 0.8 }),
            new THREE.MeshStandardMaterial({ color: 0x00ff00, transparent: true, opacity: 0.8 }),
            new THREE.MeshStandardMaterial({ color: 0x0000ff, transparent: true, opacity: 0.8 })
        ];

        for (let i = 0; i < 3; i++) {
            const cube = new THREE.Mesh(cubeGeometry, materials[i]);
            cube.position.set((Math.random() - 0.5) * 2, 1.5, -1.5 - Math.random());
            scene.add(cube);
            cubes.push(cube);
        }

        // 3. ELLERİN EKRANDA ÇİZİLMESİ
        const handLandmarks = [];
        const sphereGeometry = new THREE.SphereGeometry(0.015, 16, 16);
        const sphereMaterial = new THREE.MeshBasicMaterial({ color: 0x00ffff }); // Camgöbeği teknolojik renk

        // 21 adet eklem noktası
        for (let i = 0; i < 21; i++) {
            const mesh = new THREE.Mesh(sphereGeometry, sphereMaterial);
            mesh.visible = false;
            scene.add(mesh);
            handLandmarks.push(mesh);
        }

        let draggedCube = null;

        // 4. MEDIAPIPE HANDS ENTEGRASYONU
        const videoElement = document.getElementById('video');
        const hands = new Hands({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults((results) => {
            document.getElementById('loading').style.display = 'none';

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];

                // Kameraya göre elin 3D konumunu hesapla
                // MediaPipe verileri 0-1 arasıdır. Bunları kameranın önünde bir düzleme yansıtıyoruz.
                const vector = new THREE.Vector3();
                
                for (let i = 0; i < 21; i++) {
                    const lm = landmarks[i];
                    
                    // Ekran koordinatlarını 3D uzaya çevir (Kameradan 1.2 birim ötede)
                    vector.set((lm.x - 0.5) * 2, -(lm.y - 0.5) * 2, -1.2);
                    vector.unproject(camera);
                    
                    // Kameranın bakış açısına göre pozisyonu yönlendir
                    const dir = vector.sub(camera.position).normalize();
                    const distance = 1.2; // Elin kameraya uzaklığı
                    handLandmarks[i].position.copy(camera.position).add(dir.multiplyScalar(distance));
                    handLandmarks[i].visible = true;
                }

                // ETKİLEŞİM MANTIĞI: Çimdikleme (Pinch) Tespiti
                // 8 = İşaret parmağı ucu, 4 = Baş parmak ucu
                const indexTip = handLandmarks[8].position;
                const thumbTip = handLandmarks[4].position;
                const pinchDistance = indexTip.distanceTo(thumbTip);
                
                const isPinching = pinchDistance < 0.05;

                if (isPinching) {
                    handLandmarks[8].material.color.setHex(0xffffff); // Tıklama animasyonu rengi
                    
                    if (!draggedCube) {
                        // Tutulan obje yoksa yakındaki objeyi bul
                        for (let cube of cubes) {
                            if (indexTip.distanceTo(cube.position) < 0.2) {
                                draggedCube = cube;
                                break;
                            }
                        }
                    } else {
                        // Obje tutuluyorsa el ile birlikte hareket ettir
                        draggedCube.position.copy(indexTip);
                    }
                } else {
                    handLandmarks[8].material.color.setHex(0x00ffff);
                    draggedCube = null; // Bırak
                }
            } else {
                // El algılanmadığında noktaları gizle
                handLandmarks.forEach(lm => lm.visible = false);
                draggedCube = null;
            }
        });

        // Kamerayı başlat
        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 640,
            height: 480
        });
        cameraUtils.start();

        // 5. RENDER DÖNGÜSÜ
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Telefon sensörlerini güncelle
            effect.render(scene, camera); // İki ekranlı VR render
        }

        animate();

        // Ekran boyutu değiştiğinde
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effect.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
