
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cardboard VR - 6DoF Tracking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        #vr-mask-overlay { position: absolute; inset: 0; display: flex; z-index: 10; pointer-events: none; }
        .lens-container { flex: 1; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .lens-cutout-left { width: 96%; height: 94%; border-radius: 18% 2% 2% 18% / 50% 3% 3% 50%; box-shadow: 0 0 0 2000px #000, inset 0 0 15px rgba(0,0,0,0.8); }
        .lens-cutout-right { width: 96%; height: 94%; border-radius: 2% 18% 18% 2% / 3% 50% 50% 3%; box-shadow: 0 0 0 2000px #000, inset 0 0 15px rgba(0,0,0,0.8); }
        .cardboard-marker { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 3px; height: 20%; background-color: #fff; z-index: 20; }
        #webcam { position: absolute; bottom: 12px; right: 12px; width: 100px; height: 75px; border-radius: 6px; z-index: 30; object-fit: cover; opacity: 0.2; pointer-events: none; }
    </style>
</head>
<body class="select-none">

    <div id="welcome-screen" class="fixed inset-0 bg-slate-950 text-white z-50 flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-3xl font-bold mb-6 text-yellow-500">VR Hazır (6DoF Tracking)</h1>
        <button id="start-btn" class="bg-gradient-to-r from-yellow-700 to-amber-800 text-white font-bold py-4 px-10 rounded-xl shadow-lg">Gözlüğü Tak ve Başla</button>
    </div>

    <video id="webcam" autoplay playsinline></video>
    <div id="canvas-container"></div>
    <div id="vr-mask-overlay">
        <div class="lens-container"><div class="lens-cutout-left"></div></div>
        <div class="lens-container"><div class="lens-cutout-right"></div></div>
        <div class="cardboard-marker"></div>
    </div>

    <script>
        let scene, renderer, cameraGroup, cameraLeft, cameraRight;
        let posVelocity = new THREE.Vector3();
        let currentPos = new THREE.Vector3(0, 1.6, 0);

        document.getElementById('start-btn').addEventListener('click', async () => {
            document.getElementById('welcome-screen').style.display = 'none';
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            initThree();
            startTracking();
        });

        function initThree() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            cameraGroup = new THREE.Group();
            cameraGroup.position.copy(currentPos);
            scene.add(cameraGroup);

            cameraLeft = new THREE.PerspectiveCamera(70, 0.5, 0.05, 1000);
            cameraLeft.position.set(-0.031, 0, 0);
            cameraGroup.add(cameraLeft);

            cameraRight = new THREE.PerspectiveCamera(70, 0.5, 0.05, 1000);
            cameraRight.position.set(0.031, 0, 0);
            cameraGroup.add(cameraRight);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            animate();
        }

        // GERÇEK DÜNYA HAREKET TAKİBİ (6DoF)
        function startTracking() {
            window.addEventListener('devicemotion', (event) => {
                const acc = event.accelerationIncludingGravity;
                if (!acc.x) return;

                // İvmeölçer verilerini filtreleyerek kamera pozisyonuna ekle
                // Telefonu yukarı-aşağı (eğilme) veya ileri-geri hareket ettirince kamera yansıtacak
                posVelocity.x += acc.x * 0.001;
                posVelocity.y += (acc.y - 9.8) * 0.001; // Yerçekimini çıkar
                posVelocity.z += acc.z * 0.001;
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Pozisyonu yumuşakça güncelle (Friction)
            posVelocity.multiplyScalar(0.92);
            currentPos.add(posVelocity);
            
            // Kamera yüksekliğini sınırlama (zeminin altına geçmesin)
            if(currentPos.y < 0.5) currentPos.y = 0.5;
            cameraGroup.position.copy(currentPos);

            const w = window.innerWidth, h = window.innerHeight;
            renderer.setViewport(0, 0, w / 2, h);
            renderer.render(scene, cameraLeft);
            renderer.setViewport(w / 2, 0, w / 2, h);
            renderer.render(scene, cameraRight);
        }
    </script>
</body>
</html>
