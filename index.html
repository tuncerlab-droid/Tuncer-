```html
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HoloVR Hands</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #020205; font-family: sans-serif; color: #fff; user-select: none; }
        #canvas-container { width: 100%; height: 100%; display: block; }
        #ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, #0f172a 0%, #020205 100%); z-index: 100; text-align: center; padding: 20px; box-sizing: border-box; }
        h1 { color: #00f0ff; font-size: 32px; margin-bottom: 20px; text-shadow: 0 0 15px rgba(0, 240, 255, 0.6); }
        .btn-group { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 300px; }
        .btn { background: linear-gradient(135deg, #00f0ff 0%, #0072ff 100%); border: none; color: #020205; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 30px; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <h1>HOLO-HANDS VR</h1>
        <div class="btn-group">
            <button class="btn" id="btn-vr-start">VR MODUNU BAŞLAT</button>
            <button class="btn" id="btn-normal-start">NORMAL MOD</button>
        </div>
    </div>

    <div id="canvas-container"></div>
    <video id="video_input" autoplay playsinline style="display:none"></video>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <script>
        let scene, camera, renderer, leftCam, rightCam, vrMode = false, initialized = false;
        let deviceYaw = 0, devicePitch = 0, deviceRoll = 0;
        const videoElement = document.getElementById('video_input');
        
        document.getElementById('btn-vr-start').addEventListener('click', () => { vrMode = true; startApp(); });
        document.getElementById('btn-normal-start').addEventListener('click', () => { vrMode = false; startApp(); });

        async function startApp() {
            document.getElementById('ui-overlay').style.display = 'none';
            if (vrMode) await requestSensors();
            initThree();
            startMediaPipe();
        }

        async function requestSensors() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                const res = await DeviceOrientationEvent.requestPermission();
                if (res === 'granted') window.addEventListener('deviceorientation', handleOrientation, true);
            } else {
                window.addEventListener('deviceorientation', handleOrientation, true);
            }
        }

        function handleOrientation(e) {
            // Cardboard yatay duruş düzeltmesi: beta eksenini 90 derece kaydırarak karşıya bakmasını sağladık
            deviceYaw = THREE.MathUtils.degToRad(e.alpha);
            devicePitch = THREE.MathUtils.degToRad(e.beta); 
            deviceRoll = THREE.MathUtils.degToRad(e.gamma);
        }

        function initThree() {
            scene = new THREE.Scene();
            const w = window.innerWidth, h = window.innerHeight;
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(w, h);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            camera = new THREE.Group();
            leftCam = new THREE.PerspectiveCamera(65, (w/(vrMode?2:1))/h, 0.1, 100);
            rightCam = new THREE.PerspectiveCamera(65, (w/(vrMode?2:1))/h, 0.1, 100);
            leftCam.position.x = -0.03; rightCam.position.x = 0.03;
            camera.add(leftCam); camera.add(rightCam);
            camera.position.set(0, 1.4, 0);
            scene.add(camera);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            scene.add(new THREE.GridHelper(10, 10, 0x00f0ff, 0x222222));
            initialized = true;
            animate();
        }

        function startMediaPipe() {
            const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
            hands.setOptions({ maxNumHands: 2, modelComplexity: 1 });
            const cam = new Camera(videoElement, { onFrame: async () => await hands.send({image: videoElement}), width: 640, height: 480 });
            cam.start();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!initialized) return;

            if (vrMode) {
                // Yatay duruşa göre açıları sahneye uygula
                camera.rotation.set(devicePitch, deviceYaw, deviceRoll, 'YXZ');
            }

            const w = window.innerWidth, h = window.innerHeight;
            if (vrMode) {
                renderer.setViewport(0, 0, w/2, h); renderer.render(scene, leftCam);
                renderer.setViewport(w/2, 0, w/2, h); renderer.render(scene, rightCam);
            } else {
                renderer.render(scene, leftCam);
            }
        }
    </script>
</body>
</html>
