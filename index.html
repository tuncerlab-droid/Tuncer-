<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tuncer AR v45.0 - Final Sync & Voice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 5; }
        video { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; z-index: 1; 
        }
        
        #ui-overlay { 
            position: absolute; inset: 0; pointer-events: none; z-index: 10; 
            display: flex; flex-direction: column; justify-content: space-between; padding: 20px; 
        }
        .hud { 
            background: rgba(0, 15, 30, 0.9); border-left: 4px solid #00e5ff; 
            padding: 15px; border-radius: 12px; color: #00e5ff; font-family: monospace; 
            font-size: 11px; align-self: flex-end; backdrop-filter: blur(10px);
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.2);
            min-width: 180px;
        }
        .hud-title { font-weight: 900; border-bottom: 1px solid #00e5ff33; margin-bottom: 8px; padding-bottom: 4px; }
        
        #start-screen { 
            position: fixed; inset: 0; background: #050505; z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: white; font-family: monospace;
        }
        #btn-go { 
            background: linear-gradient(135deg, #00e5ff, #0099ff); color: #000; 
            font-weight: 900; padding: 20px 60px; border-radius: 15px; border: none; 
            cursor: pointer; font-size: 20px; box-shadow: 0 0 40px rgba(0, 229, 255, 0.5); 
            pointer-events: auto; text-transform: uppercase; transition: transform 0.2s;
        }
        #btn-go:active { transform: scale(0.95); }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js"
            }
        }
    </script>
</head>
<body>

    <video id="input_video" playsinline></video>

    <div id="start-screen">
        <h1 style="color:#00e5ff; font-size: 32px; font-weight: 900; margin-bottom:10px;">TUNCER MARK-III</h1>
        <p style="color:#666; margin-bottom:40px; font-size:11px; letter-spacing:3px;">ADVANCED VOICE INTERFACE</p>
        <button id="btn-go">SİSTEMİ BAŞLAT</button>
    </div>

    <div id="ui-overlay" style="display: none;">
        <div class="hud">
            <div class="hud-title">MARK-III MONITOR</div>
            <div>EL MOTORU: <span id="hand-text" style="color:#ff3366;">ARANIYOR</span></div>
            <div>DURUM: <span id="pinch-text" style="color:#fff;">BEKLEMEDE</span></div>
            <div style="margin-top:10px; color:#00ffcc;">
                KOMUT: <span id="voice-text">DİNLENİYOR...</span>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        const videoElement = document.getElementById('input_video');
        let scene, camera, renderer;
        let objects = [], selectedObject = null;
        let isPinching = false;
        let handCursorGroup, cursorDot, cursorRing;

        // --- GELİŞMİŞ SESLİ KONTROL ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;

        function initVoice() {
            if (SpeechRecognition) {
                recognition = new SpeechRecognition();
                recognition.lang = 'tr-TR';
                recognition.continuous = true;
                recognition.onresult = (event) => {
                    const lastResult = event.results.length - 1;
                    const command = event.results[lastResult][0].transcript.toLowerCase();
                    processCommand(command);
                };
                recognition.onerror = () => recognition.start();
                recognition.onend = () => recognition.start();
                recognition.start();
            }
        }

        function processCommand(cmd) {
            document.getElementById('voice-text').innerText = cmd.toUpperCase();
            
            // Ekleme Komutları
            if (cmd.includes('küp') || cmd.includes('kutu')) addShape('cube');
            else if (cmd.includes('küre') || cmd.includes('daire') || cmd.includes('top')) addShape('sphere');
            else if (cmd.includes('halka') || cmd.includes('delik') || cmd.includes('simit')) addShape('torus');
            
            // Silme
            else if (cmd.includes('sil') || cmd.includes('yok et') || cmd.includes('kaldır')) {
                if (selectedObject) {
                    scene.remove(selectedObject);
                    objects = objects.filter(o => o !== selectedObject);
                    selectedObject = null;
                }
            }

            // Renkler
            else if (cmd.includes('mavi')) updateSelected('color', 0x00e5ff);
            else if (cmd.includes('kırmızı')) updateSelected('color', 0xff3366);
            else if (cmd.includes('yeşil')) updateSelected('color', 0x00ffcc);
            else if (cmd.includes('sarı')) updateSelected('color', 0xffcc00);
            else if (cmd.includes('beyaz')) updateSelected('color', 0xffffff);

            // Boyut
            else if (cmd.includes('büyüt')) updateSelected('scale', 1.5);
            else if (cmd.includes('küçült')) updateSelected('scale', 0.7);

            // Döndürme
            else if (cmd.includes('döndür') || cmd.includes('çevir')) updateSelected('spin', true);
            else if (cmd.includes('durdur') || cmd.includes('sabit')) updateSelected('spin', false);
        }

        function addShape(type) {
            let geo;
            if (type === 'cube') geo = new THREE.BoxGeometry(0.25, 0.25, 0.25);
            else if (type === 'sphere') geo = new THREE.SphereGeometry(0.15, 32, 32);
            else if (type === 'torus') geo = new THREE.TorusGeometry(0.15, 0.05, 16, 100);

            const mat = new THREE.MeshStandardMaterial({ 
                color: 0x00e5ff, 
                transparent: true, 
                opacity: 0.8,
                emissive: 0x00e5ff,
                emissiveIntensity: 0.3
            });

            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.copy(handCursorGroup.position);
            mesh.userData = { isSpinning: false };
            scene.add(mesh);
            objects.push(mesh);
            selectedObject = mesh;
        }

        function updateSelected(action, value) {
            if (!selectedObject) return;
            if (action === 'color') {
                selectedObject.material.color.setHex(value);
                selectedObject.material.emissive.setHex(value);
            }
            if (action === 'scale') selectedObject.scale.multiplyScalar(value);
            if (action === 'spin') selectedObject.userData.isSpinning = value;
        }

        // --- EL TAKİBİ VE SENKRONİZASYON ---
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const lm = results.multiHandLandmarks[0];
                const indexTip = lm[8];
                const thumbTip = lm[4];

                document.getElementById('hand-text').innerText = "KİLİTLİ";
                document.getElementById('hand-text').style.color = "#00ffcc";

                // KESİN DÜZELTME: El sola gidince sağa gitme sorununu çözmek için
                // indexTip.x değerini doğrudan (indexTip.x * 2 - 1) ile kullanıp 
                // çarpanı -2.0 yaparak ekseni senkronize ediyoruz.
                const x = (indexTip.x * 2 - 1) * -2.2; 
                const y = (indexTip.y * -2 + 1) * 1.6; 
                const z = -2.5;

                const pos = new THREE.Vector3(x, y, z);
                handCursorGroup.visible = true;
                handCursorGroup.position.lerp(pos, 0.35);

                const dist = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y);
                if (dist < 0.05) {
                    document.getElementById('pinch-text').innerText = "TUTUYOR";
                    cursorRing.material.color.setHex(0x00ffcc);
                    if (!isPinching) {
                        isPinching = true;
                        let minD = 100;
                        objects.forEach(obj => {
                            let d = obj.position.distanceTo(handCursorGroup.position);
                            if (d < 0.6 && d < minD) {
                                selectedObject = obj;
                                minD = d;
                            }
                        });
                    }
                    if (selectedObject) selectedObject.position.lerp(handCursorGroup.position, 0.2);
                } else {
                    isPinching = false;
                    document.getElementById('pinch-text').innerText = "SERBEST";
                    cursorRing.material.color.setHex(0xff3366);
                }
            } else {
                handCursorGroup.visible = false;
                document.getElementById('hand-text').innerText = "ARANIYOR";
            }
        });

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const pLight = new THREE.PointLight(0xffffff, 1);
            pLight.position.set(5, 5, 5);
            scene.add(pLight);

            handCursorGroup = new THREE.Group();
            cursorDot = new THREE.Mesh(new THREE.SphereGeometry(0.02, 16, 16), new THREE.MeshBasicMaterial({ color: 0x00e5ff }));
            cursorRing = new THREE.Mesh(new THREE.RingGeometry(0.05, 0.06, 32), new THREE.MeshBasicMaterial({ color: 0xff3366, side: THREE.DoubleSide }));
            handCursorGroup.add(cursorDot, cursorRing);
            scene.add(handCursorGroup);

            const cam = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 1280, height: 720, facingMode: 'environment'
            });

            document.getElementById('btn-go').addEventListener('click', () => {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('ui-overlay').style.display = 'flex';
                cam.start();
                initVoice();
                animate();
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            objects.forEach(obj => {
                if (obj.userData.isSpinning) {
                    obj.rotation.y += 0.03;
                    obj.rotation.z += 0.01;
                }
            });
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
