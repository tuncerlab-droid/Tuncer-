<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUNCER ZEKA v5.0 - Edith HUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --hud-color: #00ffff;
            --hud-alert: #ff0055;
            --hud-bg: rgba(0, 20, 30, 0.85);
            /* 1.3 inç için optimize edilmiş font boyutu */
            --font-size-base: 9px;
        }

        body {
            background-color: #ffffff;
            color: var(--hud-color);
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            margin: 0;
            padding: 0;
            user-select: none;
            font-size: var(--font-size-base);
        }

        /* EDITH GİRİŞ ANİMASYONU: Başlangıçta hepsi sol üstte */
        .edith-element {
            opacity: 0;
            transform: translate(-100px, -100px) scale(0.5);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        /* Sistem aktif olduğunda yerlerine geçerler */
        body.system-active .edith-element {
            opacity: 1;
            transform: translate(0, 0) scale(1);
            pointer-events: auto;
        }

        /* Panel Tasarımları */
        .hud-panel {
            background: var(--hud-bg);
            border: 0.5px solid var(--hud-color);
            box-shadow: 0 0 5px rgba(0, 255, 255, 0.3);
            backdrop-filter: blur(2px);
        }

        /* Merkez Reaktör */
        .reactor-container {
            position: relative;
            width: 150px; /* 1.3 inç için küçültüldü */
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid var(--hud-color);
            box-shadow: 0 0 8px var(--hud-color);
        }

        .ring-1 { width: 100%; height: 100%; border-style: dashed; animation: spin 12s linear infinite; }
        .ring-2 { width: 80%; height: 80%; border-width: 2px; border-top-color: transparent; animation: spin-reverse 8s linear infinite; }
        .ring-core { width: 25%; height: 25%; background: var(--hud-color); border-radius: 50%; box-shadow: 0 0 20px var(--hud-color); }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 0.5; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }

        #boot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; z-index: 100; display: flex; flex-direction: column;
            justify-content: center; align-items: center; cursor: pointer;
        }

        .terminal-scroll::-webkit-scrollbar { width: 2px; }
        
        /* 1.3 inç ekran için özel kısıtlamalar */
        .tiny-text { font-size: 7px; line-height: 1; }
    </style>
</head>
<body class="h-screen w-screen relative">

    <div id="boot-screen" onclick="bootSystem()">
        <div class="text-cyan-500 animate-pulse text-center">
            <h1 class="text-lg font-bold tracking-tighter">TUNCER ZEKA v5</h1>
            <p class="text-[10px]">SİSTEMİ BAŞLAT</p>
        </div>
    </div>

    <!-- HUD ÇERÇEVESİ -->
    <div class="absolute inset-0 p-2 flex flex-col justify-between pointer-events-none">
        
        <!-- ÜST PANEL (Sol Gecikme 0.2s, Sağ Gecikme 0.4s) -->
        <div class="flex justify-between items-start">
            <div class="edith-element hud-panel p-2 rounded w-24" style="transition-delay: 0.2s;">
                <div class="border-b border-cyan-500/50 tiny-text mb-1 font-bold">SİSTEM</div>
                <div class="flex justify-between tiny-text"><span>CORE:</span> <span class="text-green-400">OK</span></div>
                <div id="sys-time" class="tiny-text mt-1 opacity-50">00:00:00</div>
            </div>

            <div class="edith-element hud-panel p-2 rounded w-24" style="transition-delay: 0.4s;">
                <div class="border-b border-cyan-500/50 tiny-text mb-1 font-bold">GÖREV</div>
                <div id="task-list" class="tiny-text h-8 overflow-hidden italic text-cyan-600">Bekliyor...</div>
            </div>
        </div>

        <!-- ORTA PANEL (Merkez Gecikme 0s, Yanlar 0.6s) -->
        <div class="flex-1 flex justify-center items-center relative">
            <!-- Sol Veri Akışı -->
            <div class="edith-element absolute left-0 w-20 opacity-40 tiny-text" style="transition-delay: 0.6s;">
                <div id="data-stream" class="space-y-1 h-32 overflow-hidden flex flex-col justify-end"></div>
            </div>

            <!-- MERKEZ REAKTÖR -->
            <div class="edith-element reactor-container" style="transition-delay: 0s;">
                <div class="ring ring-1"></div>
                <div class="ring ring-2"></div>
                <div id="reactor-core" class="ring-core"></div>
            </div>

            <!-- Sağ Sensör -->
            <div class="edith-element absolute right-0 w-20 hud-panel p-1 rounded tiny-text" style="transition-delay: 0.6s;">
                <div class="border-b border-cyan-500/50 mb-1 font-bold text-center">SENSÖR</div>
                <div id="vision-stats" class="text-[6px] leading-tight">Analiz Kapalı</div>
            </div>
        </div>

        <!-- ALT PANEL (Gecikme 0.8s) -->
        <div class="edith-element w-full flex justify-center" style="transition-delay: 0.8s;">
            <div class="hud-panel p-2 rounded-lg w-full max-w-[240px] border-b-2 border-cyan-500">
                <div id="ai-response" class="text-[10px] text-center min-h-[24px] flex items-center justify-center font-bold text-white uppercase leading-tight">
                    SİSTEM ÇEVRİMİÇİ
                </div>
                <!-- Mini Input (Opsiyonel kullanım için gizlenebilir veya küçültülebilir) -->
                <div class="flex gap-1 mt-1">
                    <input type="text" id="chat-input" class="flex-1 bg-transparent border border-cyan-500/30 text-[8px] p-1 text-cyan-300 focus:outline-none">
                    <button onclick="toggleListening()" class="bg-cyan-500/20 px-2 rounded text-[8px]">REC</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const zeka = TuncerZeka; // Önceki kütüphane kodunun aynı olduğunu varsayıyoruz
        
        const uiAiResponse = document.getElementById('ai-response');
        const uiChatInput = document.getElementById('chat-input');
        const uiReactor = document.getElementById('reactor-core');
        const uiDataStream = document.getElementById('data-stream');
        const uiSysTime = document.getElementById('sys-time');

        // Zaman
        setInterval(() => {
            const now = new Date();
            uiSysTime.innerText = now.toLocaleTimeString('tr-TR');
        }, 1000);

        function addLog(text) {
            const div = document.createElement('div');
            div.className = 'border-l border-cyan-500 pl-1 mb-1';
            div.innerText = text.substring(0, 15);
            uiDataStream.appendChild(div);
            if(uiDataStream.children.length > 8) uiDataStream.removeChild(uiDataStream.firstChild);
        }

        // Edith Efekti Başlatma
        function bootSystem() {
            document.getElementById('boot-screen').style.display = 'none';
            document.body.classList.add('system-active'); // Bu sınıf animasyonu tetikler
            
            zeka.baslat();
            
            const introText = "Tuncer Zeka Aktif. Edith Modu Devrede.";
            setTimeout(() => {
                typeWriter(introText, uiAiResponse);
                zeka.ses.konuş(introText);
            }, 1200); // Animasyon bitişine yakın konuşma başlasın
        }

        function typeWriter(text, element) {
            element.innerText = '';
            let i = 0;
            const cleanText = text.toUpperCase();
            function type() {
                if (i < cleanText.length) {
                    element.innerText += cleanText.charAt(i);
                    i++;
                    setTimeout(type, 30);
                }
            }
            type();
        }

        function toggleListening() {
            zeka.ses.dinle((metin) => {
                addLog(metin);
                zeka.isle(metin).then(cevap => {
                    typeWriter(cevap, uiAiResponse);
                    zeka.ses.konuş(cevap);
                });
            });
        }

        // Tuncer Zeka Kütüphanesi (Minimal versiyon - bir önceki koddan beslenir)
        // [Zeka kütüphanesi buraya dahil edilecek veya bir önceki mesajdaki gibi kalacak]
    </script>
</body>
</html>
