<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TUNCER AR MODELER — TuncerLab</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--c:#00ffcc;--c2:#ff8800;--c3:#ff4455;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100vw;height:100vh;overflow:hidden;background:#000;font-family:'Share Tech Mono',monospace;}

/* === OVERLAY (start screen) === */
#overlay{position:fixed;inset:0;background:rgba(0,10,18,.96);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--c);padding:24px;text-align:center;}
.ot{font-size:16px;letter-spacing:6px;text-shadow:0 0 22px var(--c);}
.os{font-size:9px;letter-spacing:2px;opacity:.55;line-height:16px;max-width:300px;}
.obtn{border:1px solid var(--c);color:var(--c);background:transparent;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;padding:11px 26px;cursor:pointer;width:260px;text-align:center;}
.obtn:active{background:rgba(0,255,204,.15);}
.obtn.sec{border-color:rgba(0,255,204,.4);font-size:9px;padding:9px 22px;}
.obtn.disabled{opacity:.3;pointer-events:none;}
#lbar-w{width:180px;height:2px;background:rgba(0,255,204,.12);overflow:hidden;display:none;}
#lbar{width:100%;height:100%;background:var(--c);animation:ls 1.4s ease-in-out infinite;transform:translateX(-100%);}
@keyframes ls{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
#load-msg{font-size:9px;letter-spacing:2px;opacity:.6;display:none;}
#err-box{color:var(--c3);font-size:9px;letter-spacing:1px;line-height:15px;display:none;border:1px solid rgba(255,68,85,.3);padding:10px;max-width:280px;}

/* === MAIN UI === */
#ui{position:fixed;inset:0;z-index:50;pointer-events:none;}
.corner{position:absolute;width:18px;height:18px;border:1.5px solid var(--c);opacity:.6;animation:cp 3s ease-in-out infinite;}
.tl{top:10px;left:10px;border-right:none;border-bottom:none}
.tr{top:10px;right:10px;border-left:none;border-bottom:none;animation-delay:.75s}
.bl{bottom:52px;left:10px;border-right:none;border-top:none;animation-delay:1.5s}
.br{bottom:52px;right:10px;border-left:none;border-top:none;animation-delay:2.25s}
@keyframes cp{0%,100%{opacity:.3}50%{opacity:.9}}
#mode-lbl{position:absolute;top:12px;left:50%;transform:translateX(-50%);color:var(--c);font-size:10px;letter-spacing:4px;text-shadow:0 0 14px var(--c);background:rgba(0,8,14,.82);padding:4px 16px;border:1px solid rgba(0,255,204,.2);white-space:nowrap;}
#status{position:absolute;bottom:52px;left:50%;transform:translateX(-50%);color:#00ff88;font-size:9px;letter-spacing:2px;text-shadow:0 0 8px #00ff88;background:rgba(0,8,14,.7);padding:3px 12px;white-space:nowrap;text-align:center;min-width:180px;}
#cnt{position:absolute;top:12px;right:12px;color:var(--c2);font-size:9px;letter-spacing:2px;}
#hs{position:absolute;top:12px;left:12px;color:rgba(0,255,204,.55);font-size:9px;letter-spacing:2px;}
#sel{position:absolute;bottom:52px;left:12px;color:var(--c2);font-size:8px;letter-spacing:1px;opacity:0;transition:opacity .3s;}
#sw{position:absolute;bottom:52px;right:12px;width:16px;height:16px;border:1px solid rgba(0,255,204,.4);}
#scanlines{position:absolute;inset:0;z-index:6;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.04) 3px,rgba(0,0,0,.04) 4px);}
#menu-arrow{position:absolute;color:var(--c);font-size:10px;letter-spacing:1px;text-shadow:0 0 10px var(--c);background:rgba(0,8,14,.75);padding:3px 9px;border:1px solid rgba(0,255,204,.3);opacity:0;transition:opacity .4s;pointer-events:none;}

/* === BOTTOM BAR === */
#bar{position:fixed;bottom:0;left:0;width:100%;display:flex;z-index:100;pointer-events:all;}
.bb{flex:1;background:rgba(0,8,16,.92);border-top:1px solid rgba(0,255,204,.2);border-right:1px solid rgba(0,255,204,.1);color:var(--c);font-family:'Share Tech Mono',monospace;font-size:7px;letter-spacing:1px;padding:8px 2px;cursor:pointer;-webkit-tap-highlight-color:transparent;text-align:center;}
.bb:active,.bb.on{background:rgba(0,255,204,.14);border-top-color:var(--c);}
.bb.r{color:var(--c3);border-top-color:rgba(255,68,85,.3);}
.bb.o{color:var(--c2);border-top-color:rgba(255,136,0,.3);}

/* === RETICLE LABEL === */
#reticle-lbl{position:fixed;top:50%;left:50%;transform:translate(-50%,40px);color:rgba(0,255,204,.5);font-size:8px;letter-spacing:2px;pointer-events:none;display:none;}
</style>
</head>
<body>

<!-- START OVERLAY -->
<div id="overlay">
  <div class="ot">TUNCER AR MODELER</div>
  <div class="os" id="ovr-desc">Nesneler gerçek ortama sabitlenir — odaya geri dönünce aynı yerde durur.</div>
  <div id="lbar-w"><div id="lbar"></div></div>
  <div id="load-msg"></div>
  <div id="err-box"></div>
  <button class="obtn" id="btn-webxr" onclick="startWebXR()">◈ AR BAŞLAT (WebXR + ARCore)</button>
  <button class="obtn sec" id="btn-gyro" onclick="startGyro()">◈ JIROSKOP MODU (fallback)</button>
  <div class="os" style="opacity:.35">WebXR: Android Chrome + ARCore gerekir<br>Jiroskop: Her telefonda çalışır, yön tabanlı</div>
</div>

<!-- MAIN UI -->
<div id="ui">
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>
  <div id="mode-lbl">◈ TUNCER AR MODELER</div>
  <div id="status">HAZIR</div>
  <div id="cnt">NESNE: 0</div>
  <div id="hs"></div>
  <div id="sel"></div>
  <div id="sw" style="background:#00ffcc"></div>
  <div id="menu-arrow"></div>
  <div id="scanlines"></div>
</div>

<div id="reticle-lbl">▼ DOKUN: YERLEŞTİR</div>

<!-- BOTTOM BAR -->
<div id="bar">
  <button class="bb on" id="bb-cube"     onclick="pick('cube')">◻<br>CUBE</button>
  <button class="bb"    id="bb-sphere"   onclick="pick('sphere')">●<br>SPHERE</button>
  <button class="bb"    id="bb-cylinder" onclick="pick('cylinder')">⬡<br>CYL</button>
  <button class="bb"    id="bb-cone"     onclick="pick('cone')">▲<br>CONE</button>
  <button class="bb"    id="bb-torus"    onclick="pick('torus')">⊚<br>TORUS</button>
  <button class="bb o"                   onclick="recall()">≡<br>MENÜ</button>
  <button class="bb r"                   onclick="delSel()">✕<br>SİL</button>
</div>

<!-- THREE.JS CANVAS (full screen, z=1) -->
<canvas id="c" style="position:fixed;inset:0;z-index:10;touch-action:none;width:100%;height:100%;"></canvas>

<!-- FALLBACK BG CANVAS (z=0, behind Three.js) -->
<canvas id="bg" style="position:fixed;inset:0;z-index:0;display:none;"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script>
'use strict';

// ─────────────────────────────────────────────────────────
//  GLOBALS
// ─────────────────────────────────────────────────────────
let W = window.innerWidth, H = window.innerHeight;
let scene, camera, renderer, stereoCamera;
let modelGroup, btnGroup;
let modelObjects = [], arBtns = [];
let selectedObj = null;
let addShape = 'cube';
const PALETTE = [0x00ffcc,0xff4455,0xff8800,0x4488ff,0xffee00,0xcc44ff,0x44ff88,0xff66aa];
let colorIdx = 0;

// Drag
let dragObj = null, dragDepth = 0, pointerMoved = false;
let pStart = {x:0,y:0};

// Gestures
let gestureL='NONE', gestureR='NONE', gCool=0;
let twoAct=false, twoD0=0, twoA0=0;
let twoS0 = new THREE.Vector3(), twoR0 = 0;

// Modes
let mode = 'none'; // 'webxr' | 'gyro'

// WebXR
let xrSess=null, htSrc=null, htReq=false;

// Fallback bg
const bgEl = document.getElementById('bg');
let bgCtx = null;
let vidBack = null, vidFront = null;

// Raycaster
const raycaster = new THREE.Raycaster();

// ─────────────────────────────────────────────────────────
//  THREE.JS INIT
// ─────────────────────────────────────────────────────────
function initThree() {
  W = window.innerWidth; H = window.innerHeight;
  const c = document.getElementById('c');
  c.width = W; c.height = H;

  renderer = new THREE.WebGLRenderer({canvas:c, alpha:true, antialias:true, logarithmicDepthBuffer:true});
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0,0);
  renderer.autoClear = false;

  scene  = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(70, W/H, 0.005, 500);
  camera.position.set(0,0,0);
  scene.add(camera);

  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const kl = new THREE.DirectionalLight(0x00ffee,1.2); kl.position.set(2,4,2); scene.add(kl);
  const pl = new THREE.PointLight(0x0055ff,0.7,30); pl.position.set(-4,1,-3); scene.add(pl);

  modelGroup = new THREE.Group(); scene.add(modelGroup);
  btnGroup   = new THREE.Group(); scene.add(btnGroup);

  stereoCamera = new THREE.StereoCamera();
  stereoCamera.eyeSep = 0.064;

  // Reticle
  const rg = new THREE.RingGeometry(0.06,0.09,32);
  const rm = new THREE.MeshBasicMaterial({color:0x00ffcc,side:THREE.DoubleSide,transparent:true,opacity:0.85});
  window.reticle = new THREE.Mesh(rg,rm);
  window.reticle.rotation.x = -Math.PI/2;
  window.reticle.matrixAutoUpdate = false;
  window.reticle.visible = false;
  scene.add(window.reticle);
}

// ─────────────────────────────────────────────────────────
//  AR BUTTONS  — world space, raycasted with Three.js
// ─────────────────────────────────────────────────────────
const BDEFS = [
  {id:'cube',    sym:'◻',lbl:'CUBE',  col:0x00ffcc},
  {id:'sphere',  sym:'●',lbl:'SHP',  col:0x00ccff},
  {id:'cylinder',sym:'⬡',lbl:'CYL',  col:0x00ffcc},
  {id:'cone',    sym:'▲',lbl:'CONE', col:0x00ffcc},
  {id:'torus',   sym:'⊚',lbl:'TOR',  col:0x00ffcc},
  {id:'color',   sym:'◈',lbl:'CLR',  col:0xffee00},
  {id:'delete',  sym:'✕',lbl:'DEL',  col:0xff4455},
];

function bTex(sym,lbl,col,active,prog){
  const cv=document.createElement('canvas'); cv.width=128; cv.height=72;
  const ctx=cv.getContext('2d');
  const h='#'+col.toString(16).padStart(6,'0');
  ctx.fillStyle=active?'rgba(0,255,204,.18)':'rgba(0,8,16,.92)';
  ctx.fillRect(0,0,128,72);
  ctx.strokeStyle=h; ctx.lineWidth=active?2.5:1.5;
  ctx.globalAlpha=active?1:.8; ctx.strokeRect(2,2,124,68); ctx.globalAlpha=1;
  if(prog>0){ctx.fillStyle=h;ctx.globalAlpha=.85;ctx.fillRect(4,66,120*prog,3);ctx.globalAlpha=1;}
  ctx.fillStyle=h; ctx.shadowColor=h; ctx.shadowBlur=active?18:8;
  ctx.font='bold 32px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(sym,64,27);
  ctx.shadowBlur=4; ctx.font='9px monospace'; ctx.fillText(lbl,64,53); ctx.shadowBlur=0;
  return new THREE.CanvasTexture(cv);
}

function mkBtn(def,pos){
  const geo = new THREE.PlaneGeometry(0.18,0.1);
  const mat = new THREE.MeshBasicMaterial({map:bTex(def.sym,def.lbl,def.col,false,0),transparent:true,side:THREE.DoubleSide,depthTest:false});
  const m = new THREE.Mesh(geo,mat);
  m.renderOrder=50;
  // Glow edge
  const el=new THREE.LineSegments(new THREE.EdgesGeometry(geo),new THREE.LineBasicMaterial({color:def.col,transparent:true,opacity:.65,depthTest:false}));
  el.renderOrder=51; m.add(el);
  m.userData={...def,edge:el,hoverStart:0,prog:0};
  m.position.copy(pos);
  btnGroup.add(m); arBtns.push(m); return m;
}

function spawnButtons(centerWorld){
  btnGroup.clear(); arBtns=[];
  const n=BDEFS.length, sp=0.22, tw=(n-1)*sp;
  BDEFS.forEach((def,i)=>{
    const pos=centerWorld.clone();
    pos.x += (i/(n-1)-0.5)*tw;
    mkBtn(def,pos);
  });
  saveBtnPos();
}

function placeBtnsInFront(dist=2){
  const center = new THREE.Vector3(0,0,-dist).applyQuaternion(camera.quaternion).add(camera.position);
  center.y = camera.position.y - 0.25;
  spawnButtons(center);
}

function recall(){ placeBtnsInFront(1.8); setMode('MENÜ ÇAĞRILDI'); }
window.recall=recall;

function saveBtnPos(){
  try{localStorage.setItem('tARbtn4',JSON.stringify(arBtns.map(b=>({x:+b.position.x.toFixed(3),y:+b.position.y.toFixed(3),z:+b.position.z.toFixed(3)}))));}catch(e){}
}
function loadBtnPos(){
  try{const r=localStorage.getItem('tARbtn4');if(!r)return false;const d=JSON.parse(r);if(d.length!==BDEFS.length)return false;spawnButtons(new THREE.Vector3(0,0,-2));d.forEach((p,i)=>{if(arBtns[i])arBtns[i].position.set(p.x,p.y,p.z);});return true;}catch(e){return false;}
}

let hoverBtn=null, hoverT=0;
const BTN_HOLD=1200;

function refreshBtn(b,active,prog){
  if(b.material.map) b.material.map.dispose();
  b.material.map=bTex(b.userData.sym,b.userData.lbl,b.userData.col,active,prog);
  b.material.map.needsUpdate=true;
  b.userData.edge.material.opacity=active?.95:.65;
}

// Billboard + off-screen arrow
function updateBtns(){
  let anyVis=false;
  arBtns.forEach(b=>{
    b.lookAt(camera.position);
    const p=b.position.clone().project(camera);
    if(p.z<1&&Math.abs(p.x)<1.2&&Math.abs(p.y)<1.2) anyVis=true;
  });
  const arr=document.getElementById('menu-arrow');
  if(!anyVis&&arBtns.length>0){
    const mid=arBtns[Math.floor(arBtns.length/2)];
    const p=mid.position.clone().project(camera);
    const ang=Math.atan2(-p.y,p.x);
    const arrows=['→','↗','↑','↖','←','↙','↓','↘'];
    const ai=Math.round(((ang*180/Math.PI+180)/45))%8;
    arr.textContent=arrows[ai]+' MENÜ';
    arr.style.opacity='1';
    const ex=Math.cos(ang),ey=-Math.sin(ang);
    arr.style.left=(W/2+ex*(W/2-58))+'px'; arr.style.top=(H/2+ey*(H/2-58))+'px';
    arr.style.transform='translate(-50%,-50%)';
  }else arr.style.opacity='0';
}

// ─────────────────────────────────────────────────────────
//  OBJECTS — world space
// ─────────────────────────────────────────────────────────
const GEOS={
  cube:     ()=>new THREE.BoxGeometry(0.18,0.18,0.18),
  sphere:   ()=>new THREE.SphereGeometry(0.11,22,22),
  cylinder: ()=>new THREE.CylinderGeometry(0.07,0.07,0.22,22),
  cone:     ()=>new THREE.ConeGeometry(0.1,0.24,22),
  torus:    ()=>new THREE.TorusGeometry(0.09,0.035,14,30),
};
function spawnObj(type,pos,color,id){
  const geo=(GEOS[type]||GEOS.cube)();
  const col=color!==undefined?color:PALETTE[colorIdx];
  const mat=new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:.25,metalness:.4,roughness:.4,transparent:true,opacity:.88});
  const m=new THREE.Mesh(geo,mat);
  m.add(new THREE.Mesh(geo.clone(),new THREE.MeshBasicMaterial({color:col,wireframe:true,transparent:true,opacity:.2})));
  const ring=new THREE.Mesh(new THREE.RingGeometry(.14,.17,32),new THREE.MeshBasicMaterial({color:col,side:THREE.DoubleSide,transparent:true,opacity:.28}));
  ring.rotation.x=-Math.PI/2; ring.position.y=-.13; m.add(ring);
  m.position.copy(pos);
  m.userData={type,color:col,id:id||(Date.now()+Math.random()),ring};
  modelGroup.add(m); modelObjects.push(m);
  updCnt(); saveSc(); return m;
}
function destroyObj(o){
  if(!o)return; modelGroup.remove(o);
  const i=modelObjects.indexOf(o); if(i>-1)modelObjects.splice(i,1);
  if(selectedObj===o){selectedObj=null;updSel(null);}
  updCnt(); saveSc();
}
function highlight(o,on){if(!o)return;o.material.emissiveIntensity=on?.72:.25;if(o.userData.ring)o.userData.ring.material.opacity=on?.7:.28;}

// ─────────────────────────────────────────────────────────
//  PERSISTENCE
// ─────────────────────────────────────────────────────────
function saveSc(){try{localStorage.setItem('tARv5',JSON.stringify(modelObjects.map(o=>({t:o.userData.type,c:o.userData.color,id:o.userData.id,px:+o.position.x.toFixed(4),py:+o.position.y.toFixed(4),pz:+o.position.z.toFixed(4),rx:+o.rotation.x.toFixed(4),ry:+o.rotation.y.toFixed(4),rz:+o.rotation.z.toFixed(4),sx:+o.scale.x.toFixed(4),sy:+o.scale.y.toFixed(4),sz:+o.scale.z.toFixed(4)}))));}catch(e){}}
function loadSc(){try{const r=localStorage.getItem('tARv5');if(!r)return;JSON.parse(r).forEach(d=>{const o=spawnObj(d.t,new THREE.Vector3(d.px,d.py,d.pz),d.c,d.id);o.rotation.set(d.rx,d.ry,d.rz);o.scale.set(d.sx,d.sy,d.sz);});}catch(e){}}

// ─────────────────────────────────────────────────────────
//  TOUCH / POINTER — raycast for 3D button hit
// ─────────────────────────────────────────────────────────
function getActiveCamera(){
  // In WebXR, camera is updated by XR system; use same camera variable
  return camera;
}

function setupPointer(){
  // Listen on BODY so WebXR dom-overlay touches are caught too
  document.body.addEventListener('pointerdown', onPD, {passive:false});
  document.body.addEventListener('pointermove', onPM, {passive:true});
  document.body.addEventListener('pointerup',   onPU, {passive:true});
}

function ndcFromEvent(e){
  const r = document.getElementById('c').getBoundingClientRect();
  return {x:((e.clientX-r.left)/r.width)*2-1, y:-((e.clientY-r.top)/r.height)*2+1};
}

function onPD(e){
  // Ignore bar/overlay clicks
  if(e.target.closest('#bar')||e.target.closest('#overlay')) return;
  e.preventDefault();
  pStart={x:e.clientX,y:e.clientY}; pointerMoved=false;

  const ndc = ndcFromEvent(e);
  const cam = getActiveCamera();
  raycaster.setFromCamera(ndc, cam);

  // 1) Hit AR buttons first (world-space raycast)
  const bhits = raycaster.intersectObjects(btnGroup.children, true);
  if(bhits.length>0){
    let btn=bhits[0].object;
    while(btn.parent&&btn.parent!==btnGroup) btn=btn.parent;
    if(arBtns.includes(btn)){
      doBtn(btn.userData.id);
      refreshBtn(btn,true,1); setTimeout(()=>refreshBtn(btn,false,0),350);
      return;
    }
  }

  // 2) Hit model objects
  const ohits = raycaster.intersectObjects(modelGroup.children, true);
  if(ohits.length>0){
    let o=ohits[0].object;
    while(o.parent&&o.parent!==modelGroup) o=o.parent;
    if(modelObjects.includes(o)){
      if(selectedObj&&selectedObj!==o) highlight(selectedObj,false);
      selectedObj=o; highlight(o,true); updSel(o);
      dragObj=o; dragDepth=o.position.clone().project(cam).z;
      setMode('SEÇİLDİ: '+o.userData.type.toUpperCase());
      return;
    }
  }

  // 3) No hit — prepare for potential place
  dragObj=null;
}

function onPM(e){
  if(!dragObj) return;
  const dx=e.clientX-pStart.x, dy=e.clientY-pStart.y;
  if(Math.hypot(dx,dy)>8) pointerMoved=true;
  if(pointerMoved){
    const ndc=ndcFromEvent(e);
    const v=new THREE.Vector3(ndc.x,ndc.y,dragDepth).unproject(getActiveCamera());
    dragObj.position.copy(v); setMode('TAŞINIYOR'); saveSc();
  }
}

function onPU(e){
  if(e.target.closest('#bar')||e.target.closest('#overlay')) return;
  if(dragObj){dragObj=null;saveSc();}
  if(!pointerMoved){
    // Tap on empty = place object
    if(mode==='webxr'&&window.reticle&&window.reticle.visible){
      const pos=new THREE.Vector3().setFromMatrixPosition(window.reticle.matrix);
      spawnObj(addShape,pos);
      setMode('EKLENDİ: '+addShape.toUpperCase());
    } else if(mode==='gyro'){
      const ndc=ndcFromEvent(e);
      const cam=getActiveCamera();
      // Place on a plane 2m in front of camera
      const fwd=new THREE.Vector3(0,0,-2).applyQuaternion(cam.quaternion).add(cam.position);
      const plN=new THREE.Vector3(0,0,1).applyQuaternion(cam.quaternion);
      raycaster.setFromCamera(ndc,cam);
      const t=plN.dot(fwd.clone().sub(cam.position))/plN.dot(raycaster.ray.direction);
      if(t>0){
        const pos=cam.position.clone().add(raycaster.ray.direction.clone().multiplyScalar(t));
        spawnObj(addShape,pos);
        setMode('EKLENDİ: '+addShape.toUpperCase());
      }
    }
  }
}

// XR select event = air tap
function onXRSelect(){
  if(window.reticle&&window.reticle.visible){
    const pos=new THREE.Vector3().setFromMatrixPosition(window.reticle.matrix);
    spawnObj(addShape,pos); setMode('EKLENDİ: '+addShape.toUpperCase());
  }
}

// ─────────────────────────────────────────────────────────
//  BUTTON ACTIONS
// ─────────────────────────────────────────────────────────
function doBtn(id){
  if(['cube','sphere','cylinder','cone','torus'].includes(id)) pick(id);
  else if(id==='color'){colorIdx=(colorIdx+1)%PALETTE.length;updSwatch();if(selectedObj){const nc=PALETTE[colorIdx];selectedObj.material.color.setHex(nc);selectedObj.material.emissive.setHex(nc);selectedObj.userData.color=nc;saveSc();}}
  else if(id==='delete'){if(selectedObj){destroyObj(selectedObj);setMode('SİLİNDİ');}else setMode('ÖNCE NESNE SEÇ');}
}
function pick(s){
  addShape=s;
  document.querySelectorAll('.bb').forEach(b=>b.classList.remove('on'));
  const el=document.getElementById('bb-'+s); if(el) el.classList.add('on');
  setMode('EKLE: '+s.toUpperCase());
}
function delSel(){ if(selectedObj){destroyObj(selectedObj);setMode('SİLİNDİ');}else setMode('ÖNCE NESNE SEÇ');}
window.pick=pick; window.delSel=delSel;

// ─────────────────────────────────────────────────────────
//  MEDIAPIPE (front cam — gestures)
// ─────────────────────────────────────────────────────────
function extd(lms,t,p){return lms[t].y<lms[p].y-.025;}
function pDist(lms){const dx=lms[4].x-lms[8].x,dy=lms[4].y-lms[8].y;return Math.sqrt(dx*dx+dy*dy);}
function detG(lms){
  const pd=pDist(lms),idx=extd(lms,8,6),mid=extd(lms,12,10),rng=extd(lms,16,14),pnk=extd(lms,20,18);
  if(pd<.06)return'PINCH';
  if(lms[4].y>lms[0].y+.06&&!idx&&!mid&&!rng&&!pnk)return'THUMBS_DOWN';
  if(idx&&mid&&!rng&&!pnk)return'PEACE';
  if(!idx&&!mid&&!rng&&!pnk)return'FIST';
  if(idx&&!mid&&!rng&&!pnk)return'POINT';
  if(idx&&mid&&rng&&pnk)return'OPEN';
  return'NONE';
}

// Gesture hover on AR buttons (point + hold)
function gestureButtonCheck(lms){
  if(!lms) return;
  const tip=lms[8]; // index fingertip in image space (0-1)
  const ndcTip={x:tip.x*2-1, y:-(tip.y*2-1)};
  raycaster.setFromCamera(ndcTip, getActiveCamera());
  const hits=raycaster.intersectObjects(btnGroup.children,true);
  if(hits.length>0){
    let btn=hits[0].object;
    while(btn.parent&&btn.parent!==btnGroup) btn=btn.parent;
    if(arBtns.includes(btn)){
      if(btn!==hoverBtn){if(hoverBtn)refreshBtn(hoverBtn,false,0);hoverBtn=btn;hoverT=Date.now();}
      const prog=Math.min((Date.now()-hoverT)/BTN_HOLD,1);
      refreshBtn(hoverBtn,true,prog);
      if(prog>=1){doBtn(hoverBtn.userData.id);hoverT=Date.now();}
      return;
    }
  }
  if(hoverBtn){refreshBtn(hoverBtn,false,0);hoverBtn=null;}
}

function onHands(res){
  if(!res.multiHandLandmarks||res.multiHandLandmarks.length===0){
    gestureL=gestureR='NONE'; document.getElementById('hs').textContent=''; return;
  }
  const hands=res.multiHandLandmarks, sides=res.multiHandedness;
  document.getElementById('hs').textContent='◉ '+hands.length+' EL';
  let lLms=null,rLms=null;
  sides.forEach((s,i)=>{if(s.label==='Right')lLms=hands[i];else rLms=hands[i];});
  if(lLms)gestureL=detG(lLms);else gestureL='NONE';
  if(rLms)gestureR=detG(rLms);else gestureR='NONE';
  const activeG=rLms?gestureR:gestureL;
  const activeLms=rLms||lLms;

  // Gesture-based button hover
  gestureButtonCheck(activeLms);

  // Two-hand scale+rotate
  const now=Date.now();
  if(lLms&&rLms&&selectedObj){
    const cam=getActiveCamera();
    const fovH=THREE.MathUtils.degToRad(cam.fov/2);
    const ph=2*Math.tan(fovH),pw=ph*(W/H);
    const l2=(lm)=>{const v=new THREE.Vector3((lm.x-.5)*pw*2,(0.5-lm.y)*ph*2,-2);v.applyMatrix4(cam.matrixWorld);return v;};
    const lp=l2(lLms[8]),rp=l2(rLms[8]);
    const cd=lp.distanceTo(rp);
    const lG=detG(lLms),rG=detG(rLms);
    if((lG==='PINCH'||lG==='FIST')&&(rG==='PINCH'||rG==='FIST')){
      if(!twoAct){twoAct=true;twoD0=cd;twoS0.copy(selectedObj.scale);twoA0=Math.atan2(rp.x-lp.x,rp.z-lp.z);twoR0=selectedObj.rotation.y;}
      else{if(twoD0>0.01)selectedObj.scale.copy(twoS0.clone().multiplyScalar(THREE.MathUtils.clamp(cd/twoD0,.1,8)));selectedObj.rotation.y=twoR0+(Math.atan2(rp.x-lp.x,rp.z-lp.z)-twoA0);saveSc();}
      return;
    }else twoAct=false;
  }else twoAct=false;

  if(activeG==='THUMBS_DOWN'&&now>gCool&&selectedObj){destroyObj(selectedObj);gCool=now+900;}
  if(activeG==='PEACE'&&now>gCool){colorIdx=(colorIdx+1)%PALETTE.length;updSwatch();if(selectedObj){const nc=PALETTE[colorIdx];selectedObj.material.color.setHex(nc);selectedObj.material.emissive.setHex(nc);selectedObj.userData.color=nc;saveSc();}gCool=now+700;}
  if(activeG==='OPEN'&&selectedObj&&now>gCool){highlight(selectedObj,false);selectedObj=null;updSel(null);gCool=now+300;}
}

async function startMP(){
  try{
    const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`});
    hands.setOptions({maxNumHands:2,modelComplexity:0,minDetectionConfidence:.65,minTrackingConfidence:.5});
    hands.onResults(onHands);
    vidFront=document.createElement('video');
    vidFront.setAttribute('playsinline','');vidFront.muted=true;
    vidFront.style.cssText='position:fixed;width:1px;height:1px;opacity:0;z-index:-1;';
    document.body.appendChild(vidFront);
    const fs=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640},height:{ideal:480}}});
    vidFront.srcObject=fs;
    await new Promise(r=>{vidFront.onloadedmetadata=r;}); await vidFront.play();
    async function sf(){if(vidFront.readyState>=2&&!vidFront.paused){try{await hands.send({image:vidFront});}catch(e){}}requestAnimationFrame(sf);}
    sf();
  }catch(e){console.warn('MP:',e);}
}

// ─────────────────────────────────────────────────────────
//  DEVICE ORIENTATION (gyro fallback)
// ─────────────────────────────────────────────────────────
const _Q1=new THREE.Quaternion(-Math.sqrt(.5),0,0,Math.sqrt(.5));
let gyroOn=false;
function onOrient(e){
  if(!gyroOn)return;
  const{alpha,beta,gamma}=e; if(alpha==null)return;
  const oa=screen.orientation?.angle??(window.orientation||0);
  const eu=new THREE.Euler();
  if(oa===0||oa===180)eu.set(THREE.MathUtils.degToRad(beta),THREE.MathUtils.degToRad(alpha),THREE.MathUtils.degToRad(-gamma),'YXZ');
  else eu.set(THREE.MathUtils.degToRad(gamma),THREE.MathUtils.degToRad(alpha),THREE.MathUtils.degToRad(beta),'YXZ');
  camera.quaternion.setFromEuler(eu).multiply(_Q1);
}
async function startGyroSensor(){
  if(typeof DeviceOrientationEvent?.requestPermission==='function'){
    try{const p=await DeviceOrientationEvent.requestPermission();if(p==='granted'){window.addEventListener('deviceorientation',onOrient);gyroOn=true;}}catch(e){}
  }else{window.addEventListener('deviceorientation',onOrient);gyroOn=true;}
}

// Fallback bg canvas (cover-crop video)
function drawBg(){
  if(!bgCtx||!vidBack||vidBack.readyState<2)return;
  const vw=vidBack.videoWidth||640,vh=vidBack.videoHeight||480;
  const s=Math.max(W/vw,H/vh);
  bgCtx.clearRect(0,0,W,H);
  bgCtx.drawImage(vidBack,(W-vw*s)/2,(H-vh*s)/2,vw*s,vh*s);
}

// ─────────────────────────────────────────────────────────
//  WEBXR AR
// ─────────────────────────────────────────────────────────
async function startWebXR(){
  showLoad('WebXR KONTROL EDİLİYOR...');
  try{
    if(!navigator.xr) throw new Error('WebXR API bulunamadı');
    const sup=await navigator.xr.isSessionSupported('immersive-ar');
    if(!sup) throw new Error('immersive-ar desteklenmiyor (ARCore gerekli)');

    showLoad('AR OTURUMU BAŞLATILIYOR...');
    renderer.xr.enabled=true;

    xrSess=await navigator.xr.requestSession('immersive-ar',{
      requiredFeatures:['hit-test'],
      optionalFeatures:['dom-overlay','local-floor'],
      domOverlay:{root:document.getElementById('ui')}
    });
    await renderer.xr.setSession(xrSess);

    xrSess.addEventListener('end',()=>{xrSess=null;htSrc=null;htReq=false;renderer.xr.enabled=false;mode='none';});
    xrSess.addEventListener('select',onXRSelect);

    renderer.setAnimationLoop(xrLoop);
    mode='webxr';
    hideOverlay();
    document.getElementById('reticle-lbl').style.display='block';
    setMode('YÜZEYE TAP → NESNE YERLEŞTİR');
    setSts('WebXR AR — Yüzeyi tara');

    // Buttons + scene
    if(!loadBtnPos()) placeBtnsInFront(1.8);
    loadSc(); startMP();

  }catch(e){
    console.error(e);
    showErr('WebXR başarısız:\n'+e.message+'\n\nARCore kurulu değil veya desteklenmiyor.\nJiroskop modunu dene ↓');
  }
}
window.startWebXR=startWebXR;

// WebXR render loop
function xrLoop(time,frame){
  const t=(time||0)/1000;
  if(frame){
    const sess=renderer.xr.getSession();
    const rs=renderer.xr.getReferenceSpace();
    if(!htReq&&sess){
      htReq=true;
      sess.requestReferenceSpace('viewer').then(vs=>{
        sess.requestHitTestSource({space:vs}).then(src=>{htSrc=src;});
      });
    }
    if(htSrc&&rs){
      const hits=frame.getHitTestResults(htSrc);
      if(hits.length>0){
        window.reticle.visible=true;
        window.reticle.matrix.fromArray(hits[0].getPose(rs).transform.matrix);
        window.reticle.updateMatrixWorld(true);
      }else window.reticle.visible=false;
    }
  }
  animObjs(t); updateBtns();
  renderer.render(scene,camera);
}

// ─────────────────────────────────────────────────────────
//  GYRO FALLBACK MODE
// ─────────────────────────────────────────────────────────
async function startGyro(){
  showLoad('JIROSKOP + KAMERA BAŞLATILIYOR...');
  await startGyroSensor();
  try{
    vidBack=document.createElement('video');
    vidBack.setAttribute('playsinline','');vidBack.muted=true;
    vidBack.style.cssText='position:fixed;width:1px;height:1px;opacity:0;z-index:-1;';
    document.body.appendChild(vidBack);
    const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}}});
    vidBack.srcObject=s;
    await new Promise(r=>{vidBack.onloadedmetadata=r;}); await vidBack.play();
    bgEl.style.display='block';
    bgEl.width=W; bgEl.height=H;
    bgCtx=bgEl.getContext('2d');
  }catch(e){console.warn('BackCam:',e);}

  renderer.setAnimationLoop(gyroLoop);
  mode='gyro';
  hideOverlay();
  setMode('JIROSKOP — TAP: NESNE YERLEŞTİR (2m önde)');
  setSts('Kameraya bak + TAP = nesne yerleştir');

  if(!loadBtnPos()) placeBtnsInFront(1.8);
  loadSc(); startMP();
}
window.startGyro=startGyro;

function gyroLoop(time){
  const t=(time||0)/1000;
  drawBg(); animObjs(t); updateBtns();
  renderer.clear();
  renderer.setViewport(0,0,W,H);
  renderer.render(scene,camera);
}

// ─────────────────────────────────────────────────────────
//  ANIMATION
// ─────────────────────────────────────────────────────────
function animObjs(t){
  modelObjects.forEach((o,i)=>{
    o.position.y+=Math.sin(t*1.2+i*1.7)*.00022;
    if(o.userData.ring)o.userData.ring.rotation.y=t*.4+i;
  });
  // Reticle pulse
  if(window.reticle&&window.reticle.visible){
    const s=1+.12*Math.sin(t*4);
    window.reticle.scale.set(s,s,s);
  }
}

// ─────────────────────────────────────────────────────────
//  UI HELPERS
// ─────────────────────────────────────────────────────────
function setMode(t){document.getElementById('mode-lbl').textContent='◈ '+t;}
function setSts(t){document.getElementById('status').textContent=t;}
function updCnt(){document.getElementById('cnt').textContent='NESNE: '+modelObjects.length;}
function updSel(o){const el=document.getElementById('sel');if(o){el.textContent='▶ '+o.userData.type.toUpperCase();el.style.opacity='1';}else el.style.opacity='0';}
function updSwatch(){const h='#'+PALETTE[colorIdx].toString(16).padStart(6,'0');const s=document.getElementById('sw');s.style.background=h;s.style.boxShadow='0 0 8px '+h;}

function showLoad(msg){
  const ov=document.getElementById('overlay');
  ov.querySelector('#btn-webxr').style.display='none';
  ov.querySelector('#btn-gyro').style.display='none';
  document.getElementById('lbar-w').style.display='block';
  document.getElementById('load-msg').style.display='block';
  document.getElementById('load-msg').textContent=msg;
  document.getElementById('err-box').style.display='none';
  ov.style.display='flex';
}
function hideOverlay(){document.getElementById('overlay').style.display='none';}
function showErr(msg){
  document.getElementById('lbar-w').style.display='none';
  document.getElementById('load-msg').style.display='none';
  const eb=document.getElementById('err-box');
  eb.textContent=msg; eb.style.display='block';
  document.getElementById('btn-gyro').style.display='block';
  document.getElementById('btn-webxr').style.display='block';
}

// ─────────────────────────────────────────────────────────
//  RESIZE
// ─────────────────────────────────────────────────────────
window.addEventListener('resize',()=>{
  W=window.innerWidth;H=window.innerHeight;
  const c=document.getElementById('c');c.width=W;c.height=H;
  if(bgEl){bgEl.width=W;bgEl.height=H;}
  if(renderer&&!renderer.xr.isPresenting){renderer.setSize(W,H);camera.aspect=W/H;camera.updateProjectionMatrix();}
});

// ─────────────────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────────────────
function init(){
  initThree(); setupPointer(); updSwatch();
  navigator.xr?.isSessionSupported('immersive-ar').then(s=>{
    if(!s){ document.getElementById('btn-webxr').textContent='◈ AR BAŞLAT (ARCore Yok?)'; document.getElementById('btn-webxr').classList.add('disabled'); }
  }).catch(()=>{});
}
init();
</script>
